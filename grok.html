<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Copihue — Punto de Venta v119</title>
    <meta name="theme-color" content="#991b1b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Copihue Venta">
    <link rel="manifest" href="manifest-venta.json">
    <link rel="icon" href="iconos-pwa/android/android-launchericon-48-48.png">
    <link rel="apple-touch-icon" href="icon-caja-180.png">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        :root {
            --verde: #991b1b;
            --verde-claro: #ef4444;
            --verde-oscuro: #7f1d1d;
            --naranja: #ff6f00;
            --rojo: #d32f2f;
            --gris: #f5f5f5;
            --texto: #212121;
            --subtexto: #757575;
            --header-bg-1: #7f1d1d;
            --header-bg-2: #991b1b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f4f0;
            color: var(--texto);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, var(--header-bg-1), var(--header-bg-2));
            color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .header-titulo {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== BUSCADOR ===== */
        .buscador-wrap {
            background: white;
            padding: 12px 16px;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
        }
        .buscador-input {
            width: 100%;
            padding: 16px 18px;
            font-size: 1.2rem;
            border: 2px solid var(--verde);
            border-radius: 30px;
            outline: none;
            background: #f9fffe;
            color: var(--texto);
        }
        .buscador-input:focus {
            border-color: var(--verde-oscuro);
            box-shadow: 0 0 0 3px rgba(153,27,27,0.15);
        }

        /* ===== RESULTADOS ===== */
        .resultados {
            flex: 1;
            overflow-y: auto;
            padding: 8px 8px 180px 8px;
        }

        .resultado-item {
            background: white;
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.13s;
        }
        .resultado-item:active { transform: scale(0.98); background: #f9f9f9; }
        .resultado-item.en-carrito { border: 2px solid #a5d6a7; }
        .resultado-item.sin-stock { opacity: 0.55; }
        .resultado-nombre { font-weight: 600; }
        .resultado-precio {
            font-size: 1.35rem;
            font-weight: 900;
            color: var(--verde-oscuro);
            flex-shrink: 0;
        }
        .btn-mas {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--verde);
            color: white;
            font-size: 1.9rem;
            border: none;
            box-shadow: 0 2px 8px rgba(153,27,27,0.3);
            cursor: pointer;
        }
        .btn-mas:disabled { background: #d1d5db; box-shadow: none; }

        /* ===== VENTA ACTUAL ===== */
        .panel-venta {
            background: white;
            border-top: 2px solid #e0e0e0;
            flex-shrink: 0;
            max-height: 60vh;
            display: flex;
            flex-direction: column;
            transition: max-height 0.3s ease;
        }
        .panel-venta-header {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fafafa;
            border-bottom: 1px solid #f0f0f0;
        }
        .panel-venta-titulo { font-weight: 700; font-size: 0.9rem; color: var(--subtexto); text-transform: uppercase; }
        .btn-limpiar { background: none; border: 1px solid #ddd; border-radius: 20px; padding: 4px 12px; color: var(--rojo); font-weight: 600; cursor: pointer; }
        .btn-minimizar { background: none; border: 1px solid #ddd; border-radius: 20px; padding: 4px 10px; color: #888; font-weight: 700; cursor: pointer; }

        .items-venta { overflow-y: auto; flex: 1; padding: 8px 0; }
        .venta-vacia { text-align: center; padding: 40px; color: #9ca3af; }

        .item-venta {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #f5f5f5;
            gap: 12px;
        }
        .item-venta-nombre { flex: 1; font-weight: 500; }
        .item-venta-controles { display: flex; align-items: center; gap: 8px; }
        .btn-cant {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: #f0f4f0;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: var(--verde-oscuro);
        }
        .item-cant { font-weight: 700; min-width: 24px; text-align: center; }
        .item-subtotal { font-weight: 700; color: var(--verde-oscuro); min-width: 80px; text-align: right; }

        .panel-total {
            background: var(--verde-oscuro);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            bottom: 0;
            z-index: 10;
        }
        .total-label { color: rgba(255,255,255,0.8); font-weight: 600; }
        .total-monto { color: white; font-size: 2.1rem; font-weight: 900; flex: 1; }
        .btn-confirmar {
            background: #86efac;
            color: #1e293b;
            border: none;
            border-radius: 12px;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
        }
        .btn-confirmar:disabled { background: #6b7280; color: #d1d5db; }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 10px 20px;
            border-radius: 9999px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.visible { opacity: 1; }
        .toast.verde { background: #10b981; }
        .toast.rojo  { background: #ef4444; }
        .toast.naranja { background: #f59e0b; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-titulo">Copihue — Venta</div>
        <div>
            <!-- Podés poner aquí tus botones originales (resumen, etc.) -->
        </div>
    </header>

    <!-- Buscador -->
    <div class="buscador-wrap">
        <input type="search" id="buscador" class="buscador-input" placeholder="Buscar producto..." autocomplete="off" autofocus />
    </div>

    <!-- Resultados -->
    <main class="resultados" id="resultados"></main>

    <!-- Panel venta -->
    <aside class="panel-venta" id="panelVenta">
        <div class="panel-venta-header">
            <span class="panel-venta-titulo">Venta actual <small id="cantItems">(0)</small></span>
            <div>
                <button id="btnMinimizar" class="btn-minimizar">− Minimizar</button>
                <button id="btnLimpiar" class="btn-limpiar">Limpiar</button>
            </div>
        </div>

        <div class="items-venta" id="itemsVenta"></div>

        <div class="panel-total">
            <span class="total-label">Total</span>
            <div class="total-monto" id="totalMonto">$0</div>
            <button id="btnConfirmar" class="btn-confirmar" disabled>Confirmar →</button>
        </div>
    </aside>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script>
        // ── Configuración ────────────────────────────────────────────────
        const API_URL = 'https://script.google.com/macros/s/AKfycbxhKFk2WAi-KRY5xGBsI6_6Pvp3jDjt8mSRXvy7I1WehNmBpJamqK9G9Q1ZJSCSgAdfDA/exec';
        const CARRITO_KEY = 'copihue_venta_pendiente_v2';

        let productos = [];
        let ventaActual = [];
        let isCargando = false;

        // Elementos DOM
        const elResultados   = document.getElementById('resultados');
        const elItemsVenta   = document.getElementById('itemsVenta');
        const elTotalMonto   = document.getElementById('totalMonto');
        const elCantItems    = document.getElementById('cantItems');
        const btnConfirmar   = document.getElementById('btnConfirmar');
        const toast          = document.getElementById('toast');

        // ── Helpers ──────────────────────────────────────────────────────
        function mostrarToast(msg, tipo = 'info') {
            toast.textContent = msg;
            toast.className = `toast visible ${tipo}`;
            setTimeout(() => toast.className = 'toast', 2600);
        }

        function calcularTotal() {
            const total = ventaActual.reduce((sum, i) => sum + i.price * i.qty, 0);
            elTotalMonto.textContent = '$' + total.toLocaleString('es-AR');
            elCantItems.textContent = `(${ventaActual.length})`;
            btnConfirmar.disabled = total <= 0 || ventaActual.length === 0;
        }

        function guardarCarrito() {
            localStorage.setItem(CARRITO_KEY, JSON.stringify(ventaActual));
        }

        function renderVenta() {
            elItemsVenta.innerHTML = '';
            if (ventaActual.length === 0) {
                elItemsVenta.innerHTML = '<div class="venta-vacia">Carrito vacío — ¡empezá a vender! 🛒</div>';
                calcularTotal();
                return;
            }

            ventaActual.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-venta';
                div.innerHTML = `
                    <div class="item-venta-nombre">${item.name} × ${item.qty}</div>
                    <div class="item-venta-controles">
                        <button class="btn-cant minus" data-id="${item.id}">−</button>
                        <span class="item-cant">${item.qty}</span>
                        <button class="btn-cant plus" data-id="${item.id}">+</button>
                    </div>
                    <div class="item-subtotal">$${(item.price * item.qty).toLocaleString('es-AR')}</div>
                `;
                elItemsVenta.appendChild(div);
            });
            calcularTotal();
            guardarCarrito();
        }

        // ── Cargar productos reales ─────────────────────────────────────
        async function cargarProductos() {
            if (isCargando) return;
            isCargando = true;
            mostrarToast('Cargando productos...', 'naranja');

            try {
                const r = await fetch(API_URL + '?t=' + Date.now());
                const data = await r.json();
                productos = data.productos || [];
                mostrarToast(`¡Listo! ${productos.length} productos cargados 🚀`, 'verde');
                renderResultados(productos);
            } catch (err) {
                mostrarToast('⚠️ No pudimos cargar los productos', 'rojo');
                console.error(err);
            } finally {
                isCargando = false;
            }
        }

        function renderResultados(lista) {
            elResultados.innerHTML = '';
            lista.forEach(p => {
                const div = document.createElement('div');
                div.className = `resultado-item ${p.stock <= 0 ? 'sin-stock' : ''} ${ventaActual.some(i => i.id === p.id) ? 'en-carrito' : ''}`;
                div.innerHTML = `
                    <div class="resultado-info">
                        <div class="resultado-nombre">${p.name}</div>
                        <div class="resultado-stock ${p.stock < 10 ? 'bajo' : ''}">Stock: ${p.stock}</div>
                        <small>${p.category || ''}</small>
                    </div>
                    <div class="resultado-precio">$${p.price.toLocaleString('es-AR')}</div>
                    <button class="btn-mas" data-id="${p.id}" ${p.stock <= 0 ? 'disabled' : ''}>+</button>
                `;
                elResultados.appendChild(div);
            });
        }

        // ── Agregar producto ─────────────────────────────────────────────
        function agregarOActualizar(id) {
            const prod = productos.find(p => p.id === id);
            if (!prod || prod.stock <= 0) return mostrarToast('Sin stock disponible', 'rojo');

            const enCarrito = ventaActual.find(i => i.id === id);
            if (enCarrito) {
                if (enCarrito.qty >= prod.stock) return mostrarToast('Límite de stock alcanzado', 'naranja');
                enCarrito.qty++;
            } else {
                ventaActual.push({ ...prod, qty: 1, price: prod.price });
            }

            renderVenta();
            renderResultados(productos);
            mostrarToast('✓ Agregado', 'verde');
        }

        // ── Eventos ──────────────────────────────────────────────────────
        elResultados.addEventListener('click', e => {
            const btn = e.target.closest('.btn-mas');
            if (btn) agregarOActualizar(Number(btn.dataset.id));
        });

        elItemsVenta.addEventListener('click', e => {
            const btn = e.target.closest('.btn-cant');
            if (!btn) return;
            const id = Number(btn.dataset.id);
            const item = ventaActual.find(i => i.id === id);
            if (!item) return;

            if (btn.classList.contains('plus')) {
                const prod = productos.find(p => p.id === id);
                if (item.qty < prod.stock) item.qty++;
            } else {
                item.qty--;
                if (item.qty <= 0) ventaActual = ventaActual.filter(i => i.id !== id);
            }
            renderVenta();
            renderResultados(productos);
        });

        btnConfirmar.addEventListener('click', async () => {
            const total = ventaActual.reduce((s, i) => s + i.price * i.qty, 0);
            if (!confirm(`Confirmar venta por $${total.toLocaleString('es-AR')}?`)) return;

            mostrarToast('Procesando venta...', 'naranja');

            try {
                const payload = {
                    action: 'registrarVenta',
                    items: ventaActual.map(i => ({ id: i.id, qty: i.qty, precio: i.price })),
                    total,
                    timestamp: new Date().toISOString()
                };

                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                mostrarToast('Venta guardada ✓', 'verde');
                ventaActual = [];
                localStorage.removeItem(CARRITO_KEY);
                renderVenta();
                renderResultados(productos);
            } catch (err) {
                mostrarToast('Venta local ok, pero no se guardó en servidor ⚠️', 'rojo');
                console.error(err);
            }
        });

        document.getElementById('btnLimpiar')?.addEventListener('click', () => {
            if (ventaActual.length === 0 || !confirm('¿Vaciar todo?')) return;
            ventaActual = [];
            localStorage.removeItem(CARRITO_KEY);
            renderVenta();
            mostrarToast('Carrito limpio', 'rojo');
        });

        document.getElementById('buscador').addEventListener('input', e => {
            const term = e.target.value.toLowerCase().trim();
            if (!term) return renderResultados(productos);

            const filtrados = productos.filter(p =>
                p.name.toLowerCase().includes(term) ||
                (p.category || '').toLowerCase().includes(term) ||
                String(p.id).includes(term)
            );
            renderResultados(filtrados);
        });

        // ── Inicio ───────────────────────────────────────────────────────
        window.addEventListener('load', () => {
            const guardado = localStorage.getItem(CARRITO_KEY);
            if (guardado) {
                try {
                    ventaActual = JSON.parse(guardado);
                    renderVenta();
                    if (ventaActual.length) mostrarToast('Venta anterior recuperada', 'naranja');
                } catch {}
            }
            cargarProductos();
        });
    </script>

</body>
</html>
