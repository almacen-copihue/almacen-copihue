<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ver.1 · Copihue · Reportes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --v0:#b71c1c; --v1:#e64a19; --v2:#ff8f00; --v3:#66bb6a; --v4:#2e7d32; --v5:#1b5e20; --v6:#0a3d0f;
  --verde:#2e7d32; --vd:#1b5e20; --vdp:#0a3d0f; --vl:#e8f5e9;
  --naranja:#f57c00; --nl:#fff3e0;
  --rojo:#c62828; --rl:#ffebee;
  --azul:#1565c0; --al:#e3f2fd;
  --morado:#6a1b9a; --ml:#f3e5f5;
  --gris:#546e7a; --bg:#f1f8f1; --blanco:#fff; --borde:#c8e6c9; --texto:#1a2e1c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--texto);min-height:100dvh}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--vdp),var(--vd),var(--verde));padding:11px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(10,61,15,.4);position:sticky;top:0;z-index:100}
.hdr-icon{font-size:1.5rem}
.hdr-t{color:#fff;font-size:.95rem;font-weight:900}
.hdr-s{color:rgba(255,255,255,.7);font-size:.62rem;letter-spacing:2px;text-transform:uppercase}
.btn-back{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:20px;padding:5px 13px;font-size:.76rem;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center}

/* LOADING */
.ldg{text-align:center;padding:60px 20px;color:var(--gris)}
.spin{width:34px;height:34px;border:3px solid var(--vl);border-top-color:var(--verde);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* PANEL SELECCIÓN */
.sel-panel{margin:12px 12px 0;background:#fff;border-radius:18px;border:1px solid var(--borde);overflow:hidden;box-shadow:0 1px 6px rgba(46,125,50,.08)}
.sel-titulo{background:linear-gradient(90deg,var(--vdp),var(--vd));color:#fff;padding:10px 16px;font-size:.82rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;justify-content:space-between}
.sel-body{padding:12px 12px 14px}

/* BOTÓN HOY — sticky top standard */
.btn-hoy-top{display:flex;align-items:center;gap:8px;background:var(--naranja);color:#fff;border:none;border-radius:12px;padding:10px 16px;font-size:.88rem;font-weight:900;cursor:pointer;font-family:inherit;width:100%;margin-bottom:12px;justify-content:center;box-shadow:0 2px 8px rgba(245,124,0,.3);transition:all .15s}
.btn-hoy-top:active{transform:scale(.97)}
.btn-hoy-top.activo{background:var(--vd)}

/* MES NAV */
.mes-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;background:var(--vl);border-radius:12px;padding:8px 10px}
.mes-nombre{font-size:1rem;font-weight:900;color:var(--vd)}
.btn-mes{width:36px;height:36px;border:none;border-radius:50%;background:var(--verde);color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900;box-shadow:0 2px 6px rgba(46,125,50,.3)}

/* SECCIÓN JERÁRQUICA */
.sel-sec{margin-bottom:8px}
.sel-sec-lbl{font-size:.66rem;font-weight:900;color:var(--gris);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.sel-sec-lbl::before{content:'';display:block;width:3px;height:12px;background:var(--verde);border-radius:2px}

/* SEMANAS */
.sems-row{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:10px}
.btn-sem{padding:7px 4px;border:1.5px solid var(--borde);border-radius:9px;background:#fff;font-size:.72rem;font-weight:800;cursor:pointer;color:var(--gris);font-family:inherit;text-align:center;transition:all .12s}
.btn-sem:active,.btn-sem.activo{background:var(--verde);border-color:var(--vd);color:#fff}

/* MESES FILA */
.meses-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:10px}
.btn-mes-sel{padding:8px 4px;border:1.5px solid var(--borde);border-radius:10px;background:#fff;font-size:.72rem;font-weight:700;cursor:pointer;color:var(--gris);font-family:inherit;text-align:center;transition:all .15s;line-height:1.3}
.btn-mes-sel.tiene{background:var(--vl);border-color:var(--verde);color:var(--vd)}
.btn-mes-sel.activo{background:var(--vd);border-color:var(--vdp);color:#fff}
.btn-mes-sel.sin{opacity:.4}

/* AÑOS ANTERIORES colapsable */
.anios-wrap{margin-bottom:10px}
.btn-anio-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;background:var(--vl);border:1.5px solid var(--borde);border-radius:10px;padding:8px 12px;font-size:.78rem;font-weight:800;color:var(--vd);cursor:pointer;font-family:inherit;transition:all .12s}
.btn-anio-toggle:active{background:var(--verde);color:#fff}
.anio-panel{margin-top:5px;background:#f9fdf9;border:1.5px solid var(--borde);border-radius:10px;padding:10px;display:none}
.anio-panel.open{display:block}
.anio-titulo{font-size:.72rem;font-weight:900;color:var(--gris);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px}
.anio-meses-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px}

/* CHIPS */
.chips-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chip{padding:6px 12px;border:2px solid var(--borde);border-radius:20px;background:#fff;font-size:.76rem;font-weight:700;cursor:pointer;color:var(--gris);font-family:inherit;transition:all .15s;white-space:nowrap}
.chip.activo{background:var(--vd);border-color:var(--vd);color:#fff}
.chip.ven.activo{background:var(--azul);border-color:var(--azul)}
.chip-limpiar{background:var(--rl);border-color:var(--rojo);color:var(--rojo)}
.chip-limpiar:active{background:var(--rojo);color:#fff}

/* LABEL SECCIÓN */
.lbl{font-size:.68rem;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;margin-top:10px}

/* CALENDARIO */
.cal{background:var(--vl);border-radius:14px;overflow:hidden;margin-bottom:10px;border:1px solid var(--borde)}
.cal-meses{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
.cal-mes-btn{padding:8px 4px;border:1px solid var(--borde);border-radius:10px;background:#fff;font-size:.72rem;font-weight:700;cursor:pointer;color:var(--gris);font-family:inherit;text-align:center;transition:all .15s}
.cal-mes-btn.sel{background:var(--vl);border-color:var(--verde);color:var(--vd)}
.cal-mes-btn.activo{background:var(--verde);color:#fff;border-color:var(--vd)}
.cal-sem{display:grid;grid-template-columns:repeat(7,1fr);background:var(--verde);padding:4px 0}
.cal-dn{text-align:center;padding:4px 2px;font-size:.63rem;font-weight:700;color:rgba(255,255,255,.85);text-transform:uppercase}
.cal-dias{display:grid;grid-template-columns:repeat(7,1fr);background:var(--vl);gap:0;padding:3px}
.cal-d{border:1px solid transparent;border-radius:9px;margin:2px;padding:4px 1px;text-align:center;cursor:pointer;transition:all .12s;min-height:52px;display:flex;flex-direction:column;align-items:center;gap:1px;background:rgba(255,255,255,.7)}
.cal-d.vacio{cursor:default;background:transparent;border:none}
.cal-d.tiene{background:#fff;border-color:var(--borde)}
.cal-d.sel{background:var(--vd) !important;border-color:var(--vdp) !important}
.cal-d.sel .dn{color:#fff !important;background:transparent !important}
.cal-d.sel .dm{color:rgba(255,255,255,.85) !important}
.cal-d.sel .dg{color:rgba(255,200,100,.9) !important}
.cal-d.hoy .dn{background:var(--naranja);color:#fff;border-radius:50%;width:21px;height:21px;display:flex;align-items:center;justify-content:center}
.dn{font-size:.8rem;font-weight:700;color:var(--texto);line-height:1}
.dm{font-size:.57rem;font-weight:700;color:var(--vd);line-height:1}
.dg{font-size:.53rem;font-weight:700;color:var(--naranja);line-height:1}
.dpunto{width:4px;height:4px;border-radius:50%;background:var(--naranja);margin-top:1px}
.cal-d.hoy-label{position:relative}

/* PROD ROW clickeable - todos los hijos ignoran pointer para que el click llegue al padre */
.prod-clickable{cursor:pointer;-webkit-tap-highlight-color:rgba(46,125,50,.15)}
.prod-clickable *{pointer-events:none}
.hoy-badge{position:absolute;top:-1px;right:-1px;background:var(--naranja);color:#fff;font-size:.45rem;font-weight:900;padding:1px 3px;border-radius:4px;line-height:1.2}

/* BOTONES ACCIÓN */
.acc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
.acc-grid2{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.btn-acc{padding:7px 4px;border:1px solid var(--borde);border-radius:10px;background:#fff;font-size:.68rem;font-weight:700;cursor:pointer;color:var(--gris);font-family:inherit;text-align:center}
.btn-acc:active{background:var(--vl)}
.btn-acc.verde{background:var(--vl);border-color:var(--verde);color:var(--vd)}
.btn-acc.naranja{background:var(--nl);border-color:var(--naranja);color:#e65100}

/* SECCIÓN RESULTADOS */
.resultados{padding:0 12px}

/* CARDS */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.card{background:#fff;border-radius:14px;padding:12px;border:1px solid var(--borde)}
.card.full{grid-column:1/-1}
.card.verde-g{background:linear-gradient(135deg,var(--vdp),var(--verde));color:#fff;border:none}
.card.nar-g{background:linear-gradient(135deg,#c62828,var(--naranja));color:#fff;border:none}
.card.aprox{background:linear-gradient(135deg,#37474f,#546e7a);color:#fff;border:none}
.card-lbl{font-size:.65rem;opacity:.8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.card-val{font-size:1.45rem;font-weight:900;line-height:1}
.card-sub{font-size:.68rem;opacity:.75;margin-top:3px}
.card-lbl2{font-size:.65rem;color:var(--gris);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.card-val2{font-size:1.45rem;font-weight:900;color:var(--vd)}
.info-tag{display:inline-block;background:rgba(255,255,255,.2);border-radius:8px;padding:2px 6px;font-size:.62rem;margin-top:4px;cursor:pointer}

/* TARJETA */
.tar{background:#fff;border-radius:14px;border:1px solid var(--borde);padding:13px;margin-bottom:10px}
.tar-t{font-size:.68rem;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.tar-t .ver-mas{background:var(--vl);border:none;border-radius:10px;padding:3px 8px;font-size:.65rem;font-weight:700;color:var(--vd);cursor:pointer;font-family:inherit}

/* ROWS */
.row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f5f5f5}
.row:last-child{border-bottom:none}
.row-l{font-size:.83rem;color:var(--gris)}
.row-v{font-weight:900;font-size:.88rem;color:var(--vd)}
.row-pct{font-size:.68rem;color:var(--gris);background:var(--vl);padding:2px 6px;border-radius:10px;margin-left:5px}

/* BARRAS PRODUCTO */
.prod-row{margin-bottom:9px}
.prod-hdr{display:flex;justify-content:space-between;margin-bottom:2px}
.prod-n{font-size:.78rem;font-weight:700;color:var(--texto)}
.prod-d{font-size:.72rem;color:var(--gris)}
.barra-bg{background:var(--vl);border-radius:20px;height:6px}
.barra-f{border-radius:20px;height:6px;transition:width .4s}
.bar-v{background:linear-gradient(90deg,var(--vd),#66bb6a)}
.bar-g{background:linear-gradient(90deg,var(--naranja),#ffd54f)}
.bar-rojo{background:linear-gradient(90deg,var(--rojo),#ef9a9a)}

/* GANANCIA COLORES */
.gan-verde{color:var(--verde);font-weight:700}
.gan-naranja{color:var(--naranja);font-weight:700}
.gan-rojo{color:var(--rojo);font-weight:700;text-decoration:line-through}

/* DÍAS SEMANA */
.dsem-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.dsem-l{font-size:.76rem;font-weight:700;color:var(--gris);min-width:30px}
.dsem-bg{flex:1;background:var(--vl);border-radius:20px;height:10px}
.dsem-f{background:linear-gradient(90deg,var(--vd),#66bb6a);border-radius:20px;height:10px}
.dsem-v{font-size:.72rem;font-weight:700;color:var(--vd);min-width:72px;text-align:right}

/* HORAS */
.hora-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-top:6px}
.hora-cel{border-radius:6px;padding:4px 2px;text-align:center}
.hora-n{font-size:.62rem;font-weight:700;color:var(--gris)}
.hora-b{height:28px;border-radius:4px;margin-top:2px}

/* VENCIMIENTOS */
.venc-i{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f5f5f5}
.venc-i:last-child{border-bottom:none}
.venc-n{font-size:.8rem;font-weight:600}
.venc-n.vencido-text{color:var(--rojo);text-decoration:line-through}
.badge{font-size:.66rem;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.bg-r{background:var(--rl);color:var(--rojo)}
.bg-o1{background:#fbe9e7;color:#bf360c}
.bg-o2{background:var(--nl);color:#e65100}
.bg-g3{background:#e8f5e9;color:#2e7d32}
.bg-g4{background:#c8e6c9;color:#1b5e20}
.bg-g5{background:#a5d6a7;color:#0a3d0f}

/* SEMÁFORO STOCK */
.stk-0{color:var(--v0);font-weight:700}
.stk-1{color:var(--v1);font-weight:700}
.stk-2{color:var(--v2);font-weight:700}
.stk-3{color:var(--v3);font-weight:700}
.stk-4{color:var(--v4);font-weight:700}
.stk-5{color:var(--v5);font-weight:700}
.stk-off{text-decoration:line-through;opacity:.6}

/* COMPARAR MESES */
.comp-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.comp-l{font-size:.75rem;font-weight:700;color:var(--gris);min-width:48px}
.comp-bars{flex:1;display:flex;flex-direction:column;gap:3px}
.comp-bg{background:#f5f5f5;border-radius:20px;height:9px}
.comp-f{border-radius:20px;height:9px}
.comp-v{min-width:78px;text-align:right}
.comp-vt{font-size:.7rem;font-weight:700;color:var(--vd)}
.comp-vg{font-size:.63rem;color:var(--naranja)}

/* DETALLE */
.dd{background:#fff;border-radius:12px;border:1px solid var(--borde);margin-bottom:7px;overflow:hidden}
.dd-hdr{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--vl);cursor:pointer}
.dd-f{font-weight:700;font-size:.85rem}
.dd-r{text-align:right}
.dd-body{padding:8px 12px;display:none;border-top:1px solid var(--borde)}
.dd-body.open{display:block}
.tkt{background:#f9faf9;border-radius:8px;padding:7px;margin-bottom:5px}
.tkt-hdr{display:flex;justify-content:space-between;margin-bottom:4px;font-size:.7rem;color:var(--gris)}
.vi{display:flex;justify-content:space-between;padding:3px 0;font-size:.76rem;border-bottom:1px solid #f5f5f5;color:var(--gris)}
.vi:last-child{border-bottom:none}
.vtag{font-size:.62rem;background:var(--al);color:var(--azul);padding:1px 5px;border-radius:8px;font-weight:700;margin-left:3px}
.mtag{font-size:.62rem;background:var(--ml);color:var(--morado);padding:1px 5px;border-radius:8px;font-weight:700}

.empty{text-align:center;padding:24px;color:#bbb;font-size:.82rem}
.pb{padding-bottom:28px}
.seccion-sep{height:12px}
/* TABLA DETALLE PRODUCTOS x DÍAS */
.pdias-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -2px}
.pdias-table{border-collapse:collapse;font-size:.7rem;min-width:100%}
.pdias-table th{background:#fff;font-weight:700;white-space:nowrap;padding:5px 4px;border-bottom:2px solid var(--borde);color:var(--gris);font-size:.6rem;letter-spacing:.5px}
.pdias-table th.col-prod{position:sticky;left:0;z-index:3;text-align:left;min-width:120px;background:#fff}
.pdias-table th.col-tot{position:sticky;right:0;z-index:3;background:#fff;border-left:2px solid var(--borde)}
.pdias-table td{padding:4px 4px;border-bottom:1px solid #f0f0f0;text-align:center;white-space:nowrap;vertical-align:middle}
.pdias-table td.col-prod{position:sticky;left:0;background:#fff;text-align:left;font-weight:700;font-size:.71rem;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.pdias-table td.col-tot{position:sticky;right:0;background:#fff;font-weight:900;color:var(--vd);border-left:2px solid var(--borde)}
.pdias-table tr:hover td{background:#f5fbf5 !important}
.pdias-qty{display:inline-block;min-width:18px;padding:1px 3px;border-radius:4px;font-weight:700;font-size:.68rem}
.pdias-qty.q0{color:#ddd}
.pdias-qty.q1{background:#e8f5e9;color:#388e3c}
.pdias-qty.q2{background:#c8e6c9;color:#2e7d32}
.pdias-qty.q3{background:#a5d6a7;color:#1b5e20}
.pdias-qty.q4{background:#66bb6a;color:#fff}
.pdias-qty.q5{background:#2e7d32;color:#fff}
.pdias-th-dia{text-align:center;padding:3px 4px !important}
.dia-n{display:block;font-weight:900;font-size:.68rem;color:var(--texto)}
.dia-dow{display:block;color:var(--gris);font-size:.55rem;line-height:1}
.hoy-col .dia-n{background:var(--naranja);color:#fff;border-radius:8px;padding:1px 4px}

.toggle-btn{width:100%;padding:9px;border:2px solid var(--borde);border-radius:12px;background:#fff;font-size:.78rem;font-weight:700;color:var(--gris);cursor:pointer;font-family:inherit;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px}
.toggle-btn:active{background:var(--vl)}

/* MODAL PRODUCTO */
.mprod-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end}
.mprod-overlay.open{display:flex}
.mprod-sheet{background:#fff;border-radius:22px 22px 0 0;width:100%;max-height:88dvh;overflow-y:auto;padding:0 0 32px}
.mprod-drag{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:12px auto 0}
.mprod-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--borde);position:sticky;top:0;background:#fff;z-index:1}
.mprod-nombre{font-size:.92rem;font-weight:900;color:var(--texto);margin-bottom:2px}
.mprod-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.mprod-chip{padding:4px 10px;border-radius:20px;font-size:.68rem;font-weight:700}
.mprod-body{padding:12px 16px}
.mprod-stat{display:flex;gap:8px;margin-bottom:12px}
.mprod-card{flex:1;background:var(--vl);border-radius:12px;padding:8px 10px;text-align:center}
.mprod-card.naranja{background:var(--nl)}
.mprod-card.gris{background:#f5f5f5}
.mprod-clbl{font-size:.58rem;color:var(--gris);text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.mprod-cval{font-size:1rem;font-weight:900;color:var(--vd)}
.mprod-cval.nar{color:var(--naranja)}
.mprod-sec{font-size:.65rem;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px;padding-bottom:4px;border-bottom:1px solid #f0f0f0}
.mprod-ticket{background:#f9faf9;border-radius:10px;padding:8px 10px;margin-bottom:6px;border-left:3px solid var(--verde)}
.mprod-trow{display:flex;justify-content:space-between;align-items:center;font-size:.75rem}
.mprod-fecha{color:var(--gris);font-size:.68rem;margin-top:2px}

/* ===== COMPRA SUGERIDA INTELIGENTE ===== */
.csi-resumen{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px}
.csi-stat{background:#fff;border:1px solid var(--borde);border-radius:10px;padding:8px 4px;text-align:center}
.csi-stat-v{font-size:1.25rem;font-weight:900;color:var(--vd);line-height:1}
.csi-stat-l{font-size:.56rem;color:var(--gris);margin-top:2px;line-height:1.3}
.csi-sem .csi-stat-v{color:var(--azul)}
.csi-men .csi-stat-v{color:var(--verde)}
.csi-esp .csi-stat-v{color:var(--morado)}
.csi-rea .csi-stat-v{color:var(--naranja)}
.csi-tabla-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -2px}
.csi-tabla{border-collapse:collapse;font-size:.7rem;min-width:100%}
.csi-tabla th{background:#fff;font-weight:700;white-space:nowrap;padding:5px 4px;border-bottom:2px solid var(--borde);color:var(--gris);font-size:.6rem;letter-spacing:.5px;text-align:center}
.csi-tabla th.csi-col-prod{position:sticky;left:0;z-index:4;text-align:left;min-width:120px;background:#fff}
.csi-tabla td{padding:4px;border-bottom:1px solid #f0f0f0;vertical-align:middle;white-space:nowrap}
.csi-tabla td.csi-col-prod{position:sticky;left:0;background:#fff;font-weight:600;font-size:.71rem;max-width:130px;overflow:hidden;text-overflow:ellipsis}
.csi-tabla tr:hover td{background:#f5fbf5!important}
.csi-qty{display:inline-block;background:var(--vd);color:#fff;font-weight:900;font-size:.78rem;padding:2px 8px;border-radius:8px;min-width:28px;text-align:center}
.csi-badge-dia{background:#f3e5f5;color:#4a148c}
.csi-badge-sem{background:var(--al);color:var(--azul)}
.csi-badge-men{background:var(--vl);color:var(--vd)}
.csi-badge-esp{background:var(--ml);color:var(--morado)}
.csi-badge-rea{background:var(--nl);color:#e65100}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-icon">🏪</div>
  <div><div class="hdr-t">Copihue</div><div class="hdr-s">Reportes</div></div>
  <a href="herramientas.html" class="btn-back">← Volver</a>
</div>

<div id="app"><div class="ldg"><div class="spin"></div>Cargando reportes...</div></div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbxhKFk2WAi-KRY5xGBsI6_6Pvp3jDjt8mSRXvy7I1WehNmBpJamqK9G9Q1ZJSCSgAdfDA/exec';
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS_SEM=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const EXCLUIR_VENDEDORES=['DIEGO','DIEGO REAL']; // no aparecen en reportes
const normVend=v=>(v||'').normalize('NFD').replace(/[̀-ͯ]/g,'').trim().toUpperCase();

let raw=null;
let _topNombres=[]; // nombres top venta para tap seguro
let _topGanNombres=[]; // nombres top ganancia para tap seguro
let mes=new Date().getMonth(), anio=new Date().getFullYear();
let diasSel=new Set();
let modoNav='mes'; // 'mes' | 'anio'
let aniosAbiertos=new Set(); // años anteriores expandidos en el selector
let metActivos=new Set(['TODOS']);
let vendActivos=new Set(['TODOS']);
let topOrden='venta'; // 'venta' | 'ganancia'
let showVenc=false, showDiaSem=false, showHoras=false, showPDias=false;
let prodSelIdx=-1; // índice del producto seleccionado en el top (-1 = ninguno)
// ===== COMPRA SUGERIDA INTELIGENTE — estado =====
let showCSI=false, csiFiltroPeriodo='todos';

const fmt=n=>'$'+Math.round(n).toLocaleString('es-AR');
const hoyStr=()=>{const h=new Date();return h.getFullYear()+'-'+String(h.getMonth()+1).padStart(2,'0')+'-'+String(h.getDate()).padStart(2,'0');};

// ====== INIT ======
async function init(){
  try{
    const r=await fetch(API_URL+'?action=getReportes',{redirect:'follow',signal:AbortSignal.timeout(20000)});
    const d=await r.json();
    if(d.error) throw new Error(d.error);
    raw=d;
    // Seleccionar hoy solo si el mes visible es el mes actual
    const hoy=new Date();
    if(mes===hoy.getMonth()&&anio===hoy.getFullYear()) diasSel.add(hoyStr());
    renderApp();
  }catch(e){
    document.getElementById('app').innerHTML='<div class="ldg" style="color:#c62828">❌ '+e.message+'</div>';
  }
}

// ====== FILTRAR ======
function getDiasMes(){
  const n=new Date(anio,mes+1,0).getDate();
  return Array.from({length:n},(_,i)=>anio+'-'+String(mes+1).padStart(2,'0')+'-'+String(i+1).padStart(2,'0'));
}

function filtrar(dias){
  const set=new Set(dias);
  const its=raw.items.filter(v=>set.has(v.fechaStr));
  const tots=raw.totales.filter(v=>set.has(v.fechaStr));
  // Excluir vendedores
  const totsF=tots.filter(t=>!EXCLUIR_VENDEDORES.includes(normVend(t.vendedor||'')));
  // Tickets válidos
  let tksOk=new Set(totsF.map(t=>t.fechaStr+'_'+t.ticket));
  if(!metActivos.has('TODOS')){
    tksOk=new Set([...tksOk].filter(tk=>{
      const [f,ti]=tk.split('_');
      const tot=totsF.find(t=>t.fechaStr===f&&t.ticket===ti);
      return tot&&Array.from(metActivos).some(m=>(tot.metodo||'').includes(m));
    }));
  }
  if(!vendActivos.has('TODOS')){
    tksOk=new Set([...tksOk].filter(tk=>{
      const [f,ti]=tk.split('_');
      const tot=totsF.find(t=>t.fechaStr===f&&t.ticket===ti);
      // Comparar normalizando tildes
      return tot&&[...vendActivos].some(va=>normVend(va)===normVend(tot.vendedor||''));
    }));
  }
  return{
    items: its.filter(i=>tksOk.has(i.fechaStr+'_'+i.ticket)),
    totals: totsF.filter(t=>tksOk.has(t.fechaStr+'_'+t.ticket))
  };
}

function calcStats(its,tots){
  const venta=tots.reduce((s,t)=>s+(t.total||0),0);
  let ganReal=0, ganAprox=0, itemsConCosto=0, itemsSinCosto=0;
  its.forEach(i=>{
    if(i.tieneCosto){ganReal+=(i.gananciaReal||0);itemsConCosto++;}
    else itemsSinCosto++;
    ganAprox+=(i.gananciaAprox||0);
  });
  const metodos={},vendedores={};
  tots.forEach(t=>{
    const m=(t.metodo||'EFECTIVO').toUpperCase();
    metodos[m]=(metodos[m]||0)+(t.total||0);
    // Normalizar vendedor para unificar "Sebastian" y "Sebastián"
    const vRaw=t.vendedor||'Sin nombre';
    const vKey=normVend(vRaw);
    if(!vendedores[vKey])vendedores[vKey]={nombre:vRaw,total:0};
    vendedores[vKey].total+=(t.total||0);
    // unificar nombre display: usar el más corto (sin tilde) como canónico si ya existe
    if(vendedores[vKey].nombre.length>vRaw.length)vendedores[vKey].nombre=vRaw;
  });
  const prods={};
  its.forEach(i=>{
    if(!i.nombre)return;
    if(!prods[i.nombre])prods[i.nombre]={qty:0,total:0,ganReal:0,ganAprox:0,conCosto:false};
    prods[i.nombre].qty+=i.qty||0;
    prods[i.nombre].total+=i.subtotal||0;
    prods[i.nombre].ganReal+=i.tieneCosto?(i.gananciaReal||0):0;
    prods[i.nombre].ganAprox+=i.gananciaAprox||0;
    if(i.tieneCosto)prods[i.nombre].conCosto=true;
  });
  const top=Object.entries(prods).sort((a,b)=>b[1].total-a[1].total).slice(0,15)
    .map(([n,d])=>({nombre:n,qty:Math.round(d.qty),total:d.total,ganReal:d.ganReal,ganAprox:d.ganAprox,conCosto:d.conCosto}));
  return{venta,ganReal,ganAprox,itemsConCosto,itemsSinCosto,metodos,vendedores,top,nTks:tots.length};
}

// ====== HELPERS ======
function colorGan(g,v){
  if(v===0)return'';
  const pct=g/v*100;
  if(pct<0)return'gan-rojo';
  if(pct<10)return'gan-naranja';
  return'gan-verde';
}
function badgeVenc(dias){
  if(dias<0) return{cls:'bg-r',txt:'VENCIDO'};
  if(dias<=3) return{cls:'bg-o1',txt:dias+'d'};
  if(dias<=7) return{cls:'bg-o2',txt:dias+'d'};
  if(dias<=14)return{cls:'bg-g3',txt:dias+'d'};
  if(dias<=21)return{cls:'bg-g4',txt:dias+'d'};
  return{cls:'bg-g5',txt:dias+'d'};
}
function clsStock(s){
  if(s===0)return'stk-0 stk-off';
  if(s===1)return'stk-1';
  if(s===2)return'stk-2';
  if(s===3)return'stk-3';
  if(s<=6) return'stk-4';
  if(s<=15)return'stk-5';
  return'stk-5';
}

// ====== RENDER ======
function renderApp(){
  const diasArr=Array.from(diasSel);
  const {items,totals}=filtrar(diasArr);
  const stats=calcStats(items,totals);
  const today=hoyStr();

  // Datos mes (sin filtro método para calendario)
  const {items:itM,totals:totM}=filtrar(getDiasMes());
  const porDia={};
  totM.forEach(t=>{if(!porDia[t.fechaStr])porDia[t.fechaStr]={tv:0,tg:0};porDia[t.fechaStr].tv+=t.total||0;});
  itM.forEach(i=>{if(!porDia[i.fechaStr])porDia[i.fechaStr]={tv:0,tg:0};porDia[i.fechaStr].tg+=i.gananciaAprox||0;});

  // Métodos disponibles
  const metSet=new Set();raw.totales.forEach(t=>{if(t.metodo)metSet.add(t.metodo.toUpperCase());});
  const metodos=[...metSet].sort();

  // Vendedores disponibles (sin excluidos) — normalizados para evitar duplicados con/sin tilde
  const vendMap=new Map(); // normKey → nombre display (primera aparición)
  raw.totales.filter(t=>!EXCLUIR_VENDEDORES.includes(normVend(t.vendedor||'')))
    .forEach(t=>{if(t.vendedor){const k=normVend(t.vendedor);if(!vendMap.has(k))vendMap.set(k,t.vendedor);}});
  const vendedores=[...vendMap.values()].sort();

  // Calendario
  const primerDia=new Date(anio,mes,1).getDay();
  const diasEnMes=new Date(anio,mes+1,0).getDate();
  let calH='<div class="cal-sem">'+DIAS_SEM.map(d=>'<div class="cal-dn">'+d+'</div>').join('')+'</div><div class="cal-dias">';
  for(let i=0;i<primerDia;i++) calH+='<div class="cal-d vacio"></div>';
  for(let d=1;d<=diasEnMes;d++){
    const ds=anio+'-'+String(mes+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const info=porDia[ds];
    const sel=diasSel.has(ds), esH=ds===today;
    let cls='cal-d'+(info?' tiene':'')+(sel?' sel':'')+(esH?' hoy':'');
    const monto=info?'<div class="dm">'+fmt(info.tv)+'</div>':'';
    const gan=info?'<div class="dg">+'+fmt(info.tg)+'</div>':'';
    const pto=(info&&!sel)?'<div class="dpunto"></div>':'';
    const hoyLbl=esH&&!sel?'<div class="hoy-badge">HOY</div>':'';
    calH+='<div class="'+cls+'" onclick="toggleDia(\''+ds+'\')" style="position:relative">'+hoyLbl+'<div class="dn">'+d+'</div>'+monto+gan+pto+'</div>';
  }
  calH+='</div>';

  // Semanas del mes
  const semNombres=['S1','S2','S3','S4','S5'];
  const semsHTML=semNombres.map(s=>{
    const n=parseInt(s[1]);
    const ini=(n-1)*7+1, fin=Math.min(n*7,diasEnMes);
    if(ini>diasEnMes)return'';
    return'<button class="btn-acc" onclick="selSemana('+n+')">'+s+'</button>';
  }).join('');

  // Calendario de meses (modo año)
  const calMesesH=MESES.map((nm,mi)=>{
    const tieneData = raw && raw.totales.some(t=>t.fechaStr && t.fechaStr.startsWith(anio+'-'+String(mi+1).padStart(2,'0')));
    const diasDelMes=[...diasSel].filter(d=>d.startsWith(anio+'-'+String(mi+1).padStart(2,'0')));
    const esSel = diasDelMes.length > 0;
    const cls = esSel ? 'cal-mes-btn activo' : tieneData ? 'cal-mes-btn sel' : 'cal-mes-btn';
    return '<button class="'+cls+'" onclick="selMes('+mi+')">'+nm.substring(0,3)+(tieneData?'':'<br><span style="font-size:.55rem;opacity:.4">sin datos</span>')+'</button>';
  }).join('');

  // Filtros método
  const fMetH='<div class="chips-wrap">'+
    '<button class="chip'+(metActivos.has('TODOS')?' activo':'')+'" onclick="togMet(\'TODOS\')">📋 Todos</button>'+
    metodos.map(m=>{const ic=m.includes('EFECTIVO')?'💵':m.includes('TRANSF')?'📱':m.includes('QR')?'📲':m.includes('POSNET')?'💳':'🔀';return'<button class="chip'+(metActivos.has(m)?' activo':'')+'" onclick="togMet(\''+m+'\')">'+ic+' '+m+'</button>';}).join('')+
    '<button class="chip chip-limpiar" onclick="deselTodo()">✕ Limpiar</button>'+
  '</div>';

  // Filtros vendedor
  const fVendH=vendedores.length>1?
    '<div class="lbl">Vendedor</div><div class="chips-wrap">'+
    '<button class="chip ven'+(vendActivos.has('TODOS')?' activo':'')+'" onclick="togVend(\'TODOS\')">👥 Todos</button>'+
    vendedores.map(v=>'<button class="chip ven'+(vendActivos.has(normVend(v))?' activo':'')+'" onclick="togVend(\''+v+'\')">👤 '+v+'</button>').join('')+
    '</div>':'';

  // Cards
  const pctG=stats.venta>0?Math.round(stats.ganReal/stats.venta*100):0;
  const pctGA=stats.venta>0?Math.round(stats.ganAprox/stats.venta*100):0;
  const cardsH=
    '<div class="cards">'+
    '<div class="card verde-g full"><div class="card-lbl">Ventas período</div><div class="card-val">'+fmt(stats.venta)+'</div><div class="card-sub">'+stats.nTks+' tickets · '+diasArr.length+' días</div></div>'+
    '<div class="card nar-g"><div class="card-lbl">Ganancia real</div><div class="card-val">'+fmt(stats.ganReal)+'</div><div class="card-sub">'+pctG+'% · '+stats.itemsConCosto+' prod c/costo</div></div>'+
    '<div class="card aprox"><div class="card-lbl">Ganancia aprox ★</div><div class="card-val">'+fmt(stats.ganAprox)+'</div><div class="card-sub">'+pctGA+'% estimado</div><div class="info-tag" onclick="alert(\'Estimado usando precio/1.5 como costo mínimo (comisión ~33%). Si tenés el costo cargado, usá la ganancia real.\')">ℹ️ ¿Cómo se calcula?</div></div>'+
    '<div class="card"><div class="card-lbl2">Ticket promedio</div><div class="card-val2">'+fmt(stats.nTks>0?stats.venta/stats.nTks:0)+'</div></div>'+
    '</div>';

  // Métodos breakdown
  const metRowsH=Object.entries(stats.metodos).sort((a,b)=>b[1]-a[1]).map(([m,t])=>{
    const pct=stats.venta>0?Math.round(t/stats.venta*100):0;
    return'<div class="row"><span class="row-l">'+m+'</span><span><strong class="row-v">'+fmt(t)+'</strong><span class="row-pct">'+pct+'%</span></span></div>';
  }).join('');

  // Vendedores
  const vendRowsH=Object.values(stats.vendedores).sort((a,b)=>b.total-a.total).map(({nombre,total})=>{
    const pct=stats.venta>0?Math.round(total/stats.venta*100):0;
    return'<div class="row"><span class="row-l">👤 '+nombre+'</span><span><strong class="row-v">'+fmt(total)+'</strong><span class="row-pct">'+pct+'%</span></span></div>';
  }).join('');

    // Top productos — escala separada para cada barra
  const stockMap={};
  (raw.vencProximos||[]).forEach(v=>{ if(v.nombre) stockMap[v.nombre]=(stockMap[v.nombre]!==undefined?Math.min(stockMap[v.nombre],v.stock):v.stock); });
  function stockBadge(nombre){
    if(stockMap[nombre]===undefined) return '';
    const s=stockMap[nombre];
    const [bg,txt,lbl] = s===0?['#ffebee','#c62828','⚠️ Sin stock']:
                         s<=2? ['#fff3e0','#e65100','⚠️ '+s+' und']:
                         s<=5? ['#fffde7','#f57f17','📦 '+s+' und']:
                               ['#e8f5e9','#2e7d32','📦 '+s+' und'];
    return '<span style="font-size:.6rem;font-weight:700;background:'+bg+';color:'+txt+';padding:1px 7px;border-radius:20px;margin-left:4px">'+lbl+'</span>';
  }
  const maxV=stats.top.length?stats.top[0].total:1;
  const maxG=Math.max(...stats.top.map(p=>p.conCosto?Math.max(p.ganReal,0):p.ganAprox),1);
  _topNombres = stats.top.map(p=>p.nombre);

  // Función helper: 30 días de un producto expandido
  function prod30H(nombre){
    const todayStr=hoyStr();
    const DOW=['D','L','M','X','J','V','S'];
    const dias30=[];
    for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);dias30.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));}
    const ventas={};
    (raw?raw.items:[]).filter(it=>it.nombre===nombre&&dias30.includes(it.fechaStr))
      .forEach(it=>{ventas[it.fechaStr]=(ventas[it.fechaStr]||0)+it.qty;});
    const maxQ=Math.max(...Object.values(ventas),1);
    const celdas=dias30.map(ds=>{
      const q=ventas[ds]||0;
      const qr=Math.round(q*10)/10;
      const nivel=q===0?0:q<=maxQ*.2?1:q<=maxQ*.4?2:q<=maxQ*.6?3:q<=maxQ*.8?4:5;
      const d=new Date(ds+'T12:00:00');
      const esHoy=ds===todayStr;
      return'<div style="display:flex;flex-direction:column;align-items:center;gap:1px;min-width:22px">'+
        '<span style="font-size:.52rem;color:'+(esHoy?'var(--naranja)':'var(--gris)')+';font-weight:'+(esHoy?900:400)+'">'+d.getDate()+'</span>'+
        '<span style="font-size:.55rem;color:var(--gris)">'+DOW[d.getDay()]+'</span>'+
        '<span class="pdias-qty q'+nivel+'" style="font-size:.62rem">'+(q===0?'·':qr)+'</span>'+
      '</div>';
    }).join('');
    const tot=Object.values(ventas).reduce((s,v)=>s+v,0);
    return '<div style="background:var(--vl);border-radius:10px;padding:8px;margin-top:6px">'+
      '<div style="font-size:.62rem;color:var(--gris);font-weight:700;margin-bottom:5px">📊 Últimos 30 días · Total: '+Math.round(tot*10)/10+' u</div>'+
      '<div style="display:flex;gap:3px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px">'+celdas+'</div>'+
    '</div>';
  }

  const topsH=stats.top.length?stats.top.map((p,i)=>{
    const pctV=Math.round(p.total/maxV*100);
    const gan=p.conCosto?p.ganReal:p.ganAprox;
    const ganPos=Math.max(gan,0);
    const pctG=Math.round(ganPos/maxG*100);
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    const ganCls=colorGan(gan,p.total);
    const barGCls=p.conCosto&&gan<0?'bar-rojo':'bar-g';
    const etiqueta=p.conCosto?fmt(gan):'~'+fmt(gan);
    const sel=prodSelIdx===i&&topOrden==='venta';
    return'<div style="border-radius:10px;padding:6px;margin-bottom:4px;background:'+(sel?'var(--vl)':'transparent')+';border:1px solid '+(sel?'var(--verde)':'transparent')+'">'+
      '<button onclick="prodSelIdx='+(sel?-1:i)+';renderApp()" style="width:100%;background:none;border:none;padding:0;cursor:pointer;font-family:inherit;text-align:left">'+
        '<div class="prod-hdr"><span class="prod-n">'+medal+' '+p.nombre.substring(0,28)+'</span><span class="prod-d">'+p.qty+' u</span></div>'+
        stockBadge(p.nombre)+
        '<div style="display:flex;gap:3px;align-items:center;margin-bottom:2px;"><div class="barra-bg" style="flex:1"><div class="barra-f bar-v" style="width:'+pctV+'%"></div></div><span style="font-size:.68rem;font-weight:700;color:var(--vd);min-width:60px;text-align:right">'+fmt(p.total)+'</span></div>'+
        '<div style="display:flex;gap:3px;align-items:center;"><div class="barra-bg" style="flex:1"><div class="barra-f '+barGCls+'" style="width:'+pctG+'%"></div></div><span class="'+ganCls+'" style="font-size:.65rem;min-width:60px;text-align:right">'+etiqueta+'</span></div>'+
      '</button>'+
      (sel?prod30H(p.nombre):'')+
    '</div>';
  }).join(''):'<div class="empty">Sin datos para la selección</div>';

  // Top por GANANCIA
  const topGananciaArr=[...stats.top]
    .map(p=>({...p,ganancia:p.conCosto?p.ganReal:p.ganAprox}))
    .filter(p=>p.ganancia>0)
    .sort((a,b)=>b.ganancia-a.ganancia);
  _topGanNombres = topGananciaArr.map(p=>p.nombre);
  const maxGanRank=topGananciaArr.length?topGananciaArr[0].ganancia:1;
  const topGanH=topGananciaArr.length?topGananciaArr.map((p,i)=>{
    const pct=Math.round(p.ganancia/maxGanRank*100);
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';
    const esReal=p.conCosto;
    const etiqueta=(esReal?'':'~')+fmt(p.ganancia);
    const sel=prodSelIdx===i&&topOrden==='ganancia';
    return'<div style="border-radius:10px;padding:6px;margin-bottom:4px;background:'+(sel?'var(--nl)':'transparent')+';border:1px solid '+(sel?'var(--naranja)':'transparent')+'">'+
      '<button onclick="prodSelIdx='+(sel?-1:i)+';renderApp()" style="width:100%;background:none;border:none;padding:0;cursor:pointer;font-family:inherit;text-align:left">'+
        '<div class="prod-hdr"><span class="prod-n">'+medal+' '+p.nombre.substring(0,28)+'</span><span class="prod-d" style="color:'+(esReal?'var(--naranja)':'var(--vd)')+';font-weight:900">'+etiqueta+(esReal?'':' ★')+'</span></div>'+
        stockBadge(p.nombre)+

          return'<div class="venc-i"><div><div class="venc-n'+(v.vencido?' vencido-text':'')+'">'+v.nombre.substring(0,30)+'</div>'+
            '<div style="font-size:.7rem;color:var(--gris)">Stock <span class="'+stockCls+'">'+v.stock+'</span> · '+v.fecha+'</div></div>'+
            '<span class="badge '+cls+'">'+txt+'</span></div>';
        }).join('');
        return'<div class="tar" style="border-color:'+(venc7.some(v=>v.vencido)?'var(--rojo)':'var(--naranja)')+'"><div class="tar-t" style="color:'+(venc7.some(v=>v.vencido)?'var(--rojo)':'var(--naranja)')+'">🚨 Por vencer en 7 días ('+venc7.length+')</div>'+v7H+'</div>';
      })()+
      // Vencimientos completos (oculto)
      '<button class="toggle-btn" onclick="showVenc=!showVenc;renderApp()" style="border-color:'+(venc.some(v=>v.vencido)?'var(--rojo)':venc.some(v=>v.dias<=7)?'var(--naranja)':'var(--borde)')+';color:'+(venc.some(v=>v.vencido)?'var(--rojo)':venc.some(v=>v.dias<=7)?'var(--naranja)':'var(--gris)')+'">'+
        (showVenc?'▲':'▼')+' ⏰ Todos los vencimientos próximos ('+venc.length+')'+
      '</button>'+
      (showVenc?'<div class="tar"><div class="tar-t">⏰ Vencimientos — próximos 30 días</div>'+vencH+'</div>':'')+
      // Detalle días
      (diasOrd.length?'<div style="font-size:.68rem;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:1.2px;margin:12px 0 8px">🧾 Ventas del período — '+diasLabel+'</div>'+detH:'')+
      // ===== TABLA PRODUCTOS x DÍAS =====
      (()=>{
        // Siempre últimos 30 días del histórico total
        const todayStr=hoyStr();
        const ultimos30=[];
        for(let i=29;i>=0;i--){
          const d=new Date(); d.setDate(d.getDate()-i);
          ultimos30.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
        }
        // Agrupar items por producto y día
        const prodDias={}; // {nombre: {fecha: qty}}
        if(raw) raw.items.forEach(it=>{
          if(!ultimos30.includes(it.fechaStr)) return;
          if(!prodDias[it.nombre]) prodDias[it.nombre]={};
          prodDias[it.nombre][it.fechaStr]=(prodDias[it.nombre][it.fechaStr]||0)+it.qty;
        });
        // Totales por producto, ordenar por total desc
        const prods=Object.entries(prodDias)
          .map(([n,dias])=>({n, dias, tot:Object.values(dias).reduce((s,v)=>s+v,0)}))
          .filter(p=>p.tot>0)
          .sort((a,b)=>b.tot-a.tot);
        if(!prods.length) return '';
        // Máximo para escala de color
        const maxQty=Math.max(...prods.flatMap(p=>Object.values(p.dias)));
        // Cabecera días
        const DOW=['D','L','M','X','J','V','S'];
        const thDias=ultimos30.map(ds=>{
          const d=new Date(ds+'T12:00:00');
          const esHoy=ds===todayStr;
          return'<th class="pdias-th-dia'+(esHoy?' hoy-col':'')+'">'+
            '<span class="dia-n">'+d.getDate()+'</span>'+
            '<span class="dia-dow">'+DOW[d.getDay()]+'</span>'+
          '</th>';
        }).join('');
        // Filas productos
        const filas=prods.map(p=>{
          const celdas=ultimos30.map(ds=>{
            const q=p.dias[ds]||0;
            const qr=Math.round(q*10)/10;
            const nivel=q===0?0:q<=maxQty*.15?1:q<=maxQty*.35?2:q<=maxQty*.55?3:q<=maxQty*.8?4:5;
            return'<td><span class="pdias-qty q'+nivel+'">'+(q===0?'·':qr)+'</span></td>';
          }).join('');
          return'<tr>'+
            '<td class="col-prod" title="'+p.n+'">'+p.n.substring(0,20)+'</td>'+
            celdas+
            '<td class="col-tot">'+Math.round(p.tot*10)/10+'</td>'+
          '</tr>';
        }).join('');
        const tabla='<div class="pdias-wrap">'+
          '<table class="pdias-table">'+
            '<thead><tr>'+
              '<th class="col-prod">Producto</th>'+thDias+'<th class="col-tot">30d</th>'+
            '</tr></thead>'+
            '<tbody>'+filas+'</tbody>'+
          '</table>'+
        '</div>';
        return '<button class="toggle-btn" onclick="showPDias=!showPDias;renderApp()" style="border-color:var(--azul);color:var(--azul)">'+
          (showPDias?'▲':'▼')+' 📊 Detalle unidades por producto — últimos 30 días'+
        '</button>'+
        (showPDias?'<div class="tar" style="padding:8px;overflow:visible">'+tabla+'</div>':'');
      })()+
      // ===== COMPRA SUGERIDA INTELIGENTE =====
      '<button class="toggle-btn" onclick="showCSI=!showCSI;renderApp()" style="border-color:#6a1b9a;color:#6a1b9a;margin-top:4px">'+
        (showCSI?'▲':'▼')+' 🛒 Compra Sugerida Inteligente'+
      '</button>'+
      (showCSI?
        '<div class="tar" style="overflow:visible">'+
          '<div class="tar-t" style="color:#6a1b9a">🛒 COMPRA SUGERIDA INTELIGENTE</div>'+
          renderCompraSugerida()+
        '</div>'
      :'')+
    '</div>'+
    '<div class="pb"></div>';
}

function selSemana(n){

  for(let d=ini;d<=fin;d++)diasSel.add(anio+'-'+String(mes+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'));

function selMesCal(a,m){
  // Toggle acumulativo: si todos los días del mes ya están → deseleccionar; si no → agregar
  const prefix=a+'-'+String(m+1).padStart(2,'0');
  const n=new Date(a,m+1,0).getDate();
  const diasDelMes=Array.from({length:n},(_,i)=>prefix+'-'+String(i+1).padStart(2,'0'));
  const todosSelec=diasDelMes.every(d=>diasSel.has(d));
  if(todosSelec){
    diasDelMes.forEach(d=>diasSel.delete(d));
  } else {
    diasDelMes.forEach(d=>diasSel.add(d));
    mes=m; anio=a;
  }
  renderApp();
}
function selMes(m){selMesCal(anio,m);}
function selAnio(a){
  // Toggle acumulativo: todos los meses con datos de ese año
  const diasDelAnio=[];
  for(let mi=0;mi<12;mi++){
    const prefix=a+'-'+String(mi+1).padStart(2,'0');
    const hayData=raw&&raw.totales.some(t=>t.fechaStr&&t.fechaStr.startsWith(prefix));
    if(!hayData) continue;
    const n=new Date(a,mi+1,0).getDate();
    for(let d=1;d<=n;d++) diasDelAnio.push(prefix+'-'+String(d).padStart(2,'0'));
  }
  const todosSelec=diasDelAnio.length>0&&diasDelAnio.every(d=>diasSel.has(d));
  if(todosSelec) diasDelAnio.forEach(d=>diasSel.delete(d));
  else diasDelAnio.forEach(d=>diasSel.add(d));
  renderApp();
}

  const overlay = document.getElementById('mprodOverlay');
  const nomEl   = document.getElementById('mprodNombre');
  const chipsEl = document.getElementById('mprodChips');
  const bodyEl  = document.getElementById('mprodBody');

  const diasArr = Array.from(diasSel);
  const {items} = filtrar(diasArr);
  const its = items.filter(i => i.nombre === nombre);

  nomEl.textContent = nombre;
  chipsEl.innerHTML = '';

  if (!its.length) {
    bodyEl.innerHTML = '<div class="empty">Sin ventas en el período seleccionado</div>';
  } else {
    const totalVenta    = its.reduce((s,i) => s + i.subtotal, 0);
    const totalQty      = its.reduce((s,i) => s + i.qty, 0);
    const tieneCosto    = its.some(i => i.tieneCosto);
    const ganancia      = tieneCosto
      ? its.reduce((s,i) => s + (i.gananciaReal || 0), 0)
      : its.reduce((s,i) => s + (i.gananciaAprox || 0), 0);
    const precioPromedio = totalQty > 0 ? Math.round(totalVenta / totalQty) : 0;

    const porDia = {};
    its.forEach(i => {
      if (!porDia[i.fechaStr]) porDia[i.fechaStr] = [];
      porDia[i.fechaStr].push(i);
    });
    const diasOrdenados = Object.keys(porDia).sort().reverse();
    const MNOM3 = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

    const diasHTML = diasOrdenados.map(ds => {
      const [a,m,d] = ds.split('-');
      const dw  = new Date(ds+'T12:00:00').getDay();
      const lbl = DIAS_SEM[dw]+' '+parseInt(d)+' '+MNOM3[parseInt(m)-1];
      const regs     = porDia[ds];
      const totalDia = regs.reduce((s,i) => s + i.subtotal, 0);
      const qtyDia   = regs.reduce((s,i) => s + i.qty, 0);
      const ganDia   = tieneCosto
        ? regs.reduce((s,i) => s + (i.gananciaReal || 0), 0)
        : regs.reduce((s,i) => s + (i.gananciaAprox || 0), 0);

      const tkH = regs.map(i =>
        '<div class="mprod-ticket">'+
          '<div class="mprod-trow">'+
            '<span style="font-weight:700">🎫 #'+i.ticket+'</span>'+
            '<span style="font-weight:900;color:var(--vd)">'+fmt(i.subtotal)+'</span>'+
          '</div>'+
          '<div class="mprod-trow" style="margin-top:3px">'+
            '<span style="color:var(--gris)">'+i.qty+' u · $'+fmt(i.precio)+'/u'+(i.hora?' · '+i.hora:'')+'</span>'+
            '<span style="font-size:.68rem;color:var(--naranja);font-weight:700">'+(tieneCosto?'+'+fmt(i.gananciaReal||0):'~+'+fmt(i.gananciaAprox||0))+'</span>'+
          '</div>'+
        '</div>'
      ).join('');

      return '<div class="mprod-sec">📅 '+lbl+
        ' <span style="color:var(--gris);font-weight:400">'+qtyDia+' u · '+fmt(totalDia)+
        ' <span style="color:var(--naranja)">+'+fmt(ganDia)+'</span></span></div>'+tkH;
    }).join('');

    const stockActual = stockMap[nombre];
    const stockChip = stockActual !== undefined
      ? (stockActual === 0
          ? '<span class="mprod-chip" style="background:#ffebee;color:#c62828">⚠️ Sin stock</span>'
          : stockActual <= 2
          ? '<span class="mprod-chip" style="background:#fff3e0;color:#e65100">⚠️ Stock: '+stockActual+' und</span>'
          : stockActual <= 5
          ? '<span class="mprod-chip" style="background:#fffde7;color:#f57f17">📦 Stock: '+stockActual+' und</span>'
          : '<span class="mprod-chip" style="background:#e8f5e9;color:#2e7d32">📦 Stock: '+stockActual+' und</span>')
      : '';

    chipsEl.innerHTML =
      '<span class="mprod-chip" style="background:var(--vl);color:var(--vd)">'+totalQty+' unidades</span>'+
      '<span class="mprod-chip" style="background:#e8f5e9;color:var(--vd)">'+diasOrdenados.length+' día'+(diasOrdenados.length>1?'s':'')+'</span>'+
      (tieneCosto
        ? '<span class="mprod-chip" style="background:var(--nl);color:var(--naranja)">Costo real ✓</span>'
        : '<span class="mprod-chip" style="background:#f5f5f5;color:var(--gris)">★ Estimado</span>')+
      stockChip;

    bodyEl.innerHTML =
      '<div class="mprod-stat">'+
        '<div class="mprod-card"><div class="mprod-clbl">Venta total</div><div class="mprod-cval">'+fmt(totalVenta)+'</div></div>'+
        '<div class="mprod-card naranja"><div class="mprod-clbl">Ganancia'+(tieneCosto?'':' ★')+'</div><div class="mprod-cval nar">'+(tieneCosto?'':'~')+fmt(ganancia)+'</div></div>'+
        '<div class="mprod-card gris"><div class="mprod-clbl">Precio prom.</div><div class="mprod-cval" style="color:var(--texto)">'+fmt(precioPromedio)+'</div></div>'+
      '</div>'+
      diasHTML;
  }

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

// ====== COMPRA SUGERIDA INTELIGENTE ======
// Categorías con reposición semanal (sensibles/perecederas)
// Categorías con reposición DIARIA (pedido para mañana — PAN, panificados)
var _CSI_DIARIOS   = ['PANADERIA','PANIFICADOS'];
// Categorías con reposición SEMANAL (PANADERIA/PANIFICADOS ya están en DIARIOS — no duplicar)
var _CSI_SEMANALES = ['LACTEOS','FRESCOS','CARNICERIA','VERDULERIA','FIAMBRERIA','CARNICOS'];
// Categorías con regla especial (electrónica/computación)
var _CSI_ESPECIALES = ['COMPUTACION','ELECTRONICA','TECNOLOGIA','ELECTRO'];

// Detecta categoría desde campo existente o por heurística sobre nombre de producto
function _csiCat(nombre, catField) {
  if (catField) return catField.toUpperCase().trim();
  var n = (nombre||'').toUpperCase();
  if (/\bLECHE\b|YOGUR|QUESO|MANTECA|\bCREMA\b|RICOTA/.test(n)) return 'LACTEOS';
  if (/\bPAN\b|\bPANES\b|PANIF|FACTUR|MEDIALUNAS?|BIZCOCHO|BUDIN/.test(n)) return 'PANIFICADOS';
  if (/TOMATE|LECHUGA|ZAPALLO|\bCEBOLLA\b|\bPAPA\b|\bFRUTA\b|VERDU|MANZANA|NARANJA/.test(n)) return 'FRESCOS';
  if (/NOTEBOOK|TABLET|\bMOUSE\b|TECLADO|AURICU|CABLE USB|PENDRIVE|COMPUT|ROUTER|IMPRES/.test(n)) return 'ELECTRONICA';
  return 'ALMACEN';
}

// Devuelve el tipo de período según categoría
function _csiPer(cat) {
  if (_CSI_ESPECIALES.some(function(c){return cat.indexOf(c)>=0;})) return 'especial';
  if (_CSI_DIARIOS.some(function(c){return cat.indexOf(c)>=0;}))    return 'diario';   // antes de semanal
  if (_CSI_SEMANALES.some(function(c){return cat.indexOf(c)>=0;}))  return 'semanal';
  return 'mensual';
}

// Motor principal: recorre items en un solo paso y aplica todas las reglas
function calcularMotorCSI() {
  if (!raw) return {filas:[], nMuertos:0, nVencOmit:0};

  // Fechas de corte como strings YYYY-MM-DD (comparables lexicográficamente)
  var hoy = new Date();
  function corte(dias) {
    var d = new Date(hoy); d.setDate(d.getDate()-dias);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  var c7=corte(7), c30=corte(30), c60=corte(60), c90=corte(90);

  // Un solo recorrido de raw.items → agrega ventas por producto para los 4 períodos
  var vm = {}; // nombre → {v7, v30, v60, v90}
  raw.items.forEach(function(it) {
    var f = it.fechaStr||'';
    if (f < c90 || !it.nombre) return;
    if (!vm[it.nombre]) vm[it.nombre] = {v7:0,v30:0,v60:0,v90:0};
    var q = it.qty||0;
    vm[it.nombre].v90 += q;
    if (f >= c60) vm[it.nombre].v60 += q;
    if (f >= c30) vm[it.nombre].v30 += q;
    if (f >= c7)  vm[it.nombre].v7  += q;
  });

  // Stock real desde raw.stockInfo (cubre TODO el inventario, incluye productos sin vencimiento).
  // raw.vencProximos se usa SOLO para diasVenc — no como fuente de stock.
  var stockMap={}, diasVencMap={}, catMap={};
  // 1. Poblar stockMap desde raw.stockInfo — fuente confiable de stock real para todos los productos
  if (raw.stockInfo) {
    Object.keys(raw.stockInfo).forEach(function(nom) {
      stockMap[nom] = raw.stockInfo[nom]; // clave ya viene en MAYÚSCULAS desde el backend
    });
  }
  // 2. Completar diasVencMap desde raw.vencProximos — NO sobreescribe stockMap
  (raw.vencProximos||[]).forEach(function(v) {
    if (!v.nombre) return;
    var nom = v.nombre.toUpperCase(); // normalizar por si el backend devuelve mixedCase
    if (diasVencMap[nom] === undefined || v.dias < diasVencMap[nom]) {
      diasVencMap[nom] = v.dias;
    }
    if (v.categoria) catMap[nom] = v.categoria;
  });

  var nMuertos=0, nVencOmit=0, filas=[];

  Object.keys(vm).forEach(function(nombre) {
    var v = vm[nombre];

    // Regla 1: sin ventas en 90d (imposible por el filtro de c90, pero por seguridad)
    if (v.v90 === 0) { nMuertos++; return; }

    // Regla 2: producto por vencer en ≤10 días → no sugerir compra
    var diasVenc = diasVencMap[nombre];
    if (diasVenc !== undefined && diasVenc <= 10) { nVencOmit++; return; }

    var stockConocido = stockMap[nombre] !== undefined;
    var stock = stockConocido ? stockMap[nombre] : null; // null = sin dato confiable, NO asumir 0
    var cat = _csiCat(nombre, catMap[nombre]);
    var periodoBase = _csiPer(cat);
    var promDia = v.v90 / 90;

    var compraSugerida=null, ventaProyectada=0, motivo='', periodo=periodoBase;

    if (!stockConocido) {
      // Sin stock confiable: incluir en tabla como referencia pero sin CompraSugerida calculada
      motivo = 'sin dato de stock';
      // compraSugerida queda null → se muestra S/D en la tabla
    }
    // Regla 0: Diario — panadería / panificados → pedido para mañana
    // VentaProyectada = MAX(promDia, v7/7, 1) — garantiza al menos 1 unidad sugerida
    // Con stock=0 nunca puede terminar en 0
    else if (periodoBase === 'diario') {
      ventaProyectada = Math.max(promDia, v.v7 / 7, 1);
      var brutoDiario  = ventaProyectada - stock;
      compraSugerida   = stock === 0
        ? Math.max(Math.ceil(brutoDiario), 1)   // piso garantizado en stock vacío
        : Math.ceil(brutoDiario);               // ceil normal si hay algo de stock
      motivo = 'reposicion diaria';
      periodo = 'diario';
    }
    // Regla 3: Electrónica / Computación — lógica especial por demanda 60d
    // Requiere stock=0 confirmado; si no hay dato, no se puede afirmar que está sin stock
    else if (periodoBase === 'especial') {
      if (stock === 0 && v.v60 === 1)      { compraSugerida=1; ventaProyectada=1; motivo='electronica demanda reciente'; }
      else if (stock === 0 && v.v60 >= 2)  { compraSugerida=2; ventaProyectada=2; motivo='electronica demanda reciente'; }
      else return; // stock>0 o condición no cumplida → no reportar
      periodo = 'especial';
    }
    // Regla 5: Categorías sensibles — reposición semanal
    else if (periodoBase === 'semanal') {
      ventaProyectada = Math.max(v.v7, promDia * 7);
      compraSugerida  = Math.ceil(ventaProyectada - stock);
      motivo = 'reposicion semanal';
    }
    // Regla 4 (lento reactivado) + Regla 6 (mensual) — resto del almacén
    else {
      if (v.v30 === 0) return; // sin venta en 30d → no reportar
      if (v.v30 === 1 && stock === 0) {
        // Lento pero reactivado: una sola venta en 30d, sin stock confirmado
        compraSugerida=1; ventaProyectada=1;
        motivo='lento reactivado'; periodo='reactivacion';
      } else if (v.v30 > 1) {
        ventaProyectada = Math.max(v.v30, promDia * 30);
        compraSugerida  = Math.ceil(ventaProyectada - stock);
        motivo = 'reposicion mensual';
      } else {
        return; // v30=1 pero stock>0 → no es urgente
      }
    }

    // Descartar si la sugerencia calculada es ≤0 (ceil ya aplicado en cada rama).
    // Para diario con stock=0 el piso de 1 está garantizado arriba — nunca llega aquí con 0.
    if (compraSugerida !== null && compraSugerida < 1) return;

    filas.push({
      nombre: nombre,
      cat: cat,
      stock: stock !== null ? stock : -1, // -1 = sin datos de stock
      v7:  Math.round(v.v7 *10)/10,
      v30: Math.round(v.v30*10)/10,
      v60: Math.round(v.v60*10)/10,
      v90: Math.round(v.v90*10)/10,
      promDia: Math.round(promDia*100)/100,
      diasVenc: diasVenc !== undefined ? diasVenc : null,
      periodo: periodo,
      ventaProyectada: Math.round(ventaProyectada*10)/10,
      compraSugerida: compraSugerida !== null ? Math.ceil(compraSugerida) : null,
      motivo: motivo
    });
  });

  // Orden: diario > especial > semanal > reactivacion > mensual > sin dato al final
  var ORD = {diario:0, especial:1, semanal:2, reactivacion:3, mensual:4};
  filas.sort(function(a,b) {
    var aSD = a.compraSugerida === null, bSD = b.compraSugerida === null;
    if (aSD !== bSD) return aSD ? 1 : -1; // sin dato siempre al final
    var oa = ORD[a.periodo] !== undefined ? ORD[a.periodo] : 3;
    var ob = ORD[b.periodo] !== undefined ? ORD[b.periodo] : 3;
    if (oa !== ob) return oa - ob;
    return b.compraSugerida - a.compraSugerida;
  });

  var nSinStock = filas.filter(function(p){return p.compraSugerida===null;}).length;
  return {filas:filas, nMuertos:nMuertos, nVencOmit:nVencOmit, nSinStock:nSinStock};
}

// Genera el HTML completo de la sección Compra Sugerida
function renderCompraSugerida() {
  if (!raw) return '<div class="empty">Sin datos</div>';

  var res = calcularMotorCSI();
  var todos = res.filas, nMuertos = res.nMuertos, nVencOmit = res.nVencOmit, nSinStock = res.nSinStock;

  var nDia = todos.filter(function(p){return p.periodo==='diario';}).length;
  var nSem = todos.filter(function(p){return p.periodo==='semanal';}).length;
  var nMen = todos.filter(function(p){return p.periodo==='mensual';}).length;
  var nEsp = todos.filter(function(p){return p.periodo==='especial';}).length;
  var nRea = todos.filter(function(p){return p.periodo==='reactivacion';}).length;

  // Resumen superior con contadores
  var resumen =
    '<div class="csi-resumen">'+
      '<div class="csi-stat"><div class="csi-stat-v">'+todos.length+'</div><div class="csi-stat-l">Total sugeridos</div></div>'+
      (nDia?'<div class="csi-stat" style="border-top:3px solid #4a148c"><div class="csi-stat-v" style="color:#4a148c">'+nDia+'</div><div class="csi-stat-l">🍞 Diario</div></div>':'')+
      '<div class="csi-stat csi-sem"><div class="csi-stat-v">'+nSem+'</div><div class="csi-stat-l">🥛 Semanal</div></div>'+
      '<div class="csi-stat csi-men"><div class="csi-stat-v">'+nMen+'</div><div class="csi-stat-l">📦 Mensual</div></div>'+
      '<div class="csi-stat csi-esp"><div class="csi-stat-v">'+nEsp+'</div><div class="csi-stat-l">💻 Especial</div></div>'+
      '<div class="csi-stat csi-rea"><div class="csi-stat-v">'+nRea+'</div><div class="csi-stat-l">⚡ Reactiv.</div></div>'+
    '</div>'+
    '<div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px;font-size:.65rem;color:var(--gris)">'+
      '<span>🚫 Omitidos sin ventas 90d: <strong>'+nMuertos+'</strong></span>'+
      '<span>⏰ Omitidos por vencer próximo: <strong>'+nVencOmit+'</strong></span>'+
      (nSinStock?'<span style="color:var(--naranja)">⚠️ Sin dato de stock: <strong>'+nSinStock+'</strong> (ver al final)</span>':'')+
    '</div>';

  // Filtros de período
  var filtros =
    '<div class="chips-wrap" style="margin-bottom:10px">'+
    ['todos','diario','semanal','mensual','especial','reactivacion'].map(function(f){
      var lbl={todos:'📋 Todos',diario:'🍞 Diario',semanal:'🥛 Semanal',mensual:'📦 Mensual',especial:'💻 Especial',reactivacion:'⚡ Reactiv.'}[f];
      var cnt={todos:todos.length,diario:nDia,semanal:nSem,mensual:nMen,especial:nEsp,reactivacion:nRea}[f];
      if (cnt===0 && f!=='todos') return '';
      return '<button class="chip'+(csiFiltroPeriodo===f?' activo':'')+'" onclick="csiFiltroPeriodo=\''+f+'\';renderApp()">'+lbl+' ('+cnt+')</button>';
    }).join('')+
    '</div>';

  var lista = csiFiltroPeriodo==='todos' ? todos : todos.filter(function(p){return p.periodo===csiFiltroPeriodo;});
  if (!lista.length) return resumen+filtros+'<div class="empty">✅ Sin sugerencias para este filtro</div>';

  // Filas de la tabla
  var filaHTML = lista.map(function(p) {
    var stk = p.stock===-1
      ? '<span style="color:var(--gris);font-size:.6rem">S/D</span>'
      : p.stock===0 ? '<span style="color:var(--rojo);font-weight:700">0</span>'
      : p.stock<=2  ? '<span style="color:var(--naranja);font-weight:700">'+p.stock+'</span>'
      : '<span style="color:var(--verde)">'+p.stock+'</span>';
    var vd = p.diasVenc!==null
      ? (p.diasVenc<=14 ? '<span style="color:var(--naranja);font-weight:700">'+p.diasVenc+'d</span>' : p.diasVenc+'d')
      : '<span style="color:#ddd">—</span>';
    var pcls = {diario:'csi-badge-dia',semanal:'csi-badge-sem',mensual:'csi-badge-men',especial:'csi-badge-esp',reactivacion:'csi-badge-rea'}[p.periodo]||'csi-badge-men';
    var plbl = {diario:'Diario',semanal:'Semanal',mensual:'Mensual',especial:'Especial',reactivacion:'Reactiv.'}[p.periodo]||'Mensual';
    return '<tr>'+
      '<td class="csi-col-prod" title="'+p.nombre+'">'+p.nombre.substring(0,26)+'</td>'+
      '<td style="font-size:.6rem;color:var(--gris);text-align:center">'+p.cat.substring(0,11)+'</td>'+
      '<td style="text-align:center">'+stk+'</td>'+
      '<td style="text-align:center">'+p.v7+'</td>'+
      '<td style="text-align:center">'+p.v30+'</td>'+
      '<td style="text-align:center">'+p.v60+'</td>'+
      '<td style="text-align:center">'+p.v90+'</td>'+
      '<td style="text-align:center;font-size:.65rem">'+p.promDia+'</td>'+
      '<td style="text-align:center">'+vd+'</td>'+
      '<td style="text-align:center"><span class="badge '+pcls+'">'+plbl+'</span></td>'+
      '<td style="text-align:center;font-weight:700;color:var(--gris)">'+p.ventaProyectada+'</td>'+
      '<td style="text-align:center">'+
        (p.compraSugerida !== null
          ? '<span class="csi-qty">'+p.compraSugerida+'</span>'
          : '<span style="font-size:.65rem;color:var(--naranja);font-weight:700;padding:2px 6px;background:var(--nl);border-radius:6px">S/D</span>')+
      '</td>'+
      '<td style="font-size:.6rem;color:var(--gris);max-width:80px;white-space:normal;line-height:1.3">'+p.motivo+'</td>'+
    '</tr>';
  }).join('');

  var tabla =
    '<div class="csi-tabla-wrap">'+
      '<table class="csi-tabla">'+
        '<thead><tr>'+
          '<th class="csi-col-prod">Producto</th>'+
          '<th>Cat.</th><th>Stock</th>'+
          '<th>V7d</th><th>V30d</th><th>V60d</th><th>V90d</th>'+
          '<th>P/d</th><th>Venc.</th><th>Período</th>'+
          '<th>Proyec.</th><th>Comprar</th><th>Motivo</th>'+
        '</tr></thead>'+
        '<tbody>'+filaHTML+'</tbody>'+
      '</table>'+
    '</div>'+
    '<div style="font-size:.6rem;color:var(--gris);padding:6px 2px;line-height:1.6;margin-top:4px">'+
      '📌 <strong>S/D</strong>: stock no disponible en inventario (producto sin registro de stock real); CompraSugerida no calculada para estos ítems. '+
      'Categorías detectadas por heurística sobre el nombre del producto cuando el campo no está disponible en la API.'+
    '</div>';

  return resumen+filtros+tabla;
}
// ====== FIN COMPRA SUGERIDA INTELIGENTE ======

init();
</script>

        <button onclick="cerrarModalProd()" style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--gris);padding:0 0 0 10px">✕</button>
      </div>
      <div class="mprod-chips" id="mprodChips"></div>
    </div>
    <div class="mprod-body" id="mprodBody"></div>
  </div>
</div>
