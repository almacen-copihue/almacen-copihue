<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Herramientas · Copihue</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0e0e1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    #header {
      background: linear-gradient(135deg, #c0392b, #8e1a12);
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    #header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #header h1 {
      font-size: 0.92rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.3px;
    }
    #header-sub {
      font-size: 0.66rem;
      color: rgba(255,255,255,0.6);
      margin-top: 1px;
    }
    #btn-back {
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      color: #fff;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      flex-shrink: 0;
    }
    #btn-back:hover { background: rgba(255,255,255,0.25); }

    /* ── SEARCH ── */
    #search-wrap {
      padding: 10px 12px 6px;
      flex-shrink: 0;
    }
    #searchInput {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 8px 12px;
      color: #fff;
      font-size: 0.82rem;
      outline: none;
    }
    #searchInput::placeholder { color: rgba(255,255,255,0.35); }
    #searchInput:focus { border-color: rgba(192,57,43,0.6); }

    /* ── GRID ── */
    #grid {
      padding: 8px 12px 20px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      flex: 1;
      align-content: start;
    }

    .h-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px;
      padding: 10px 6px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: background 0.15s, transform 0.12s;
      min-height: 80px;
      justify-content: center;
    }
    .h-card:hover  { background: rgba(255,255,255,0.12); transform: translateY(-1px); }
    .h-card:active { background: rgba(255,255,255,0.18); transform: scale(0.97); }
    .h-card-ico  { font-size: 1.5rem; line-height: 1; }
    .h-card-nom  { color: #fff; font-size: 0.68rem; font-weight: 800; line-height: 1.2; }
    .h-card-desc { color: #777; font-size: 0.56rem; line-height: 1.2; }
    .h-card.inactiva { opacity: 0.28; pointer-events: none; }

    .h-sep {
      grid-column: 1 / -1;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin: 6px 0 2px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.25);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.8px;
    }
    .h-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }

    /* ── ESTADO ── */
    #estado {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 16px;
      color: #555;
      font-size: 0.82rem;
    }
    #estado .ico { font-size: 2rem; margin-bottom: 8px; }
    #estado .tit { color: #e57373; font-weight: 700; }
    #estado .sub { color: #666; font-size: 0.72rem; margin-top: 4px; }

    /* ── FOOTER ── */
    #footer {
      padding: 8px 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn-footer {
      flex: 1;
      padding: 9px;
      border-radius: 10px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid;
    }
    #btn-reload {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
      color: #aaa;
    }
    #btn-reload:hover { background: rgba(255,255,255,0.1); }
    #btn-reload:active { transform: scale(0.97); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      #grid { grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 8px 8px 20px; }
      .h-card { padding: 8px 4px; min-height: 72px; }
      .h-card-ico { font-size: 1.3rem; }
    }
    @media (min-width: 768px) {
      body { max-width: 680px; margin: 0 auto; }
      #grid { grid-template-columns: repeat(5, 1fr); }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div id="header">
    <div id="header-left">
      <span style="font-size:1.3rem;">🧰</span>
      <div>
        <h1>Herramientas Copihue</h1>
        <div id="header-sub">Cargando...</div>
      </div>
    </div>
    <a href="seba21.html" id="btn-back" title="Volver al panel">←</a>
  </div>

  <!-- SEARCH -->
  <div id="search-wrap">
    <input type="search" id="searchInput" placeholder="Buscar herramienta..." autocomplete="off">
  </div>

  <!-- GRID -->
  <div id="grid">
    <div id="estado">
      <div class="ico">⏳</div>
      <div>Cargando desde planilla...</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer">
    <button class="btn-footer" id="btn-reload" onclick="cargar()">🔄 Recargar</button>
  </div>

<script>
// ══ HERRAMIENTAS · copihue-herramientas.html ══════════════════════════════
// Lee hoja HERRAMIENTAS: A=NOMBRE  B=URL  C=ICONO  D=DESCRIPCION  E=ACTIVO
// Fuente: Code.gs → getHerramientas
// ══════════════════════════════════════════════════════════════════════════

const API_URL = 'https://script.google.com/macros/s/AKfycbzWZzDvdGfW8vd2-FpQolT852cdPMeHbfKugn9DBOlju75bE1D0SUNB5EKEDOsI2vP4lA/exec';

let _todas = [];       // lista completa cargada
let _filtro = '';      // búsqueda activa

// ── CARGA ──────────────────────────────────────────────────────────────────
async function cargar() {
  setSub('Conectando...');
  setEstado('⏳', 'Cargando desde planilla...');
  try {
    const r = await fetch(API_URL + '?action=getHerramientas&t=' + Date.now(), { cache: 'no-store' });
    const d = await r.json();
    if (d.ok && Array.isArray(d.herramientas) && d.herramientas.length > 0) {
      _todas = d.herramientas;
      renderizar();
    } else {
      setEstado('⚠️', 'Sin herramientas en planilla', 'Verificar hoja HERRAMIENTAS en Sheets');
      setSub('Error al cargar');
    }
  } catch(e) {
    setEstado('📵', 'Sin conexión con el servidor', 'Revisá conexión y tocá Recargar');
    setSub('Sin conexión');
  }
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderizar() {
  const q = _filtro.toLowerCase().trim();
  const lista = q
    ? _todas.filter(h => (h.nombre||'').toLowerCase().includes(q) || (h.descripcion||'').toLowerCase().includes(q))
    : _todas;

  const activas   = lista.filter(h => h.activo !== false);
  const inactivas = lista.filter(h => h.activo === false);

  setSub(activas.length + ' herramienta' + (activas.length !== 1 ? 's' : '') +
    (inactivas.length ? ' · ' + inactivas.length + ' inactiva' + (inactivas.length !== 1 ? 's' : '') : ''));

  let html = '';

  if (activas.length === 0 && inactivas.length === 0) {
    html = estado_html('🔍', q ? 'Sin resultados para "' + q + '"' : 'Sin herramientas cargadas.');
  } else {
    for (const h of activas) {
      html += cardHTML(h);
    }
    if (inactivas.length) {
      html += `<div class="h-sep">INACTIVAS</div>`;
      for (const h of inactivas) {
        html += cardHTML(h, true);
      }
    }
  }

  document.getElementById('grid').innerHTML = html;
}

function cardHTML(h, inactiva = false) {
  const icono = (h.icono && h.icono.trim()) ? h.icono.trim() : '🔧';
  const cls   = 'h-card' + (inactiva ? ' inactiva' : '');
  const tag   = inactiva ? 'div' : 'a';
  const href  = inactiva ? '' : ` href="${h.url}"`;
  return `<${tag}${href} class="${cls}">
    <div class="h-card-ico">${icono}</div>
    <div class="h-card-nom">${h.nombre || '—'}</div>
    ${h.descripcion ? `<div class="h-card-desc">${h.descripcion}</div>` : ''}
  </${tag}>`;
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function setSub(txt) {
  document.getElementById('header-sub').textContent = txt;
}
function setEstado(ico, tit, sub) {
  document.getElementById('grid').innerHTML =
    `<div id="estado">
      <div class="ico">${ico}</div>
      <div class="tit">${tit}</div>
      ${sub ? `<div class="sub">${sub}</div>` : ''}
    </div>`;
}
function estado_html(ico, tit, sub) {
  return `<div id="estado">
    <div class="ico">${ico}</div>
    <div class="tit" style="color:#888;">${tit}</div>
    ${sub ? `<div class="sub">${sub}</div>` : ''}
  </div>`;
}

// ── BÚSQUEDA ───────────────────────────────────────────────────────────────
let _searchTimer;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    _filtro = this.value;
    if (_todas.length) renderizar();
  }, 180);
});

// ── INICIO ─────────────────────────────────────────────────────────────────
cargar();
// ══ FIN ═══════════════════════════════════════════════════════════════════
</script>
</body>
</html>
