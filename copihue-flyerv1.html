<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copihue Flyer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --p:    #2e7d32;
  --pd:   #1b5e20;
  --pl:   #4caf50;
  --sec:  #ff6f00;
  --bg:   #f4faf4;
  --bg2:  #eaf3ea;
  --sur:  #ffffff;
  --bdr:  #d0e8d0;
  --txt:  #172517;
  --tm:   #4a6a4a;
  --ts:   #8aaa8a;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --disp: 'Syne', sans-serif;
  --r:    12px;
  --rs:   8px;
  --sh:   0 2px 10px rgba(46,125,50,.10);
  --sh-lg:0 8px 32px rgba(46,125,50,.16);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--txt);
  display:flex;
  flex-direction:column;
  background-image:
    radial-gradient(ellipse at 0% 0%,rgba(46,125,50,.08) 0,transparent 50%),
    radial-gradient(ellipse at 100% 100%,rgba(255,111,0,.05) 0,transparent 50%);
}

/* ── HEADER ── */
header{
  background:linear-gradient(135deg,var(--pd),var(--p));
  color:#fff;padding:0 18px;height:56px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:10;
  box-shadow:0 2px 14px rgba(27,94,32,.35);
}
.h-brand{display:flex;align-items:center;gap:10px;}
.h-icon{width:32px;height:32px;background:rgba(255,255,255,.15);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:1rem;}
.h-title{font-family:var(--disp);font-size:1rem;font-weight:800;letter-spacing:-.02em;}
.h-sub{font-size:.65rem;opacity:.6;font-weight:400;}
.h-badge{font-family:var(--mono);font-size:.62rem;background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:2px 8px;color:rgba(255,255,255,.8);}

/* ── LAYOUT PRINCIPAL ── */
.main{
  display:flex;flex:1;overflow:hidden;
  max-width:1200px;width:100%;margin:0 auto;
}

/* ── PANEL IZQUIERDO ── */
.panel-ctrl{
  width:276px;min-width:240px;flex-shrink:0;
  background:var(--sur);border-right:1px solid var(--bdr);
  overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:12px;
}
.panel-ctrl::-webkit-scrollbar{width:4px;}
.panel-ctrl::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px;}

/* Section label */
.slbl{font-family:var(--disp);font-size:.62rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ts);margin-bottom:6px;
  display:flex;align-items:center;gap:6px;}
.slbl::after{content:'';flex:1;height:1px;background:var(--bdr);}

/* Modo buttons */
.modo-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.modo-btn{
  padding:9px 6px;border-radius:var(--rs);border:1.5px solid var(--bdr);
  background:var(--bg2);color:var(--tm);font-family:var(--disp);
  font-size:.68rem;font-weight:700;cursor:pointer;text-align:center;
  transition:all .18s;line-height:1.3;
}
.modo-btn .em{font-size:1.2rem;display:block;margin-bottom:3px;}
.modo-btn:hover{border-color:var(--pl);color:var(--p);}
.modo-btn.activo{
  background:var(--p);border-color:var(--pd);color:#fff;
  box-shadow:0 3px 10px rgba(46,125,50,.3);
}
.modo-btn.full{grid-column:span 2;}

/* Config rows */
.cfg-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;}
.cfg-row label{font-size:.72rem;color:var(--tm);flex:1;}
.cfg-row select,.cfg-row input[type=number]{
  background:var(--bg);border:1.5px solid var(--bdr);color:var(--txt);
  border-radius:var(--rs);padding:5px 8px;font-size:.72rem;font-family:var(--sans);
  flex:1;max-width:130px;outline:none;transition:border-color .18s;
}
.cfg-row select:focus,.cfg-row input:focus{border-color:var(--p);}

/* Candidatos */
.prod-list{display:flex;flex-direction:column;gap:5px;max-height:260px;overflow-y:auto;}
.prod-list::-webkit-scrollbar{width:3px;}
.prod-list::-webkit-scrollbar-thumb{background:var(--bdr);}
.prod-item{
  display:flex;align-items:center;gap:8px;
  background:var(--bg);border-radius:var(--rs);padding:6px 8px;
  border:1.5px solid var(--bdr);cursor:pointer;transition:all .15s;
}
.prod-item:hover{border-color:var(--pl);}
.prod-item.sel{border-color:var(--p);background:rgba(46,125,50,.06);}
.prod-img{width:34px;height:34px;object-fit:contain;border-radius:5px;
  background:var(--bg2);flex-shrink:0;}
.prod-info{flex:1;min-width:0;}
.prod-nom{font-size:.68rem;font-weight:700;color:var(--txt);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-precio{font-size:.62rem;color:var(--ts);}
.prod-chk{width:18px;height:18px;border-radius:50%;border:2px solid var(--bdr);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:.55rem;transition:all .15s;}
.prod-item.sel .prod-chk{border-color:var(--p);background:var(--p);color:#fff;}

/* Warn */
.warn{background:#fff3e0;border:1px solid #ffcc80;border-radius:var(--rs);
  padding:8px 10px;font-size:.7rem;color:#e65100;display:none;}

/* Botones de acción panel */
.btn-gen{
  width:100%;padding:11px;border:none;border-radius:var(--rs);cursor:pointer;
  font-family:var(--disp);font-size:.85rem;font-weight:800;letter-spacing:.04em;
  transition:all .18s;
}
.btn-gen.primary{background:var(--p);color:#fff;}
.btn-gen.primary:hover{background:var(--pd);transform:translateY(-1px);box-shadow:0 4px 12px rgba(46,125,50,.4);}
.btn-gen.secondary{background:var(--bg2);color:var(--tm);border:1.5px solid var(--bdr);
  font-family:var(--sans);font-size:.75rem;font-weight:600;}
.btn-gen.secondary:hover{border-color:var(--pl);}

/* Info local */
.info-local{font-size:.62rem;color:var(--ts);text-align:center;line-height:1.7;
  padding-top:4px;border-top:1px dashed var(--bdr);}
.info-local strong{color:var(--tm);}

/* ── PANEL DERECHO ── */
.panel-prev{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;padding:18px;overflow-y:auto;
  background:var(--bg);gap:14px;min-width:0;
}
.panel-prev::-webkit-scrollbar{width:5px;}
.panel-prev::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px;}

.placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:14px;color:var(--ts);
}
.placeholder .ph-icon{font-size:3.5rem;opacity:.4;}
.placeholder p{font-size:.82rem;color:var(--ts);}

#canvasPreview{
  border-radius:var(--r);
  box-shadow:var(--sh-lg);
  max-width:100%;width:auto;height:auto;display:none;
  border:1px solid var(--bdr);
}

.btn-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.btn-acc{
  padding:9px 18px;border-radius:var(--rs);border:none;font-weight:700;
  font-size:.8rem;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .18s;
}
.btn-wa{background:#25D366;color:#fff;}
.btn-wa:hover{background:#1EB857;}
.btn-dl{background:var(--sec);color:#fff;}
.btn-dl:hover{background:#e65100;}
.btn-cp{background:var(--bg2);color:var(--tm);border:1.5px solid var(--bdr);}
.btn-cp:hover{border-color:var(--pl);}

/* ── LOADING ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(244,250,244,.85);z-index:500;
  flex-direction:column;align-items:center;justify-content:center;gap:12px;
}
.overlay.on{display:flex;}
.spin{width:36px;height:36px;border:3px solid var(--bdr);border-top-color:var(--p);
  border-radius:50%;animation:rot .8s linear infinite;}
@keyframes rot{to{transform:rotate(360deg)}}
.spin-lbl{font-family:var(--disp);font-size:.8rem;color:var(--tm);font-weight:700;}

/* ── RESPONSIVE ── */
@media(max-width:680px){
  html,body{overflow:auto;}
  .main{flex-direction:column;overflow:visible;}
  .panel-ctrl{width:100%;min-width:0;border-right:none;border-bottom:1px solid var(--bdr);}
  .panel-prev{padding:12px;}
}
</style>
</head>
<body>

<div class="overlay" id="ov"><div class="spin"></div><div class="spin-lbl" id="ov-lbl">Cargando...</div></div>

<header>
  <div class="h-brand">
    <div class="h-icon">🖼</div>
    <div>
      <div class="h-title">Copihue Flyer</div>
      <div class="h-sub">Generador de flyers para redes</div>
    </div>
  </div>
  <span class="h-badge" id="badgeEmpresa">Almacén Copihue</span>
</header>

<div class="main">

  <!-- PANEL CONTROLES -->
  <div class="panel-ctrl">

    <div>
      <div class="slbl">Tipo de oferta</div>
      <div class="modo-grid">
        <button class="modo-btn activo" data-modo="relampago" onclick="setModo('relampago',this)">
          <span class="em">⚡</span>Relámpago
        </button>
        <button class="modo-btn" data-modo="destacadas" onclick="setModo('destacadas',this)">
          <span class="em">🔥</span>Destacadas
        </button>
        <button class="modo-btn" data-modo="especiales" onclick="setModo('especiales',this)">
          <span class="em">⭐</span>Especiales
        </button>
        <button class="modo-btn" data-modo="ultimas" onclick="setModo('ultimas',this)">
          <span class="em">🎯</span>Últimas Und.
        </button>
        <button class="modo-btn" data-modo="promos" onclick="setModo('promos',this)">
          <span class="em">🏷️</span>Promos
        </button>
        <button class="modo-btn" data-modo="cervecero" onclick="setModo('cervecero',this)">
          <span class="em">🍺</span>Cervecero
        </button>
        <button class="modo-btn full" data-modo="manual" onclick="setModo('manual',this)">
          <span class="em">✏️</span>Selección manual
        </button>
      </div>
    </div>

    <div>
      <div class="slbl">Diseño</div>
      <div class="cfg-row">
        <label>Formato</label>
        <select id="cfgFormato">
          <option value="grid">🔲 Grid (Instagram)</option>
          <option value="cuadrado">⬛ Cuadrado 1:1</option>
          <option value="story">📱 Story 9:16</option>
          <option value="banner">📺 Banner Facebook</option>
          <option value="lista">📋 Lista WhatsApp</option>
        </select>
      </div>
      <div class="cfg-row">
        <label>Estilo</label>
        <select id="cfgFondo">
          <option value="copihue">🌿 Copihue (verde)</option>
          <option value="crema">🟤 Clásico (crema)</option>
          <option value="oscuro">⬛ Oscuro</option>
          <option value="naranja">🔶 Fuego (naranja)</option>
        </select>
      </div>
      <div class="cfg-row">
        <label>Máx. productos</label>
        <input type="number" id="cfgMax" value="6" min="1" max="9" style="max-width:60px;">
      </div>
    </div>

    <div id="secProd" style="display:none;">
      <div class="slbl">Productos <span id="lblCand" style="color:var(--ts);font-weight:400;text-transform:none;letter-spacing:0;font-family:var(--sans)"></span></div>
      <div class="warn" id="warnMax">⚠️ Máximo 9 productos. Deseleccioná algunos.</div>
      <div class="prod-list" id="listaCand"></div>
    </div>

    <button class="btn-gen primary" onclick="generarFlyer()">⚡ GENERAR FLYER</button>
    <button class="btn-gen secondary" onclick="cargarDatos()">↺ Recargar datos</button>

    <div class="info-local" id="infoLocal">
      <strong id="infoNombre">Almacén Copihue</strong><br>
      <span id="infoDireccion">Copihue 457</span><br>
      <span id="infoWeb">almacen-copihue.vercel.app</span>
    </div>

  </div>

  <!-- PANEL PREVIEW -->
  <div class="panel-prev">
    <div class="placeholder" id="placeholder">
      <div class="ph-icon">🖼️</div>
      <p>Elegí un tipo de oferta y presioná Generar</p>
    </div>
    <canvas id="canvasPreview"></canvas>
    <div class="btn-row" id="botonesAcc" style="display:none;">
      <button class="btn-acc btn-wa" onclick="compartirWA()">📲 WhatsApp</button>
      <button class="btn-acc btn-dl" onclick="descargar()">💾 Descargar</button>
    </div>
  </div>

</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const API = 'https://script.google.com/macros/s/AKfycbxhKFk2WAi-KRY5xGBsI6_6Pvp3jDjt8mSRXvy7I1WehNmBpJamqK9G9Q1ZJSCSgAdfDA/exec';
const S   = 2; // HiDPI 2×

// Datos de empresa — se llenan desde config_sistema
let _empresa = {
  nombre:    'Almacén Copihue',
  slogan:    'Productos de calidad',
  direccion: 'Copihue 457',
  ciudad:    'Bariloche',
  web:       'almacen-copihue.vercel.app',
  color:     '#2e7d32',
  telefono:  '5492944907380'
};

// Paletas — copihue es la principal
const PALETAS = {
  copihue: {
    bg:'#f4faf4', bgCard:'#ffffff', bgCard2:'#eaf3ea',
    acento:'#2e7d32', acentoAlt:'#ff6f00',
    texto:'#172517', subtexto:'#4a6a4a', tenue:'#8aaa8a',
    borde:'#d0e8d0', linea:'#4caf50', footer:'#eaf3ea',
    badgeTxt:'#ffffff'
  },
  crema: {
    bg:'#f5f0e0', bgCard:'#ffffff', bgCard2:'#ede5cc',
    acento:'#c62828', acentoAlt:'#1565c0',
    texto:'#2e1a0e', subtexto:'#8a6040', tenue:'#b0987a',
    borde:'#e0d5b0', linea:'#c8b87a', footer:'#ede5cc',
    badgeTxt:'#ffffff'
  },
  oscuro: {
    bg:'#111111', bgCard:'#1e1e1e', bgCard2:'#252525',
    acento:'#4caf50', acentoAlt:'#ff6f00',
    texto:'#f0f0f0', subtexto:'#aaaaaa', tenue:'#666666',
    borde:'#333333', linea:'#2e7d32', footer:'#1a1a1a',
    badgeTxt:'#111111'
  },
  naranja: {
    bg:'#fff8f2', bgCard:'#ffffff', bgCard2:'#fff3e0',
    acento:'#e65100', acentoAlt:'#2e7d32',
    texto:'#1a0e00', subtexto:'#7a4a20', tenue:'#c0906a',
    borde:'#ffe0cc', linea:'#ff8f00', footer:'#fff3e0',
    badgeTxt:'#ffffff'
  }
};

const MODO_HDR = {
  relampago:  { titulo:'⚡ OFERTA RELÁMPAGO',    sub:'Solo por tiempo limitado' },
  destacadas: { titulo:'🔥 DESTACADAS',           sub:'Los favoritos de nuestros clientes' },
  especiales: { titulo:'⭐ ESPECIALES',           sub:'Precios especiales seleccionados' },
  promos:     { titulo:'🏷️ PROMOS ACTIVAS',      sub:'Precios rebajados en productos seleccionados' },
  ultimas:    { titulo:'🎯 ÚLTIMAS UNIDADES',     sub:'¡Quedan pocas! Aprovechá ahora' },
  cervecero:  { titulo:'🍺 JUEVES CERVECERO',    sub:'Ofertas especiales · Solo esta noche' },
  manual:     { titulo:'🏷️ OFERTAS DEL DÍA',    sub:'Almacén Copihue' }
};

let _modo        = 'relampago';
let _datos       = null;
let _candidatos  = [];
let _sel         = new Set();
let _canvas      = null;

// ── UTILS ─────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = n => Math.round(n).toLocaleString('es-AR');
const slug = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  .replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').trim();
const corto = (s,n=3) => s
  .replace(/\b(\d+\s*gr|\d+\s*kg|\d+\s*ml|\d+\s*l|x\s*\d+|\d+\s*u)\b/gi,'')
  .replace(/\s+/g,' ').trim().split(' ').slice(0,n).join(' ');

function loading(on, txt='') {
  if (txt) $('ov-lbl').textContent = txt;
  $('ov').classList.toggle('on', on);
}
async function apiFetch(action) {
  const r = await fetch(API + '?action=' + action + '&t=' + Date.now(), { redirect:'follow' });
  return r.json();
}

// ── EMPRESA desde config_sistema ──────────────────────────────────────────────
async function cargarEmpresa() {
  try {
    const data = await apiFetch('getConfig');
    if (!data.success || !data.config) return;
    const cfg = data.config;
    const nrm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const get = field => {
      const t = nrm(field);
      const k = Object.keys(cfg).find(k => {
        const n = nrm(k);
        return n.replace(/^general\|/,'') === t || n === t;
      });
      return k ? String(cfg[k]?.[0] || '').trim() : '';
    };
    _empresa.nombre    = get('nombre de la empresa') || _empresa.nombre;
    _empresa.slogan    = get('slogan')               || _empresa.slogan;
    _empresa.direccion = get('direccion')            || _empresa.direccion;
    _empresa.ciudad    = get('ciudad')               || _empresa.ciudad;
    _empresa.web       = get('title')?.replace(/^CATALOGO\s*-\s*/i,'') || _empresa.web;
    _empresa.color     = get('color primario')       || _empresa.color;
    _empresa.telefono  = get('telefono')             || _empresa.telefono;
    // Actualizar UI
    $('badgeEmpresa').textContent   = _empresa.nombre;
    $('infoNombre').textContent     = _empresa.nombre;
    $('infoDireccion').textContent  = _empresa.direccion + (_empresa.ciudad ? ', ' + _empresa.ciudad : '');
    $('infoWeb').textContent        = _empresa.web;
  } catch(e) { console.warn('config empresa:', e); }
}

// ── MODO ──────────────────────────────────────────────────────────────────────
function setModo(modo, btn) {
  _modo = modo;
  _sel.clear();
  document.querySelectorAll('.modo-btn').forEach(b => b.classList.remove('activo'));
  btn.classList.add('activo');
  $('secProd').style.display  = 'none';
  $('canvasPreview').style.display = 'none';
  $('placeholder').style.display   = 'flex';
  $('botonesAcc').style.display    = 'none';
  if (_datos) poblarCandidatos();
}

// ── CARGA DE DATOS ────────────────────────────────────────────────────────────
async function cargarDatos() {
  loading(true, 'Cargando productos y ofertas...');
  try {
    const [of, cerv, pr] = await Promise.all([
      apiFetch('getOfertas'),
      apiFetch('getJuevesCervecero'),
      apiFetch('getProductos')
    ]);
    _datos = { ofertas: of, cervecero: cerv, productos: pr.productos || [] };
    poblarCandidatos();
  } catch(e) {
    alert('❌ Error cargando datos: ' + e.message);
  }
  loading(false);
}

function poblarCandidatos() {
  if (!_datos) return;
  const { ofertas, cervecero, productos } = _datos;
  const max = parseInt($('cfgMax').value) || 6;
  _candidatos = [];
  _sel.clear();

  if (_modo === 'cervecero') {
    _candidatos = (cervecero.productos || []).map(p => ({
      id: p.id || p.nombre, nombre: p.nombre, precio: p.precio || 0,
      precioOferta: (p.precioPromo > 0) ? p.precioPromo : p.precio,
      descPct: (p.precio > 0 && p.precioPromo > 0) ? Math.round((1-p.precioPromo/p.precio)*100) : 0
    }));
  } else if (_modo === 'relampago') {
    _candidatos = (ofertas.relampagoActivo || []).map(p => {
      const pr = p.price || 0, d = p.relampago || 10;
      return { id:p.id, nombre:p.name, precio:pr, precioOferta:Math.round(pr*(1-d/100)), descPct:d };
    });
  } else if (_modo === 'destacadas') {
    _candidatos = (ofertas.destacadasActivas || []).map(p => ({
      id:p.id, nombre:p.name, precio:p.price||0,
      precioOferta:Math.round((p.price||0)*0.9), descPct:10
    }));
  } else if (_modo === 'especiales') {
    _candidatos = (ofertas.especialesActivas || []).map(p => ({
      id:p.id, nombre:p.name, precio:p.price||0,
      precioOferta:Math.round((p.price||0)*0.9), descPct:10
    }));
  } else if (_modo === 'promos') {
    _candidatos = productos.filter(p =>
      (p.category||'').toUpperCase() === 'PROMOS' && p.normal > p.price && p.stock > 0
    ).map(p => ({
      id:p.id, nombre:p.name, precio:p.normal, precioOferta:p.price,
      descPct: Math.round((1-p.price/p.normal)*100)
    }));
  } else if (_modo === 'ultimas') {
    _candidatos = (ofertas.ultimasSeleccionadas || []).map(p => {
      const pr = p.price||p.precio||0, d = p.relampago||10;
      return { id:p.id, nombre:p.name||p.nombre, precio:pr,
        precioOferta:Math.round(pr*(1-d/100)), descPct:d };
    });
  } else { // manual
    const vistos = new Set();
    const ag = (arr, fn) => (arr||[]).forEach(p => {
      if (!p||vistos.has(p.id)) return; vistos.add(p.id);
      const pr = p.price||p.precio||0;
      _candidatos.push({ id:p.id, nombre:p.name||p.nombre, precio:pr, ...fn(p,pr) });
    });
    ag(ofertas.relampagoActivo,      (p,pr)=>({precioOferta:Math.round(pr*(1-(p.relampago||10)/100)),descPct:p.relampago||10}));
    ag(ofertas.destacadasActivas,    (_,pr) =>({precioOferta:Math.round(pr*.9),descPct:10}));
    ag(ofertas.especialesActivas,    (_,pr) =>({precioOferta:Math.round(pr*.9),descPct:10}));
    ag(ofertas.ultimasSeleccionadas, (p,pr) =>({precioOferta:Math.round(pr*(1-(p.relampago||10)/100)),descPct:p.relampago||10}));
  }

  // Auto-seleccionar los primeros
  _candidatos.slice(0, max).forEach(p => _sel.add(p.id));
  renderCandidatos();
}

function renderCandidatos() {
  const sec   = $('secProd');
  const lista = $('listaCand');
  const lbl   = $('lblCand');
  const warn  = $('warnMax');
  if (!_candidatos.length) { sec.style.display='none'; return; }
  sec.style.display = 'block';
  lbl.textContent   = `(${_candidatos.length} disponibles)`;
  warn.style.display = _sel.size > 9 ? 'block' : 'none';
  lista.innerHTML = _candidatos.map(p => {
    const s = _sel.has(p.id);
    return `<div class="prod-item${s?' sel':''}" onclick="toggleProd('${p.id}',this)">
      <img class="prod-img" src="imagenes-productos/${slug(p.nombre)}.jpg" onerror="this.style.display='none'" loading="lazy">
      <div class="prod-info">
        <div class="prod-nom">${p.nombre}</div>
        <div class="prod-precio">$${fmt(p.precioOferta)} <span style="text-decoration:line-through;opacity:.5">$${fmt(p.precio)}</span></div>
      </div>
      <div class="prod-chk">${s?'✓':''}</div>
    </div>`;
  }).join('');
}

function toggleProd(id, el) {
  const n = isNaN(id) ? id : Number(id);
  if (_sel.has(n)) { _sel.delete(n); el.classList.remove('sel'); el.querySelector('.prod-chk').textContent=''; }
  else             { _sel.add(n);    el.classList.add('sel');    el.querySelector('.prod-chk').textContent='✓'; }
  $('warnMax').style.display = _sel.size>9 ? 'block':'none';
}

// ── CANVAS HELPERS ────────────────────────────────────────────────────────────
function crearCv(w, h) {
  const cv = document.createElement('canvas');
  cv.width=w*S; cv.height=h*S;
  cv.style.width=w+'px'; cv.style.height=h+'px';
  const ctx = cv.getContext('2d');
  ctx.scale(S,S);
  return { cv, ctx };
}

function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lineH, maxL) {
  const words=text.split(' '); let line='', lines=[];
  for (const w of words) {
    const t = line ? line+' '+w : w;
    if (ctx.measureText(t).width > maxW && line) { lines.push(line); line=w; } else line=t;
  }
  if (line) lines.push(line);
  if (maxL) lines=lines.slice(0,maxL);
  lines.forEach((l,i) => ctx.fillText(l, x, y+i*lineH));
}

function cargarImg(src) {
  return new Promise(res => {
    const img = new Image();
    img.onload  = () => res(img);
    img.onerror = () => res(null);
    img.src = src;
  });
}

function drawBg(ctx, W, H, P, fondoKey) {
  const grad = ctx.createLinearGradient(0,0,0,H);
  if (fondoKey==='copihue') { grad.addColorStop(0,'#f4faf4'); grad.addColorStop(1,'#e8f3e8'); }
  else if (fondoKey==='crema')  { grad.addColorStop(0,'#f5f0e0'); grad.addColorStop(1,'#ede5cc'); }
  else if (fondoKey==='oscuro') { grad.addColorStop(0,'#1a1a1a'); grad.addColorStop(1,'#0d0d0d'); }
  else if (fondoKey==='naranja'){ grad.addColorStop(0,'#fff8f2'); grad.addColorStop(1,'#fff0e0'); }
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  // Sutil textura de líneas finas
  ctx.strokeStyle='rgba(0,0,0,0.025)'; ctx.lineWidth=1;
  for (let y=0;y<H;y+=18){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawHeader(ctx, W, P, info, yBase=0) {
  // Franja color
  ctx.fillStyle=P.acento; ctx.fillRect(0,yBase,W,4);
  ctx.fillStyle=P.acento;
  ctx.font='bold 26px "Syne",sans-serif'; ctx.textAlign='center';
  ctx.fillText(info.titulo, W/2, yBase+38);
  ctx.fillStyle=P.subtexto; ctx.font='13px "DM Sans",sans-serif';
  ctx.fillText(info.sub, W/2, yBase+58);
  ctx.strokeStyle=P.linea; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(16,yBase+70); ctx.lineTo(W-16,yBase+70); ctx.stroke();
  return yBase+80; // startY para contenido
}

function drawFooter(ctx, W, H, P) {
  const fy = H-46;
  ctx.strokeStyle=P.linea; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(16,fy); ctx.lineTo(W-16,fy); ctx.stroke();
  ctx.fillStyle=P.texto; ctx.font='bold 13px "DM Sans",sans-serif'; ctx.textAlign='center';
  const lineaDir = _empresa.nombre + ' · ' + _empresa.direccion
    + (_empresa.ciudad ? ', ' + _empresa.ciudad : '');
  ctx.fillText(lineaDir, W/2, fy+18);
  ctx.fillStyle=P.subtexto; ctx.font='11px "DM Sans",sans-serif';
  ctx.fillText(_empresa.web, W/2, fy+34);
  // Franja bottom
  ctx.fillStyle=P.acento; ctx.fillRect(0,H-4,W,4);
}

async function drawCard(ctx, p, cx, cy, CW, CH, FH, P, fondoKey) {
  // Card background
  ctx.fillStyle=P.bgCard; rr(ctx,cx,cy,CW,CH,12); ctx.fill();
  ctx.strokeStyle=P.borde; ctx.lineWidth=1; rr(ctx,cx,cy,CW,CH,12); ctx.stroke();

  // Imagen
  const img = await cargarImg('imagenes-productos/'+slug(p.nombre)+'.jpg');
  if (img) {
    ctx.save(); rr(ctx,cx+6,cy+6,CW-12,FH-4,8); ctx.clip();
    const iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height;
    const sc=Math.min((CW-12)/iw,(FH-4)/ih);
    ctx.drawImage(img, cx+6+(CW-12-iw*sc)/2, cy+6+(FH-4-ih*sc)/2, iw*sc, ih*sc);
    ctx.restore();
  } else {
    ctx.fillStyle=fondoKey==='oscuro'?'#2a2a2a':P.bgCard2;
    rr(ctx,cx+6,cy+6,CW-12,FH-4,8); ctx.fill();
    ctx.font='28px sans-serif'; ctx.textAlign='center';
    ctx.fillText('🛒', cx+CW/2, cy+FH/2+14);
  }

  // Badge descuento
  if (p.descPct>=10) {
    ctx.fillStyle=P.acento; rr(ctx,cx+CW-48,cy+8,42,22,6); ctx.fill();
    ctx.fillStyle=P.badgeTxt; ctx.font='bold 11px "DM Sans",sans-serif'; ctx.textAlign='center';
    ctx.fillText('-'+p.descPct+'%', cx+CW-27, cy+22);
  }

  // Texto nombre
  ctx.fillStyle=P.texto; ctx.textAlign='center';
  ctx.font='bold 12px "DM Sans",sans-serif';
  wrapText(ctx, corto(p.nombre,3), cx+CW/2, cy+FH+14, CW-12, 14, 2);

  // Precio tachado
  if (p.precio !== p.precioOferta) {
    ctx.fillStyle=P.tenue; ctx.font='11px "DM Mono",sans-serif';
    const t='$'+fmt(p.precio), tw=ctx.measureText(t).width, px=cx+CW/2;
    ctx.fillText(t, px, cy+FH+36);
    ctx.strokeStyle=P.tenue; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px-tw/2,cy+FH+33); ctx.lineTo(px+tw/2,cy+FH+33); ctx.stroke();
  }

  // Precio oferta
  ctx.fillStyle=P.acento; ctx.font='bold 17px "DM Sans",sans-serif'; ctx.textAlign='center';
  ctx.fillText('$'+fmt(p.precioOferta), cx+CW/2, cy+CH-9);
}

// ── FORMATOS ──────────────────────────────────────────────────────────────────
async function dibujarGrid(prods, fondoKey) {
  const P=PALETAS[fondoKey], W=600;
  const COLS=prods.length<=2?prods.length<=1?1:2:prods.length<=4?2:3;
  const ROWS=Math.ceil(prods.length/COLS);
  const PAD=14,GAP=8;
  const CW=Math.floor((W-PAD*2-GAP*(COLS-1))/COLS);
  const FH=COLS===3?88:COLS===2?108:128;
  const CH=FH+66;
  const H=82+ROWS*CH+(ROWS-1)*GAP+PAD+52;
  const {cv,ctx}=crearCv(W,H);
  drawBg(ctx,W,H,P,fondoKey);
  const startY=drawHeader(ctx,W,P,MODO_HDR[_modo]||MODO_HDR.manual);
  await Promise.all(prods.map((p,i)=>{
    const col=i%COLS,row=Math.floor(i/COLS);
    const cx=PAD+col*(CW+GAP),cy=startY+row*(CH+GAP);
    return drawCard(ctx,p,cx,cy,CW,CH,FH,P,fondoKey);
  }));
  drawFooter(ctx,W,H,P); return cv;
}

async function dibujarCuadrado(prods, fondoKey) {
  const P=PALETAS[fondoKey], W=600;
  const maxC=Math.min(prods.length,6), prodC=prods.slice(0,maxC);
  const COLS=maxC<=1?1:maxC<=4?2:3;
  const ROWS=Math.ceil(maxC/COLS);
  const PAD=12,GAP=6;
  const CW=Math.floor((W-PAD*2-GAP*(COLS-1))/COLS);
  const FH=COLS===3?86:COLS===2?104:124;
  const CH=FH+60;
  const H=Math.min(600,80+ROWS*CH+(ROWS-1)*GAP+PAD+52);
  const {cv,ctx}=crearCv(W,H);
  drawBg(ctx,W,H,P,fondoKey);
  const startY=drawHeader(ctx,W,P,MODO_HDR[_modo]||MODO_HDR.manual);
  await Promise.all(prodC.map((p,i)=>{
    const col=i%COLS,row=Math.floor(i/COLS);
    const cx=PAD+col*(CW+GAP),cy=startY+row*(CH+GAP);
    return drawCard(ctx,p,cx,cy,CW,CH,FH,P,fondoKey);
  }));
  drawFooter(ctx,W,H,P); return cv;
}

async function dibujarStory(prods, fondoKey) {
  const P=PALETAS[fondoKey], W=540,H=960;
  const {cv,ctx}=crearCv(W,H);
  drawBg(ctx,W,H,P,fondoKey);
  const info=MODO_HDR[_modo]||MODO_HDR.manual;
  // Header especial story
  ctx.fillStyle=P.acento; ctx.fillRect(0,0,W,5);
  ctx.fillStyle=P.acento; ctx.font='bold 16px "DM Sans",sans-serif'; ctx.textAlign='center';
  ctx.fillText(_empresa.nombre.toUpperCase(), W/2, 40);
  ctx.strokeStyle=P.linea; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(40,52); ctx.lineTo(W-40,52); ctx.stroke();
  ctx.fillStyle=P.acento; ctx.font='bold 32px "Syne",sans-serif';
  ctx.fillText(info.titulo, W/2, 94);
  ctx.fillStyle=P.subtexto; ctx.font='14px "DM Sans",sans-serif';
  ctx.fillText(info.sub, W/2, 116);

  const maxS=Math.min(prods.length,4), prodS=prods.slice(0,maxS);
  const COLS=maxS<=2?1:2, ROWS=Math.ceil(maxS/COLS);
  const PAD=18,GAP=8;
  const CW=Math.floor((W-PAD*2-GAP*(COLS-1))/COLS);
  const FH=130, CH=FH+68;
  const startY=134;
  await Promise.all(prodS.map((p,i)=>{
    const col=i%COLS,row=Math.floor(i/COLS);
    return drawCard(ctx,p,PAD+col*(CW+GAP),startY+row*(CH+GAP),CW,CH,FH,P,fondoKey);
  }));
  if (prods.length>4) {
    ctx.fillStyle=P.subtexto; ctx.font='bold 13px "DM Sans",sans-serif'; ctx.textAlign='center';
    ctx.fillText(`+ ${prods.length-4} productos más`,W/2,startY+ROWS*(CH+GAP)+20);
  }
  // Footer story
  const fy=H-80;
  ctx.strokeStyle=P.linea; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(40,fy); ctx.lineTo(W-40,fy); ctx.stroke();
  ctx.fillStyle=P.texto; ctx.font='bold 14px "DM Sans",sans-serif'; ctx.textAlign='center';
  ctx.fillText(_empresa.nombre+' · '+_empresa.direccion,W/2,fy+22);
  ctx.fillStyle=P.subtexto; ctx.font='12px "DM Sans",sans-serif';
  ctx.fillText(_empresa.web,W/2,fy+40);
  ctx.fillStyle=P.acento; ctx.fillRect(0,H-5,W,5);
  return cv;
}

async function dibujarBanner(prods, fondoKey) {
  const P=PALETAS[fondoKey];
  const maxB=Math.min(prods.length,4), prodB=prods.slice(0,maxB);
  const W=820,H=360;
  const {cv,ctx}=crearCv(W,H);
  drawBg(ctx,W,H,P,fondoKey);
  const info=MODO_HDR[_modo]||MODO_HDR.manual;
  // Banner header barra
  const HDR=52;
  ctx.fillStyle=P.acento; ctx.fillRect(0,0,W,HDR);
  ctx.fillStyle='#fff'; ctx.font='bold 20px "Syne",sans-serif'; ctx.textAlign='center';
  ctx.fillText(_empresa.nombre.toUpperCase()+'  ·  '+info.titulo.replace(/^[^\s]+\s/,''),W/2,34);
  const PAD=12,GAP=8,CW=Math.floor((W-PAD*2-GAP*(maxB-1))/maxB);
  const startY=HDR+PAD,CH=H-HDR-PAD*2-32,FH=Math.min(Math.floor(CH*.56),120);
  await Promise.all(prodB.map((p,i)=>drawCard(ctx,p,PAD+i*(CW+GAP),startY,CW,CH,FH,P,fondoKey)));
  ctx.fillStyle=P.subtexto; ctx.font='11px "DM Sans",sans-serif'; ctx.textAlign='center';
  ctx.fillText(_empresa.direccion+(_empresa.ciudad?', '+_empresa.ciudad:'')+' · '+_empresa.web,W/2,H-10);
  ctx.fillStyle=P.acento; ctx.fillRect(0,H-4,W,4);
  return cv;
}

async function dibujarLista(prods, fondoKey) {
  const P=PALETAS[fondoKey], W=500;
  const ROW=76,HDR=84,FTR=52,GAP=1,PAD=12;
  const H=HDR+prods.length*ROW+(prods.length-1)*GAP+PAD+FTR;
  const {cv,ctx}=crearCv(W,H);
  drawBg(ctx,W,H,P,fondoKey);
  const info=MODO_HDR[_modo]||MODO_HDR.manual;
  ctx.fillStyle=P.acento; ctx.font='bold 28px "Syne",sans-serif'; ctx.textAlign='center';
  ctx.fillText(info.titulo,W/2,42);
  ctx.fillStyle=P.subtexto; ctx.font='13px "DM Sans",sans-serif';
  ctx.fillText(info.sub,W/2,62);
  ctx.strokeStyle=P.linea; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(PAD,74); ctx.lineTo(W-PAD,74); ctx.stroke();

  await Promise.all(prods.map(async (p,i) => {
    const y=HDR+i*(ROW+GAP);
    ctx.fillStyle=i%2===0?'rgba(0,0,0,0.025)':'rgba(0,0,0,0)';
    ctx.fillRect(0,y,W,ROW);
    ctx.fillStyle=P.acento; ctx.fillRect(0,y,4,ROW);
    const FOTO=52;
    const img=await cargarImg('imagenes-productos/'+slug(p.nombre)+'.jpg');
    if (img){
      ctx.save(); rr(ctx,10,y+12,FOTO,FOTO,8); ctx.clip();
      const iw=img.naturalWidth||img.width,ih=img.naturalHeight||img.height;
      const sc=Math.min(FOTO/iw,FOTO/ih);
      ctx.drawImage(img,10+(FOTO-iw*sc)/2,y+12+(FOTO-ih*sc)/2,iw*sc,ih*sc);
      ctx.restore();
    } else {
      ctx.fillStyle=P.bgCard2; rr(ctx,10,y+12,FOTO,FOTO,8); ctx.fill();
      ctx.font='22px sans-serif'; ctx.textAlign='center'; ctx.fillText('🛒',36,y+44);
    }
    ctx.fillStyle=P.texto; ctx.textAlign='left';
    ctx.font='bold 13px "DM Sans",sans-serif';
    wrapText(ctx,corto(p.nombre,4),70,y+24,W-170,16,2);
    ctx.fillStyle=P.acento; ctx.font='bold 19px "DM Sans",sans-serif'; ctx.textAlign='right';
    ctx.fillText('$'+fmt(p.precioOferta),W-PAD-44,y+34);
    if (p.precio!==p.precioOferta){
      ctx.fillStyle=P.tenue; ctx.font='11px "DM Mono",sans-serif';
      const t='$'+fmt(p.precio),tw=ctx.measureText(t).width;
      ctx.fillText(t,W-PAD-44,y+52);
      ctx.strokeStyle=P.tenue; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(W-PAD-44-tw,y+49); ctx.lineTo(W-PAD-44,y+49); ctx.stroke();
    }
    if (p.descPct>=10){
      ctx.fillStyle=P.acento; rr(ctx,W-PAD-42,y+12,38,20,5); ctx.fill();
      ctx.fillStyle=P.badgeTxt; ctx.font='bold 10px "DM Sans",sans-serif'; ctx.textAlign='center';
      ctx.fillText('-'+p.descPct+'%',W-PAD-23,y+25);
    }
    ctx.strokeStyle=P.borde; ctx.lineWidth=.5;
    ctx.beginPath(); ctx.moveTo(16,y+ROW); ctx.lineTo(W-16,y+ROW); ctx.stroke();
  }));
  drawFooter(ctx,W,H,P); return cv;
}

// ── GENERAR ───────────────────────────────────────────────────────────────────
async function generarFlyer() {
  if (!_datos) { await cargarDatos(); if (!_datos) return; }
  const prods = _candidatos.filter(p => _sel.has(p.id)||_sel.has(Number(p.id)));
  if (!prods.length) { alert('Seleccioná al menos un producto'); return; }
  if (prods.length>9) { alert('Máximo 9 productos. Deseleccioná algunos.'); return; }
  const formato = $('cfgFormato').value;
  const fondo   = $('cfgFondo').value;
  loading(true, 'Generando flyer...');
  try {
    const dispatch = {
      lista:'dibujarLista', story:'dibujarStory',
      cuadrado:'dibujarCuadrado', banner:'dibujarBanner'
    };
    const fn = dispatch[formato] ? eval(dispatch[formato]) : dibujarGrid;
    _canvas = await fn(prods, fondo);
    const cv=$('canvasPreview');
    cv.width=_canvas.width; cv.height=_canvas.height;
    cv.style.width=(_canvas.width/S)+'px'; cv.style.height=(_canvas.height/S)+'px';
    cv.getContext('2d').drawImage(_canvas,0,0);
    cv.style.display='block';
    $('placeholder').style.display='none';
    $('botonesAcc').style.display='flex';
  } catch(e){ alert('❌ Error: '+e.message); console.error(e); }
  loading(false);
}

// ── EXPORTAR ──────────────────────────────────────────────────────────────────
function descargar() {
  if (!_canvas) return;
  const a=document.createElement('a');
  a.download='copihue-flyer-'+_modo+'-'+Date.now()+'.jpg';
  a.href=_canvas.toDataURL('image/jpeg',.93);
  a.click();
}

async function compartirWA() {
  if (!_canvas) return;
  _canvas.toBlob(async blob => {
    const file=new File([blob],'copihue-flyer.jpg',{type:'image/jpeg'});
    if (navigator.share && navigator.canShare({files:[file]})) {
      await navigator.share({files:[file],title:'Flyer '+_empresa.nombre,
        text:'🏷️ ¡Ofertas en '+_empresa.nombre+'!\n🛒 '+_empresa.web});
    } else {
      const a=document.createElement('a'); a.href=_canvas.toDataURL('image/jpeg',.93);
      a.download='copihue-flyer.jpg'; a.click();
      setTimeout(()=>window.open('https://wa.me/','_blank'),500);
    }
  },'image/jpeg',.93);
}

document.getElementById('cfgMax').addEventListener('change', () => {
  if (_datos) poblarCandidatos();
});

(async () => {
  loading(true,'Conectando con la planilla...');
  await cargarEmpresa();
  await cargarDatos();
  loading(false);
})();
