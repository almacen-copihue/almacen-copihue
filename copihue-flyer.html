<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copihue Flyer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --p:#2e7d32;--pd:#1b5e20;--pl:#4caf50;--sec:#ff6f00;
  --bg:#f4faf4;--bg2:#eaf3ea;--sur:#fff;
  --bdr:#d0e8d0;--bdr2:#e8f3e8;
  --txt:#172517;--tm:#4a6a4a;--ts:#8aaa8a;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--disp:'Syne',sans-serif;
  --r:12px;--rs:8px;
  --sh:0 2px 10px rgba(46,125,50,.10);--sh-lg:0 8px 32px rgba(46,125,50,.16);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);display:flex;flex-direction:column;
  background-image:radial-gradient(ellipse at 0% 0%,rgba(46,125,50,.08) 0,transparent 50%),
  radial-gradient(ellipse at 100% 100%,rgba(255,111,0,.05) 0,transparent 50%);}

/* HEADER */
header{background:linear-gradient(135deg,var(--pd),var(--p));color:#fff;padding:0 18px;height:56px;
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 14px rgba(27,94,32,.35);z-index:10;}
.h-brand{display:flex;align-items:center;gap:10px;}
.h-icon{width:32px;height:32px;background:rgba(255,255,255,.15);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:1rem;}
.h-title{font-family:var(--disp);font-size:1rem;font-weight:800;letter-spacing:-.02em;}
.h-sub{font-size:.65rem;opacity:.6;}
.h-right{display:flex;align-items:center;gap:8px;}
.h-badge{font-family:var(--mono);font-size:.62rem;background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:2px 8px;color:rgba(255,255,255,.85);}
.h-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;
  border-radius:var(--rs);padding:5px 10px;font-size:.72rem;font-weight:600;cursor:pointer;
  transition:all .18s;}
.h-btn:hover{background:rgba(255,255,255,.25);}

/* MAIN LAYOUT */
.main{display:flex;flex:1;overflow:hidden;max-width:1200px;width:100%;margin:0 auto;}

/* PANEL IZQ */
.ctrl{width:280px;min-width:240px;flex-shrink:0;background:var(--sur);
  border-right:1px solid var(--bdr);overflow-y:auto;padding:12px;
  display:flex;flex-direction:column;gap:10px;}
.ctrl::-webkit-scrollbar{width:4px;}
.ctrl::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px;}

/* DIAGNÓSTICO */
.diag{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rs);padding:10px 12px;}
.diag-title{font-family:var(--disp);font-size:.68rem;font-weight:700;color:var(--tm);
  margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.diag-rows{display:flex;flex-direction:column;gap:3px;}
.diag-row{display:flex;align-items:center;gap:6px;font-size:.68rem;color:var(--tm);}
.diag-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#ccc;}
.diag-dot.ok{background:var(--pl);}
.diag-dot.warn{background:#ff9800;}
.diag-dot.off{background:#ef5350;}
.diag-cnt{font-family:var(--mono);font-size:.65rem;margin-left:auto;
  background:var(--sur);border-radius:4px;padding:1px 5px;color:var(--ts);}

/* SECTION LABEL */
.slbl{font-family:var(--disp);font-size:.62rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ts);margin-bottom:5px;
  display:flex;align-items:center;gap:6px;}
.slbl::after{content:'';flex:1;height:1px;background:var(--bdr);}

/* MODO BUTTONS */
.modo-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.mb{padding:8px 5px;border-radius:var(--rs);border:1.5px solid var(--bdr);
  background:var(--bg2);color:var(--tm);font-family:var(--disp);
  font-size:.66rem;font-weight:700;cursor:pointer;text-align:center;
  transition:all .18s;line-height:1.3;position:relative;}
.mb .em{font-size:1.1rem;display:block;margin-bottom:2px;}
.mb:hover{border-color:var(--pl);color:var(--p);}
.mb.act{background:var(--p);border-color:var(--pd);color:#fff;box-shadow:0 3px 10px rgba(46,125,50,.3);}
.mb.full{grid-column:span 2;}
/* Badge de cantidad por modo */
.mb .cnt{position:absolute;top:4px;right:4px;background:var(--sec);color:#fff;
  border-radius:10px;font-size:.52rem;padding:1px 4px;font-family:var(--mono);
  display:none;}
.mb.has-prods .cnt{display:block;}

/* CFG ROWS */
.cfg-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px;}
.cfg-row label{font-size:.71rem;color:var(--tm);flex:1;}
.cfg-row select,.cfg-row input[type=number]{background:var(--bg);border:1.5px solid var(--bdr);
  color:var(--txt);border-radius:var(--rs);padding:5px 7px;font-size:.71rem;
  font-family:var(--sans);outline:none;transition:border-color .18s;flex:1;max-width:140px;}
.cfg-row select:focus,.cfg-row input:focus{border-color:var(--p);}

/* LISTA CANDIDATOS */
.prod-list{display:flex;flex-direction:column;gap:4px;max-height:250px;overflow-y:auto;}
.prod-list::-webkit-scrollbar{width:3px;}
.prod-list::-webkit-scrollbar-thumb{background:var(--bdr);}
.pi{display:flex;align-items:center;gap:7px;background:var(--bg);border-radius:var(--rs);
  padding:5px 7px;border:1.5px solid var(--bdr);cursor:pointer;transition:all .15s;}
.pi:hover{border-color:var(--pl);}
.pi.sel{border-color:var(--p);background:rgba(46,125,50,.06);}
.pi-img{width:32px;height:32px;object-fit:contain;border-radius:5px;background:var(--bg2);flex-shrink:0;}
.pi-info{flex:1;min-width:0;}
.pi-nom{font-size:.66rem;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pi-pr{font-size:.6rem;color:var(--ts);}
.pi-chk{width:17px;height:17px;border-radius:50%;border:2px solid var(--bdr);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:.52rem;transition:all .15s;}
.pi.sel .pi-chk{border-color:var(--p);background:var(--p);color:#fff;}

/* WARN */
.warn{background:#fff3e0;border:1px solid #ffcc80;border-radius:var(--rs);
  padding:7px 9px;font-size:.68rem;color:#e65100;}

/* BOTONES ACCION */
.btn-gen{width:100%;padding:10px;border:none;border-radius:var(--rs);cursor:pointer;
  font-family:var(--disp);font-size:.82rem;font-weight:800;letter-spacing:.04em;transition:all .18s;}
.btn-gen.pri{background:var(--p);color:#fff;}
.btn-gen.pri:hover{background:var(--pd);transform:translateY(-1px);box-shadow:0 4px 12px rgba(46,125,50,.4);}
.btn-gen.pri:disabled{background:var(--ts);cursor:not-allowed;transform:none;}
.btn-gen.sec{background:var(--bg2);color:var(--tm);border:1.5px solid var(--bdr);
  font-family:var(--sans);font-size:.72rem;font-weight:600;}
.btn-gen.sec:hover{border-color:var(--pl);}

/* INFO LOCAL */
.info-local{font-size:.61rem;color:var(--ts);text-align:center;line-height:1.7;
  padding-top:6px;border-top:1px dashed var(--bdr);}
.info-local strong{color:var(--tm);}

/* PANEL DER */
.prev{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;padding:16px;overflow-y:auto;background:var(--bg);gap:12px;min-width:0;}
.prev::-webkit-scrollbar{width:5px;}
.prev::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px;}

.ph{display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:12px;color:var(--ts);}
.ph-icon{font-size:3.5rem;opacity:.35;}
.ph p{font-size:.8rem;}

#cv{border-radius:var(--r);box-shadow:var(--sh-lg);max-width:100%;
  width:auto;height:auto;display:none;border:1px solid var(--bdr);}

.btn-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.ba{padding:8px 16px;border-radius:var(--rs);border:none;font-weight:700;font-size:.78rem;
  cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .18s;}
.ba-wa{background:#25D366;color:#fff;}
.ba-wa:hover{background:#1EB857;}
.ba-dl{background:var(--sec);color:#fff;}
.ba-dl:hover{background:#e65100;}
.ba-cp{background:var(--bg2);color:var(--tm);border:1.5px solid var(--bdr);}
.ba-cp:hover{border-color:var(--pl);}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(244,250,244,.87);z-index:500;
  flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.overlay.on{display:flex;}
.spin{width:34px;height:34px;border:3px solid var(--bdr);border-top-color:var(--p);
  border-radius:50%;animation:rot .8s linear infinite;}
@keyframes rot{to{transform:rotate(360deg)}}
.spin-lbl{font-family:var(--disp);font-size:.78rem;color:var(--tm);font-weight:700;}

/* RESPONSIVE */
@media(max-width:680px){
  html,body{overflow:auto;} .main{flex-direction:column;overflow:visible;}
  .ctrl{width:100%;min-width:0;border-right:none;border-bottom:1px solid var(--bdr);}
}
</style>
</head>
<body>

<div class="overlay" id="ov"><div class="spin"></div><div class="spin-lbl" id="ov-lbl">Cargando...</div></div>

<header>
  <div class="h-brand">
    <div class="h-icon">🖼</div>
    <div>
      <div class="h-title">Copihue Flyer</div>
      <div class="h-sub">Generador para redes sociales</div>
    </div>
  </div>
  <div class="h-right">
    <span class="h-badge" id="badgeEmp">Almacén Copihue</span>
    <button class="h-btn" onclick="recargar()">↺ Recargar</button>
  </div>
</header>

<div class="main">

  <!-- PANEL CONTROLES -->
  <div class="ctrl">

    <!-- DIAGNÓSTICO -->
    <div class="diag">
      <div class="diag-title">📡 Estado de ofertas hoy</div>
      <div class="diag-rows" id="diagRows">
        <div class="diag-row"><div class="diag-dot" id="d-carga"></div><span>Cargando datos...</span></div>
      </div>
    </div>

    <!-- TIPO DE OFERTA -->
    <div>
      <div class="slbl">Tipo de oferta</div>
      <div class="modo-grid" id="modoGrid">
        <button class="mb act" data-modo="relampago" onclick="setModo('relampago',this)">
          <span class="em">⚡</span>Relámpago<span class="cnt" id="cnt-relampago">0</span>
        </button>
        <button class="mb" data-modo="destacadas" onclick="setModo('destacadas',this)">
          <span class="em">🔥</span>Destacadas<span class="cnt" id="cnt-destacadas">0</span>
        </button>
        <button class="mb" data-modo="especiales" onclick="setModo('especiales',this)">
          <span class="em">⭐</span>Especiales<span class="cnt" id="cnt-especiales">0</span>
        </button>
        <button class="mb" data-modo="ultimas" onclick="setModo('ultimas',this)">
          <span class="em">🎯</span>Últimas Und.<span class="cnt" id="cnt-ultimas">0</span>
        </button>
        <button class="mb" data-modo="promos" onclick="setModo('promos',this)">
          <span class="em">🏷️</span>Promos<span class="cnt" id="cnt-promos">0</span>
        </button>
        <button class="mb" data-modo="cervecero" onclick="setModo('cervecero',this)">
          <span class="em">🍺</span>Cervecero<span class="cnt" id="cnt-cervecero">0</span>
        </button>
        <button class="mb full" data-modo="manual" onclick="setModo('manual',this)">
          <span class="em">✏️</span>Selección manual<span class="cnt" id="cnt-manual">0</span>
        </button>
      </div>
    </div>

    <!-- DISEÑO -->
    <div>
      <div class="slbl">Diseño</div>
      <div class="cfg-row">
        <label>Formato</label>
        <select id="cfgFormato">
          <option value="grid">🔲 Grid</option>
          <option value="cuadrado">⬛ Cuadrado 1:1</option>
          <option value="story">📱 Story 9:16</option>
          <option value="banner">📺 Banner FB</option>
          <option value="lista">📋 Lista WA</option>
        </select>
      </div>
      <div class="cfg-row">
        <label>Estilo</label>
        <select id="cfgFondo">
          <option value="copihue">🌿 Copihue</option>
          <option value="crema">🟤 Clásico</option>
          <option value="oscuro">⬛ Oscuro</option>
          <option value="naranja">🔶 Fuego</option>
        </select>
      </div>
      <div class="cfg-row">
        <label>Máx. productos</label>
        <input type="number" id="cfgMax" value="6" min="1" max="9" style="max-width:58px;">
      </div>
    </div>

    <!-- CANDIDATOS -->
    <div id="secProd" style="display:none;">
      <div class="slbl">Productos <span id="lblCand" style="color:var(--ts);font-weight:400;text-transform:none;letter-spacing:0;font-family:var(--sans)"></span></div>
      <div id="warnMax" class="warn" style="display:none;margin-bottom:6px;">⚠️ Máximo 9 productos</div>
      <div class="prod-list" id="listaCand"></div>
    </div>

    <button class="btn-gen pri" id="btnGen" onclick="generarFlyer()" disabled>⚡ GENERAR FLYER</button>
    <button class="btn-gen sec" onclick="recargar()">↺ Recargar datos</button>

    <div class="info-local">
      <strong id="infoNombre">Almacén Copihue</strong><br>
      <span id="infoDireccion">—</span><br>
      <span id="infoWeb">—</span>
    </div>

  </div><!-- /ctrl -->

  <!-- PANEL PREVIEW -->
  <div class="prev">
    <div class="ph" id="ph">
      <div class="ph-icon">🖼️</div>
      <p>Elegí un tipo de oferta y presioná Generar</p>
    </div>
    <canvas id="cv"></canvas>
    <div class="btn-row" id="botonesAcc" style="display:none;">
      <button class="ba ba-wa" onclick="compartirWA()">📲 WhatsApp</button>
      <button class="ba ba-dl" onclick="descargar()">💾 Descargar</button>
    </div>
  </div>

</div>

<script>
// ── CONSTANTES ────────────────────────────────────────────────────────────────
const GAS = 'https://script.google.com/macros/s/AKfycbxhKFk2WAi-KRY5xGBsI6_6Pvp3jDjt8mSRXvy7I1WehNmBpJamqK9G9Q1ZJSCSgAdfDA/exec';
const S   = 2; // HiDPI

const MODO_HDR = {
  relampago:  { titulo:'⚡ OFERTA RELÁMPAGO',      sub:'Solo por tiempo limitado' },
  destacadas: { titulo:'🔥 DESTACADAS',             sub:'Los favoritos de nuestros clientes' },
  especiales: { titulo:'⭐ ESPECIALES',             sub:'Precios especiales seleccionados' },
  promos:     { titulo:'🏷️ PROMOS ACTIVAS',        sub:'Precios rebajados seleccionados' },
  ultimas:    { titulo:'🎯 ÚLTIMAS UNIDADES',       sub:'¡Quedan pocas! Aprovechá ahora' },
  cervecero:  { titulo:'🍺 JUEVES CERVECERO',      sub:'Solo esta noche · Hasta agotar stock' },
  manual:     { titulo:'🏷️ OFERTAS DEL DÍA',      sub:'Almacén Copihue' }
};

const PALETAS = {
  copihue:{ bg:'#f4faf4',bgCard:'#fff',bgCard2:'#eaf3ea',acento:'#2e7d32',acentoAlt:'#ff6f00',
    texto:'#172517',sub:'#4a6a4a',tenue:'#8aaa8a',borde:'#d0e8d0',linea:'#4caf50',badgeTxt:'#fff'},
  crema:  { bg:'#f5f0e0',bgCard:'#fff',bgCard2:'#ede5cc',acento:'#c62828',acentoAlt:'#1565c0',
    texto:'#2e1a0e',sub:'#8a6040',tenue:'#b0987a',borde:'#e0d5b0',linea:'#c8b87a',badgeTxt:'#fff'},
  oscuro: { bg:'#111',bgCard:'#1e1e1e',bgCard2:'#252525',acento:'#4caf50',acentoAlt:'#ff6f00',
    texto:'#f0f0f0',sub:'#aaa',tenue:'#666',borde:'#333',linea:'#2e7d32',badgeTxt:'#111'},
  naranja:{ bg:'#fff8f2',bgCard:'#fff',bgCard2:'#fff3e0',acento:'#e65100',acentoAlt:'#2e7d32',
    texto:'#1a0e00',sub:'#7a4a20',tenue:'#c0906a',borde:'#ffe0cc',linea:'#ff8f00',badgeTxt:'#fff'}
};

// ── ESTADO ────────────────────────────────────────────────────────────────────
let _emp   = { nombre:'Almacén Copihue',slogan:'',direccion:'',ciudad:'',web:'',telefono:'' };
let _prods = [];   // todos los productos del catálogo
let _of    = {};   // respuesta de getOfertas
let _cerv  = {};   // respuesta de getJuevesCervecero
// Pools construidos por cruzar _prods + _of
let _pools = { relampago:[], destacadas:[], especiales:[], promos:[], ultimas:[], cervecero:[], manual:[] };
let _modo  = 'relampago';
let _sel   = new Set();
let _cand  = [];   // candidatos del modo actual
let _cvFin = null; // canvas final generado

// ── UTILS ─────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = n => Math.round(n).toLocaleString('es-AR');
const slug = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  .replace(/\b(\d+\s*gr|\d+\s*kg|\d+\s*ml|\d+\s*l|x\s*\d+|\d+\s*un?)\b/gi,'')
  .replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').trim();
const corto = (s,n=3) => s.split(' ').filter(w=>!/^\d+(gr|kg|ml|l|cc|x\d|un?)$/i.test(w)).slice(0,n).join(' ');

function ld(on,txt=''){$('ov').classList.toggle('on',on);if(txt)$('ov-lbl').textContent=txt;}

function diagSet(rows) {
  $('diagRows').innerHTML = rows.map(r=>`
    <div class="diag-row">
      <div class="diag-dot ${r.cls}"></div>
      <span>${r.lbl}</span>
      ${r.cnt!=null?`<span class="diag-cnt">${r.cnt}</span>`:''}
    </div>`).join('');
}

// ── CARGA PRINCIPAL ───────────────────────────────────────────────────────────
async function recargar() {
  ld(true,'Conectando con la planilla...');
  diagSet([{cls:'',lbl:'Cargando datos...'}]);
  try {
    // 1. Empresa
    try {
      const dc = await (await fetch(GAS+'?action=getConfig&t='+Date.now(),{redirect:'follow'})).json();
      if (dc.success && dc.config) extraerEmpresa(dc.config);
    } catch(e){ console.warn('config:',e); }

    // 2. Productos (sin action — respuesta principal)
    ld(true,'Cargando productos...');
    const rp = await (await fetch(GAS+'?cache='+Date.now(),{method:'GET',headers:{Accept:'application/json'},redirect:'follow'})).json();
    const raw = rp.productos || rp;
    _prods = procesarProductos(Array.isArray(raw)?raw:[]);

    // 3. Ofertas (secuencial — GAS no aguanta paralelo)
    ld(true,'Cargando ofertas activas...');
    const ro = await (await fetch(GAS+'?action=getOfertas&t='+Date.now(),{redirect:'follow'})).json();
    _of = ro.success ? ro : {};

    // 4. Cervecero
    try {
      const rc = await (await fetch(GAS+'?action=getJuevesCervecero&t='+Date.now(),{redirect:'follow'})).json();
      _cerv = rc || {};
    } catch(e){ _cerv={}; }

    // 5. Construir pools
    construirPools();
    actualizarDiag();
    actualizarBadgesModo();
    poblarCandidatos();
    $('btnGen').disabled = false;
  } catch(e) {
    diagSet([{cls:'off',lbl:'Error: '+e.message}]);
    console.error(e);
  }
  ld(false);
}

function extraerEmpresa(cfg) {
  const nrm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const get = f => {
    const t=nrm(f);
    const k=Object.keys(cfg).find(k=>{const n=nrm(k);return n.replace(/^general\|/,'')===t||n===t;});
    return k?String(cfg[k]?.[0]||'').trim():'';
  };
  _emp.nombre    = get('nombre de la empresa')||_emp.nombre;
  _emp.slogan    = get('slogan');
  _emp.direccion = get('direccion');
  _emp.ciudad    = get('ciudad');
  _emp.web       = get('title')?.replace(/^CATALOGO\s*-\s*/i,'')||get('descripcion')||'';
  _emp.telefono  = get('telefono');
  $('badgeEmp').textContent   = _emp.nombre;
  $('infoNombre').textContent = _emp.nombre;
  $('infoDireccion').textContent = [_emp.direccion,_emp.ciudad].filter(Boolean).join(', ')||'—';
  $('infoWeb').textContent    = _emp.web||'—';
}

function procesarProductos(arr) {
  return arr.map((item,i)=>{
    // Adaptador de nombres (igual que index.html)
    if (item.oferta1!==undefined && item.relampago===undefined) item.relampago=parseInt(item.oferta1)||0;
    if (item.oferta2!==undefined && item.destacada===undefined) item.destacada=parseInt(item.oferta2)||0;
    if (item.categoriaOferta!==undefined && item.especial===undefined) item.especial=parseInt(item.categoriaOferta)||0;
    return {
      id:       Number(item.id||i+1),
      name:     item.name||'Producto '+i,
      price:    parseInt(item.price)||0,
      normal:   parseInt(item.normal)||parseInt(item.price)||0,
      category: String(item.category||'ALMACEN').trim().toUpperCase(),
      stock:    parseInt(item.stock)||parseInt(item.stockNumber)||0,
      relampago:parseInt(item.relampago)||0,
      destacada:parseInt(item.destacada)||0,
      especial: parseInt(item.especial)||0,
    };
  });
}

// IDs activos del backend por tipo
function idsActivos(tipo) {
  // getOfertas devuelve arrays de objetos {id,name,price,...}
  const map = {
    relampago: _of.relampagoActivo,
    destacadas:_of.destacadasActivas,
    ultimas:   _of.ultimasSeleccionadas,
  };
  const arr = map[tipo];
  if (!arr) return null;
  return new Set(arr.map(p=>Number(p.id)));
}

function construirPools() {
  // Relámpago: productos con relampago>0, CRUZADOS con relampagoActivo (si existe)
  const idRel = idsActivos('relampago');
  _pools.relampago = _prods.filter(p=>{
    if (p.relampago<=0) return false;
    if (idRel) return idRel.has(p.id); // backend filtra por horario
    return true; // si no hay backend, mostrar todos con bandera
  }).map(p=>{
    const d=p.relampago;
    let precioOf=p.price, etiqueta='';
    if (d>=1&&d<=9)       { const arr=_of.relampagoActivo||[]; const bp=arr.find(x=>Number(x.id)===p.id); precioOf=bp?.priceOff??Math.round(p.price*(1-d/10)); etiqueta=d+'x'+(d-1); }
    else if (d===10)      { precioOf=Math.round(p.price*.5); etiqueta='2da 50%'; }
    else if (d>=11)       { const pct=[10,15,20,25,30][d-11]||10; precioOf=Math.round(p.price*(1-pct/100)); etiqueta='-'+pct+'%'; }
    return {...p, precioOf, etiqueta, descPct: Math.round((1-precioOf/p.price)*100) };
  });

  // Destacadas: tienen destacada>0, cruzar con destacadasActivas
  const idDes = idsActivos('destacadas');
  _pools.destacadas = _prods.filter(p=>{
    if (p.destacada<=0) return false;
    if (idDes) return idDes.has(p.id);
    return true;
  }).map(p=>({...p, precioOf:p.price, etiqueta:'DESTACADO', descPct:0}));

  // Especiales: especial===1
  _pools.especiales = _prods.filter(p=>p.especial===1)
    .map(p=>({...p, precioOf:p.price, etiqueta:'ESPECIAL', descPct:0}));

  // Promos: categoria PROMOS, normal>price, stock>0
  _pools.promos = _prods.filter(p=>
    p.category==='PROMOS' && p.normal>p.price && p.stock>0
  ).map(p=>({...p, precioOf:p.price, etiqueta:'PROMO', descPct:Math.round((1-p.price/p.normal)*100)}));

  // Últimas unidades
  const idUlt = idsActivos('ultimas');
  _pools.ultimas = _prods.filter(p=>{
    if (idUlt) return idUlt.has(p.id);
    return p.relampago>0 && p.stock>0 && p.stock<5;
  }).map(p=>({...p,precioOf:p.price,etiqueta:'ÚLTIMAS',descPct:0}));

  // Cervecero
  _pools.cervecero = (_cerv.productos||[]).map(p=>({
    id:Number(p.id||p.nombre),name:p.nombre||p.name,price:p.precio||p.price||0,
    normal:p.precio||p.price||0,stock:99,relampago:0,destacada:0,especial:0,
    precioOf:p.precioPromo>0?p.precioPromo:(p.precio||p.price||0),
    etiqueta:'CERVECERO',
    descPct:p.precio>0&&p.precioPromo>0?Math.round((1-p.precioPromo/p.precio)*100):0
  }));

  // Manual: todos los que tienen alguna oferta en la planilla (sin filtrar horario)
  const seen=new Set();
  _pools.manual=[];
  [..._pools.relampago,..._pools.destacadas,..._pools.especiales,..._pools.promos,..._pools.ultimas]
    .forEach(p=>{ if(!seen.has(p.id)){seen.add(p.id);_pools.manual.push(p);} });
}

// ── MODO ──────────────────────────────────────────────────────────────────────
function setModo(modo,btn) {
  _modo=modo; _sel.clear();
  document.querySelectorAll('.mb').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');
  $('cv').style.display='none';
  $('ph').style.display='flex';
  $('botonesAcc').style.display='none';
  if (_prods.length>0) poblarCandidatos();
}

function poblarCandidatos() {
  const max=parseInt($('cfgMax').value)||6;
  _cand=_pools[_modo]||[];
  _sel.clear();

  // Si el pool del modo actual está vacío, tomar de planilla sin filtro horario
  if (!_cand.length && _modo==='relampago') {
    _cand=_prods.filter(p=>p.relampago>0).map(p=>{
      const d=p.relampago;
      let precioOf=p.price,etiqueta='';
      if(d>=1&&d<=9){precioOf=Math.round(p.price*(1-1/(d+1)));etiqueta=d+'x'+(d-1);}
      else if(d===10){precioOf=Math.round(p.price*.5);etiqueta='2da 50%';}
      else if(d>=11){const pct=[10,15,20,25,30][d-11]||10;precioOf=Math.round(p.price*(1-pct/100));etiqueta='-'+pct+'%';}
      return {...p,precioOf,etiqueta,descPct:Math.round((1-precioOf/p.price)*100)};
    });
  }
  if (!_cand.length && _modo==='destacadas') {
    _cand=_prods.filter(p=>p.destacada>0).map(p=>({...p,precioOf:p.price,etiqueta:'DESTACADO',descPct:0}));
  }

  // Auto-seleccionar primeros
  _cand.slice(0,max).forEach(p=>_sel.add(p.id));
  renderCandidatos();
}

function renderCandidatos() {
  const sec=$('secProd'),lista=$('listaCand'),lbl=$('lblCand');
  if (!_cand.length){ sec.style.display='none'; return; }
  sec.style.display='block';
  lbl.textContent='('+_cand.length+' disponibles)';
  $('warnMax').style.display=_sel.size>9?'block':'none';
  lista.innerHTML=_cand.map(p=>{
    const s=_sel.has(p.id);
    const precioLabel = p.precioOf<p.price
      ? `<span style="text-decoration:line-through;opacity:.5">$${fmt(p.price)}</span> → $${fmt(p.precioOf)}`
      : `$${fmt(p.price)}`;
    return `<div class="pi${s?' sel':''}" onclick="toggleProd(${p.id},this)">
      <img class="pi-img" src="imagenes-productos/${slug(p.name)}.jpg" onerror="this.style.opacity='.3'" loading="lazy">
      <div class="pi-info">
        <div class="pi-nom">${p.name}</div>
        <div class="pi-pr">${precioLabel} ${p.etiqueta?'· <strong>'+p.etiqueta+'</strong>':''}</div>
      </div>
      <div class="pi-chk">${s?'✓':''}</div>
    </div>`;
  }).join('');
}

function toggleProd(id,el) {
  id=Number(id);
  if(_sel.has(id)){_sel.delete(id);el.classList.remove('sel');el.querySelector('.pi-chk').textContent='';}
  else            {_sel.add(id);   el.classList.add('sel');   el.querySelector('.pi-chk').textContent='✓';}
  $('warnMax').style.display=_sel.size>9?'block':'none';
}

// ── CANVAS HELPERS ─────────────────────────────────────────────────────────────
function mkCv(w,h){
  const cv=document.createElement('canvas');
  cv.width=w*S;cv.height=h*S;cv.style.width=w+'px';cv.style.height=h+'px';
  const ctx=cv.getContext('2d');ctx.scale(S,S);return{cv,ctx};
}
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function wrap(ctx,text,x,y,maxW,lh,maxL){
  const words=text.split(' ');let line='',lines=[];
  for(const w of words){const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;}
  if(line)lines.push(line);if(maxL)lines=lines.slice(0,maxL);
  lines.forEach((l,i)=>ctx.fillText(l,x,y+i*lh));
}
function loadImg(src){
  return new Promise(res=>{const img=new Image();img.onload=()=>res(img);img.onerror=()=>res(null);img.src=src;});
}
function drawBg(ctx,W,H,P,fk){
  const g=ctx.createLinearGradient(0,0,0,H);
  const maps={copihue:['#f4faf4','#e8f3e8'],crema:['#f5f0e0','#ede5cc'],oscuro:['#1a1a1a','#0d0d0d'],naranja:['#fff8f2','#fff0e0']};
  const [c1,c2]=maps[fk]||maps.copihue;
  g.addColorStop(0,c1);g.addColorStop(1,c2);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}
function drawStripe(ctx,W,H,P){ctx.fillStyle=P.acento;ctx.fillRect(0,0,W,4);ctx.fillRect(0,H-4,W,4);}
function drawHdr(ctx,W,info,P,y0=0){
  ctx.fillStyle=P.acento;ctx.fillRect(0,y0,W,4);
  ctx.fillStyle=P.acento;ctx.font='bold 24px "Syne",sans-serif';ctx.textAlign='center';
  ctx.fillText(info.titulo,W/2,y0+38);
  ctx.fillStyle=P.sub;ctx.font='12px "DM Sans",sans-serif';
  ctx.fillText(info.sub,W/2,y0+56);
  ctx.strokeStyle=P.linea;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(14,y0+66);ctx.lineTo(W-14,y0+66);ctx.stroke();
  return y0+76;
}
function drawFtr(ctx,W,H,P){
  const fy=H-44;
  ctx.strokeStyle=P.linea;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(14,fy);ctx.lineTo(W-14,fy);ctx.stroke();
  ctx.fillStyle=P.texto;ctx.font='bold 12px "DM Sans",sans-serif';ctx.textAlign='center';
  ctx.fillText([_emp.nombre,_emp.direccion,_emp.ciudad].filter(Boolean).join(' · '),W/2,fy+16);
  ctx.fillStyle=P.sub;ctx.font='10px "DM Sans",sans-serif';
  ctx.fillText(_emp.web||'Almacén Copihue',W/2,fy+30);
  ctx.fillStyle=P.acento;ctx.fillRect(0,H-4,W,4);
}
async function drawCard(ctx,p,cx,cy,CW,CH,FH,P,fk){
  ctx.fillStyle=P.bgCard;rr(ctx,cx,cy,CW,CH,10);ctx.fill();
  ctx.strokeStyle=P.borde;ctx.lineWidth=1;rr(ctx,cx,cy,CW,CH,10);ctx.stroke();
  const img=await loadImg('imagenes-productos/'+slug(p.name)+'.jpg');
  if(img){
    ctx.save();rr(ctx,cx+5,cy+5,CW-10,FH-2,7);ctx.clip();
    const iw=img.naturalWidth||img.width,ih=img.naturalHeight||img.height;
    const sc=Math.min((CW-10)/iw,(FH-2)/ih);
    ctx.drawImage(img,cx+5+(CW-10-iw*sc)/2,cy+5+(FH-2-ih*sc)/2,iw*sc,ih*sc);
    ctx.restore();
  } else {
    ctx.fillStyle=P.bgCard2;rr(ctx,cx+5,cy+5,CW-10,FH-2,7);ctx.fill();
    ctx.font='22px sans-serif';ctx.textAlign='center';ctx.fillText('🛒',cx+CW/2,cy+FH/2+10);
  }
  // Badge
  if(p.descPct>=5){
    ctx.fillStyle=P.acento;rr(ctx,cx+CW-44,cy+6,38,20,5);ctx.fill();
    ctx.fillStyle=P.badgeTxt;ctx.font='bold 10px "DM Sans",sans-serif';ctx.textAlign='center';
    ctx.fillText('-'+p.descPct+'%',cx+CW-25,cy+19);
  } else if(p.etiqueta){
    ctx.fillStyle=P.acento;rr(ctx,cx+4,cy+6,Math.min(p.etiqueta.length*6+8,CW-8),18,4);ctx.fill();
    ctx.fillStyle=P.badgeTxt;ctx.font='bold 8px "DM Sans",sans-serif';ctx.textAlign='left';
    ctx.fillText(p.etiqueta,cx+8,cy+18);
  }
  // Nombre
  ctx.fillStyle=P.texto;ctx.textAlign='center';
  ctx.font='bold 11px "DM Sans",sans-serif';
  wrap(ctx,corto(p.name,3),cx+CW/2,cy+FH+12,CW-10,13,2);
  // Precio tachado
  if(p.precioOf<p.price){
    ctx.fillStyle=P.tenue;ctx.font='10px "DM Mono",sans-serif';
    const t='$'+fmt(p.price),tw=ctx.measureText(t).width,px=cx+CW/2;
    ctx.fillText(t,px,cy+FH+32);
    ctx.strokeStyle=P.tenue;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(px-tw/2,cy+FH+29);ctx.lineTo(px+tw/2,cy+FH+29);ctx.stroke();
  }
  // Precio oferta
  ctx.fillStyle=P.acento;ctx.font='bold 15px "DM Sans",sans-serif';ctx.textAlign='center';
  ctx.fillText('$'+fmt(p.precioOf),cx+CW/2,cy+CH-8);
}

// ── FORMATOS ──────────────────────────────────────────────────────────────────
async function dibujarGrid(prods,fk){
  const P=PALETAS[fk],W=600;
  const COLS=prods.length<=1?1:prods.length<=4?2:3;
  const ROWS=Math.ceil(prods.length/COLS);
  const PAD=12,GAP=7;
  const CW=Math.floor((W-PAD*2-GAP*(COLS-1))/COLS);
  const FH=COLS===3?86:COLS===2?104:130;
  const CH=FH+62;
  const H=78+ROWS*CH+(ROWS-1)*GAP+PAD+50;
  const {cv,ctx}=mkCv(W,H);
  drawBg(ctx,W,H,P,fk);
  const sy=drawHdr(ctx,W,MODO_HDR[_modo]||MODO_HDR.manual,P);
  await Promise.all(prods.map((p,i)=>{
    const col=i%COLS,row=Math.floor(i/COLS);
    return drawCard(ctx,p,PAD+col*(CW+GAP),sy+row*(CH+GAP),CW,CH,FH,P,fk);
  }));
  drawFtr(ctx,W,H,P);return cv;
}

      ctx.fillStyle=P.acento;rr(ctx,W-PAD-38,y+10,34,18,4);ctx.fill();

async function dibujarBanner(prods,fk){
  const P=PALETAS[fk],maxB=Math.min(prods.length,4),pB=prods.slice(0,maxB);
  const W=820,H=360;const{cv,ctx}=mkCv(W,H);drawBg(ctx,W,H,P,fk);

  const HDR=48;ctx.fillStyle=P.acento;ctx.fillRect(0,0,W,HDR);
  ctx.fillStyle='#fff';ctx.font='bold 18px "Syne",sans-serif';ctx.textAlign='center';
  ctx.fillText(_emp.nombre.toUpperCase()+'  ·  '+info.titulo.replace(/^[^\s]+\s/,''),W/2,32);
  const PAD=10,GAP=6,CW=Math.floor((W-PAD*2-GAP*(maxB-1))/maxB);
  const sy=HDR+PAD,CH=H-HDR-PAD*2-28,FH=Math.min(Math.floor(CH*.54),110);
  await Promise.all(pB.map((p,i)=>drawCard(ctx,p,PAD+i*(CW+GAP),sy,CW,CH,FH,P,fk)));
  ctx.fillStyle=P.sub;ctx.font='10px "DM Sans",sans-serif';ctx.textAlign='center';
  ctx.fillText([_emp.nombre,_emp.direccion,_emp.ciudad,_emp.web].filter(Boolean).join(' · '),W/2,H-8);
  ctx.fillStyle=P.acento;ctx.fillRect(0,H-4,W,4);return cv;
}

// ── GENERAR ────────────────────────────────────────────────────────────────────
async function generarFlyer(){
  const prods=_cand.filter(p=>_sel.has(p.id));
  if(!prods.length){alert('Seleccioná al menos un producto');return;}
  if(prods.length>9){alert('Máximo 9 productos');return;}
  const fk=$('cfgFondo').value,fmt=$('cfgFormato').value;
  ld(true,'Generando flyer...');
  try{
    const fns={lista:dibujarLista,story:dibujarStory,banner:dibujarBanner,
      cuadrado:dibujarGrid, grid:dibujarGrid};
    _cvFin=await (fns[fmt]||dibujarGrid)(prods,fk);
    const c=$('cv');
    c.width=_cvFin.width;c.height=_cvFin.height;
    c.style.width=(_cvFin.width/S)+'px';c.style.height=(_cvFin.height/S)+'px';
    c.getContext('2d').drawImage(_cvFin,0,0);
    c.style.display='block';
    $('ph').style.display='none';
    $('botonesAcc').style.display='flex';
  }catch(e){alert('❌ Error: '+e.message);console.error(e);}
  ld(false);
}

// ── EXPORTAR ───────────────────────────────────────────────────────────────────
function descargar(){
  if(!_cvFin)return;
  const a=document.createElement('a');
  a.download='copihue-flyer-'+_modo+'-'+Date.now()+'.jpg';
  a.href=_cvFin.toDataURL('image/jpeg',.93);a.click();
}
async function compartirWA(){
  if(!_cvFin)return;
  _cvFin.toBlob(async blob=>{
    const file=new File([blob],'copihue-flyer.jpg',{type:'image/jpeg'});
    if(navigator.share&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'Flyer '+_emp.nombre,
        text:'🏷️ ¡Ofertas en '+_emp.nombre+'!\n'+((_emp.web)?'🛒 '+_emp.web:'')});
    } else {
      const a=document.createElement('a');a.href=_cvFin.toDataURL('image/jpeg',.93);
      a.download='copihue-flyer.jpg';a.click();
      setTimeout(()=>window.open('https://wa.me/'+_emp.telefono,'_blank'),400);
    }
  },'image/jpeg',.93);
}

// ── INIT ───────────────────────────────────────────────────────────────────────
$('cfgMax').addEventListener('change',()=>{ if(_prods.length>0)poblarCandidatos(); });
recargar();
</script>
