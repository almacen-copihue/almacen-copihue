<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copihue Flyer v1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap');

  :root {
    --rojo: #c62828;
    --rojo-osc: #8e0000;
    --crema: #f5f0e0;
    --crema-osc: #e8e0c8;
    --negro: #1a0a00;
    --dorado: #c8a84b;
    --verde: #2e7d32;
    --azul: #1565c0;
    --naranja: #e65100;
    --teal: #00838f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #111;
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .app-header {
    background: linear-gradient(135deg, var(--rojo-osc), var(--rojo));
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--dorado);
    position: sticky; top: 0; z-index: 100;
  }
  .app-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: var(--crema);
  }
  .app-header span {
    font-size: 0.65rem;
    color: rgba(245,240,224,0.6);
    display: block;
    letter-spacing: 1px;
  }
  .badge-version {
    background: rgba(0,0,0,0.3);
    color: var(--dorado);
    font-size: 0.65rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid var(--dorado);
  }

  /* LAYOUT */
  .main {
    display: flex;
    flex: 1;
    gap: 0;
    max-height: calc(100vh - 62px);
  }

  /* PANEL IZQUIERDO — controles */
  .panel-ctrl {
    width: 300px;
    min-width: 260px;
    background: #1a1a1a;
    border-right: 1px solid #333;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .section-label {
    font-size: 0.6rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--dorado);
    border-bottom: 1px solid #333;
    padding-bottom: 6px;
    margin-bottom: 4px;
  }

  /* MODO selector */
  .modo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .modo-btn {
    padding: 10px 6px;
    border-radius: 10px;
    border: 2px solid #333;
    background: #252525;
    color: rgba(255,255,255,0.5);
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    line-height: 1.4;
  }
  .modo-btn.activo {
    border-color: var(--dorado);
    background: rgba(200,168,75,0.12);
    color: var(--dorado);
  }
  .modo-btn .modo-emoji { font-size: 1.4rem; display: block; margin-bottom: 3px; }

  /* CONFIGURACIÓN */
  .config-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .config-row label {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.6);
    flex: 1;
  }
  .config-row select, .config-row input[type=text], .config-row input[type=number] {
    background: #2a2a2a;
    border: 1px solid #444;
    color: white;
    border-radius: 8px;
    padding: 5px 8px;
    font-size: 0.75rem;
    flex: 1;
    max-width: 140px;
  }

  /* PRODUCTOS seleccionados */
  .prod-list { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
  .prod-item {
    display: flex; align-items: center; gap: 8px;
    background: #252525; border-radius: 8px; padding: 7px 8px;
    border: 1px solid #333; cursor: pointer; transition: all 0.15s;
  }
  .prod-item:hover { border-color: #555; }
  .prod-item.selected { border-color: var(--dorado); background: rgba(200,168,75,0.1); }
  .prod-item img { width: 36px; height: 36px; object-fit: contain; border-radius: 5px; background: #333; flex-shrink: 0; }
  .prod-item-info { flex: 1; min-width: 0; }
  .prod-item-nom { font-size: 0.7rem; font-weight: 700; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .prod-item-precio { font-size: 0.65rem; color: rgba(255,255,255,0.5); }
  .prod-check { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #555; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; }
  .prod-item.selected .prod-check { border-color: var(--dorado); background: var(--dorado); color: #111; }

  /* BOTONES acción */
  .btn-generar {
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }
  .btn-generar.primary { background: var(--dorado); color: var(--negro); }
  .btn-generar.primary:hover { background: #e0bb5a; }
  .btn-generar.secondary { background: #252525; color: rgba(255,255,255,0.6); border: 1px solid #444; font-family: 'Nunito', sans-serif; font-size: 0.8rem; }

  /* PANEL DERECHO — preview */
  .panel-preview {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px;
    overflow-y: auto;
    background: #111;
    gap: 14px;
  }

  .preview-placeholder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 300px; color: rgba(255,255,255,0.2);
    font-size: 3rem; gap: 12px;
  }
  .preview-placeholder p { font-size: 0.85rem; color: rgba(255,255,255,0.3); }

  #canvasPreview {
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    max-width: 100%;
    display: none;
  }

  .btn-row {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  }
  .btn-accion {
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.2s;
  }
  .btn-wa { background: #25D366; color: white; }
  .btn-dl { background: var(--dorado); color: var(--negro); }
  .btn-copy { background: #333; color: white; border: 1px solid #555; }

  /* LOADING */
  .loading-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; display: none;
  }
  .loading-spinner {
    text-align: center; color: white;
    font-size: 2rem;
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* WARNING */
  .warning {
    background: rgba(198,40,40,0.15); border: 1px solid var(--rojo);
    border-radius: 10px; padding: 10px 14px;
    font-size: 0.78rem; color: #ef9a9a; display: none;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  @media (max-width: 640px) {
    .main { flex-direction: column; max-height: none; }
    .panel-ctrl { width: 100%; border-right: none; border-bottom: 1px solid #333; }
    .panel-preview { padding: 14px; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div>
    <h1>🖼 Copihue Flyer</h1>
    <span>Generador de flyers para redes</span>
  </div>
  <span class="badge-version">v1</span>
</header>

<div class="main">

  <!-- PANEL CONTROLES -->
  <div class="panel-ctrl">

    <div>
      <div class="section-label">Tipo de flyer</div>
      <div class="modo-grid">
        <button class="modo-btn activo" data-modo="relampago" onclick="seleccionarModo('relampago', this)">
          <span class="modo-emoji">⚡</span>Relámpago
        </button>
        <button class="modo-btn" data-modo="destacadas" onclick="seleccionarModo('destacadas', this)">
          <span class="modo-emoji">🔥</span>Destacadas
        </button>
        <button class="modo-btn" data-modo="especiales" onclick="seleccionarModo('especiales', this)">
          <span class="modo-emoji">⭐</span>Especiales
        </button>
        <button class="modo-btn" data-modo="ultimas" onclick="seleccionarModo('ultimas', this)">
          <span class="modo-emoji">🏷️</span>Últimas Unidades
        </button>
        <button class="modo-btn" data-modo="cervecero" onclick="seleccionarModo('cervecero', this)" style="grid-column:span 2;">
          <span class="modo-emoji">🍺</span>Jueves Cervecero
        </button>
        <button class="modo-btn" data-modo="manual" onclick="seleccionarModo('manual', this)" style="grid-column:span 2;">
          <span class="modo-emoji">✏️</span>Selección manual
        </button>
      </div>
    </div>

    <div>
      <div class="section-label">Diseño</div>
      <div class="config-row">
        <label>Formato</label>
        <select id="cfgFormato">
          <option value="grid">Grid (Instagram)</option>
          <option value="lista">Lista (WhatsApp)</option>
        </select>
      </div>
      <div class="config-row" style="margin-top:8px;">
        <label>Fondo</label>
        <select id="cfgFondo">
          <option value="crema">Crema (local)</option>
          <option value="negro">Negro</option>
          <option value="rojo">Rojo Copihue</option>
        </select>
      </div>
      <div class="config-row" style="margin-top:8px;" id="rowMaxProd">
        <label>Máx. productos</label>
        <input type="number" id="cfgMax" value="6" min="1" max="8" style="max-width:70px;">
      </div>
    </div>

    <div id="seccionProductos" style="display:none;">
      <div class="section-label">Productos disponibles <span id="lblCandidatos" style="color:rgba(255,255,255,0.4);font-weight:400;text-transform:none;letter-spacing:0;"></span></div>
      <div class="warning" id="warnMax">⚠️ Máximo 8 productos para el flyer. Deseleccioná algunos.</div>
      <div class="prod-list" id="listaCandidatos"></div>
    </div>

    <button class="btn-generar primary" onclick="generarFlyer()">⚡ GENERAR FLYER</button>
    <button class="btn-generar secondary" onclick="cargarDatos()">↺ Recargar datos</button>

    <div style="font-size:0.65rem;color:rgba(255,255,255,0.25);text-align:center;line-height:1.6;">
      Almacén Copihue · Copihue 457, Bariloche<br>almacen-copihue.vercel.app
    </div>
  </div>

  <!-- PANEL PREVIEW -->
  <div class="panel-preview">
    <div class="preview-placeholder" id="placeholder">
      <span>🖼️</span>
      <p>Seleccioná un tipo de flyer y presioná Generar</p>
    </div>
    <canvas id="canvasPreview"></canvas>
    <div class="btn-row" id="botonesAccion" style="display:none;">
      <button class="btn-accion btn-wa" onclick="compartirWA()">📲 WhatsApp</button>
      <button class="btn-accion btn-dl" onclick="descargar()">💾 Descargar</button>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner">⏳</div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxhKFk2WAi-KRY5xGBsI6_6Pvp3jDjt8mSRXvy7I1WehNmBpJamqK9G9Q1ZJSCSgAdfDA/exec';
const TIMEOUT = 15000;

let _modo = 'relampago';
let _datos = null;          // raw getOfertas response
let _candidatos = [];       // productos del modo actual
let _seleccionados = new Set();
let _canvas = null;

// ─── UTILS ───────────────────────────────────────────────────────────────────
function fmt(n) { return Math.round(n).toLocaleString('es-AR'); }

function slug(nombre) {
  return nombre.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').trim();
}

function nombreCorto(nombre, maxWords = 4) {
  return nombre
    .replace(/\b(\d+\s*gr|\d+\s*kg|\d+\s*ml|\d+\s*l|x\s*\d+|\d+\s*u|x\s*kg)\b/gi, '')
    .replace(/\s+/g, ' ').trim()
    .split(' ').slice(0, maxWords).join(' ');
}

async function apiFetch(action, data) {
  const url = data
    ? API + '?action=' + action + '&data=' + encodeURIComponent(JSON.stringify(data)) + '&t=' + Date.now()
    : API + '?action=' + action + '&t=' + Date.now();
  const r = await fetch(url, { redirect: 'follow', signal: AbortSignal.timeout(TIMEOUT) });
  return r.json();
}

function loading(show) {
  document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
}

// ─── MODO ────────────────────────────────────────────────────────────────────
function seleccionarModo(modo, btn) {
  _modo = modo;
  _seleccionados.clear();
  document.querySelectorAll('.modo-btn').forEach(b => b.classList.remove('activo'));
  btn.classList.add('activo');
  document.getElementById('seccionProductos').style.display = 'none';
  document.getElementById('canvasPreview').style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('botonesAccion').style.display = 'none';
  if (_datos) poblarCandidatos();
}

// ─── CARGA DE DATOS ──────────────────────────────────────────────────────────
async function cargarDatos() {
  loading(true);
  try {
    const [ofertas, cervecero] = await Promise.all([
      apiFetch('getOfertas'),
      apiFetch('getJuevesCervecero')
    ]);
    _datos = { ofertas, cervecero };
    poblarCandidatos();
  } catch(e) {
    alert('❌ Error cargando datos: ' + e.message);
  }
  loading(false);
}

function poblarCandidatos() {
  if (!_datos) return;
  const { ofertas, cervecero } = _datos;
  _candidatos = [];
  _seleccionados.clear();

  if (_modo === 'cervecero') {
    _candidatos = (cervecero.productos || []).map(p => ({
      id: p.id || p.nombre,
      nombre: p.nombre,
      precio: p.precio,
      precioOferta: p.precioOferta || p.precio,
      descPct: p.descuento || 0,
      esManual: false
    }));
    // Auto-seleccionar todos (hasta 8)
    _candidatos.slice(0, 8).forEach(p => _seleccionados.add(p.id));

  } else if (_modo === 'relampago') {
    const pool = ofertas.relampagoActivo || [];
    _candidatos = pool.map(p => ({
      id: p.id, nombre: p.nombre || p.name,
      precio: p.precio || p.price,
      precioOferta: p.precioOferta || Math.round((p.precio || p.price) * (1 - (p.relampago || 10)/100)),
      descPct: p.relampago || p.descuento || 10
    }));
    _candidatos.slice(0, 6).forEach(p => _seleccionados.add(p.id));

  } else if (_modo === 'destacadas') {
    _candidatos = (ofertas.destacadasActivas || []).map(p => ({
      id: p.id, nombre: p.nombre || p.name,
      precio: p.precio || p.price,
      precioOferta: Math.round((p.precio || p.price) * 0.9),
      descPct: 10
    }));
    _candidatos.slice(0, 6).forEach(p => _seleccionados.add(p.id));

  } else if (_modo === 'especiales') {
    _candidatos = (ofertas.especialesActivas || []).map(p => ({
      id: p.id, nombre: p.nombre || p.name,
      precio: p.precio || p.price,
      precioOferta: Math.round((p.precio || p.price) * 0.9),
      descPct: 10
    }));
    _candidatos.slice(0, 6).forEach(p => _seleccionados.add(p.id));

  } else if (_modo === 'ultimas') {
    _candidatos = (ofertas.ultimasSeleccionadas || []).map(p => ({
      id: p.id, nombre: p.nombre || p.name,
      precio: p.precio || p.price,
      precioOferta: p.precioOferta || Math.round((p.precio || p.price) * 0.9),
      descPct: p.relampago || 10,
      diasParaVencer: p.diasParaVencer
    }));
    _candidatos.slice(0, 6).forEach(p => _seleccionados.add(p.id));

  } else if (_modo === 'manual') {
    // Mezcla de todos
    const vistos = new Set();
    const agregar = (arr, descPct) => (arr || []).forEach(p => {
      if (vistos.has(p.id)) return; vistos.add(p.id);
      _candidatos.push({ id: p.id, nombre: p.nombre || p.name, precio: p.precio || p.price,
        precioOferta: Math.round((p.precio || p.price) * (1 - descPct/100)), descPct });
    });
    agregar(ofertas.relampagoActivo, 10);
    agregar(ofertas.destacadasActivas, 10);
    agregar(ofertas.especialesActivas, 10);
    agregar(ofertas.ultimasSeleccionadas, 10);
  }

  renderListaCandidatos();
}

function renderListaCandidatos() {
  const contenedor = document.getElementById('seccionProductos');
  const lista = document.getElementById('listaCandidatos');
  const lbl = document.getElementById('lblCandidatos');
  const warn = document.getElementById('warnMax');

  if (_candidatos.length === 0) {
    contenedor.style.display = 'none';
    return;
  }
  contenedor.style.display = 'block';
  lbl.textContent = `(${_candidatos.length})`;
  warn.style.display = _seleccionados.size > 8 ? 'block' : 'none';

  lista.innerHTML = _candidatos.map(p => {
    const sel = _seleccionados.has(p.id);
    return `<div class="prod-item ${sel ? 'selected' : ''}" onclick="toggleProd('${p.id}', this)">
      <img src="imagenes-productos/${slug(p.nombre)}.jpg" onerror="this.style.display='none'" loading="lazy">
      <div class="prod-item-info">
        <div class="prod-item-nom">${p.nombre}</div>
        <div class="prod-item-precio">$${fmt(p.precioOferta)} <span style="text-decoration:line-through;opacity:0.4;">$${fmt(p.precio)}</span></div>
      </div>
      <div class="prod-check">${sel ? '✓' : ''}</div>
    </div>`;
  }).join('');
}

function toggleProd(id, el) {
  const idN = isNaN(id) ? id : Number(id);
  if (_seleccionados.has(idN)) { _seleccionados.delete(idN); el.classList.remove('selected'); el.querySelector('.prod-check').textContent = ''; }
  else { _seleccionados.add(idN); el.classList.add('selected'); el.querySelector('.prod-check').textContent = '✓'; }
  document.getElementById('warnMax').style.display = _seleccionados.size > 8 ? 'block' : 'none';
}

// ─── GENERADOR DE CANVAS ─────────────────────────────────────────────────────
async function generarFlyer() {
  if (!_datos) { await cargarDatos(); }
  if (!_datos) return;

  const prods = _candidatos.filter(p => _seleccionados.has(p.id) || _seleccionados.has(Number(p.id)));
  if (!prods.length) { alert('Seleccioná al menos un producto'); return; }
  if (prods.length > 8) { alert('Máximo 8 productos'); return; }

  const formato = document.getElementById('cfgFormato').value;
  const fondo   = document.getElementById('cfgFondo').value;

  loading(true);
  try {
    _canvas = formato === 'lista'
      ? await dibujarLista(prods, fondo)
      : await dibujarGrid(prods, fondo);

    const cv = document.getElementById('canvasPreview');
    cv.width  = _canvas.width;
    cv.height = _canvas.height;
    cv.getContext('2d').drawImage(_canvas, 0, 0);
    cv.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('botonesAccion').style.display = 'flex';
  } catch(e) { alert('❌ Error generando flyer: ' + e.message); console.error(e); }
  loading(false);
}

// ─── COLORES Y PALETAS ───────────────────────────────────────────────────────
const PALETAS = {
  crema: { bg: '#f5f0e0', bgCard: '#ffffff', acento: '#c62828', texto: '#2e1a0e', subtexto: '#8a6040', borde: '#e0d5b0', linea: '#c8b87a', footer: '#f0e8d0' },
  negro: { bg: '#111111', bgCard: '#1e1e1e', acento: '#f9a825', texto: '#ffffff', subtexto: '#aaaaaa', borde: '#333333', linea: '#444444', footer: '#1a1a1a' },
  rojo:  { bg: '#8e0000', bgCard: '#c62828', acento: '#f9a825', texto: '#ffffff', subtexto: 'rgba(255,255,255,0.7)', borde: 'rgba(255,255,255,0.2)', linea: '#f9a825', footer: '#6d0000' }
};

const MODO_HEADERS = {
  relampago:  { titulo: '⚡ OFERTA RELÁMPAGO', sub: 'Solo por tiempo limitado' },
  destacadas: { titulo: '🔥 DESTACADAS', sub: 'Los favoritos de nuestros clientes' },
  especiales: { titulo: '⭐ ESPECIALES', sub: 'Precios especiales seleccionados' },
  ultimas:    { titulo: '🏷️ ÚLTIMAS UNIDADES', sub: '¡Quedan pocas! Aprovechá antes que se acaben' },
  cervecero:  { titulo: '🍺 JUEVES CERVECERO', sub: 'Ofertas en cervezas — solo esta noche 🕙' },
  manual:     { titulo: '🏷️ OFERTAS DEL DÍA', sub: 'Almacén Copihue' }
};

// ─── CANVAS GRID ─────────────────────────────────────────────────────────────
async function dibujarGrid(prods, fondoKey) {
  const P = PALETAS[fondoKey];
  const W = 600;
  const COLS = prods.length <= 2 ? 2 : prods.length <= 4 ? 2 : 3;
  const ROWS = Math.ceil(prods.length / COLS);
  const PAD = 16, GAP = 8;
  const CELL_W = Math.floor((W - PAD*2 - GAP*(COLS-1)) / COLS);
  const FOTO_H = 110, TEXTO_H = 70;
  const CELL_H = FOTO_H + TEXTO_H;
  const HEADER_H = 90, FOOTER_H = 52;
  const H = HEADER_H + ROWS * CELL_H + (ROWS-1) * GAP + PAD + FOOTER_H;

  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  const info = MODO_HEADERS[_modo] || MODO_HEADERS.manual;

  // Fondo
  ctx.fillStyle = P.bg; ctx.fillRect(0, 0, W, H);

  // Textura crema
  if (fondoKey === 'crema') {
    ctx.strokeStyle = 'rgba(180,150,80,0.06)'; ctx.lineWidth = 1;
    for (let y = 0; y < H; y += 10) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  }

  // Header
  ctx.fillStyle = P.acento;
  ctx.font = 'bold 26px "Bebas Neue", sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(info.titulo, W/2, 40);
  ctx.fillStyle = P.texto; ctx.font = 'bold 13px Nunito, sans-serif';
  ctx.fillText(info.sub, W/2, 60);
  ctx.strokeStyle = P.linea; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(PAD, 72); ctx.lineTo(W-PAD, 72); ctx.stroke();

  // Celdas con fotos async
  await Promise.all(prods.map((p, i) => new Promise(resolve => {
    const col = i % COLS, row = Math.floor(i / COLS);
    const cx = PAD + col * (CELL_W + GAP);
    const cy = HEADER_H + row * (CELL_H + GAP);

    // Card bg
    ctx.fillStyle = P.bgCard; rr(ctx, cx, cy, CELL_W, CELL_H, 12); ctx.fill();
    ctx.strokeStyle = P.borde; ctx.lineWidth = 1; rr(ctx, cx, cy, CELL_W, CELL_H, 12); ctx.stroke();

    // Badge descuento
    if (p.descPct > 0) {
      ctx.fillStyle = P.acento; rr(ctx, cx+CELL_W-46, cy+6, 40, 22, 6); ctx.fill();
      ctx.fillStyle = fondoKey === 'crema' ? 'white' : '#111';
      ctx.font = 'bold 11px Nunito, sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('-' + p.descPct + '%', cx+CELL_W-26, cy+21);
    }

    const dibujarTexto = () => {
      const nom = nombreCorto(p.nombre, 3);
      ctx.fillStyle = P.texto; ctx.textAlign = 'center';
      ctx.font = 'bold 12px Nunito, sans-serif';
      wrapText(ctx, nom, cx+CELL_W/2, cy+FOTO_H+18, CELL_W-14, 15, 2);

      if (p.precio !== p.precioOferta) {
        ctx.fillStyle = P.subtexto; ctx.font = '11px Nunito, sans-serif';
        const txt = '$' + fmt(p.precio);
        const tw = ctx.measureText(txt).width;
        const px = cx+CELL_W/2;
        ctx.fillText(txt, px, cy+FOTO_H+42);
        ctx.strokeStyle = P.subtexto; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(px-tw/2, cy+FOTO_H+39); ctx.lineTo(px+tw/2, cy+FOTO_H+39); ctx.stroke();
      }

      ctx.fillStyle = P.acento; ctx.font = 'bold 19px Nunito, sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('$' + fmt(p.precioOferta), cx+CELL_W/2, cy+CELL_H-10);
      resolve();
    };

    const img = new Image();
    img.onload = () => {
      ctx.save(); rr(ctx, cx+8, cy+8, CELL_W-16, FOTO_H-8, 8); ctx.clip();
      ctx.drawImage(img, cx+8, cy+8, CELL_W-16, FOTO_H-8); ctx.restore();
      dibujarTexto();
    };
    img.onerror = () => {
      ctx.fillStyle = fondoKey === 'crema' ? '#f0ebe0' : '#2a2a2a';
      rr(ctx, cx+8, cy+8, CELL_W-16, FOTO_H-8, 8); ctx.fill();
      ctx.font = '30px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('🛒', cx+CELL_W/2, cy+FOTO_H/2+14);
      dibujarTexto();
    };
    img.src = 'imagenes-productos/' + slug(p.nombre) + '.jpg';
  })));

  // Footer
  const fy = H - FOOTER_H + 6;
  ctx.strokeStyle = P.linea; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(PAD, fy); ctx.lineTo(W-PAD, fy); ctx.stroke();
  ctx.fillStyle = P.texto; ctx.font = 'bold 14px Nunito, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Almacén Copihue · Copihue 457, Bariloche', W/2, fy+22);
  ctx.fillStyle = P.subtexto; ctx.font = '11px Nunito, sans-serif';
  ctx.fillText('almacen-copihue.vercel.app', W/2, fy+38);

  return cv;
}

// ─── CANVAS LISTA ─────────────────────────────────────────────────────────────
async function dibujarLista(prods, fondoKey) {
  const P = PALETAS[fondoKey];
  const W = 500;
  const ROW = 76, HEADER_H = 88, FOOTER_H = 48, GAP = 1, PAD = 12;
  const H = HEADER_H + prods.length * ROW + (prods.length-1) * GAP + PAD + FOOTER_H;
  const info = MODO_HEADERS[_modo] || MODO_HEADERS.manual;

  const cv = document.createElement('canvas'); cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');

  ctx.fillStyle = P.bg; ctx.fillRect(0,0,W,H);

  // Header
  ctx.fillStyle = P.acento; ctx.font = 'bold 28px "Bebas Neue", sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(info.titulo, W/2, 42);
  ctx.fillStyle = P.texto; ctx.font = 'bold 13px Nunito, sans-serif';
  ctx.fillText(info.sub, W/2, 62);
  ctx.strokeStyle = P.linea; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(PAD, 74); ctx.lineTo(W-PAD, 74); ctx.stroke();

  await Promise.all(prods.map((p, i) => new Promise(resolve => {
    const y = HEADER_H + i * (ROW + GAP);
    ctx.fillStyle = i%2===0 ? 'rgba(0,0,0,0.04)' : 'rgba(0,0,0,0.0)';
    ctx.fillRect(0, y, W, ROW);
    ctx.fillStyle = P.acento; ctx.fillRect(0, y, 4, ROW);

    const FOTO = 52;
    const dibujarTexto = () => {
      const nom = nombreCorto(p.nombre, 4);
      ctx.fillStyle = P.texto; ctx.textAlign = 'left';
      ctx.font = 'bold 14px Nunito, sans-serif';
      wrapText(ctx, nom, 72, y+24, W-170, 17, 2);

      ctx.fillStyle = P.acento; ctx.font = 'bold 20px Nunito, sans-serif'; ctx.textAlign = 'right';
      ctx.fillText('$' + fmt(p.precioOferta), W-PAD-46, y+34);
      if (p.precio !== p.precioOferta) {
        ctx.fillStyle = P.subtexto; ctx.font = '11px Nunito, sans-serif';
        const txt = '$' + fmt(p.precio); const tw = ctx.measureText(txt).width;
        ctx.fillText(txt, W-PAD-46, y+52);
        ctx.strokeStyle = P.subtexto; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(W-PAD-46-tw, y+49); ctx.lineTo(W-PAD-46, y+49); ctx.stroke();
      }
      if (p.descPct > 0) {
        ctx.fillStyle = P.acento; rr(ctx, W-PAD-42, y+12, 38, 20, 4); ctx.fill();
        ctx.fillStyle = fondoKey==='crema'?'white':'#111'; ctx.font = 'bold 10px Nunito,sans-serif'; ctx.textAlign='center';
        ctx.fillText('-'+p.descPct+'%', W-PAD-23, y+25);
      }
      ctx.strokeStyle = P.borde; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(16, y+ROW); ctx.lineTo(W-16, y+ROW); ctx.stroke();
      resolve();
    };

    const img = new Image();
    img.onload = () => {
      ctx.save(); rr(ctx, 12, y+12, FOTO, FOTO, 8); ctx.clip();
      ctx.drawImage(img, 12, y+12, FOTO, FOTO); ctx.restore();
      dibujarTexto();
    };
    img.onerror = () => {
      ctx.fillStyle = fondoKey==='crema'?'#f0ebe0':'#222';
      rr(ctx, 12, y+12, FOTO, FOTO, 8); ctx.fill();
      ctx.font='22px sans-serif'; ctx.textAlign='center';
      ctx.fillText('🛒', 38, y+44);
      dibujarTexto();
    };
    img.src = 'imagenes-productos/'+slug(p.nombre)+'.jpg';
  })));

  const fy = H-FOOTER_H+6;
  ctx.strokeStyle = P.linea; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(PAD,fy); ctx.lineTo(W-PAD,fy); ctx.stroke();
  ctx.fillStyle=P.texto; ctx.font='bold 13px Nunito,sans-serif'; ctx.textAlign='center';
  ctx.fillText('Almacén Copihue · Copihue 457, Bariloche', W/2, fy+20);
  ctx.fillStyle=P.subtexto; ctx.font='11px Nunito,sans-serif';
  ctx.fillText('almacen-copihue.vercel.app', W/2, fy+36);

  return cv;
}

// ─── HELPERS CANVAS ──────────────────────────────────────────────────────────
function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lineH, maxLines) {
  const words = text.split(' '); let line='', lines=[];
  for (const w of words) {
    const t = line ? line+' '+w : w;
    if (ctx.measureText(t).width > maxW && line) { lines.push(line); line=w; } else line=t;
  }
  if (line) lines.push(line);
  if (maxLines) lines = lines.slice(0, maxLines);
  lines.forEach((l,i) => ctx.fillText(l, x, y+i*lineH));
}

// ─── COMPARTIR / DESCARGAR ───────────────────────────────────────────────────
function descargar() {
  if (!_canvas) return;
  const link = document.createElement('a');
  link.download = 'copihue-flyer-' + _modo + '-' + Date.now() + '.jpg';
  link.href = _canvas.toDataURL('image/jpeg', 0.93);
  link.click();
}

async function compartirWA() {
  if (!_canvas) return;
  try {
    _canvas.toBlob(async blob => {
      const file = new File([blob], 'copihue-flyer.jpg', { type: 'image/jpeg' });
      if (navigator.share && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'Flyer Copihue', text: '🏷️ ¡Ofertas en Almacén Copihue!\n🛒 almacen-copihue.vercel.app' });
      } else {
        const url = _canvas.toDataURL('image/jpeg', 0.93);
        const a = document.createElement('a'); a.href = url; a.download = 'copihue-flyer.jpg'; a.click();
        setTimeout(() => window.open('https://wa.me/', '_blank'), 600);
      }
    }, 'image/jpeg', 0.93);
  } catch(e) { console.error(e); }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
cargarDatos();
