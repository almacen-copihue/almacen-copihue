<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Copihue · Dashboard v3</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --verde:#2e7d32;--vd:#1b5e20;--vdp:#0a3d0f;--vl:#e8f5e9;
  --naranja:#f57c00;--nl:#fff3e0;
  --rojo:#c62828;--rl:#ffebee;
  --azul:#1565c0;--al:#e3f2fd;
  --morado:#6a1b9a;
  --gris:#546e7a;--bg:#f1f8f1;--borde:#c8e6c9;--texto:#1a2e1c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--texto);min-height:100dvh}

.hdr{background:linear-gradient(135deg,var(--vdp),var(--vd),var(--verde));padding:11px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(10,61,15,.4);position:sticky;top:0;z-index:100}
.hdr-icon{font-size:1.5rem}
.hdr-t{color:#fff;font-size:.95rem;font-weight:900}
.hdr-s{color:rgba(255,255,255,.7);font-size:.62rem;letter-spacing:2px;text-transform:uppercase}
.badge-v{font-size:.6rem;background:rgba(255,255,255,.25);padding:2px 7px;border-radius:10px;font-weight:900;letter-spacing:.5px;color:#fff;margin-left:5px}
.btn-back{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:20px;padding:5px 13px;font-size:.76rem;font-weight:700;cursor:pointer;font-family:inherit}
.btn-reload{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:20px;padding:5px 10px;font-size:.76rem;font-weight:700;cursor:pointer;font-family:inherit}

.wrap{padding:12px}
.sec-title{font-size:.7rem;font-weight:900;color:var(--gris);text-transform:uppercase;letter-spacing:1.5px;margin:14px 0 8px}

/* CARDS */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.card{background:#fff;border-radius:14px;padding:12px;border:1px solid var(--borde)}
.card.full{grid-column:1/-1}
.card.vg{background:linear-gradient(135deg,#1b5e20,#2e7d32);border:none;color:#fff}
.card.rg{background:linear-gradient(135deg,#b71c1c,#c62828);border:none;color:#fff}
.card.ng{background:linear-gradient(135deg,#e65100,#f57c00);border:none;color:#fff}
.card.ag{background:linear-gradient(135deg,#0d47a1,#1565c0);border:none;color:#fff}
.card.pg{background:linear-gradient(135deg,#4a148c,#6a1b9a);border:none;color:#fff}
.card.ig{background:linear-gradient(135deg,#1a237e,#283593);border:none;color:#fff}
.card-lbl{font-size:.62rem;opacity:.8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.card-val{font-size:1.3rem;font-weight:900;line-height:1}
.card-sub{font-size:.65rem;opacity:.75;margin-top:3px}

/* APP LINKS */
.apps{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.app-link{background:#fff;border:1.5px solid var(--borde);border-radius:14px;padding:12px;display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--texto);cursor:pointer}
.app-link:active{transform:scale(.97)}
.app-icon{font-size:1.6rem}
.app-name{font-size:.78rem;font-weight:900}
.app-desc{font-size:.62rem;color:var(--gris);margin-top:1px}

/* BARRA */
.barra-bg{background:#f0f0f0;border-radius:20px;height:7px;margin-top:3px}
.barra-f{border-radius:20px;height:7px}
.bar-v{background:linear-gradient(90deg,var(--vd),#66bb6a)}
.bar-r{background:linear-gradient(90deg,var(--rojo),#ef5350)}
.bar-n{background:linear-gradient(90deg,var(--naranja),#ffb74d)}
.bar-a{background:linear-gradient(90deg,var(--azul),#42a5f5)}

/* ROW */
.row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f5f5f5}
.row:last-child{border-bottom:none}
.row-l{font-size:.8rem;color:var(--gris);flex:1;padding-right:8px}
.row-v{font-weight:900;font-size:.85rem}
.pos{color:var(--verde)}
.neg{color:var(--rojo)}

/* ALERTA */
.alert{border-radius:12px;padding:10px 13px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.alert-r{background:var(--rl);border:1px solid #ffcdd2}
.alert-o{background:var(--nl);border:1px solid #ffe0b2}
.alert-v{background:var(--vl);border:1px solid var(--borde)}
.alert-icon{font-size:1.2rem}
.alert-t{font-size:.8rem;font-weight:900;margin-bottom:1px}
.alert-s{font-size:.7rem;color:var(--gris)}

/* SPIN */
.spin{width:28px;height:28px;border:3px solid var(--vl);border-top-color:var(--verde);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
.ldg{text-align:center;padding:40px 20px;color:var(--gris);font-size:.82rem}

.tar{background:#fff;border-radius:14px;border:1px solid var(--borde);padding:13px;margin-bottom:10px}
.tar-t{font-size:.68rem;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.pb{padding-bottom:32px}

/* TIEMPO */
.tiempo{font-size:.65rem;color:var(--gris);text-align:center;padding:6px 0 2px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-icon">🌿</div>
  <div>
    <div class="hdr-t">Almacén Copihue <span class="badge-v">v2</span></div>
    <div class="hdr-s" id="hdr-sub">Cargando...</div>
  </div>
  <button class="btn-reload" onclick="cargarTodo()">↺</button>
  <button class="btn-back" onclick="location.href='./copihue-herramientas.html'">← Volver</button>
</div>

<div class="wrap">
  <div id="alertas"></div>
  <div id="resumen-hoy"><div class="ldg"><div class="spin"></div>Cargando datos...</div></div>
  <div id="resumen-mes"></div>
  <div id="resumen-fiados"></div>
  <div id="resumen-inventario"></div>

  <div class="sec-title">📱 Ir a</div>
  <div class="apps">
    <a class="app-link" href="./copihue-herramientas.html">
      <div class="app-icon">🏪</div>
      <div><div class="app-name">POS</div><div class="app-desc">Cobrar y vender</div></div>
    </a>
    <a class="app-link" href="./copihue-finanzas.html">
      <div class="app-icon">💰</div>
      <div><div class="app-name">Finanzas</div><div class="app-desc">Tu bolsillo</div></div>
    </a>
    <a class="app-link" href="./copihue-reportes.html">
      <div class="app-icon">📊</div>
      <div><div class="app-name">Reportes</div><div class="app-desc">Ventas y estadísticas</div></div>
    </a>
    <a class="app-link" href="./copihue-fiado.html">
      <div class="app-icon">🤝</div>
      <div><div class="app-name">Fiados</div><div class="app-desc">Deudas clientes</div></div>
    </a>
    <a class="app-link" href="./copihue-pedidos.html">
      <div class="app-icon">📦</div>
      <div><div class="app-name">Pedidos</div><div class="app-desc">Lista de compras</div></div>
    </a>
    <a class="app-link" href="./sendwa.html">
      <div class="app-icon">📲</div>
      <div><div class="app-name">Catálogo WA</div><div class="app-desc">Compartir por WhatsApp</div></div>
    </a>
  </div>

  <div class="tiempo" id="ultima-act"></div>
  <div class="pb"></div>
</div>

<script>
const API     = 'https://script.google.com/macros/s/AKfycbzWZzDvdGfW8vd2-FpQolT852cdPMeHbfKugn9DBOlju75bE1D0SUNB5EKEDOsI2vP4lA/exec';
const API_REP = 'https://script.google.com/macros/s/AKfycbxhKFk2WAi-KRY5xGBsI6_6Pvp3jDjt8mSRXvy7I1WehNmBpJamqK9G9Q1ZJSCSgAdfDA/exec';
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const fmt = n => '$' + Math.round(n||0).toLocaleString('es-AR');
const fmtK = n => n>=1000000 ? '$'+(n/1000000).toFixed(1)+'M' : n>=1000 ? '$'+Math.round(n/1000)+'K' : fmt(n);

async function apiFetch(api, action, datos={}){
  const url = api + '?action=' + action + '&data=' + encodeURIComponent(JSON.stringify(datos)) + '&t=' + Date.now();
  const r = await fetch(url, {signal: AbortSignal.timeout(20000)});
  return await r.json();
}

async function cargarTodo(){
  document.getElementById('hdr-sub').textContent = 'Actualizando…';
  document.getElementById('resumen-hoy').innerHTML = '<div class="ldg"><div class="spin"></div>Cargando...</div>';

  try {
    const [rRep, rFiados, rCaja, rEgr, rInv] = await Promise.all([
      fetch(API_REP + '?action=getReportes&t=' + Date.now(), {redirect:'follow', signal:AbortSignal.timeout(20000)}).then(r=>r.json()).catch(()=>null),
      apiFetch(API, 'listarFiados'),
      apiFetch(API, 'getCajaDiaria', {limite:60}),
      apiFetch(API, 'getCajaEgresos', {limite:200}),
      apiFetch(API, 'getInventarioResumen')
    ]);

    const ahora = new Date();
    const mesActual = ahora.getMonth();
    const anioActual = ahora.getFullYear();
    const hoyStr = ahora.toISOString().split('T')[0];

    // ── VENTAS ──
    let ventaHoy=0, ticketsHoy=0, ventaMes=0, ticketsMes=0, ticketProm=0;
    if(rRep && rRep.tickets){
      const tks = rRep.tickets;
      tks.forEach(t=>{
        const f = (t.fecha||'').split('T')[0];
        const v = parseFloat(t.total||t.facturacion||0);
        if(f === hoyStr){ ventaHoy+=v; ticketsHoy++; }
        const d = new Date(f+'T12:00:00');
        if(d.getMonth()===mesActual && d.getFullYear()===anioActual){ ventaMes+=v; ticketsMes++; }
      });
      ticketProm = ticketsMes>0 ? ventaMes/ticketsMes : 0;
    }

    // ── CAJA HOY (ingresos) ──
    let cajaHoy=0, cajaMes=0;
    if(rCaja.ok && rCaja.registros){
      rCaja.registros.forEach(r=>{
        const f = (r.fecha||'').split('T')[0];
        const v = parseFloat(r.total||0);
        if(f===hoyStr) cajaHoy+=v;
        const d = new Date(f+'T12:00:00');
        if(d.getMonth()===mesActual && d.getFullYear()===anioActual) cajaMes+=v;
      });
    }

    // ── EGRESOS MES ──
    let egrMes=0;
    if(rEgr.ok && rEgr.registros){
      rEgr.registros.forEach(r=>{
        const d = new Date((r.fecha||'').split('T')[0]+'T12:00:00');
        if(d.getMonth()===mesActual && d.getFullYear()===anioActual) egrMes+=parseFloat(r.monto||0);
      });
    }

    // ── FIADOS ──
    let totalFiado=0, clientesFiado=0, vencidos=0, proxVencer=0;
    if(rFiados.fiados){
      const pend = rFiados.fiados.filter(f=>f.estado!=='PAGADO');
      const mapa = {};
      pend.forEach(f=>{
        totalFiado += parseFloat(f.total||0);
        if(!mapa[f.cliente]) mapa[f.cliente]=true;
        if(f.estado==='VENCIDO') vencidos++;
        if(f.fechaVencimiento){
          const dias = Math.round((new Date(f.fechaVencimiento+'T12:00:00')-ahora)/86400000);
          if(dias>=0 && dias<=3) proxVencer++;
        }
      });
      clientesFiado = Object.keys(mapa).length;
    }

    // ── INVENTARIO ──
    let invCosto=0, invVenta=0, invProds=0;
    if(rInv.ok){ invCosto=rInv.totalCosto||0; invVenta=rInv.totalVenta||0; invProds=(rInv.productos||[]).length; }

    const neto = cajaMes - egrMes;

    // ── ALERTAS ──
    let alertasHtml = '';
    if(vencidos>0) alertasHtml += `<div class="alert alert-r"><div class="alert-icon">🔴</div><div><div class="alert-t">${vencidos} fiado${vencidos>1?'s':''} vencido${vencidos>1?'s':''}</div><div class="alert-s"><a href="./copihue-fiado.html" style="color:var(--rojo);font-weight:700">Ir a Fiados →</a></div></div></div>`;
    if(proxVencer>0) alertasHtml += `<div class="alert alert-o"><div class="alert-icon">⏰</div><div><div class="alert-t">${proxVencer} fiado${proxVencer>1?'s':''} vence en menos de 3 días</div><div class="alert-s"><a href="./copihue-fiado.html" style="color:var(--naranja);font-weight:700">Ir a Fiados →</a></div></div></div>`;
    if(neto<0) alertasHtml += `<div class="alert alert-r"><div class="alert-icon">⚠️</div><div><div class="alert-t">Déficit en ${MESES[mesActual]}</div><div class="alert-s">Los egresos superaron las ventas en ${fmtK(Math.abs(neto))}</div></div></div>`;
    if(ventaHoy===0) alertasHtml += `<div class="alert alert-o"><div class="alert-icon">📊</div><div><div class="alert-t">Sin ventas registradas hoy</div><div class="alert-s">Si ya vendiste, verificá que el POS esté sincronizando</div></div></div>`;
    document.getElementById('alertas').innerHTML = alertasHtml;

    // ── RESUMEN HOY ──
    document.getElementById('resumen-hoy').innerHTML = `
      <div class="sec-title">📅 Hoy — ${ahora.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})}</div>
      <div class="cards">
        <div class="card vg">
          <div class="card-lbl">💵 Ventas hoy</div>
          <div class="card-val">${fmtK(cajaHoy||ventaHoy)}</div>
          <div class="card-sub">${ticketsHoy} tickets</div>
        </div>
        <div class="card ng">
          <div class="card-lbl">🎫 Ticket promedio</div>
          <div class="card-val">${fmtK(ticketProm)}</div>
          <div class="card-sub">del mes</div>
        </div>
      </div>`;

    // ── RESUMEN MES ──
    document.getElementById('resumen-mes').innerHTML = `
      <div class="sec-title">📆 ${MESES[mesActual]} ${anioActual}</div>
      <div class="cards">
        <div class="card ${neto>=0?'vg':'rg'} full">
          <div class="card-lbl">${neto>=0?'✅':'⚠️'} Tu ganancia del mes</div>
          <div class="card-val">${fmtK(Math.abs(neto))}</div>
          <div class="card-sub">${neto>=0?'Superávit':'Déficit'} · Ventas ${fmtK(cajaMes)} − Egresos ${fmtK(egrMes)}</div>
        </div>
        <div class="card vg">
          <div class="card-lbl">📈 Ventas</div>
          <div class="card-val">${fmtK(cajaMes)}</div>
          <div class="card-sub">${ticketsMes} tickets</div>
        </div>
        <div class="card rg">
          <div class="card-lbl">📉 Egresos</div>
          <div class="card-val">${fmtK(egrMes)}</div>
          <div class="card-sub">gastos operativos</div>
        </div>
      </div>`;

    // ── FIADOS ──
    document.getElementById('resumen-fiados').innerHTML = totalFiado>0 ? `
      <div class="sec-title">🤝 Fiados pendientes</div>
      <div class="cards">
        <div class="card rg full" onclick="location.href='./copihue-fiado.html'" style="cursor:pointer">
          <div class="card-lbl">💸 Total que te deben ›</div>
          <div class="card-val">${fmtK(totalFiado)}</div>
          <div class="card-sub">${clientesFiado} clientes · ${vencidos>0?'🔴 '+vencidos+' vencidos':proxVencer>0?'⏰ '+proxVencer+' por vencer':'✅ Al día'}</div>
        </div>
      </div>` : '';

    // ── INVENTARIO ──
    document.getElementById('resumen-inventario').innerHTML = invCosto>0 ? `
      <div class="sec-title">📦 Capital en stock</div>
      <div class="cards">
        <div class="card ig full" onclick="location.href='./copihue-finanzas.html'" style="cursor:pointer">
          <div class="card-lbl">📦 Inventario valorizado ›</div>
          <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:4px">
            <div>
              <div style="font-size:.68rem;color:rgba(255,255,255,.6)">A costo</div>
              <div style="font-size:1.3rem;font-weight:900;color:#fff">${fmtK(invCosto)}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:.68rem;color:rgba(255,255,255,.6)">A venta</div>
              <div style="font-size:1.1rem;font-weight:900;color:#a5d6a7">${fmtK(invVenta)}</div>
            </div>
          </div>
          <div style="font-size:.65rem;color:rgba(255,255,255,.6);margin-top:4px">${invProds} productos · margen ${fmtK(invVenta-invCosto)}</div>
        </div>
      </div>` : '';

    document.getElementById('hdr-sub').textContent = 'Actualizado ' + ahora.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('ultima-act').textContent = 'Última actualización: ' + ahora.toLocaleString('es-AR');

  } catch(e) {
    document.getElementById('resumen-hoy').innerHTML = `<div style="text-align:center;padding:30px;color:var(--rojo)">❌ Error cargando datos<br><small>${e.message}</small><br><br><button onclick="cargarTodo()" style="margin-top:8px;background:var(--verde);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit">↺ Reintentar</button></div>`;
    document.getElementById('hdr-sub').textContent = 'Error al cargar';
  }
}

cargarTodo();
// Auto-actualizar cada 5 minutos
setInterval(cargarTodo, 5*60*1000);
</script>
</body>
</html>
