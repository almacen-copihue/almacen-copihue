<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SendWA — Copihue</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
     background:#f5f5f5;color:#212121;min-height:100vh;overflow-x:hidden;padding-bottom:100px}
[data-dark] body,[data-dark]{background:#121212 !important;color:#fff !important}
[data-dark] .card{background:#1e1e1e !important;border-color:#333 !important}
[data-dark] .sort-bar,[data-dark] .search-wrap,[data-dark] .tabs,[data-dark] .panel{background:#1e1e1e !important}
[data-dark] .search-inp{background:#2a2a2a !important;color:#fff !important;border-color:#444 !important}
[data-dark] .preview-area{background:#2a2a2a !important;color:#eee !important;border-color:#444 !important}
[data-dark] .out-btn{background:#2a2a2a !important;border-color:#444 !important}
[data-dark] .sort-sel{background:#2a2a2a !important;color:#fff !important;border-color:#444 !important}
[data-dark] .fmt-tab{background:#2a2a2a !important;color:#aaa !important}
[data-dark] .img-panel-body{background:#1e1e1e !important}

.hdr{background:#1B5E20;padding:9px 12px;display:flex;align-items:center;
     justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-left{color:#fff;font-size:14px;font-weight:700;line-height:1.2}
.hdr-left small{font-size:9px;opacity:.65;font-weight:400;display:block}
.hdr-pills{display:flex;gap:5px}
.pill{background:rgba(255,255,255,.18);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.hdr-btn{background:none;border:none;color:#fff;font-size:17px;cursor:pointer;padding:4px;line-height:1;margin-left:4px}

.search-wrap{padding:7px 10px;background:#fff;border-bottom:1px solid #e0e0e0}
.search-inp{width:100%;padding:8px 14px;border-radius:30px;border:1px solid #ddd;
            background:#f9f9f9;color:#212121;font-size:13px;font-family:inherit;outline:none}
.search-inp:focus{border-color:#4CAF50}

.tabs{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 13px;font-size:11px;font-weight:600;color:#757575;cursor:pointer;
     white-space:nowrap;border-bottom:2px solid transparent;flex-shrink:0;
     background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab.active{color:#2E7D32;border-bottom-color:#2E7D32}

.smart-bar{display:none;padding:6px 10px;background:#FFF3E0;border-bottom:1px solid #FFE0B2;gap:6px;flex-wrap:wrap}
.smart-bar.show{display:flex}
.smart-btn{padding:4px 10px;border-radius:20px;background:#fff;border:1px solid #FF9800;
           color:#E65100;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit}
.smart-btn.on{background:#FF9800;color:#fff}

.sort-bar{padding:5px 10px;background:#fff;border-bottom:1px solid #e0e0e0;
          display:flex;align-items:center;gap:8px;font-size:11px;color:#757575}
.sort-sel{padding:3px 8px;border-radius:20px;border:1px solid #ddd;background:#f5f5f5;
          color:#212121;font-size:11px;font-family:inherit;cursor:pointer;outline:none}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding:6px}
@media(min-width:480px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:700px){.grid{grid-template-columns:repeat(4,1fr)}}

.sep{grid-column:1/-1;background:#1B5E20;color:#fff;padding:5px 10px;border-radius:6px;
     font-size:10px;font-weight:700;text-align:center;margin:4px 0 0;letter-spacing:.5px}

.card{background:#fff;border-radius:10px;border:2px solid #e0e0e0;cursor:pointer;
      position:relative;overflow:hidden;transition:border-color .12s}
.card.sel{border-color:#4CAF50;background:#F1F8E9}
.card-img{width:100%;aspect-ratio:1;overflow:hidden;background:#f0f0f0;
          display:flex;align-items:center;justify-content:center;font-size:26px;color:#bbb}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-body{padding:5px 6px 6px;text-align:center}
.card-name{font-size:9.5px;font-weight:600;line-height:1.3;
           display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:#212121}
.card-price{font-size:12px;font-weight:700;margin-top:3px}
.old-price{font-size:9px;text-decoration:line-through;color:#999;margin-right:2px;font-weight:400}
.new-price{color:#E53935}
.margen-tag{font-size:8px;color:#43a047;font-weight:700;margin-top:1px}
.badge{position:absolute;top:3px;left:3px;color:#fff;font-size:7.5px;font-weight:800;
       padding:2px 5px;border-radius:8px;z-index:2;line-height:1}
.badge-r{background:#E53935}
.badge-d{background:#7B1FA2}
.badge-e{background:#1565C0}
.badge-p{background:#6A1B9A}
.badge-c{background:#00695C}
.ahorro-tag{font-size:8px;font-weight:800;color:#fff;background:#E65100;
            border-radius:6px;padding:1px 5px;margin-top:2px;display:inline-block}
.chk{position:absolute;top:3px;right:3px;width:18px;height:18px;background:#4CAF50;
     color:#fff;border-radius:50%;display:none;align-items:center;justify-content:center;
     font-size:10px;font-weight:800;z-index:3}
.card.sel .chk{display:flex}
.ord-badge{position:absolute;bottom:3px;right:3px;width:16px;height:16px;background:#1B5E20;
           color:#fff;border-radius:50%;display:none;align-items:center;justify-content:center;
           font-size:8px;font-weight:800;z-index:3}
.card.sel .ord-badge{display:flex}
.stock-warn{position:absolute;bottom:3px;left:3px;background:rgba(255,87,34,.85);
            color:#fff;font-size:7px;padding:1px 4px;border-radius:4px;font-weight:700}

.fabs-l{position:fixed;bottom:20px;left:10px;display:flex;flex-direction:column;gap:8px;z-index:80}
.fabs-r{position:fixed;bottom:20px;right:10px;display:flex;flex-direction:column;gap:8px;z-index:80}
.fab{width:46px;height:46px;border-radius:50%;border:none;color:#fff;font-size:20px;cursor:pointer;
     box-shadow:0 3px 10px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;
     transition:transform .1s}
.fab:active{transform:scale(.92)}
.fab-g{background:#1B5E20}.fab-r{background:#c62828}.fab-o{background:#E65100}.fab-b{background:#1565C0}

.panel{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;
       border-top:1px solid #e0e0e0;z-index:90;transform:translateY(100%);
       transition:transform .22s ease;max-height:88vh;overflow-y:auto}
.panel.open{transform:translateY(0)}
.panel-hdr{padding:10px 14px;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;
           justify-content:space-between;position:sticky;top:0;background:inherit;z-index:2}
.panel-hdr h3{font-size:13px;font-weight:700}
.panel-close{background:none;border:none;font-size:18px;cursor:pointer;color:#212121;
             padding:4px;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.panel-body{padding:10px 14px 24px;display:flex;flex-direction:column;gap:8px}

/* IMAGEN PANEL */
.img-panel-body{padding:10px 14px 24px;background:#f9f9f9}
.img-preview{text-align:center;padding:6px 0}
.img-preview canvas{max-width:100%;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.12)}
.img-options{display:flex;gap:6px;flex-wrap:wrap;padding:8px 14px}
.img-opt{flex:1;min-width:130px;padding:8px 10px;border-radius:10px;border:1.5px solid #e0e0e0;
         background:#fff;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:inherit}
.img-opt:active{background:#E8F5E9}
.img-opt-icon{font-size:20px;flex-shrink:0}
.img-opt-info strong{font-size:11px;font-weight:700;color:#212121;display:block}
.img-opt-info small{font-size:9px;color:#757575}
.img-opt.sel-tpl{border-color:#2E7D32;background:#F1F8E9}

/* THEME picker */
.theme-row{display:flex;gap:6px;flex-wrap:wrap;padding:0 14px 6px}
.theme-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .12s}
.theme-dot.on{border-color:#212121}

.fmt-tabs{display:flex;gap:0;border:1px solid #ddd;border-radius:8px;overflow:hidden}
.fmt-tab{flex:1;padding:6px 2px;font-size:9.5px;font-weight:700;background:#f5f5f5;
         color:#757575;border:none;cursor:pointer;font-family:inherit;text-align:center}
.fmt-tab.on{background:#2E7D32;color:#fff}

.preview-area{background:#f5f5f5;border-radius:8px;padding:10px;max-height:130px;overflow-y:auto;
              font-size:10.5px;line-height:1.6;white-space:pre-wrap;color:#212121;
              border:1px solid #ddd;font-family:'Courier New',monospace}
.btn-row{display:flex;gap:6px;margin-top:2px}
.btn-main{flex:1;padding:9px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-wa{background:#25D366;color:#fff}.btn-copy{background:#1565C0;color:#fff}.btn-share{background:#7B1FA2;color:#fff}
.btn-dl{background:#E65100;color:#fff}

.out-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;
         border:1px solid #e0e0e0;background:#f9f9f9;cursor:pointer;font-family:inherit;text-align:left;width:100%}
.out-btn:active{background:#E8F5E9}
.out-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.out-info strong{font-size:12px;font-weight:700;color:#212121;display:block}
.out-info small{font-size:10px;color:#757575}

.q-list{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto}
.q-row{display:flex;align-items:center;gap:8px}
.q-name{flex:1;font-size:11px;font-weight:500;color:#212121;line-height:1.3}
.q-input{width:54px;padding:5px 6px;border-radius:6px;border:1px solid #ddd;background:#f5f5f5;
         color:#212121;font-size:12px;font-family:inherit;text-align:center;outline:none}
.q-input:focus{border-color:#4CAF50}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:85;display:none}
.overlay.show{display:block}
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);background:#212121;
       color:#fff;padding:7px 16px;border-radius:20px;font-size:11px;font-weight:600;
       z-index:200;display:none;white-space:nowrap;pointer-events:none}
#loader{position:fixed;inset:0;background:#f5f5f5;z-index:200;
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.divider{height:1px;background:#e0e0e0;margin:4px 0}
.section-lbl{font-size:10px;font-weight:700;color:#757575;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.no-results{padding:30px;text-align:center;color:#bbb;font-size:13px;grid-column:1/-1}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loader">
  <div style="font-size:42px">🏔️</div>
  <div style="font-size:12px;color:#757575;font-weight:600">Cargando catálogo Copihue...</div>
</div>

<div class="hdr">
  <div class="hdr-left">SendWA <small>Copihue Pro</small></div>
  <div class="hdr-pills">
    <div class="pill" id="statSel">✓ 0</div>
    <div class="pill" id="statChars">0c</div>
  </div>
  <button class="hdr-btn" onclick="showLog()" title="Ver log de carga">📋</button>
  <button class="hdr-btn" onclick="toggleDark()">🌙</button>
</div>

<div class="search-wrap">
  <input class="search-inp" id="searchInp" placeholder="🔍 Buscar productos...">
</div>

<div class="tabs" id="mainTabs">
  <button class="tab active" data-tab="all"     onclick="setTab('all')">📍 Todo</button>
  <button class="tab"        data-tab="ofertas" onclick="setTab('ofertas')">🔥 Ofertas</button>
</div>

<div class="smart-bar" id="smartBar">
  <button class="smart-btn" data-smart="relampago"  onclick="toggleSmart('relampago')">⚡ Relámpago</button>
  <button class="smart-btn" data-smart="destacada"  onclick="toggleSmart('destacada')">⭐ Destacadas</button>
  <button class="smart-btn" data-smart="especial"   onclick="toggleSmart('especial')">💙 Especiales</button>
  <button class="smart-btn" data-smart="rotacion"   onclick="toggleSmart('rotacion')">🔄 Alta rotación</button>
  <button class="smart-btn" data-smart="stock-bajo" onclick="toggleSmart('stock-bajo')">⚠️ Stock bajo</button>
  <button class="smart-btn" data-smart="margen"     onclick="toggleSmart('margen')">💰 Mejor margen</button>
  <button class="smart-btn" data-smart="criticos"   onclick="toggleSmart('criticos')">🚨 Empujar ya</button>
  <button class="smart-btn" data-smart="sin-oferta" onclick="toggleSmart('sin-oferta')">💡 Sin oferta</button>
</div>

<div class="sort-bar">
  <span>Ordenar:</span>
  <select class="sort-sel" id="sortSel" onchange="render()">
    <option value="default">Por defecto</option>
    <option value="precio-asc">Precio ↑</option>
    <option value="precio-desc">Precio ↓</option>
    <option value="nombre">Nombre A-Z</option>
    <option value="rotacion">Rotación ↓</option>
    <option value="stock">Stock ↓</option>
    <option value="margen">Margen % ↓</option>
  </select>
  <span id="countLbl" style="margin-left:auto;font-size:10px;color:#9e9e9e">0 productos</span>
</div>

<div class="grid" id="grid"></div>

<div class="fabs-l">
  <button class="fab fab-g" onclick="selAll()" title="Seleccionar todo">✅</button>
  <button class="fab fab-r" onclick="clearSel()" title="Quitar selección">🧹</button>
  <button class="fab fab-o" onclick="toggleSmartBar()" title="Filtros">✨</button>
</div>
<div class="fabs-r">
  <button class="fab fab-b" onclick="openPanel('outPanel')" title="Salidas">📤</button>
  <button class="fab fab-g" onclick="openPanel('quantPanel')" title="Cantidades">🔢</button>
</div>

<div class="overlay" id="overlay" onclick="closePanels()"></div>

<!-- ═══ PANEL SALIDAS TEXTO ═══ -->
<div class="panel" id="outPanel">
  <div class="panel-hdr">
    <h3>📤 Salidas de texto</h3>
    <button class="panel-close" onclick="closePanels()">✕</button>
  </div>
  <div class="panel-body">
    <div class="section-lbl">Formato</div>
    <div class="fmt-tabs">
      <button class="fmt-tab on"  data-fmt="simple"    onclick="setFmt('simple')">Simple</button>
      <button class="fmt-tab"     data-fmt="completo"  onclick="setFmt('completo')">Completo</button>
      <button class="fmt-tab"     data-fmt="instagram" onclick="setFmt('instagram')">IG</button>
      <button class="fmt-tab"     data-fmt="facebook"  onclick="setFmt('facebook')">FB</button>
      <button class="fmt-tab"     data-fmt="tiktok"    onclick="setFmt('tiktok')">TikTok</button>
      <button class="fmt-tab"     data-fmt="csv"       onclick="setFmt('csv')">CSV</button>
      <button class="fmt-tab"     data-fmt="pizarron"  onclick="setFmt('pizarron')">Pizarrón</button>
    </div>
    <div class="preview-area" id="previewTxt"></div>
    <div class="btn-row">
      <button class="btn-main btn-wa"    onclick="sendWA()">💬 WA</button>
      <button class="btn-main btn-copy"  onclick="copyText()">📋 Copiar</button>
      <button class="btn-main btn-share" onclick="shareNative()">📱 Share</button>
    </div>
    <div class="divider"></div>
    <div class="section-lbl">Imágenes para redes</div>

    <button class="out-btn" onclick="abrirImg('stories')">
      <div class="out-icon" style="background:#E8EAF6">📱</div>
      <div class="out-info"><strong>Story vertical (9:16)</strong><small>WA Status · IG/FB Stories · TikTok · 1080×1920</small></div>
    </button>
    <button class="out-btn" onclick="abrirImg('square')">
      <div class="out-icon" style="background:#FCE4EC">⬛</div>
      <div class="out-info"><strong>Post cuadrado (1:1)</strong><small>Feed Instagram · Facebook · 1080×1080</small></div>
    </button>
    <button class="out-btn" onclick="abrirImg('banner')">
      <div class="out-icon" style="background:#E3F2FD">🖼️</div>
      <div class="out-info"><strong>Banner horizontal (16:9)</strong><small>Facebook cover · YouTube · Twitter · 1280×720</small></div>
    </button>
    <button class="out-btn" onclick="abrirImg('portrait')">
      <div class="out-icon" style="background:#F3E5F5">📸</div>
      <div class="out-info"><strong>Portrait (4:5)</strong><small>Feed Instagram retrato · 1080×1350</small></div>
    </button>
    <button class="out-btn" onclick="abrirImg('grid3')">
      <div class="out-icon" style="background:#E8F5E9">🔲</div>
      <div class="out-info"><strong>Grilla 3 productos</strong><small>Post compacto con 3 fotos · 1080×1080</small></div>
    </button>
    <button class="out-btn" onclick="abrirImg('grid6')">
      <div class="out-icon" style="background:#FFF3E0">🔳</div>
      <div class="out-info"><strong>Grilla 6 productos</strong><small>Catálogo semanal · 1080×1080</small></div>
    </button>
    <button class="out-btn" onclick="abrirImg('lista')">
      <div class="out-icon" style="background:#E0F2F1">📋</div>
      <div class="out-info"><strong>Lista vertical con fotos</strong><small>Precio + foto por fila · altura variable</small></div>
    </button>
    <button class="out-btn" onclick="abrirImg('ticket')">
      <div class="out-icon" style="background:#FFF8E1">🧾</div>
      <div class="out-info"><strong>Ticket de ofertas</strong><small>Estilo recibo con precios y tachados</small></div>
    </button>
    <button class="out-btn" onclick="abrirImg('dark')">
      <div class="out-icon" style="background:#212121">🌙</div>
      <div class="out-info"><strong>Card oscura (producto solo)</strong><small>Un producto destacado sobre fondo negro</small></div>
    </button>
    <button class="out-btn" onclick="abrirImg('promo')">
      <div class="out-icon" style="background:#FFEBEE">🔥</div>
      <div class="out-info"><strong>Promo explosion</strong><small>Fondo degradado vibrante · redes jóvenes</small></div>
    </button>
  </div>
</div>

<!-- ═══ PANEL CANTIDADES ═══ -->
<div class="panel" id="quantPanel">
  <div class="panel-hdr">
    <h3>🔢 Cantidades</h3>
    <button class="panel-close" onclick="closePanels()">✕</button>
  </div>
  <div class="panel-body">
    <div style="font-size:11px;color:#757575">Unidades por producto en el mensaje:</div>
    <div class="q-list" id="qList"></div>
    <button class="btn-main btn-wa" style="margin-top:4px" onclick="closePanels();updateStats()">✓ Aplicar</button>
  </div>
</div>

<!-- ═══ PANEL IMAGEN UNIVERSAL ═══ -->
<div class="panel" id="imgPanel">
  <div class="panel-hdr">
    <h3 id="imgPanelTitle">🎨 Imagen</h3>
    <button class="panel-close" onclick="closePanels()">✕</button>
  </div>
  <!-- Selector de tema de color -->
  <div style="padding:8px 14px 2px;border-bottom:1px solid #f0f0f0">
    <div style="font-size:10px;font-weight:700;color:#757575;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Tema de color</div>
    <div class="theme-row" id="themeRow"></div>
  </div>
  <div class="img-preview" id="imgPreview">
    <div style="padding:40px;text-align:center;color:#bbb" id="imgLoading">
      <span class="spin" style="font-size:28px">⏳</span><br>
      <span style="font-size:12px;margin-top:8px;display:block">Generando imagen...</span>
    </div>
    <canvas id="cvUniv" style="display:none"></canvas>
  </div>
  <div class="btn-row" style="padding:0 14px 20px">
    <button class="btn-main btn-dl"   onclick="downloadUniv()">💾 Guardar imagen</button>
    <button class="btn-main btn-copy" onclick="closePanels()">Cerrar</button>
  </div>
</div>

<!-- ═══ PANEL LOG ═══ -->
<div class="panel" id="logPanel" style="max-height:80vh">
  <div class="panel-hdr">
    <h3>📋 Log de carga</h3>
    <button class="panel-close" onclick="closePanels()">✕</button>
  </div>
  <div class="panel-body" style="padding:10px 14px 20px">
    <pre id="logContent" style="font-family:'Courier New',monospace;font-size:10px;line-height:1.6;
         color:#212121;white-space:pre;overflow-x:auto;background:#f5f5f5;
         border:1px solid #e0e0e0;border-radius:8px;padding:10px;max-height:60vh;overflow-y:auto"></pre>
    <button class="btn-main btn-copy" style="margin-top:8px"
      onclick="navigator.clipboard.writeText(document.getElementById('logContent').textContent).then(()=>showToast('📋 Log copiado'))">
      📋 Copiar log
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzWZzDvdGfW8vd2-FpQolT852cdPMeHbfKugn9DBOlju75bE1D0SUNB5EKEDOsI2vP4lA/exec";

let allProds=[], sel=new Set(), selOrder=[], quantities={};
let currentTab='all', smartFilters=new Set(), smartVisible=false, currentFmt='simple';
let currentImgType='stories';

// ─── MISMO simplificarNombre que seba21 ──────────────────────────────────────
function simplificarNombre(n){
  return n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9 ]/g,"").replace(/\s+/g,'-').replace(/-+/g,'-').trim();
}
function getImg(p){ return `imagenes-productos/${simplificarNombre(p.name)}.jpg`; }
function fmt$(n){ return '$'+Number(n).toLocaleString('es-AR'); }
function getMargen(p){ if(!p.precioCosto||p.precioCosto<=0)return null; return Math.round(((p.price-p.precioCosto)/p.price)*100); }
// Oferta activa = catOferta viene de col J y NO es vacío / SIN OFERTA / SIN STOCK
// Es la ÚNICA fuente de verdad — igual que seba21
function isOfertaActiva(p){
  const c = (p.catOferta||'').toUpperCase().trim();
  return c !== '' && c !== 'SIN OFERTA' && c !== 'SIN STOCK';
}

// PROMO ACTIVA / COMBO ACTIVO: la lógica es INVERSA al resto
//   Col B (price)  = precio antes (lo que vale suelto / sin oferta)
//   Col L (normal) = precio ahora  (lo que pagás con la promo/combo)
//   Condición: normal > 0 && normal < price  (idéntico a seba21 líneas 6985-7003)
function isPromoCombo(p){
  const c = (p.catOferta||'').toUpperCase().trim();
  return (c === 'PROMO ACTIVA' || c === 'COMBO ACTIVO') &&
         p.normal > 0 && p.normal < p.price;
}

// Precio que se muestra TACHADO (el de antes)
function getPrecioAntes(p){
  if(!isOfertaActiva(p)) return 0;
  if(isPromoCombo(p))    return p.price;   // col B = antes
  return p.normal > 0 ? p.normal : 0;     // col L = antes para el resto
}

// Precio que se muestra COMO VIGENTE (el de ahora)
function getPrecioAhora(p){
  if(!isOfertaActiva(p)) return p.price;
  if(isPromoCombo(p))    return p.normal;  // col L = ahora
  return p.price;                          // col B = ahora para el resto
}

// Ahorro en $$ (sin porcentajes)
function getAhorro(p){
  const antes = getPrecioAntes(p);
  const ahora = getPrecioAhora(p);
  return (antes > 0 && ahora > 0 && antes > ahora) ? antes - ahora : 0;
}

// Badge SOLO si la oferta está activa (catOferta lo confirma)
function getBadgeInfo(p){
  if(!isOfertaActiva(p)) return null;
  const c = (p.catOferta||'').toUpperCase().trim();
  if(c.startsWith('RELAMPAGO')) return {cls:'badge-r', lbl:'⚡ '+c.replace('RELAMPAGO','').trim(), color:'#E53935'};
  if(c==='DESTACADA')           return {cls:'badge-d', lbl:'⭐ DEST',        color:'#7B1FA2'};
  if(c==='ESPECIAL')            return {cls:'badge-e', lbl:'💙 ESP',         color:'#1565C0'};
  if(c==='PROMO ACTIVA')        return {cls:'badge-p', lbl:'🎁 PROMO',       color:'#6A1B9A'};
  if(c==='COMBO ACTIVO')        return {cls:'badge-c', lbl:'🛍️ COMBO',       color:'#00695C'};
  return {cls:'badge-r', lbl:'🏷️ '+c, color:'#E65100'};
}

// Log de pools en consola (llamado después de cargar)
function logPoolsConsola(prods){
  const pools = {};
  prods.forEach(p => {
    const c = (p.catOferta||'').toUpperCase().trim();
    if(!pools[c]) pools[c] = [];
    pools[c].push(p);
  });
  console.group('🏷️  POOLS DE OFERTAS ACTIVAS');
  let totalActivas = 0;
  Object.keys(pools).sort().forEach(cat => {
    const activos = pools[cat].filter(p => isOfertaActiva(p));
    if(activos.length){
      totalActivas += activos.length;
      console.group(`  ${cat} (${activos.length} productos con stock)`);
      activos.forEach(p => {
        const ahora=getPrecioAhora(p), antes=getPrecioAntes(p), ahorro=getAhorro(p);
        const extra = antes>0 ? ` — antes ${fmt$(antes)} → ahora ${fmt$(ahora)} (ahorrás ${fmt$(ahorro)})` : ` — ${fmt$(ahora)}`;
        console.log(`    [${p.id}] ${p.name}${extra}`);
      });
      console.groupEnd();
    }
  });
  console.log(`  ──────────────────────────────`);
  console.log(`  TOTAL OFERTAS ACTIVAS CON STOCK: ${totalActivas}`);
  console.log(`  SIN OFERTA: ${prods.filter(p=>!isOfertaActiva(p)).length} productos`);
  console.groupEnd();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
async function init(){
  _logLines=[];
  logAdd('═══════════════════════════════════');
  logAdd('  SendWA Copihue — LOG DE CARGA');
  logAdd('  ' + new Date().toLocaleString('es-AR'));
  logAdd('═══════════════════════════════════');
  let fuenteDatos = 'API';

  try{
    logAdd('\n📡 Conectando a Google Sheets...');
    const r=await fetch(API_URL+'?cache='+Date.now(),{redirect:'follow'});
    const data=await r.json();
    const arr=data.productos||data;
    logAdd(`✅ Respuesta recibida. Filas raw: ${arr.length}`);

    // Map idéntico a seba21 cargarProductos()
    const mapped = arr
      .filter(p => p.name && p.price > 0)
      .map(p => ({
        id:         String(p.id),
        name:       String(p.name).trim(),
        price:      parseInt(p.price) || 0,
        stock:      parseInt(p.stock) || 0,
        image:      `imagenes-productos/${simplificarNombre(String(p.name).trim())}.jpg`,
        category:   String(p.category || 'SIN CATEGORIA').trim().toUpperCase(),
        rotacion:   parseInt(p.rotacion) || 3,
        vencimiento: p.vencimiento || '',
        diaCritico: (p.diaCritico || '').toLowerCase().trim(),
        precioCosto: parseInt(p.precioCosto) || 0,
        stockMin:   parseInt(p.stockMin) || 0,
        relampago:  (p.relampago !== undefined && p.relampago !== null && p.relampago !== '')
                      ? (isNaN(parseInt(p.relampago)) ? String(p.relampago).trim() : parseInt(p.relampago))
                      : 0,
        destacada:  parseInt(p.destacada) || 0,
        especial:   parseInt(p.especial) || 0,
        normal:     parseInt(p.normal) || 0,
        catOferta:  String(p.categoriaOferta || '').trim().toUpperCase(),
        prioridad:  String(p.prioridad || '').trim()
      }));

    logAdd(`📦 Productos válidos (nombre + precio): ${mapped.length}`);

    // ── Categorías reales ──────────────────────────────────────────
    const catMap = {};
    mapped.forEach(p => {
      if(!catMap[p.category]) catMap[p.category] = {total:0, conStock:0};
      catMap[p.category].total++;
      if(p.stock > 0) catMap[p.category].conStock++;
    });
    logAdd('\n📂 CATEGORÍAS REALES (de la planilla):');
    Object.keys(catMap).sort().forEach(cat => {
      const c = catMap[cat];
      logAdd(`   ${cat.padEnd(30)} total:${String(c.total).padStart(4)}  stock>0:${String(c.conStock).padStart(4)}`);
    });

    // ── Totales globales ──────────────────────────────────────────
    const totalAll   = mapped.length;
    const conStock   = mapped.filter(p => p.stock > 0).length;
    const sinStock   = totalAll - conStock;
    logAdd(`\n📊 TOTALES:`);
    logAdd(`   Total productos  : ${totalAll}`);
    logAdd(`   Con stock > 0    : ${conStock}`);
    logAdd(`   Sin stock        : ${sinStock}`);

    // ── Ofertas ──────────────────────────────────────────────────
    const ofertaMap = {};
    mapped.forEach(p => {
      const co = p.catOferta || '(vacío)';
      if(!ofertaMap[co]) ofertaMap[co] = {total:0, conStock:0};
      ofertaMap[co].total++;
      if(p.stock > 0) ofertaMap[co].conStock++;
    });
    logAdd('\n🏷️  OFERTAS (categoriaOferta col J):');
    Object.keys(ofertaMap).sort().forEach(o => {
      const v = ofertaMap[o];
      logAdd(`   ${o.padEnd(25)} total:${String(v.total).padStart(4)}  con stock:${String(v.conStock).padStart(4)}`);
    });

    const activas = mapped.filter(p => isOfertaActiva(p));
    const activasConStock = activas.filter(p => p.stock > 0);
    logAdd(`\n   Ofertas activas (no SIN OFERTA/SIN STOCK): ${activas.length}`);
    logAdd(`   Ofertas activas con stock > 0            : ${activasConStock.length}`);

    // ── Guardar y filtrar ─────────────────────────────────────────
    allProds = mapped.filter(p => p.stock > 0);
    logAdd(`\n✅ allProds (solo stock>0): ${allProds.length} productos`);

    // Actualizar tabs con categorías reales
    actualizarTabs(Object.keys(catMap).filter(c => catMap[c].conStock > 0).sort());

    if(!allProds.length) throw new Error('vacío tras filtrar stock');

    // Log de pools en consola del navegador
    logPoolsConsola(allProds);

  } catch(e) {
    logAdd(`\n❌ ERROR API: ${e.message}`);
    logAdd('🔄 Usando datos locales (FALLBACK)');
    fuenteDatos = 'FALLBACK LOCAL';
    allProds = FALLBACK_DATA.filter(p => p.stock > 0);

    const catFb = {};
    allProds.forEach(p => { catFb[p.category]=(catFb[p.category]||0)+1; });
    logAdd('\n📂 Categorías del fallback:');
    Object.keys(catFb).sort().forEach(c => logAdd(`   ${c}: ${catFb[c]}`));
    actualizarTabs(Object.keys(catFb).sort());
  }

  logAdd(`\n🏁 Fuente: ${fuenteDatos}`);
  logAdd(`🏁 Carga completa. Productos disponibles: ${allProds.length}`);
  logAdd('═══════════════════════════════════\n');

  document.getElementById('loader').style.display='none';
  render();
}

// Actualiza los tabs de categorías con las reales de la planilla
function actualizarTabs(cats){
  const ICONS = {
    'ALMACEN':'🛒','BEBIDAS':'🍶','DULCES Y SNACKS':'🍫','HELADERA Y CONGELADOS':'❄️',
    'LIMPIEZA':'🧹','HIGIENE PERSONAL':'🧴','PANADERIA':'🍞','CONDIMENTOS':'🧂',
    'CARNES':'🥩','FIAMBRES':'🧀','VERDURAS':'🥦','FRUTAS':'🍎','LACTEOS':'🥛',
    'MASCOTAS':'🐾','BAZAR':'🏠','GOLOSINAS':'🍬','CIGARRILLOS':'🚬',
    'CERVEZAS':'🍺','PROMOS':'🎁','VINOS':'🍷',
  };
  const tabsEl = document.getElementById('mainTabs');
  // Mantener "Todo" y "Ofertas", reemplazar el resto
  const fixed = tabsEl.querySelectorAll('[data-tab="all"],[data-tab="ofertas"]');
  // Limpiar todo excepto fijos
  [...tabsEl.children].forEach(el => {
    if(el.dataset.tab !== 'all' && el.dataset.tab !== 'ofertas') el.remove();
  });
  cats.forEach(cat => {
    const icon = ICONS[cat] || '📦';
    const btn = document.createElement('button');
    btn.className = 'tab';
    btn.dataset.tab = cat;
    btn.textContent = `${icon} ${cat.charAt(0)+cat.slice(1).toLowerCase()}`;
    btn.onclick = () => setTab(cat);
    tabsEl.appendChild(btn);
  });
}

// ─── FILTRADO ────────────────────────────────────────────────────────────────
function getFiltered(){
  const q=document.getElementById('searchInp').value.toLowerCase().trim();
  let ps=[...allProds];
  if(q) ps=ps.filter(p=>p.name.toLowerCase().includes(q));
  if(currentTab==='ofertas') ps=ps.filter(p=>isOfertaActiva(p));
  else if(currentTab!=='all') ps=ps.filter(p=>p.category===currentTab);
  smartFilters.forEach(f=>{
    if(f==='relampago')  ps=ps.filter(p=>(p.catOferta||'').toUpperCase().startsWith('RELAMPAGO'));
    if(f==='destacada')  ps=ps.filter(p=>p.catOferta==='DESTACADA');
    if(f==='especial')   ps=ps.filter(p=>p.catOferta==='ESPECIAL');
    if(f==='rotacion')   ps=ps.filter(p=>p.rotacion>=4);
    if(f==='stock-bajo') ps=ps.filter(p=>p.stock>0&&p.stock<=p.stockMin+2);
    if(f==='margen')     ps=ps.filter(p=>{const m=getMargen(p);return m!==null&&m>=50;});
    if(f==='criticos')   ps=ps.filter(p=>p.prioridad.includes('EMPUJAR YA'));
    if(f==='sin-oferta') ps=ps.filter(p=>!isOfertaActiva(p));
  });
  const sort=document.getElementById('sortSel').value;
  if(sort==='precio-asc')  ps.sort((a,b)=>a.price-b.price);
  else if(sort==='precio-desc') ps.sort((a,b)=>b.price-a.price);
  else if(sort==='nombre') ps.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==='rotacion')ps.sort((a,b)=>b.rotacion-a.rotacion);
  else if(sort==='stock')  ps.sort((a,b)=>b.stock-a.stock);
  else if(sort==='margen') ps.sort((a,b)=>(getMargen(b)||0)-(getMargen(a)||0));
  return ps;
}

// ─── RENDER GRID ─────────────────────────────────────────────────────────────
function render(){
  const grid=document.getElementById('grid');
  const ps=getFiltered();
  document.getElementById('countLbl').textContent=`${ps.length} productos`;
  grid.innerHTML='';
  if(!ps.length){grid.innerHTML='<div class="no-results">😕 Sin resultados</div>';return;}
  let lastCat='';
  ps.forEach(p=>{
    if(currentTab==='all'&&p.category!==lastCat){
      lastCat=p.category;
      const s=document.createElement('div');s.className='sep';s.textContent=lastCat;grid.appendChild(s);
    }
    const isSel=sel.has(p.id),ord=selOrder.indexOf(p.id)+1;
    const antes=getPrecioAntes(p), ahora=getPrecioAhora(p);
    const badge=getBadgeInfo(p), margen=getMargen(p), ahorro=getAhorro(p);
    const d=document.createElement('div');
    d.className=`card${isSel?' sel':''}`;d.onclick=()=>toggleSel(p.id);
    // precio: si hay antes > ahora → tachado + precio real
    const priceHtml = antes > 0
      ? `<span class="old-price">${fmt$(antes)}</span><span class="new-price">${fmt$(ahora)}</span>`
      : fmt$(ahora);
    // ahorro en $$ sin porcentaje
    const ahorroHtml = ahorro > 0
      ? `<div class="ahorro-tag">Ahorrás ${fmt$(ahorro)}</div>` : '';
    d.innerHTML=`
      ${badge?`<div class="badge ${badge.cls}">${badge.lbl}</div>`:''}
      <div class="chk">✓</div>
      <div class="ord-badge">${ord}</div>
      <div class="card-img"><img src="${getImg(p)}" onerror="this.parentNode.innerHTML='📦'" alt="" loading="lazy"></div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-price">${priceHtml}</div>
        ${ahorroHtml}
        ${margen!==null?`<div class="margen-tag">M:${margen}%</div>`:''}
      </div>
      ${p.stock>0&&p.stock<=p.stockMin+2?`<div class="stock-warn">⚠️ ${p.stock}u</div>`:''}`;
    grid.appendChild(d);
  });
}

function toggleSel(id){
  if(sel.has(id)){sel.delete(id);selOrder=selOrder.filter(x=>x!==id);}
  else{sel.add(id);selOrder.push(id);}
  updateStats();render();
}
function selAll(){getFiltered().forEach(p=>{if(!sel.has(p.id)){sel.add(p.id);selOrder.push(p.id);}});updateStats();render();showToast(`✓ ${sel.size} seleccionados`);}
function clearSel(){sel.clear();selOrder=[];quantities={};updateStats();render();showToast('🧹 Selección limpia');}
function updateStats(){
  document.getElementById('statSel').textContent=`✓ ${sel.size}`;
  const txt=buildText(currentFmt);
  document.getElementById('statChars').textContent=`${txt.length}c`;
  if(document.getElementById('outPanel').classList.contains('open'))updatePreview();
  buildQList();
}
function setTab(t){currentTab=t;document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));render();}
function toggleSmartBar(){smartVisible=!smartVisible;document.getElementById('smartBar').classList.toggle('show',smartVisible);}
function toggleSmart(f){
  if(smartFilters.has(f))smartFilters.delete(f);else smartFilters.add(f);
  document.querySelectorAll('.smart-btn').forEach(b=>b.classList.toggle('on',smartFilters.has(b.dataset.smart)));render();
}
function getSelected(){return selOrder.map(id=>allProds.find(p=>p.id===id)).filter(Boolean);}

// ─── TEXTOS ──────────────────────────────────────────────────────────────────
function buildText(fmt){
  const ps=getSelected();
  if(!ps.length)return'(Seleccioná productos primero)';
  if(fmt==='simple'){
    let t=`*ALMACÉN COPIHUE* 🏔️\n\n`;
    ps.forEach(p=>{
      const q=quantities[p.id]||1, ahora=getPrecioAhora(p);
      t+=`• ${p.name}${q>1?' x'+q:''} → *${fmt$(ahora)}*\n`;
    });
    t+=`\n📲 Pedidos al WhatsApp`;return t;
  }
  if(fmt==='completo'){
    let t=`*🏔️ ALMACÉN COPIHUE*\n*Ofertas y Variedad*\n_Precios válidos hoy_\n\n`;
    ps.forEach(p=>{
      const q=quantities[p.id]||1, antes=getPrecioAntes(p), ahora=getPrecioAhora(p);
      const ahorro=getAhorro(p), badge=getBadgeInfo(p);
      t+=`▪️ *${p.name}*\n`;
      if(q>1)t+=`  📦 Cantidad: ${q}\n`;
      t+=`  💵 *${fmt$(ahora)}*`;
      if(antes>0)t+=` ~~${fmt$(antes)}~~`;
      t+='\n';
      if(ahorro>0)t+=`  💰 Ahorrás *${fmt$(ahorro)}*\n`;
      if(badge)t+=`  ${badge.lbl}\n`;
      t+='\n';
    });
    t+=`📲 Pedidos por WhatsApp · ¡Te esperamos!`;return t;
  }
  if(fmt==='instagram'){
    let t=`🛒 OFERTA DEL DÍA\n🏔️ ALMACÉN COPIHUE\n\n`;
    ps.forEach(p=>{
      const ahora=getPrecioAhora(p), ahorro=getAhorro(p);
      t+=`✅ ${p.name} → ${fmt$(ahora)}${ahorro>0?' (ahorrás '+fmt$(ahorro)+')':''}\n`;
    });
    t+=`\n📍 Encontranos en Copihue\n📲 Pedidos por WhatsApp\n\n#almacen #oferta #copihue #patagonia #precios #compras #almacencerca #promos`;return t;
  }
  if(fmt==='facebook'){
    let t=`🏔️ ¡OFERTAS DEL DÍA en ALMACÉN COPIHUE! 🏔️\n\n`;
    ps.forEach(p=>{
      const antes=getPrecioAntes(p), ahora=getPrecioAhora(p), ahorro=getAhorro(p);
      t+=`🔹 ${p.name}`;
      if(antes>0)t+=` — ANTES ${fmt$(antes)}`;
      t+=` → AHORA *${fmt$(ahora)}*`;
      if(ahorro>0)t+=` ✂️ Ahorrás ${fmt$(ahorro)}`;
      t+='\n';
    });
    t+=`\n¿Te interesa? ¡Escribinos por WhatsApp!\n📲 Pedidos a domicilio disponibles`;return t;
  }
  if(fmt==='tiktok'){
    let t=`🔥 ALMACÉN COPIHUE — OFERTAS 🔥\n\n`;
    ps.forEach(p=>{
      const ahora=getPrecioAhora(p), ahorro=getAhorro(p);
      t+=`👉 ${p.name} → ${fmt$(ahora)}${ahorro>0?' (ahorrás '+fmt$(ahorro)+')':''}\n`;
    });
    t+=`\n¡Seguinos para más ofertas!\n#almacen #oferta #precio #tiktokviral #argentina #copihue`;return t;
  }
  if(fmt==='csv'){
    let t=`Producto,PrecioAhora,PrecioAntes,Ahorro,Categoría,Stock,Oferta\n`;
    ps.forEach(p=>{
      const antes=getPrecioAntes(p), ahora=getPrecioAhora(p), ahorro=getAhorro(p);
      t+=`"${p.name}",${ahora},${antes},${ahorro},"${p.category}",${p.stock},${p.catOferta}\n`;
    });
    return t;
  }
  if(fmt==='pizarron'){
    let t=`ALMACÉN COPIHUE\n${'─'.repeat(30)}\n`;
    ps.forEach(p=>{
      const q=quantities[p.id]||1, ahora=getPrecioAhora(p), ahorro=getAhorro(p);
      t+=`${p.name}${q>1?' (x'+q+')':''}\n  ${fmt$(ahora)}${ahorro>0?' — ahorrás '+fmt$(ahorro):''}\n`;
    });
    t+=`${'─'.repeat(30)}`;return t;
  }
  return buildText('simple');
}

function setFmt(f){currentFmt=f;document.querySelectorAll('.fmt-tab').forEach(b=>b.classList.toggle('on',b.dataset.fmt===f));updatePreview();}
function updatePreview(){document.getElementById('previewTxt').textContent=buildText(currentFmt);}

function buildQList(){
  const list=document.getElementById('qList');if(!list)return;
  const ps=getSelected();
  if(!ps.length){list.innerHTML='<div style="font-size:11px;color:#bbb">Seleccioná productos primero</div>';return;}
  list.innerHTML='';
  ps.forEach(p=>{const row=document.createElement('div');row.className='q-row';row.innerHTML=`<div class="q-name">${p.name}</div><input class="q-input" type="number" min="1" value="${quantities[p.id]||1}" onchange="quantities['${p.id}']=Math.max(1,parseInt(this.value)||1)">`;list.appendChild(row);});
}

function loadImg(src){
  return new Promise(res=>{
    const img=new Image();img.crossOrigin='anonymous';
    const t=setTimeout(()=>res(null),2500);
    img.onload=()=>{clearTimeout(t);res(img);};
    img.onerror=()=>{clearTimeout(t);res(null);};
    img.src=src;
  });
}

// Dibuja imagen en rect con clip circular (o rect con radio)
function drawImgClipped(ctx,img,x,y,w,h,r=0){
  ctx.save();
  ctx.beginPath();
  if(r>0){ctx.roundRect(x,y,w,h,r);}else{ctx.rect(x,y,w,h);}
  ctx.clip();
  if(img){ctx.drawImage(img,x,y,w,h);}else{ctx.fillStyle='#e0e0e0';ctx.fill();}
  ctx.restore();
}

// Dibuja rect con esquinas redondeadas
function rr(ctx,x,y,w,h,r,fill,stroke,sw=1){
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw;ctx.stroke();}
}

// Texto con wrap
function wrapText(ctx,text,x,y,maxW,lineH){
  const words=text.split(' ');let line='';
  words.forEach(w=>{
    const test=line?line+' '+w:w;
    if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line,x,y);line=w;y+=lineH;}else{line=test;}
  });
  ctx.fillText(line,x,y);return y;
}

// Badge de oferta en canvas
function drawBadge(ctx,badge,x,y,fontSize=20){
  if(!badge)return;
  ctx.font=`bold ${fontSize}px sans-serif`;
  const tw=ctx.measureText(badge.lbl).width;
  const pw=tw+fontSize*0.8,ph=fontSize*1.4;
  rr(ctx,x,y,pw,ph,ph/2,badge.color);
  ctx.fillStyle='#fff';ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText(badge.lbl,x+fontSize*0.4,y+ph/2);
}

// Precio con tachado
function drawPrice(ctx,price,antes,x,y,fs,color='#E53935',color2='#9e9e9e'){
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
  if(antes>price){
    ctx.font=`${fs*0.65}px sans-serif`;ctx.fillStyle=color2;
    const as=fmt$(antes);ctx.fillText(as,x,y);
    const aw=ctx.measureText(as).width;
    ctx.strokeStyle=color2;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(x,y-fs*0.4);ctx.lineTo(x+aw,y-fs*0.4);ctx.stroke();
    ctx.font=`bold ${fs}px sans-serif`;ctx.fillStyle=color;ctx.fillText(fmt$(price),x,y+fs*0.75);
  }else{
    ctx.font=`bold ${fs}px sans-serif`;ctx.fillStyle=color;ctx.fillText(fmt$(price),x,y);
  }
}

async function renderSquare(cv,ps,th){
  cv.width=1080;cv.height=1080;
  const ctx=cv.getContext('2d');
  const items=ps.slice(0,6);

  // ── Fondo degradado diagonal ──────────────────────────────────────
  const grad=ctx.createLinearGradient(0,0,1080,1080);
  grad.addColorStop(0,th.bg);grad.addColorStop(0.6,th.bg2);grad.addColorStop(1,th.bg);
  ctx.fillStyle=grad;ctx.fillRect(0,0,1080,1080);

  // ── Textura sutil (líneas diagonales tenues) ──────────────────────
  ctx.save();ctx.globalAlpha=0.04;ctx.strokeStyle='#fff';ctx.lineWidth=2;
  for(let x=-1080;x<2160;x+=28){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+1080,1080);ctx.stroke();}
  ctx.restore();

  // ── Header ────────────────────────────────────────────────────────
  // Sombra header
  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fillRect(0,0,1080,128);
  // Icono montaña
  ctx.font='56px sans-serif';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('🏔️',100,86);
  // Título
  ctx.fillStyle='#fff';ctx.font='bold 58px sans-serif';
  ctx.fillText('ALMACÉN COPIHUE',556,82);
  // Subtítulo
  ctx.font='500 26px sans-serif';ctx.fillStyle='rgba(255,255,255,0.80)';
  ctx.fillText('Ofertas especiales de hoy',556,116);
  // Línea separadora
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(30,130);ctx.lineTo(1050,130);ctx.stroke();

  if(!items.length){
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='36px sans-serif';
    ctx.fillText('Seleccioná productos primero',540,580);return;
  }

  // ── Layout grid ───────────────────────────────────────────────────
  const cols=items.length<=3?items.length:3;
  const rows=Math.ceil(items.length/cols);
  const pad=14, hdrH=142, ftrH=70;
  const areaW=1080-pad*2;
  const areaH=1080-hdrH-ftrH-pad*(rows+1);
  const cw=Math.floor((areaW-(cols-1)*pad)/cols);
  const ch=Math.floor(areaH/rows);

  for(let i=0;i<items.length;i++){
    const col=i%cols, row=Math.floor(i/cols);
    const cx=pad+col*(cw+pad);
    const cy=hdrH+pad+row*(ch+pad);
    const p=items[i];
    const img=await loadImg(getImg(p));
    const antes=getPrecioAntes(p), ahora=getPrecioAhora(p), ahorro=getAhorro(p);
    const badge=getBadgeInfo(p);

    // Card shadow
    ctx.save();ctx.shadowColor='rgba(0,0,0,0.22)';ctx.shadowBlur=18;ctx.shadowOffsetY=4;
    rr(ctx,cx,cy,cw,ch,16,'#fff');
    ctx.restore();

    // ── Calcular alturas de info zone ──────────────────────────────
    const fNom    = Math.round(cw * 0.073);
    const fTach   = Math.round(cw * 0.063);
    const fPrecio = Math.round(cw * 0.108);
    const nomH    = fNom + 10;
    const tachH   = antes > 0 ? fTach + 6 : 0;
    const precioH = fPrecio + 14;
    const infoH   = nomH + tachH + precioH + 12;
    const imgZoneH = ch - infoH;

    // ── Imagen ────────────────────────────────────────────────────
    drawImgClipped(ctx,img||null,cx+4,cy+4,cw-8,imgZoneH-4,12);
    if(!img){
      rr(ctx,cx+4,cy+4,cw-8,imgZoneH-4,12,'#F5F5F5');
      ctx.font=`${Math.round(imgZoneH*0.40)}px sans-serif`;
      ctx.textAlign='center';ctx.fillStyle='#ccc';ctx.textBaseline='middle';
      ctx.fillText('📦',cx+cw/2,cy+imgZoneH/2);
    }

    // Chip ahorro sobre imagen — solo si hay ahorro
    if(ahorro > 0){
      const afs=Math.round(cw*0.050);
      ctx.font=`bold ${afs}px sans-serif`;
      const atxt=`Ahorrás ${fmt$(ahorro)}`;
      const aw2=ctx.measureText(atxt).width+afs;
      const ah=afs*1.55;
      ctx.save();ctx.shadowColor='rgba(0,0,0,0.22)';ctx.shadowBlur=6;ctx.shadowOffsetY=2;
      rr(ctx,cx+cw-aw2-8,cy+imgZoneH-ah-8,aw2,ah,ah/2,'#E65100');
      ctx.restore();
      ctx.fillStyle='#fff';ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText(atxt,cx+cw-aw2-8+afs*0.4,cy+imgZoneH-ah/2-8);
    }

    // Línea divisoria
    ctx.strokeStyle='#eee';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx+12,cy+imgZoneH);ctx.lineTo(cx+cw-12,cy+imgZoneH);ctx.stroke();

    // ── Info zone — pegada sin espacios muertos ────────────────────
    ctx.textAlign='center';ctx.textBaseline='alphabetic';
    let iy = cy + imgZoneH + 10;

    // Nombre
    const nom = p.name.length > 20 ? p.name.slice(0,19)+'…' : p.name;
    ctx.fillStyle='#222';ctx.font=`bold ${fNom}px sans-serif`;
    ctx.fillText(nom, cx+cw/2, iy + fNom);
    iy += nomH;

    // Precio anterior tachado
    if(antes > 0){
      ctx.fillStyle='#aaa';ctx.font=`${fTach}px sans-serif`;
      const antStr=fmt$(antes);
      ctx.fillText(antStr, cx+cw/2, iy + fTach);
      const antW=ctx.measureText(antStr).width;
      ctx.strokeStyle='#bbb';ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(cx+cw/2-antW/2, iy+fTach*0.68);
      ctx.lineTo(cx+cw/2+antW/2, iy+fTach*0.68);
      ctx.stroke();
      iy += tachH;
    }

    // Precio actual — grande y rojo, pegado al pie
    ctx.fillStyle='#E53935';ctx.font=`bold ${fPrecio}px sans-serif`;
    ctx.fillText(fmt$(ahora), cx+cw/2, cy+ch-10);
  }

  // ── Footer ────────────────────────────────────────────────────────
  ctx.fillStyle='rgba(0,0,0,0.28)';ctx.fillRect(0,1010,1080,70);
  // Ícono WA
  ctx.font='32px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('📲',420,1045);
  ctx.fillStyle='#fff';ctx.font='bold 28px sans-serif';ctx.textBaseline='middle';
  ctx.fillText('Pedidos por WhatsApp',560,1045);
}

async function renderGrid6(cv,ps,th){

    const antes=getPrecioAntes(p),ahora=getPrecioAhora(p);

    if(antes>0){ctx.font='16px monospace';ctx.fillStyle='#9e9e9e';const as=fmt$(antes);ctx.fillText(as,780,y+34);const aw=ctx.measureText(as).width;ctx.strokeStyle='#9e9e9e';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(780-aw,y+25);ctx.lineTo(780,y+25);ctx.stroke();}

async function renderPromo(cv,ps,th){
  cv.width=1080;cv.height=1080;
  const ctx=cv.getContext('2d');
  const items=ps.slice(0,4);
  // fondo explosion
  const grad=ctx.createRadialGradient(540,540,0,540,540,800);
  grad.addColorStop(0,th.bg2);grad.addColorStop(0.5,th.bg);grad.addColorStop(1,'#000');
  ctx.fillStyle=grad;ctx.fillRect(0,0,1080,1080);
  // Destellos decorativos
  const sparks=[{x:100,y:80},{x:980,y:120},{x:60,y:900},{x:1000,y:950},{x:540,y:30}];
  sparks.forEach(s=>{ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='32px sans-serif';ctx.textAlign='center';ctx.fillText('✦',s.x,s.y);});
  ctx.fillStyle='rgba(0,0,0,0.3)';rr(ctx,40,30,1000,100,20,'rgba(0,0,0,0.3)');
  ctx.fillStyle='#fff';ctx.font='bold 56px sans-serif';ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillText('🔥 OFERTAS IMPERDIBLES 🔥',540,100);
  if(!items.length){ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='36px sans-serif';ctx.fillText('Seleccioná productos',540,540);return;}
  const cols=2,cw=480,ch=440,pad=20,startX=60,startY=150;
  for(let i=0;i<Math.min(items.length,4);i++){
    const col=i%cols,row=Math.floor(i/cols);
    const cx=startX+col*(cw+pad),cy=startY+row*(ch+pad);
    const p=items[i];const img=await loadImg(getImg(p));
    rr(ctx,cx,cy,cw,ch,20,'rgba(255,255,255,0.12)','rgba(255,255,255,0.3)',2);
    const imgH=260;
    drawImgClipped(ctx,img||null,cx+10,cy+10,cw-20,imgH,14);
    if(!img){rr(ctx,cx+10,cy+10,cw-20,imgH,14,'rgba(255,255,255,0.1)');ctx.font='72px sans-serif';ctx.textAlign='center';ctx.fillText('📦',cx+cw/2,cy+imgH/2+26);}
    const badge=getBadgeInfo(p);if(badge){ctx.font='bold 18px sans-serif';const tw=ctx.measureText(badge.lbl).width+18;rr(ctx,cx+14,cy+14,tw,28,14,'rgba(0,0,0,0.6)');ctx.fillStyle=badge.color;ctx.textAlign='left';ctx.fillText(badge.lbl,cx+23,cy+32);}
    ctx.fillStyle='#fff';ctx.font='bold 22px sans-serif';ctx.textAlign='center';ctx.textBaseline='alphabetic';
    const nom=p.name.length>26?p.name.slice(0,24)+'…':p.name;ctx.fillText(nom,cx+cw/2,cy+imgH+40);
    const antes=getPrecioAntes(p),ahora=getPrecioAhora(p);
    if(antes>0){ctx.font='18px sans-serif';ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillText(fmt$(antes),cx+cw/2,cy+imgH+72);ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;const aw=ctx.measureText(fmt$(antes)).width;ctx.beginPath();ctx.moveTo(cx+cw/2-aw/2,cy+imgH+62);ctx.lineTo(cx+cw/2+aw/2,cy+imgH+62);ctx.stroke();}
    ctx.font='bold 40px sans-serif';ctx.fillStyle='#FFD600';ctx.textAlign='center';ctx.fillText(fmt$(ahora),cx+cw/2,cy+ch-24);
  }
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,1040,1080,40);
  ctx.fillStyle='#fff';ctx.font='bold 20px sans-serif';ctx.textAlign='center';ctx.fillText('📲 Pedidos por WhatsApp · Almacén Copihue',540,1066);
}

function abrirImg(tipo){
  if(!sel.size){showToast('Seleccioná productos primero');return;}
  currentImgType=tipo;
  document.getElementById('imgPanelTitle').textContent=IMG_TITLES[tipo]||'🎨 Imagen';
  closePanels();
  buildThemeRow();
  document.getElementById('imgLoading').style.display='block';
  document.getElementById('cvUniv').style.display='none';
  document.getElementById('imgPanel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  setTimeout(renderCurrentImg,80);
}

async function renderCurrentImg(){
  const cv=document.getElementById('cvUniv');
  const ps=getSelected();
  if(!ps.length){showToast('Sin productos seleccionados');return;}
  document.getElementById('imgLoading').style.display='block';
  cv.style.display='none';
  const th=currentTheme;
  const map={
    stories:renderStories,square:renderSquare,banner:renderBanner,
    portrait:renderPortrait,grid3:renderGrid3,grid6:renderGrid6,
    lista:renderLista,ticket:renderTicket,dark:renderDark,promo:renderPromo
  };
  const fn=map[currentImgType];
  if(fn)await fn(cv,ps,th);
  document.getElementById('imgLoading').style.display='none';
  cv.style.display='block';
}

function downloadUniv(){
  const cv=document.getElementById('cvUniv');
  const a=document.createElement('a');
  a.download=`copihue_${currentImgType}_${Date.now()}.jpg`;
  a.href=cv.toDataURL('image/jpeg',0.93);a.click();
  showToast('💾 ¡Imagen guardada!');
}
