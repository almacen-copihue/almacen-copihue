<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Copihue · Caja Movimientos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --v0:#b71c1c;--v1:#e64a19;--v2:#ff8f00;--v3:#66bb6a;--v4:#2e7d32;--v5:#1b5e20;--v6:#0a3d0f;
  --verde:#2e7d32;--vd:#1b5e20;--vdp:#0a3d0f;--vl:#e8f5e9;
  --naranja:#f57c00;--nl:#fff3e0;
  --rojo:#c62828;--rl:#ffebee;
  --azul:#1565c0;--al:#e3f2fd;
  --morado:#6a1b9a;--ml:#f3e5f5;
  --gris:#546e7a;--bg:#f1f8f1;--blanco:#fff;--borde:#c8e6c9;--texto:#1a2e1c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--texto);min-height:100dvh}

.hdr{background:linear-gradient(135deg,var(--vdp),var(--vd),var(--verde));padding:11px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(10,61,15,.4);position:sticky;top:0;z-index:100}
.hdr-icon{font-size:1.5rem}
.hdr-t{color:#fff;font-size:.95rem;font-weight:900}
.hdr-s{color:rgba(255,255,255,.7);font-size:.62rem;letter-spacing:2px;text-transform:uppercase}
.btn-back{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:20px;padding:5px 13px;font-size:.76rem;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center}

.wrap{padding:12px}

/* CARDS RESUMEN */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.card{background:#fff;border-radius:14px;padding:12px;border:1px solid var(--borde)}
.card.full{grid-column:1/-1}
.card.rojo-g{background:linear-gradient(135deg,#b71c1c,var(--rojo));color:#fff;border:none}
.card.naranja-g{background:linear-gradient(135deg,#e65100,var(--naranja));color:#fff;border:none}
.card.gris-g{background:linear-gradient(135deg,#37474f,#546e7a);color:#fff;border:none}
.card-lbl{font-size:.62rem;opacity:.8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.card-val{font-size:1.4rem;font-weight:900;line-height:1}
.card-sub{font-size:.65rem;opacity:.75;margin-top:3px}

/* TARJETA */
.tar{background:#fff;border-radius:14px;border:1px solid var(--borde);padding:13px;margin-bottom:10px}
.tar-t{font-size:.68rem;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}

/* BARRA */
.barra-bg{background:var(--rl);border-radius:20px;height:7px;margin-top:3px}
.barra-f{border-radius:20px;height:7px}
.bar-rojo{background:linear-gradient(90deg,var(--rojo),#ef9a9a)}
.bar-naranja{background:linear-gradient(90deg,var(--naranja),#ffd54f)}
.bar-verde{background:linear-gradient(90deg,var(--vd),#66bb6a)}

/* ROWS */
.row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f5f5f5}
.row:last-child{border-bottom:none}
.row-l{font-size:.8rem;color:var(--gris);flex:1;padding-right:8px}
.row-v{font-weight:900;font-size:.85rem;color:var(--rojo);white-space:nowrap}
.row-v.verde{color:var(--verde)}
.row-pct{font-size:.65rem;color:var(--gris);background:#f5f5f5;padding:2px 6px;border-radius:10px;margin-left:5px}

/* DÍAS SEMANA */
.dsem-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.dsem-l{font-size:.74rem;font-weight:700;color:var(--gris);min-width:34px}
.dsem-bg{flex:1;background:var(--rl);border-radius:20px;height:9px}
.dsem-f{background:linear-gradient(90deg,var(--rojo),#ef5350);border-radius:20px;height:9px}
.dsem-v{font-size:.72rem;font-weight:700;color:var(--rojo);min-width:80px;text-align:right}

/* CHIPS FILTRO */
.chips-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{padding:5px 12px;border:2px solid var(--borde);border-radius:20px;background:#fff;font-size:.74rem;font-weight:700;cursor:pointer;color:var(--gris);font-family:inherit;transition:all .15s}
.chip.activo{background:var(--rojo);border-color:var(--rojo);color:#fff}

/* MOVIMIENTO CARD */
.mov{background:#fff;border-radius:12px;border-left:4px solid var(--rojo);border:1px solid var(--borde);border-left:4px solid var(--rojo);margin-bottom:7px;padding:10px 12px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.mov-info{flex:1}
.mov-motivo{font-size:.82rem;font-weight:700;color:var(--texto);margin-bottom:2px}
.mov-obs{font-size:.7rem;color:var(--gris);margin-bottom:4px;line-height:1.4}
.mov-meta{display:flex;gap:5px;flex-wrap:wrap}
.mov-tag{font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:10px}
.tag-fecha{background:var(--vl);color:var(--vd)}
.tag-hora{background:#f5f5f5;color:var(--gris)}
.tag-medio{background:var(--al);color:var(--azul)}
.tag-tipo{background:var(--rl);color:var(--rojo)}
.mov-monto{font-size:1rem;font-weight:900;color:var(--rojo);white-space:nowrap}

/* BADGE */
.badge{font-size:.64rem;font-weight:700;padding:2px 8px;border-radius:20px}
.bg-r{background:var(--rl);color:var(--rojo)}
.bg-o{background:var(--nl);color:#e65100}
.bg-g{background:var(--vl);color:var(--vd)}

/* SELECTOR MES */
.mes-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;background:#fff;border-radius:12px;padding:8px 12px;border:1px solid var(--borde)}
.mes-nombre{font-size:.95rem;font-weight:900;color:var(--rojo)}
.btn-mes{width:32px;height:32px;border:none;border-radius:50%;background:var(--rojo);color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900}

/* ALERT TOP */
.alert{background:linear-gradient(135deg,#b71c1c,#e53935);color:#fff;border-radius:14px;padding:13px 15px;margin-bottom:12px;display:flex;gap:12px;align-items:flex-start}
.alert-icon{font-size:1.8rem;line-height:1}
.alert-t{font-size:.82rem;font-weight:900;margin-bottom:2px}
.alert-s{font-size:.72rem;opacity:.85}

/* PROD ROW */
.prod-row{margin-bottom:8px}
.prod-hdr{display:flex;justify-content:space-between;margin-bottom:2px}
.prod-n{font-size:.78rem;font-weight:700;color:var(--texto)}
.prod-d{font-size:.72rem;color:var(--gris)}

/* TABS */
.tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.tab{padding:7px 14px;border:2px solid var(--borde);border-radius:20px;background:#fff;font-size:.74rem;font-weight:700;cursor:pointer;color:var(--gris);white-space:nowrap;font-family:inherit}
.tab.activo{background:var(--rojo);border-color:var(--rojo);color:#fff}

/* SEC SEP */
.sel-sec-lbl{font-size:.66rem;font-weight:900;color:var(--gris);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.sel-sec-lbl::before{content:'';display:block;width:3px;height:12px;background:var(--rojo);border-radius:2px}

.empty{text-align:center;padding:24px;color:#bbb;font-size:.82rem}
.pb{padding-bottom:28px}

/* SEARCH */
.search-bar{display:flex;align-items:center;background:#fff;border:1.5px solid var(--borde);border-radius:12px;padding:8px 12px;gap:8px;margin-bottom:12px}
.search-bar input{flex:1;border:none;outline:none;font-family:inherit;font-size:.82rem;color:var(--texto);background:transparent}
.search-bar input::placeholder{color:#bbb}

/* TOGGLE */
.toggle-sec{width:100%;padding:9px;border:2px solid var(--borde);border-radius:12px;background:#fff;font-size:.78rem;font-weight:700;color:var(--gris);cursor:pointer;font-family:inherit;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.toggle-sec.open{background:var(--rl);border-color:var(--rojo);color:var(--rojo)}

/* STAT FILA */
.stat-fila{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.stat-mini{background:#fff;border-radius:11px;border:1px solid var(--borde);padding:9px 6px;text-align:center}
.stat-mini-v{font-size:1.1rem;font-weight:900;color:var(--rojo);line-height:1}
.stat-mini-l{font-size:.56rem;color:var(--gris);margin-top:2px;text-transform:uppercase;letter-spacing:.6px}

/* CALENDARIO SIMPLE */
.cal-dias-sem{display:grid;grid-template-columns:repeat(7,1fr);background:var(--rojo);border-radius:8px 8px 0 0;padding:4px 0}
.cal-dn2{text-align:center;padding:3px;font-size:.6rem;font-weight:700;color:rgba(255,255,255,.85);text-transform:uppercase}
.cal-dias-grid{display:grid;grid-template-columns:repeat(7,1fr);background:var(--rl);gap:0;padding:3px;border-radius:0 0 10px 10px}
.cal-d2{border:1px solid transparent;border-radius:8px;margin:1px;padding:4px 2px;text-align:center;cursor:pointer;transition:all .12s;min-height:44px;display:flex;flex-direction:column;align-items:center;gap:1px;background:rgba(255,255,255,.7);font-size:.75rem;font-weight:700}
.cal-d2.tiene{background:#fff;border-color:#ef9a9a}
.cal-d2.sel{background:var(--rojo)!important;color:#fff!important;border-color:#b71c1c!important}
.cal-d2.vacio{cursor:default;background:transparent;border:none}
.cal-d2 .dm2{font-size:.52rem;font-weight:700;color:var(--rojo);line-height:1}
.cal-d2.sel .dm2{color:rgba(255,200,100,.9)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-icon">💸</div>
  <div><div class="hdr-t">Copihue · Caja</div><div class="hdr-s">Movimientos de dinero</div></div>
  <button class="btn-back" onclick="history.back()">← Volver</button>
</div>

<div class="wrap" id="app">
  <div style="text-align:center;padding:60px 20px;color:var(--gris)">
    <div style="width:34px;height:34px;border:3px solid var(--rl);border-top-color:var(--rojo);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px"></div>
    Cargando movimientos...
  </div>
</div>

<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script>
// ===== CONFIG =====
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS_SEM=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const API_URL = 'https://script.google.com/macros/s/AKfycbxhKFk2WAi-KRY5xGBsI6_6Pvp3jDjt8mSRXvy7I1WehNmBpJamqK9G9Q1ZJSCSgAdfDA/exec';
const fmt = n => '$' + Math.round(n).toLocaleString('es-AR');

let movimientos = [];
let mesSel = new Date().getMonth();
let anioSel = new Date().getFullYear();
let tabActiva = 'resumen';
let filtroMotivo = '';
let filtroTipo = 'TODOS';
let diasSelCal = new Set();
let cargando = false;

// ===== CARGA DESDE API =====
async function cargarDatos() {
  cargando = true;
  document.getElementById('app').innerHTML = `
    <div style="text-align:center;padding:60px 20px;color:var(--gris)">
      <div style="width:34px;height:34px;border:3px solid var(--rl);border-top-color:var(--rojo);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px"></div>
      Cargando movimientos de caja...
    </div>`;
  try {
    // Trae todos los registros (sin límite para tener historial completo)
    const url = API_URL + '?action=getCajaEgresos&data=' + encodeURIComponent(JSON.stringify({limite: 2000}));
    const r = await fetch(url, {redirect:'follow', signal: AbortSignal.timeout(20000)});
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'Error en la API');
    // Mapear campos: la API devuelve obs en vez de observacion
    movimientos = (d.registros || []).map(m => ({
      fecha:      m.fecha,
      hora:       m.hora,
      tipo:       m.tipo,
      motivo:     m.motivo,
      monto:      m.monto || 0,
      medio:      m.medio,
      categoria:  m.categoria,
      observacion: m.obs || ''  // el GAS devuelve "obs", lo normalizamos
    }));
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div style="text-align:center;padding:40px 20px">
        <div style="font-size:2rem;margin-bottom:10px">❌</div>
        <div style="color:var(--rojo);font-weight:700;margin-bottom:5px">No se pudo cargar</div>
        <div style="color:var(--gris);font-size:.78rem;margin-bottom:16px">${e.message}</div>
        <button onclick="cargarDatos()" style="background:var(--rojo);color:#fff;border:none;border-radius:12px;padding:10px 20px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit">🔄 Reintentar</button>
      </div>`;
    return;
  }
  cargando = false;
  render();
}

// ===== HELPERS =====
function parseFecha(f){ return new Date(f + 'T12:00:00'); }
function fmtFecha(f){
  const d = parseFecha(f);
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
}
function getMes(f){ return parseFecha(f).getMonth(); }
function getAnio(f){ return parseFecha(f).getFullYear(); }
function getDow(f){ return parseFecha(f).getDay(); }

function getMov(){
  return movimientos.filter(m => {
    const ok = getMes(m.fecha)===mesSel && getAnio(m.fecha)===anioSel;
    const okTipo = filtroTipo==='TODOS' || m.motivo===filtroTipo;
    const okBusq = !filtroMotivo || m.observacion.toLowerCase().includes(filtroMotivo.toLowerCase()) || m.motivo.toLowerCase().includes(filtroMotivo.toLowerCase());
    const okCal = diasSelCal.size===0 || diasSelCal.has(m.fecha);
    return ok && okTipo && okBusq && okCal;
  });
}

function getTipos(){
  const s = new Set(movimientos.filter(m=>getMes(m.fecha)===mesSel&&getAnio(m.fecha)===anioSel).map(m=>m.motivo));
  return ['TODOS',...s];
}

function getCategoriasGasto(movs){
  // Detecta subcategorías por palabras clave en observación
  const cats = {
    '🚗 Transporte/Auto': ['nafta','auto','patente','bidón','fiat'],
    '💊 Salud': ['dentista','siquiatra','sangre','examen','médico','remedio','salud','medico'],
    '📺 Servicios/Suscripciones': ['netflix','hbo','amazon','youtube','starlink','tuenti','streaming','servicio'],
    '🏠 Hogar/Casa': ['casa','mercado pago','comision','luz','gas','espuma','fondos'],
    '🍦 Comida/Consumo': ['sandwich','queso','jamón','pan','helado','grido','bimbo'],
    '💆 Bienestar/Personal': ['avon','crema','melena','leon','alma','natalia'],
    '👨‍👩‍👧 Familia': ['familia','seba','hijita','remedio nali','nali'],
    '💰 Otros': [],
  };
  const res = {};
  Object.keys(cats).forEach(k => res[k]=0);
  movs.forEach(m => {
    const obs = (m.observacion||'').toLowerCase();
    let asignado = false;
    for(const [cat, kws] of Object.entries(cats)){
      if(cat==='💰 Otros') continue;
      if(kws.some(kw=>obs.includes(kw))){
        res[cat] += m.monto;
        asignado = true;
        break;
      }
    }
    if(!asignado) res['💰 Otros'] += m.monto;
  });
  return Object.entries(res).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
}

// ===== RENDER =====
function render(){
  document.getElementById('app').innerHTML = buildHTML();
  bindEvents();
}

function buildHTML(){
  const movs = getMov();
  const total = movs.reduce((s,m)=>s+m.monto,0);
  const count = movs.length;
  const prom = count ? Math.round(total/count) : 0;
  const max = movs.reduce((mx,m)=>m.monto>mx?m.monto:mx,0);
  const movMes = movimientos.filter(m=>getMes(m.fecha)===mesSel&&getAnio(m.fecha)===anioSel);
  const totalMes = movMes.reduce((s,m)=>s+m.monto,0);

  // Alertas inteligentes
  const gastosMayores = movs.filter(m=>m.monto>=100000);
  const servicios = movs.filter(m=>{
    const obs=(m.observacion||'').toLowerCase();
    return obs.includes('netflix')||obs.includes('hbo')||obs.includes('amazon')||obs.includes('youtube')||obs.includes('starlink')||obs.includes('tuenti');
  });
  const totalServ = servicios.reduce((s,m)=>s+m.monto,0);

  let html = '';

  // MES NAV
  html += `
  <div class="mes-nav">
    <button class="btn-mes" onclick="cambiarMes(-1)">‹</button>
    <span class="mes-nombre">📅 ${MESES[mesSel]} ${anioSel}</span>
    <button class="btn-mes" onclick="cambiarMes(1)">›</button>
  </div>`;

  // ALERTA si hay gastos grandes
  if(gastosMayores.length > 0){
    html += `
    <div class="alert">
      <div class="alert-icon">⚠️</div>
      <div>
        <div class="alert-t">${gastosMayores.length} gasto${gastosMayores.length>1?'s':''} mayor${gastosMayores.length>1?'es':''} a $100.000</div>
        <div class="alert-s">Total en gastos grandes: ${fmt(gastosMayores.reduce((s,m)=>s+m.monto,0))}</div>
      </div>
    </div>`;
  }

  // CARDS RESUMEN
  html += `
  <div class="cards">
    <div class="card rojo-g full">
      <div class="card-lbl">💸 Total egresos del período</div>
      <div class="card-val">${fmt(total)}</div>
      <div class="card-sub">${count} movimiento${count!==1?'s':''} · Promedio ${fmt(prom)} c/u</div>
    </div>
    <div class="card">
      <div class="card-lbl" style="color:var(--gris)">📈 Mayor gasto</div>
      <div style="font-size:1.15rem;font-weight:900;color:var(--rojo)">${fmt(max)}</div>
      <div style="font-size:.62rem;color:var(--gris);margin-top:2px">${movs.find(m=>m.monto===max)?.observacion?.slice(0,30)||'—'}</div>
    </div>
    <div class="card">
      <div class="card-lbl" style="color:var(--gris)">📺 Suscripciones</div>
      <div style="font-size:1.15rem;font-weight:900;color:var(--naranja)">${fmt(totalServ)}</div>
      <div style="font-size:.62rem;color:var(--gris);margin-top:2px">${servicios.length} servicios digitales</div>
    </div>
  </div>`;

  // STATS MINI
  const diasConGasto = [...new Set(movs.map(m=>m.fecha))].length;
  const mayorDia = (() => {
    const por = {}; movs.forEach(m=>{por[m.fecha]=(por[m.fecha]||0)+m.monto;});
    return Math.max(...Object.values(por),0);
  })();
  html += `
  <div class="stat-fila">
    <div class="stat-mini"><div class="stat-mini-v">${count}</div><div class="stat-mini-l">Movimientos</div></div>
    <div class="stat-mini"><div class="stat-mini-v">${diasConGasto}</div><div class="stat-mini-l">Días con gasto</div></div>
    <div class="stat-mini"><div class="stat-mini-v">${fmt(mayorDia)}</div><div class="stat-mini-l">Peor día</div></div>
  </div>`;

  // TABS
  html += `
  <div class="tabs">
    <button class="tab ${tabActiva==='resumen'?'activo':''}" onclick="setTab('resumen')">📊 Resumen</button>
    <button class="tab ${tabActiva==='categorias'?'activo':''}" onclick="setTab('categorias')">🏷️ Categorías</button>
    <button class="tab ${tabActiva==='detalle'?'activo':''}" onclick="setTab('detalle')">📋 Detalle</button>
    <button class="tab ${tabActiva==='calendario'?'activo':''}" onclick="setTab('calendario')">📅 Calendario</button>
  </div>`;

  if(tabActiva==='resumen') html += buildResumen(movs, total);
  else if(tabActiva==='categorias') html += buildCategorias(movs, total);
  else if(tabActiva==='detalle') html += buildDetalle(movs);
  else if(tabActiva==='calendario') html += buildCalendario();

  html += '<div class="pb"></div>';
  return html;
}

function buildResumen(movs, total){
  let html = '';

  // POR DÍA DE SEMANA
  const porDow = Array(7).fill(0);
  movs.forEach(m=>{ porDow[getDow(m.fecha)] += m.monto; });
  const maxDow = Math.max(...porDow);
  html += `<div class="tar"><div class="tar-t">📅 Gasto por día de semana</div>`;
  DIAS_SEM.forEach((d,i)=>{
    if(porDow[i]===0) return;
    const pct = maxDow ? Math.round(porDow[i]/maxDow*100) : 0;
    html += `<div class="dsem-row">
      <div class="dsem-l">${d}</div>
      <div class="dsem-bg"><div class="dsem-f" style="width:${pct}%"></div></div>
      <div class="dsem-v">${fmt(porDow[i])}</div>
    </div>`;
  });
  html += '</div>';

  // TOP GASTOS
  const sorted = [...movs].sort((a,b)=>b.monto-a.monto).slice(0,8);
  html += `<div class="tar"><div class="tar-t">🏆 Top gastos del período</div>`;
  sorted.forEach((m,i)=>{
    const pct = total ? Math.round(m.monto/total*100) : 0;
    html += `<div class="prod-row">
      <div class="prod-hdr">
        <div class="prod-n">${i+1}. ${m.observacion||m.motivo}</div>
        <div class="prod-d" style="color:var(--rojo);font-weight:700">${fmt(m.monto)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:5px">
        <div class="barra-bg" style="flex:1"><div class="barra-f bar-rojo" style="width:${pct}%"></div></div>
        <span style="font-size:.62rem;color:var(--gris);min-width:30px">${pct}%</span>
      </div>
    </div>`;
  });
  html += '</div>';

  // SERVICIOS DIGITALES
  const servicios = movs.filter(m=>{
    const obs=(m.observacion||'').toLowerCase();
    return obs.includes('netflix')||obs.includes('hbo')||obs.includes('amazon')||obs.includes('youtube')||obs.includes('starlink')||obs.includes('tuenti');
  });
  if(servicios.length){
    const ts = servicios.reduce((s,m)=>s+m.monto,0);
    html += `<div class="tar"><div class="tar-t">📺 Servicios y suscripciones <span class="badge bg-o">${fmt(ts)}</span></div>`;
    servicios.forEach(m=>{
      html += `<div class="row">
        <div class="row-l">${m.observacion}</div>
        <div class="row-v">${fmt(m.monto)}</div>
      </div>`;
    });
    html += `<div style="margin-top:8px;padding:6px 8px;background:var(--nl);border-radius:8px;font-size:.7rem;color:#e65100;font-weight:700">
      💡 ${Math.round(ts/total*100)}% de tus egresos son suscripciones digitales este período
    </div>`;
    html += '</div>';
  }

  // EVOLUCIÓN ÚLTIMOS 3 MESES
  const meses3 = [-2,-1,0].map(d=>{
    let m2 = mesSel+d; let a2 = anioSel;
    if(m2<0){m2+=12;a2--;}
    if(m2>11){m2-=12;a2++;}
    const movs2 = movimientos.filter(m=>getMes(m.fecha)===m2&&getAnio(m.fecha)===a2);
    return {mes:MESES[m2].slice(0,3), total:movs2.reduce((s,m)=>s+m.monto,0)};
  });
  const maxM = Math.max(...meses3.map(m=>m.total),1);
  html += `<div class="tar"><div class="tar-t">📈 Comparación últimos meses</div>`;
  meses3.forEach(m=>{
    const pct = Math.round(m.total/maxM*100);
    html += `<div class="dsem-row">
      <div class="dsem-l">${m.mes}</div>
      <div class="dsem-bg" style="background:var(--rl)"><div class="dsem-f" style="width:${pct}%;background:linear-gradient(90deg,var(--rojo),#ef5350)"></div></div>
      <div class="dsem-v" style="color:var(--rojo)">${fmt(m.total)}</div>
    </div>`;
  });
  html += '</div>';

  return html;
}

function buildDetalle(movs){
  let html = '';

  // FILTROS
  const tipos = getTipos();
  html += `<div class="chips-wrap">`;
  tipos.forEach(t=>{
    html += `<button class="chip ${filtroTipo===t?'activo':''}" onclick="setFiltroTipo('${t}')">${t}</button>`;
  });
  html += `</div>`;

  html += `<div class="search-bar">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar en observaciones..." value="${filtroMotivo}" oninput="setFiltro(this.value)">
  </div>`;

  const sorted = [...movs].sort((a,b)=>b.fecha>a.fecha?-1:1).reverse();

  if(!sorted.length){
    html += `<div class="empty">Sin movimientos para este período</div>`;
  } else {
    sorted.forEach(m=>{
      html += `<div class="mov">
        <div class="mov-info">
          <div class="mov-motivo">${m.motivo}</div>
          <div class="mov-obs">${m.observacion||'—'}</div>
          <div class="mov-meta">
            <span class="mov-tag tag-fecha">${fmtFecha(m.fecha)}</span>
            <span class="mov-tag tag-hora">${m.hora?.slice(0,5)||'—'}</span>
            <span class="mov-tag tag-medio">${m.medio}</span>
            <span class="mov-tag tag-tipo">${m.tipo}</span>
          </div>
        </div>
        <div class="mov-monto">${fmt(m.monto)}</div>
      </div>`;
    });
  }

  return html;
}

function buildCalendario(){
  const primerDia = new Date(anioSel, mesSel, 1).getDay();
  const diasMes = new Date(anioSel, mesSel+1, 0).getDate();

  // Agrupar por fecha
  const porFecha = {};
  movimientos.filter(m=>getMes(m.fecha)===mesSel&&getAnio(m.fecha)===anioSel).forEach(m=>{
    if(!porFecha[m.fecha]) porFecha[m.fecha]={total:0,count:0};
    porFecha[m.fecha].total += m.monto;
    porFecha[m.fecha].count++;
  });
  const maxDia = Math.max(...Object.values(porFecha).map(d=>d.total),1);

  let html = `<div style="border-radius:14px;overflow:hidden;border:1px solid var(--borde);margin-bottom:12px">`;
  html += `<div class="cal-dias-sem">${DIAS_SEM.map(d=>`<div class="cal-dn2">${d}</div>`).join('')}</div>`;
  html += `<div class="cal-dias-grid">`;

  for(let i=0;i<primerDia;i++) html += `<div class="cal-d2 vacio"></div>`;
  for(let d=1;d<=diasMes;d++){
    const fStr = anioSel+'-'+String(mesSel+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const data = porFecha[fStr];
    const sel = diasSelCal.has(fStr);
    const intensidad = data ? Math.round(data.total/maxDia*100) : 0;
    const bg = data && !sel ? `background:rgba(198,40,40,${0.1+intensidad/100*0.6})` : '';
    html += `<div class="cal-d2 ${data?'tiene':''} ${sel?'sel':''}" style="${bg}" onclick="toggleDiaCal('${fStr}')">
      <span>${d}</span>
      ${data?`<span class="dm2">${fmt(data.total).replace('$','')}</span>`:''}
    </div>`;
  }
  html += '</div></div>';

  // Detalle días seleccionados
  if(diasSelCal.size > 0){
    const movsCal = movimientos.filter(m=>diasSelCal.has(m.fecha));
    const totalCal = movsCal.reduce((s,m)=>s+m.monto,0);
    html += `<div class="tar"><div class="tar-t">📋 Detalle días seleccionados <span class="badge bg-r">${fmt(totalCal)}</span></div>`;
    movsCal.sort((a,b)=>a.monto<b.monto?1:-1).forEach(m=>{
      html += `<div class="row">
        <div class="row-l">${m.observacion||m.motivo}</div>
        <div class="row-v">${fmt(m.monto)}</div>
      </div>`;
    });
    html += `<button onclick="diasSelCal.clear();render()" style="margin-top:8px;width:100%;padding:7px;border:2px solid var(--borde);border-radius:10px;background:#fff;font-size:.75rem;font-weight:700;color:var(--gris);cursor:pointer;font-family:inherit">✕ Limpiar selección</button>`;
    html += '</div>';
  } else {
    html += `<div class="empty">Tocá un día para ver el detalle</div>`;
  }

  return html;
}

function cambiarMes(d){
  mesSel += d;
  if(mesSel<0){mesSel=11;anioSel--;}
  if(mesSel>11){mesSel=0;anioSel++;}
  diasSelCal.clear();
  render();
}
function setTab(t){ tabActiva=t; render(); }
function setFiltroTipo(t){ filtroTipo=t; render(); }
function setFiltro(v){ filtroMotivo=v; document.getElementById('app').innerHTML=buildHTML(); bindEvents(); }
function toggleDiaCal(f){ diasSelCal.has(f)?diasSelCal.delete(f):diasSelCal.add(f); render(); }

  // ya están en inline handlers
}
