<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras — Almacén Copihue</title>
    <meta name="theme-color" content="#2e7d32">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <style>
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --primary-light: #4caf50;
            --secondary: #ff6f00;
            --light: #f8fff8;
            --dark: #1b5e20;
            --urgente-bg: #fff8f8;
            --piso-bg: #fffde7;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
        body { background:linear-gradient(135deg,#f8fff8 0%,#e8f5e9 100%); color:var(--dark); min-height:100vh; }

        /* HEADER */
        header {
            background:linear-gradient(135deg,var(--primary),var(--primary-light));
            color:white; padding:0.9rem 1rem;
            position:sticky; top:0; z-index:100;
            box-shadow:0 2px 12px rgba(0,0,0,0.2);
        }
        .hc { max-width:700px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; gap:0.8rem; }
        .hl { display:flex; align-items:center; gap:0.6rem; }
        .logo-link { color:white; text-decoration:none; font-size:0.8rem; opacity:0.85; }
        .logo-link:hover { opacity:1; }
        .page-title    { font-size:1.15rem; font-weight:900; }
        .page-subtitle { font-size:0.72rem; opacity:0.8; margin-top:1px; }
        .ha { display:flex; gap:8px; align-items:center; }
        .btn-h {
            background:rgba(255,255,255,0.2); border:1.5px solid rgba(255,255,255,0.4);
            color:white; border-radius:20px; padding:6px 14px;
            font-size:0.78rem; font-weight:700; cursor:pointer; transition:all 0.2s;
        }
        .btn-h:hover { background:rgba(255,255,255,0.35); }

        /* RESUMEN */
        .resumen-bar { background:white; border-bottom:2px solid #e8f5e9; padding:10px 16px; display:none; }
        .resumen-grid { max-width:700px; margin:0 auto; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
        .ri { text-align:center; padding:6px; border-radius:10px; }
        .rn { font-size:1.5rem; font-weight:900; line-height:1; }
        .rl { font-size:0.6rem; color:#888; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }

        /* STICKY TOOLBAR */
        .toolbar {
            background:white; border-bottom:1px solid #f0f0f0;
            position:sticky; top:63px; z-index:90;
        }
        .filtros-urg {
            max-width:700px; margin:0 auto;
            padding:10px 14px 6px; display:flex; gap:6px; flex-wrap:wrap;
        }
        .filtros-prov {
            max-width:700px; margin:0 auto;
            padding:4px 14px 8px; display:flex; gap:6px; flex-wrap:wrap;
            max-height:200px; opacity:1; overflow:hidden;
            transition:max-height 0.25s ease, opacity 0.2s ease, padding 0.25s ease;
        }
        .filtros-prov.oculto {
            max-height:0; opacity:0; padding-top:0; padding-bottom:0;
        }

        /* BARRA CARRITO — siempre visible cuando hay seleccionados */
        .barra-carrito {
            max-width:700px; margin:0 auto;
            padding:8px 14px;
            background:#e8f5e9; border-top:1px solid #c8e6c9;
            display:none; align-items:center; gap:8px; flex-wrap:wrap;
        }
        .barra-carrito.visible { display:flex; }
        .bc-count { font-size:0.78rem; font-weight:800; color:var(--primary); flex:1; }
        .bc-btn {
            font-size:0.72rem; border:none; border-radius:8px;
            padding:5px 10px; cursor:pointer; font-weight:700;
        }
        .bc-btn.limpiar  { background:#f5f5f5; color:#555; }
        .bc-btn.enviar   { background:#25d366; color:white; font-size:0.78rem; padding:7px 16px; border-radius:10px; }
        .bc-btn.prov-sel { background:#c8e6c9; color:#1b5e20; }

        /* CHIPS */
        .chip {
            padding:5px 13px; border-radius:20px; border:1.5px solid #ddd;
            background:#f5f5f5; font-size:0.75rem; font-weight:700;
            cursor:pointer; color:#555; transition:all 0.15s; white-space:nowrap;
        }
        .chip.activo { background:var(--primary); border-color:var(--primary); color:white; }
        .chip.prov   { background:white; color:#1565c0; border-color:#1565c0; }
        .chip.prov.activo { background:#1565c0; color:white; }

        /* BUSCADOR */
        .buscador-wrap {
            max-width:700px; margin:0 auto;
            padding:8px 14px 6px; position:relative;
        }
        .buscador-input {
            width:100%; padding:9px 36px 9px 14px;
            border:1.5px solid #ddd; border-radius:24px;
            font-size:0.88rem; color:#222; outline:none;
            transition:border-color 0.2s, box-shadow 0.2s;
            background:white;
        }
        .buscador-input:focus {
            border-color:var(--primary);
            box-shadow:0 0 0 3px rgba(46,125,50,0.12);
        }
        .buscador-clear {
            position:absolute; right:24px; top:50%;
            transform:translateY(-50%);
            background:none; border:none; font-size:1rem;
            color:#aaa; cursor:pointer; display:none;
            line-height:1; padding:2px;
        }
        .buscador-clear.visible { display:block; }

        /* RESULTADO BUSCADOR */
        .busq-resultado {
            background:white; border:1.5px solid #e0e0e0;
            border-radius:12px; margin-bottom:8px;
            padding:10px 12px;
        }
        .busq-resultado.en-lista   { border-color:#4caf50; background:#f1f8e9; }
        .busq-resultado.fuera-lista{ border-color:#bdbdbd; background:#fafafa; }
        .busq-tag {
            font-size:0.65rem; font-weight:900; padding:2px 8px;
            border-radius:6px; display:inline-block; margin-bottom:4px;
        }
        .busq-tag.en   { background:#4caf50; color:white; }
        .busq-tag.fuera{ background:#9e9e9e; color:white; }

        /* LISTA */
        .lista-wrap { max-width:700px; margin:0 auto; padding:10px 12px 130px; }
        .sec-tit { font-size:0.68rem; font-weight:900; color:#888; text-transform:uppercase; letter-spacing:0.8px; margin:14px 4px 6px; }

        /* CARD */
        .lc-card {
            background:white; border:1.5px solid #e0e0e0; border-radius:12px;
            padding:10px 12px; margin-bottom:8px;
            display:flex; flex-wrap:wrap; align-items:center; gap:10px;
            transition:box-shadow 0.2s, border-color 0.2s;
            cursor:pointer; user-select:none;
        }
        .lc-card:active { opacity:0.85; }
        .lc-card.urgente  { border-color:#ef9a9a; background:var(--urgente-bg); }
        .lc-card.piso     { border-color:#ffe082; background:var(--piso-bg); }
        .lc-card.pausada  { opacity:0.45; }
        .lc-card.selected { border-color:#25d366; background:#f0fff4; box-shadow:0 0 0 2px #25d36630; }

        /* CHECKBOX GRANDE */
        .lc-chk {
            width:26px; height:26px; border-radius:8px;
            border:2px solid #ccc; background:white; flex-shrink:0;
            display:flex; align-items:center; justify-content:center;
            transition:all 0.15s; font-size:1rem;
        }
        .lc-card.selected .lc-chk { background:#25d366; border-color:#25d366; color:white; }

        .lc-badge { font-size:0.62rem; font-weight:900; padding:2px 6px; border-radius:6px; white-space:nowrap; }
        .lc-badge.urgente { background:#c62828; color:white; }
        .lc-badge.ok      { background:#e8f5e9; color:#2e7d32; }
        .lc-badge.pausado { background:#607d8b; color:white; }

        .lc-nombre { font-size:0.85rem; font-weight:700; color:#222; line-height:1.3; margin-bottom:4px; }
        .lc-meta   { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
        .lc-meta span { font-size:0.68rem; color:#888; }

        .lc-der    { text-align:right; min-width:60px; margin-left:auto; }
        .lc-cant   { font-size:1.05rem; font-weight:900; color:var(--secondary); }
        .lc-costo  { font-size:0.72rem; font-weight:700; color:var(--primary); }
        .lc-cref   { font-size:0.6rem; color:#bbb; }

        /* HISTORIAL */
        .lc-hist { flex-basis:100%; margin-top:4px; padding:6px 8px; background:#f0f4ff; border-radius:8px; display:flex; gap:6px; }
        .hi { flex:1; background:white; border:1px solid #dce3f5; border-radius:8px; padding:5px 7px; text-align:center; min-width:0; }
        .hi-p  { font-size:0.6rem; color:#555; font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .hi-pr { font-size:0.82rem; font-weight:900; color:#1565c0; }
        .hi-f  { font-size:0.58rem; color:#aaa; }

        /* PAUSAR */
        .btn-pausar {
            margin-top:6px; width:100%; padding:5px 0;
            border:1px solid #ccc; border-radius:8px; background:white;
            font-size:0.7rem; color:#607d8b; cursor:pointer;
        }
        .btn-pausar:hover { background:#f5f5f5; }

        /* ESTADOS */
        .estado-carga { text-align:center; padding:3rem 1rem; color:#aaa; }
        .spinner {
            width:36px; height:36px; border:3px solid #e8f5e9;
            border-top-color:var(--primary); border-radius:50%;
            animation:spin 0.8s linear infinite; margin:0 auto 14px;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* FOOTER */
        .footer-acciones {
            position:fixed; bottom:0; left:0; right:0;
            background:white; border-top:1.5px solid #eee;
            padding:10px 14px; display:none; gap:8px; z-index:200;
        }
        .footer-acciones.visible { display:flex; }
        .btn-accion {
            flex:1; border:none; border-radius:12px; padding:12px;
            font-weight:700; font-size:0.88rem; cursor:pointer; transition:all 0.2s;
        }
        .btn-accion:hover { opacity:0.9; transform:translateY(-1px); }
        .btn-accion.copiar { background:#1565c0; color:white; }
        .btn-accion.wa     { background:#25d366; color:white; }
        .btn-accion.tienda { background:#f0f0f0; color:#555; flex:0 0 auto; padding:12px 18px; }

        /* TOAST */
        .toast {
            position:fixed; top:80px; left:50%;
            transform:translateX(-50%) translateY(-20px);
            background:#333; color:white; padding:10px 20px;
            border-radius:20px; font-size:0.88rem; font-weight:600;
            z-index:9999; opacity:0; transition:all 0.3s; white-space:nowrap; pointer-events:none;
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast.verde { background:var(--primary); }
        .toast.rojo  { background:#c62828; }

        @media (max-width:480px) { .rn { font-size:1.2rem; } .page-title { font-size:1rem; } }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="hc">
        <div class="hl">
            <a href="index.html" class="logo-link">← 🌺</a>
            <div>
                <div class="page-title">🛒 Lista de Compras</div>
                <div class="page-subtitle" id="lcSub">Cargando...</div>
            </div>
        </div>
        <div class="ha">
            <button class="btn-h" onclick="recargar()">🔄</button>
        </div>
    </div>
</header>

<!-- RESUMEN -->
<div class="resumen-bar" id="lcResumen">
    <div class="resumen-grid">
        <div class="ri" style="background:#fff8f8;">
            <div class="rn" id="lcUrgentes" style="color:#c62828;">-</div>
            <div class="rl">Urgentes</div>
        </div>
        <div class="ri" style="background:#f8fff8;">
            <div class="rn" id="lcTotalProd" style="color:#2e7d32;">-</div>
            <div class="rl">Productos</div>
        </div>
        <div class="ri" style="background:#fffde7;">
            <div class="rn" id="lcTotalPesos" style="color:#f57f17;">-</div>
            <div class="rl">Costo est.</div>
        </div>
    </div>
</div>

<!-- TOOLBAR STICKY -->
<div class="toolbar">
    <!-- Buscador -->
    <div class="buscador-wrap">
        <input  class="buscador-input" id="lcBusqInput"
                type="search" placeholder="🔍 Buscar producto en inventario..."
                autocomplete="off" autocorrect="off" spellcheck="false"
                oninput="lcBuscar(this.value)">
        <button class="buscador-clear" id="lcBusqClear" onclick="lcLimpiarBusqueda()">✕</button>
    </div>

    <!-- Resultados búsqueda (reemplaza la lista mientras se busca) -->
    <div id="lcBusqResultados" style="display:none;max-width:700px;margin:0 auto;padding:0 14px 8px;max-height:55vh;overflow-y:auto;"></div>

    <!-- Filtros urgencia -->
    <div class="filtros-urg">
        <button class="chip activo" id="lcFTodos"   onclick="lcFiltrar('todos')">Todos</button>
        <button class="chip"        id="lcFUrgente" onclick="lcFiltrar('urgente')">🔴 Urgentes</button>
        <button class="chip"        id="lcFNormal"  onclick="lcFiltrar('normal')">🟢 Normal</button>
    </div>

    <!-- Chips proveedores -->
    <div class="filtros-prov" id="lcProvChips"></div>

    <!-- Barra carrito (siempre visible mientras haya seleccionados) -->
    <div class="barra-carrito" id="lcBarraCarrito">
        <span class="bc-count" id="lcSelCount">0 seleccionados</span>
        <button class="bc-btn prov-sel" id="lcBtnSelProv" onclick="lcSeleccionarProveedor()" style="display:none">✔ Todos del prov.</button>
        <button class="bc-btn limpiar"  onclick="lcLimpiarSeleccion()">✕ Limpiar</button>
        <button class="bc-btn enviar"   onclick="lcEnviarWA()">📲 Enviar</button>
    </div>
</div>

<!-- LISTA -->
<div class="lista-wrap">
    <div id="lcCuerpo">
        <div class="estado-carga">
            <div class="spinner"></div>
            <div>Consultando inventario...</div>
        </div>
    </div>
</div>

<!-- FOOTER -->
<div class="footer-acciones" id="lcFooter">
    <a href="index.html" class="btn-accion tienda" style="text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;font-size:1rem;">🌺 Volver a la tienda</a>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzWZzDvdGfW8vd2-FpQolT852cdPMeHbfKugn9DBOlju75bE1D0SUNB5EKEDOsI2vP4lA/exec';

var _items      = [];      // todos los items de la lista
var _filtro     = 'todos';
var _provActivo = null;    // chip proveedor activo (solo para filtrar vista)
var _sel        = new Set(); // nombres seleccionados (multi-proveedor libre)
var _prodCache  = [];

// ── API ──────────────────────────────────────────
async function _api(action, data) {
    var url = API_URL + '?action=' + action + '&t=' + Date.now();
    if (data) url += '&data=' + encodeURIComponent(JSON.stringify(data));
    var r = await fetch(url, { redirect: 'follow' });
    return r.json();
}

// ── Toast ─────────────────────────────────────────
function toast(msg, tipo) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (tipo ? ' ' + tipo : '');
    setTimeout(function() { t.className = 'toast'; }, 2500);
}

// ── Carga ─────────────────────────────────────────
async function recargar() {
    document.getElementById('lcSub').textContent = 'Actualizando...';
    document.getElementById('lcCuerpo').innerHTML = '<div class="estado-carga"><div class="spinner"></div><div>Consultando inventario...</div></div>';
    document.getElementById('lcResumen').style.display = 'none';
    document.getElementById('lcFooter').classList.remove('visible');
    _sel.clear();
    actualizarBarraCarrito();
    await cargarLista();
}

async function cargarLista() {
    try {
        var data = await _api('getListaCompra');
        if (!data.ok || !data.items) {
            document.getElementById('lcCuerpo').innerHTML =
                '<div class="estado-carga" style="color:#e53935;">❌ ' + (data.error || 'Error al cargar') +
                '<br><br><button onclick="recargar()" style="background:var(--primary);color:white;border:none;border-radius:10px;padding:10px 20px;font-weight:700;cursor:pointer;">🔄 Reintentar</button></div>';
            document.getElementById('lcSub').textContent = 'Error';
            return;
        }
        _items      = data.items;
        _provActivo = null;
        if (data.productos) _prodCache = data.productos;

        // Resumen
        document.getElementById('lcTotalProd').textContent  = data.items.length;
        document.getElementById('lcUrgentes').textContent   = data.urgentes;
        document.getElementById('lcTotalPesos').textContent = '$' + Math.round(data.totalPesos || 0).toLocaleString('es-AR');
        document.getElementById('lcResumen').style.display  = 'block';

        var hora = data.generadoEn
            ? new Date(data.generadoEn).toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' })
            : new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
        document.getElementById('lcSub').textContent = data.items.length + ' productos · act. ' + hora;

        renderChipsProv();
        renderLista();
        document.getElementById('lcFooter').classList.add('visible');

    } catch(e) {
        document.getElementById('lcCuerpo').innerHTML =
            '<div class="estado-carga" style="color:#e53935;">❌ ' + e.message +
            '<br><br><button onclick="recargar()" style="background:var(--primary);color:white;border:none;border-radius:10px;padding:10px 20px;font-weight:700;cursor:pointer;">🔄 Reintentar</button></div>';
        document.getElementById('lcSub').textContent = 'Sin conexión';
    }
}

// ── Chips proveedores ─────────────────────────────
function renderChipsProv() {
    var prov = {};
    _items.forEach(function(it) {
        var p = (it.proveedor || '').trim().toUpperCase();
        if (p) prov[p] = (prov[p] || 0) + 1;
    });
    var cont = document.getElementById('lcProvChips');
    var claves = Object.keys(prov).sort();
    if (!claves.length) { cont.style.display = 'none'; return; }
    var html = '';
    if (_provActivo) {
        html += '<button class="chip prov" onclick="lcFiltrarProv(null)">✕ Ver todos</button>';
    }
    html += claves.map(function(p) {
        var a = _provActivo === p ? ' activo' : '';
        return '<button class="chip prov' + a + '" onclick="lcFiltrarProv(\'' + p.replace(/'/g,"\\'") + '\')">'
            + '🏪 ' + p + ' <span style="opacity:0.7;">(' + prov[p] + ')</span></button>';
    }).join('');
    cont.innerHTML = html;
}

// ── Filtros urgencia ──────────────────────────────
function lcFiltrar(f) {
    _filtro = f;
    document.getElementById('lcFTodos').classList.remove('activo');
    document.getElementById('lcFUrgente').classList.remove('activo');
    document.getElementById('lcFNormal').classList.remove('activo');
    document.getElementById({ todos:'lcFTodos', urgente:'lcFUrgente', normal:'lcFNormal' }[f]).classList.add('activo');
    renderLista();
}

// ── Filtro proveedor (solo para vista, no limpia selección) ───
function lcFiltrarProv(p) {
    _provActivo = p;
    // Mostrar u ocultar botón "Todos del proveedor"
    var btn = document.getElementById('lcBtnSelProv');
    btn.style.display = p ? '' : 'none';
    renderChipsProv();
    renderLista();
}

// ── Selección ─────────────────────────────────────
function toggleItem(nombre) {
    if (_sel.has(nombre)) _sel.delete(nombre);
    else _sel.add(nombre);
    // Actualizar solo esa card sin re-renderizar todo
    var cards = document.querySelectorAll('.lc-card[data-nombre]');
    cards.forEach(function(c) {
        if (c.getAttribute('data-nombre') === nombre) {
            var sel = _sel.has(nombre);
            c.classList.toggle('selected', sel);
            c.querySelector('.lc-chk').innerHTML = sel ? '✓' : '';
        }
    });
    actualizarBarraCarrito();
}

function lcSeleccionarProveedor() {
    if (!_provActivo) return;
    _items.filter(function(it) {
        return (it.proveedor || '').toUpperCase() === _provActivo;
    }).forEach(function(it) { _sel.add(it.nombre); });
    renderLista();
    actualizarBarraCarrito();
}

function lcLimpiarSeleccion() {
    _sel.clear();
    renderLista();
    actualizarBarraCarrito();
}

function actualizarBarraCarrito() {
    var barra = document.getElementById('lcBarraCarrito');
    var count = document.getElementById('lcSelCount');
    var n = _sel.size;
    if (n > 0) {
        barra.classList.add('visible');
        count.textContent = n + ' seleccionado' + (n !== 1 ? 's' : '') + ' — listo para enviar';
    } else {
        barra.classList.remove('visible');
    }
}

// ── Enviar seleccionados por WA ───────────────────
function lcEnviarWA() {
    if (!_sel.size) { toast('Seleccioná al menos un producto', 'rojo'); return; }

    // Agrupar por proveedor
    var grupos = {};
    _sel.forEach(function(nombre) {
        var it = _items.find(function(i) { return i.nombre === nombre; });
        if (!it) return;
        var p = (it.proveedor || 'Sin proveedor').toUpperCase();
        if (!grupos[p]) grupos[p] = [];
        var costoLinea = it.costo > 0 ? ' · $' + Math.round(it.costo * it.cantidad).toLocaleString('es-AR') : '';
        var costoUnit  = it.costo > 0 ? ' ($' + it.costo.toLocaleString('es-AR') + ' c/u)' : '';
        grupos[p].push('• ' + it.nombre + ' — x' + it.cantidad + costoUnit + costoLinea);
    });

    var provs = Object.keys(grupos).sort();
    var texto = '🛒 *Compras Almacén Copihue*\n' + new Date().toLocaleDateString('es-AR') + '\n';

    provs.forEach(function(p) {
        texto += '\n📦 *' + p + '*\n';
        texto += grupos[p].join('\n') + '\n';
    });

    var totalCosto = 0;
    _sel.forEach(function(nombre) {
        var it = _items.find(function(i) { return i.nombre === nombre; });
        if (it && it.costo > 0) totalCosto += it.costo * it.cantidad;
    });
    if (totalCosto > 0) texto += '\n💰 Total: $' + Math.round(totalCosto).toLocaleString('es-AR');

    window.open('https://wa.me/?text=' + encodeURIComponent(texto), '_blank');
}

// ── Renderizar lista ──────────────────────────────
function renderLista() {
    var items = _items.slice();
    if (_filtro === 'urgente') items = items.filter(function(it) { return it.urgencia <= 2; });
    if (_filtro === 'normal')  items = items.filter(function(it) { return it.urgencia > 2; });
    if (_provActivo) {
        items = items.filter(function(it) { return (it.proveedor || '').toUpperCase() === _provActivo; });
    }

    if (!items.length) {
        document.getElementById('lcCuerpo').innerHTML = '<div class="estado-carga">Sin productos en esta categoría</div>';
        return;
    }

    var html = '';
    var urgActual = -99;

    items.forEach(function(it) {
        // Título de sección
        if (it.urgencia !== urgActual) {
            urgActual = it.urgencia;
            var tit = '';
            if      (it.urgencia === 0)  tit = '🔔 Piso manual — PEDIR YA';
            else if (it.urgencia === 1)  tit = '⚠️ Empujar ya';
            else if (it.urgencia === 2)  tit = '🟠 Riesgo vencimiento';
            else if (it.urgencia === 3)  tit = '⏰ Stock crítico (≤3 días)';
            else if (it.urgencia === 4)  tit = '🟡 Stock bajo (≤7 días)';
            else if (it.urgencia === 99) tit = '⏸️ Pausados';
            else                          tit = '🟢 Compra normal';
            html += '<div class="sec-tit">' + tit + '</div>';
        }

        var esUrgente = it.urgencia <= 2;
        var esPiso    = it.urgencia === 0;
        var esPausado = it.pausado === true;
        var esSel     = _sel.has(it.nombre);

        var cardCls = esPiso ? 'lc-card piso' : esUrgente ? 'lc-card urgente' : 'lc-card';
        if (esPausado) cardCls += ' pausada';
        if (esSel)     cardCls += ' selected';

        var badge = esPausado
            ? '<span class="lc-badge pausado">⛔ INACTIVO</span>'
            : esUrgente
                ? '<span class="lc-badge urgente">' + (esPiso ? '🔔 PISO' : it.prioridad || '⚠️') + '</span>'
                : '<span class="lc-badge ok">✅ OK</span>';

        var diasTxt = (it.diasStock !== null && it.diasStock !== undefined) ? it.diasStock + 'd stock' : 'sin historial';
        var provTxt = it.proveedor ? '<span>🏪 ' + it.proveedor + '</span>' : '';

        // Historial precios
        var histHTML = '';
        if (it.historialPrecios && it.historialPrecios.length) {
            histHTML = '<div class="lc-hist">'
                + it.historialPrecios.map(function(hp) {
                    return '<div class="hi">'
                        + '<div class="hi-p" title="' + hp.proveedor + '">' + hp.proveedor + '</div>'
                        + '<div class="hi-pr">$' + hp.costo.toLocaleString('es-AR') + '</div>'
                        + (hp.fecha ? '<div class="hi-f">' + hp.fecha + '</div>' : '')
                        + '</div>';
                }).join('') + '</div>';
        }

        // Costo derecha
        var costoHTML = it.costo > 0
            ? '<div class="lc-costo">$' + Math.round(it.costo * it.cantidad).toLocaleString('es-AR') + '</div>'
              + '<div class="lc-cref">$' + it.costo.toLocaleString('es-AR') + ' c/u</div>'
            : '<div style="font-size:0.7rem;color:#e53935;">Sin precio</div>';

        // Botón pausar
        var prodId = null;
        if (_prodCache.length) {
            var pr = _prodCache.find(function(p) { return p.name === it.nombre; });
            if (pr) prodId = pr.id;
        }
        var btnPausar = prodId !== null
            ? '<button class="btn-pausar" onclick="event.stopPropagation();lcTogglePausado(' + prodId + ')">'
              + (esPausado ? '▶️ Reactivar' : '⏸ Marcar inactivo') + '</button>'
            : '';

        var nombreEsc = it.nombre.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

        html += '<div class="' + cardCls + '" data-nombre="' + it.nombre.replace(/"/g,'&quot;') + '" onclick="toggleItem(\'' + nombreEsc + '\')">'
            + '<div class="lc-chk">' + (esSel ? '✓' : '') + '</div>'
            + '<div style="flex:1;min-width:0;">'
            +   '<div class="lc-nombre">' + it.nombre + '</div>'
            +   '<div class="lc-meta">' + badge
            +     '<span>📦 ' + it.stock + '</span>'
            +     '<span>⏱ ' + diasTxt + '</span>'
            +     provTxt
            +   '</div>'
            +   btnPausar
            + '</div>'
            + '<div class="lc-der">'
            +   '<div class="lc-cant">x' + it.cantidad + '</div>'
            +   costoHTML
            + '</div>'
            + histHTML
            + '</div>';
    });

    document.getElementById('lcCuerpo').innerHTML = html;
}

// ── Pausar / reactivar ────────────────────────────
async function lcTogglePausado(id) {
    var p = _prodCache.find(function(pr) { return pr.id === id; });
    var esPausado = p && (p.pausadoListaCompra === true || p.pausadoListaCompra === 'SI');
    var nuevo = !esPausado;
    if (p) p.pausadoListaCompra = nuevo ? 'SI' : '';
    var lcIt = _items.find(function(i) { return p && i.nombre === p.name; });
    if (lcIt) { lcIt.pausado = nuevo; lcIt.urgencia = nuevo ? 99 : 7; }
    renderLista();
    try {
        var resp = await _api('setPausadoListaCompra', { id:id, pausado: nuevo ? 'SI' : '' });
        if (!resp.success) throw new Error('sin ok');
        toast(nuevo ? '⛔ Marcado inactivo' : '▶️ Reactivado', nuevo ? '' : 'verde');
    } catch(e) {
        if (p) p.pausadoListaCompra = esPausado ? 'SI' : '';
        if (lcIt) { lcIt.pausado = esPausado; lcIt.urgencia = esPausado ? 99 : 7; }
        renderLista();
        toast('❌ Error al guardar', 'rojo');
    }
}



// ── Buscador ──────────────────────────────────────
var _busqTimer = null;

function lcBuscar(q) {
    var clear = document.getElementById('lcBusqClear');
    var resDiv = document.getElementById('lcBusqResultados');
    var lista  = document.getElementById('lcCuerpo');
    var toolbar_filtros = document.querySelector('.filtros-urg');
    var toolbar_prov    = document.getElementById('lcProvChips');

    q = (q || '').trim();
    clear.classList.toggle('visible', q.length > 0);

    if (!q) {
        resDiv.style.display = 'none';
        lista.style.display  = '';
        toolbar_filtros.style.display = '';
        toolbar_prov.style.display    = '';
        return;
    }

    // Ocultar lista normal y filtros mientras se busca
    lista.style.display           = 'none';
    toolbar_filtros.style.display = 'none';
    toolbar_prov.style.display    = 'none';
    resDiv.style.display          = 'block';

    clearTimeout(_busqTimer);
    _busqTimer = setTimeout(function() { _lcRenderBusqueda(q); }, 180);
}

function _lcRenderBusqueda(q) {
    var resDiv = document.getElementById('lcBusqResultados');
    var ql = q.toLowerCase();

    // Buscar en lista de compra
    var enLista = _items.filter(function(it) {
        return it.nombre.toLowerCase().includes(ql);
    });

    // Buscar en inventario completo (prodCache) que NO estén ya en lista
    var nombresEnLista = new Set(_items.map(function(it) { return it.nombre.toLowerCase(); }));
    var fueraLista = _prodCache.filter(function(p) {
        return (p.name || '').toLowerCase().includes(ql)
            && !nombresEnLista.has((p.name || '').toLowerCase());
    });

    if (!enLista.length && !fueraLista.length) {
        resDiv.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;font-size:0.85rem;">Sin resultados para "<b>' + q + '</b>"</div>';
        return;
    }

    var html = '';

    // Productos EN lista de compra → card completa seleccionable
    if (enLista.length) {
        html += '<div style="font-size:0.68rem;font-weight:900;color:#2e7d32;text-transform:uppercase;letter-spacing:0.8px;margin:8px 2px 6px;">✅ En lista de compra</div>';
        enLista.forEach(function(it) {
            var esSel   = _sel.has(it.nombre);
            var esUrg   = it.urgencia <= 2;
            var esPiso  = it.urgencia === 0;
            var cardCls = 'lc-card' + (esPiso ? ' piso' : esUrg ? ' urgente' : '') + (esSel ? ' selected' : '');
            var badge   = esUrg
                ? '<span class="lc-badge urgente">' + (esPiso ? '🔔 PISO' : '⚠️') + '</span>'
                : '<span class="lc-badge ok">✅ OK</span>';
            var costoHTML = it.costo > 0
                ? '<div class="lc-costo">$' + Math.round(it.costo * it.cantidad).toLocaleString('es-AR') + '</div>'
                  + '<div class="lc-cref">$' + it.costo.toLocaleString('es-AR') + ' c/u</div>'
                : '<div style="font-size:0.7rem;color:#e53935;">Sin precio</div>';
            var nombreEsc = it.nombre.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
            html += '<div class="' + cardCls + '" data-nombre="' + it.nombre.replace(/"/g,'&quot;') + '" onclick="toggleItem(\'' + nombreEsc + '\')">'
                + '<div class="lc-chk">' + (esSel ? '✓' : '') + '</div>'
                + '<div style="flex:1;min-width:0;">'
                +   '<div class="lc-nombre">' + it.nombre + '</div>'
                +   '<div class="lc-meta">' + badge
                +     '<span>📦 ' + it.stock + '</span>'
                +     (it.proveedor ? '<span>🏪 ' + it.proveedor + '</span>' : '')
                +   '</div>'
                + '</div>'
                + '<div class="lc-der"><div class="lc-cant">x' + it.cantidad + '</div>' + costoHTML + '</div>'
                + '</div>';
        });
    }

    // Productos FUERA de lista → info solo lectura
    if (fueraLista.length) {
        html += '<div style="font-size:0.68rem;font-weight:900;color:#888;text-transform:uppercase;letter-spacing:0.8px;margin:14px 2px 6px;">⚪ No está en lista de compra</div>';
        fueraLista.forEach(function(p) {
            var nombre = p.name || p.nombre || '?';
            var stock  = p.stock !== undefined ? p.stock : '?';
            var prov   = p.proveedor || p.supplier || '';
            var precio = p.costo || p.cost || 0;
            html += '<div class="busq-resultado fuera-lista">'
                + '<div><span class="busq-tag fuera">No para pedir</span></div>'
                + '<div class="lc-nombre">' + nombre + '</div>'
                + '<div class="lc-meta">'
                +   '<span>📦 stock: ' + stock + '</span>'
                +   (prov   ? '<span>🏪 ' + prov + '</span>' : '')
                +   (precio ? '<span>💰 $' + precio.toLocaleString('es-AR') + ' c/u</span>' : '')
                + '</div>'
                + '</div>';
        });
    }

    resDiv.innerHTML = html;
}

function lcLimpiarBusqueda() {
    var inp = document.getElementById('lcBusqInput');
    inp.value = '';
    lcBuscar('');
    inp.focus();
}

document.addEventListener('DOMContentLoaded', cargarLista);

// ── Ocultar chips de proveedor al bajar, mostrar al subir ──
(function() {
    var lastY = 0;
    var ticking = false;
    var UMBRAL = 8; // px mínimos de movimiento para reaccionar
    window.addEventListener('scroll', function() {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(function() {
            var y = window.scrollY || document.documentElement.scrollTop;
            var prov = document.getElementById('lcProvChips');
            if (Math.abs(y - lastY) > UMBRAL) {
                if (y > lastY && y > 60) {
                    prov.classList.add('oculto');      // bajando → ocultar
                } else {
                    prov.classList.remove('oculto');   // subiendo → mostrar
                }
                lastY = y;
            }
            ticking = false;
        });
    }, { passive: true });
})();
</script>
