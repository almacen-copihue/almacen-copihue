<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras — Almacén Copihue</title>
    <meta name="theme-color" content="#2e7d32">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

    <style>
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --primary-light: #4caf50;
            --secondary: #ff6f00;
            --secondary-dark: #f57c00;
            --accent: #ffeb3b;
            --light: #f8fff8;
            --dark: #1b5e20;
            --gray: #757575;
            --white: #ffffff;
            --card-bg: #ffffff;
            --shadow: 0 4px 15px rgba(46,125,50,0.1);
            --urgente: #c62828;
            --urgente-bg: #fff8f8;
            --piso: #f57f17;
            --piso-bg: #fffde7;
            --ok: #2e7d32;
            --ok-bg: #f1f8e9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: linear-gradient(135deg, #f8fff8 0%, #e8f5e9 100%);
            color: var(--dark);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 0.9rem 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }
        .header-content {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .logo-link {
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            opacity: 0.85;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .logo-link:hover { opacity: 1; }
        .page-title {
            font-size: 1.15rem;
            font-weight: 900;
            letter-spacing: 0.3px;
        }
        .page-subtitle {
            font-size: 0.72rem;
            opacity: 0.8;
            margin-top: 1px;
        }
        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .btn-header {
            background: rgba(255,255,255,0.2);
            border: 1.5px solid rgba(255,255,255,0.4);
            color: white;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-header:hover { background: rgba(255,255,255,0.35); }
        .btn-header.wa { background: rgba(37,211,102,0.7); border-color: #25d366; }

        /* ── RESUMEN ── */
        .resumen-bar {
            background: white;
            border-bottom: 2px solid #e8f5e9;
            padding: 10px 16px;
            display: none;
        }
        .resumen-grid {
            max-width: 700px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .resumen-item {
            text-align: center;
            padding: 6px;
            border-radius: 10px;
            background: #f8fff8;
        }
        .resumen-num {
            font-size: 1.5rem;
            font-weight: 900;
            line-height: 1;
        }
        .resumen-label {
            font-size: 0.6rem;
            color: #888;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* ── FILTROS ── */
        .filtros-wrap {
            background: white;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 63px;
            z-index: 90;
        }
        .filtros-urgencia {
            max-width: 700px;
            margin: 0 auto;
            padding: 10px 14px 6px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .filtros-proveedor {
            max-width: 700px;
            margin: 0 auto;
            padding: 6px 14px 10px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            min-height: 0;
        }
        .filtros-proveedor.visible { min-height: 38px; }

        .chip {
            padding: 5px 13px;
            border-radius: 20px;
            border: 1.5px solid #ddd;
            background: #f5f5f5;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            color: #555;
            transition: all 0.15s;
        }
        .chip.activo {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        .chip.proveedor {
            background: white;
            color: #1565c0;
            border-color: #1565c0;
        }
        .chip.proveedor.activo {
            background: #1565c0;
            color: white;
        }

        /* ── BARRA PEDIDO ── */
        .barra-pedido {
            display: none;
            max-width: 700px;
            margin: 0 auto;
            padding: 8px 14px;
            background: #e8f5e9;
            border-bottom: 1px solid #c8e6c9;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .barra-pedido.visible { display: flex; }
        .sel-count { font-size: 0.78rem; font-weight: 700; color: var(--primary); flex: 1; }
        .btn-sel {
            font-size: 0.72rem;
            border: none;
            border-radius: 8px;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-sel.todos { background: #c8e6c9; color: #1b5e20; }
        .btn-sel.ninguno { background: #f5f5f5; color: #555; }
        .btn-sel.enviar { background: #25d366; color: white; font-size: 0.78rem; padding: 6px 14px; border-radius: 10px; }

        /* ── LISTA ── */
        .lista-wrap {
            max-width: 700px;
            margin: 0 auto;
            padding: 10px 12px 120px;
        }

        .seccion-titulo {
            font-size: 0.68rem;
            font-weight: 900;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin: 14px 4px 6px;
        }

        .lc-card {
            background: white;
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 8px;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 10px;
            transition: box-shadow 0.2s;
        }
        .lc-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.08); }
        .lc-card.urgente { border-color: #ef9a9a; background: var(--urgente-bg); }
        .lc-card.piso    { border-color: #ffe082; background: var(--piso-bg); }
        .lc-card.pausada { opacity: 0.5; }

        .lc-badge {
            font-size: 0.62rem;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 6px;
            white-space: nowrap;
        }
        .lc-badge.urgente { background: #c62828; color: white; }
        .lc-badge.ok      { background: #e8f5e9; color: #2e7d32; }
        .lc-badge.pausado { background: #607d8b; color: white; }

        .lc-nombre {
            font-size: 0.85rem;
            font-weight: 700;
            color: #222;
            line-height: 1.3;
            margin-bottom: 4px;
        }
        .lc-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .lc-meta span { font-size: 0.68rem; color: #888; }

        .lc-cantidad {
            font-size: 1.05rem;
            font-weight: 900;
            color: var(--secondary);
            text-align: right;
            min-width: 56px;
        }
        .lc-costo {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--primary);
            text-align: right;
        }
        .lc-costo-ref {
            font-size: 0.6rem;
            color: #bbb;
            text-align: right;
        }

        .lc-historial {
            flex-basis: 100%;
            margin-top: 2px;
            padding: 6px 8px;
            background: #f0f4ff;
            border-radius: 8px;
            display: flex;
            gap: 6px;
        }
        .hist-item {
            flex: 1;
            background: white;
            border: 1px solid #dce3f5;
            border-radius: 8px;
            padding: 5px 7px;
            text-align: center;
            min-width: 0;
        }
        .hist-prov  { font-size: 0.6rem; color: #555; font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .hist-precio { font-size: 0.82rem; font-weight: 900; color: #1565c0; }
        .hist-fecha { font-size: 0.58rem; color: #aaa; }

        .btn-pausar {
            margin-top: 6px;
            width: 100%;
            padding: 5px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: white;
            font-size: 0.7rem;
            color: #607d8b;
            cursor: pointer;
        }
        .btn-pausar:hover { background: #f5f5f5; }

        /* ── ESTADOS ── */
        .estado-carga {
            text-align: center;
            padding: 3rem 1rem;
            color: #aaa;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #e8f5e9;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── FOOTER STICKY ── */
        .footer-acciones {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            border-top: 1.5px solid #eee;
            padding: 10px 14px;
            display: none;
            gap: 8px;
            z-index: 200;
        }
        .footer-acciones.visible { display: flex; }
        .btn-accion {
            flex: 1;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-accion:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-accion.copiar  { background: #1565c0; color: white; }
        .btn-accion.wa      { background: #25d366; color: white; }
        .btn-accion.cerrar  { background: #f0f0f0; color: #555; flex: 0 0 auto; padding: 12px 18px; }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.88rem;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s;
            white-space: nowrap;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.verde { background: var(--primary); }
        .toast.rojo  { background: #c62828; }

        /* ── CHECKBOX ── */
        input[type="checkbox"] {
            width: 20px; height: 20px;
            accent-color: var(--primary);
            flex-shrink: 0;
            cursor: pointer;
            margin-right: 4px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            .resumen-num { font-size: 1.2rem; }
            .page-title  { font-size: 1rem; }
        }
    </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
    <div class="header-content">
        <div class="header-left">
            <a href="index.html" class="logo-link">← 🌺</a>
            <div>
                <div class="page-title">🛒 Lista de Compras</div>
                <div class="page-subtitle" id="lcSubtitulo">Cargando...</div>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn-header" onclick="recargar()">🔄</button>
            <button class="btn-header wa" onclick="lcCompartirWA()" id="btnWAHeader" style="display:none">📲 WA</button>
        </div>
    </div>
</header>

<!-- ── RESUMEN ── -->
<div class="resumen-bar" id="lcResumen">
    <div class="resumen-grid">
        <div class="resumen-item" style="background:#fff8f8;">
            <div class="resumen-num" id="lcUrgentes" style="color:#c62828;">-</div>
            <div class="resumen-label">Urgentes</div>
        </div>
        <div class="resumen-item" style="background:#f8fff8;">
            <div class="resumen-num" id="lcTotalProd" style="color:#2e7d32;">-</div>
            <div class="resumen-label">Productos</div>
        </div>
        <div class="resumen-item" style="background:#fffde7;">
            <div class="resumen-num" id="lcTotalPesos" style="color:#f57f17;">-</div>
            <div class="resumen-label">Costo est.</div>
        </div>
    </div>
</div>

<!-- ── FILTROS URGENCIA ── -->
<div class="filtros-wrap">
    <div class="filtros-urgencia">
        <button class="chip activo" id="lcFTodos"   onclick="lcFiltrar('todos')">Todos</button>
        <button class="chip"        id="lcFUrgente" onclick="lcFiltrar('urgente')">🔴 Urgentes</button>
        <button class="chip"        id="lcFNormal"  onclick="lcFiltrar('normal')">🟢 Normal</button>
    </div>
    <div class="filtros-proveedor" id="lcProveedorChips"></div>

    <!-- Barra de pedido (aparece al filtrar proveedor) -->
    <div class="barra-pedido" id="lcBarraPedido">
        <span class="sel-count" id="lcSelCount">0 seleccionados</span>
        <button class="btn-sel todos"   onclick="lcSeleccionarTodos()">Todos</button>
        <button class="btn-sel ninguno" onclick="lcDeseleccionarTodos()">Ninguno</button>
        <button class="btn-sel enviar"  onclick="lcEnviarPedidoWA()">📲 Enviar pedido</button>
    </div>
</div>

<!-- ── CUERPO ── -->
<div class="lista-wrap">
    <div id="lcCuerpo">
        <div class="estado-carga">
            <div class="spinner"></div>
            <div>Consultando inventario...</div>
        </div>
    </div>
</div>

<!-- ── FOOTER ACCIONES ── -->
<div class="footer-acciones" id="lcFooter">
    <button class="btn-accion copiar" onclick="lcCopiarTexto()">📋 Copiar texto</button>
    <button class="btn-accion wa"     onclick="lcCompartirWA()">📲 WhatsApp</button>
    <a href="index.html" class="btn-accion cerrar" style="text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;">🌺 Tienda</a>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzWZzDvdGfW8vd2-FpQolT852cdPMeHbfKugn9DBOlju75bE1D0SUNB5EKEDOsI2vP4lA/exec';

// ── Estado global ──
var _lcItems             = [];
var _lcFiltroActivo      = 'todos';
var _lcProveedorActivo   = null;
var _lcSeleccionados     = new Set();
// Caché de productos para pausar/reactivar
var _lcProductosCache    = [];

// ── API ──
async function _apiFetch(action, data) {
    let url = API_URL + '?action=' + action + '&t=' + Date.now();
    if (data) url += '&data=' + encodeURIComponent(JSON.stringify(data));
    const r = await fetch(url, { redirect: 'follow' });
    return r.json();
}

// ── Toast ──
function mostrarToast(msg, tipo) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (tipo ? ' ' + tipo : '');
    setTimeout(() => { t.className = 'toast'; }, 2500);
}

// ── Cargar ──
async function recargar() {
    document.getElementById('lcSubtitulo').textContent = 'Actualizando...';
    document.getElementById('lcCuerpo').innerHTML = '<div class="estado-carga"><div class="spinner"></div><div>Consultando inventario...</div></div>';
    document.getElementById('lcResumen').style.display  = 'none';
    document.getElementById('lcFooter').classList.remove('visible');
    document.getElementById('btnWAHeader').style.display = 'none';
    await cargarLista();
}

async function cargarLista() {
    try {
        const data = await _apiFetch('getListaCompra');

        if (!data.ok || !data.items) {
            document.getElementById('lcCuerpo').innerHTML =
                '<div class="estado-carga" style="color:#e53935;">❌ ' + (data.error || 'Error al cargar') + '<br><br><button onclick="recargar()" style="background:var(--primary);color:white;border:none;border-radius:10px;padding:10px 20px;font-weight:700;cursor:pointer;">🔄 Reintentar</button></div>';
            document.getElementById('lcSubtitulo').textContent = 'Error';
            return;
        }

        _lcItems           = data.items;
        _lcProveedorActivo = null;
        _lcSeleccionados.clear();

        // Si el GAS devuelve los productos también, los guardamos para pausar
        if (data.productos) _lcProductosCache = data.productos;

        // Resumen
        document.getElementById('lcTotalProd').textContent  = data.items.length;
        document.getElementById('lcUrgentes').textContent   = data.urgentes;
        document.getElementById('lcTotalPesos').textContent = '$' + Math.round(data.totalPesos || 0).toLocaleString('es-AR');
        document.getElementById('lcResumen').style.display  = 'block';

        // Subtítulo
        const hora = data.generadoEn
            ? new Date(data.generadoEn).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })
            : new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('lcSubtitulo').textContent = data.items.length + ' productos · act. ' + hora;

        lcRenderizarChipsProveedores();
        lcRenderizar('todos');
        document.getElementById('lcFooter').classList.add('visible');
        document.getElementById('btnWAHeader').style.display = '';
        document.getElementById('lcBarraPedido').classList.remove('visible');

    } catch(e) {
        document.getElementById('lcCuerpo').innerHTML =
            '<div class="estado-carga" style="color:#e53935;">❌ Error: ' + e.message + '<br><br><button onclick="recargar()" style="background:var(--primary);color:white;border:none;border-radius:10px;padding:10px 20px;font-weight:700;cursor:pointer;">🔄 Reintentar</button></div>';
        document.getElementById('lcSubtitulo').textContent = 'Sin conexión';
    }
}

// ── Filtros ──
function lcFiltrar(filtro) {
    _lcFiltroActivo = filtro;
    ['lcFTodos','lcFUrgente','lcFNormal'].forEach(function(id) {
        document.getElementById(id).classList.remove('activo');
    });
    ({ todos: 'lcFTodos', urgente: 'lcFUrgente', normal: 'lcFNormal' });
    document.getElementById({ todos: 'lcFTodos', urgente: 'lcFUrgente', normal: 'lcFNormal' }[filtro]).classList.add('activo');
    lcRenderizar(filtro);
}

// ── Chips proveedores ──
function lcRenderizarChipsProveedores() {
    var prov = {};
    _lcItems.forEach(function(it) {
        var p = (it.proveedor || '').trim().toUpperCase();
        if (p) prov[p] = (prov[p] || 0) + 1;
    });
    var cont = document.getElementById('lcProveedorChips');
    var claves = Object.keys(prov).sort();
    if (!claves.length) { cont.style.display = 'none'; return; }
    cont.classList.add('visible');
    var html = '';
    if (_lcProveedorActivo) {
        html += '<button class="chip proveedor" onclick="lcFiltrarProveedor(null)">✕ Ver todos</button>';
    }
    html += claves.map(function(p) {
        var activo = _lcProveedorActivo === p ? ' activo' : '';
        return '<button class="chip proveedor' + activo + '" onclick="lcFiltrarProveedor(\'' + p.replace(/'/g, "\\'") + '\')">'
             + '🏪 ' + p + ' <span style="opacity:0.7;">(' + prov[p] + ')</span>'
             + '</button>';
    }).join('');
    cont.innerHTML = html;
}

function lcFiltrarProveedor(proveedor) {
    _lcProveedorActivo = proveedor;
    _lcSeleccionados.clear();
    var barra = document.getElementById('lcBarraPedido');
    barra.classList.toggle('visible', !!proveedor);
    lcRenderizarChipsProveedores();
    lcRenderizar(_lcFiltroActivo);
    lcActualizarContadorSeleccion();
    if (proveedor) {
        _lcItems
            .filter(function(it) { return (it.proveedor || '').toUpperCase() === proveedor; })
            .forEach(function(it) { _lcSeleccionados.add(it.nombre); });
        lcRenderizar(_lcFiltroActivo);
        lcActualizarContadorSeleccion();
    }
}

function lcToggleSeleccion(nombre, checked) {
    if (checked) _lcSeleccionados.add(nombre);
    else _lcSeleccionados.delete(nombre);
    lcActualizarContadorSeleccion();
}

function lcActualizarContadorSeleccion() {
    var el = document.getElementById('lcSelCount');
    if (el) el.textContent = _lcSeleccionados.size + ' seleccionado' + (_lcSeleccionados.size !== 1 ? 's' : '');
}

function lcSeleccionarTodos() {
    _lcItems
        .filter(function(it) { return !_lcProveedorActivo || (it.proveedor || '').toUpperCase() === _lcProveedorActivo; })
        .forEach(function(it) { _lcSeleccionados.add(it.nombre); });
    lcRenderizar(_lcFiltroActivo);
    lcActualizarContadorSeleccion();
}

function lcDeseleccionarTodos() {
    _lcSeleccionados.clear();
    lcRenderizar(_lcFiltroActivo);
    lcActualizarContadorSeleccion();
}

// ── Enviar pedido por proveedor ──
function lcEnviarPedidoWA() {
    if (!_lcSeleccionados.size) { mostrarToast('Seleccioná al menos un producto', 'rojo'); return; }
    var lineas = [];
    _lcSeleccionados.forEach(function(nombre) {
        var it = _lcItems.find(function(i) { return i.nombre === nombre; });
        if (it) lineas.push('• ' + it.nombre + ' — ' + it.cantidad + ' u.');
    });
    lineas.sort();
    var prov = _lcProveedorActivo || '';
    var texto = '📦 *Pedido Almacén Copihue*'
        + (prov ? '\nProveedor: ' + prov : '') + '\n'
        + new Date().toLocaleDateString('es-AR') + '\n\n'
        + lineas.join('\n');
    window.open('https://wa.me/?text=' + encodeURIComponent(texto), '_blank');
}

// ── Renderizar lista ──
function lcRenderizar(filtro) {
    var items = _lcItems.slice();
    if (filtro === 'urgente') items = items.filter(function(it) { return it.urgencia <= 2; });
    if (filtro === 'normal')  items = items.filter(function(it) { return it.urgencia > 2; });
    if (_lcProveedorActivo) {
        items = items.filter(function(it) { return (it.proveedor || '').toUpperCase() === _lcProveedorActivo; });
    }

    if (!items.length) {
        document.getElementById('lcCuerpo').innerHTML = '<div class="estado-carga">Sin productos en esta categoría</div>';
        return;
    }

    var modoProveedor = !!_lcProveedorActivo;
    var html = '';
    var urgActual = -99;

    items.forEach(function(it) {
        // Separadores de sección (solo vista general)
        if (!modoProveedor && it.urgencia !== urgActual) {
            urgActual = it.urgencia;
            var tit = '';
            if      (it.urgencia === 0)  tit = '🔔 Piso manual — PEDIR YA';
            else if (it.urgencia === 1)  tit = '⚠️ Empujar ya';
            else if (it.urgencia === 2)  tit = '🟠 Riesgo vencimiento';
            else if (it.urgencia === 3)  tit = '⏰ Stock crítico (≤3 días)';
            else if (it.urgencia === 4)  tit = '🟡 Stock bajo (≤7 días)';
            else if (it.urgencia === 99) tit = '⏸️ Pausados — no comprar ahora';
            else                          tit = '🟢 Compra normal';
            html += '<div class="seccion-titulo">' + tit + '</div>';
        }

        var esUrgente = it.urgencia <= 2;
        var esPiso    = it.urgencia === 0;
        var esPausado = it.pausado === true;
        var cardCls   = esPiso ? 'lc-card piso' : esUrgente ? 'lc-card urgente' : 'lc-card';
        if (esPausado) cardCls += ' pausada';

        var diasTxt = (it.diasStock !== null && it.diasStock !== undefined) ? it.diasStock + 'd stock' : 'sin historial';
        var provTxt = (!modoProveedor && it.proveedor) ? '<span>📦 ' + it.proveedor + '</span>' : '';

        var badgeHTML = esPausado
            ? '<span class="lc-badge pausado">⛔ INACTIVO</span>'
            : (esUrgente
                ? '<span class="lc-badge urgente">' + (esPiso ? '🔔 PISO' : it.prioridad || '⚠️') + '</span>'
                : '<span class="lc-badge ok">✅ OK</span>');

        // Encontrar producto en caché para pausar
        var prodId = null;
        if (_lcProductosCache.length) {
            var pr = _lcProductosCache.find(function(p) { return p.name === it.nombre; });
            if (pr) prodId = pr.id;
        }
        var btnPausar = (prodId !== null)
            ? '<button class="btn-pausar" onclick="lcTogglePausado(' + prodId + ', this)">'
              + (esPausado ? '▶️ Reactivar' : 'Marcar inactivo') + '</button>'
            : '';

        // Checkbox en modo proveedor
        var checkHTML = '';
        if (modoProveedor) {
            var chk = _lcSeleccionados.has(it.nombre) ? 'checked' : '';
            checkHTML = '<input type="checkbox" ' + chk
                + ' onchange="lcToggleSeleccion(\'' + it.nombre.replace(/'/g, "\\'") + '\', this.checked)">';
        }

        // Historial de precios
        var histHTML = '';
        if (it.historialPrecios && it.historialPrecios.length) {
            histHTML = '<div class="lc-historial">'
                + it.historialPrecios.map(function(hp) {
                    return '<div class="hist-item">'
                        + '<div class="hist-prov" title="' + hp.proveedor + '">' + hp.proveedor + '</div>'
                        + '<div class="hist-precio">$' + hp.costo.toLocaleString('es-AR') + '</div>'
                        + (hp.fecha ? '<div class="hist-fecha">' + hp.fecha + '</div>' : '')
                        + '</div>';
                }).join('')
                + '</div>';
        }

        // Columna derecha: cantidad + costo
        var costoHTML = it.costo > 0
            ? '<div class="lc-costo">💰 $' + Math.round(it.costo * it.cantidad).toLocaleString('es-AR') + '</div>'
              + '<div class="lc-costo-ref">$' + it.costo.toLocaleString('es-AR') + ' c/u</div>'
            : '<div style="font-size:0.7rem;color:#e53935;">Sin precio costo</div>'
              + '<div class="lc-costo-ref">ref. $' + (it.precio || 0).toLocaleString('es-AR') + '</div>';

        html += '<div class="' + cardCls + '">'
            + (modoProveedor ? '<div style="display:flex;align-items:center;">' + checkHTML + '</div>' : '')
            + '<div style="flex:1;min-width:0;">'
            +   '<div class="lc-nombre">' + it.nombre + '</div>'
            +   '<div class="lc-meta">'
            +     badgeHTML
            +     '<span>📦 stock: ' + it.stock + '</span>'
            +     '<span>⏱ ' + diasTxt + '</span>'
            +     provTxt
            +   '</div>'
            +   (!modoProveedor ? btnPausar : '')
            + '</div>'
            + '<div style="text-align:right;min-width:60px;">'
            +   '<div class="lc-cantidad">x' + it.cantidad + '</div>'
            +   costoHTML
            + '</div>'
            + histHTML
            + '</div>';
    });

    document.getElementById('lcCuerpo').innerHTML = html;
}

// ── Pausar / reactivar ──
async function lcTogglePausado(id, btn) {
    // Buscar en caché local
    var p = _lcProductosCache.find(function(pr) { return pr.id === id; });
    var esPausado = false;
    if (p) esPausado = p.pausadoListaCompra === true || p.pausadoListaCompra === 'SI';

    var nuevoPausado = !esPausado;
    if (p) p.pausadoListaCompra = nuevoPausado ? 'SI' : '';

    // Actualizar _lcItems
    var lcItem = _lcItems.find(function(i) { return p && i.nombre === p.name; });
    if (lcItem) {
        lcItem.pausado = nuevoPausado;
        lcItem.urgencia = nuevoPausado ? 99 : 7;
        lcItem.prioridad = nuevoPausado ? 'PAUSADO' : 'OK';
    }
    lcRenderizar(_lcFiltroActivo);

    try {
        var resp = await _apiFetch('setPausadoListaCompra', { id: id, pausado: nuevoPausado ? 'SI' : '' });
        if (!resp.success) throw new Error('sin ok');
        mostrarToast(nuevoPausado ? '⛔ Marcado inactivo' : '▶️ Reactivado', nuevoPausado ? '' : 'verde');
    } catch(e) {
        // Revertir
        if (p) p.pausadoListaCompra = esPausado ? 'SI' : '';
        if (lcItem) { lcItem.pausado = esPausado; lcItem.urgencia = esPausado ? 99 : 7; }
        lcRenderizar(_lcFiltroActivo);
        mostrarToast('❌ Error al guardar', 'rojo');
    }
}

// ── Copiar texto ──
function lcCopiarTexto() {
    if (!_lcItems.length) return;
    var texto = '🛒 Lista de compra — ' + new Date().toLocaleDateString('es-AR') + '\n\n';
    var grupos = {};
    _lcItems.forEach(function(it) {
        var g = it.urgencia <= 2 ? '⚠️ URGENTES' : '📋 NORMAL';
        if (!grupos[g]) grupos[g] = [];
        var cTxt = it.costo > 0 ? ' — $' + Math.round(it.costo * it.cantidad).toLocaleString('es-AR') : '';
        grupos[g].push('• ' + it.nombre + ' x' + it.cantidad + (it.proveedor ? ' (' + it.proveedor + ')' : '') + cTxt);
    });
    var totalCosto = _lcItems.reduce(function(s, it) { return s + (it.costo > 0 ? it.costo * it.cantidad : 0); }, 0);
    var sinCosto   = _lcItems.filter(function(it) { return it.costo <= 0; }).length;
    Object.keys(grupos).forEach(function(g) { texto += g + '\n' + grupos[g].join('\n') + '\n\n'; });
    texto += '💰 Total estimado: $' + Math.round(totalCosto).toLocaleString('es-AR');
    if (sinCosto) texto += ' (' + sinCosto + ' sin precio costo)';

    navigator.clipboard.writeText(texto)
        .then(function() { mostrarToast('✅ Lista copiada', 'verde'); })
        .catch(function() {
            var ta = document.createElement('textarea');
            ta.value = texto; ta.style.cssText = 'position:fixed;opacity:0;';
            document.body.appendChild(ta); ta.select();
            document.execCommand('copy'); document.body.removeChild(ta);
            mostrarToast('✅ Lista copiada', 'verde');
        });
}

// ── Compartir WA ──
function lcCompartirWA() {
    if (!_lcItems.length) return;
    var texto = '🛒 *Lista de compra Almacén Copihue*\n' + new Date().toLocaleDateString('es-AR') + '\n\n';
    var urgentes = _lcItems.filter(function(it) { return it.urgencia <= 2 && !it.pausado; });
    var normales  = _lcItems.filter(function(it) { return it.urgencia > 2 && it.urgencia < 99; });
    if (urgentes.length) {
        texto += '⚠️ *URGENTES*\n';
        urgentes.forEach(function(it) {
            var cTxt = it.costo > 0 ? ' — $' + Math.round(it.costo * it.cantidad).toLocaleString('es-AR') : '';
            texto += '• ' + it.nombre + ' — pedir x' + it.cantidad + cTxt + '\n';
        });
        texto += '\n';
    }
    if (normales.length) {
        texto += '📋 *NORMAL*\n';
        normales.forEach(function(it) {
            var cTxt = it.costo > 0 ? ' — $' + Math.round(it.costo * it.cantidad).toLocaleString('es-AR') : '';
            texto += '• ' + it.nombre + ' — x' + it.cantidad + cTxt + '\n';
        });
        texto += '\n';
    }
    var totalCosto = _lcItems.reduce(function(s, it) { return s + (it.costo > 0 ? it.costo * it.cantidad : 0); }, 0);
    if (totalCosto > 0) texto += '💰 Total estimado: $' + Math.round(totalCosto).toLocaleString('es-AR');
    window.open('https://wa.me/?text=' + encodeURIComponent(texto), '_blank');
}

// ── Init ──
document.addEventListener('DOMContentLoaded', cargarLista);
