<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#1b5e20">
<title>Almacén Copihue — Reportes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --cp:#2e7d32;--cp-l:#4caf50;--cp-d:#1b5e20;--cp-bg:#f8fff8;
  --cp-txt:#212121;--cp-sub:#757575;--cp-card:#fff;--cp-border:#e8f0e8;
  --cp-red:#c62828;--cp-info:#1565c0;--cp-accent:#ccff00;
  --cp-sbg:#e8f5e9;--cp-ebg:#ffebee;--r:12px;
  --shadow:0 2px 8px rgba(46,125,50,0.09);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--cp-bg);color:var(--cp-txt);min-height:100vh;padding-bottom:80px}

.header{background:var(--cp-d);color:#fff;padding:16px 16px 0;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.brand h1{font-size:16px;font-weight:600;letter-spacing:-.3px}
.brand p{font-size:11px;opacity:.65;margin-top:1px}
.btn-reload{margin-left:auto;background:rgba(255,255,255,0.15);border:none;color:#fff;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap}
.btn-reload:active{background:rgba(255,255,255,0.25)}

.tabs{display:flex;overflow-x:auto;scrollbar-width:none;padding-bottom:1px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.55);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;font-family:inherit;transition:color .15s}
.tab.active{color:var(--cp-accent);border-bottom-color:var(--cp-accent)}

.content{padding:14px 14px 20px}
.section{display:none}
.section.active{display:block}

.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.metric{background:var(--cp-card);border-radius:var(--r);padding:14px;border:1px solid var(--cp-border);box-shadow:var(--shadow)}
.metric-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--cp-sub);margin-bottom:5px;font-weight:500}
.metric-value{font-size:20px;font-weight:600;color:var(--cp-d);line-height:1}
.mv-green{color:#2e7d32}.mv-red{color:var(--cp-red)}.mv-blue{color:var(--cp-info)}
.metric-delta{font-size:11px;margin-top:4px;color:var(--cp-sub)}
.delta-up::before{content:'↑ ';color:#2e7d32}
.delta-dn::before{content:'↓ ';color:var(--cp-red)}

.card{background:var(--cp-card);border-radius:var(--r);padding:14px;border:1px solid var(--cp-border);box-shadow:var(--shadow);margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;color:var(--cp-d);margin-bottom:12px}
.chart-wrap{position:relative;width:100%}

.top-list{list-style:none}
.top-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--cp-border);font-size:13px}
.top-item:last-child{border-bottom:none}
.top-rank{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:var(--cp-sbg);color:var(--cp-d)}
.top-rank.neg{background:var(--cp-ebg);color:var(--cp-red)}
.top-name{flex:1;font-size:12px;color:var(--cp-txt)}
.top-name small{display:block;color:var(--cp-sub);font-size:10px;margin-top:1px}
.top-val{font-weight:600;font-size:13px;font-family:'DM Mono',monospace}
.top-val.pos{color:#2e7d32}.top-val.neg{color:var(--cp-red)}

.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-label{font-size:12px;color:var(--cp-sub)}
select{font-size:16px;padding:7px 10px;border:1px solid var(--cp-border);border-radius:8px;background:var(--cp-card);color:var(--cp-txt);font-family:inherit;-webkit-appearance:none;appearance:none}

.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--cp-sub)}
.ldot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:12px;color:var(--cp-sub)}
.spinner{width:32px;height:32px;border:3px solid var(--cp-border);border-top-color:var(--cp-l);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px}

.empty{text-align:center;padding:40px 20px;color:var(--cp-sub)}
.empty-icon{font-size:42px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.7}

.error-card{background:#fff3f3;border:1px solid #ffcdd2;border-radius:var(--r);padding:16px;margin-bottom:12px;font-size:13px;color:var(--cp-red);line-height:1.6}
.error-card strong{display:block;margin-bottom:4px}

.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(27,94,32,0.92);color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:rgba(198,40,40,0.92)}

.fab{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom,0px));right:16px;z-index:200;background:var(--cp-d);color:#fff;width:52px;height:52px;border-radius:16px;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(27,94,32,0.4);display:flex;align-items:center;justify-content:center}

#email-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.6);overflow-y:auto;padding:16px;align-items:flex-start;justify-content:center}
#email-overlay.open{display:flex}
.email-modal{background:#fff;border-radius:var(--r);overflow:hidden;max-width:480px;width:100%;margin:auto}
.email-hdr{background:var(--cp-d);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.email-hdr h3{font-size:14px;font-weight:600}
.btn-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1}
.email-body{padding:16px}
.email-ta{width:100%;min-height:280px;padding:10px;border:1px solid var(--cp-border);border-radius:8px;font-size:12px;font-family:'DM Mono',monospace;resize:none;color:var(--cp-txt);background:#fafcfa;line-height:1.6}
.email-acts{display:flex;gap:8px;margin-top:10px}
.email-acts button{flex:1;padding:10px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.btn-cp{background:var(--cp-d);color:#fff;border:none}
.btn-cx{background:#fff;color:var(--cp-d);border:2px solid var(--cp-d)}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">🌿</div>
    <div class="brand">
      <h1>Almacén Copihue</h1>
      <p id="hdr-sub">Cargando datos…</p>
    </div>
    <button class="btn-reload" onclick="fetchAll()">↻ Actualizar</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('mensual')">Mes</button>
    <button class="tab" onclick="switchTab('diario')">Hoy</button>
    <button class="tab" onclick="switchTab('semanal')">Semana</button>
    <button class="tab" onclick="switchTab('anual')">Año</button>
    <button class="tab" onclick="switchTab('decada')">Historial</button>
  </div>
</div>

<div class="content">
  <div class="section active" id="sec-mensual"><div id="mensual-content"></div></div>
  <div class="section" id="sec-diario"><div id="diario-content"></div></div>
  <div class="section" id="sec-semanal"><div id="semanal-content"></div></div>
  <div class="section" id="sec-anual"><div id="anual-content"></div></div>
  <div class="section" id="sec-decada"><div id="decada-content"></div></div>
</div>

<button class="fab" onclick="openEmail()">✉️</button>
<div class="toast" id="toast"></div>

<div id="email-overlay">
  <div class="email-modal">
    <div class="email-hdr">
      <h3>📧 Reporte para enviar</h3>
      <button class="btn-close" onclick="closeEmail()">✕</button>
    </div>
    <div class="email-body">
      <div class="filter-bar">
        <span class="filter-label">Tipo:</span>
        <select id="em-tipo" onchange="updateEmailPeriods()">
          <option value="diario">Diario</option>
          <option value="semanal">Semanal</option>
          <option value="mensual" selected>Mensual</option>
          <option value="anual">Anual</option>
        </select>
        <select id="em-per" onchange="genEmail()"></select>
      </div>
      <textarea class="email-ta" id="em-text" readonly></textarea>
      <div class="email-acts">
        <button class="btn-cp" onclick="copyEmail()">📋 Copiar texto</button>
        <button class="btn-cx" onclick="closeEmail()">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxhKFk2WAi-KRY5xGBsI6_6Pvp3jDjt8mSRXvy7I1WehNmBpJamqK9G9Q1ZJSCSgAdfDA/exec';
const MESES_L = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MESES_C = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

let cajaData = [], salidasData = [];
let charts = {};

// ── FETCH ──
async function fetchAll() {
  setHdrSub('Actualizando…');
  showAllLoading();
  try {
    const [caja, salidas] = await Promise.all([
      fetchSheet('CAJA_MOVIMIENTOS'),
      fetchSheet('SALIDAS')
    ]);
    cajaData = caja;
    salidasData = salidas;
    const total = caja.length + salidas.length;
    setHdrSub(total + ' registros · ' + new Date().toLocaleDateString('es-AR'));
    buildAll();
    toast('✅ Datos actualizados');
  } catch(e) {
    setHdrSub('Error al cargar datos');
    showAllError(e.message);
    toast('❌ ' + e.message, true);
  }
}

async function fetchSheet(sheet) {
  const url = API + '?sheet=' + encodeURIComponent(sheet);
  const r = await fetch(url);
  if (!r.ok) throw new Error('Error HTTP ' + r.status + ' (' + sheet + ')');
  const data = await r.json();
  // Intentar varios formatos que puede devolver el Apps Script
  if (Array.isArray(data)) return parseRows(data, sheet);
  if (data && Array.isArray(data.values)) return parseRows(data.values, sheet);
  if (data && Array.isArray(data.data)) return parseRows(data.data, sheet);
  if (data && data.error) throw new Error(data.error + ' (' + sheet + ')');
  // Si devuelve objeto con filas como propiedades
  return parseRows(Object.values(data), sheet);
}

function parseRows(rows, sheet) {
  if (!rows || !rows.length) return [];
  // Detectar si la primera fila es encabezado
  const first = rows[0];
  let startIdx = 0;
  if (Array.isArray(first)) {
    const fStr = String(first[0]).toLowerCase();
    if (fStr === 'fecha' || fStr === 'date' || isNaN(parseDate(first[0]))) startIdx = 1;
  } else if (typeof first === 'object') {
    // ya es array de objetos con keys
    return rows.slice(1).map(r => parseObj(r, sheet)).filter(r => r && r.fecha);
  }
  return rows.slice(startIdx).map(r => parseArr(r, sheet)).filter(r => r && r.fecha);
}

function parseDate(s) {
  if (!s) return null;
  s = String(s).trim();
  if (s.includes('/')) { const p=s.split('/'); if(p.length===3) return new Date(p[2],p[1]-1,p[0]); }
  const d = new Date(s);
  return isNaN(d) ? null : d;
}

function parseArr(cols, sheet) {
  if (!cols || cols.length < 2) return null;
  const d = parseDate(cols[0]);
  if (!d) return null;
  if (sheet === 'CAJA_MOVIMIENTOS') {
    return { fecha:d, hora:str(cols[1]), tipo:str(cols[2]).toUpperCase(),
      motivo:str(cols[3]), monto:num(cols[4]), medio:str(cols[5]),
      categoria:str(cols[6]), obs:str(cols[7]), vendedor:str(cols[8]) };
  } else {
    return { fecha:d, hora:str(cols[1]), producto:str(cols[2]), id:str(cols[3]),
      cantidad:num(cols[4])||1, costo:num(cols[5]), precio:num(cols[6]),
      motivo:str(cols[7]), obs:str(cols[8]), vendedor:str(cols[9]) };
  }
}

function parseObj(o, sheet) {
  const keys = Object.keys(o).map(k=>k.toLowerCase());
  const v = k => o[Object.keys(o)[keys.indexOf(k)]] ?? '';
  const d = parseDate(v('fecha') || v('date') || Object.values(o)[0]);
  if (!d) return null;
  if (sheet === 'CAJA_MOVIMIENTOS') {
    return { fecha:d, hora:str(v('hora')), tipo:str(v('tipo')).toUpperCase(),
      motivo:str(v('motivo')), monto:num(v('monto')), medio:str(v('medio')),
      categoria:str(v('categoria')), obs:str(v('observacion')||v('obs')), vendedor:str(v('vendedor')) };
  } else {
    return { fecha:d, hora:str(v('hora')), producto:str(v('producto')), id:str(v('id')),
      cantidad:num(v('cantidad'))||1, costo:num(v('costo unit.')||v('costo')),
      precio:num(v('precio venta')||v('precio')), motivo:str(v('motivo')),
      obs:str(v('observación')||v('obs')), vendedor:str(v('vendedor')) };
  }
}

function str(v){ return v==null?'':String(v).trim(); }
function num(v){ const n=parseFloat(str(v).replace(/[.$]/g,'')); return isNaN(n)?0:n; }

// ── HELPERS ──
function isoDate(d){ return d.toISOString().slice(0,10); }
function weekKey(d){
  const t=new Date(d); t.setHours(0,0,0,0);
  t.setDate(t.getDate()+4-(t.getDay()||7));
  const y=new Date(t.getFullYear(),0,1);
  return t.getFullYear()+'-S'+String(Math.ceil(((t-y)/864e5+1)/7)).padStart(2,'0');
}
function monthKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function fmt(n){
  if(isNaN(n))return '$0';
  return (n<0?'-$':'$')+Math.abs(Math.round(n)).toLocaleString('es-AR');
}
function fmtDateLabel(iso){const[y,m,d]=iso.split('-');return d+'/'+m+'/'+y;}
function dc(id){ if(charts[id]){charts[id].destroy();delete charts[id];} }

function toast(msg, err=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.toggle('err',err); t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function setHdrSub(s){ document.getElementById('hdr-sub').textContent=s; }
function showAllLoading(){
  ['mensual','diario','semanal','anual','decada'].forEach(s=>{
    document.getElementById(s+'-content').innerHTML=loadingHTML();
  });
}
function showAllError(msg){
  ['mensual','diario','semanal','anual','decada'].forEach(s=>{
    document.getElementById(s+'-content').innerHTML=errorHTML(msg);
  });
}
function loadingHTML(){ return `<div class="loading-wrap"><div class="spinner"></div><div class="loading-txt">Cargando desde la planilla…</div></div>`; }
function errorHTML(msg){ return `<div class="error-card"><strong>No se pudo conectar a la planilla</strong>${msg}<br><br>Verificá que el Apps Script esté publicado como "Cualquiera, incluso anónimo" y tocá ↻ Actualizar.</div>`; }
function emptyHTML(){ return `<div class="empty"><div class="empty-icon">📂</div><p>No hay datos para este período.<br>Tocá ↻ Actualizar para recargar.</p></div>`; }

// ── TABS ──
function switchTab(name){
  const names=['mensual','diario','semanal','anual','decada'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',names[i]===name));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
}

function buildAll(){ buildMensual(); buildDiario(); buildSemanal(); buildAnual(); buildDecada(); }

// ══════════════════════════
// MENSUAL
// ══════════════════════════
function buildMensual(){
  const el=document.getElementById('mensual-content');
  if(!cajaData.length){el.innerHTML=emptyHTML();return;}
  const meses={};
  cajaData.forEach(r=>{
    const k=monthKey(r.fecha);
    if(!meses[k])meses[k]={ing:0,eg:0,n:0,cats:{}};
    if(r.tipo==='INGRESO')meses[k].ing+=r.monto; else meses[k].eg+=r.monto;
    meses[k].n++;
    const c=r.categoria||r.motivo||'Otro';
    meses[k].cats[c]=(meses[k].cats[c]||0)+r.monto;
  });
  const keys=Object.keys(meses).sort();
  const labels=keys.map(k=>{const[y,m]=k.split('-');return MESES_C[parseInt(m)-1]+' '+y.slice(2);});
  const ings=keys.map(k=>meses[k].ing);
  const egs=keys.map(k=>meses[k].eg);
  const bals=keys.map(k=>meses[k].ing-meses[k].eg);
  const allCats={};
  Object.values(meses).forEach(m=>Object.entries(m.cats).forEach(([c,v])=>allCats[c]=(allCats[c]||0)+v));
  const topCats=Object.entries(allCats).sort((a,b)=>b[1]-a[1]).slice(0,6);

  dc('c-mes-bar');dc('c-mes-bal');

  const last2=keys.slice(-2);
  el.innerHTML=`
    <div class="metrics">
      ${last2.map(k=>{
        const idx=keys.indexOf(k);const b=bals[idx];
        return `<div class="metric">
          <div class="metric-label">${labels[idx]}</div>
          <div class="metric-value ${b>=0?'mv-green':'mv-red'}">${fmt(b)}</div>
          <div class="metric-delta delta-up">${fmt(ings[idx])}</div>
          <div class="metric-delta delta-dn">${fmt(egs[idx])}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div class="card-title">Ingresos vs egresos por mes</div>
      <div class="legend">
        <div class="legend-item"><span class="ldot" style="background:#1b5e20"></span>Ingresos</div>
        <div class="legend-item"><span class="ldot" style="background:#ef9a9a"></span>Egresos</div>
      </div>
      <div class="chart-wrap" style="height:220px"><canvas id="c-mes-bar" role="img" aria-label="Ingresos y egresos mensuales"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Balance mensual</div>
      <div class="chart-wrap" style="height:160px"><canvas id="c-mes-bal" role="img" aria-label="Balance mensual"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Top categorías de gasto (acumulado)</div>
      <ul class="top-list">
        ${topCats.map(([c,v],i)=>`<li class="top-item">
          <div class="top-rank">${i+1}</div>
          <div class="top-name">${c}</div>
          <div class="top-val pos">${fmt(v)}</div>
        </li>`).join('')}
      </ul>
    </div>`;

  charts['c-mes-bar']=new Chart(document.getElementById('c-mes-bar'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Ingresos',data:ings,backgroundColor:'#1b5e20'},
      {label:'Egresos',data:egs,backgroundColor:'#ef9a9a'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{x:{ticks:{autoSkip:false,font:{size:9},maxRotation:45}},y:{ticks:{callback:v=>fmt(v),font:{size:10}}}},
      plugins:{legend:{labels:{font:{size:11},boxWidth:12}}}}
  });
  charts['c-mes-bal']=new Chart(document.getElementById('c-mes-bal'),{
    type:'line',
    data:{labels,datasets:[{label:'Balance',data:bals,
      borderColor:'#2e7d32',backgroundColor:'rgba(76,175,80,0.1)',
      tension:0.3,fill:true,
      pointBackgroundColor:bals.map(b=>b>=0?'#2e7d32':'#c62828'),pointRadius:4
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{x:{ticks:{font:{size:9},autoSkip:false,maxRotation:45}},y:{ticks:{callback:v=>fmt(v),font:{size:10}}}},
      plugins:{legend:{display:false}}}
  });
}

// ══════════════════════════
// DIARIO
// ══════════════════════════
function buildDiario(){
  const el=document.getElementById('diario-content');
  if(!cajaData.length&&!salidasData.length){el.innerHTML=emptyHTML();return;}
  const allDates=[...new Set([...cajaData.map(r=>isoDate(r.fecha)),...salidasData.map(r=>isoDate(r.fecha))])].sort().reverse();
  const opts=allDates.map(d=>`<option value="${d}">${fmtDateLabel(d)}</option>`).join('');
  el.innerHTML=`<div class="filter-bar"><span class="filter-label">Fecha:</span><select id="sel-dia" onchange="renderDia()">${opts}</select></div><div id="dia-body"></div>`;
  renderDia();
}

function renderDia(){
  const sel=document.getElementById('sel-dia');if(!sel)return;
  const dia=sel.value;
  const caja=cajaData.filter(r=>isoDate(r.fecha)===dia);
  const sal=salidasData.filter(r=>isoDate(r.fecha)===dia);
  const ing=caja.filter(r=>r.tipo==='INGRESO').reduce((s,r)=>s+r.monto,0);
  const eg=caja.filter(r=>r.tipo==='EGRESO').reduce((s,r)=>s+r.monto,0);
  const ventas=sal.filter(r=>r.precio>0).reduce((s,r)=>s+r.precio*r.cantidad,0);
  const bal=ing-eg;
  dc('c-dia-hora');dc('c-dia-cat');

  document.getElementById('dia-body').innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="metric-label">Ingresos</div><div class="metric-value mv-green">${fmt(ing)}</div></div>
      <div class="metric"><div class="metric-label">Egresos</div><div class="metric-value mv-red">${fmt(eg)}</div></div>
      <div class="metric"><div class="metric-label">Balance</div><div class="metric-value ${bal>=0?'mv-green':'mv-red'}">${fmt(bal)}</div></div>
      <div class="metric"><div class="metric-label">Ventas</div><div class="metric-value mv-blue">${fmt(ventas)}</div></div>
      <div class="metric"><div class="metric-label">Movimientos</div><div class="metric-value">${caja.length}</div></div>
      <div class="metric"><div class="metric-label">Items salida</div><div class="metric-value">${sal.length}</div></div>
    </div>
    ${caja.length?`
    <div class="card">
      <div class="card-title">Por hora</div>
      <div class="chart-wrap" style="height:170px"><canvas id="c-dia-hora" role="img" aria-label="Movimientos por hora"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Categorías de egreso</div>
      <div class="chart-wrap" style="height:190px"><canvas id="c-dia-cat" role="img" aria-label="Egresos por categoría"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Detalle (${caja.length})</div>
      <ul class="top-list">
        ${caja.map(r=>`<li class="top-item">
          <div class="top-rank ${r.tipo==='EGRESO'?'neg':''}">${r.tipo==='INGRESO'?'↑':'↓'}</div>
          <div class="top-name">${r.motivo||r.obs||'—'}<small>${r.hora} · ${r.medio||''} ${r.categoria?'· '+r.categoria:''}</small></div>
          <div class="top-val ${r.tipo==='INGRESO'?'pos':'neg'}">${fmt(r.monto)}</div>
        </li>`).join('')}
      </ul>
    </div>`:''}`;

  if(caja.length){
    const h={};
    caja.forEach(r=>{const hh=(r.hora||'00').slice(0,2);if(!h[hh])h[hh]={i:0,e:0};if(r.tipo==='INGRESO')h[hh].i+=r.monto;else h[hh].e+=r.monto;});
    const hk=Object.keys(h).sort();
    charts['c-dia-hora']=new Chart(document.getElementById('c-dia-hora'),{
      type:'bar',data:{labels:hk.map(x=>x+'h'),datasets:[
        {label:'Ing',data:hk.map(x=>h[x].i),backgroundColor:'#4caf50'},
        {label:'Eg',data:hk.map(x=>h[x].e),backgroundColor:'#ef9a9a'}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        scales:{x:{ticks:{font:{size:10},autoSkip:false}},y:{ticks:{callback:v=>fmt(v),font:{size:10}}}},
        plugins:{legend:{labels:{font:{size:11},boxWidth:12}}}}
    });
    const cats={};
    caja.filter(r=>r.tipo==='EGRESO').forEach(r=>{const c=r.categoria||r.motivo||'Otro';cats[c]=(cats[c]||0)+r.monto;});
    const ck=Object.keys(cats).slice(0,6),cv=ck.map(c=>cats[c]);
    const pc=['#1b5e20','#2e7d32','#4caf50','#a5d6a7','#c62828','#ef9a9a'];
    if(ck.length)charts['c-dia-cat']=new Chart(document.getElementById('c-dia-cat'),{
      type:'doughnut',data:{labels:ck,datasets:[{data:cv,backgroundColor:pc.slice(0,ck.length),borderWidth:2,borderColor:'#fff'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},padding:8,boxWidth:12}}}}
    });
  }
}

// ══════════════════════════
// SEMANAL
// ══════════════════════════
function buildSemanal(){
  const el=document.getElementById('semanal-content');
  if(!cajaData.length){el.innerHTML=emptyHTML();return;}
  const sw={};
  cajaData.forEach(r=>{const w=weekKey(r.fecha);if(!sw[w])sw[w]={ing:0,eg:0,n:0};if(r.tipo==='INGRESO')sw[w].ing+=r.monto;else sw[w].eg+=r.monto;sw[w].n++;});
  const keys=Object.keys(sw).sort().slice(-10);
  const ings=keys.map(k=>sw[k].ing),egs=keys.map(k=>sw[k].eg),bals=keys.map(k=>sw[k].ing-sw[k].eg);
  dc('c-sem');
  el.innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="metric-label">Semanas</div><div class="metric-value">${keys.length}</div></div>
      <div class="metric"><div class="metric-label">Prom. ingreso/sem</div><div class="metric-value mv-green">${fmt(ings.reduce((a,b)=>a+b,0)/(ings.length||1))}</div></div>
      <div class="metric"><div class="metric-label">Prom. egreso/sem</div><div class="metric-value mv-red">${fmt(egs.reduce((a,b)=>a+b,0)/(egs.length||1))}</div></div>
      <div class="metric"><div class="metric-label">Mejor balance</div><div class="metric-value">${keys[bals.indexOf(Math.max(...bals))]||'—'}</div></div>
    </div>
    <div class="card">
      <div class="card-title">Semanas — ingresos vs egresos</div>
      <div class="legend">
        <div class="legend-item"><span class="ldot" style="background:#2e7d32"></span>Ingresos</div>
        <div class="legend-item"><span class="ldot" style="background:#ef9a9a"></span>Egresos</div>
        <div class="legend-item"><span class="ldot" style="background:#aacc00;border-radius:50%"></span>Balance</div>
      </div>
      <div class="chart-wrap" style="height:230px"><canvas id="c-sem" role="img" aria-label="Semanal"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Balance por semana</div>
      <ul class="top-list">
        ${keys.slice().reverse().map(k=>{const b=sw[k].ing-sw[k].eg;return`<li class="top-item">
          <div class="top-rank ${b<0?'neg':''}">${b>=0?'↑':'↓'}</div>
          <div class="top-name">${k}<small>${sw[k].n} movimientos</small></div>
          <div class="top-val ${b>=0?'pos':'neg'}">${fmt(b)}</div>
        </li>`;}).join('')}
      </ul>
    </div>`;
  charts['c-sem']=new Chart(document.getElementById('c-sem'),{
    type:'bar',data:{labels:keys.map(k=>k.replace(/-/g,' ')),datasets:[
      {label:'Ing',data:ings,backgroundColor:'#2e7d32',order:2},
      {label:'Eg',data:egs,backgroundColor:'#ef9a9a',order:2},
      {label:'Bal',data:bals,type:'line',borderColor:'#aacc00',backgroundColor:'rgba(170,204,0,0.12)',
       pointBackgroundColor:bals.map(b=>b>=0?'#aacc00':'#c62828'),tension:0.3,order:1}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{x:{ticks:{font:{size:9},autoSkip:false,maxRotation:45}},y:{ticks:{callback:v=>fmt(v),font:{size:10}}}},
      plugins:{legend:{labels:{font:{size:11},boxWidth:12}}}}
  });
}

// ══════════════════════════
// ANUAL
// ══════════════════════════
function buildAnual(){
  const el=document.getElementById('anual-content');
  if(!cajaData.length){el.innerHTML=emptyHTML();return;}
  const ay={};
  cajaData.forEach(r=>{
    const y=r.fecha.getFullYear();
    if(!ay[y])ay[y]={ing:0,eg:0,n:0,meses:Array(12).fill(null).map(()=>({ing:0,eg:0}))};
    if(r.tipo==='INGRESO'){ay[y].ing+=r.monto;ay[y].meses[r.fecha.getMonth()].ing+=r.monto;}
    else{ay[y].eg+=r.monto;ay[y].meses[r.fecha.getMonth()].eg+=r.monto;}
    ay[y].n++;
  });
  const keys=Object.keys(ay).sort();
  dc('c-anual');dc('c-anual-mes');
  el.innerHTML=`
    <div class="metrics">
      ${keys.map(y=>{const b=ay[y].ing-ay[y].eg;return`<div class="metric">
        <div class="metric-label">${y}</div>
        <div class="metric-value ${b>=0?'mv-green':'mv-red'}">${fmt(b)}</div>
        <div class="metric-delta delta-up">${fmt(ay[y].ing)}</div>
        <div class="metric-delta delta-dn">${fmt(ay[y].eg)}</div>
      </div>`;}).join('')}
    </div>
    <div class="card">
      <div class="card-title">Comparativa anual</div>
      <div class="chart-wrap" style="height:210px"><canvas id="c-anual" role="img" aria-label="Anual"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Distribución mensual</div>
      <div class="filter-bar"><span class="filter-label">Año:</span>
        <select id="sel-anio" onchange="renderAnioMes()">${keys.map(y=>`<option value="${y}">${y}</option>`).join('')}</select>
      </div>
      <div class="chart-wrap" style="height:190px"><canvas id="c-anual-mes" role="img" aria-label="Mensual del año"></canvas></div>
    </div>`;
  charts['c-anual']=new Chart(document.getElementById('c-anual'),{
    type:'bar',data:{labels:keys,datasets:[
      {label:'Ingresos',data:keys.map(y=>ay[y].ing),backgroundColor:'#1b5e20'},
      {label:'Egresos',data:keys.map(y=>ay[y].eg),backgroundColor:'#ef9a9a'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{y:{ticks:{callback:v=>fmt(v),font:{size:10}}}},
      plugins:{legend:{labels:{font:{size:11},boxWidth:12}}}}
  });
  window._ay=ay; renderAnioMes();
}

function renderAnioMes(){
  const sel=document.getElementById('sel-anio');if(!sel||!window._ay)return;
  const y=parseInt(sel.value),data=window._ay[y].meses;
  dc('c-anual-mes');
  charts['c-anual-mes']=new Chart(document.getElementById('c-anual-mes'),{
    type:'line',data:{labels:MESES_C,datasets:[
      {label:'Ing',data:data.map(m=>m.ing),borderColor:'#2e7d32',backgroundColor:'rgba(76,175,80,0.1)',tension:0.3,fill:true},
      {label:'Eg',data:data.map(m=>m.eg),borderColor:'#c62828',backgroundColor:'rgba(198,40,40,0.07)',tension:0.3,fill:true}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{x:{ticks:{font:{size:10}}},y:{ticks:{callback:v=>fmt(v),font:{size:10}}}},
      plugins:{legend:{labels:{font:{size:11},boxWidth:12}}}}
  });
}

// ══════════════════════════
// HISTORIAL
// ══════════════════════════
function buildDecada(){
  const el=document.getElementById('decada-content');
  if(!cajaData.length){el.innerHTML=emptyHTML();return;}
  const dec={};
  cajaData.forEach(r=>{const d=Math.floor(r.fecha.getFullYear()/10)*10;if(!dec[d])dec[d]={ing:0,eg:0,n:0};if(r.tipo==='INGRESO')dec[d].ing+=r.monto;else dec[d].eg+=r.monto;dec[d].n++;});
  const keys=Object.keys(dec).sort();
  dc('c-dec');
  el.innerHTML=`
    <div class="metrics">
      ${keys.map(d=>`<div class="metric"><div class="metric-label">Década ${d}s</div><div class="metric-value">${fmt(dec[d].ing+dec[d].eg)}</div><div class="metric-delta">${dec[d].n} movimientos</div></div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Volumen histórico</div>
      <div class="chart-wrap" style="height:210px"><canvas id="c-dec" role="img" aria-label="Por décadas"></canvas></div>
    </div>`;
  charts['c-dec']=new Chart(document.getElementById('c-dec'),{
    type:'bar',data:{labels:keys.map(k=>k+'s'),datasets:[
      {label:'Ingresos',data:keys.map(k=>dec[k].ing),backgroundColor:'#1b5e20'},
      {label:'Egresos',data:keys.map(k=>dec[k].eg),backgroundColor:'#ef9a9a'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{y:{ticks:{callback:v=>fmt(v),font:{size:10}}}},
      plugins:{legend:{labels:{font:{size:11},boxWidth:12}}}}
  });
}

// ══════════════════════════
// EMAIL
// ══════════════════════════
function openEmail(){
  if(!cajaData.length){toast('Cargá datos primero',true);return;}
  document.getElementById('email-overlay').classList.add('open');
  updateEmailPeriods();
}
function closeEmail(){ document.getElementById('email-overlay').classList.remove('open'); }
function updateEmailPeriods(){
  const tipo=document.getElementById('em-tipo').value;
  const sel=document.getElementById('em-per');
  let opts=[];
  if(tipo==='diario'){
    [...new Set(cajaData.map(r=>isoDate(r.fecha)))].sort().reverse()
      .forEach(d=>opts.push(`<option value="${d}">${fmtDateLabel(d)}</option>`));
  } else if(tipo==='semanal'){
    [...new Set(cajaData.map(r=>weekKey(r.fecha)))].sort().reverse()
      .forEach(w=>opts.push(`<option value="${w}">${w}</option>`));
  } else if(tipo==='mensual'){
    [...new Set(cajaData.map(r=>monthKey(r.fecha)))].sort().reverse()
      .forEach(m=>{const[y,mo]=m.split('-');opts.push(`<option value="${m}">${MESES_L[parseInt(mo)-1]} ${y}</option>`);});
  } else {
    [...new Set(cajaData.map(r=>String(r.fecha.getFullYear())))].sort().reverse()
      .forEach(y=>opts.push(`<option value="${y}">${y}</option>`));
  }
  sel.innerHTML=opts.join('');
  genEmail();
}
function genEmail(){
  const tipo=document.getElementById('em-tipo').value;
  const per=document.getElementById('em-per').value;
  if(!per)return;
  let rows=[];
  if(tipo==='diario') rows=cajaData.filter(r=>isoDate(r.fecha)===per);
  else if(tipo==='semanal') rows=cajaData.filter(r=>weekKey(r.fecha)===per);
  else if(tipo==='mensual') rows=cajaData.filter(r=>monthKey(r.fecha)===per);
  else rows=cajaData.filter(r=>String(r.fecha.getFullYear())===per);

  const ing=rows.filter(r=>r.tipo==='INGRESO').reduce((s,r)=>s+r.monto,0);
  const eg=rows.filter(r=>r.tipo==='EGRESO').reduce((s,r)=>s+r.monto,0);
  const bal=ing-eg;
  const cats={};
  rows.filter(r=>r.tipo==='EGRESO').forEach(r=>{const c=r.categoria||r.motivo||'Otro';cats[c]=(cats[c]||0)+r.monto;});
  const topCats=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const now=new Date().toLocaleDateString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const perLabel=tipo==='mensual'?MESES_L[parseInt(per.split('-')[1])-1]+' '+per.split('-')[0]:per;

  const lines=[
    '══════════════════════════════════',
    '  ALMACÉN COPIHUE',
    '  Reporte '+tipo.toUpperCase()+' — '+perLabel,
    '══════════════════════════════════',
    'Generado: '+now,
    'Movimientos: '+rows.length,
    '',
    '── RESUMEN ────────────────────────',
    '  Ingresos:  '+fmt(ing),
    '  Egresos:   '+fmt(eg),
    '  ──────────────────────────────',
    '  BALANCE:   '+fmt(bal)+' '+(bal>=0?'✅':'⚠️'),
    '',
    '── TOP GASTOS ─────────────────────',
    ...topCats.map(([c,v],i)=>'  '+(i+1)+'. '+c.substring(0,22).padEnd(22)+' '+fmt(v)),
    '',
    '── MOVIMIENTOS ────────────────────',
    ...rows.map(r=>'  '+(r.hora||'').slice(0,5)+' '+(r.tipo==='INGRESO'?'↑':'↓')+' '+fmt(r.monto).padStart(10)+'  '+(r.motivo||r.obs||'—').substring(0,28)),
    '',
    '══════════════════════════════════',
    '  Almacén Copihue — Reporte interno',
    '══════════════════════════════════'
  ];
  document.getElementById('em-text').value=lines.join('\n');
}
function copyEmail(){
  const txt=document.getElementById('em-text').value;
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>toast('📋 Copiado'));}
  else{document.getElementById('em-text').select();document.execCommand('copy');toast('📋 Copiado');}
}

// ── INIT ──
fetchAll();
</script>
