<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Copihue — Fiados v4</title>
<meta name="theme-color" content="#1b5e20">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --vd:#1b5e20;--vdp:#0a3d0f;--verde:#2e7d32;--vl:#e8f5e9;
  --naranja:#f57c00;--nl:#fff3e0;
  --rojo:#c62828;--rl:#ffebee;
  --gris:#546e7a;--bg:#f1f8f1;--borde:#c8e6c9;--texto:#1a2e1c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--texto);min-height:100dvh}

/* ── Header ── */
.hdr{background:linear-gradient(135deg,var(--vdp),var(--vd),var(--verde));padding:12px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(10,61,15,.35)}
.hdr-t{color:#fff;font-size:.95rem;font-weight:900;flex:1}
.hdr-s{color:rgba(255,255,255,.7);font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.btn-back{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:20px;padding:5px 13px;font-size:.76rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-icon{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── Vistas ── */
.vista{display:none;padding:12px}
.vista.activa{display:block}
#vistaFiados{padding-bottom:90px}
#vistaDetalle{padding-bottom:30px}

/* ── Loading / Empty ── */
.ldg{text-align:center;padding:60px 20px;color:var(--gris)}
.spin{width:32px;height:32px;border:3px solid var(--vl);border-top-color:var(--verde);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px 20px;color:var(--gris)}
.empty .icon{font-size:3rem;margin-bottom:10px}

/* ── Resumen global ── */
.resumen{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 6px rgba(46,125,50,.1);border:1px solid var(--borde)}
.resumen .lbl{font-size:.78rem;color:var(--gris)}
.resumen .monto{font-size:1.35rem;font-weight:900;color:var(--rojo)}
.resumen .sub{font-size:.72rem;color:#aaa;margin-top:2px}

/* ── Tarjeta cliente ── */
.cli-card{background:#fff;border-radius:14px;padding:13px 15px;margin-bottom:9px;cursor:pointer;border:2px solid transparent;box-shadow:0 1px 5px rgba(46,125,50,.08);display:flex;justify-content:space-between;align-items:center;transition:transform .1s,border-color .15s}
.cli-card:active{transform:scale(.98);border-color:var(--borde)}
.cli-nombre{font-weight:900;font-size:.93rem}
.cli-tel{font-size:.7rem;color:var(--gris);margin-top:2px}
.cli-deuda{font-size:1.08rem;font-weight:900;color:var(--rojo);text-align:right}

/* ── Badges ── */
.bdg{font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:8px;display:inline-block;margin-top:3px}
.bdg-r{background:var(--rl);color:var(--rojo)}
.bdg-o{background:var(--nl);color:var(--naranja)}
.bdg-g{background:#f5f5f5;color:#888}
.bdg-v{background:var(--vl);color:var(--vd)}

/* ── Header cliente ── */
.cli-hdr{background:#fff;border-radius:14px;padding:13px 15px;margin-bottom:10px;box-shadow:0 1px 5px rgba(46,125,50,.08);display:flex;justify-content:space-between;align-items:center;border:1px solid var(--borde)}
.cli-hdr-nom{font-weight:900;font-size:.97rem}
.cli-hdr-tel{font-size:.72rem;color:var(--gris);margin-top:2px}
.cli-hdr-total{font-size:1.2rem;font-weight:900;color:var(--rojo)}
.cli-hdr-lbl{font-size:.68rem;color:var(--gris);text-align:right}

/* ── Sección label ── */
.sec-lbl{font-size:.68rem;font-weight:900;color:var(--gris);text-transform:uppercase;letter-spacing:1.2px;padding:10px 4px 6px;display:flex;align-items:center;gap:5px}
.sec-lbl::before{content:'';display:block;width:3px;height:12px;background:var(--verde);border-radius:2px}

/* ── Tarjeta fiado ── */
.fc{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;border:2px solid #ffe082;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;position:relative;user-select:none;transition:transform .1s,border-color .15s}
.fc:active{transform:scale(.99)}
.fc.venc{border-color:#ef9a9a;background:#fff8f8}
.fc.pagado{border-color:var(--borde);background:#f9fbe7;cursor:default}
.fc.sel{border:3px solid var(--verde);background:var(--vl)}
.fc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.fc-fecha{font-size:.7rem;color:var(--gris)}
.fc-id{font-size:.65rem;color:#bbb;margin-top:1px}
.fc-monto{font-size:1.05rem;font-weight:900}
.fc-desc{font-size:.74rem;color:#555;padding-top:6px;border-top:1px solid rgba(0,0,0,.07);margin-top:6px;line-height:1.4}
.fc-pago{font-size:.7rem;color:var(--verde);margin-top:4px;font-weight:600}
.sel-dot{position:absolute;top:9px;right:9px;width:22px;height:22px;border-radius:50%;background:var(--verde);color:#fff;font-size:.72rem;font-weight:900;display:flex;align-items:center;justify-content:center}

/* ── Barra flotante ── */
.barra{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--vd);padding:10px 14px 18px;flex-direction:row;align-items:center;gap:8px;box-shadow:0 -3px 14px rgba(0,0,0,.2);z-index:200}
.barra-txt{flex:1;color:#fff;font-weight:700;font-size:.82rem;line-height:1.3}
.barra button{border:none;border-radius:10px;padding:9px 12px;font-weight:900;font-size:.8rem;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-rec{background:#4caf50;color:#fff}
.btn-cob{background:#fff;color:var(--vd)}

/* ── Vista detalle ticket ── */
.det-hdr{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 5px rgba(46,125,50,.1);border:1px solid var(--borde)}
.det-ticket{font-size:1.1rem;font-weight:900;color:var(--vd)}
.det-sub{font-size:.78rem;color:var(--gris);margin-top:5px;line-height:1.6}
.det-pagado{background:var(--vl);border-radius:10px;padding:9px 13px;margin-top:8px;font-size:.78rem;color:var(--vd);font-weight:700}

.item-row{background:#fff;border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.item-nom{font-size:.85rem;font-weight:600;flex:1;padding-right:8px;line-height:1.3}
.item-cant{font-size:.72rem;color:var(--gris);margin-right:8px;white-space:nowrap}
.item-precio{font-size:.88rem;font-weight:900;color:var(--vd);white-space:nowrap}

.total-row{background:var(--vd);color:#fff;border-radius:12px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.total-row .tl{font-size:.88rem;font-weight:700}
.total-row .tm{font-size:1.15rem;font-weight:900}

.btn-enviar-ticket{width:100%;background:#25D366;color:#fff;border:none;border-radius:12px;padding:14px;font-size:1rem;font-weight:900;cursor:pointer;font-family:inherit;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-enviar-ticket:active{opacity:.85}

/* ── Modales ── */
.modal-ov{display:none;position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,.7);align-items:flex-end;justify-content:center}
.modal-ov.open{display:flex}
.modal-sh{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:500px}
.modal-tit{font-size:.97rem;font-weight:900;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.modal-tit button{margin-left:auto;background:none;border:none;font-size:1.3rem;cursor:pointer;color:#aaa}
.modal-info{background:#f5f5f5;border-radius:10px;padding:12px;margin-bottom:14px;font-size:.83rem;line-height:1.7}
.metodos{display:flex;gap:8px;margin-bottom:14px}
.btn-met{flex:1;padding:10px 4px;border:2px solid #ddd;border-radius:10px;background:#fff;font-size:.78rem;font-weight:700;cursor:pointer;text-align:center;font-family:inherit;transition:border-color .15s}
.btn-met.activo{border-color:var(--verde);background:var(--vl)}

/* Campo monto (abono) */
.monto-wrap{margin-bottom:14px}
.monto-lbl{font-size:.78rem;font-weight:700;color:var(--gris);margin-bottom:6px}
.monto-row{display:flex;gap:8px;align-items:center}
.monto-input{flex:1;padding:11px 14px;border:2px solid #ddd;border-radius:10px;font-size:1rem;font-weight:700;font-family:inherit;outline:none;transition:border-color .15s}
.monto-input:focus{border-color:var(--verde)}
.btn-monto-full{padding:10px 14px;border:2px solid var(--verde);border-radius:10px;background:var(--vl);color:var(--vd);font-size:.75rem;font-weight:900;cursor:pointer;font-family:inherit;white-space:nowrap}
.monto-hint{font-size:.7rem;color:var(--naranja);margin-top:5px;font-weight:600;display:none}

.modal-acc{display:flex;gap:10px;margin-top:4px}
.btn-cancel{flex:1;padding:12px;border:2px solid #ddd;border-radius:12px;background:#fff;color:#555;font-size:.9rem;cursor:pointer;font-family:inherit}
.btn-confirm{flex:2;padding:12px;border:none;border-radius:12px;background:var(--verde);color:#fff;font-size:.9rem;font-weight:900;cursor:pointer;font-family:inherit}

/* Modal recordatorio */
.rec-pre{background:#f0f7f0;border-radius:12px;padding:12px;font-size:.73rem;color:var(--texto);max-height:210px;overflow-y:auto;white-space:pre-wrap;margin-bottom:14px;font-family:monospace;line-height:1.5;border:1px solid var(--borde)}
.btn-compartir{width:100%;background:var(--vd);color:#fff;font-weight:900;font-size:1rem;padding:14px;border-radius:14px;border:none;cursor:pointer;font-family:inherit;margin-bottom:10px}
.btn-copiar{width:100%;background:#f5f5f5;color:#333;font-weight:700;font-size:.9rem;padding:12px;border-radius:14px;border:none;cursor:pointer;font-family:inherit}
.copiado{display:none;text-align:center;color:var(--verde);font-size:.8rem;margin-top:8px;font-weight:700}

/* Toast */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 18px;border-radius:20px;font-size:.85rem;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.v{background:var(--verde)}
#toast.r{background:var(--rojo)}
</style>
</head>
<body>

<div class="hdr" id="hdr">
  <span style="font-size:1.4rem">🌸</span>
  <div style="flex:1"><div class="hdr-t">Copihue — Fiados</div><div class="hdr-s" id="hdrSub">cargando</div></div>
  <button class="btn-icon" onclick="cargar()">🔄</button>
</div>

<!-- Vista clientes -->
<div class="vista activa" id="vistaClientes">
  <div id="cuerpoClientes" class="ldg"><div class="spin"></div>Consultando planilla...</div>
</div>

<!-- Vista fiados de un cliente -->
<div class="vista" id="vistaFiados">
  <div id="clieHdr" class="cli-hdr"></div>
  <div id="cuerpoFiados"></div>
  <div class="barra" id="barra">
    <div class="barra-txt" id="barraTxt"></div>
    <button class="btn-rec" ontouchstart="void(0)" onclick="abrirRec()">📋 Recordatorio</button>
    <button class="btn-cob" ontouchstart="void(0)" onclick="abrirCobrar()">✅ Cobrar</button>
  </div>
</div>

<!-- Vista detalle ticket -->
<div class="vista" id="vistaDetalle">
  <div id="detContenido"></div>
</div>

<!-- Modal cobrar / abonar -->
<div class="modal-ov" id="modalCob" onclick="if(event.target===this)cerrarCob()">
  <div class="modal-sh">
    <div class="modal-tit" id="cobTit">✅ Registrar pago <button onclick="cerrarCob()">✕</button></div>
    <div class="modal-info" id="cobInfo"></div>
    <div style="font-size:.78rem;font-weight:700;color:var(--gris);margin-bottom:8px">Método de pago</div>
    <div class="metodos">
      <button class="btn-met activo" id="mEf" onclick="selMet('EFECTIVO')">💵<br>Efectivo</button>
      <button class="btn-met" id="mQR" onclick="selMet('QR')">📱<br>QR</button>
      <button class="btn-met" id="mTr" onclick="selMet('TRANSFERENCIA')">🏦<br>Transf.</button>
    </div>
    <div class="monto-wrap">
      <div class="monto-lbl">Monto a cobrar</div>
      <div class="monto-row">
        <input class="monto-input" id="montoInput" type="number" inputmode="numeric"
               oninput="onMontoInput()" placeholder="0">
        <button class="btn-monto-full" onclick="setMontoFull()">Total ↩</button>
      </div>
      <div class="monto-hint" id="montoHint">⚡ Se registrará como abono parcial</div>
    </div>
    <div class="modal-acc">
      <button class="btn-cancel" onclick="cerrarCob()">Cancelar</button>
      <button class="btn-confirm" id="btnConf" onclick="confirmarCob()">✅ Confirmar</button>
    </div>
  </div>
</div>

<!-- Modal recordatorio -->
<div class="modal-ov" id="modalRec" onclick="if(event.target===this)cerrarRec()">
  <div class="modal-sh">
    <div class="modal-tit">📋 Recordatorio <button onclick="cerrarRec()">✕</button></div>
    <div class="rec-pre" id="recPrev"></div>
    <button class="btn-compartir" onclick="compartir()">📤 Compartir</button>
    <button class="btn-copiar" onclick="copiar()">📋 Copiar texto</button>
    <div class="copiado" id="copMsg">✅ Copiado al portapapeles</div>
  </div>
</div>

<div id="toast"></div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbxhKFk2WAi-KRY5xGBsI6_6Pvp3jDjt8mSRXvy7I1WehNmBpJamqK9G9Q1ZJSCSgAdfDA/exec';

// ── Estado ─────────────────────────────────────────
let _todos=[], _cliNom='', _cliTel='', _cliData=[];
let _sel=new Set(), _met='EFECTIVO', _recTxt='', _montoFull=0;

// ── Helpers ────────────────────────────────────────
const fmt=n=>'$'+Math.round(n).toLocaleString('es-AR');
function safeEnc(s){try{return encodeURIComponent(s);}catch(e){return encodeURIComponent(String(s).replace(/[\uD800-\uDFFF]/g,'?'));}}
function sanitizeWA(s){return(s||'').replace(/◆/g,'-').replace(/·/g,'-').replace(/[^\x20-\x7E\u00C0-\u024F\u00A0\n]/g,' ').replace(/\s{2,}/g,' ').trim();}
function normTel(t){const d=String(t||'').replace(/\D/g,'');if(d.length===10)return'549'+d;if(d.length>=11)return d;return'';}

function _normFecha(s){
  if(!s)return'';const str=String(s).trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(str))return str.slice(0,10);
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(str)){const[d,m,y]=str.split('/');return`${y}-${m}-${d}`;}
  const ms={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
  const m1=str.match(/(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+(\d{4})/);
  if(m1)return`${m1[3]}-${String(ms[m1[2]]).padStart(2,'0')}-${m1[1].padStart(2,'0')}`;
  try{const d=new Date(str);if(!isNaN(d))return d.toISOString().slice(0,10);}catch(e){}
  return str;
}
function _fmt(s){const n=_normFecha(s);if(/^\d{4}-\d{2}-\d{2}/.test(n)){const[y,m,d]=n.slice(0,10).split('-');return`${d}/${m}/${y}`;}return s||'—';}

let _tt;
function toast(msg,tipo=''){const t=document.getElementById('toast');t.textContent=msg;t.className=tipo;t.style.opacity='1';clearTimeout(_tt);_tt=setTimeout(()=>t.style.opacity='0',3200);}

// ── API ────────────────────────────────────────────
async function _api(action,data){
  const url=API_URL+'?action='+action+(data?'&data='+encodeURIComponent(JSON.stringify(data)):'')+'&t='+Date.now();
  const r=await fetch(url,{redirect:'follow',signal:AbortSignal.timeout(25000)});
  if(!r.ok)throw new Error('Error servidor ('+r.status+')');
  const txt=await r.text();if(!txt.trim())throw new Error('Respuesta vacía');
  return JSON.parse(txt);
}

// ── CARGAR ──────────────────────────────────────────
async function cargar(){
  _sel.clear();_recTxt='';
  ir('clientes');
  document.getElementById('cuerpoClientes').innerHTML='<div class="ldg"><div class="spin"></div>Consultando planilla...</div>';
  setHdrSub('cargando');
  try{
    const d=await _api('listarFiados');
    if(!d.ok)throw new Error(d.error||'Error al cargar');
    _todos=(d.fiados||[]).map(f=>({...f,fecha:_normFecha(f.fecha),fechaPago:_normFecha(f.fechaPago),fechaVencimiento:_normFecha(f.fechaVencimiento)}));
    renderClientes();
  }catch(e){
    document.getElementById('cuerpoClientes').innerHTML=`<div class="empty"><div class="icon">❌</div>${e.message}</div>`;
    setHdrSub('error');
  }
}

// ── RENDER CLIENTES ────────────────────────────────
function renderClientes(){
  const pend=_todos.filter(f=>f.estado!=='PAGADO');
  const map={};
  pend.forEach(f=>{if(!map[f.cliente])map[f.cliente]={nom:f.cliente,tel:f.telefono||'',fiados:[],tot:0};map[f.cliente].fiados.push(f);map[f.cliente].tot+=parseFloat(f.total||0);});
  const clis=Object.values(map).sort((a,b)=>b.tot-a.tot);
  const totG=clis.reduce((s,c)=>s+c.tot,0);
  setHdrSub(clis.length+' cliente'+(clis.length!==1?'s':'')+' · '+fmt(totG)+' pendiente');

  if(!clis.length){document.getElementById('cuerpoClientes').innerHTML='<div class="empty"><div class="icon">✅</div>No hay fiados pendientes</div>';return;}

  const hoy=new Date();hoy.setHours(0,0,0,0);
  let html=`<div class="resumen"><div><div class="lbl">Total deuda general</div><div class="sub">${pend.length} fiado${pend.length!==1?'s':''} en ${clis.length} cliente${clis.length!==1?'s':''}</div></div><div class="monto">${fmt(totG)}</div></div>`;

  clis.forEach((c,idx)=>{
    const venc=c.fiados.filter(f=>f.estado==='VENCIDO').length;
    const prox=c.fiados.filter(f=>{if(!f.fechaVencimiento)return false;const d=new Date(f.fechaVencimiento+'T12:00:00');const dias=Math.round((d-hoy)/86400000);return dias>=0&&dias<=3;}).length;
    const bdg=venc>0?`<span class="bdg bdg-r">🔴 ${venc} vencido${venc>1?'s':''}</span>`:prox>0?`<span class="bdg bdg-o">⏰ Vence pronto</span>`:`<span class="bdg bdg-g">${c.fiados.length} fiado${c.fiados.length>1?'s':''}</span>`;
    // Guardamos índice numérico para evitar problemas con caracteres especiales en onclick inline
    html+=`<div class="cli-card" data-idx="${idx}"><div><div class="cli-nombre">${c.nom}</div><div class="cli-tel">${c.tel?'📞 '+c.tel:'Sin teléfono'}</div><div style="margin-top:3px">${bdg}</div></div><div class="cli-deuda">${fmt(c.tot)}</div></div>`;
  });
  document.getElementById('cuerpoClientes').innerHTML=html;
  // Event delegation — robusto con cualquier nombre
  document.querySelectorAll('.cli-card').forEach(el=>{
    el.addEventListener('click',()=>abrirCli(clis[parseInt(el.dataset.idx)].nom));
    el.addEventListener('touchend',e=>{e.preventDefault();abrirCli(clis[parseInt(el.dataset.idx)].nom);});
  });
}

// ── ABRIR CLIENTE ──────────────────────────────────
function abrirCli(nom){
  _sel.clear();_recTxt='';
  _cliNom=nom;
  _cliData=_todos.filter(f=>f.cliente===nom);
  _cliTel=_cliData[0]?.telefono||'';
  renderFiados();
  ir('fiados',nom);
}

function renderFiados(){
  const pend=_cliData.filter(f=>f.estado!=='PAGADO');
  const pagados=_cliData.filter(f=>f.estado==='PAGADO').sort((a,b)=>(b.fechaPago||'').localeCompare(a.fechaPago||''));
  const totPend=pend.reduce((s,f)=>s+parseFloat(f.total||0),0);
  const hoy=new Date();hoy.setHours(0,0,0,0);

  document.getElementById('clieHdr').innerHTML=`
    <div><div class="cli-hdr-nom">${_cliNom}</div><div class="cli-hdr-tel">${_cliTel?'📞 '+_cliTel:'Sin teléfono'}</div></div>
    <div><div class="cli-hdr-lbl">Deuda total</div><div class="cli-hdr-total">${fmt(totPend)}</div></div>`;

  function bdgEstado(f){
    if(f.estado==='PAGADO')return`<span class="bdg bdg-v">✅ PAGADO</span>`;
    if(f.estado==='VENCIDO')return`<span class="bdg bdg-r">🔴 VENCIDO</span>`;
    if(f.fechaVencimiento){const d=new Date(f.fechaVencimiento+'T12:00:00');const dias=Math.round((d-hoy)/86400000);
      if(dias<0)return`<span class="bdg bdg-r">🔴 Venció hace ${Math.abs(dias)}d</span>`;
      if(dias===0)return`<span class="bdg bdg-o">🟠 Vence HOY</span>`;
      if(dias<=3)return`<span class="bdg bdg-o">⚠️ Vence en ${dias}d</span>`;
      return`<span class="bdg bdg-g">⏰ Vence ${_fmt(f.fechaVencimiento)}</span>`;}
    return`<span class="bdg bdg-g">PENDIENTE</span>`;
  }

  function card(f){
    const esPend=f.estado!=='PAGADO';
    const selec=_sel.has(f.idFiado);
    let cls='fc';
    if(!esPend)cls+=' pagado';else if(f.estado==='VENCIDO')cls+=' venc';
    if(selec)cls+=' sel';
    const tkt=f.ticket&&f.ticket.trim()!=='';
    // Desc line: si tiene ticket → enlace a detalle, sino texto guardado
    const descLine=tkt
      ?`<div class="fc-desc" style="cursor:pointer" data-det="1" data-tkt="${f.ticket}" data-id="${f.idFiado}">🎫 Ticket #${f.ticket} <span style="color:var(--vd);font-weight:700">· Ver venta →</span></div>`
      :(f.descripcion?`<div class="fc-desc">📦 ${f.descripcion}</div>`:'');
    const pagoLine=!esPend?`<div class="fc-pago">✅ Cobrado el ${_fmt(f.fechaPago)}${f.metodoPago?' · '+f.metodoPago:''}</div>`:'';
    const dot=selec?`<div class="sel-dot">✓</div>`:'';
    return`<div class="${cls}" id="fc-${f.idFiado}" data-id="${f.idFiado}" data-tkt="${f.ticket||''}" data-espend="${esPend?'1':'0'}">${dot}
      <div class="fc-top">
        <div><div class="fc-fecha">📅 ${_fmt(f.fecha)}</div><div class="fc-id">${f.idFiado}</div></div>
        <div style="text-align:right"><div class="fc-monto" style="color:${esPend?'var(--rojo)':'var(--verde)'}">${fmt(f.total)}</div>${bdgEstado(f)}</div>
      </div>${descLine}${pagoLine}</div>`;
  }

  let html='';
  if(pend.length){html+=`<div class="sec-lbl">Pendientes (${pend.length})</div>`;pend.forEach(f=>html+=card(f));}
  if(pagados.length){html+=`<div class="sec-lbl">Cobrados últimos 30 días (${pagados.length})</div>`;pagados.forEach(f=>html+=card(f));}
  if(!html)html='<div class="empty"><div class="icon">✅</div>Sin fiados registrados</div>';
  document.getElementById('cuerpoFiados').innerHTML=html;
  // Event delegation — evita problemas con IDs especiales en onclick inline
  document.querySelectorAll('#cuerpoFiados .fc').forEach(el=>{
    el.addEventListener('click', e=>{
      // Si el click viene del enlace "Ver venta" interno no hacer nada aquí
      if(e.target.closest('[data-det]'))return;
      const esPend=el.dataset.espend==='1';
      const id=el.dataset.id;
      const tkt=el.dataset.tkt;
      if(esPend) toggleSel(id);
      else if(tkt) abrirDet(tkt,id);
    });
  });
  // Links "Ver venta →" dentro de cards pagados
  document.querySelectorAll('#cuerpoFiados [data-det]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      abrirDet(el.dataset.tkt, el.dataset.id);
    });
  });
  actualizarBarra();
}

function toggleSel(id){if(_sel.has(id))_sel.delete(id);else _sel.add(id);renderFiados();}

function actualizarBarra(){
  const b=document.getElementById('barra');
  if(_sel.size===0){b.style.display='none';return;}
  const tot=[..._sel].reduce((s,id)=>{const f=_cliData.find(x=>x.idFiado===id);return s+parseFloat(f?.total||0);},0);
  document.getElementById('barraTxt').innerHTML=`<b>${_sel.size} fiado${_sel.size>1?'s':''}</b><br>${fmt(tot)}`;
  b.style.display='flex';
}

// ── DETALLE TICKET ─────────────────────────────────
async function abrirDet(ticket,idFiado){
  ir('detalle','Ticket #'+ticket);
  document.getElementById('detContenido').innerHTML='<div class="ldg"><div class="spin"></div>Cargando detalle...</div>';
  try{
    const d=await _api('getDetalleTicket',{ticket});
    if(!d.ok)throw new Error(d.error||'No encontrado');
    const fiad=_cliData.find(f=>f.idFiado===idFiado);
    const pagoInfo=fiad&&fiad.estado==='PAGADO'
      ?`<div class="det-pagado">✅ Cobrado el ${_fmt(fiad.fechaPago)}${fiad.metodoPago?' · '+fiad.metodoPago:''}</div>`:'';

    let itemsHtml='';
    (d.items||[]).forEach(it=>{
      const cant=String(it.cantidad||'').replace(/\.0$/,'');
      itemsHtml+=`<div class="item-row"><div class="item-nom">${it.nombre}</div><div class="item-cant">${cant}</div><div class="item-precio">${fmt(it.subtotal)}</div></div>`;
    });

    // Armar mensaje WA igual que copihue-reportes
    const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    const fLabel=d.fecha; // ya viene dd/MM/yyyy del GAS
    const waTxt=safeEnc(
      '🛒 *Almacén Copihue* · #'+d.ticket+'\n'+
      '📅 '+fLabel+(d.hora?' · '+d.hora+'hs':'')+'\n\n'+
      (d.items||[]).map(p=>String(p.cantidad||'').replace(/\.0$/,'')+'× '+p.nombre.substring(0,22)+'  '+fmt(p.subtotal)).join('\n')+
      '\n─────────────────\n'+
      '*💰 Total: '+fmt(d.total)+'*\n'+
      (d.metodoPago?sanitizeWA(d.metodoPago)+'\n':'')+
      '👤 '+_cliNom+'\n\n'+
      '¡Gracias por tu compra! 🙏'
    );
    const telNum=normTel(_cliTel);
    const waHref=telNum
      ?'whatsapp://send?phone='+telNum+'&text='+waTxt
      :'whatsapp://send?text='+waTxt;

    document.getElementById('detContenido').innerHTML=`
      <div class="det-hdr">
        <div class="det-ticket">🎫 Ticket #${d.ticket}</div>
        <div class="det-sub">📅 ${d.fecha}${d.hora?' · 🕐 '+d.hora:''}<br>👤 ${_cliNom}${_cliTel?' · 📞 '+_cliTel:''}<br>${d.metodoPago?'💳 '+d.metodoPago:''}${d.vendedor?' · 🧑 '+d.vendedor:''}</div>
        ${pagoInfo}
      </div>
      ${itemsHtml}
      <div class="total-row"><span class="tl">💰 Total</span><span class="tm">${fmt(d.total)}</span></div>
      <button class="btn-enviar-ticket" onclick="window.location.href='${waHref}'">📲 Enviar copia al cliente</button>`;
  }catch(e){
    document.getElementById('detContenido').innerHTML=`<div class="empty"><div class="icon">❌</div>${e.message}</div>`;
  }
}

// ── COBRAR / ABONAR ────────────────────────────────
function abrirCobrar(){
  if(_sel.size===0)return;
  const selF=[..._sel].map(id=>_cliData.find(f=>f.idFiado===id)).filter(Boolean);
  _montoFull=selF.reduce((s,f)=>s+parseFloat(f.total||0),0);

  let info=`<b>${_cliNom}</b><br>`;
  selF.forEach(f=>{const ref=f.ticket&&f.ticket.trim()!==''?'Ticket #'+f.ticket:f.idFiado;info+=`🧾 ${ref} · ${fmt(f.total)}<br>`;});
  info+=`<br>💰 <b>Total: ${fmt(_montoFull)}</b>`;
  document.getElementById('cobInfo').innerHTML=info;
  document.getElementById('cobTit').innerHTML='✅ Registrar pago <button onclick="cerrarCob()">✕</button>';
  document.getElementById('montoInput').value=Math.round(_montoFull);
  document.getElementById('montoHint').style.display='none';
  document.getElementById('btnConf').textContent='✅ Confirmar';
  selMet('EFECTIVO');
  document.getElementById('modalCob').classList.add('open');
}

function cerrarCob(){document.getElementById('modalCob').classList.remove('open');}

function selMet(m){
  _met=m;
  document.getElementById('mEf').classList.toggle('activo',m==='EFECTIVO');
  document.getElementById('mQR').classList.toggle('activo',m==='QR');
  document.getElementById('mTr').classList.toggle('activo',m==='TRANSFERENCIA');
}

function setMontoFull(){
  document.getElementById('montoInput').value=Math.round(_montoFull);
  document.getElementById('montoHint').style.display='none';
}

function onMontoInput(){
  const v=parseFloat(document.getElementById('montoInput').value)||0;
  const esAbono=v>0&&v<_montoFull-0.5;
  document.getElementById('montoHint').style.display=esAbono?'block':'none';
}

async function confirmarCob(){
  const montoIngresado=parseFloat(document.getElementById('montoInput').value)||0;
  if(montoIngresado<=0){toast('⚠️ Ingresá un monto','r');return;}
  const esAbono=montoIngresado<_montoFull-0.5;
  const selArr=[..._sel];
  const btn=document.getElementById('btnConf');
  btn.disabled=true;btn.textContent='⏳ Guardando...';

  try{
    if(esAbono&&selArr.length===1){
      // Abono parcial — un solo fiado
      const r=await _api('abonarFiado',{idFiado:selArr[0],abono:montoIngresado,metodoPago:_met});
      if(!r.success)throw new Error(r.mensaje||'Error al abonar');
      toast('✅ Abono registrado','v');
      // Recordatorio de abono
      const f=_cliData.find(x=>x.idFiado===selArr[0]);
      const ref=f?.ticket&&f.ticket.trim()!==''?'Ticket #'+f.ticket:selArr[0];
      const resta=Math.max(0,(f?.total||0)-montoIngresado);
      _recTxt=['✅ *ABONO RECIBIDO — Almacén Copihue*','',
        `📅 ${new Date().toLocaleDateString('es-AR')}  🕐 ${new Date().toTimeString().slice(0,5)}`,
        `👤 Cliente: ${_cliNom}`,'',
        `🧾 Ref: ${ref}`,
        `💰 Abono: ${fmt(montoIngresado)}`,
        resta>0?`📋 Saldo restante: ${fmt(resta)}`:'✅ Deuda saldada',
        `💳 Método: ${_met}`,'','📍 Almacén Copihue'].join('\n');
    }else{
      // Cobro total de todos los seleccionados
      let err=0;
      for(const id of selArr){
        const r=await _api('cobrarFiado',{idFiado:id,metodoPago:_met});
        if(!r.success){err++;toast('❌ '+(r.mensaje||'Error'),'r');}
      }
      if(err>0)throw new Error('Algunos cobros fallaron');
      toast('✅ Cobro registrado','v');
      // Recordatorio de cobro
      const selF=selArr.map(id=>_cliData.find(f=>f.idFiado===id)).filter(Boolean);
      const lineas=selF.map(f=>{const ref=f.ticket&&f.ticket.trim()!==''?'Ticket #'+f.ticket:f.idFiado;return`  🧾 ${ref} · ${fmt(f.total)}`;}).join('\n');
      _recTxt=['✅ *PAGO RECIBIDO — Almacén Copihue*','',
        `📅 ${new Date().toLocaleDateString('es-AR')}  🕐 ${new Date().toTimeString().slice(0,5)}`,
        `👤 Cliente: ${_cliNom}`,'',lineas,'',
        `💰 *Total cobrado: ${fmt(_montoFull)}*`,
        `💳 Método: ${_met}`,'','✅ ¡Gracias por saldar tu deuda! 🙌','📍 Almacén Copihue'].join('\n');
    }
    cerrarCob();
    // Recargar fiados y abrir recordatorio
    const data=await _api('listarFiados');
    if(data.ok){
      _todos=(data.fiados||[]).map(f=>({...f,fecha:_normFecha(f.fecha),fechaPago:_normFecha(f.fechaPago),fechaVencimiento:_normFecha(f.fechaVencimiento)}));
      _cliData=_todos.filter(f=>f.cliente===_cliNom);
      _sel.clear();renderFiados();
    }
    abrirRec();
  }catch(e){
    toast('❌ '+e.message,'r');
  }finally{
    btn.disabled=false;btn.textContent='✅ Confirmar';
  }
}

// ── RECORDATORIO ───────────────────────────────────
function abrirRec(){
  if(!_recTxt&&_sel.size===0)return;
  if(!_recTxt){
    const selF=[..._sel].map(id=>_cliData.find(f=>f.idFiado===id)).filter(Boolean);
    const tot=selF.reduce((s,f)=>s+parseFloat(f.total||0),0);
    const lineas=selF.map(f=>{const ref=f.ticket&&f.ticket.trim()!==''?'Ticket #'+f.ticket:f.idFiado;return`  📋 ${ref} · ${fmt(f.total)} (vence ${_fmt(f.fechaVencimiento)||'—'})`;}).join('\n');
    _recTxt=['📋 *RECORDATORIO DE DEUDA — Almacén Copihue*','',
      `👤 Cliente: ${_cliNom}`,'',lineas,'',
      `💰 *Total pendiente: ${fmt(tot)}*`,'',
      'Por favor acercate a regularizar tu cuenta.','📍 Almacén Copihue'].join('\n');
  }
  document.getElementById('recPrev').textContent=_recTxt;
  document.getElementById('copMsg').style.display='none';
  document.getElementById('modalRec').classList.add('open');
}
function cerrarRec(){document.getElementById('modalRec').classList.remove('open');_recTxt='';}
function compartir(){if(!_recTxt)return;if(navigator.share)navigator.share({text:_recTxt}).catch(()=>{});else{copiar();toast('📋 Texto copiado','v');}}
function copiar(){
  if(!_recTxt)return;
  const msg=document.getElementById('copMsg');
  if(navigator.clipboard?.writeText)navigator.clipboard.writeText(_recTxt).then(()=>{msg.style.display='block';setTimeout(()=>msg.style.display='none',2500);});
  else{const ta=document.createElement('textarea');ta.value=_recTxt;ta.style.cssText='position:fixed;top:-9999px';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');msg.style.display='block';setTimeout(()=>msg.style.display='none',2500);}catch(e){}document.body.removeChild(ta);}
}

// ── NAVEGACIÓN ─────────────────────────────────────
function ir(vista,titulo){
  ['vistaClientes','vistaFiados','vistaDetalle'].forEach(id=>{
    document.getElementById(id).classList.toggle('activa',id==='vista'+vista.charAt(0).toUpperCase()+vista.slice(1));
  });
  const hdr=document.getElementById('hdr');
  if(vista==='clientes'){
    hdr.innerHTML=`<span style="font-size:1.4rem">🌸</span><div style="flex:1"><div class="hdr-t">Copihue — Fiados</div><div class="hdr-s" id="hdrSub">—</div></div><button class="btn-icon" onclick="cargar()">🔄</button>`;
  }else if(vista==='fiados'){
    hdr.innerHTML=`<button class="btn-back" onclick="volverClis()">← Volver</button><div style="flex:1;margin-left:8px"><div class="hdr-t">${titulo||''}</div><div class="hdr-s" id="hdrSub">fiados</div></div><button class="btn-icon" onclick="recargarCli()">🔄</button>`;
    const pend=_cliData.filter(f=>f.estado!=='PAGADO').length;
    setTimeout(()=>{const s=document.getElementById('hdrSub');if(s)s.textContent=pend+' pendiente'+(pend!==1?'s':'');},0);
  }else if(vista==='detalle'){
    hdr.innerHTML=`<button class="btn-back" onclick="volverFiados()">← Volver</button><div style="flex:1;margin-left:8px"><div class="hdr-t">${titulo||'Detalle'}</div></div>`;
  }
}
function setHdrSub(txt){const s=document.getElementById('hdrSub');if(s)s.textContent=txt;}
function volverClis(){_sel.clear();renderClientes();ir('clientes');}
function volverFiados(){ir('fiados',_cliNom);}
async function recargarCli(){
  try{
    const d=await _api('listarFiados');
    if(!d.ok)throw new Error(d.error);
    _todos=(d.fiados||[]).map(f=>({...f,fecha:_normFecha(f.fecha),fechaPago:_normFecha(f.fechaPago),fechaVencimiento:_normFecha(f.fechaVencimiento)}));
    _cliData=_todos.filter(f=>f.cliente===_cliNom);
    _sel.clear();renderFiados();toast('✅ Actualizado','v');
  }catch(e){toast('❌ '+e.message,'r');}
}

cargar();
</script>
