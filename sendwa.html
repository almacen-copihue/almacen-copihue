<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Collage Studio - Copihue</title>
  <!-- Fabric.js y FontAwesome para iconos -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f0;
      color: #1a2e17;
      padding-bottom: 70px;
    }
    body.dark {
      background: #0f1a0c;
      color: #e8f5e3;
    }
    /* Header similar al anterior */
    .header {
      background: #2d5a22;
      color: white;
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 {
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stats {
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
    }
    .mode-select, .dark-toggle {
      background: white;
      border: none;
      border-radius: 30px;
      padding: 5px 12px;
      font-weight: bold;
      cursor: pointer;
    }
    .dark-toggle {
      background: transparent;
      color: white;
      font-size: 1.2rem;
    }
    /* Toolbar productos */
    .toolbar {
      display: flex;
      gap: 10px;
      padding: 10px;
      overflow-x: auto;
      background: #ffffffcc;
      backdrop-filter: blur(8px);
      position: sticky;
      top: 58px;
      z-index: 99;
    }
    body.dark .toolbar {
      background: #1c2b18cc;
    }
    .filter-btn, .action-icon {
      background: white;
      border: 1px solid #bdd4b5;
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    body.dark .filter-btn, body.dark .action-icon {
      background: #2a4025;
      border-color: #4a6b42;
      color: white;
    }
    .filter-btn.active {
      background: #2d5a22;
      color: white;
      border-color: #2d5a22;
    }
    .search-box {
      display: flex;
      gap: 6px;
      background: white;
      border-radius: 40px;
      padding: 2px 8px;
      align-items: center;
    }
    .search-box input {
      border: none;
      padding: 6px;
      border-radius: 40px;
      outline: none;
      width: 140px;
    }
    /* Grid productos */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px;
      padding: 12px;
    }
    .card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      cursor: pointer;
      border: 1px solid #e0ecd9;
      transition: 0.1s;
      position: relative;
    }
    body.dark .card {
      background: #1c2b18;
      border-color: #2d4528;
    }
    .card.selected {
      border: 2px solid #27ae60;
      background: #eafaf1;
    }
    .card-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #e2ecd9;
    }
    .badge-offer {
      position: absolute;
      top: 4px;
      left: 4px;
      background: #e74c3c;
      color: white;
      font-size: 8px;
      padding: 2px 6px;
      border-radius: 20px;
    }
    .order-badge {
      position: absolute;
      top: 4px;
      right: 4px;
      background: #2d5a22;
      color: white;
      width: 22px;
      height: 22px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
    }
    .card-info {
      padding: 6px;
    }
    .card-name {
      font-size: 0.7rem;
      font-weight: 600;
    }
    .price-row {
      font-size: 0.7rem;
      font-weight: bold;
      margin-top: 4px;
    }
    .old-price {
      text-decoration: line-through;
      color: #888;
      font-size: 0.65rem;
    }
    .offer-price {
      color: #c0392b;
    }
    /* Botones fijos abajo */
    .bottom-actions {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 8px;
      border-top: 1px solid #ccc;
      z-index: 200;
    }
    body.dark .bottom-actions {
      background: rgba(20,25,15,0.95);
      border-top-color: #2d4528;
    }
    .action-btn {
      background: #2d5a22;
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 0.75rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }
    .action-btn.whatsapp { background: #25D366; }
    .action-btn.collage { background: #8e44ad; }
    /* Modal del editor de collage */
    .modal-full {
      display: none;
      position: fixed;
      inset: 0;
      background: #1e1e1e;
      z-index: 1000;
      flex-direction: column;
    }
    .modal-full.open {
      display: flex;
    }
    .editor-header {
      background: #2c2c2c;
      color: white;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .editor-tools {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      background: #3a3a3a;
      padding: 8px;
      overflow-x: auto;
    }
    .editor-tools button, .editor-tools label {
      background: #555;
      border: none;
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .editor-main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .canvas-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #2a2a2a;
      overflow: auto;
      padding: 10px;
    }
    #collageCanvas {
      background: white;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      max-width: 100%;
      max-height: 100%;
      border-radius: 4px;
    }
    .layers-panel {
      width: 220px;
      background: #2c2c2c;
      color: white;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 8px;
      overflow-y: auto;
    }
    .layer-item {
      background: #444;
      padding: 6px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .layer-item.selected {
      background: #5a7c4e;
    }
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      z-index: 1100;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="header">
  <h1>🎨 Collage Studio <small>Copihue</small></h1>
  <div class="stats">
    <span id="selectedCount">✓ 0</span> | <span id="selectedMB">0 MB</span>
  </div>
  <select id="modeSelect" class="mode-select">
    <option value="estado">📸 Estado WA</option>
    <option value="grupo">👥 Grupo WA</option>
    <option value="rapido">⚡ Lista rápida</option>
  </select>
  <button id="darkToggle" class="dark-toggle">🌙</button>
</div>

<div class="toolbar">
  <div id="filterChips" style="display: flex; gap: 6px; overflow-x: auto;"></div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 Buscar producto">
  </div>
</div>

<div id="grid" class="grid"></div>

<div class="bottom-actions">
  <button id="whatsappBtn" class="action-btn whatsapp">💬 WA</button>
  <button id="copyBtn" class="action-btn">📋 Copiar</button>
  <button id="downloadBtn" class="action-btn">⬇️ Img</button>
  <button id="collageBtn" class="action-btn collage">🖌️ Collage Editor</button>
  <button id="clearBtn" class="action-btn">🗑️</button>
</div>

<!-- MODAL EDITOR DE COLLAGE PROFESIONAL -->
<div id="collageModal" class="modal-full">
  <div class="editor-header">
    <strong>🖌️ Editor de Collage Avanzado</strong>
    <div>
      <button id="closeEditor" style="background:#a00;">✖ Cerrar</button>
    </div>
  </div>
  <div class="editor-tools">
    <button id="addImageFromProducts"><i class="fas fa-images"></i> Productos</button>
    <label for="uploadImage" style="background:#555;"><i class="fas fa-upload"></i> Subir imagen</label>
    <input type="file" id="uploadImage" accept="image/*" style="display:none">
    <button id="addTextBtn"><i class="fas fa-font"></i> Texto</button>
    <button id="addStickerBtn"><i class="fas fa-smile"></i> Sticker</button>
    <button id="setBgColor"><i class="fas fa-fill-drip"></i> Fondo color</button>
    <button id="setBgGradient"><i class="fas fa-chalkboard"></i> Gradiente</button>
    <button id="clearCanvas"><i class="fas fa-trash-alt"></i> Limpiar lienzo</button>
    <button id="undoBtn"><i class="fas fa-undo-alt"></i> Deshacer</button>
    <button id="redoBtn"><i class="fas fa-redo-alt"></i> Rehacer</button>
    <button id="exportCanvas"><i class="fas fa-download"></i> Exportar PNG</button>
  </div>
  <div class="editor-main">
    <div class="canvas-container">
      <canvas id="collageCanvas" width="800" height="600" style="width:100%; height:auto; background:white;"></canvas>
    </div>
    <div class="layers-panel">
      <div><strong>Capas</strong></div>
      <div id="layersList" style="display: flex; flex-direction: column; gap: 5px;"></div>
      <button id="deleteLayer" style="background:#a00; margin-top:10px;">🗑️ Eliminar capa</button>
      <button id="duplicateLayer" style="background:#27ae60;">📋 Duplicar</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<script>
  // ==================== CONFIG GLOBAL ====================
  const API_URL = 'https://script.google.com/macros/s/AKfycbzWZzDvdGfW8vd2-FpQolT852cdPMeHbfKugn9DBOlju75bE1D0SUNB5EKEDOsI2vP4lA/exec';
  const IMG_SIZE_MB = 0.15;
  let allProducts = [];
  let filteredProducts = [];
  let selectedIds = new Set();
  let selectionOrder = [];
  let currentFilter = 'todos';
  let currentSearch = '';
  let currentMode = 'estado';
  // Pools de ofertas
  let poolRelampago = new Set(), poolDestacadas = new Set(), poolEspeciales = new Set(), poolUltimas = new Set(), poolUltimasData = new Map();
  const ofertasActivas = { relampago:true, destacadas:true, especiales:true, ultimas:true };
  // Fabric.js canvas
  let fabricCanvas = null;
  let historyStack = [], historyIndex = -1;

  // ==================== HELPER ====================
  function fmt(n) { return n ? '$' + Number(n).toLocaleString('es-AR') : ''; }
  function norm(s) { return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }
  function slugify(name) { return name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'-'); }
  function getImageUrl(p) { return p.foto?.startsWith('http') ? p.foto : `imagenes-productos/${slugify(p.nombre)}.jpg`; }
  function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

  // OFERTAS (misma lógica)
  const OFERTAS_RELAMPAGO = { '1':{nombre:'2x1',tipo:'nxm'}, '2':{nombre:'3x2',tipo:'nxm'}, '3':{nombre:'4x3'}, '4':{nombre:'5x4'}, '5':{nombre:'6x5'}, '6':{nombre:'7x6'}, '10':{nombre:'2da50'}, '11':{nombre:'10off',tipo:'pct',descuento:10}, '12':{nombre:'15off',tipo:'pct',descuento:15}, '13':{nombre:'20off',tipo:'pct',descuento:20}, '14':{nombre:'25off',tipo:'pct',descuento:25}, '15':{nombre:'30off',tipo:'pct',descuento:30} };
  function calcularOferta(p) {
    const precio = p.precioVenta, cat = p.catOferta;
    if (!cat) return null;
    if (cat==='relampago' && p.relampago) {
      const cfg = OFERTAS_RELAMPAGO[String(p.relampago)];
      if(cfg?.tipo==='pct') return { precio: Math.round(precio*(1-cfg.descuento/100)), etiqueta:`⚡ -${cfg.descuento}% OFF` };
      if(cfg?.tipo==='nxm') return { precio:null, etiqueta:`⚡ ${cfg.nombre.toUpperCase()}` };
      return { precio:null, etiqueta:'⚡ RELÁMPAGO' };
    }
    if(cat==='ultimas') {
      const ult = poolUltimasData.get(Number(p.id));
      if(ult?.precioOferta) return { precio:ult.precioOferta, etiqueta:`🏷️ -${ult.pct||10}% ÚLTIMAS` };
      return { precio:Math.round(precio*0.9), etiqueta:'🏷️ -10% ÚLTIMAS' };
    }
    if(cat==='destacado' && p.destacada) return { precio:Math.round(precio*(1-p.destacada/100)), etiqueta:`🔥 -${p.destacada}% OFF` };
    if(cat==='especial' && p.especial) return { precio:Math.round(precio*0.9), etiqueta:'💜 -10% OFF' };
    if((cat==='promo'||cat==='combo') && p.normal>0 && p.normal<precio) return { precio:p.normal, etiqueta:`${cat==='combo'?'🎯':'🏷️'} ${cat.toUpperCase()} -${Math.round((1-p.normal/precio)*100)}% OFF` };
    return null;
  }
  function resolveOfertas(products, modo='pool') {
    return products.map(p=>{
      const pid=Number(p.id), rawCat=String(p._raw?.categoriaOferta||'').toUpperCase();
      let cat='';
      if(rawCat==='PROMO ACTIVA') cat='promo';
      else if(rawCat==='COMBO ACTIVO') cat='combo';
      else {
        const inR = p.relampago && poolRelampago.has(pid);
        const inU = poolUltimas.has(pid);
        const inD = p.destacada>0 && poolDestacadas.has(pid);
        const inE = p.especial>0 && poolEspeciales.has(pid);
        if(modo==='activo') {
          if(inR && ofertasActivas.relampago) cat='relampago';
          else if(inU && ofertasActivas.ultimas) cat='ultimas';
          else if(inD && ofertasActivas.destacadas) cat='destacado';
          else if(inE && ofertasActivas.especiales) cat='especial';
        } else {
          if(inR) cat='relampago';
          else if(inU) cat='ultimas';
          else if(inD) cat='destacado';
          else if(inE) cat='especial';
        }
      }
      return {...p, catOferta:cat};
    });
  }

  // ==================== API ====================
  async function fetchData() { const r=await fetch(API_URL+'?t='+Date.now()); return r.json(); }
  async function fetchOfertas() { const r=await fetch(API_URL+'?action=getOfertas&t='+Date.now()); return r.json(); }
  function parseProducts(raw) {
    let rows=Array.isArray(raw)?raw:Object.values(raw).find(v=>Array.isArray(v));
    if(!rows) return [];
    return rows.filter(r=>r&&typeof r==='object').map((r,i)=>({
      id: Number(r.id)||(r.name+'_'+i), nombre: String(r.name||r.nombre||'').trim(),
      precioVenta: parseFloat(r.price||r.precio||0), categoria: String(r.category||r.categoria||'').trim(),
      stock: parseFloat(r.stock??1), foto: String(r.image||r.imagen||r.foto||'').trim(),
      vendidos: parseFloat(r.rotacion||r.vendidos||0), relampago: (r.relampago && !isNaN(parseInt(r.relampago)))?parseInt(r.relampago):(r.relampago||0),
      destacada: parseInt(r.destacada||0), especial: parseInt(r.especial||0), normal: parseFloat(r.normal||r.precioNormal||r['$promos/combos']||0), _raw:r
    })).filter(p=>p.nombre && p.precioVenta>0);
  }

  // ==================== RENDER PRODUCTOS ====================
  const PRIORITY_ORDER = { relampago:1, ultimas:2, destacado:3, especial:4, promo:5, combo:6 };
  const BADGE_COLORS = { relampago:'#e74c3c', ultimas:'#e67e22', destacado:'#f39c12', especial:'#8e44ad', promo:'#7b1fa2', combo:'#ff5722' };
  function renderGrid() {
    const modoRes = currentFilter==='activo'?'activo':'pool';
    let products = resolveOfertas(allProducts, modoRes);
    let filtered = products.filter(p=>{
      if(currentFilter!=='todos' && currentFilter!=='oferta' && currentFilter!=='activo' && currentFilter!=='sinoferta') {
        if(currentFilter==='relampago') return p.catOferta==='relampago';
        if(currentFilter==='destacado') return p.catOferta==='destacado';
        if(currentFilter==='especial') return p.catOferta==='especial';
        if(currentFilter==='ultimas') return p.catOferta==='ultimas';
        if(currentFilter==='promo') return p.catOferta==='promo';
        if(currentFilter==='combo') return p.catOferta==='combo';
        if(currentFilter==='sinoferta') return !p.catOferta;
        if(currentFilter==='oferta'||currentFilter==='activo') return !!p.catOferta;
        return norm(p.categoria)===norm(currentFilter);
      }
      if(currentFilter==='oferta'||currentFilter==='activo') return !!p.catOferta;
      if(currentFilter==='sinoferta') return !p.catOferta;
      return p.stock>0;
    });
    if(currentSearch) { const q=norm(currentSearch); filtered=filtered.filter(p=>norm(p.nombre).includes(q)||norm(p.categoria).includes(q)); }
    filteredProducts = filtered.sort((a,b)=>(PRIORITY_ORDER[a.catOferta]||7)-(PRIORITY_ORDER[b.catOferta]||7));
    const grid=document.getElementById('grid');
    if(!filteredProducts.length) { grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;">✨ Sin productos</div>'; updateStats(); return; }
    grid.innerHTML = filteredProducts.map(p=>{
      const sel=selectedIds.has(String(p.id)), order=selectionOrder.indexOf(String(p.id))+1, oferta=calcularOferta(p);
      const badgeColor=BADGE_COLORS[p.catOferta]||'#2d5a22';
      return `<div class="card ${sel?'selected':''}" data-id="${p.id}" onclick="toggleSelect('${p.id}')">
        <img class="card-img" src="${getImageUrl(p)}" loading="lazy" onerror="this.style.display='none'">
        ${oferta?`<div class="badge-offer" style="background:${badgeColor}">${oferta.etiqueta}</div>`:''}
        ${sel?`<div class="order-badge">${order}</div>`:''}
        <div class="card-info"><div class="card-name">${escapeHtml(p.nombre)}</div><div class="price-row">${oferta?`<span class="old-price">${fmt(p.precioVenta)}</span> <span class="offer-price">${oferta.precio?fmt(oferta.precio):''}</span>`:`<span>${fmt(p.precioVenta)}</span>`}</div></div>
      </div>`;
    }).join('');
    updateStats();
  }
  function escapeHtml(str){ return str.replace(/[&<>]/g,function(m){return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;';}); }
  window.toggleSelect = function(id){
    id=String(id);
    if(selectedIds.has(id)){ selectedIds.delete(id); selectionOrder=selectionOrder.filter(x=>x!==id); }
    else{ selectedIds.add(id); selectionOrder.push(id); }
    renderGrid();
  };
  function updateStats(){ document.getElementById('selectedCount').innerHTML=`✓ ${selectedIds.size}`; document.getElementById('selectedMB').innerHTML=`${(selectedIds.size*IMG_SIZE_MB).toFixed(1)} MB`; }
  function getSelectedProducts(){ return selectionOrder.map(id=>allProducts.find(p=>String(p.id)===id)).filter(Boolean); }
  function generateText(mode){
    let prods=resolveOfertas(getSelectedProducts(),'pool');
    if(!prods.length) return '❌ Ninguno';
    const header = `🛒 *ALMACÉN COPIHUE*\n${prods.filter(p=>p.catOferta).length?'🔥 OFERTAS 🔥':''}\n`;
    let lines=[];
    for(let p of prods){
      const of=calcularOferta(p);
      const precio=of?.precio?fmt(of.precio):fmt(p.precioVenta);
      lines.push(`• ${p.nombre} — *${precio}*`);
    }
    return header+lines.join('\n')+'\n📦 Pedidos por WhatsApp';
  }
  async function shareWhatsApp(){ if(!selectedIds.size){toast('Selecciona');return;} window.open(`https://wa.me/?text=${encodeURIComponent(generateText(currentMode))}`,'_blank'); }
  async function copyText(){ if(!selectedIds.size){toast('Selecciona');return;} await navigator.clipboard.writeText(generateText(currentMode)); toast('Copiado'); }
  async function downloadSingleBadge(p){
    const canvas=document.createElement('canvas'); canvas.width=1080; canvas.height=1080; const ctx=canvas.getContext('2d');
    const oferta=calcularOferta(p), badgeColor=BADGE_COLORS[p.catOferta]||'#2d5a22';
    ctx.fillStyle='#1a3a16'; ctx.fillRect(0,0,1080,1080);
    try{ const img=await loadImage(getImageUrl(p)); const s=Math.max(1080/img.width,1080/img.height); ctx.drawImage(img,(1080-img.width*s)/2,(1080-img.height*s)/2,img.width*s,img.height*s); }catch(e){}
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,700,1080,380);
    if(oferta){ ctx.fillStyle=badgeColor; ctx.fillRect(0,0,1080,70); ctx.fillStyle='white'; ctx.font='bold 36px system-ui'; ctx.fillText(oferta.etiqueta,30,50); }
    ctx.fillStyle='white'; ctx.font='bold 48px system-ui'; wrapTextCanvas(ctx,p.nombre,540,800,900,56,2);
    if(oferta?.precio){ ctx.font='28px system-ui'; ctx.fillStyle='#ddd'; ctx.fillText(fmt(p.precioVenta),540,930); ctx.strokeStyle='#ddd'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(540-ctx.measureText(fmt(p.precioVenta)).width/2,915); ctx.lineTo(540+ctx.measureText(fmt(p.precioVenta)).width/2,915); ctx.stroke(); ctx.fillStyle='#f1c40f'; ctx.font='bold 64px system-ui'; ctx.fillText(fmt(oferta.precio),540,1010); }
    else{ ctx.fillStyle='#f1c40f'; ctx.font='bold 64px system-ui'; ctx.fillText(fmt(p.precioVenta),540,1000); }
    const a=document.createElement('a'); a.download=`${slugify(p.nombre)}_offer.jpg`; a.href=canvas.toDataURL('image/jpeg',0.9); a.click();
  }
  async function downloadImages(){ const prods=getSelectedProducts(); if(!prods.length){toast('Sin productos');return;} toast(`⬇️ ${Math.min(prods.length,10)} imágenes`); for(let p of prods.slice(0,10)){ await downloadSingleBadge(p); await new Promise(r=>setTimeout(r,400)); } }
  function loadImage(src){ return new Promise((res,rej)=>{ const img=new Image(); img.crossOrigin='Anonymous'; img.onload=()=>res(img); img.onerror=rej; img.src=src; }); }
  function wrapTextCanvas(ctx,text,x,y,maxW,lineH,maxLines){ let words=text.split(' '), line='', lines=[]; for(let w of words){ let test=line?line+' '+w:w; if(ctx.measureText(test).width>maxW && line){ lines.push(line); line=w; }else line=test; } if(line) lines.push(line); lines=lines.slice(0,maxLines); lines.forEach((l,i)=>ctx.fillText(l,x,y+i*lineH)); }

  // ==================== EDITOR DE COLLAGE CON FABRIC.JS ====================
  function initFabricCanvas(){
    fabricCanvas = new fabric.Canvas('collageCanvas');
    fabricCanvas.setWidth(800); fabricCanvas.setHeight(600);
    fabricCanvas.backgroundColor = '#ffffff';
    fabricCanvas.renderAll();
    saveHistory();
    // Eventos para capas
    fabricCanvas.on('object:added', saveHistory);
    fabricCanvas.on('object:removed', saveHistory);
    fabricCanvas.on('object:modified', saveHistory);
    refreshLayersList();
  }
  function saveHistory(){ if(!fabricCanvas) return; const json = JSON.stringify(fabricCanvas.toJSON()); historyStack = historyStack.slice(0, historyIndex+1); historyStack.push(json); historyIndex++; if(historyStack.length>50) historyStack.shift(); }
  function undo(){ if(historyIndex>0){ historyIndex--; fabricCanvas.loadFromJSON(historyStack[historyIndex], ()=>fabricCanvas.renderAll()); refreshLayersList(); } }
  function redo(){ if(historyIndex<historyStack.length-1){ historyIndex++; fabricCanvas.loadFromJSON(historyStack[historyIndex], ()=>fabricCanvas.renderAll()); refreshLayersList(); } }
  function refreshLayersList(){
    const container=document.getElementById('layersList'); if(!container) return;
    const objects = fabricCanvas.getObjects();
    container.innerHTML = '';
    objects.slice().reverse().forEach((obj, idx)=>{
      const name = obj.text || (obj._element ? 'Imagen' : (obj.path ? 'Forma' : 'Objeto')) + ' '+(objects.length-idx);
      const div = document.createElement('div'); div.className='layer-item'; div.innerHTML=`<span>${name}</span><i class="fas fa-eye" style="cursor:pointer;" onclick="toggleLayerVisibility(${objects.length-1-idx})"></i>`;
      div.onclick = (e)=>{ if(e.target.tagName!=='I'){ fabricCanvas.setActiveObject(obj); fabricCanvas.renderAll(); refreshLayersList(); } };
      container.appendChild(div);
    });
  }
  function toggleLayerVisibility(index){ const obj=fabricCanvas.getObjects()[index]; if(obj){ obj.visible=!obj.visible; fabricCanvas.renderAll(); refreshLayersList(); } }
  function deleteLayer(){ const active=fabricCanvas.getActiveObject(); if(active){ fabricCanvas.remove(active); fabricCanvas.discardActiveObject(); fabricCanvas.renderAll(); saveHistory(); refreshLayersList(); } else toast('Selecciona un objeto'); }
  function duplicateLayer(){ const active=fabricCanvas.getActiveObject(); if(active){ active.clone((cloned)=>{ cloned.set({ left: cloned.left+20, top: cloned.top+20 }); fabricCanvas.add(cloned); fabricCanvas.setActiveObject(cloned); fabricCanvas.renderAll(); saveHistory(); refreshLayersList(); }); } else toast('Selecciona un objeto'); }
  async function addImageFromUrl(url){ try{ const img=await loadImage(url); const fImg=new fabric.Image(img); fImg.scaleToWidth(200); fabricCanvas.add(fImg); fabricCanvas.setActiveObject(fImg); fabricCanvas.renderAll(); saveHistory(); refreshLayersList(); }catch(e){ toast('Error cargando imagen'); } }
  function addText(){ const text=new fabric.IText('Editar texto',{ left:100, top:100, fontFamily:'Arial', fontSize:30, fill:'#000000' }); fabricCanvas.add(text); fabricCanvas.setActiveObject(text); fabricCanvas.renderAll(); saveHistory(); refreshLayersList(); }
  function addSticker(){ const emojis=['⭐','❤️','😀','🔥','🎉','👍']; const sticker=new fabric.Text(emojis[Math.floor(Math.random()*emojis.length)],{ left:150, top:150, fontSize:60, fontFamily:'Segoe UI Emoji' }); fabricCanvas.add(sticker); fabricCanvas.setActiveObject(sticker); fabricCanvas.renderAll(); saveHistory(); refreshLayersList(); }
  function setBackgroundColor(){ const color=prompt('Color de fondo (hex, rgb, nombre)','#f0f0f0'); if(color){ fabricCanvas.backgroundColor=color; fabricCanvas.renderAll(); saveHistory(); } }
  function setBackgroundGradient(){ fabricCanvas.backgroundColor=new fabric.Gradient({ type:'linear', coords:{ x1:0,y1:0,x2:0,y2:fabricCanvas.height }, colorStops:[{offset:0,color:'#ffb347'},{offset:1,color:'#ffcc33'}] }); fabricCanvas.renderAll(); saveHistory(); }
  function clearCanvas(){ fabricCanvas.clear(); fabricCanvas.backgroundColor='#ffffff'; fabricCanvas.renderAll(); saveHistory(); refreshLayersList(); }
  function exportCanvas(){ const dataURL=fabricCanvas.toDataURL({format:'png', multiplier:2}); const a=document.createElement('a'); a.download='collage.png'; a.href=dataURL; a.click(); toast('Exportado'); }

  // Abrir editor con productos seleccionados
  async function openCollageEditor(){
    const prods = getSelectedProducts();
    if(!prods.length){ toast('Selecciona al menos un producto'); return; }
    document.getElementById('collageModal').classList.add('open');
    if(!fabricCanvas) initFabricCanvas();
    // Añadir las imágenes de los productos seleccionados al lienzo
    for(let p of prods.slice(0,8)){
      try{
        const img=await loadImage(getImageUrl(p));
        const fImg=new fabric.Image(img);
        fImg.scaleToWidth(200);
        fImg.set({ left: Math.random()*(fabricCanvas.width-200), top: Math.random()*(fabricCanvas.height-200) });
        fabricCanvas.add(fImg);
      }catch(e){}
    }
    fabricCanvas.renderAll();
    saveHistory();
    refreshLayersList();
  }

  // Eventos del editor
  document.getElementById('closeEditor').onclick = ()=> document.getElementById('collageModal').classList.remove('open');
  document.getElementById('addImageFromProducts').onclick = async ()=>{
    const prods=getSelectedProducts();
    if(!prods.length){ toast('Selecciona productos primero'); return; }
    for(let p of prods.slice(0,5)){
      try{ const img=await loadImage(getImageUrl(p)); const fImg=new fabric.Image(img); fImg.scaleToWidth(150); fabricCanvas.add(fImg); fabricCanvas.renderAll(); }catch(e){}
    }
    saveHistory(); refreshLayersList();
  };
  document.getElementById('uploadImage').onchange = (e)=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      fabric.Image.fromURL(ev.target.result, (img)=>{ img.scaleToWidth(200); fabricCanvas.add(img); fabricCanvas.renderAll(); saveHistory(); refreshLayersList(); });
    };
    reader.readAsDataURL(file);
  };
  document.getElementById('addTextBtn').onclick = addText;
  document.getElementById('addStickerBtn').onclick = addSticker;
  document.getElementById('setBgColor').onclick = setBackgroundColor;
  document.getElementById('setBgGradient').onclick = setBackgroundGradient;
  document.getElementById('clearCanvas').onclick = clearCanvas;
  document.getElementById('undoBtn').onclick = undo;
  document.getElementById('redoBtn').onclick = redo;
  document.getElementById('exportCanvas').onclick = exportCanvas;
  document.getElementById('deleteLayer').onclick = deleteLayer;
  document.getElementById('duplicateLayer').onclick = duplicateLayer;

  // ==================== FILTROS UI ====================
  function buildFilterChips(){
    const cats=[...new Set(allProducts.map(p=>p.categoria).filter(Boolean))].sort();
    const container=document.getElementById('filterChips');
    container.innerHTML=`<button class="filter-btn ${currentFilter==='todos'?'active':''}" data-filter="todos">📦 Todos</button>
      <button class="filter-btn ${currentFilter==='oferta'?'active':''}" data-filter="oferta">🔥 Ofertas</button>
      <button class="filter-btn ${currentFilter==='relampago'?'active':''}" data-filter="relampago">⚡ Relámpago</button>
      <button class="filter-btn ${currentFilter==='destacado'?'active':''}" data-filter="destacado">🔥 Destacado</button>
      <button class="filter-btn ${currentFilter==='especial'?'active':''}" data-filter="especial">💜 Especial</button>
      <button class="filter-btn ${currentFilter==='ultimas'?'active':''}" data-filter="ultimas">🏷️ Últimas</button>
      <button class="filter-btn ${currentFilter==='promo'?'active':''}" data-filter="promo">🏷️ Promo</button>
      <button class="filter-btn ${currentFilter==='combo'?'active':''}" data-filter="combo">🎯 Combo</button>
      <button class="filter-btn ${currentFilter==='sinoferta'?'active':''}" data-filter="sinoferta">✅ Sin oferta</button>`;
    cats.forEach(cat=>{ const btn=document.createElement('button'); btn.className=`filter-btn ${currentFilter===norm(cat)?'active':''}`; btn.dataset.filter=norm(cat); btn.textContent=cat; container.appendChild(btn); });
    document.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',()=>{ currentFilter=btn.dataset.filter; currentSearch=''; document.getElementById('searchInput').value=''; renderGrid(); buildFilterChips(); }));
  }

  // ==================== DARK MODE ====================
  function initDarkMode(){ if(localStorage.getItem('theme')==='dark') document.body.classList.add('dark'); document.getElementById('darkToggle').onclick=()=>{ document.body.classList.toggle('dark'); localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light'); }; }

  // ==================== INIT ====================
  async function init(){
    const [data, ofertas] = await Promise.all([fetchData(), fetchOfertas()]);
    if(!data){ document.getElementById('grid').innerHTML='<div>Error cargando datos</div>'; return; }
    allProducts = parseProducts(data);
    if(ofertas?.success){
      (ofertas.relampagoActivo||[]).forEach(p=>poolRelampago.add(Number(p.id)));
      (ofertas.destacadasActivas||[]).forEach(p=>poolDestacadas.add(Number(p.id)));
      (ofertas.especialesActivas||[]).forEach(p=>poolEspeciales.add(Number(p.id)));
      (ofertas.ultimasSeleccionadas||[]).forEach(p=>{ poolUltimas.add(Number(p.id)); if(p.precioOferta) poolUltimasData.set(Number(p.id),{precioOferta:p.precioOferta,pct:p.pct}); });
    }
    buildFilterChips();
    renderGrid();
    document.getElementById('whatsappBtn').onclick=shareWhatsApp;
    document.getElementById('copyBtn').onclick=copyText;
    document.getElementById('downloadBtn').onclick=downloadImages;
    document.getElementById('collageBtn').onclick=openCollageEditor;
    document.getElementById('clearBtn').onclick=()=>{ selectedIds.clear(); selectionOrder=[]; renderGrid(); toast('Selección limpia'); };
    document.getElementById('modeSelect').onchange=e=>currentMode=e.target.value;
    document.getElementById('searchInput').oninput=e=>{ currentSearch=e.target.value; renderGrid(); };
    initDarkMode();
  }
  init();
</script>
</body>
