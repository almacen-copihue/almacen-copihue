<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SendWA — Almacén Copihue ver.21</title>
<style>
  /* ===== VARIABLES ===== */
  :root {
    --primary: #4a7c3f;
    --primary-dark: #2d5a22;
    --primary-light: #6fa860;
    --accent: #c0392b;
    --accent-light: #e74c3c;
    --gold: #f39c12;
    --bg: #f5f7f4;
    --card-bg: #ffffff;
    --text: #1a2e17;
    --text-muted: #5a7055;
    --border: #d4e4cf;
    --selected-border: #27ae60;
    --selected-bg: #eafaf1;
    --warning: #e67e22;
    --danger: #c0392b;
    --shadow: 0 2px 12px rgba(45,90,34,0.10);
    --radius: 12px;
    --badge-relampago: #e74c3c;
    --badge-destacado: #f39c12;
    --badge-especial: #8e44ad;
    --badge-promo: #27ae60;
    --badge-combo: #2980b9;
    --header-h: 56px;
    --panel-h: 110px;
  }
  [data-theme="dark"] {
    --bg: #111a0e;
    --card-bg: #1c2b18;
    --text: #e8f5e3;
    --text-muted: #8db885;
    --border: #2d4528;
    --selected-bg: #1a3d24;
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  /* ===== RESET ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    -webkit-tap-highlight-color: transparent;
    transition: background .3s, color .3s;
  }
  button { cursor: pointer; border: none; background: none; font: inherit; }
  input, select { font: inherit; }

  /* ===== HEADER ===== */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: var(--header-h);
    background: var(--primary-dark);
    display: flex; align-items: center; gap: 10px;
    padding: 0 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  #header h1 {
    flex: 1; font-size: 17px; color: #fff; font-weight: 700; letter-spacing: .5px;
  }
  #header h1 span { color: #a8d8a0; font-size: 12px; font-weight: 400; display: block; }
  #btn-dark {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,.12);
    color: #fff; font-size: 17px;
    display: flex; align-items: center; justify-content: center;
  }

  /* ===== PANEL SUPERIOR ===== */
  #top-panel {
    position: fixed; top: var(--header-h); left: 0; right: 0; z-index: 90;
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    transition: background .3s;
  }

  /* Modo tabs */
  #mode-tabs {
    display: flex; gap: 6px; margin-bottom: 8px;
  }
  .mode-tab {
    flex: 1; padding: 6px 4px; border-radius: 8px; font-size: 12px; font-weight: 600;
    border: 2px solid var(--border); color: var(--text-muted);
    transition: all .2s;
  }
  .mode-tab.active {
    background: var(--primary); border-color: var(--primary); color: #fff;
  }

  /* Stats row */
  #stats-row {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .stat-chip {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 600; color: var(--text-muted);
  }
  .stat-chip span { color: var(--text); }
  #warn-msg {
    width: 100%; font-size: 11px; color: var(--warning); font-weight: 600;
    display: none; margin-top: 4px;
  }
  #warn-msg.show { display: block; }

  /* ===== FILTROS ===== */
  #filters {
    position: fixed; z-index: 80;
    left: 0; right: 0;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    display: flex; flex-direction: column; gap: 6px;
    transition: background .3s;
  }
  #search-row { display: flex; gap: 6px; }
  #search-input {
    flex: 1; height: 36px; padding: 0 12px; border-radius: 8px;
    border: 1.5px solid var(--border); background: var(--card-bg); color: var(--text);
    font-size: 13px;
    transition: border .2s, background .3s;
  }
  #search-input:focus { outline: none; border-color: var(--primary); }
  #btn-sel-all {
    height: 36px; padding: 0 12px; border-radius: 8px;
    background: var(--primary); color: #fff; font-size: 12px; font-weight: 600;
    white-space: nowrap;
  }
  #filters-row {
    display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
  }
  #filters-row::-webkit-scrollbar { display: none; }
  .filter-chip {
    height: 30px; padding: 0 12px; border-radius: 15px;
    border: 1.5px solid var(--border); background: var(--card-bg); color: var(--text-muted);
    font-size: 12px; font-weight: 600; white-space: nowrap;
    transition: all .2s;
  }
  .filter-chip.active { background: var(--primary); border-color: var(--primary); color: #fff; }
  .filter-chip.chip-activo { border-color: #e67e22; color: #e67e22; }
  .filter-chip.chip-activo.active { background: #e67e22; border-color: #e67e22; color: #fff; }

  /* ===== SCROLL CONTAINER ===== */
  #main {
    padding-top: calc(var(--header-h) + var(--panel-h) + 90px);
    padding-bottom: 80px;
    padding-left: 8px; padding-right: 8px;
  }

  /* ===== SEPARADORES ===== */
  .separator-card {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    border-radius: 10px; padding: 10px 14px;
    color: #fff; font-weight: 700; font-size: 14px;
    margin: 4px 0; text-align: center;
    letter-spacing: .5px;
  }

  /* ===== GRID PRODUCTOS ===== */
  #grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  /* ===== TARJETA ===== */
  .prod-card {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .1s;
    user-select: none;
    -webkit-user-select: none;
  }
  .prod-card.selected {
    border-color: var(--selected-border);
    background: var(--selected-bg);
    transform: scale(.97);
  }
  .prod-card .card-img {
    width: 100%; aspect-ratio: 1/1; object-fit: cover;
    background: #e8f0e5;
    display: block;
  }
  .card-img-placeholder {
    width: 100%; aspect-ratio: 1/1;
    background: linear-gradient(135deg, #e8f0e5, #d0e4ca);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .card-body {
    padding: 5px 6px 7px;
  }
  .card-name {
    font-size: 11px; font-weight: 600; color: var(--text);
    line-height: 1.3; max-height: 2.6em; overflow: hidden;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .card-cat {
    font-size: 9.5px; color: var(--text-muted); margin-top: 1px;
    text-transform: uppercase; letter-spacing: .3px;
  }
  .card-price {
    font-size: 13px; font-weight: 700; color: var(--primary-dark);
    margin-top: 3px;
  }
  [data-theme="dark"] .card-price { color: var(--primary-light); }
  .card-price-oferta { margin-top: 3px; line-height: 1.2; }
  .price-antes {
    font-size: 10px; color: var(--text-muted); text-decoration: line-through; display: block;
  }
  .price-oferta {
    font-size: 13px; font-weight: 800; display: block;
  }

  /* Check overlay */
  .card-check {
    position: absolute; top: 5px; right: 5px;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--selected-border); color: #fff;
    font-size: 13px; font-weight: 700;
    display: none; align-items: center; justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,.3);
  }
  .prod-card.selected .card-check { display: flex; }

  /* Orden badge */
  .card-order {
    position: absolute; top: 5px; left: 5px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--primary-dark); color: #fff;
    font-size: 10px; font-weight: 700;
    display: none; align-items: center; justify-content: center;
  }
  .prod-card.selected .card-order { display: flex; }

  /* Oferta badge */
  /* Badge como franja entre imagen y texto — flujo normal, sin superposición */
  .badge-oferta {
    display: block; width: 100%;
    padding: 3px 6px; font-size: 9px; font-weight: 800;
    text-align: center; color: #fff; text-transform: uppercase; letter-spacing: .5px;
    line-height: 1.4;
  }
  .badge-relampago { background: var(--badge-relampago); }
  .badge-destacado { background: var(--badge-destacado); }
  .badge-especial   { background: var(--badge-especial); }
  .badge-promo      { background: var(--badge-promo); }
  .badge-combo      { background: var(--badge-combo); }

  /* Sin stock */
  .prod-card.sin-stock .card-img,
  .prod-card.sin-stock .card-img-placeholder { filter: grayscale(60%) opacity(.7); }
  .badge-sin-stock {
    position: absolute; top: 0; left: 0; right: 0;
    background: rgba(0,0,0,.55); color: #fff;
    font-size: 9px; font-weight: 700; text-align: center;
    padding: 2px; text-transform: uppercase;
  }

  /* ===== BOTTOM ACTIONS ===== */
  #bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--card-bg); border-top: 1px solid var(--border);
    padding: 5px 12px 7px; display:flex; align-items:center; justify-content:center;
    box-shadow: 0 -2px 10px rgba(0,0,0,.08); transition: background .3s; height: 38px;
  }
  #action-btns { display:flex; align-items:center; gap:8px; }
  .act-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 8px 4px; font-size: 10px;
    font-weight: 600; color: var(--text-muted);
    transition: all .2s;
  }
  .act-btn .icon { font-size: 20px; }
  .act-btn.primary { background: #25D366; border-color: #25D366; color: #fff; }
  .act-btn.primary .icon { color: #fff; }
  .act-btn.warn { background: var(--accent); border-color: var(--accent); color: #fff; }
  .act-btn.warn .icon { color: #fff; }
  .act-btn:active { transform: scale(.95); opacity: .85; }

  #btn-ia-suggest {
    width: 100%; margin-top: 8px; height: 38px;
    background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
    color: #fff; border-radius: 10px; font-weight: 700; font-size: 13px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 2px 10px rgba(45,90,34,.3);
  }

  /* ===== LOADING ===== */
  #loader {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  }
  .loader-logo { font-size: 48px; animation: bounce .8s infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
  .loader-txt { font-size: 15px; color: var(--text-muted); font-weight: 600; }
  .loader-bar {
    width: 200px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .loader-bar-inner {
    height: 100%; background: var(--primary); border-radius: 2px;
    animation: loadbar 1.4s ease-in-out infinite;
  }
  @keyframes loadbar {
    0%   { width: 0%; margin-left: 0; }
    50%  { width: 70%; margin-left: 15%; }
    100% { width: 0%; margin-left: 100%; }
  }

  /* ===== TOAST ===== */
  #toast {
    position: fixed; bottom: 175px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #222; color: #fff; padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 600; opacity: 0; transition: all .3s; z-index: 300;
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== MODAL COLLAGE ===== */
  #collage-modal {
    display: none; position: fixed; inset: 0; z-index: 400;
    background: rgba(0,0,0,.7); align-items: flex-end; justify-content: center;
  }
  #collage-modal.open { display: flex; }
  #collage-sheet {
    background: var(--card-bg); border-radius: 20px 20px 0 0;
    width: 100%; max-height: 90vh; overflow-y: auto; padding: 56px 16px 30px;
    position: relative;
  }
  #btn-modal-close-x {
    position: fixed; top: 12px; right: 12px; z-index: 410;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(0,0,0,.7); color: #fff; font-size: 22px; font-weight: 700;
    display: none; align-items: center; justify-content: center;
    border: 2px solid rgba(255,255,255,.3);
    box-shadow: 0 2px 12px rgba(0,0,0,.4);
  }
  #collage-modal.open #btn-modal-close-x { display: flex; }
  #collage-canvas { max-width: 100%; max-height: 65vh; border-radius: 10px; box-shadow: var(--shadow); display: block; margin: 0 auto; }
  #collage-actions { display: flex; gap: 8px; margin-top: 10px; }
  #collage-actions button {
    flex: 1; height: 42px; border-radius: 10px; font-weight: 700; font-size: 13px;
  }
  #btn-collage-dl { background: var(--primary); color: #fff; }
  #btn-collage-close { background: var(--bg); border: 1.5px solid var(--border); color: var(--text); }
  #single-layout-bar {
    display: none; flex-direction: column; gap: 6px; margin-bottom: 10px;
  }
  #single-layout-bar.show { display: flex; }
  .layout-section-label {
    font-size: 10px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px;
  }
  .layout-row { display: flex; gap: 5px; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
  .layout-row::-webkit-scrollbar { display: none; }
  .layout-btn {
    flex: 0 0 auto; padding: 6px 10px; border-radius: 10px; font-size: 10.5px; font-weight: 700;
    border: 2px solid var(--border); background: var(--bg); color: var(--text-muted);
    text-align: center; transition: all .2s; white-space: nowrap;
  }
  .layout-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
  .layout-btn[data-format] { font-size: 9.5px; }
  .layout-btn[data-format].active { background: #2980b9; border-color: #2980b9; color: #fff; }
  #btn-dl-todas {
    width: 100%; margin-top: 6px; height: 40px; border-radius: 10px;
    background: var(--primary-dark); color: #fff; font-weight: 700; font-size: 13px;
    display: none;
  }
  #btn-dl-todas.show { display: block; }
  .collage-tab {
    flex:1; padding: 7px 4px; border-radius: 8px; font-size: 12px; font-weight: 700;
    border: 2px solid var(--border); color: var(--text-muted); background: var(--bg);
    transition: all .2s;
  }
  .collage-tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }
  .single-thumb {
    display: inline-flex; flex-direction: column; align-items: center;
    gap: 3px; cursor: pointer; padding: 4px; border-radius: 8px;
    border: 2px solid var(--border); background: var(--card-bg); min-width: 70px;
    transition: border-color .15s;
  }
  .single-thumb.active { border-color: var(--selected-border); }
  .single-thumb img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; background: #e8f0e5; }
  .single-thumb span { font-size: 9px; color: var(--text-muted); text-align: center;
    max-width: 66px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

  /* ===== HISTORIA 1080x1920 ===== */
  #historia-canvas { display: none; }

  /* ===== DESKTOP RESPONSIVE ===== */
  @media (min-width: 768px) {
    :root {
      --header-h: 48px;
      --panel-h: 90px;
    }
    body { font-size: 13px; }

    /* Header más compacto */
    #header { padding: 0 20px; }
    #header h1 { font-size: 15px; }
    #header h1 span { font-size: 11px; }

    /* Panel superior */
    #top-panel { padding: 6px 20px; }
    .mode-tab { font-size: 13px; padding: 7px 16px; flex: 0 0 auto; }
    #mode-tabs { justify-content: flex-start; gap: 8px; }
    .stat-chip { font-size: 13px; padding: 5px 14px; }

    /* Filtros */
    #filters { padding: 6px 20px; flex-direction: row; align-items: center; gap: 8px; }
    #search-row { flex: 0 0 320px; }
    #search-input { font-size: 13px; height: 34px; }
    #btn-sel-all { height: 34px; font-size: 13px; }
    #filters-row { flex: 1; gap: 6px; }
    .filter-chip { height: 32px; font-size: 12px; padding: 0 14px; }

    /* Grid — 6 columnas en desktop */
    #grid { grid-template-columns: repeat(6, 1fr); gap: 8px; }

    /* Tarjeta — texto legible pero compacto */
    .card-name { font-size: 11px; }
    .card-cat  { font-size: 9px; }
    .card-price { font-size: 12px; }
    .price-antes { font-size: 9px; }
    .price-oferta { font-size: 12px; }
    .badge-oferta { font-size: 8.5px; }
    .card-body { padding: 4px 6px 6px; }

    /* Bottom bar horizontal, más compacta */
    #bottom-bar { padding: 8px 20px 10px; }
    #action-btns { grid-template-columns: repeat(5, auto); justify-content: flex-start; gap: 8px; }
    .act-btn { padding: 8px 18px; flex-direction: row; gap: 6px; font-size: 12px; width: auto; }
    .act-btn .icon { font-size: 16px; }
    #btn-ia-suggest { font-size: 13px; height: 36px; }

    /* Main padding ajustado para filtros en 1 línea */
    #main { padding-left: 20px; padding-right: 20px; }

    /* Collage sheet más ancho */
    #collage-sheet { max-width: 900px; margin: 0 auto; }
  }

  @media (min-width: 1200px) {
    #grid { grid-template-columns: repeat(8, 1fr); gap: 8px; }
    #search-row { flex: 0 0 400px; }
  }

  /* ===== EMPTY STATE ===== */
  #empty-state {
    display: none; text-align: center; padding: 40px 20px; color: var(--text-muted);
  }
  #empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  #empty-state p { font-size: 14px; }

  /* Panel height adjustment helper */
  .panel-placeholder {
    height: calc(var(--panel-h) + 90px);
  }
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-logo">🛒</div>
  <div class="loader-txt">Cargando productos…</div>
  <div class="loader-bar"><div class="loader-bar-inner"></div></div>
</div>

<!-- HEADER compacto con stats + modo selector -->
<div id="header">
  <h1>📲 SendWA <span>Copihue</span></h1>
  <div id="header-stats">
    <span class="hstat" id="hstat-sel">✓ 0</span>
    <span class="hstat" id="hstat-size">0 MB</span>
    <span class="hstat" id="hstat-warn" style="display:none">⚠️ Límite WA</span>
  </div>
  <select id="mode-select" title="Modo de envío">
    <option value="estado">📸 Estado</option>
    <option value="grupo">👥 Grupo</option>
    <option value="rapido">⚡ Rápido</option>
  </select>
  <div id="ver-badge" style="background:rgba(255,255,255,.15);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;letter-spacing:.3px">ver.28</div>
  <button id="btn-dark" title="Modo oscuro">🌙</button>
</div>

<!-- FILTROS — barra compacta con dropdowns por grupo -->
<div id="filters">
  <div id="search-row">
    <input type="search" id="search-input" placeholder="🔍 Buscar producto…">
    <button id="btn-sel-all">✓ Todo</button>
  </div>
  <div style="display:flex;gap:4px;align-items:center;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;">
    <!-- Chips rápidos siempre visibles -->
    <div id="quick-chips" style="display:flex;gap:4px;flex-shrink:0;">
      <button class="filter-chip active" data-filter="todos">Todos</button>
      <button class="filter-chip" data-filter="sinoferta">✅ Normal</button>
      <button class="filter-chip chip-activo" data-filter="activo">⏰ Activos</button>
    </div>

    <!-- Grupo OFERTAS dropdown -->
    <div class="nav-group" id="ng-ofertas">
      <button class="nav-group-btn group-ofertas" onclick="toggleDropdown('dd-ofertas')">🔥 Ofertas ▾</button>
      <div class="nav-dropdown" id="dd-ofertas">
        <div class="nav-dropdown-label">Tipo de oferta</div>
        <div class="nav-chips">
          <button class="filter-chip oferta-chip" data-filter="oferta">🔥 Pool</button>
          <button class="filter-chip oferta-chip" data-filter="relampago">⚡ Relámpago</button>
          <button class="filter-chip oferta-chip" data-filter="destacado">🔥 Destacado</button>
          <button class="filter-chip oferta-chip" data-filter="especial">💜 Especial</button>
          <button class="filter-chip oferta-chip" data-filter="ultimas">🏷️ Últimas</button>
          <button class="filter-chip oferta-chip" data-filter="promo">🏷️ Promos</button>
          <button class="filter-chip oferta-chip" data-filter="combo">🎯 Combos</button>
        </div>
      </div>
    </div>

    <!-- Grupo CATEGORÍAS dropdown -->
    <div class="nav-group" id="ng-cats">
      <button class="nav-group-btn group-cats" onclick="toggleDropdown('dd-cats')">🛍️ Categorías ▾</button>

// Priority map
const PRIORITY_ORDER = { relampago: 1, ultimas: 2, destacado: 3, especial: 4, promo: 5, combo: 6, '': 7 };
const BADGE_COLORS = {

// Tabla de ofertas relámpago — idéntica a seba21 v361
const OFERTAS_RELAMPAGO = {
  '1':  { nombre:'2x1',   tipo:'nxm', cantidad:2, pagas:1   },

// Calcula precio oferta y etiqueta para mostrar en la tarjeta (qty=1 para vista)
// Lógica idéntica a calcularOfertaPOS de seba21 v361
function calcularOferta(p) {
  const precio = p.precioVenta;
  const cat    = p.catOferta;
  if (!cat) return null;

  // RELÁMPAGO
  if (cat === 'relampago' && p.relampago) {
    const key = String(p.relampago);
    const cfg = OFERTAS_RELAMPAGO[key];
    if (cfg && cfg.tipo === 'pct') {
      return { precio: Math.round(precio * (1 - cfg.descuento / 100)), etiqueta: `⚡ -${cfg.descuento}% OFF` };
    } else if (cfg && cfg.tipo === 'nxm') {
      return { precio: null, etiqueta: `⚡ ${cfg.nombre.toUpperCase()}` }; // NxM: sin precio unitario fijo
    }
    // fallback string
    const match = key.match(/(\d+)x(\d+)/i);
    if (match) return { precio: null, etiqueta: `⚡ ${match[1]}X${match[2]}` };
    return { precio: null, etiqueta: '⚡ RELÁMPAGO' };
  }
  // ÚLTIMAS UNIDADES — precio viene de getOfertas (poolUltimas tiene {pct,precioOferta})
  if (cat === 'ultimas') {
    const ult = _poolUltimasData.get(Number(p.id));
    if (ult && ult.precioOferta != null) {
      const pct = ult.pct != null ? ult.pct : Math.round((1 - ult.precioOferta / precio) * 100);
      return { precio: ult.precioOferta, etiqueta: `🏷️ -${pct}% ÚLTIMAS` };
    }
    return { precio: Math.round(precio * 0.9), etiqueta: '🏷️ -10% ÚLTIMAS' };
  }
  // DESTACADAS — p.destacada = porcentaje directo
  if (cat === 'destacado' && p.destacada > 0) {
    return { precio: Math.round(precio * (1 - p.destacada / 100)), etiqueta: `🔥 -${p.destacada}% OFF` };
  }
  // ESPECIALES — siempre 10%
  if (cat === 'especial' && p.especial > 0) {
    return { precio: Math.round(precio * 0.9), etiqueta: '💜 -10% OFF' };
  }
  // PROMO ACTIVA / COMBO ACTIVO — precio en col L (campo normal de la API)
  if ((cat === 'promo' || cat === 'combo') && p.normal > 0 && p.normal < precio) {
    const pct = Math.round((1 - p.normal / precio) * 100);
    const icono = cat === 'combo' ? '🎯' : '🏷️';
    return { precio: p.normal, etiqueta: `${icono} ${cat.toUpperCase()} -${pct}% OFF` };
  }
  return null;
}

// ============================================================

function fmt(n) {
  if (!n && n !== 0) return '';
  return '$' + Number(n).toLocaleString('es-AR');
}
function norm(s) {
  return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}
// Igual que simplificarNombre() del POS — genera el slug del archivo de imagen
function slugFoto(nombre) {
  return String(nombre).toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9 ]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .trim();
}
// URL de imagen: usa el campo image si viene con URL, sino construye path local igual que el POS

// ============================================================
// SISTEMA DE HORARIOS — copiado de seba21 v361
// ============================================================
let _configCache = null;
const _toggleEstado = { relampago: null, destacadas: null, especiales: null, ultimas: null };

function _diaActualIdx() {
  const d = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Argentina/Buenos_Aires'}));
  return (d.getDay() + 6) % 7; // 0=Lun … 6=Dom
}

const _horarioCache = {};
function _dentroDeHorario(cfg, tipo, diaIdx) {
  try {
    const now = new Date();
    const ckey = tipo+'-'+diaIdx+'-'+now.getHours()+'-'+now.getMinutes();
    if (ckey in _horarioCache) return _horarioCache[ckey];
    const mapa = {
      relampago:  { ini:'Hora inicio RELAMPAGO',  cie:'Hora cierre RELAMPAGO'  },
      destacadas: { ini:'Hora inicio DESTACADAS', cie:'Hora cierre DESTACADAS' },
      especiales: { ini:'Hora inicio ESPECIALES', cie:'Hora cierre ESPECIALES' },
      ultimas:    { ini:'Hora inicio ULTIMAS UNIDADES', cie:'Hora cierre ULTIMAS UNIDADES' }
    };
    const claves = mapa[tipo]; if (!claves) return false;
    const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const keyIni = Object.keys(cfg).find(k => norm(k).endsWith(norm(claves.ini)));
    const keyCie = Object.keys(cfg).find(k => norm(k).endsWith(norm(claves.cie)));
    if (!keyIni || !keyCie) return false;
    const parseH = v => {
      if (v===null||v===undefined||v==='') return null;
      const s=String(v).trim();
      if (s.includes('T')&&s.includes('Z')) { try{const d=new Date(s);if(!isNaN(d))return d.getHours()+d.getMinutes()/60;}catch(e){} return null; }
      const n=parseFloat(s);
      if (!s.includes(':')&&!isNaN(n)&&n>=0&&n<1) { const t=Math.round(n*24*60);return(Math.floor(t/60)%24)+(t%60)/60; }
      if (!s.includes(':')&&!isNaN(n)) return Math.floor(n)+Math.round((n%1)*60)/60;
      const p=s.split(':');const h=parseInt(p[0]);const m=p.length>1?(parseInt(p[1])||0):0;
      return isNaN(h)?null:h+m/60;
    };
    const hIni=parseH(cfg[keyIni][diaIdx]), hCie=parseH(cfg[keyCie][diaIdx]);
    if (hIni===null||hCie===null||isNaN(hIni)||isNaN(hCie)) return false;
    const arg=new Date(new Date().toLocaleString('en-US',{timeZone:'America/Argentina/Buenos_Aires'}));
    const horaActual=arg.getHours()+arg.getMinutes()/60;
    const activo=hCie>hIni?(horaActual>=hIni&&horaActual<hCie):(horaActual>=hIni||horaActual<hCie);
    return (_horarioCache[ckey]=activo);
  } catch(e){ return false; }
}

// Resuelve si un tipo de oferta está activo AHORA (forzado o por horario)
// Igual que _tipoActivo en seba21 v361
function _tipoActivoAhora(tipo) {
  const estado = _toggleEstado[tipo];
  if (estado === true)  return true;
  if (estado === false) return false;
  if (_configCache) return _dentroDeHorario(_configCache, tipo, _diaActualIdx());
  return false; // conservador: sin config → no mostrar
}

async function _cargarConfig() {
  if (_configCache) return _configCache;
  try {
    const data = await _apiFetch('getConfig');
    if ((data.ok||data.success) && data.config) {
      _configCache = data.config;
      // Cargar toggles forzados desde config (ON=1, OFF=0, AUTO=A/null)
      const diaIdx = _diaActualIdx();
      const CLAVES = {
        relampago:  'Estado RELAMPAGO',
        destacadas: 'Estado DESTACADAS',
        especiales: 'Estado ESPECIALES',
        ultimas:    'Estado ULTIMAS UNIDADES'
      };
      for (const [tipo, clave] of Object.entries(CLAVES)) {
        const norm = s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        const key = Object.keys(_configCache).find(k=>norm(k).endsWith(norm(clave)));
        if (!key) continue;
        const val = _configCache[key][diaIdx];
        if (val===1||val==='1') _toggleEstado[tipo]=true;
        else if (val===0||val==='0') _toggleEstado[tipo]=false;
        else _toggleEstado[tipo]=null; // auto horario
      }
    }
    return _configCache;
  } catch(e){ console.warn('getConfig error:',e.message); return null; }
}

// ============================================================
// FETCH DATA — igual que v361: productos + getOfertas en paralelo

// Pools de ofertas activos (cargados desde getOfertas, igual que seba21)
const _poolRelampago  = new Set();
const _poolDestacadas = new Set();
const _poolEspeciales = new Set();
const _poolUltimas    = new Set();
const _poolUltimasData = new Map(); // id → { precioOferta, pct, diasParaVencer }

async function _apiFetch(action) {

// Carga pools desde getOfertas — fuente de verdad, igual que seba21 v361
async function cargarPools() {
  try {
    const data = await _apiFetch('getOfertas');
    if (!data.success) { console.warn('getOfertas sin success'); return; }

    _poolRelampago.clear(); _poolDestacadas.clear();
    _poolEspeciales.clear(); _poolUltimas.clear(); _poolUltimasData.clear();

    (data.relampagoActivo   || []).forEach(p => _poolRelampago.add(Number(p.id)));
    (data.destacadasActivas || []).filter(p => p.categoria !== 'CERVEZAS')
                                  .forEach(p => _poolDestacadas.add(Number(p.id)));
    (data.especialesActivas || []).filter(p => p.categoria !== 'CERVEZAS')
                                  .forEach(p => _poolEspeciales.add(Number(p.id)));
    const ults = data.ultimasSeleccionadasSiempre || data.ultimasSeleccionadas || [];
    ults.forEach(p => {
      const id = Number(p.id);
      _poolUltimas.add(id);
      _poolUltimasData.set(id, {
        precioOferta:   p.precioOferta   != null ? p.precioOferta   : null,
        pct:            p.pct            != null ? p.pct            : null,
        diasParaVencer: p.diasParaVencer != null ? p.diasParaVencer : null,
      });
    });

    console.log(`📊 Pools SendWA — ⚡${_poolRelampago.size} 🔥${_poolDestacadas.size} 🌙${_poolEspeciales.size} 🏷️${_poolUltimas.size}`);
  } catch(e) {
    console.warn('No se pudieron cargar pools de ofertas:', e.message);
  }
}

// ============================================================
// PARSE PRODUCTS — misma estructura que seba21
// ============================================================
function parseProducts(data) {
  let rows = null;
  if (Array.isArray(data)) {
    rows = data;
  } else if (typeof data === 'object') {
    for (const k of Object.keys(data)) {
      if (Array.isArray(data[k]) && data[k].length > 0) { rows = data[k]; break; }
    }
  }
  if (!Array.isArray(rows) || rows.length === 0) return [];

  return rows
    .filter(r => r && typeof r === 'object')
    .map((r, i) => {
      const nombre      = String(r.name || r.nombre || '').trim();
      const precioVenta = parseFloat(r.price || r.precio || 0);
      const categoria   = String(r.category || r.categoria || '').trim();
      const stock       = parseFloat(r.stock ?? 1);
      const foto        = String(r.image || r.imagen || r.foto || '').trim();
      const id          = Number(r.id) || (nombre + '_' + i);
      const vendidos    = parseFloat(r.rotacion || r.vendidos || 0);
      // campos numéricos directos igual que seba21
      const relampago   = (r.relampago !== undefined && r.relampago !== null && r.relampago !== '')
                          ? (isNaN(parseInt(r.relampago)) ? String(r.relampago).trim() : parseInt(r.relampago)) : 0;
      const destacada   = parseInt(r.destacada) || 0;
      const especial    = parseInt(r.especial)  || 0;
      // col L: precio promo/combo (campo normal en la API = $promos/combos)
      const normal      = parseFloat(r.normal || r.precioNormal || r['$promos/combos'] || 0);

      // catOferta se resuelve en resolveOfertas() contra los pools activos
      return { id, nombre, precioVenta, categoria, stock, foto, vendidos,
               relampago, destacada, especial, normal, catOferta: '', _raw: r };
    })
    .filter(p => p.nombre && p.precioVenta > 0);
}

// resolveOfertas — tres modos:
//   'pool'   → en el pool configurado (independiente de horario) — filtro "Con ofertas"
//   'activo' → solo los activos AHORA según horario/forzados (igual que seba21) — filtro "Activos ahora"
//   'collage'→ igual que 'pool' (para el canvas)
function resolveOfertas(products, modo = 'pool') {
  return products.map(p => {
    const pid = Number(p.id);
    const rawCat = String(p._raw?.categoriaOferta || '').toUpperCase().trim();
    let catOferta = '';
    // PROMO / COMBO siempre directo de col J — no tienen horario
    if      (rawCat === 'PROMO ACTIVA') catOferta = 'promo';
    else if (rawCat === 'COMBO ACTIVO') catOferta = 'combo';
    else {
      // Para relampago/destacado/especial/ultimas: chequear pool
      const enPoolR = p.relampago && _poolRelampago.has(pid);
      const enPoolD = p.destacada > 0 && _poolDestacadas.has(pid);
      const enPoolE = p.especial  > 0 && _poolEspeciales.has(pid);
      const enPoolU = _poolUltimas.has(pid);

      if (modo === 'activo') {
        // Solo los activos según horario/forzado — igual que seba21
        if      (enPoolR && _tipoActivoAhora('relampago'))  catOferta = 'relampago';
        else if (enPoolU && _tipoActivoAhora('ultimas'))     catOferta = 'ultimas';
        else if (enPoolD && _tipoActivoAhora('destacadas'))  catOferta = 'destacado';
        else if (enPoolE && _tipoActivoAhora('especiales'))  catOferta = 'especial';
      } else {
        // modo 'pool' o 'collage': en el pool = tiene oferta, sin importar horario
        if      (enPoolR) catOferta = 'relampago';
        else if (enPoolU) catOferta = 'ultimas';
        else if (enPoolD) catOferta = 'destacado';
        else if (enPoolE) catOferta = 'especial';
      }
    }
    return { ...p, catOferta };
  });
}

// Aplica colores de CONFIG_UI si vienen en la respuesta
function applyUIColors(data) {
  const cfg = data.config_ui || data.CONFIG_UI || data.configUI || {};
  if (cfg.primaryColor) document.documentElement.style.setProperty('--primary', cfg.primaryColor);
  if (cfg.primaryDark)  document.documentElement.style.setProperty('--primary-dark', cfg.primaryDark);
  if (cfg.accentColor)  document.documentElement.style.setProperty('--accent', cfg.accentColor);
}

// ============================================================
// SORT & FILTER
// ============================================================
function sortProducts(products, mode) {
  const sorted = [...products];
  sorted.sort((a, b) => {
    const pa = PRIORITY_ORDER[a.catOferta] ?? 7;
    const pb = PRIORITY_ORDER[b.catOferta] ?? 7;
    if (pa !== pb) return pa - pb;
    return (b.vendidos || 0) - (a.vendidos || 0);
  });

  // interleavedSort solo en modo "todos" — si hay filtro activo los productos
  // ya son del mismo tipo, mezclar solo introduce productos de otros grupos
  const filtroEsGeneral = (currentFilter === 'todos' || currentFilter === 'oferta' || currentFilter === 'activo');
  if (mode === 'estado' && filtroEsGeneral) {
    return interleavedSort(sorted);
  }
  return sorted;
}

function interleavedSort(sorted) {
  // Mezclar para evitar misma categoría seguida
  const result = [];
  const byPriority = {};
  for (const p of sorted) {
    const key = p.catOferta || 'normal';
    if (!byPriority[key]) byPriority[key] = [];
    byPriority[key].push(p);
  }
  const keys = Object.keys(byPriority).sort((a,b) => (PRIORITY_ORDER[a]||6)-(PRIORITY_ORDER[b]||6));
  let maxLen = Math.max(...Object.values(byPriority).map(a=>a.length));
  for (let i = 0; i < maxLen; i++) {
    for (const k of keys) {
      if (byPriority[k][i]) result.push(byPriority[k][i]);
    }
  }
  return result;
}

// Modo de resolución según filtro actual
function getModoResolucion() {
  if (currentFilter === 'activo') return 'activo';
  return 'pool';
}

function applyFilter() {
  const modoRes = getModoResolucion();
  const resolved = resolveOfertas(allProducts, modoRes);

  let f = resolved.filter(p => {
    switch (currentFilter) {
      // ── Con oferta (pool) — en el pool sin importar horario ──
      case 'oferta':    return !!p.catOferta;
      // ── Activos ahora — horario seba21 sincronizado ──
      case 'activo':    return !!p.catOferta;
      // ── Sin oferta — precio normal puro ──
      case 'sinoferta': {
        // Chequear contra AMBOS modos para asegurar que no tiene nada
        const enPool = resolveOfertas([p], 'pool')[0].catOferta;
        return !enPool;
      }
      case 'relampago': return p.catOferta === 'relampago';
      case 'destacado': return p.catOferta === 'destacado';
      case 'especial':  return p.catOferta === 'especial';
      case 'ultimas':   return p.catOferta === 'ultimas';
      case 'promo':     return p.catOferta === 'promo';
      case 'combo':     return p.catOferta === 'combo';
      default:
        if (currentFilter !== 'todos') return norm(p.categoria) === norm(currentFilter);
        return true;
    }
  });

  if (currentSearch) {
    const q = norm(currentSearch);
    f = f.filter(p => norm(p.nombre).includes(q) || norm(p.categoria).includes(q));
  }
  filteredProducts = sortProducts(f, currentMode);
  renderGrid();
}

// ============================================================
// RENDER
// ============================================================
function getCatEmoji(cat) {
  const map = {bebidas:'🥤',limpieza:'🧹',snacks:'🍪',lacteos:'🥛',carnes:'🥩',frutas:'🍎',panaderia:'🍞',ferreteria:'🔧'};
  return map[norm(cat)] || '🛍️';
}

function insertSeparators(products) {
  // Inserta separador cuando cambia categoría principal cada 8-10 productos
  const result = [];
  let lastCat = null;
  let countSinceSep = 0;
  for (const p of products) {
    const cat = norm(p.categoria);
    if ((cat !== lastCat && countSinceSep >= 4) || countSinceSep >= 10) {
      const label = SEP_LABELS[cat] || (getCatEmoji(cat) + ' ' + (p.categoria||'').toUpperCase());
      result.push({ _sep: true, label, cat });
      countSinceSep = 0;
    }
    lastCat = cat;
    result.push(p);
    countSinceSep++;
  }
  return result;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const withSeps = insertSeparators(filteredProducts);
  
  if (filteredProducts.length === 0) {
    grid.innerHTML = '';
    document.getElementById('empty-state').style.display = 'block';
    return;
  }
  document.getElementById('empty-state').style.display = 'none';

  grid.innerHTML = withSeps.map((p, i) => {
    if (p._sep) {
      return `<div class="separator-card">${p.label}</div>`;
    }
    const sel = selectedIds.has(String(p.id));
    const orderNum = selectionOrder.indexOf(String(p.id)) + 1;
    const sinStock = p.stock <= 0;
    const oferta   = calcularOferta(p);
    const badgeColor = BADGE_COLORS[p.catOferta] || '';

    const imgUrl = getImgUrl(p);
    const imgEl = `<img class="card-img" src="${imgUrl}" alt="${p.nombre}" loading="lazy"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                   <div class="card-img-placeholder" style="display:none">${getCatEmoji(p.categoria)}</div>`;

    // Precio: si tiene oferta muestra precio oferta + tachado original
    const precioHTML = oferta
      ? `<div class="card-price-oferta">
           <span class="price-antes">${fmt(p.precioVenta)}</span>
           <span class="price-oferta" style="color:${badgeColor}">${oferta.precio ? fmt(oferta.precio) : ''}</span>
         </div>`
      : `<div class="card-price">${fmt(p.precioVenta)}</div>`;

    // Badge con etiqueta real de la oferta
    const badgeHTML = oferta
      ? `<div class="badge-oferta" style="background:${badgeColor}">${oferta.etiqueta}</div>`
      : '';

    return `
    <div class="prod-card ${sel?'selected':''} ${sinStock?'sin-stock':''}"
         data-id="${p.id}" data-idx="${filteredProducts.indexOf(p)}"
         onclick="toggleSelect('${p.id}')">
      ${sinStock ? `<div class="badge-sin-stock">Sin stock</div>` : ''}
      ${imgEl}
      <div class="card-order">${orderNum||''}</div>
      <div class="card-check">✓</div>
      ${badgeHTML}
      <div class="card-body">
        <div class="card-name">${p.nombre}</div>
        <div class="card-cat">${p.categoria}</div>
        ${precioHTML}
      </div>
    </div>`;
  }).join('');

  updateStats();
}

// ============================================================
// SELECTION
// ============================================================
function toggleSelect(id) {
  id = String(id); // normalizar siempre a string
  if (selectedIds.has(id)) {
    selectedIds.delete(id);
    selectionOrder = selectionOrder.filter(x => x !== id);
  } else {
    selectedIds.add(id);
    selectionOrder.push(id);
  }
  updateStats();
  document.querySelectorAll('.prod-card').forEach(el => {
    const eid = String(el.dataset.id);
    const sel = selectedIds.has(eid);
    el.classList.toggle('selected', sel);
    const orderEl = el.querySelector('.card-order');
    if (orderEl) orderEl.textContent = sel ? (selectionOrder.indexOf(eid)+1) : '';
  });
  saveRecent();
}

function selectAll() {
  // Solo los productos visibles según filtro activo (sin separadores)
  const allVisible = filteredProducts.filter(p => p && !p._sep).map(p => String(p.id));
  const allSel = allVisible.length > 0 && allVisible.every(id => selectedIds.has(id));

  // Nombre del filtro activo para el toast
  const filterName = currentFilter === 'todos' ? 'todos' :
    document.querySelector(`.filter-chip[data-filter="${currentFilter}"]`)?.textContent?.trim() || currentFilter;

  if (allSel) {
    // Deseleccionar solo los visibles
    allVisible.forEach(id => { selectedIds.delete(id); selectionOrder = selectionOrder.filter(x=>x!==id); });
    toast(`Deseleccionados: ${filterName}`);
  } else {
    allVisible.forEach(id => { if(!selectedIds.has(id)) { selectedIds.add(id); selectionOrder.push(id); } });
    toast(`✓ ${allVisible.length} productos — ${filterName}`);
  }
  renderGrid();
}

function getSelectedProducts() {
  return selectionOrder
    .map(id => allProducts.find(p => String(p.id) === String(id)))
    .filter(Boolean);
}

// ============================================================
// STATS
// ============================================================
function updateStats() {
  const sel = selectedIds.size;
  const prods = getSelectedProducts();
  const cats = new Set(prods.map(p=>p.categoria)).size;
  const sizeMB = (prods.length * IMG_SIZE_MB).toFixed(1);

  document.getElementById('hstat-sel').textContent = sel ? `✓ ${sel}  📦 ${cats}cat` : '✓ 0';
  document.getElementById('hstat-size').textContent = `${sizeMB} MB`;
  const hwarn = document.getElementById('hstat-warn');
  if (hwarn) hwarn.style.display = (prods.length > WA_LIMIT_ESTADO && currentMode === 'estado') ? '' : 'none';
  const warn = document.getElementById('warn-msg');
  warn.classList.toggle('show', prods.length > WA_LIMIT_ESTADO && currentMode === 'estado');
}

  const headerH  = document.getElementById('header').offsetHeight;

// ============================================================
// TEXTO AUTOMÁTICO
// ============================================================
function generateText(mode) {
  const prodsRaw = getSelectedProducts();
  if (!prodsRaw.length) return '❌ Ningún producto seleccionado.';
  // Resolver ofertas
  const prods = resolveOfertas(prodsRaw);

  // ── Contar cuántos tienen oferta para elegir encabezado ──
  const conOferta = prods.filter(p => p.catOferta).length;
  const tiposPresentes = [...new Set(prods.map(p=>p.catOferta).filter(Boolean))];
  const tituloOferta = {
    relampago:'⚡ OFERTAS RELÁMPAGO', ultimas:'🏷️ ÚLTIMAS UNIDADES',
    destacado:'🔥 OFERTAS DESTACADAS', especial:'💜 PRECIOS ESPECIALES',
    promo:'🏷️ PROMOS DEL DÍA', combo:'🎯 COMBOS'
  };

  // Encabezado dinámico
  let header = '';
  if (mode === 'rapido') {
    header = `📲 *ALMACÉN COPIHUE*
`;
  } else if (tiposPresentes.length === 1 && tituloOferta[tiposPresentes[0]]) {
    header = `📲 *ALMACÉN COPIHUE* 📲
${tituloOferta[tiposPresentes[0]]}
`;
  } else if (conOferta > 0) {
    header = `🛒 *ALMACÉN COPIHUE* 🛒
🔥 ¡OFERTAS DEL DÍA! 🔥
`;
  } else {
    header = `🛒 *ALMACÉN COPIHUE* 🛒
`;
  }

  // ── Etiqueta legible del tipo de oferta ──
  function labelOferta(p, of) {
    if (!of) return '';
    const cat = p.catOferta;
    if (cat === 'relampago') {
      // NxM → explicar la promo
      const cfg = OFERTAS_RELAMPAGO[String(p.relampago)];
      if (cfg && cfg.tipo === 'nxm') {
        if (cfg.cantidad === 2 && cfg.pagas === 1.5) return ' _(2da unidad 50% OFF)_';
        return ` _(${cfg.nombre.toUpperCase()})_`;
      }
      return of.etiqueta ? ` _${of.etiqueta}_` : '';
    }
    if (cat === 'destacado') return of.etiqueta ? ` _${of.etiqueta}_` : '';
    if (cat === 'especial')  return ' _(-10% especial)_';
    if (cat === 'ultimas')   return of.etiqueta ? ` _${of.etiqueta}_` : ' _(últimas unidades)_';
    if (cat === 'promo')     return of.etiqueta ? ` _${of.etiqueta}_` : ' _(promo)_';
    if (cat === 'combo')     return of.etiqueta ? ` _${of.etiqueta}_` : ' _(combo)_';
    return '';
  }

  let lines = [];

  if (mode === 'rapido') {
    // Lista rápida: emoji + nombre + precio
    for (const p of prods) {
      const of = calcularOferta(p);
      const precio = of && of.precio ? fmt(of.precio) : fmt(p.precioVenta);
      const e = getCatEmoji(p.categoria);
      lines.push(`${e} ${p.nombre} — *${precio}*`);
    }
  } else {
    // Agrupar por categoría
    const grupos = {};
    for (const p of prods) {
      const cat = p.categoria || 'Varios';
      if (!grupos[cat]) grupos[cat] = [];
      grupos[cat].push(p);
    }
    for (const [cat, ps] of Object.entries(grupos)) {
      const emoji = getCatEmoji(cat);
      // Separador de categoría siempre (en grupo más visible, en estado más compacto)
      lines.push(`\n${emoji} *${cat.toUpperCase()}*`);
      for (const p of ps) {
        const of = calcularOferta(p);
        const precioFinal = of && of.precio ? fmt(of.precio) : fmt(p.precioVenta);
        const precioAntes  = of && of.precio ? ` ~${fmt(p.precioVenta)}~` : '';
        const labelOf = labelOferta(p, of);
        if (mode === 'grupo') {
          // Formato detallado para grupos
          lines.push(`• *${p.nombre}*${labelOf}\n  ${precioAntes ? precioAntes + ' → ' : ''}*${precioFinal}*`);
        } else {
          // Estado: más compacto
          lines.push(`• ${p.nombre}${labelOf} — *${precioFinal}*${precioAntes ? ` ~(antes ${fmt(p.precioVenta)})~` : ''}`);
        }
      }
    }
  }

  // Footer según modo
  const footer = mode === 'grupo'
    ? '\n\n📦 *Hacemos pedidos a domicilio*\n💬 Consultá por WhatsApp\n⏰ Ofertas por tiempo limitado'
    : '\n\n📦 Pedidos por WhatsApp';

  return header + lines.join('\n') + footer;
}

// ============================================================

function on(id, fn) { const el = document.getElementById(id); if (el) el.onclick = fn; }

on('btn-copy', async () => {
  const txt = generateText(currentMode);
  try {
    await navigator.clipboard.writeText(txt);
    toast('📋 Texto copiado al portapapeles');
  } catch {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    toast('📋 Texto copiado');
  }
});

on('btn-wa', () => {
  if (!selectedIds.size) { toast('⚠️ Seleccioná al menos un producto'); return; }
  const txt = generateText(currentMode);
  const url = 'https://wa.me/?text=' + encodeURIComponent(txt);
  window.open(url, '_blank');
});

on('btn-dl', async () => {
  const prods = getSelectedProducts();
  if (!prods.length) { toast('⚠️ Sin imágenes para descargar'); return; }

on('btn-collage', () => {

document.getElementById('layout-estilo-row').onclick = e => {

  if (!btn) return;

// Wrapper que elige variante de drawSingle según layout Y aplica formato
async function drawSingleLayout(p, layout) {
  if (!p) return;
  const fmt_size = _singleFormat || { w:1080, h:1080 };
  if (layout === 'clasico')    return drawSingleFmt(p, fmt_size.w, fmt_size.h);
  if (layout === 'expandido')  return drawSingleExpandidoFmt(p, fmt_size.w, fmt_size.h);
  if (layout === 'h2')         return drawSingleH2Fmt(p, fmt_size.w, fmt_size.h);
  if (layout === 'v2')         return drawSingleV2Fmt(p, fmt_size.w, fmt_size.h);
  return drawSingleFmt(p, fmt_size.w, fmt_size.h);
}

// Alias para compatibilidad
async function drawSingle(p) { return drawSingleFmt(p, 1080, 1080); }

// ── LAYOUT EXPANDIDO — foto ocupa casi todo, texto superpuesto abajo ──
async function drawSingleExpandidoFmt(p, W=1080, H=1080) {
  const cvs = document.getElementById('collage-canvas');
  cvs.width=W; cvs.height=H;
  const ctx = cvs.getContext('2d');
  const oferta = calcularOferta(p);
  const badgeColor = BADGE_COLORS[p.catOferta] || null;

  // Foto ocupa TODO el canvas (cover)
  try {
    const img = await loadImg(getImgUrl(p));
    const scale = Math.max(W/img.width, H/img.height);
    const dw=img.width*scale, dh=img.height*scale;
    ctx.drawImage(img, (W-dw)/2, (H-dh)/2, dw, dh);
  } catch {
    const grd=ctx.createLinearGradient(0,0,W,H);
    grd.addColorStop(0,'#1a3a16'); grd.addColorStop(1,'#2d5a22');
    ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
  }

  // Overlay gradiente abajo
  const ovH = 340;
  const ov = ctx.createLinearGradient(0, H-ovH, 0, H);
  ov.addColorStop(0,'rgba(0,0,0,0)'); ov.addColorStop(1,'rgba(0,0,0,.85)');
  ctx.fillStyle=ov; ctx.fillRect(0,H-ovH,W,ovH);

  // Badge arriba izquierda
  if (oferta && badgeColor) {
    ctx.fillStyle=badgeColor; ctx.beginPath();
    ctx.roundRect(16,16,300,48,10); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 24px Segoe UI'; ctx.textAlign='left';
    ctx.fillText(oferta.etiqueta.toUpperCase(), 28, 48);
  }
  // Logo tienda arriba derecha
  ctx.fillStyle='rgba(0,0,0,.5)'; ctx.beginPath();
  ctx.roundRect(W-240,16,224,48,10); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 18px Segoe UI'; ctx.textAlign='center';
  ctx.fillText('🛒 ALMACÉN COPIHUE', W-128, 47);

  // Nombre
  ctx.fillStyle='#fff'; ctx.font='bold 42px Segoe UI'; ctx.textAlign='center';
  wrapText(ctx, p.nombre, W/2, H-ovH+80, W-60, 48, 2);

  // Precio
  if (oferta && oferta.precio) {
    ctx.fillStyle='rgba(255,255,255,.6)'; ctx.font='28px Segoe UI';
    const antes=fmt(p.precioVenta);
    ctx.fillText(antes, W/2, H-120);
    const tw=ctx.measureText(antes).width;
    ctx.beginPath(); ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=2;
    ctx.moveTo(W/2-tw/2,H-132); ctx.lineTo(W/2+tw/2,H-132); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 64px Segoe UI';
    ctx.fillText(fmt(oferta.precio), W/2, H-52);
  } else {
    ctx.fillStyle='#fff'; ctx.font='bold 64px Segoe UI'; ctx.textAlign='center';
    ctx.fillText(fmt(p.precioVenta), W/2, H-52);
  }
}

// ── LAYOUT HORIZONTAL 2 — si hay 2+ productos, los muestra lado a lado ──
async function drawSingleH2Fmt(p, W=1080, H=600) {
  const prods = _collageProds.slice(_singleIdx, _singleIdx+2);
  if (prods.length < 2) return drawSingleFmt(p, W, H);
  const cvs = document.getElementById('collage-canvas');
  cvs.width=W; cvs.height=H;
  const ctx = cvs.getContext('2d');
  const grd=ctx.createLinearGradient(0,0,W,H);
  grd.addColorStop(0,'#1a3a16'); grd.addColorStop(1,'#2d5a22');
  ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
  // Header
  ctx.fillStyle='rgba(0,0,0,.3)'; ctx.fillRect(0,0,W,50);
  ctx.fillStyle='#fff'; ctx.font='bold 22px Segoe UI'; ctx.textAlign='center';
  ctx.fillText('🛒 ALMACÉN COPIHUE', W/2, 34);
  // 2 cards lado a lado
  const PAD=10, HDRH=50, FTRH=40;
  const cw=Math.floor((W-PAD*3)/2), ch=H-HDRH-FTRH-PAD*2;
  for (let i=0;i<2;i++) {
    await drawProductCard(ctx, prods[i], PAD+i*(cw+PAD), HDRH+PAD, cw, ch);
  }
  ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(0,H-FTRH,W,FTRH);
  ctx.fillStyle='#fff'; ctx.font='bold 16px Segoe UI'; ctx.textAlign='center';
  ctx.fillText('📦 Pedidos por WhatsApp', W/2, H-FTRH+26);
}

// ── LAYOUT VERTICAL 2 — 2 productos apilados ──
async function drawSingleV2Fmt(p, W=1080, H=1080) {
  const prods = _collageProds.slice(_singleIdx, _singleIdx+2);
  if (prods.length < 2) return drawSingleFmt(p, W, H);
  const cvs = document.getElementById('collage-canvas');
  cvs.width=W; cvs.height=H;
  const ctx = cvs.getContext('2d');
  const grd=ctx.createLinearGradient(0,0,W,H);
  grd.addColorStop(0,'#1a3a16'); grd.addColorStop(1,'#2d5a22');
  ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,.3)'; ctx.fillRect(0,0,W,50);
  ctx.fillStyle='#fff'; ctx.font='bold 22px Segoe UI'; ctx.textAlign='center';
  ctx.fillText('🛒 ALMACÉN COPIHUE', W/2, 34);
  const PAD=10, HDRH=50, FTRH=40;
  const cw=W-PAD*2, ch=Math.floor((H-HDRH-FTRH-PAD*3)/2);
  for (let i=0;i<2;i++) {
    await drawProductCard(ctx, prods[i], PAD, HDRH+PAD+i*(ch+PAD), cw, ch);
  }
  ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(0,H-FTRH,W,FTRH);
  ctx.fillStyle='#fff'; ctx.font='bold 16px Segoe UI'; ctx.textAlign='center';
  ctx.fillText('📦 Pedidos por WhatsApp', W/2, H-FTRH+26);
}

// ── HELPERS CANVAS ──────────────────────────────────────────────
function loadImg(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => res(img);
    img.onerror = () => rej(new Error('img error'));
    img.src = src;
    setTimeout(() => rej(new Error('timeout')), 5000);
  });
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}
function wrapText(ctx, text, x, y, maxW, lineH, maxLines) {
  const words = text.split(' ');
  let line = '';
  let lines = [];
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line);
  lines = lines.slice(0, maxLines);
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineH));
  return lines.length;
}

// Dibuja una tarjeta de producto en el canvas con badge y precio oferta
// Cuenta cuántas líneas ocupa un texto sin dibujarlo
function countLines(ctx, text, maxW) {
  const words = text.split(' ');
  let line = '', lines = 1;
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) { line = w; lines++; }
    else line = test;
  }
  return lines;
}

async function drawProductCard(ctx, p, x, y, W, H) {
  const _esSinOferta = p._sinOferta === true;
  const oferta = calcularOferta(p);
  const badgeColor = BADGE_COLORS[p.catOferta] || null;
  const tieneOfertaPrecio = oferta && oferta.precio && !_esSinOferta;

  // ── Medir nombre ANTES de dibujar para saber cuántas líneas ocupa ──
  const FS_NOMBRE = Math.max(W * 0.054, 10);
  const LH_NOMBRE = FS_NOMBRE * 1.28;
  ctx.font = `bold ${FS_NOMBRE}px Segoe UI`;
  const nLinesNombre = Math.min(countLines(ctx, p.nombre, W - 14), 2);

  // Zonas fijas según contenido
  const NOMBRE_H  = LH_NOMBRE * nLinesNombre + 6;
  const FS_ANTES  = Math.max(W * 0.044, 9);
  const FS_OFERTA = Math.max(W * 0.068, 12);
  const FS_PRECIO = Math.max(W * 0.070, 12);
  const PRECIO_H  = tieneOfertaPrecio
    ? FS_ANTES + 4 + FS_OFERTA + 6   // tachado + oferta
    : FS_PRECIO + 6;                  // precio normal
  const PAD_V    = 8;
  const TEXTH    = PAD_V + NOMBRE_H + PRECIO_H + PAD_V;
  const IMGH     = H - TEXTH;

  // ── Fondo blanco ──
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.15)'; ctx.shadowBlur = 8;
  ctx.fillStyle = '#ffffff';
  roundRect(ctx, x, y, W, H, 14); ctx.fill();
  ctx.restore();

  // ── Marco de color ──
  if (!_esSinOferta && badgeColor) {
    ctx.save();
    ctx.strokeStyle = badgeColor; ctx.lineWidth = 4;
    roundRect(ctx, x+2, y+2, W-4, H-4, 12); ctx.stroke();
    ctx.restore();
  } else if (_esSinOferta) {
    ctx.save();
    ctx.strokeStyle = '#cccccc'; ctx.lineWidth = 2;
    roundRect(ctx, x+2, y+2, W-4, H-4, 12); ctx.stroke();
    ctx.restore();
  }

  // ── Imagen ──
  try {
    const img = await loadImg(getImgUrl(p));
    ctx.save();
    roundRect(ctx, x, y, W, IMGH, 14); ctx.clip();
    ctx.drawImage(img, x, y, W, IMGH);
    ctx.restore();
  } catch {
    ctx.fillStyle = '#e8f0e5'; ctx.fillRect(x, y, W, IMGH);
    ctx.fillStyle = '#bbb';
    ctx.font = `${W * 0.22}px serif`; ctx.textAlign = 'center';
    ctx.fillText(getCatEmoji(p.categoria), x + W/2, y + IMGH/2 + W*0.08);
  }

  // ── Badge encima de la imagen ──
  if (oferta && badgeColor && !_esSinOferta) {
    ctx.fillStyle = badgeColor;
    ctx.fillRect(x, y, W, 26);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.max(W*0.052, 10)}px Segoe UI`; ctx.textAlign = 'center';
    ctx.fillText(oferta.etiqueta.toUpperCase(), x + W/2, y + 18);
  }

  // ── ZONA DE TEXTO ──
  const txtY = y + IMGH + PAD_V;
  const mx = x + W/2;

  // Nombre (ya medido arriba, ahora dibujar)
  ctx.fillStyle = '#1a2e17';
  ctx.font = `bold ${FS_NOMBRE}px Segoe UI`;
  ctx.textAlign = 'center';
  wrapText(ctx, p.nombre, mx, txtY + LH_NOMBRE * 0.85, W - 14, LH_NOMBRE, 2);
  const afterName = txtY + NOMBRE_H;

  // Precio
  if (tieneOfertaPrecio) {
    // Tachado
    ctx.fillStyle = '#888888';
    ctx.font = `${FS_ANTES}px Segoe UI`; ctx.textAlign = 'center';
    const antesStr = fmt(p.precioVenta);
    const ty_a = afterName + FS_ANTES;
    ctx.fillText(antesStr, mx, ty_a);
    const tw = ctx.measureText(antesStr).width;
    ctx.beginPath();
    ctx.strokeStyle = '#777'; ctx.lineWidth = Math.max(W * 0.008, 1.5);
    ctx.moveTo(mx - tw/2, ty_a - FS_ANTES*0.35);
    ctx.lineTo(mx + tw/2, ty_a - FS_ANTES*0.35); ctx.stroke();
    // Precio oferta
    ctx.fillStyle = badgeColor || '#c0392b';
    ctx.font = `bold ${FS_OFERTA}px Segoe UI`;
    ctx.fillText(fmt(oferta.precio), mx, ty_a + FS_OFERTA + 2);
  } else {
    ctx.fillStyle = '#2d5a22';
    ctx.font = `bold ${FS_PRECIO}px Segoe UI`; ctx.textAlign = 'center';
    ctx.fillText(fmt(p.precioVenta), mx, afterName + FS_PRECIO);
  }
}

// ── MODO COLLAGE — hasta 3x4=12 productos, canvas 1080x1080 ────────
async function drawCollage(prods) {
  const n = Math.min(prods.length, 12);

  // Layout: hasta 12 productos en 3 cols × hasta 4 filas
  // Para menos de 4 usamos 2 cols para que las tarjetas sean más grandes
  const cols = n <= 2 ? 1 : n <= 4 ? 2 : 3;
  const rows = Math.ceil(n / cols);

  // Canvas siempre 1080x1080
  const CW = 1080, CH = 1080;
  const HDRH = 72, FTRH = 44;
  const PAD  = 8;
  const gridW = CW - PAD * (cols + 1);
  const gridH = CH - HDRH - FTRH - PAD * (rows + 1);
  const CARD_W = Math.floor(gridW / cols);
  const CARD_H = Math.floor(gridH / rows);

  const cvs = document.getElementById('collage-canvas');
  cvs.width = CW; cvs.height = CH;
  const ctx = cvs.getContext('2d');

  // BG
  const grd = ctx.createLinearGradient(0,0,CW,CH);
  grd.addColorStop(0,'#1a3a16'); grd.addColorStop(1,'#2d5a22');
  ctx.fillStyle = grd; ctx.fillRect(0,0,CW,CH);

  // Header dinámico
  const tiposEnCollage = [...new Set(prods.slice(0,n).map(p=>p.catOferta).filter(Boolean))];
  const titleMap = {
    relampago:'⚡ OFERTAS RELÁMPAGO', ultimas:'🏷️ ÚLTIMAS UNIDADES',
    destacado:'🔥 DESTACADOS', especial:'💜 ESPECIALES',
    promo:'🏷️ PROMOS', combo:'🎯 COMBOS'
  };
  const collageTitle = tiposEnCollage.length === 1 && titleMap[tiposEnCollage[0]]
    ? titleMap[tiposEnCollage[0]]
    : tiposEnCollage.length > 1 ? '🔥 OFERTAS DEL DÍA' : '🛒 PRODUCTOS DESTACADOS';
  const hdrColorMap = { relampago:'#c0392b', ultimas:'#d35400', destacado:'#d68910',
    especial:'#6c3483', promo:'#6c3483', combo:'#bf360c' };
  const hdrColor = hdrColorMap[tiposEnCollage[0]] || '#1a3a16';
  ctx.fillStyle = hdrColor; ctx.fillRect(0,0,CW,HDRH);
  ctx.fillStyle='#fff'; ctx.font='bold 26px Segoe UI'; ctx.textAlign='center';
  ctx.fillText('🛒 ALMACÉN COPIHUE', CW/2, 30);
  ctx.font='bold 18px Segoe UI'; ctx.fillStyle='rgba(255,255,255,.95)';
  ctx.fillText(collageTitle, CW/2, 56);

  // Cards
  for (let i = 0; i < n; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = PAD + col * (CARD_W + PAD);
    const y = HDRH + PAD + row * (CARD_H + PAD);
    await drawProductCard(ctx, prods[i], x, y, CARD_W, CARD_H);
  }

  // Footer
  ctx.fillStyle = 'rgba(0,0,0,.4)'; ctx.fillRect(0, CH-FTRH, CW, FTRH);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText('📦 Hacemos pedidos  •  💬 Consultas por WhatsApp', CW/2, CH-FTRH+28);
}

// ── MODO 1 FOTO ──────────────────────────────────────────────────
async function drawSingleFmt(p, W=1080, H=1080) {
  if (!p) return;
  const cvs = document.getElementById('collage-canvas');
  cvs.width=W; cvs.height=H;
  const ctx = cvs.getContext('2d');

  const oferta = calcularOferta(p);
  const badgeColor = BADGE_COLORS[p.catOferta] || null;
  const tieneOfertaPrecio = oferta && oferta.precio;

  // BG degradado según tipo
  const bgColors = { relampago:['#7b1212','#c0392b'], ultimas:['#7d3700','#d35400'],
    destacado:['#6b4200','#d68910'], especial:['#3b1a6b','#6c3483'],
    promo:['#4a0e6b','#7b1fa2'], combo:['#5d1800','#bf360c'] };
  const [c1,c2] = bgColors[p.catOferta] || ['#1a3a16','#2d5a22'];
  const grd=ctx.createLinearGradient(0,0,W,H);
  grd.addColorStop(0,c1); grd.addColorStop(1,c2);
  ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);

  // ── Zonas ──
  const HDRH = 80;   // header tienda
  const BADGEH = oferta ? 54 : 0;  // badge oferta
  const NAMEH = 80;  // nombre 2 líneas
  const PRICEH = tieneOfertaPrecio ? 100 : 72; // precio (con tachado o sin)
  const FTRH = 60;
  const IMGH = H - HDRH - BADGEH - NAMEH - PRICEH - FTRH;
  const IMGPAD = 24; // margen interno de la imagen

  // Header
  const hdrColor = badgeColor || '#1a3a16';
  ctx.fillStyle = hdrColor; ctx.fillRect(0,0,W,HDRH);
  ctx.fillStyle='#fff'; ctx.font='bold 30px Segoe UI'; ctx.textAlign='center';
  ctx.fillText('🛒 ALMACÉN COPIHUE', W/2, 52);

  // Badge oferta
  let curY = HDRH;
  if (oferta && badgeColor) {
    ctx.fillStyle = badgeColor; ctx.fillRect(0, curY, W, BADGEH);
    ctx.fillStyle='#fff'; ctx.font='bold 28px Segoe UI'; ctx.textAlign='center';
    ctx.fillText(oferta.etiqueta.toUpperCase(), W/2, curY+36);
    curY += BADGEH;
  }

  // Imagen con margen interno — usa contain para que no se corte
  const imgAreaY = curY;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(IMGPAD, imgAreaY + IMGPAD, W - IMGPAD*2, IMGH - IMGPAD*2);
  try {
    const img = await loadImg(getImgUrl(p));
    // contain: escalar manteniendo ratio dentro del área con padding
    const areaW = W - IMGPAD*4, areaH = IMGH - IMGPAD*4;
    const scale = Math.min(areaW/img.width, areaH/img.height);
    const dw = img.width*scale, dh = img.height*scale;
    const dx = (W-dw)/2, dy = imgAreaY + IMGPAD*2 + (areaH-dh)/2;
    ctx.drawImage(img, dx, dy, dw, dh);
  } catch {
    ctx.fillStyle='#e8f0e5'; ctx.fillRect(IMGPAD, imgAreaY+IMGPAD, W-IMGPAD*2, IMGH-IMGPAD*2);
    ctx.fillStyle='#aaa'; ctx.font=`160px serif`; ctx.textAlign='center';
    ctx.fillText(getCatEmoji(p.categoria), W/2, imgAreaY+IMGH/2+50);
  }
  curY += IMGH;

  // Nombre — sobre fondo blanco
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, curY, W, NAMEH);
  ctx.fillStyle = '#1a2e17'; ctx.font = 'bold 32px Segoe UI'; ctx.textAlign='center';
  wrapText(ctx, p.nombre, W/2, curY+28, W-40, 36, 2);
  curY += NAMEH;

  // Precio
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, curY, W, PRICEH);
  const mx = W/2;
  if (tieneOfertaPrecio) {
    // Precio anterior tachado
    ctx.fillStyle='#888'; ctx.font='28px Segoe UI'; ctx.textAlign='center';
    const antes = fmt(p.precioVenta);
    const ty_a = curY + 36;
    ctx.fillText(antes, mx, ty_a);
    const tw = ctx.measureText(antes).width;
    ctx.beginPath(); ctx.strokeStyle='#888'; ctx.lineWidth=2.5;
    ctx.moveTo(mx-tw/2, ty_a-10); ctx.lineTo(mx+tw/2, ty_a-10); ctx.stroke();
    // Precio oferta grande
    ctx.fillStyle = badgeColor||'#c0392b'; ctx.font='bold 56px Segoe UI';
    ctx.fillText(fmt(oferta.precio), mx, curY+88);
  } else {
    ctx.fillStyle='#2d5a22'; ctx.font='bold 56px Segoe UI'; ctx.textAlign='center';
    ctx.fillText(fmt(p.precioVenta), mx, curY+58);
  }
  curY += PRICEH;

  // Footer
  ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(0,curY,W,FTRH);
  ctx.fillStyle='#fff'; ctx.font='bold 22px Segoe UI'; ctx.textAlign='center';
  ctx.fillText('📦 Pedidos por WhatsApp', W/2, curY+38);
}

// ── MODO HISTORIA 1080x1920 ──────────────────────────────────────
async function drawHistoria(prods) {
  const n=Math.min(prods.length, 6), cols=n<=4?2:3, rows=Math.ceil(n/cols);
  const W=1080, H=1920;
  const CARD=Math.floor((W-60-(cols-1)*12)/cols);
  const startY=260;
  const cvs = document.getElementById('historia-canvas');
  cvs.width=W; cvs.height=H; cvs.style.display='block';
  const ctx=cvs.getContext('2d');

  // BG
  const grd=ctx.createLinearGradient(0,0,W,H);
  grd.addColorStop(0,'#0f2b0b'); grd.addColorStop(1,'#1a3a16');
  ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);

  // Header dinámico
  const _tiposH = [...new Set(prods.map(p=>p.catOferta).filter(Boolean))];
  const _titleH = { relampago:'⚡ OFERTAS RELÁMPAGO', ultimas:'🏷️ ÚLTIMAS UNIDADES',
    destacado:'🔥 DESTACADOS', especial:'💜 ESPECIALES', promo:'🏷️ PROMOS', combo:'🎯 COMBOS' };
  const _hTitulo = _tiposH.length===1 && _titleH[_tiposH[0]] ? _titleH[_tiposH[0]] : '🔥 OFERTAS DEL DÍA';
  const _hColorMap = { relampago:'#c0392b', ultimas:'#d35400', destacado:'#d68910',
    especial:'#6c3483', promo:'#6c3483', combo:'#bf360c' };
  ctx.fillStyle = _hColorMap[_tiposH[0]] || '#0f2b0b';
  ctx.fillRect(0,0,W,220);
  ctx.fillStyle='#fff'; ctx.font='bold 64px Segoe UI'; ctx.textAlign='center';
  ctx.fillText('🛒 ALMACÉN COPIHUE', W/2, 100);
  ctx.font='bold 44px Segoe UI'; ctx.fillStyle='rgba(255,255,255,.95)';
  ctx.fillText(_hTitulo, W/2, 170);

  for (let i=0;i<n;i++) {
    const col=i%cols, row=Math.floor(i/cols);
    const x=30+col*(CARD+12), y=startY+row*(CARD+12);
    await drawProductCard(ctx, prods[i], x, y, CARD, CARD);
  }

  // Footer WA
  ctx.fillStyle='#25D366'; ctx.fillRect(0,H-150,W,150);
  ctx.fillStyle='#fff'; ctx.font='bold 52px Segoe UI'; ctx.textAlign='center';
  ctx.fillText('📲 Pedidos por WhatsApp', W/2, H-80);
  ctx.font='36px Segoe UI';
  ctx.fillText('Almacén Copihue', W/2, H-30);

  // Mostrar en canvas principal también (preview)
  const cvs2=document.getElementById('collage-canvas');
  const scale=Math.min(700/W, 700/H);
  cvs2.width=Math.round(W*scale); cvs2.height=Math.round(H*scale);
  const ctx2=cvs2.getContext('2d');
  ctx2.drawImage(cvs, 0,0, cvs2.width, cvs2.height);
}

on('btn-clear-sel', () => {
  if (!selectedIds.size) { toast('No hay productos seleccionados'); return; }
  selectedIds.clear(); selectionOrder = [];
  renderGrid();
  toast('🗑️ Selección limpiada');
});

on('btn-ia-suggest', async () => {
  if (!selectedIds.size) {
    // Auto-seleccionar mejores según prioridad
    const best = allProducts
      .filter(p => p.catOferta && p.stock > 0)
      .sort((a,b) => (PRIORITY_ORDER[a.catOferta]||6) - (PRIORITY_ORDER[b.catOferta]||6))
      .slice(0, currentMode === 'estado' ? 12 : 20);
    selectedIds.clear(); selectionOrder = [];
    best.forEach(p => { selectedIds.add(p.id); selectionOrder.push(p.id); });
    toast(`✨ IA seleccionó ${best.length} productos sugeridos`);
    renderGrid();
    return;
  }

  // Re-ordenar seleccionados por prioridad + variedad
  const prods = getSelectedProducts();
  const reordered = interleavedSort(sortProducts(prods, 'estado'));
  selectionOrder = reordered.map(p => p.id);
  toast('✨ Secuencia optimizada por IA');
  renderGrid();
});

  localStorage.setItem('sendwa_theme', isDark ? 'light' : 'dark');
};
if (stored === 'dark') document.getElementById('btn-dark').textContent = '☀️';

// ============================================================
// RECENT SELECTION
// ============================================================
function saveRecent() {
  localStorage.setItem('sendwa_recent', JSON.stringify([...selectedIds].slice(0, 50)));
}

// ============================================================
// CATEGORÍAS DINÁMICAS EN FILTROS
// ============================================================
function buildCategoryFilters() {
  const cats = [...new Set(allProducts.map(p => p.categoria).filter(Boolean))].sort();
  const container = document.getElementById('cat-chips-container');
  if (!container) return;
  container.innerHTML = '';
  for (const cat of cats) {
    const btn = document.createElement('button');
    btn.className = 'filter-chip cat-chip';
    btn.dataset.filter = norm(cat);
    btn.textContent = getCatEmoji(cat) + ' ' + cat;
    container.appendChild(btn);
  }
}

// ============================================================
// INIT
// ============================================================
window.toggleSelect = toggleSelect; // expose to onclick

// Botón atrás del celular — evitar salir de la app
history.pushState({ sendwa: true }, '', location.href);
window.addEventListener('popstate', (e) => {
  // Si hay modal de collage abierto, cerrarlo
  if (document.getElementById('collage-modal').classList.contains('open')) {
    document.getElementById('collage-modal').classList.remove('open');
    history.pushState({ sendwa: true }, '', location.href);
    return;
  }
  // Si hay selección activa, limpiarla
  if (selectedIds.size > 0) {
    selectedIds.clear(); selectionOrder = [];
    renderGrid();
    toast('Selección limpiada');
    history.pushState({ sendwa: true }, '', location.href);
    return;
  }
  // Si hay filtro activo, volver a todos
  if (currentFilter !== 'todos' || currentSearch) {
    currentFilter = 'todos'; currentSearch = '';
    document.getElementById('search-input').value = '';
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    document.querySelector('.filter-chip[data-filter="todos"]').classList.add('active');
    applyFilter();
    history.pushState({ sendwa: true }, '', location.href);
    return;
  }
  // Ya en estado neutro — quedarse en la página
  history.pushState({ sendwa: true }, '', location.href);
});

async function init() {
  // Cargar productos Y pools en paralelo — igual que seba21
  const [data] = await Promise.all([fetchData(), cargarPools(), _cargarConfig()]);
  document.getElementById('loader').style.display = 'none';

  if (!data) {
    document.getElementById('grid').innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)">
        ❌ No se pudo conectar con el catálogo.<br>
        <small>Verificá tu conexión e intentá recargar.</small>
      </div>`;
    return;
  }

  applyUIColors(data);
  allProducts = parseProducts(data);

  if (!allProducts.length) {
    document.getElementById('grid').innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)">
        ⚠️ No se encontraron productos en el catálogo.
      </div>`;
    return;
  }

  buildCategoryFilters();

  // Restaurar selección reciente
  if (recentSelection.length) {
    recentSelection.forEach(id => {
      if (allProducts.find(p => String(p.id) === String(id))) {
        selectedIds.add(id);
        selectionOrder.push(id);
      }
    });
  }

  applyFilter();
  recalcLayout();
  window.addEventListener('resize', recalcLayout);
}

// Ajuste dinámico de layout cuando el panel cambia altura
const panelObs = new ResizeObserver(recalcLayout);
panelObs.observe(document.getElementById('header'));
panelObs.observe(document.getElementById('filters'));

init();
</script>
</body>
