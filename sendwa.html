<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SendWA — Almacén Copihue ver.22</title>
<style>
  /* ===== VARIABLES ===== */
  :root {
    --primary: #4a7c3f;
    --primary-dark: #2d5a22;
    --primary-light: #6fa860;
    --accent: #c0392b;
    --accent-light: #e74c3c;
    --gold: #f39c12;
    --bg: #f5f7f4;
    --card-bg: #ffffff;
    --text: #1a2e17;
    --text-muted: #5a7055;
    --border: #d4e4cf;
    --selected-border: #27ae60;
    --selected-bg: #eafaf1;
    --warning: #e67e22;
    --danger: #c0392b;
    --shadow: 0 2px 12px rgba(45,90,34,0.10);
    --radius: 12px;
    --badge-relampago: #e74c3c;
    --badge-destacado: #f39c12;
    --badge-especial: #8e44ad;
    --badge-promo: #27ae60;
    --badge-combo: #2980b9;
    --header-h: 56px;
    --panel-h: 110px;
  }
  [data-theme="dark"] {
    --bg: #111a0e;
    --card-bg: #1c2b18;
    --text: #e8f5e3;
    --text-muted: #8db885;
    --border: #2d4528;
    --selected-bg: #1a3d24;
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    -webkit-tap-highlight-color: transparent;
    transition: background .3s, color .3s;
  }
  button { cursor: pointer; border: none; background: none; font: inherit; }
  input, select { font: inherit; }

  /* ===== HEADER ===== */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: var(--header-h);
    background: var(--primary-dark);
    display: flex; align-items: center; gap: 10px;
    padding: 0 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  #header h1 {
    flex: 1; font-size: 17px; color: #fff; font-weight: 700;
  }
  #header h1 span { color: #a8d8a0; font-size: 12px; font-weight: 400; display: inline; }
  #header-stats { display: flex; gap: 8px; background: rgba(0,0,0,.2); padding: 4px 8px; border-radius: 20px; }
  .hstat { font-size: 10px; color: #fff; font-weight: 600; }
  #mode-select { background: rgba(255,255,255,.15); color: #fff; border: none; border-radius: 20px; padding: 4px 8px; font-size: 11px; font-weight: 600; }
  #ver-badge { background: rgba(255,255,255,.15); color: #fff; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 10px; }
  #btn-dark { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.12); color: #fff; font-size: 17px; display: flex; align-items: center; justify-content: center; }

  /* ===== FILTROS FLOATING ===== */
  #nav-fabs {
    position: fixed; right: 10px; top: 66px; z-index: 90;
    display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
  }
  .filter-fab {
    height: 32px; padding: 0 14px; border-radius: 16px;
    background: var(--primary-dark); color: #fff; border: none;
    font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  .filter-fab-icon { width: 32px; padding: 0; border-radius: 50%; font-size: 15px; }
  .filter-panel {
    display: none; position: fixed; z-index: 400;
    background: var(--card-bg); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 10px;
    box-shadow: 0 8px 28px rgba(0,0,0,.22);
    flex-direction: column; gap: 7px;
    max-width: 300px; max-height: 72vh; overflow-y: auto;
  }
  .filter-panel.open { display: flex; }
  .filter-panel-title { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
  .filter-chips-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
  .filter-chip {
    height: 28px; padding: 0 11px; border-radius: 14px;
    border: 1.5px solid var(--border); background: var(--bg); color: var(--text-muted);
    font-size: 11px; font-weight: 600; white-space: nowrap; cursor: pointer;
  }
  .filter-chip.active { background: var(--primary); border-color: var(--primary); color: #fff; }

  /* Search overlay */
  #search-overlay {
    display: none; position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,.5); align-items: flex-start; justify-content: center;
    padding-top: calc(var(--header-h) + 10px);
  }
  #search-overlay.open { display: flex; }
  #search-box { background: var(--card-bg); border-radius: 14px; padding: 12px; width: 92%; max-width: 480px; }
  #search-input { width: 100%; height: 38px; padding: 0 12px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--bg); color: var(--text); }
  #btn-search-close { height: 38px; padding: 0 14px; border-radius: 9px; background: var(--accent); color: #fff; font-weight: 700; }

  #warn-msg {
    display: none; position: fixed; top: calc(var(--header-h) + 44px); left: 50%;
    transform: translateX(-50%); z-index: 150; background: var(--warning); color: #fff;
    font-size: 11px; padding: 3px 12px; border-radius: 10px; white-space: nowrap;
  }
  #warn-msg.show { display: block; }

  /* Main */
  #main { padding: 0 8px 80px 8px; }
  #grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  @media (min-width: 768px) {
    #grid { grid-template-columns: repeat(6, 1fr); gap: 8px; }
    #main { padding: 0 20px 80px 20px; }
  }
  @media (min-width: 1200px) {
    #grid { grid-template-columns: repeat(8, 1fr); }
  }

  /* Separadores */
  .separator-card {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    border-radius: 10px; padding: 8px 14px;
    color: #fff; font-weight: 700; font-size: 13px;
    margin: 4px 0; text-align: center;
  }

  /* Tarjeta producto */
  .prod-card {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: border-color .15s, transform .1s;
  }
  .prod-card.selected { border-color: var(--selected-border); background: var(--selected-bg); transform: scale(.97); }
  .prod-card .card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #e8f0e5; display: block; }
  .card-img-placeholder { width: 100%; aspect-ratio: 1/1; background: #e8f0e5; display: flex; align-items: center; justify-content: center; font-size: 28px; display: none; }
  .card-body { padding: 5px 6px 7px; }
  .card-name { font-size: 11px; font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-cat { font-size: 9.5px; color: var(--text-muted); margin-top: 1px; text-transform: uppercase; }
  .card-price { font-size: 13px; font-weight: 700; color: var(--primary-dark); margin-top: 3px; }
  .card-price-oferta { margin-top: 3px; }
  .price-antes { font-size: 10px; color: var(--text-muted); text-decoration: line-through; display: block; }
  .price-oferta { font-size: 13px; font-weight: 800; display: block; }
  .card-check { position: absolute; top: 5px; right: 5px; width: 22px; height: 22px; border-radius: 50%; background: var(--selected-border); color: #fff; font-size: 13px; font-weight: 700; display: none; align-items: center; justify-content: center; }
  .prod-card.selected .card-check { display: flex; }
  .card-order { position: absolute; top: 5px; left: 5px; width: 20px; height: 20px; border-radius: 50%; background: var(--primary-dark); color: #fff; font-size: 10px; font-weight: 700; display: none; align-items: center; justify-content: center; }
  .prod-card.selected .card-order { display: flex; }
  .badge-oferta { display: block; width: 100%; padding: 3px 6px; font-size: 9px; font-weight: 800; text-align: center; color: #fff; text-transform: uppercase; }
  .badge-relampago { background: #e74c3c; }
  .badge-destacado { background: #f39c12; }
  .badge-especial { background: #8e44ad; }
  .badge-promo { background: #27ae60; }
  .badge-combo { background: #2980b9; }
  .badge-ultimas { background: #e67e22; }
  .prod-card.sin-stock .card-img { filter: grayscale(60%) opacity(.7); }
  .badge-sin-stock { position: absolute; top: 0; left: 0; right: 0; background: rgba(0,0,0,.55); color: #fff; font-size: 9px; text-align: center; padding: 2px; }

  /* Botones flotantes */
  #sel-fab { position: fixed; bottom: 48px; left: 10px; z-index: 150; display: flex; flex-direction: column; gap: 6px; }
  .sel-btn { height: 36px; padding: 0 13px; border-radius: 18px; font-size: 13px; font-weight: 800; box-shadow: 0 3px 10px rgba(0,0,0,.2); }
  #btn-sel-todo { background: var(--primary); color: #fff; }
  #btn-sel-add { background: #27ae60; color: #fff; width: 36px; padding: 0; border-radius: 50%; font-size: 18px; }
  #btn-sel-remove { background: #c0392b; color: #fff; width: 36px; padding: 0; border-radius: 50%; font-size: 18px; }

  #tools-fab { position: fixed; bottom: 48px; right: 10px; z-index: 150; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  #tools-toggle { width: 46px; height: 46px; border-radius: 50%; background: var(--primary-dark); color: #fff; font-size: 20px; box-shadow: 0 4px 16px rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; }
  #tools-toggle.open { background: #c0392b; }
  #tools-panel { display: none; flex-direction: column; align-items: flex-end; gap: 5px; }
  #tools-panel.open { display: flex; }
  .tool-btn { height: 34px; padding: 0 14px; border-radius: 17px; font-size: 12px; font-weight: 700; box-shadow: 0 3px 10px rgba(0,0,0,.2); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .tool-btn.t-green { background: var(--primary); color: #fff; }
  .tool-btn.t-blue { background: #2980b9; color: #fff; }
  .tool-btn.t-red { background: var(--accent); color: #fff; }
  .tool-btn.t-orange { background: var(--warning); color: #fff; }
  .tool-btn.t-dark { background: #333; color: #fff; }

  #bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--card-bg); border-top: 1px solid var(--border);
    padding: 8px 12px; display: flex; justify-content: center;
  }
  #action-btns { display: flex; align-items: center; gap: 8px; }

  /* Loader */
  #loader {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  }
  .loader-logo { font-size: 48px; animation: bounce .8s infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }

  #toast {
    position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
    background: #222; color: #fff; padding: 8px 16px; border-radius: 20px;
    font-size: 12px; font-weight: 600; opacity: 0; transition: opacity .2s; z-index: 300;
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  #collage-modal {
    display: none; position: fixed; inset: 0; z-index: 400;
    background: rgba(0,0,0,.7); align-items: flex-end; justify-content: center;
  }
  #collage-modal.open { display: flex; }
  #collage-sheet {
    background: var(--card-bg); border-radius: 20px 20px 0 0;
    width: 100%; max-height: 90vh; overflow-y: auto; padding: 20px 16px 30px;
  }
  #collage-canvas { max-width: 100%; max-height: 60vh; border-radius: 10px; display: block; margin: 0 auto; }
  #btn-modal-close-x { position: fixed; top: 12px; right: 12px; width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,.7); color: #fff; font-size: 22px; display: none; align-items: center; justify-content: center; }
  #collage-modal.open #btn-modal-close-x { display: flex; }
  #collage-mode-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .collage-tab { flex: 1; padding: 7px; border-radius: 8px; font-size: 12px; font-weight: 700; border: 2px solid var(--border); background: var(--bg); color: var(--text-muted); }
  .collage-tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }
  #single-picker { display: none; margin-bottom: 10px; overflow-x: auto; white-space: nowrap; }
  #single-layout-bar { display: none; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  #single-layout-bar.show { display: flex; }
  .layout-row { display: flex; gap: 5px; overflow-x: auto; }
  .layout-btn { padding: 6px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; border: 2px solid var(--border); background: var(--bg); white-space: nowrap; }
  .layout-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
  .single-thumb { display: inline-flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px; border-radius: 8px; border: 2px solid var(--border); background: var(--card-bg); min-width: 70px; }
  .single-thumb.active { border-color: var(--selected-border); }
  .single-thumb img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }
  #collage-actions { display: flex; gap: 8px; margin-top: 10px; }
  #collage-actions button { flex: 1; height: 42px; border-radius: 10px; font-weight: 700; }
  #btn-collage-dl { background: var(--primary); color: #fff; }
  #historia-canvas { display: none; }
  #empty-state { display: none; text-align: center; padding: 40px 20px; color: var(--text-muted); }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-logo">🛒</div>
  <div class="loader-txt">Cargando productos…</div>
</div>

<div id="header">
  <h1>📲 SendWA <span>Copihue</span></h1>
  <div id="header-stats">
    <span class="hstat" id="hstat-sel">✓ 0</span>
    <span class="hstat" id="hstat-size">0 MB</span>
  </div>
  <select id="mode-select">
    <option value="estado">📸 WA Estado</option>
    <option value="grupo">👥 WA Grupo</option>
    <option value="rapido">⚡ Lista rápida</option>
  </select>
  <div id="ver-badge">ver.22</div>
  <button id="btn-dark">🌙</button>
</div>

<div id="nav-fabs">
  <button class="filter-fab" id="fab-ofertas">🔥 Ofertas ▾</button>
  <button class="filter-fab" id="fab-cats">📦 Categorías ▾</button>
  <button class="filter-fab filter-fab-icon" id="fab-buscar">🔍</button>
</div>

<div class="filter-panel" id="panel-ofertas">
  <div class="filter-panel-title">Tipo de oferta</div>
  <div class="filter-chips-wrap">
    <button class="filter-chip" data-filter="oferta">🔥 Pool ofertas</button>
    <button class="filter-chip" data-filter="relampago">⚡ Relámpago</button>
    <button class="filter-chip" data-filter="destacado">🔥 Destacado</button>
    <button class="filter-chip" data-filter="especial">💜 Especial</button>
    <button class="filter-chip" data-filter="ultimas">🏷️ Últimas</button>
    <button class="filter-chip" data-filter="promo">🏷️ Promos</button>
    <button class="filter-chip" data-filter="combo">🎯 Combos</button>
    <button class="filter-chip" data-filter="sinoferta">✅ Sin oferta</button>
    <button class="filter-chip" data-filter="todos">📋 Todos</button>
  </div>
</div>

<div class="filter-panel" id="panel-cats">
  <div class="filter-panel-title">Categorías</div>
  <div class="filter-chips-wrap" id="cat-chips-container"></div>
</div>

<div id="search-overlay">
  <div id="search-box">
    <div style="display:flex;gap:8px;">
      <input type="search" id="search-input" placeholder="🔍 Buscar producto...">
      <button id="btn-search-close">✕</button>
    </div>
  </div>
</div>

<div id="warn-msg">⚠️ Demasiadas imágenes</div>

<div id="main">
  <div id="grid"></div>
  <div id="empty-state"><div class="empty-icon">🔍</div><p>No hay productos</p></div>
</div>

<div id="sel-fab">
  <button class="sel-btn" id="btn-sel-todo">☑️ Todo</button>
  <button class="sel-btn" id="btn-sel-add">＋</button>
  <button class="sel-btn" id="btn-sel-remove">－</button>
</div>

<div id="tools-fab">
  <div id="tools-panel">
    <button class="tool-btn t-green" id="btn-collage">🖼️ Collage</button>
    <button class="tool-btn t-blue" id="btn-wa">💬 WhatsApp</button>
    <button class="tool-btn t-blue" id="btn-copy">📋 Copiar</button>
    <button class="tool-btn t-orange" id="btn-dl">⬇️ Descargar</button>
    <button class="tool-btn t-dark" id="btn-ia-suggest">✨ IA Sugerir</button>
    <button class="tool-btn t-red" id="btn-clear-sel">🗑️ Limpiar</button>
  </div>
  <button id="tools-toggle">⚙️</button>
</div>

<div id="bottom-bar">
  <div id="action-btns">
    <span style="font-size:11px;font-weight:600;">✓ <span id="cnt-sel">0</span> · <span id="cnt-size-b">0</span> MB</span>
  </div>
</div>

<div id="toast"></div>

<div id="collage-modal">
  <button id="btn-modal-close-x">✕</button>
  <div id="collage-sheet">
    <div id="collage-mode-tabs">
      <button class="collage-tab active" data-cmode="collage">🖼️ Collage</button>
      <button class="collage-tab" data-cmode="single">📸 1 Foto</button>
    </div>
    <div id="single-picker">
      <div id="single-picker-list" style="display:flex;gap:8px;"></div>
    </div>
    <div id="single-layout-bar">
      <div class="layout-row" id="layout-estilo-row">
        <button class="layout-btn active" data-layout="clasico">📸 Clásico</button>
        <button class="layout-btn" data-layout="expandido">🔲 Expandido</button>
      </div>
      <div class="layout-row" id="layout-format-row">
        <button class="layout-btn active" data-format="1080x1080">1:1</button>
        <button class="layout-btn" data-format="1080x1350">4:5</button>
      </div>

    <canvas id="historia-canvas" width="1080" height="1920" style="display:none;"></canvas>
    <div id="collage-actions">
      <button id="btn-collage-dl">⬇️ Guardar</button>
      <button id="btn-collage-close">✕ Cerrar</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIGURACIÓN
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbzWZzDvdGfW8vd2-FpQolT852cdPMeHbfKugn9DBOlju75bE1D0SUNB5EKEDOsI2vP4lA/exec';

const BADGE_COLORS = {
  relampago: '#e74c3c', ultimas: '#e67e22', destacado: '#f39c12',
  especial: '#8e44ad', promo: '#27ae60', combo: '#2980b9'
};

const SEP_LABELS = {
  'bebidas': '🥤 BEBIDAS', 'limpieza': '🛒 LIMPIEZA', 'snacks': '🍪 SNACKS',
  'lacteos': '🥛 LÁCTEOS', 'carnes': '🥩 CARNES', 'frutas': '🍎 FRUTAS'
};

// OFERTAS RELÁMPAGO
const OFERTAS_RELAMPAGO = {
  '1': { nombre: '2x1', tipo: 'nxm', cantidad: 2, pagas: 1 },
  '2': { nombre: '3x2', tipo: 'nxm', cantidad: 3, pagas: 2 },
  '11': { nombre: '10% OFF', tipo: 'pct', descuento: 10 },
  '12': { nombre: '15% OFF', tipo: 'pct', descuento: 15 }
};

// Estado global
let allProducts = [];
let filteredProducts = [];
let selectedIds = new Set();
let selectionOrder = [];
let currentFilter = 'todos';
let currentSearch = '';
let currentMode = 'estado';

// Pools de ofertas
let poolRelampago = new Set();
let poolDestacadas = new Set();
let poolEspeciales = new Set();
let poolUltimas = new Set();
let poolUltimasData = new Map();

// ============================================================
// UTILIDADES
// ============================================================
function fmt(n) { return '$' + Number(n).toLocaleString('es-AR'); }
function norm(s) { return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }
function slugFoto(nombre) { return norm(nombre).replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-'); }
function getImgUrl(p) { return `imagenes-productos/${slugFoto(p.nombre)}.jpg`; }
function toast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2000); }

function getCatEmoji(cat) {
  const map = { bebidas:'🥤', limpieza:'🧹', snacks:'🍪', lacteos:'🥛', carnes:'🥩', frutas:'🍎' };
  return map[norm(cat)] || '🛍️';
}

// ============================================================
// OFERTAS - CÁLCULO
// ============================================================
function calcularOferta(p) {
  const precio = p.precioVenta;
  const cat = p.catOferta;
  if (!cat) return null;

  if (cat === 'relampago' && p.relampago) {
    const cfg = OFERTAS_RELAMPAGO[String(p.relampago)];
    if (cfg && cfg.tipo === 'pct') {
      return { precio: Math.round(precio * (1 - cfg.descuento / 100)), etiqueta: `⚡ ${cfg.nombre}` };
    } else if (cfg && cfg.tipo === 'nxm') {
      return { precio: null, etiqueta: `⚡ ${cfg.nombre.toUpperCase()}` };
    }
    return { precio: null, etiqueta: '⚡ RELÁMPAGO' };
  }
  if (cat === 'ultimas') {
    const ult = poolUltimasData.get(Number(p.id));
    if (ult && ult.precioOferta) {
      return { precio: ult.precioOferta, etiqueta: `🏷️ -${ult.pct || 10}% ÚLTIMAS` };
    }
    return { precio: Math.round(precio * 0.9), etiqueta: '🏷️ -10% ÚLTIMAS' };
  }
  if (cat === 'destacado' && p.destacada) {
    return { precio: Math.round(precio * (1 - p.destacada / 100)), etiqueta: `🔥 -${p.destacada}% OFF` };
  }
  if (cat === 'especial' && p.especial) {
    return { precio: Math.round(precio * 0.9), etiqueta: '💜 -10% ESPECIAL' };
  }
  if ((cat === 'promo' || cat === 'combo') && p.normal && p.normal < precio) {
    const pct = Math.round((1 - p.normal / precio) * 100);
    return { precio: p.normal, etiqueta: `${cat === 'combo' ? '🎯' : '🏷️'} ${cat.toUpperCase()} -${pct}%` };
  }
  return null;
}

// ============================================================
// FETCH DATA
// ============================================================
async function fetchAPI(action = '') {
  const url = action ? API_URL + '?action=' + action + '&t=' + Date.now() : API_URL + '?t=' + Date.now();
  const r = await fetch(url, { redirect: 'follow' });
  return r.json();
}

async function cargarPools() {
  try {
    const data = await fetchAPI('getOfertas');
    if (!data.success) return;
    poolRelampago.clear(); poolDestacadas.clear(); poolEspeciales.clear(); poolUltimas.clear(); poolUltimasData.clear();
    (data.relampagoActivo || []).forEach(p => poolRelampago.add(Number(p.id)));
    (data.destacadasActivas || []).forEach(p => poolDestacadas.add(Number(p.id)));
    (data.especialesActivas || []).forEach(p => poolEspeciales.add(Number(p.id)));
    (data.ultimasSeleccionadas || []).forEach(p => {
      poolUltimas.add(Number(p.id));
      poolUltimasData.set(Number(p.id), { precioOferta: p.precioOferta, pct: p.pct });
    });
    console.log(`Pools: ⚡${poolRelampago.size} 🔥${poolDestacadas.size} 💜${poolEspeciales.size} 🏷️${poolUltimas.size}`);
  } catch(e) { console.warn(e); }
}

async function fetchProductos() {
  const data = await fetchAPI();
  if (!data) return [];
  let rows = Array.isArray(data) ? data : Object.values(data).find(v => Array.isArray(v)) || [];
  return rows.filter(r => r && typeof r === 'object').map((r, i) => ({
    id: r.id || i,
    nombre: String(r.name || r.nombre || '').trim(),
    precioVenta: parseFloat(r.price || r.precio || 0),
    categoria: String(r.category || r.categoria || '').trim(),
    stock: parseFloat(r.stock ?? 1),
    foto: String(r.image || r.imagen || r.foto || '').trim(),
    vendidos: parseFloat(r.vendidos || 0),
    relampago: r.relampago ? (isNaN(parseInt(r.relampago)) ? String(r.relampago) : parseInt(r.relampago)) : 0,
    destacada: parseInt(r.destacada) || 0,
    especial: parseInt(r.especial) || 0,
    normal: parseFloat(r.normal || r.precioNormal || 0),
    catOferta: ''
  })).filter(p => p.nombre && p.precioVenta > 0);
}

// ============================================================
// RESOLVER OFERTAS
// ============================================================
function resolveOfertas(products) {
  return products.map(p => {
    const pid = Number(p.id);
    let catOferta = '';
    const rawCat = String(p._raw?.categoriaOferta || '').toUpperCase();
    if (rawCat === 'PROMO ACTIVA') catOferta = 'promo';
    else if (rawCat === 'COMBO ACTIVO') catOferta = 'combo';
    else if (poolRelampago.has(pid) && p.relampago) catOferta = 'relampago';
    else if (poolUltimas.has(pid)) catOferta = 'ultimas';
    else if (poolDestacadas.has(pid) && p.destacada) catOferta = 'destacado';
    else if (poolEspeciales.has(pid) && p.especial) catOferta = 'especial';
    return { ...p, catOferta };
  });
}

// ============================================================
// FILTRADO Y RENDER
// ============================================================
const PRIORITY = { relampago: 1, ultimas: 2, destacado: 3, especial: 4, promo: 5, combo: 6 };

function sortProducts(products) {
  return [...products].sort((a, b) => {
    const pa = PRIORITY[a.catOferta] || 99;
    const pb = PRIORITY[b.catOferta] || 99;
    if (pa !== pb) return pa - pb;
    return (b.vendidos || 0) - (a.vendidos || 0);
  });
}

function applyFilter() {
  const resolved = resolveOfertas(allProducts);
  let filtered = resolved.filter(p => {
    if (currentFilter === 'todos') return p.stock > 0;
    if (currentFilter === 'oferta') return !!p.catOferta;
    if (currentFilter === 'sinoferta') return !p.catOferta;
    if (currentFilter === 'relampago') return p.catOferta === 'relampago';
    if (currentFilter === 'destacado') return p.catOferta === 'destacado';
    if (currentFilter === 'especial') return p.catOferta === 'especial';
    if (currentFilter === 'ultimas') return p.catOferta === 'ultimas';
    if (currentFilter === 'promo') return p.catOferta === 'promo';
    if (currentFilter === 'combo') return p.catOferta === 'combo';
    return norm(p.categoria) === norm(currentFilter);
  });
  if (currentSearch) {
    const q = norm(currentSearch);
    filtered = filtered.filter(p => norm(p.nombre).includes(q) || norm(p.categoria).includes(q));
  }
  filteredProducts = sortProducts(filtered);
  renderGrid();
  updateStats();
}

function insertSeparators(products) {
  const result = [];
  let lastCat = null;
  for (const p of products) {
    const cat = norm(p.categoria);
    if (cat !== lastCat && lastCat !== null) {
      const label = SEP_LABELS[cat] || (getCatEmoji(p.categoria) + ' ' + (p.categoria || '').toUpperCase());
      result.push({ _sep: true, label });
    }
    result.push(p);
    lastCat = cat;
  }
  return result;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const withSeps = insertSeparators(filteredProducts);
  if (filteredProducts.length === 0) {
    grid.innerHTML = '';
    document.getElementById('empty-state').style.display = 'block';
    return;
  }
  document.getElementById('empty-state').style.display = 'none';
  grid.innerHTML = withSeps.map(item => {
    if (item._sep) return `<div class="separator-card">${item.label}</div>`;
    const p = item;
    const sel = selectedIds.has(String(p.id));
    const orderNum = selectionOrder.indexOf(String(p.id)) + 1;
    const oferta = calcularOferta(p);
    const badgeColor = BADGE_COLORS[p.catOferta] || '';
    const badgeClass = p.catOferta ? `badge-${p.catOferta === 'relampago' ? 'relampago' : p.catOferta === 'destacado' ? 'destacado' : p.catOferta === 'especial' ? 'especial' : p.catOferta === 'promo' ? 'promo' : p.catOferta === 'combo' ? 'combo' : 'ultimas'}` : '';
    const precioHTML = oferta ? `<div class="card-price-oferta"><span class="price-antes">${fmt(p.precioVenta)}</span><span class="price-oferta" style="color:${badgeColor}">${oferta.precio ? fmt(oferta.precio) : 'OFERTA'}</span></div>` : `<div class="card-price">${fmt(p.precioVenta)}</div>`;
    const badgeHTML = oferta ? `<div class="badge-oferta ${badgeClass}" style="background:${badgeColor}">${oferta.etiqueta}</div>` : '';
    return `<div class="prod-card ${sel ? 'selected' : ''}" data-id="${p.id}" onclick="toggleSelect('${p.id}')">
      <img class="card-img" src="${getImgUrl(p)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="card-img-placeholder" style="display:none">${getCatEmoji(p.categoria)}</div>
      <div class="card-order">${orderNum || ''}</div>
      <div class="card-check">✓</div>
      ${badgeHTML}
      <div class="card-body"><div class="card-name">${p.nombre}</div><div class="card-cat">${p.categoria}</div>${precioHTML}</div>
    </div>`;
  }).join('');
}

function toggleSelect(id) {
  id = String(id);
  if (selectedIds.has(id)) {
    selectedIds.delete(id);
    selectionOrder = selectionOrder.filter(x => x !== id);
  } else {
    selectedIds.add(id);
    selectionOrder.push(id);
  }
  renderGrid();
  updateStats();
}
window.toggleSelect = toggleSelect;

function updateStats() {
  document.getElementById('hstat-sel').textContent = `✓ ${selectedIds.size}`;
  document.getElementById('cnt-sel').textContent = selectedIds.size;
  const size = (selectedIds.size * 0.15).toFixed(1);
  document.getElementById('hstat-size').textContent = `${size} MB`;
  document.getElementById('cnt-size-b').textContent = size;
  document.getElementById('warn-msg').classList.toggle('show', selectedIds.size > 30 && currentMode === 'estado');
}

function selectAll() {
  const visibleIds = filteredProducts.map(p => String(p.id));
  const allSelected = visibleIds.every(id => selectedIds.has(id));
  if (allSelected) visibleIds.forEach(id => { selectedIds.delete(id); selectionOrder = selectionOrder.filter(x => x !== id); });
  else visibleIds.forEach(id => { if (!selectedIds.has(id)) { selectedIds.add(id); selectionOrder.push(id); } });
  renderGrid();
  updateStats();
  toast(allSelected ? 'Deseleccionados' : `✓ ${visibleIds.length} seleccionados`);
}

// ============================================================
// TEXTO PARA WHATSAPP
// ============================================================
function generateText() {
  const prods = selectionOrder.map(id => allProducts.find(p => String(p.id) === id)).filter(Boolean);
  if (!prods.length) return '❌ Sin productos';
  const resolved = resolveOfertas(prods);
  const header = '🛒 *ALMACÉN COPIHUE* 🛒\n🔥 ¡OFERTAS DEL DÍA! 🔥\n';
  const lines = [];
  const grupos = {};
  for (const p of resolved) {
    const cat = p.categoria || 'Varios';
    if (!grupos[cat]) grupos[cat] = [];
    grupos[cat].push(p);
  }
  for (const [cat, ps] of Object.entries(grupos)) {
    lines.push(`\n${getCatEmoji(cat)} *${cat.toUpperCase()}*`);
    for (const p of ps) {
      const of = calcularOferta(p);
      const precio = of?.precio ? fmt(of.precio) : fmt(p.precioVenta);
      const precioAntes = of?.precio ? ` ~${fmt(p.precioVenta)}~` : '';
      const ofLabel = of?.etiqueta ? ` _${of.etiqueta}_` : '';
      lines.push(`• ${p.nombre}${ofLabel} — *${precio}*${precioAntes}`);
    }
  }
  return header + lines.join('\n') + '\n\n📦 Pedidos por WhatsApp';
}

// ============================================================
// COLLAGE SIMPLIFICADO
// ============================================================
let collageProds = [];
let collageMode = 'collage';
let singleIdx = 0;
let singleLayout = 'clasico';
let singleFormat = { w: 1080, h: 1080 };

function loadImg(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = () => rej();
    img.src = src;
    setTimeout(() => rej(), 3000);
  });
}

async function drawSingle(p) {
  const cvs = document.getElementById('collage-canvas');
  cvs.width = 1080; cvs.height = 1080;
  const ctx = cvs.getContext('2d');
  ctx.fillStyle = '#2d5a22'; ctx.fillRect(0, 0, 1080, 1080);
  try {
    const img = await loadImg(getImgUrl(p));
    const scale = Math.min(800 / img.width, 800 / img.height);
    const dw = img.width * scale, dh = img.height * scale;
    ctx.drawImage(img, (1080 - dw) / 2, (1080 - dh) / 2 - 60, dw, dh);
  } catch { ctx.fillStyle = '#aaa'; ctx.font = '80px serif'; ctx.fillText('🛒', 500, 500); }
  ctx.fillStyle = '#fff'; ctx.font = 'bold 36px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText(p.nombre, 540, 900);
  const of = calcularOferta(p);
  ctx.font = 'bold 48px Segoe UI';
  ctx.fillStyle = of ? '#f39c12' : '#fff';
  ctx.fillText(of ? fmt(of.precio) : fmt(p.precioVenta), 540, 980);
}

async function drawCollage() {
  const cvs = document.getElementById('collage-canvas');
  cvs.width = 1080; cvs.height = 1080;
  const ctx = cvs.getContext('2d');
  ctx.fillStyle = '#1a3a16'; ctx.fillRect(0, 0, 1080, 1080);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 32px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText('🛒 ALMACÉN COPIHUE', 540, 50);
  const n = Math.min(collageProds.length, 6);
  const cols = n <= 2 ? 1 : n <= 4 ? 2 : 3;
  const rows = Math.ceil(n / cols);
  const w = Math.floor((1080 - 40) / cols);
  const h = Math.floor((980 - 40) / rows);
  for (let i = 0; i < n; i++) {
    const col = i % cols, row = Math.floor(i / cols);
    const x = 20 + col * w, y = 70 + row * h;
    ctx.fillStyle = '#fff'; ctx.fillRect(x, y, w - 4, h - 4);
    try {
      const img = await loadImg(getImgUrl(collageProds[i]));
      const scale = Math.min((w - 8) / img.width, (h - 40) / img.height);
      const dw = img.width * scale, dh = img.height * scale;
      ctx.drawImage(img, x + (w - dw) / 2, y + 5, dw, dh);
    } catch { ctx.fillStyle = '#ccc'; ctx.fillRect(x + 5, y + 5, w - 14, h - 50); }
    ctx.fillStyle = '#1a2e17'; ctx.font = 'bold 14px Segoe UI';
    ctx.fillText(collageProds[i].nombre.slice(0, 12), x + w / 2, y + h - 15);
  }
}

async function renderCollage() {
  if (collageMode === 'collage') await drawCollage();
  else await drawSingle(collageProds[singleIdx]);
}

function openCollageModal() {
  collageProds = selectionOrder.map(id => allProducts.find(p => String(p.id) === id)).filter(Boolean);
  if (!collageProds.length) { toast('Selecciona productos'); return; }
  document.getElementById('collage-modal').classList.add('open');
  renderCollage();
}

// EVENTOS
// ============================================================

  const txt = generateText();
  await navigator.clipboard.writeText(txt);
  toast('📋 Copiado');
};
document.getElementById('btn-wa').onclick = () => {
  if (!selectedIds.size) { toast('Selecciona productos'); return; }
  window.open('https://wa.me/?text=' + encodeURIComponent(generateText()), '_blank');
};
document.getElementById('btn-dl').onclick = () => toast('Función descarga activa');
document.getElementById('btn-collage').onclick = openCollageModal;
document.getElementById('btn-ia-suggest').onclick = () => {
  const best = allProducts.filter(p => p.catOferta).slice(0, 12);
  selectedIds.clear(); selectionOrder = [];
  best.forEach(p => { selectedIds.add(p.id); selectionOrder.push(p.id); });
  renderGrid();
  toast('✨ Sugerencia IA aplicada');
};
document.getElementById('btn-clear-sel').onclick = () => { selectedIds.clear(); selectionOrder = []; renderGrid(); toast('Limpiado'); };
document.getElementById('btn-sel-todo').onclick = selectAll;
document.getElementById('btn-sel-add').onclick = () => { filteredProducts.forEach(p => { if (!selectedIds.has(p.id)) { selectedIds.add(p.id); selectionOrder.push(p.id); } }); renderGrid(); updateStats(); };
document.getElementById('btn-sel-remove').onclick = () => { filteredProducts.forEach(p => { selectedIds.delete(p.id); selectionOrder = selectionOrder.filter(x => x !== p.id); }); renderGrid(); updateStats(); };
document.getElementById('tools-toggle').onclick = () => document.getElementById('tools-panel').classList.toggle('open');
document.getElementById('mode-select').onchange = e => { currentMode = e.target.value; updateStats(); };

// Filtros
function initFilters() {
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.onclick = () => {
      currentFilter = chip.dataset.filter;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      document.querySelectorAll('.filter-panel').forEach(p => p.classList.remove('open'));
      applyFilter();
    };
  });
  document.getElementById('fab-ofertas').onclick = () => {
    const p = document.getElementById('panel-ofertas');
    p.classList.toggle('open');
    p.style.top = '100px'; p.style.right = '10px';
  };
  document.getElementById('fab-cats').onclick = () => {
    const p = document.getElementById('panel-cats');
    p.classList.toggle('open');
    p.style.top = '100px'; p.style.right = '10px';
  };
  document.getElementById('fab-buscar').onclick = () => document.getElementById('search-overlay').classList.add('open');
  document.getElementById('btn-search-close').onclick = () => document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-input').oninput = e => { currentSearch = e.target.value; applyFilter(); };
  document.getElementById('search-overlay').onclick = e => { if (e.target === document.getElementById('search-overlay')) document.getElementById('search-overlay').classList.remove('open'); };
}

function buildCategoryChips() {
  const cats = [...new Set(allProducts.map(p => p.categoria).filter(Boolean))].sort();
  const container = document.getElementById('cat-chips-container');
  container.innerHTML = '';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip';
    btn.dataset.filter = norm(cat);
    btn.textContent = getCatEmoji(cat) + ' ' + cat;
    container.appendChild(btn);
  });
  initFilters();
}

// Collage modal
document.querySelectorAll('.collage-tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.collage-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    collageMode = tab.dataset.cmode;

    renderCollage();
  };
});
document.getElementById('btn-collage-dl').onclick = () => {
  const a = document.createElement('a');
  a.href = document.getElementById('collage-canvas').toDataURL('image/jpeg', 0.9);
  a.download = `copihue_${collageMode}.jpg`;
  a.click();
};
document.getElementById('btn-collage-close').onclick = () => document.getElementById('collage-modal').classList.remove('open');
document.getElementById('btn-modal-close-x').onclick = () => document.getElementById('collage-modal').classList.remove('open');

// Dark mode
const storedTheme = localStorage.getItem('sendwa_theme');
if (storedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
document.getElementById('btn-dark').onclick = () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  localStorage.setItem('sendwa_theme', isDark ? 'light' : 'dark');
};

// ============================================================
// INIT
// ============================================================
async function init() {
  document.getElementById('loader').style.display = 'flex';
  await Promise.all([cargarPools(), fetchProductos().then(prods => allProducts = prods)]);
  document.getElementById('loader').style.display = 'none';
  if (!allProducts.length) { document.getElementById('grid').innerHTML = '<div style="padding:40px;text-align:center">❌ Error cargando productos</div>'; return; }
  buildCategoryChips();
  applyFilter();
}
init();
