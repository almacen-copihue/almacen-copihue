<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiados — Copihue</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --verde:#1a6b3c;--verde-cl:#2d9e5f;--verde-bg:#e8f5ee;
    --rojo:#c0392b;--rojo-cl:#e74c3c;--rojo-bg:#fdecea;
    --naranja:#d97706;--naranja-bg:#fef3c7;
    --gris:#64748b;--gris-cl:#94a3b8;
    --negro:#0f172a;--borde:#e2e8f0;
    --sombra:0 2px 12px rgba(0,0,0,0.08);
    --radio:14px;--radio-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#f8fafc;color:var(--negro);min-height:100vh;}
  .header{background:var(--verde);padding:18px 20px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(26,107,60,0.3);}
  .header-icon{width:40px;height:40px;background:rgba(255,255,255,0.18);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .header h1{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
  .header p{font-size:12px;color:rgba(255,255,255,0.7);margin-top:1px;}
  .header-back{margin-left:auto;background:rgba(255,255,255,0.15);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;flex-shrink:0;}
  .header-back:hover{background:rgba(255,255,255,0.28);}
  .main{padding:20px 16px 120px;max-width:700px;margin:0 auto;}
  .buscar-box{background:#fff;border-radius:var(--radio);padding:20px;box-shadow:var(--sombra);margin-bottom:20px;}
  .buscar-box h2{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:14px;color:var(--negro);}
  .autocomplete-wrap{display:flex;gap:10px;align-items:flex-start;}
  .autocomplete-inner{flex:1;position:relative;}
  #inputNombre{width:100%;border:2px solid var(--borde);border-radius:var(--radio-sm);padding:13px 16px;font-size:16px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,background .2s;background:#fafafa;color:var(--negro);}
  #inputNombre:focus{border-color:var(--verde);background:#fff;}
  #inputNombre::placeholder{color:var(--gris-cl);}
  .dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:2px solid var(--verde);border-radius:var(--radio-sm);box-shadow:0 8px 24px rgba(0,0,0,0.14);z-index:200;max-height:260px;overflow-y:auto;display:none;}
  .dropdown.visible{display:block;}
  .dropdown-item{padding:12px 16px;cursor:pointer;display:flex;flex-direction:column;gap:3px;border-bottom:1px solid #f1f5f9;transition:background .15s;-webkit-tap-highlight-color:transparent;}
  .dropdown-item:last-child{border-bottom:none;}
  .dropdown-item:hover,.dropdown-item.activo{background:var(--verde-bg);}
  .dropdown-nombre{font-size:15px;font-weight:600;color:var(--negro);}
  .dropdown-nombre mark{background:#d1fae5;color:var(--verde);border-radius:2px;padding:0 2px;font-weight:700;font-style:normal;}
  .dropdown-tel{font-family:'DM Mono',monospace;font-size:11px;color:var(--gris-cl);}
  .dropdown-vacio{padding:16px;text-align:center;color:var(--gris);font-size:14px;font-style:italic;}
  .cargando-clientes{padding:12px 16px;color:var(--gris);font-size:13px;display:flex;align-items:center;gap:8px;}
  .spinner-sm{width:14px;height:14px;border:2px solid var(--borde);border-top-color:var(--verde);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;}
  .btn-buscar{background:var(--verde);color:#fff;border:none;border-radius:var(--radio-sm);padding:13px 20px;font-size:15px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;white-space:nowrap;flex-shrink:0;}
  .btn-buscar:hover{background:var(--verde-cl);}
  .btn-buscar:active{transform:scale(.97);}
  .cargando{text-align:center;padding:40px 20px;color:var(--gris);font-size:14px;display:none;}
  .spinner{width:36px;height:36px;border:3px solid var(--borde);border-top-color:var(--verde);border-radius:50%;margin:0 auto 12px;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .resumen-cliente{background:#fff;border-radius:var(--radio);padding:20px;box-shadow:var(--sombra);margin-bottom:16px;display:none;}
  .cliente-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
  .cliente-nombre{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--negro);}
  .cliente-tel{font-family:'DM Mono',monospace;font-size:13px;color:var(--gris);margin-top:3px;}
  .cliente-deuda{text-align:right;}
  .deuda-monto{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--rojo);line-height:1;}
  .deuda-label{font-size:11px;color:var(--gris);text-transform:uppercase;letter-spacing:.8px;margin-top:3px;}
  .badge-vencido{display:inline-flex;align-items:center;gap:5px;background:var(--rojo-bg);color:var(--rojo);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;margin-top:8px;}
  .badge-vencido::before{content:'●';}
  .acciones-rapidas{display:flex;gap:8px;flex-wrap:wrap;padding-top:16px;border-top:1px solid var(--borde);}
  .btn-accion{flex:1;min-width:110px;padding:11px 14px;border-radius:var(--radio-sm);border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
  .btn-pagar-todo{background:var(--verde);color:#fff;}
  .btn-pagar-todo:hover{background:var(--verde-cl);}
  .btn-pagar-seleccion{background:var(--verde-bg);color:var(--verde);border:2px solid var(--verde-cl);}
  .btn-pagar-seleccion:hover{background:#c8edd9;}
  .btn-whatsapp{background:#25d366;color:#fff;}
  .btn-whatsapp:hover{background:#1eb856;}
  .fiados-lista{display:none;}
  .fiado-card{background:#fff;border-radius:var(--radio);box-shadow:var(--sombra);margin-bottom:12px;overflow:hidden;border:2px solid transparent;transition:border-color .2s,box-shadow .2s;}
  .fiado-card.vencido{border-color:var(--rojo-cl);background:linear-gradient(135deg,#fff 0%,#fff9f9 100%);}
  .fiado-card.seleccionado{border-color:var(--verde-cl);box-shadow:0 0 0 3px rgba(45,158,95,0.15),var(--sombra);}
  .fiado-top{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
  .fiado-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--borde);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:#fafafa;}
  .fiado-card.seleccionado .fiado-check{background:var(--verde);border-color:var(--verde);color:#fff;}
  .fiado-check::after{content:'';width:6px;height:10px;border:2px solid currentColor;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);opacity:0;transition:opacity .15s;}
  .fiado-card.seleccionado .fiado-check::after{opacity:1;}
  .fiado-info{flex:1;min-width:0;}
  .fiado-ticket{font-family:'DM Mono',monospace;font-size:12px;color:var(--gris);margin-bottom:2px;}
  .fiado-items-preview{font-size:13px;color:var(--negro);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fiado-monto-col{text-align:right;flex-shrink:0;}
  .fiado-monto{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--negro);}
  .fiado-monto.vencido-text{color:var(--rojo);}
  .badge-estado{display:inline-block;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;margin-top:3px;}
  .badge-pendiente{background:var(--naranja-bg);color:var(--naranja);}
  .badge-vencido-sm{background:var(--rojo-bg);color:var(--rojo);}
  .badge-abonado{background:#e0f2fe;color:#0369a1;}
  .fiado-arrow{color:var(--gris-cl);font-size:14px;transition:transform .25s;flex-shrink:0;padding-left:4px;}
  .fiado-card.expandido .fiado-arrow{transform:rotate(180deg);}
  .fiado-detalle{display:none;padding:0 16px 16px;border-top:1px solid var(--borde);}
  .fiado-card.expandido .fiado-detalle{display:block;}
  .detalle-titulo{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--gris);font-weight:600;padding:12px 0 8px;}
  .detalle-item{display:flex;align-items:baseline;gap:8px;padding:6px 0;border-bottom:1px dashed var(--borde);font-size:14px;}
  .detalle-item:last-child{border-bottom:none;}
  .detalle-qty{font-family:'DM Mono',monospace;font-size:12px;color:var(--gris);flex-shrink:0;min-width:30px;}
  .detalle-nombre{flex:1;color:var(--negro);}
  .detalle-precio{font-family:'DM Mono',monospace;font-size:13px;color:var(--gris);text-align:right;}
  .detalle-total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0 0;font-weight:700;font-size:15px;border-top:2px solid var(--negro);margin-top:4px;}
  .no-detalle{font-size:13px;color:var(--gris);padding:10px 0;font-style:italic;}
  .abono-fila{display:none;margin-top:12px;padding:12px;background:var(--verde-bg);border-radius:var(--radio-sm);border:1px solid #a7d9b8;}
  .fiado-card.seleccionado .abono-fila{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .abono-fila label{font-size:13px;font-weight:600;color:var(--verde);white-space:nowrap;}
  .abono-fila input[type="number"]{flex:1;min-width:100px;border:2px solid #a7d9b8;border-radius:var(--radio-sm);padding:8px 12px;font-size:15px;font-family:'DM Mono',monospace;background:#fff;color:var(--negro);outline:none;}
  .abono-fila input:focus{border-color:var(--verde);}
  .abono-hint{width:100%;font-size:11px;color:var(--gris);margin-top:2px;}
  .abono-hint.total-tag{color:var(--verde);font-weight:600;}
  .barra-pago{position:fixed;bottom:0;left:0;right:0;background:var(--negro);color:#fff;padding:14px 20px 20px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:200;box-shadow:0 -4px 24px rgba(0,0,0,0.25);border-radius:20px 20px 0 0;}
  .barra-pago.visible{transform:translateY(0);}
  .barra-handle{width:40px;height:4px;background:rgba(255,255,255,.25);border-radius:2px;margin:0 auto 14px;}
  .barra-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:12px;flex-wrap:wrap;}
  .barra-total{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;}
  .barra-tickets{font-size:12px;color:rgba(255,255,255,.55);margin-top:2px;}
  .metodo-btns{display:flex;gap:6px;flex-wrap:wrap;}
  .metodo-btn{padding:7px 14px;border-radius:20px;border:2px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.7);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
  .metodo-btn.activo{background:#fff;color:var(--negro);border-color:#fff;}
  .btn-confirmar-pago{width:100%;background:var(--verde);color:#fff;border:none;border-radius:12px;padding:15px;font-family:'Syne',sans-serif;font-size:17px;font-weight:800;cursor:pointer;transition:background .2s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-confirmar-pago:hover{background:var(--verde-cl);}
  .btn-confirmar-pago:active{transform:scale(.98);}
  .btn-confirmar-pago:disabled{opacity:.5;cursor:not-allowed;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:300;opacity:0;pointer-events:none;transition:opacity .25s;padding:20px;}
  .modal-overlay.visible{opacity:1;pointer-events:all;}
  .modal{background:#fff;border-radius:20px;padding:30px 24px;max-width:380px;width:100%;text-align:center;transform:scale(.9);transition:transform .25s;}
  .modal-overlay.visible .modal{transform:scale(1);}
  .modal-icono{font-size:52px;margin-bottom:12px;}
  .modal h3{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:8px;}
  .modal p{font-size:15px;color:var(--gris);line-height:1.5;margin-bottom:20px;}
  .modal-monto{font-family:'DM Mono',monospace;font-size:32px;font-weight:500;color:var(--verde);margin-bottom:16px;display:block;}
  .btn-modal-cerrar{width:100%;background:var(--negro);color:#fff;border:none;border-radius:12px;padding:14px;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;}
  .btn-modal-wa{width:100%;background:#25d366;color:#fff;border:none;border-radius:12px;padding:14px;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;}
  .estado-vacio{text-align:center;padding:50px 20px;display:none;}
  .estado-vacio .icono{font-size:48px;margin-bottom:12px;}
  .estado-vacio h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px;}
  .estado-vacio p{font-size:14px;color:var(--gris);}
  @media(max-width:480px){.cliente-nombre{font-size:19px;}.deuda-monto{font-size:24px;}.barra-total{font-size:20px;}}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📋</div>
  <div>
    <h1>Consulta de Fiados</h1>
    <p>Almacén Copihue</p>
  </div>
  <button class="header-back" onclick="history.back()">← Volver</button>
</div>

<div class="main">

  <div class="buscar-box">
    <h2>🔍 Buscar cliente por nombre</h2>
    <div class="autocomplete-wrap">
      <div class="autocomplete-inner">
        <input type="text" id="inputNombre"
          placeholder="Escribí el nombre del cliente..."
          autocomplete="off" autocorrect="off" spellcheck="false"
          oninput="onInputNombre()"
          onkeydown="onKeyNombre(event)">
        <div class="dropdown" id="dropdown"></div>
      </div>
      <button class="btn-buscar" onclick="buscarCliente()">Buscar</button>
    </div>
  </div>

  <div class="cargando" id="cargando">
    <div class="spinner"></div>
    <p>Consultando fiados...</p>
  </div>

  <div class="resumen-cliente" id="resumenCliente">
    <div class="cliente-header">
      <div>
        <div class="cliente-nombre" id="clienteNombre"></div>
        <div class="cliente-tel" id="clienteTel"></div>
        <div id="badgeVencido"></div>
      </div>
      <div class="cliente-deuda">
        <div class="deuda-monto" id="deudaTotal"></div>
        <div class="deuda-label">Deuda total</div>
      </div>
    </div>
    <div class="acciones-rapidas">
      <button class="btn-accion btn-pagar-todo" onclick="seleccionarTodo()">✓ Selec. todo</button>
      <button class="btn-accion btn-pagar-seleccion" onclick="limpiarSeleccion()">✕ Limpiar</button>
      <button class="btn-accion btn-whatsapp" onclick="enviarWhatsApp()">💬 WhatsApp</button>
    </div>
  </div>

  <div class="fiados-lista" id="fiadosLista"></div>

  <div class="estado-vacio" id="estadoVacio">
    <div class="icono">🎉</div>
    <h3>Sin deuda pendiente</h3>
    <p>Este cliente no tiene fiados pendientes.</p>
  </div>
  <div class="estado-vacio" id="estadoError" style="display:none">
    <div class="icono">⚠️</div>
    <h3 id="errorTitulo">Error</h3>
    <p id="errorMsg"></p>
  </div>
</div>

<div class="barra-pago" id="barraPago">
  <div class="barra-handle"></div>
  <div class="barra-row">
    <div>
      <div class="barra-total" id="barraTotalTexto">$0</div>
      <div class="barra-tickets" id="barraTicketsTexto">0 fiados seleccionados</div>
    </div>
    <div class="metodo-btns">
      <button class="metodo-btn activo" onclick="setMetodo('EFECTIVO',this)">💵 Efectivo</button>
      <button class="metodo-btn" onclick="setMetodo('TRANSFERENCIA',this)">📲 Transfer.</button>
      <button class="metodo-btn" onclick="setMetodo('QR',this)">QR</button>
    </div>
  </div>
  <button class="btn-confirmar-pago" onclick="confirmarPago()" id="btnConfirmar">
    💳 Confirmar cobro
  </button>
</div>

<div class="modal-overlay" id="modalExito">
  <div class="modal">
    <div class="modal-icono">✅</div>
    <h3>¡Cobro registrado!</h3>
    <p>Se registró el pago correctamente.</p>
    <span class="modal-monto" id="modalMonto"></span>
    <button class="btn-modal-cerrar" onclick="cerrarModal()">Listo</button>
    <button class="btn-modal-wa" onclick="enviarWhatsAppConfirmacion()">💬 Enviar comprobante WA</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
// CONFIGURACIÓN — reemplazá con tu URL de Web App
// ══════════════════════════════════════════════════
const WEBAPP_URL = 'https://script.google.com/macros/s/TU_DEPLOYMENT_ID/exec';

// ══════════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════════
let app = {
  clientes: [],
  selCliente: null,   // { nombre, telefono } elegido del dropdown
  fiados: [],
  seleccionados: {},
  metodoPago: 'EFECTIVO',
  totalCobrado: 0,
  ddIdx: -1
};

// ══════════════════════════════════════════════════
// INICIO — precarga lista de clientes
// ══════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async function() {
  try {
    const res = await gas('listarClientes', null, 'GET');
    // listarClientes puede devolver { ok, clientes:[{nombre,telefono}] }
    // o { success, data:[...] } dependiendo de tu implementación
    if (res.ok && res.clientes)          app.clientes = res.clientes;
    else if (res.success && res.data)    app.clientes = res.data;
    else if (Array.isArray(res.clientes)) app.clientes = res.clientes;
  } catch(e) { /* fallo silencioso */ }
});

// ══════════════════════════════════════════════════
// AUTOCOMPLETE
// ══════════════════════════════════════════════════
function onInputNombre() {
  app.selCliente = null;
  app.ddIdx = -1;
  const q = document.getElementById('inputNombre').value.trim();
  if (!q) { cerrarDD(); return; }
  abrirDD(q);
}

function abrirDD(q) {
  const dd  = document.getElementById('dropdown');
  const qUp = q.toUpperCase();

  const hits = app.clientes.filter(function(c) {
    return String(c.nombre || c.Cliente || '').toUpperCase().includes(qUp);
  }).slice(0, 8);

  if (!hits.length) {
    dd.innerHTML = '<div class="dropdown-vacio">No se encontró "' + escH(q) + '"</div>';
    dd.classList.add('visible');
    return;
  }

  dd.innerHTML = hits.map(function(c, i) {
    const nom = String(c.nombre || c.Cliente || '');
    const tel = String(c.telefono || c.Telefono || '');
    const hl  = nom.replace(new RegExp('(' + escRx(q) + ')', 'gi'), '<mark>$1</mark>');
    return '<div class="dropdown-item" data-idx="' + i +
      '" data-nombre="' + escH(nom) + '" data-tel="' + escH(tel) +
      '" onclick="elegirCliente(this)">' +
      '<span class="dropdown-nombre">' + hl + '</span>' +
      (tel ? '<span class="dropdown-tel">📞 ' + tel + '</span>' : '') +
      '</div>';
  }).join('');

  dd.classList.add('visible');
}

function elegirCliente(el) {
  document.getElementById('inputNombre').value = el.dataset.nombre;
  app.selCliente = { nombre: el.dataset.nombre, telefono: el.dataset.tel };
  cerrarDD();
  buscarCliente();
}

function cerrarDD() {
  document.getElementById('dropdown').classList.remove('visible');
  app.ddIdx = -1;
}

function onKeyNombre(e) {
  const dd    = document.getElementById('dropdown');
  const items = dd.querySelectorAll('.dropdown-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    app.ddIdx = Math.min(app.ddIdx + 1, items.length - 1);
    markDD(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    app.ddIdx = Math.max(app.ddIdx - 1, -1);
    markDD(items);
  } else if (e.key === 'Enter') {
    if (app.ddIdx >= 0 && items[app.ddIdx]) elegirCliente(items[app.ddIdx]);
    else buscarCliente();
  } else if (e.key === 'Escape') {
    cerrarDD();
  }
}

function markDD(items) {
  items.forEach(function(el, i) { el.classList.toggle('activo', i === app.ddIdx); });
  if (app.ddIdx >= 0 && items[app.ddIdx]) items[app.ddIdx].scrollIntoView({ block: 'nearest' });
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.autocomplete-inner')) cerrarDD();
});

// ══════════════════════════════════════════════════
// BUSCAR FIADOS
// ══════════════════════════════════════════════════
async function buscarCliente() {
  cerrarDD();

  let params = {};
  if (app.selCliente) {
    params = { cliente: app.selCliente.nombre, telefono: app.selCliente.telefono || '' };
  } else {
    const txt = document.getElementById('inputNombre').value.trim();
    if (!txt) { alert('Escribí el nombre del cliente'); return; }
    params = { cliente: txt, telefono: '' };
  }

  ocultarTodo();
  mostrar('cargando');

  try {
    const res = await gas('listarFiadosCliente', params);
    ocultar('cargando');

    if (!res.ok) { mostrarError('No se pudo consultar', res.error || 'Error desconocido'); return; }
    if (!res.fiados || !res.fiados.length) { mostrar('estadoVacio'); return; }

    app.fiados = res.fiados;
    app.seleccionados = {};
    renderResumen(res);
    renderFiados(res.fiados);
    mostrar('resumenCliente');
    mostrar('fiadosLista');
  } catch(e) {
    ocultar('cargando');
    mostrarError('Error de conexión', e.message);
  }
}

// ══════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════
function renderResumen(res) {
  document.getElementById('clienteNombre').textContent = res.cliente;
  const tel = res.telefono || (app.selCliente && app.selCliente.telefono) || '';
  document.getElementById('clienteTel').textContent = tel ? '📞 ' + tel : '';
  document.getElementById('deudaTotal').textContent  = $$(res.totalDeuda);
  document.getElementById('badgeVencido').innerHTML  = res.hayVencidos
    ? '<div class="badge-vencido">Tiene deuda vencida</div>' : '';
}

function renderFiados(fiados) {
  const lista = document.getElementById('fiadosLista');
  lista.innerHTML = '';
  fiados.forEach(function(f) {
    const card = document.createElement('div');
    card.className = 'fiado-card' + (f.estado === 'VENCIDO' ? ' vencido' : '');
    card.dataset.id = f.idFiado;

    const preview = f.detalle && f.detalle.length
      ? f.detalle.slice(0,2).map(function(i){ return (parseFloat(i.cantidad)!==1?i.cantidad+'x ':'')+cortar(i.nombre,22); }).join(' · ')
        + (f.detalle.length>2 ? ' +' + (f.detalle.length-2) + ' más' : '')
      : (f.descripcion || 'Sin detalle');

    const bCls = f.estado==='VENCIDO'?'badge-vencido-sm':f.abonadoParcial?'badge-abonado':'badge-pendiente';
    const bTxt = f.estado==='VENCIDO'?'⚠ VENCIDO':f.abonadoParcial?'↓ Abonado parcial':'Pendiente';

    card.innerHTML =
      '<div class="fiado-top" onclick="toggleCard(this.parentElement)">' +
        '<div class="fiado-check"></div>' +
        '<div class="fiado-info">' +
          '<div class="fiado-ticket">Ticket #' + (f.ticket||'—') + ' &nbsp;·&nbsp; ' + fechaCorta(f.fecha) + '</div>' +
          '<div class="fiado-items-preview">' + escH(preview) + '</div>' +
        '</div>' +
        '<div class="fiado-monto-col">' +
          '<div class="fiado-monto' + (f.estado==='VENCIDO'?' vencido-text':'') + '">' + $$(f.totalPendiente) + '</div>' +
          '<div><span class="badge-estado ' + bCls + '">' + bTxt + '</span></div>' +
        '</div>' +
        '<div class="fiado-arrow">▼</div>' +
      '</div>' +
      '<div class="fiado-detalle">' +
        detalleHTML(f) +
        '<div class="abono-fila">' +
          '<label>Abono $</label>' +
          '<input type="number" min="1" max="' + f.totalPendiente + '" step="100" value="' + f.totalPendiente + '"' +
            ' oninput="onAbono(\'' + f.idFiado + '\',this.value,' + f.totalPendiente + ')"' +
            ' id="abono-' + f.idFiado + '">' +
          '<div class="abono-hint total-tag" id="hint-' + f.idFiado + '">✓ Pago total</div>' +
        '</div>' +
      '</div>';

    lista.appendChild(card);
  });
}

function detalleHTML(f) {
  if (!f.detalle || !f.detalle.length)
    return '<p class="no-detalle">Sin detalle de productos (ticket #' + (f.ticket||'—') + ')</p>';

  const rows = f.detalle.map(function(i) {
    return '<div class="detalle-item">' +
      '<span class="detalle-qty">' + qty(i.cantidad) + '</span>' +
      '<span class="detalle-nombre">' + escH(i.nombre) + '</span>' +
      '<span class="detalle-precio">' + $$(i.subtotal||i.precio) + '</span>' +
      '</div>';
  }).join('');

  const abInfo = f.abonadoParcial
    ? '<div style="padding:6px 0;font-size:13px;color:#0369a1">Abonado: ' + $$(f.montoAbonado) +
      ' · Queda: <strong>' + $$(f.totalPendiente) + '</strong></div>'
    : '';

  return '<div class="detalle-titulo">🧾 Detalle del ticket</div>' + rows +
    '<div class="detalle-total-row"><span>Total ticket</span><span>' + $$(f.totalDetalle||f.totalPendiente) + '</span></div>' + abInfo;
}

// ══════════════════════════════════════════════════
// TOGGLE + SELECCIÓN
// ══════════════════════════════════════════════════
function toggleCard(card) {
  card.classList.toggle('expandido');
  const id    = card.dataset.id;
  const fiado = app.fiados.find(function(f){ return f.idFiado===id; });
  if (!fiado) return;

  if (card.classList.contains('seleccionado')) {
    card.classList.remove('seleccionado');
    delete app.seleccionados[id];
  } else {
    card.classList.add('seleccionado');
    app.seleccionados[id] = { monto: fiado.totalPendiente, parcial: false };
    const inp = document.getElementById('abono-' + id);
    if (inp) inp.value = fiado.totalPendiente;
    setHint(id, fiado.totalPendiente, fiado.totalPendiente);
  }
  barra();
}

function onAbono(id, val, max) {
  const m = parseFloat(val) || 0;
  if (app.seleccionados[id]) {
    app.seleccionados[id].monto   = Math.min(m, max);
    app.seleccionados[id].parcial = m < max;
  }
  setHint(id, m, max);
  barra();
}

function setHint(id, m, max) {
  const h = document.getElementById('hint-' + id);
  if (!h) return;
  if (m <= 0)       { h.className='abono-hint'; h.innerHTML='<span style="color:var(--rojo)">⚠ Monto inválido</span>'; }
  else if (m >= max){ h.className='abono-hint total-tag'; h.textContent='✓ Pago total'; }
  else              { h.className='abono-hint'; h.innerHTML='Abono parcial · quedará <strong>' + $$(max-m) + '</strong>'; }
}

function seleccionarTodo() {
  app.seleccionados = {};
  document.querySelectorAll('.fiado-card').forEach(function(card) {
    const id    = card.dataset.id;
    const fiado = app.fiados.find(function(f){ return f.idFiado===id; });
    if (!fiado) return;
    card.classList.add('seleccionado','expandido');
    app.seleccionados[id] = { monto: fiado.totalPendiente, parcial: false };
    const inp = document.getElementById('abono-' + id);
    if (inp) inp.value = fiado.totalPendiente;
    setHint(id, fiado.totalPendiente, fiado.totalPendiente);
  });
  barra();
}

function limpiarSeleccion() {
  app.seleccionados = {};
  document.querySelectorAll('.fiado-card').forEach(function(c){ c.classList.remove('seleccionado','expandido'); });
  barra();
}

// ══════════════════════════════════════════════════
// BARRA FLOTANTE
// ══════════════════════════════════════════════════
function barra() {
  const ids   = Object.keys(app.seleccionados);
  const total = ids.reduce(function(s,id){ return s+(app.seleccionados[id].monto||0); }, 0);
  document.getElementById('barraTotalTexto').textContent  = $$(total);
  document.getElementById('barraTicketsTexto').textContent = ids.length + (ids.length===1?' fiado seleccionado':' fiados seleccionados');
  document.getElementById('barraPago').classList.toggle('visible', ids.length>0 && total>0);
}

function setMetodo(m, btn) {
  app.metodoPago = m;
  document.querySelectorAll('.metodo-btn').forEach(function(b){ b.classList.remove('activo'); });
  btn.classList.add('activo');
}

// ══════════════════════════════════════════════════
// CONFIRMAR PAGO
// ══════════════════════════════════════════════════
async function confirmarPago() {
  const ids = Object.keys(app.seleccionados);
  if (!ids.length) return;
  const pagos = ids.map(function(id){ return { idFiado:id, monto:app.seleccionados[id].monto, parcial:app.seleccionados[id].parcial }; });
  const total = pagos.reduce(function(s,p){ return s+p.monto; }, 0);
  const hay   = pagos.some(function(p){ return p.parcial; });
  const msg   = hay
    ? '¿Registrar cobro de ' + $$(total) + ' (' + app.metodoPago + ')?\nAlgunos fiados quedarán con saldo pendiente.'
    : '¿Confirmar pago de ' + $$(total) + ' (' + app.metodoPago + ')?';
  if (!confirm(msg)) return;

  const btn = document.getElementById('btnConfirmar');
  btn.disabled = true; btn.textContent = '⏳ Registrando...';

  try {
    const cli = app.selCliente || { nombre: (app.fiados[0]||{}).cliente||'', telefono: (app.fiados[0]||{}).telefono||'' };
    const res = await gas('pagarFiadosSeleccionados', { pagos, metodoPago: app.metodoPago, cliente: cli.nombre, telefono: cli.telefono||'' });
    btn.disabled = false; btn.innerHTML = '💳 Confirmar cobro';
    if (!res.ok) { alert('❌ Error: ' + (res.error||'No se pudo registrar')); return; }
    app.totalCobrado = res.totalCobrado;
    document.getElementById('modalMonto').textContent = $$(res.totalCobrado);
    document.getElementById('modalExito').classList.add('visible');
    setTimeout(recargar, 700);
  } catch(e) {
    btn.disabled = false; btn.innerHTML = '💳 Confirmar cobro';
    alert('❌ Error de conexión: ' + e.message);
  }
}

async function recargar() {
  try {
    const cli = app.selCliente || { nombre: (app.fiados[0]||{}).cliente||'', telefono: (app.fiados[0]||{}).telefono||'' };
    const res = await gas('listarFiadosCliente', { cliente: cli.nombre, telefono: cli.telefono||'' });
    if (!res.ok) return;
    app.fiados = res.fiados || [];
    app.seleccionados = {};
    document.getElementById('fiadosLista').innerHTML = '';
    if (res.fiados && res.fiados.length) {
      renderResumen(res);
      renderFiados(res.fiados);
      document.getElementById('deudaTotal').textContent = $$(res.totalDeuda);
    } else {
      ocultar('resumenCliente'); ocultar('fiadosLista'); mostrar('estadoVacio');
    }
  } catch(e) {}
}

function cerrarModal() {
  document.getElementById('modalExito').classList.remove('visible');
  document.getElementById('barraPago').classList.remove('visible');
}

// ══════════════════════════════════════════════════
// WHATSAPP
// ══════════════════════════════════════════════════
function enviarWhatsApp() {
  const cli = app.selCliente || { nombre: (app.fiados[0]||{}).cliente||'', telefono: (app.fiados[0]||{}).telefono||'' };
  if (!cli.telefono) { alert('Este cliente no tiene teléfono registrado'); return; }
  const total = app.fiados.reduce(function(s,f){ return s+f.totalPendiente; },0);
  const lineas = app.fiados.map(function(f) {
    const items = f.detalle&&f.detalle.length
      ? f.detalle.map(function(i){ return '    - '+qty(i.cantidad)+' '+i.nombre; }).join('\n')
      : '    '+(f.descripcion||'');
    return '📦 Ticket #'+(f.ticket||'—')+' ('+fechaCorta(f.fecha)+')\n'+items+'\n    💰 '+$$(f.totalPendiente);
  });
  const msg = '¡Hola '+cli.nombre+'! 👋\n\nTe recordamos que tenés fiado pendiente en *Almacén Copihue*:\n\n'+
    lineas.join('\n\n')+'\n\n*Total deuda: '+$$(total)+'*\n\n¡Gracias! 🙏';
  wa(cli.telefono, msg);
}

function enviarWhatsAppConfirmacion() {
  const cli = app.selCliente || { nombre:'', telefono: (app.fiados[0]||{}).telefono||'' };
  if (!cli.telefono) return;
  wa(cli.telefono, '¡Hola '+cli.nombre+'! ✅\n\nSe registró tu pago de *'+$$(app.totalCobrado)+'* ('+app.metodoPago+') en *Almacén Copihue*.\n\n¡Muchas gracias! 🙏');
}

function wa(tel, msg) {
  const n = String(tel).replace(/\D/g,'');
  const t = '549' + n.replace(/^0?549?/,'').replace(/^0/,'');
  window.open('https://wa.me/'+t+'?text='+encodeURIComponent(msg), '_blank');
}

// ══════════════════════════════════════════════════
// FETCH GAS
// ══════════════════════════════════════════════════
async function gas(accion, params, metodo) {
  const url = WEBAPP_URL + '?action=' + accion;
  if ((metodo||'POST') === 'GET') {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }
  const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(params) });
  if (!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

// ══════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════
function $$(n){ return '$'+(parseFloat(n)||0).toLocaleString('es-AR',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function fechaCorta(s){ if(!s)return''; const p=s.split(/[\sT]/)[0].split('-'); return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:s; }
function qty(q){ const n=parseFloat(q); return isNaN(n)?String(q||''):n+'x'; }
function cortar(t,m){ return t&&t.length>m?t.substring(0,m)+'…':(t||''); }
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escRx(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function mostrar(id){ document.getElementById(id).style.display=''; }
function ocultar(id){ document.getElementById(id).style.display='none'; }
function ocultarTodo(){
  ['cargando','resumenCliente','fiadosLista','estadoVacio','estadoError'].forEach(ocultar);
  document.getElementById('fiadosLista').innerHTML='';
  app.seleccionados={};
  document.getElementById('barraPago').classList.remove('visible');
}
function mostrarError(t,m){ document.getElementById('errorTitulo').textContent=t; document.getElementById('errorMsg').textContent=m; mostrar('estadoError'); }
</script>
