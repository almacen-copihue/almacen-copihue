<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiados — Copihue</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --verde:     #1a6b3c;
    --verde-cl:  #2d9e5f;
    --verde-bg:  #e8f5ee;
    --rojo:      #c0392b;
    --rojo-cl:   #e74c3c;
    --rojo-bg:   #fdecea;
    --naranja:   #d97706;
    --naranja-bg:#fef3c7;
    --gris:      #64748b;
    --gris-cl:   #94a3b8;
    --gris-bg:   #f1f5f9;
    --negro:     #0f172a;
    --blanco:    #ffffff;
    --borde:     #e2e8f0;
    --sombra:    0 2px 12px rgba(0,0,0,0.08);
    --sombra-lg: 0 8px 32px rgba(0,0,0,0.14);
    --radio:     14px;
    --radio-sm:  8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f8fafc;
    color: var(--negro);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--verde);
    padding: 18px 20px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(26,107,60,0.3);
  }
  .header-icon {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.18);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .header p {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-top: 1px;
  }
  .header-back {
    margin-left: auto;
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    font-weight: 500;
    transition: background .2s;
  }
  .header-back:hover { background: rgba(255,255,255,0.28); }

  /* ── CONTENIDO PRINCIPAL ── */
  .main { padding: 20px 16px 40px; max-width: 700px; margin: 0 auto; }

  /* ── BUSCADOR ── */
  .buscar-box {
    background: #fff;
    border-radius: var(--radio);
    padding: 20px;
    box-shadow: var(--sombra);
    margin-bottom: 20px;
  }
  .buscar-box h2 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--negro);
  }
  .input-group {
    display: flex;
    gap: 10px;
  }
  .input-group input {
    flex: 1;
    border: 2px solid var(--borde);
    border-radius: var(--radio-sm);
    padding: 12px 16px;
    font-size: 16px;
    font-family: 'DM Mono', monospace;
    outline: none;
    transition: border-color .2s;
    background: #fafafa;
    color: var(--negro);
  }
  .input-group input:focus { border-color: var(--verde); background: #fff; }
  .input-group input::placeholder { color: var(--gris-cl); font-family: 'DM Sans', sans-serif; }
  .btn-buscar {
    background: var(--verde);
    color: #fff;
    border: none;
    border-radius: var(--radio-sm);
    padding: 12px 20px;
    font-size: 15px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: background .2s, transform .1s;
    white-space: nowrap;
  }
  .btn-buscar:hover { background: var(--verde-cl); }
  .btn-buscar:active { transform: scale(.97); }

  /* ── CARGANDO ── */
  .cargando {
    text-align: center;
    padding: 40px 20px;
    color: var(--gris);
    font-size: 14px;
    display: none;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--borde);
    border-top-color: var(--verde);
    border-radius: 50%;
    margin: 0 auto 12px;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESUMEN CLIENTE ── */
  .resumen-cliente {
    background: #fff;
    border-radius: var(--radio);
    padding: 20px;
    box-shadow: var(--sombra);
    margin-bottom: 16px;
    display: none;
  }
  .cliente-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .cliente-nombre {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--negro);
  }
  .cliente-tel {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--gris);
    margin-top: 3px;
  }
  .cliente-deuda {
    text-align: right;
  }
  .deuda-monto {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--rojo);
    line-height: 1;
  }
  .deuda-label {
    font-size: 11px;
    color: var(--gris);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-top: 3px;
  }
  .badge-vencido {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--rojo-bg);
    color: var(--rojo);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    margin-top: 8px;
  }
  .badge-vencido::before { content: '●'; }

  /* Acciones rápidas */
  .acciones-rapidas {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding-top: 16px;
    border-top: 1px solid var(--borde);
  }
  .btn-accion {
    flex: 1;
    min-width: 120px;
    padding: 11px 16px;
    border-radius: var(--radio-sm);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-pagar-todo {
    background: var(--verde);
    color: #fff;
  }
  .btn-pagar-todo:hover { background: var(--verde-cl); }
  .btn-pagar-seleccion {
    background: var(--verde-bg);
    color: var(--verde);
    border: 2px solid var(--verde-cl);
  }
  .btn-pagar-seleccion:hover { background: #c8edd9; }
  .btn-whatsapp {
    background: #25d366;
    color: #fff;
  }
  .btn-whatsapp:hover { background: #1eb856; }
  .btn-accion:disabled {
    opacity: .4;
    cursor: not-allowed;
  }

  /* ── LISTA DE FIADOS ── */
  .fiados-lista { display: none; }
  .fiado-card {
    background: #fff;
    border-radius: var(--radio);
    box-shadow: var(--sombra);
    margin-bottom: 12px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: border-color .2s, box-shadow .2s;
  }
  .fiado-card.vencido {
    border-color: var(--rojo-cl);
    background: linear-gradient(135deg, #fff 0%, #fff9f9 100%);
  }
  .fiado-card.seleccionado {
    border-color: var(--verde-cl);
    box-shadow: 0 0 0 3px rgba(45,158,95,0.15), var(--sombra);
  }

  .fiado-top {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* Checkbox visual */
  .fiado-check {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 2px solid var(--borde);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    background: #fafafa;
  }
  .fiado-card.seleccionado .fiado-check {
    background: var(--verde);
    border-color: var(--verde);
    color: #fff;
  }
  .fiado-check::after {
    content: '';
    width: 6px; height: 10px;
    border: 2px solid currentColor;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
    opacity: 0;
    transition: opacity .15s;
  }
  .fiado-card.seleccionado .fiado-check::after { opacity: 1; }

  .fiado-info { flex: 1; min-width: 0; }
  .fiado-ticket {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--gris);
    margin-bottom: 2px;
  }
  .fiado-fecha {
    font-size: 11px;
    color: var(--gris-cl);
  }
  .fiado-items-preview {
    font-size: 13px;
    color: var(--negro);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .fiado-monto-col {
    text-align: right;
    flex-shrink: 0;
  }
  .fiado-monto {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--negro);
  }
  .fiado-monto.vencido-text { color: var(--rojo); }
  .badge-estado {
    display: inline-block;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    margin-top: 3px;
  }
  .badge-pendiente {
    background: var(--naranja-bg);
    color: var(--naranja);
  }
  .badge-vencido-sm {
    background: var(--rojo-bg);
    color: var(--rojo);
  }
  .badge-abonado {
    background: #e0f2fe;
    color: #0369a1;
  }

  /* Flecha expandir */
  .fiado-arrow {
    color: var(--gris-cl);
    font-size: 14px;
    transition: transform .25s;
    flex-shrink: 0;
    padding-left: 4px;
  }
  .fiado-card.expandido .fiado-arrow { transform: rotate(180deg); }

  /* Detalle expandido */
  .fiado-detalle {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--borde);
  }
  .fiado-card.expandido .fiado-detalle { display: block; }

  .detalle-titulo {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--gris);
    font-weight: 600;
    padding: 12px 0 8px;
  }
  .detalle-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px dashed var(--borde);
    font-size: 14px;
  }
  .detalle-item:last-child { border-bottom: none; }
  .detalle-qty {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--gris);
    flex-shrink: 0;
    min-width: 30px;
  }
  .detalle-nombre { flex: 1; color: var(--negro); }
  .detalle-precio {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--gris);
    text-align: right;
  }
  .detalle-total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0 0;
    font-weight: 700;
    font-size: 15px;
    border-top: 2px solid var(--negro);
    margin-top: 4px;
  }
  .no-detalle {
    font-size: 13px;
    color: var(--gris);
    padding: 10px 0;
    font-style: italic;
  }

  /* Abono parcial */
  .abono-fila {
    display: none;
    margin-top: 12px;
    padding: 12px;
    background: var(--verde-bg);
    border-radius: var(--radio-sm);
    border: 1px solid #a7d9b8;
  }
  .fiado-card.seleccionado .abono-fila { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .abono-fila label {
    font-size: 13px;
    font-weight: 600;
    color: var(--verde);
    white-space: nowrap;
  }
  .abono-fila input[type="number"] {
    flex: 1;
    min-width: 100px;
    border: 2px solid #a7d9b8;
    border-radius: var(--radio-sm);
    padding: 8px 12px;
    font-size: 15px;
    font-family: 'DM Mono', monospace;
    background: #fff;
    color: var(--negro);
    outline: none;
  }
  .abono-fila input:focus { border-color: var(--verde); }
  .abono-hint {
    width: 100%;
    font-size: 11px;
    color: var(--gris);
    margin-top: 2px;
  }
  .abono-hint.total-tag {
    color: var(--verde);
    font-weight: 600;
  }

  /* ── BARRA PAGO FLOTANTE ── */
  .barra-pago {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--negro);
    color: #fff;
    padding: 14px 20px 20px;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    z-index: 200;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.25);
    border-radius: 20px 20px 0 0;
  }
  .barra-pago.visible { transform: translateY(0); }
  .barra-handle {
    width: 40px; height: 4px;
    background: rgba(255,255,255,.25);
    border-radius: 2px;
    margin: 0 auto 14px;
  }
  .barra-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .barra-total {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #fff;
  }
  .barra-tickets {
    font-size: 12px;
    color: rgba(255,255,255,.55);
    margin-top: 2px;
  }
  .metodo-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .metodo-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 2px solid rgba(255,255,255,.2);
    background: transparent;
    color: rgba(255,255,255,.7);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    font-family: 'DM Sans', sans-serif;
  }
  .metodo-btn.activo {
    background: #fff;
    color: var(--negro);
    border-color: #fff;
  }
  .btn-confirmar-pago {
    width: 100%;
    background: var(--verde);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    transition: background .2s, transform .1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-confirmar-pago:hover { background: var(--verde-cl); }
  .btn-confirmar-pago:active { transform: scale(.98); }
  .btn-confirmar-pago:disabled { opacity: .5; cursor: not-allowed; }

  /* ── MODAL ÉXITO ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
    padding: 20px;
  }
  .modal-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }
  .modal {
    background: #fff;
    border-radius: 20px;
    padding: 30px 24px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    transform: scale(.9);
    transition: transform .25s;
  }
  .modal-overlay.visible .modal { transform: scale(1); }
  .modal-icono {
    font-size: 52px;
    margin-bottom: 12px;
  }
  .modal h3 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .modal p {
    font-size: 15px;
    color: var(--gris);
    line-height: 1.5;
    margin-bottom: 20px;
  }
  .modal-monto {
    font-family: 'DM Mono', monospace;
    font-size: 32px;
    font-weight: 500;
    color: var(--verde);
    margin-bottom: 16px;
    display: block;
  }
  .btn-modal-cerrar {
    width: 100%;
    background: var(--negro);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background .2s;
    margin-bottom: 10px;
  }
  .btn-modal-cerrar:hover { background: #1e293b; }
  .btn-modal-wa {
    width: 100%;
    background: #25d366;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background .2s;
  }
  .btn-modal-wa:hover { background: #1eb856; }

  /* ── ESTADO VACÍO / ERROR ── */
  .estado-vacio {
    text-align: center;
    padding: 50px 20px;
    display: none;
  }
  .estado-vacio .icono { font-size: 48px; margin-bottom: 12px; }
  .estado-vacio h3 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .estado-vacio p { font-size: 14px; color: var(--gris); }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .cliente-nombre { font-size: 19px; }
    .deuda-monto { font-size: 24px; }
    .barra-total { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📋</div>
  <div>
    <h1>Consulta de Fiados</h1>
    <p>Almacén Copihue</p>
  </div>
  <button class="header-back" onclick="history.back()">← Volver</button>
</div>

<div class="main">

  <!-- Buscador -->
  <div class="buscar-box">
    <h2>🔍 Buscar cliente</h2>
    <div class="input-group">
      <input
        type="tel"
        id="inputTel"
        placeholder="Teléfono del cliente..."
        inputmode="numeric"
        autocomplete="off"
        onkeydown="if(event.key==='Enter') buscarCliente()"
      >
      <button class="btn-buscar" onclick="buscarCliente()">Buscar</button>
    </div>
  </div>

  <!-- Spinner -->
  <div class="cargando" id="cargando">
    <div class="spinner"></div>
    <p>Consultando fiados...</p>
  </div>

  <!-- Resumen cliente -->
  <div class="resumen-cliente" id="resumenCliente">
    <div class="cliente-header">
      <div>
        <div class="cliente-nombre" id="clienteNombre"></div>
        <div class="cliente-tel" id="clienteTel"></div>
        <div id="badgeVencido"></div>
      </div>
      <div class="cliente-deuda">
        <div class="deuda-monto" id="deudaTotal"></div>
        <div class="deuda-label">Deuda total</div>
      </div>
    </div>
    <div class="acciones-rapidas">
      <button class="btn-accion btn-pagar-todo" onclick="seleccionarTodo()">✓ Selec. todo</button>
      <button class="btn-accion btn-pagar-seleccion" onclick="limpiarSeleccion()">✕ Limpiar</button>
      <button class="btn-accion btn-whatsapp" onclick="enviarWhatsApp()" id="btnWA">💬 WhatsApp</button>
    </div>
  </div>

  <!-- Lista de fiados -->
  <div class="fiados-lista" id="fiadosLista"></div>

  <!-- Estado vacío -->
  <div class="estado-vacio" id="estadoVacio">
    <div class="icono">🎉</div>
    <h3>Sin deuda pendiente</h3>
    <p>Este cliente no tiene fiados pendientes.</p>
  </div>

  <div class="estado-vacio" id="estadoError" style="display:none">
    <div class="icono">⚠️</div>
    <h3 id="errorTitulo">Error de búsqueda</h3>
    <p id="errorMsg"></p>
  </div>

</div>

<!-- Barra flotante de pago -->
<div class="barra-pago" id="barraPago">
  <div class="barra-handle"></div>
  <div class="barra-row">
    <div>
      <div class="barra-total" id="barraTotalTexto">$0</div>
      <div class="barra-tickets" id="barraTicketsTexto">0 fiados seleccionados</div>
    </div>
    <div class="metodo-btns">
      <button class="metodo-btn activo" onclick="setMetodo('EFECTIVO', this)">💵 Efectivo</button>
      <button class="metodo-btn" onclick="setMetodo('TRANSFERENCIA', this)">📲 Transfer.</button>
      <button class="metodo-btn" onclick="setMetodo('QR', this)">QR</button>
    </div>
  </div>
  <button class="btn-confirmar-pago" onclick="confirmarPago()" id="btnConfirmar">
    💳 Confirmar cobro
  </button>
</div>

<!-- Modal éxito -->
<div class="modal-overlay" id="modalExito">
  <div class="modal">
    <div class="modal-icono">✅</div>
    <h3>¡Cobro registrado!</h3>
    <p>Se registró el pago correctamente.</p>
    <span class="modal-monto" id="modalMonto"></span>
    <button class="btn-modal-cerrar" onclick="cerrarModal()">Listo</button>
    <button class="btn-modal-wa" onclick="enviarWhatsAppConfirmacion()" id="btnModalWA">💬 Enviar comprobante WA</button>
  </div>
</div>

<script>
// =========================================================
// CONFIG — ajustá esta URL con la de tu Web App publicada
// =========================================================
const WEBAPP_URL = 'https://script.google.com/macros/s/TU_DEPLOYMENT_ID/exec';

// =========================================================
// ESTADO GLOBAL
// =========================================================
let estadoApp = {
  cliente: '',
  telefono: '',
  fiados: [],          // array completo de fiados del cliente
  seleccionados: {},   // { idFiado: { monto: Number, parcial: Boolean } }
  metodoPago: 'EFECTIVO',
  totalCobrado: 0      // para el modal de éxito
};

// =========================================================
// BUSCAR CLIENTE
// =========================================================
async function buscarCliente() {
  const tel = document.getElementById('inputTel').value.replace(/\D/g, '').trim();
  if (!tel) {
    alert('Ingresá el teléfono del cliente');
    return;
  }

  ocultarTodo();
  mostrar('cargando');

  try {
    const res = await llamarGAS('listarFiadosCliente', { telefono: tel });

    ocultar('cargando');

    if (!res.ok) {
      mostrarError('No se pudo consultar', res.error || 'Error desconocido');
      return;
    }

    if (!res.fiados || res.fiados.length === 0) {
      mostrar('estadoVacio');
      return;
    }

    estadoApp.cliente   = res.cliente;
    estadoApp.telefono  = tel;
    estadoApp.fiados    = res.fiados;
    estadoApp.seleccionados = {};

    renderResumen(res);
    renderFiados(res.fiados);
    mostrar('resumenCliente');
    mostrar('fiadosLista');

  } catch(e) {
    ocultar('cargando');
    mostrarError('Error de conexión', e.message);
  }
}

// =========================================================
// RENDERIZAR RESUMEN CLIENTE
// =========================================================
function renderResumen(res) {
  document.getElementById('clienteNombre').textContent = res.cliente;
  document.getElementById('clienteTel').textContent    = '📞 ' + formatTel(res.telefono);
  document.getElementById('deudaTotal').textContent    = formatPeso(res.totalDeuda);

  const badge = document.getElementById('badgeVencido');
  badge.innerHTML = res.hayVencidos
    ? '<div class="badge-vencido">Tiene deuda vencida</div>'
    : '';
}

// =========================================================
// RENDERIZAR LISTA DE FIADOS
// =========================================================
function renderFiados(fiados) {
  const lista = document.getElementById('fiadosLista');
  lista.innerHTML = '';

  fiados.forEach(function(f) {
    const card = document.createElement('div');
    card.className = 'fiado-card' + (f.estado === 'VENCIDO' ? ' vencido' : '');
    card.dataset.id = f.idFiado;

    // Preview de items
    const preview = f.detalle && f.detalle.length
      ? f.detalle.slice(0, 2).map(function(i) {
          return (parseFloat(i.cantidad) !== 1 ? i.cantidad + 'x ' : '') + cortarTexto(i.nombre, 22);
        }).join(' · ') + (f.detalle.length > 2 ? ' +' + (f.detalle.length - 2) + ' más' : '')
      : f.descripcion || '';

    // Badge estado
    const badgeClass = f.estado === 'VENCIDO' ? 'badge-vencido-sm'
                     : f.abonadoParcial       ? 'badge-abonado'
                     :                          'badge-pendiente';
    const badgeTexto = f.estado === 'VENCIDO' ? '⚠ VENCIDO'
                     : f.abonadoParcial       ? '↓ Abonado parcial'
                     :                          'Pendiente';

    // Detalle de productos
    const detalleHTML = renderDetalle(f);

    card.innerHTML = `
      <div class="fiado-top" onclick="toggleCard(this.parentElement)">
        <div class="fiado-check"></div>
        <div class="fiado-info">
          <div class="fiado-ticket">Ticket #${f.ticket || '—'} &nbsp;·&nbsp; ${formatFechaCorta(f.fecha)}</div>
          <div class="fiado-items-preview">${escHTML(preview)}</div>
        </div>
        <div class="fiado-monto-col">
          <div class="fiado-monto ${f.estado === 'VENCIDO' ? 'vencido-text' : ''}">${formatPeso(f.totalPendiente)}</div>
          <div><span class="badge-estado ${badgeClass}">${badgeTexto}</span></div>
        </div>
        <div class="fiado-arrow">▼</div>
      </div>

      <div class="fiado-detalle">
        ${detalleHTML}
        <div class="abono-fila">
          <label>Abono $</label>
          <input
            type="number"
            min="1"
            max="${f.totalPendiente}"
            step="100"
            value="${f.totalPendiente}"
            placeholder="${f.totalPendiente}"
            oninput="actualizarAbono('${f.idFiado}', this.value, ${f.totalPendiente})"
            id="abono-${f.idFiado}"
          >
          <div class="abono-hint" id="abono-hint-${f.idFiado}">
            <span class="total-tag">✓ Pago total</span>
          </div>
        </div>
      </div>
    `;

    lista.appendChild(card);
  });
}

function renderDetalle(f) {
  if (!f.detalle || !f.detalle.length) {
    return `<p class="no-detalle">Sin detalle de productos disponible (ticket #${f.ticket || '—'})</p>`;
  }
  const items = f.detalle.map(function(item) {
    return `<div class="detalle-item">
      <span class="detalle-qty">${formatQty(item.cantidad)}</span>
      <span class="detalle-nombre">${escHTML(item.nombre)}</span>
      <span class="detalle-precio">${formatPeso(item.subtotal || item.precio)}</span>
    </div>`;
  }).join('');

  const totalStr = f.totalDetalle ? formatPeso(f.totalDetalle) : formatPeso(f.totalPendiente);
  let abonoInfo = '';
  if (f.abonadoParcial) {
    abonoInfo = `<div style="padding:6px 0;font-size:13px;color:#0369a1">
      Abonado: ${formatPeso(f.montoAbonado)} · Queda: <strong>${formatPeso(f.totalPendiente)}</strong>
    </div>`;
  }

  return `
    <div class="detalle-titulo">🧾 Detalle del ticket</div>
    ${items}
    <div class="detalle-total-row">
      <span>Total ticket</span>
      <span>${totalStr}</span>
    </div>
    ${abonoInfo}
  `;
}

// =========================================================
// TOGGLE CARD (expandir + seleccionar)
// =========================================================
function toggleCard(card) {
  // Siempre expandir/colapsar
  card.classList.toggle('expandido');

  // Seleccionar/deseleccionar
  const idFiado = card.dataset.id;
  const fiado   = estadoApp.fiados.find(function(f) { return f.idFiado === idFiado; });
  if (!fiado) return;

  if (card.classList.contains('seleccionado')) {
    card.classList.remove('seleccionado');
    delete estadoApp.seleccionados[idFiado];
  } else {
    card.classList.add('seleccionado');
    estadoApp.seleccionados[idFiado] = {
      monto:   fiado.totalPendiente,
      parcial: false
    };
    // Resetear input abono
    const inp = document.getElementById('abono-' + idFiado);
    if (inp) inp.value = fiado.totalPendiente;
    actualizarHintAbono(idFiado, fiado.totalPendiente, fiado.totalPendiente);
  }

  actualizarBarra();
}

// =========================================================
// ACTUALIZAR ABONO PARCIAL
// =========================================================
function actualizarAbono(idFiado, valor, totalMax) {
  const monto   = parseFloat(valor) || 0;
  const parcial = monto < totalMax;

  if (estadoApp.seleccionados[idFiado]) {
    estadoApp.seleccionados[idFiado].monto   = Math.min(monto, totalMax);
    estadoApp.seleccionados[idFiado].parcial = parcial;
  }

  actualizarHintAbono(idFiado, monto, totalMax);
  actualizarBarra();
}

function actualizarHintAbono(idFiado, monto, totalMax) {
  const hint = document.getElementById('abono-hint-' + idFiado);
  if (!hint) return;
  if (monto <= 0) {
    hint.innerHTML = '<span style="color:var(--rojo)">⚠ Monto inválido</span>';
  } else if (monto >= totalMax) {
    hint.innerHTML = '<span class="total-tag">✓ Pago total</span>';
  } else {
    const resta = totalMax - monto;
    hint.innerHTML = 'Abono parcial · quedará pendiente <strong>' + formatPeso(resta) + '</strong>';
  }
}

// =========================================================
// SELECCIONAR TODO / LIMPIAR
// =========================================================
function seleccionarTodo() {
  estadoApp.seleccionados = {};
  document.querySelectorAll('.fiado-card').forEach(function(card) {
    const idFiado = card.dataset.id;
    const fiado   = estadoApp.fiados.find(function(f) { return f.idFiado === idFiado; });
    if (!fiado) return;
    card.classList.add('seleccionado', 'expandido');
    estadoApp.seleccionados[idFiado] = { monto: fiado.totalPendiente, parcial: false };
    const inp = document.getElementById('abono-' + idFiado);
    if (inp) inp.value = fiado.totalPendiente;
    actualizarHintAbono(idFiado, fiado.totalPendiente, fiado.totalPendiente);
  });
  actualizarBarra();
}

function limpiarSeleccion() {
  estadoApp.seleccionados = {};
  document.querySelectorAll('.fiado-card').forEach(function(card) {
    card.classList.remove('seleccionado', 'expandido');
  });
  actualizarBarra();
}

// =========================================================
// BARRA DE PAGO FLOTANTE
// =========================================================
function actualizarBarra() {
  const ids = Object.keys(estadoApp.seleccionados);
  const total = ids.reduce(function(s, id) {
    return s + (parseFloat(estadoApp.seleccionados[id].monto) || 0);
  }, 0);

  document.getElementById('barraTotalTexto').textContent  = formatPeso(total);
  document.getElementById('barraTicketsTexto').textContent = ids.length + (ids.length === 1 ? ' fiado seleccionado' : ' fiados seleccionados');

  const barra = document.getElementById('barraPago');
  if (ids.length > 0 && total > 0) {
    barra.classList.add('visible');
  } else {
    barra.classList.remove('visible');
  }
}

function setMetodo(metodo, btn) {
  estadoApp.metodoPago = metodo;
  document.querySelectorAll('.metodo-btn').forEach(function(b) {
    b.classList.remove('activo');
  });
  btn.classList.add('activo');
}

// =========================================================
// CONFIRMAR PAGO
// =========================================================
async function confirmarPago() {
  const ids = Object.keys(estadoApp.seleccionados);
  if (!ids.length) return;

  const pagos = ids.map(function(id) {
    const sel = estadoApp.seleccionados[id];
    return {
      idFiado: id,
      monto:   sel.monto,
      parcial: sel.parcial
    };
  });

  const total = pagos.reduce(function(s, p) { return s + p.monto; }, 0);
  const tieneParciales = pagos.some(function(p) { return p.parcial; });

  // Confirmación
  const msg = tieneParciales
    ? '¿Registrar cobro de ' + formatPeso(total) + ' (' + estadoApp.metodoPago + ')?\nAlgunos fiados quedarán con saldo pendiente.'
    : '¿Confirmar pago total de ' + formatPeso(total) + ' (' + estadoApp.metodoPago + ')?';

  if (!confirm(msg)) return;

  const btn = document.getElementById('btnConfirmar');
  btn.disabled = true;
  btn.textContent = '⏳ Registrando...';

  try {
    const res = await llamarGAS('pagarFiadosSeleccionados', {
      pagos:      pagos,
      metodoPago: estadoApp.metodoPago,
      cliente:    estadoApp.cliente,
      telefono:   estadoApp.telefono
    });

    btn.disabled = false;
    btn.innerHTML = '💳 Confirmar cobro';

    if (!res.ok) {
      alert('❌ Error: ' + (res.error || 'No se pudo registrar el pago'));
      return;
    }

    estadoApp.totalCobrado = res.totalCobrado;

    // Mostrar modal éxito
    document.getElementById('modalMonto').textContent = formatPeso(res.totalCobrado);
    document.getElementById('modalExito').classList.add('visible');

    // Recargar datos del cliente
    setTimeout(function() { buscarClienteSilencioso(); }, 500);

  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '💳 Confirmar cobro';
    alert('❌ Error de conexión: ' + e.message);
  }
}

async function buscarClienteSilencioso() {
  try {
    const res = await llamarGAS('listarFiadosCliente', { telefono: estadoApp.telefono });
    if (res.ok) {
      estadoApp.fiados    = res.fiados || [];
      estadoApp.seleccionados = {};
      limpiarSeleccion();
      document.getElementById('fiadosLista').innerHTML = '';
      if (res.fiados && res.fiados.length) {
        renderResumen(res);
        renderFiados(res.fiados);
        document.getElementById('deudaTotal').textContent = formatPeso(res.totalDeuda);
      } else {
        ocultar('resumenCliente');
        ocultar('fiadosLista');
        mostrar('estadoVacio');
      }
    }
  } catch(e) { /* silencioso */ }
}

function cerrarModal() {
  document.getElementById('modalExito').classList.remove('visible');
  document.getElementById('barraPago').classList.remove('visible');
}

// =========================================================
// WHATSAPP
// =========================================================
function enviarWhatsApp() {
  const tel = estadoApp.telefono;
  if (!tel) { alert('No hay teléfono del cliente'); return; }

  const fiados = estadoApp.fiados;
  const total  = fiados.reduce(function(s,f){ return s + f.totalPendiente; }, 0);

  let lineas = fiados.map(function(f) {
    const items = f.detalle && f.detalle.length
      ? f.detalle.map(function(i){ return '    - ' + formatQty(i.cantidad) + ' ' + i.nombre; }).join('\n')
      : '    ' + (f.descripcion || '');
    return '📦 Ticket #' + (f.ticket||'—') + ' (' + formatFechaCorta(f.fecha) + ')\n' + items + '\n    💰 ' + formatPeso(f.totalPendiente);
  });

  const msg = '¡Hola ' + estadoApp.cliente + '! 👋\n\n' +
    'Te recordamos que tenés fiado pendiente en *Almacén Copihue*:\n\n' +
    lineas.join('\n\n') +
    '\n\n*Total deuda: ' + formatPeso(total) + '*\n\n¡Gracias! 🙏';

  abrirWA(tel, msg);
}

function enviarWhatsAppConfirmacion() {
  const tel = estadoApp.telefono;
  if (!tel) return;
  const msg = '¡Hola ' + estadoApp.cliente + '! ✅\n\n' +
    'Se registró tu pago de *' + formatPeso(estadoApp.totalCobrado) + '* ' +
    '(' + estadoApp.metodoPago + ') en *Almacén Copihue*.\n\n¡Muchas gracias! 🙏';
  abrirWA(tel, msg);
}

function abrirWA(tel, msg) {
  const tel54 = '54' + tel.replace(/^0/, '').replace(/^549/, '9').replace(/^54/, '');
  window.open('https://wa.me/' + tel54 + '?text=' + encodeURIComponent(msg), '_blank');
}

// =========================================================
// LLAMADA A GAS
// =========================================================
async function llamarGAS(accion, params) {
  const url = WEBAPP_URL + '?action=' + accion;
  const resp = await fetch(url, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(params)
  });
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  return await resp.json();
}

// =========================================================
// UTILIDADES
// =========================================================
function formatPeso(n) {
  const num = parseFloat(n) || 0;
  return '$' + num.toLocaleString('es-AR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function formatTel(tel) {
  if (!tel) return '';
  return tel.replace(/(\d{4})(\d{6})/, '$1 $2');
}

function formatFechaCorta(str) {
  if (!str) return '';
  // Soporta "2026-04-23 21:11" o Date ISO
  const partes = str.split(/[\sT]/)[0].split('-');
  if (partes.length === 3) return partes[2] + '/' + partes[1] + '/' + partes[0];
  return str;
}

function formatQty(q) {
  if (q === undefined || q === null || q === '') return '';
  const n = parseFloat(q);
  if (isNaN(n)) return String(q);
  return n % 1 === 0 ? n + 'x' : n + 'x';
}

function cortarTexto(t, max) {
  return t && t.length > max ? t.substring(0, max) + '…' : t;
}

function escHTML(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function mostrar(id) { document.getElementById(id).style.display = ''; }
function ocultar(id) { document.getElementById(id).style.display = 'none'; }
function ocultarTodo() {
  ['cargando','resumenCliente','fiadosLista','estadoVacio','estadoError'].forEach(ocultar);
  document.getElementById('fiadosLista').innerHTML = '';
  estadoApp.seleccionados = {};
  document.getElementById('barraPago').classList.remove('visible');
}
function mostrarError(titulo, msg) {
  document.getElementById('errorTitulo').textContent = titulo;
  document.getElementById('errorMsg').textContent    = msg;
  mostrar('estadoError');
}

// Presionar Enter en el input
document.getElementById('inputTel').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') buscarCliente();
});
</script>
</body>
