<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ingreso Mercadería - Copihue</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; 
      padding: 16px; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      min-height: 100vh;
    }
    .card { 
      background: #fff; 
      padding: 20px; 
      border-radius: 16px; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.15); 
      max-width: 480px; 
      margin: auto; 
    }
    h3 { 
      margin: 0 0 20px 0; 
      color: #2c3e50;
      font-size: 24px;
      border-bottom: 3px solid #667eea; 
      padding-bottom: 12px; 
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: #667eea;
      margin-top: 20px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    label { 
      display: block; 
      font-weight: 600; 
      margin-top: 12px; 
      margin-bottom: 6px; 
      color: #34495e;
      font-size: 14px;
    }
    label .opcional {
      color: #95a5a6;
      font-weight: 400;
      font-size: 12px;
      font-style: italic;
    }
    input, select { 
      width: 100%; 
      padding: 12px; 
      border: 2px solid #e0e6ed; 
      border-radius: 10px; 
      font-size: 15px; 
      transition: all 0.3s;
      font-family: inherit;
      background: #fff;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    /* Resaltar categoría cuando es producto nuevo */
    select#categoria.nuevo-producto {
      border-color: #e74c3c;
      background: #fff8f8;
      box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1);
    }
    .categoria-aviso {
      font-size: 12px;
      color: #e74c3c;
      margin-top: 4px;
      display: none;
    }
    .categoria-aviso.visible {
      display: block;
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      filter: opacity(0.5);
    }
    button { 
      width: 100%; 
      margin-top: 20px; 
      padding: 14px; 
      border-radius: 12px; 
      border: none; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff; 
      font-weight: 700; 
      font-size: 16px; 
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }
    button:active {
      transform: translateY(0);
    }
    .info { 
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      border-left: 4px solid #667eea; 
      padding: 14px; 
      margin-top: 12px; 
      border-radius: 8px; 
      font-size: 14px;
      line-height: 1.6;
    }
    .info strong {
      color: #2c3e50;
    }
    .info .precio-grande {
      font-size: 18px;
      color: #27ae60;
      font-weight: 700;
    }
    .info .alerta {
      color: #e74c3c;
      font-weight: 700;
    }
    .precio-sugerido {
      background: linear-gradient(135deg, #fff3cd 0%, #ffe5a0 100%);
      border-left: 4px solid #ffc107;
      padding: 12px;
      margin-top: 12px;
      border-radius: 8px;
      font-size: 14px;
    }
    .precio-sugerido strong {
      color: #856404;
      display: block;
      margin-bottom: 4px;
    }
    .precio-sugerido .monto {
      font-size: 20px;
      font-weight: 700;
      color: #27ae60;
    }
    datalist { display: none; }
    .loading {
      display: none;
      text-align: center;
      color: #667eea;
      font-size: 14px;
      margin-top: 10px;
    }
    .loading.active {
      display: block;
    }
    @media (max-width: 480px) {
      .card { padding: 16px; }
      h3 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h3>📦 Ingreso de Mercadería</h3>

    <!-- SECCIÓN: PRODUCTO -->
    <div class="section-title">🏷️ Producto</div>
    
    <label>Nombre del producto</label>
    <input 
      id="producto" 
      list="listaProductos" 
      placeholder="Escribe o selecciona..." 
      oninput="buscarInfo()" 
      autocomplete="off"
    />
    <datalist id="listaProductos"></datalist>
    <div class="loading" id="loadingInfo">Buscando información...</div>

    <div id="info" class="info" style="display:none;"></div>

    <label>Cantidad a ingresar</label>
    <input 
      id="cantidad" 
      type="number" 
      min="1" 
      value="1" 
      oninput="calcularPrecioSugerido()"
    />

    <label>Categoría</label>
    <select id="categoria">
      <option value="ALMACEN">📦 ALMACEN</option>
      <option value="VINOS">🍷 VINOS</option>
      <option value="SNACKS">🍿 SNACKS</option>
      <option value="BEBIDAS">🥤 BEBIDAS</option>
      <option value="CERVEZAS">🍺 CERVEZAS</option>
      <option value="LACTEOS">🥛 LÁCTEOS</option>
      <option value="FIAMBRES">🥩 FIAMBRES</option>
      <option value="VERDULERIA">🥦 VERDULERÍA</option>
      <option value="PANADERIA">🍞 PANADERÍA</option>
      <option value="LIMPIEZA">🧹 LIMPIEZA</option>
      <option value="HIGIENE PERSONAL">🧴 HIGIENE PERSONAL</option>
      <option value="OTROS">🔹 OTROS</option>
    </select>
    <div class="categoria-aviso" id="categoriaAviso">
      ⚠️ Producto nuevo — seleccioná la categoría correcta antes de guardar
    </div>

    <!-- SECCIÓN: COSTOS Y PRECIOS -->
    <div class="section-title">💰 Precios</div>

    <label>Precio de COSTO (unitario)</label>
    <input 
      id="precioCosto" 
      type="number" 
      min="0" 
      step="0.01" 
      placeholder="Ej: 1500"
      oninput="calcularPrecioSugerido()"
    />

    <div id="precioSugerido" class="precio-sugerido" style="display:none;">
      <strong>💡 Precio mínimo sugerido (+50%):</strong>
      <span class="monto">$0</span>
    </div>

    <label>Precio de VENTA <span class="opcional">(dejar vacío para mantener actual)</span></label>
    <input 
      id="precioVenta" 
      type="number" 
      min="0" 
      step="0.01" 
      placeholder="Precio de venta al público"
    />

    <!-- SECCIÓN: DATOS ADICIONALES -->
    <div class="section-title">📋 Información adicional</div>

    <label>Proveedor <span class="opcional">(opcional)</span></label>
    <input 
      id="proveedor" 
      type="text" 
      placeholder="Nombre del proveedor"
      list="listaProveedores"
    />
    <datalist id="listaProveedores"></datalist>

    <label>Fecha de vencimiento <span class="opcional">(opcional)</span></label>
    <input 
      id="fechaVencimiento" 
      type="date"
    />

    <button onclick="guardar()">✅ Guardar Ingreso</button>
  </div>

  <script>
    let productosCache = [];
    let proveedoresCache = [];
    let esProductoNuevo = false;

    // Cargar datos al iniciar
    document.addEventListener('DOMContentLoaded', function() {
      google.script.run.withSuccessHandler(function(data) {
        productosCache = data.productos || [];
        proveedoresCache = data.proveedores || [];
        popularListas();
      }).obtenerDatosIniciales();
    });

    function popularListas() {
      const datalistProductos = document.getElementById('listaProductos');
      datalistProductos.innerHTML = '';
      productosCache.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p;
        datalistProductos.appendChild(opt);
      });

      const datalistProveedores = document.getElementById('listaProveedores');
      datalistProveedores.innerHTML = '';
      proveedoresCache.forEach(prov => {
        const opt = document.createElement('option');
        opt.value = prov;
        datalistProveedores.appendChild(opt);
      });
    }

    // Buscar información del producto al escribir
    function buscarInfo() {
      const nombre = document.getElementById('producto').value.trim();
      const infoDiv = document.getElementById('info');
      const loadingDiv = document.getElementById('loadingInfo');
      const categoriaSelect = document.getElementById('categoria');
      const categoriaAviso = document.getElementById('categoriaAviso');

      if (!nombre) { 
        infoDiv.style.display = 'none'; 
        infoDiv.innerHTML = ''; 
        loadingDiv.classList.remove('active');
        categoriaSelect.classList.remove('nuevo-producto');
        categoriaAviso.classList.remove('visible');
        esProductoNuevo = false;
        return; 
      }

      loadingDiv.classList.add('active');

      google.script.run
        .withSuccessHandler(function(info) {
          loadingDiv.classList.remove('active');
          
          if (!info || !info.encontrado) {
            // Producto nuevo — resaltar campo categoría
            esProductoNuevo = true;
            categoriaSelect.classList.add('nuevo-producto');
            categoriaAviso.classList.add('visible');

            infoDiv.style.display = 'block';
            infoDiv.innerHTML = '<span class="alerta">⚠️ Producto no encontrado</span><br><small>Se creará como nuevo — revisá la categoría antes de guardar</small>';
            return;
          }

          // Producto existente — sin aviso de categoría
          esProductoNuevo = false;
          categoriaSelect.classList.remove('nuevo-producto');
          categoriaAviso.classList.remove('visible');

          // Sincronizar categoría con la del producto existente
          if (info.categoria) {
            const cat = info.categoria.trim().toUpperCase();
            for (let i = 0; i < categoriaSelect.options.length; i++) {
              if (categoriaSelect.options[i].value === cat) {
                categoriaSelect.selectedIndex = i;
                break;
              }
            }
          }

          infoDiv.style.display = 'block';
          infoDiv.innerHTML = `
            <strong>📊 Datos actuales:</strong><br>
            Precio de venta: <span class="precio-grande">$${info.precioVenta}</span><br>
            Stock actual: <strong>${info.stockActual}</strong> unidades
            ${info.precioCosto ? '<br>Último costo: <strong>$' + info.precioCosto + '</strong>' : ''}
            ${info.proveedor ? '<br>Último proveedor: <strong>' + info.proveedor + '</strong>' : ''}
          `;

          if (info.precioCosto && !document.getElementById('precioCosto').value) {
            document.getElementById('precioCosto').value = info.precioCosto;
            calcularPrecioSugerido();
          }
          if (info.proveedor && !document.getElementById('proveedor').value) {
            document.getElementById('proveedor').value = info.proveedor;
          }
        })
        .withFailureHandler(function(error) {
          loadingDiv.classList.remove('active');
          console.error('Error:', error);
        })
        .obtenerInfoProducto(nombre);
    }

    function calcularPrecioSugerido() {
      const costo = parseFloat(document.getElementById('precioCosto').value) || 0;
      const sugeridoDiv = document.getElementById('precioSugerido');
      
      if (costo > 0) {
        const sugerido = Math.ceil(costo * 1.5);
        sugeridoDiv.style.display = 'block';
        sugeridoDiv.querySelector('.monto').textContent = '$' + sugerido.toLocaleString();
      } else {
        sugeridoDiv.style.display = 'none';
      }
    }

    function guardar() {
      const datos = {
        producto: document.getElementById('producto').value.trim(),
        cantidad: Number(document.getElementById('cantidad').value),
        categoria: document.getElementById('categoria').value,
        precioCosto: parseFloat(document.getElementById('precioCosto').value) || null,
        precioVenta: parseFloat(document.getElementById('precioVenta').value) || null,
        proveedor: document.getElementById('proveedor').value.trim() || null,
        fechaVencimiento: document.getElementById('fechaVencimiento').value || null
      };

      if (!datos.producto) {
        alert('❌ Ingresá el nombre del producto');
        return;
      }
      if (!datos.cantidad || datos.cantidad <= 0) {
        alert('❌ La cantidad debe ser mayor a 0');
        return;
      }
      // Advertir si es nuevo y quedó en ALMACEN sin querer
      if (esProductoNuevo && datos.categoria === 'ALMACEN') {
        if (!confirm('📦 La categoría quedó en ALMACEN. ¿Es correcto? (Si no, cancelá y cambiala)')) {
          return;
        }
      }
      if (!datos.precioCosto) {
        if (!confirm('⚠️ No ingresaste precio de costo. ¿Continuar igual?')) {
          return;
        }
      }

      const btn = document.querySelector('button');
      const btnTexto = btn.textContent;
      btn.disabled = true;
      btn.textContent = '⏳ Guardando...';

      google.script.run
        .withSuccessHandler(function(res) {
          btn.disabled = false;
          btn.textContent = btnTexto;
          
          if (res.success) {
            alert('✅ ' + res.mensaje);
            document.getElementById('producto').value = '';
            document.getElementById('cantidad').value = '1';
            document.getElementById('categoria').selectedIndex = 0;
            document.getElementById('precioCosto').value = '';
            document.getElementById('precioVenta').value = '';
            document.getElementById('proveedor').value = '';
            document.getElementById('fechaVencimiento').value = '';
            document.getElementById('info').style.display = 'none';
            document.getElementById('precioSugerido').style.display = 'none';
            document.getElementById('categoria').classList.remove('nuevo-producto');
            document.getElementById('categoriaAviso').classList.remove('visible');
            esProductoNuevo = false;
          } else {
            alert('❌ ' + res.mensaje);
          }
        })
        .withFailureHandler(function(error) {
          btn.disabled = false;
          btn.textContent = btnTexto;
          alert('❌ Error: ' + error.message);
          console.error('Error completo:', error);
        })
        .ingresarMercaderia(datos);
    }
  </script>
</body>
</html>
