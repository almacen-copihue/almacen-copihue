<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>v2 · Copihue · Ingreso</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      max-width: 480px;
      margin: auto;
    }
    h3 {
      margin: 0 0 20px 0;
      color: #2c3e50;
      font-size: 22px;
      border-bottom: 3px solid #667eea;
      padding-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .version { font-size: 11px; color: #aaa; font-weight: 400; }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: #667eea;
      margin: 20px 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    label {
      display: block;
      font-weight: 600;
      margin: 12px 0 6px;
      color: #34495e;
      font-size: 14px;
    }
    label .opcional { color: #95a5a6; font-weight: 400; font-size: 12px; font-style: italic; }
    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e6ed;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { outline: none; border-color: #667eea; }
    select#categoria.nuevo-producto { border-color: #e74c3c; background: #fff8f8; }
    .aviso-categoria { font-size: 12px; color: #e74c3c; margin-top: 4px; display: none; }
    .aviso-categoria.visible { display: block; }

    /* Info producto encontrado */
    .info {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      padding: 14px;
      margin-top: 10px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.7;
      display: none;
    }
    .info .precio-grande { font-size: 18px; color: #27ae60; font-weight: 700; }
    .info .alerta { color: #e74c3c; font-weight: 700; }

    /* Precio sugerido */
    .precio-sugerido {
      background: linear-gradient(135deg, #fff3cd 0%, #ffe5a0 100%);
      border-left: 4px solid #ffc107;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .precio-sugerido strong { color: #856404; display: block; margin-bottom: 2px; }
    .precio-sugerido .monto { font-size: 20px; font-weight: 700; color: #27ae60; }

    /* Loading spinner */
    .loading { display: none; text-align: center; color: #667eea; font-size: 13px; margin-top: 8px; }
    .loading.active { display: block; }

    /* Autocomplete dropdown */
    .autocomplete-wrap { position: relative; }
    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: white;
      border: 2px solid #667eea;
      border-top: none;
      border-radius: 0 0 10px 10px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .autocomplete-list.open { display: block; }
    .autocomplete-item {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      border-bottom: 1px solid #f0f0f0;
    }
    .autocomplete-item:hover { background: #f0f4ff; }
    .autocomplete-item .match { font-weight: 700; color: #667eea; }

    /* Botón guardar */
    button.btn-guardar {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(102,126,234,0.4);
      transition: all 0.2s;
    }
    button.btn-guardar:hover { transform: translateY(-2px); }
    button.btn-guardar:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2e7d32;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 15px;
      transition: transform 0.3s;
      z-index: 9999;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.error { background: #c62828; }

    @media (max-width: 480px) {
      .card { padding: 16px; }
      h3 { font-size: 19px; }
    }
  </style>
</head>
<body>
<div class="card">
  <h3>
    <span>📦 Ingreso Mercadería</span>
    <span class="version">v1</span>
  </h3>

  <!-- PRODUCTO -->
  <div class="section-title">🏷️ Producto</div>

  <label>Nombre del producto</label>
  <div class="autocomplete-wrap">
    <input id="producto" type="text" placeholder="Escribí para buscar..."
      autocomplete="off" oninput="onProductoInput()" onfocus="onProductoInput()">
    <div class="autocomplete-list" id="autoList"></div>
  </div>
  <div class="loading" id="loadingInfo">Buscando información...</div>
  <div class="info" id="info"></div>

  <label>Cantidad a ingresar</label>
  <input id="cantidad" type="number" min="1" value="1" oninput="calcularSugerido()">

  <label>Categoría</label>
  <select id="categoria">
    <option value="ALMACEN">📦 ALMACEN</option>
    <option value="ALFAJORES">🍫 ALFAJORES</option>
    <option value="GASEOSAS">🥤 GASEOSAS</option>
    <option value="BEBIDAS">🧃 BEBIDAS</option>
    <option value="CERVEZAS">🍺 CERVEZAS</option>
    <option value="VINOS">🍷 VINOS</option>
    <option value="LACTEOS">🥛 LÁCTEOS</option>
    <option value="HELADERA">🧊 HELADERA</option>
    <option value="FIAMBRES">🥩 FIAMBRES</option>
    <option value="FRUTAS Y VERDURAS">🥦 FRUTAS Y VERDURAS</option>
    <option value="PANADERIA">🍞 PANADERÍA</option>
    <option value="PANIFICADOS">🥐 PANIFICADOS</option>
    <option value="LIMPIEZA">🧹 LIMPIEZA</option>
    <option value="HIGIENE PERSONAL">🧴 HIGIENE PERSONAL</option>
    <option value="GOLOSINAS">🍬 GOLOSINAS</option>
    <option value="GALLETITAS">🍪 GALLETITAS</option>
    <option value="CONDIMENTOS">🧂 CONDIMENTOS</option>
    <option value="SNACKS">🍿 SNACKS</option>
    <option value="ELECTRONICA">📱 ELECTRÓNICA</option>
    <option value="COMPUTACION">💻 COMPUTACIÓN</option>
    <option value="OTROS">🔹 OTROS</option>
  </select>
  <div class="aviso-categoria" id="avisoCategoria">
    ⚠️ Producto nuevo — seleccioná la categoría antes de guardar
  </div>

  <!-- PRECIOS -->
  <div class="section-title">💰 Precios</div>

  <label>Precio de COSTO (unitario)</label>
  <input id="precioCosto" type="number" min="0" step="1" placeholder="Ej: 1500"
    oninput="calcularSugerido()">

  <div class="precio-sugerido" id="precioSugerido">
    <strong>💡 Precio mínimo sugerido (+50%):</strong>
    <span class="monto" id="montoSugerido">$0</span>
  </div>

  <label>Precio de VENTA <span class="opcional">(vacío = mantener actual)</span></label>
  <input id="precioVenta" type="number" min="0" step="1" placeholder="Precio al público">

  <!-- ADICIONAL -->
  <div class="section-title">📋 Información adicional</div>

  <label>Proveedor <span class="opcional">(opcional)</span></label>
  <div class="autocomplete-wrap">
    <input id="proveedor" type="text" placeholder="Nombre del proveedor"
      autocomplete="off" oninput="filtrarProveedores()">
    <div class="autocomplete-list" id="autoListProv"></div>
  </div>

  <label>Fecha de vencimiento <span class="opcional">(opcional)</span></label>
  <input id="fechaVencimiento" type="date">

  <button class="btn-guardar" id="btnGuardar" onclick="guardar()">✅ Guardar Ingreso</button>
</div>

<div id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxhKFk2WAi-KRY5xGBsI6_6Pvp3jDjt8mSRXvy7I1WehNmBpJamqK9G9Q1ZJSCSgAdfDA/exec';

let _productos = [];
let _proveedores = [];
let _esNuevo = false;
let _buscarTimer = null;
let _infoTimer = null;

// ── INIT ──────────────────────────────────────────
async function init() {
  try {
    const r = await fetch(API_URL + '?t=' + Date.now(), { redirect: 'follow' });
    const data = await r.json();
    _productos = (data.productos || []).map(p => typeof p === 'string' ? p : (p.name || p));
    // Extraer proveedores únicos de los productos
    const provSet = new Set();
    (data.productos || []).forEach(p => { if (p.proveedor) provSet.add(p.proveedor); });
    _proveedores = [...provSet].filter(Boolean).sort();
  } catch(e) {
    console.warn('Error cargando productos:', e);
  }
}
init();

// ── AUTOCOMPLETE PRODUCTO ─────────────────────────
function onProductoInput() {
  const val = document.getElementById('producto').value.trim();
  const list = document.getElementById('autoList');

  if (val.length < 2) {
    list.classList.remove('open');
    document.getElementById('info').style.display = 'none';
    resetCategoria();
    return;
  }

  const valUp = val.toUpperCase();
  const matches = _productos
    .filter(p => p.toUpperCase().includes(valUp))
    .slice(0, 8);

  if (matches.length === 0) {
    list.classList.remove('open');
  } else {
    list.innerHTML = matches.map(p => {
      const idx = p.toUpperCase().indexOf(valUp);
      const before = p.substring(0, idx);
      const match  = p.substring(idx, idx + val.length);
      const after  = p.substring(idx + val.length);
      return `<div class="autocomplete-item" onclick="seleccionarProducto('${p.replace(/'/g,"\\'")}')">
        ${before}<span class="match">${match}</span>${after}
      </div>`;
    }).join('');
    list.classList.add('open');
  }

  // Buscar info con debounce
  clearTimeout(_infoTimer);
  _infoTimer = setTimeout(() => buscarInfo(val), 600);
}

function seleccionarProducto(nombre) {
  document.getElementById('producto').value = nombre;
  document.getElementById('autoList').classList.remove('open');
  buscarInfo(nombre);
}

// Cerrar dropdown al click fuera
document.addEventListener('click', function(e) {
  if (!e.target.closest('.autocomplete-wrap')) {
    document.getElementById('autoList').classList.remove('open');
    document.getElementById('autoListProv').classList.remove('open');
  }
});

// ── BUSCAR INFO PRODUCTO ──────────────────────────
async function buscarInfo(nombre) {
  if (!nombre || nombre.length < 2) return;

  const infoDiv = document.getElementById('info');
  const loading = document.getElementById('loadingInfo');
  loading.classList.add('active');
  infoDiv.style.display = 'none';

  try {
    const r = await fetch(API_URL + '?action=getInfoProducto&nombre=' + encodeURIComponent(nombre) + '&t=' + Date.now(), { redirect: 'follow' });
    const data = await r.json();
    loading.classList.remove('active');

    if (!data.encontrado) {
      _esNuevo = true;
      document.getElementById('categoria').classList.add('nuevo-producto');
      document.getElementById('avisoCategoria').classList.add('visible');
      infoDiv.style.display = 'block';
      infoDiv.innerHTML = '<span class="alerta">⚠️ Producto no encontrado</span><br><small>Se creará como nuevo — revisá la categoría antes de guardar</small>';
      return;
    }

    _esNuevo = false;
    resetCategoria();

    // Sincronizar categoría
    if (data.categoria) {
      const opts = document.getElementById('categoria').options;
      for (let i = 0; i < opts.length; i++) {
        if (opts[i].value === data.categoria.trim().toUpperCase()) {
          document.getElementById('categoria').selectedIndex = i;
          break;
        }
      }
    }

    // Autocompletar costo y proveedor si están vacíos
    if (data.precioCosto && !document.getElementById('precioCosto').value) {
      document.getElementById('precioCosto').value = data.precioCosto;
      calcularSugerido();
    }
    if (data.proveedor && !document.getElementById('proveedor').value) {
      document.getElementById('proveedor').value = data.proveedor;
    }

    infoDiv.style.display = 'block';
    infoDiv.innerHTML = `
      <strong>📊 Datos actuales:</strong><br>
      Precio de venta: <span class="precio-grande">$${Number(data.precioVenta||0).toLocaleString('es-AR')}</span><br>
      Stock actual: <strong>${data.stockActual}</strong> unidades
      ${data.precioCosto ? '<br>Último costo: <strong>$' + Number(data.precioCosto).toLocaleString('es-AR') + '</strong>' : ''}
      ${data.proveedor ? '<br>Proveedor: <strong>' + data.proveedor + '</strong>' : ''}
    `;
  } catch(e) {
    loading.classList.remove('active');
    console.warn('Error buscando info:', e);
  }
}

function resetCategoria() {
  _esNuevo = false;
  document.getElementById('categoria').classList.remove('nuevo-producto');
  document.getElementById('avisoCategoria').classList.remove('visible');
}

// ── PRECIO SUGERIDO ───────────────────────────────
function calcularSugerido() {
  const costo = parseFloat(document.getElementById('precioCosto').value) || 0;
  const div = document.getElementById('precioSugerido');
  if (costo > 0) {
    document.getElementById('montoSugerido').textContent = '$' + Math.ceil(costo * 1.5).toLocaleString('es-AR');
    div.style.display = 'block';
  } else {
    div.style.display = 'none';
  }
}

// ── AUTOCOMPLETE PROVEEDOR ────────────────────────
function filtrarProveedores() {
  const val = document.getElementById('proveedor').value.trim().toUpperCase();
  const list = document.getElementById('autoListProv');
  if (val.length < 1) { list.classList.remove('open'); return; }

  const matches = _proveedores.filter(p => p.toUpperCase().includes(val)).slice(0, 6);
  if (!matches.length) { list.classList.remove('open'); return; }

  list.innerHTML = matches.map(p =>
    `<div class="autocomplete-item" onclick="document.getElementById('proveedor').value='${p}';document.getElementById('autoListProv').classList.remove('open');">${p}</div>`
  ).join('');
  list.classList.add('open');
}

// ── GUARDAR ───────────────────────────────────────
async function guardar() {
  const nombre   = document.getElementById('producto').value.trim();
  const cantidad = Number(document.getElementById('cantidad').value);
  const categoria = document.getElementById('categoria').value;
  const precioCosto = parseFloat(document.getElementById('precioCosto').value) || null;
  const precioVenta = parseFloat(document.getElementById('precioVenta').value) || null;
  const proveedor = document.getElementById('proveedor').value.trim() || null;
  const fechaVencimiento = document.getElementById('fechaVencimiento').value || null;

  if (!nombre) { toast('❌ Ingresá el nombre del producto', true); return; }
  if (!cantidad || cantidad <= 0) { toast('❌ La cantidad debe ser mayor a 0', true); return; }

  if (_esNuevo && categoria === 'ALMACEN') {
    if (!confirm('📦 La categoría quedó en ALMACEN. ¿Es correcto?')) return;
  }
  if (!precioCosto) {
    if (!confirm('⚠️ No ingresaste precio de costo. ¿Continuar igual?')) return;
  }

  const btn = document.getElementById('btnGuardar');
  btn.disabled = true;
  btn.textContent = '⏳ Guardando...';

  try {
    const datos = { producto: nombre, cantidad, categoria, precioCosto, precioVenta, proveedor, fechaVencimiento };
    const url = API_URL + '?action=ingresar&data=' + encodeURIComponent(JSON.stringify(datos));
    const r = await fetch(url, { redirect: 'follow', signal: AbortSignal.timeout(15000) });
    const res = await r.json();

    btn.disabled = false;
    btn.textContent = '✅ Guardar Ingreso';

    if (res.success) {
      toast('✅ ' + res.mensaje);
      limpiar();
    } else {
      toast('❌ ' + (res.mensaje || 'Error al guardar'), true);
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '✅ Guardar Ingreso';
    toast('❌ Error de conexión — intentá de nuevo', true);
    console.error(e);
  }
}

function limpiar() {
  document.getElementById('producto').value = '';
  document.getElementById('cantidad').value = '1';
  document.getElementById('categoria').selectedIndex = 0;
  document.getElementById('precioCosto').value = '';
  document.getElementById('precioVenta').value = '';
  document.getElementById('proveedor').value = '';
  document.getElementById('fechaVencimiento').value = '';
  document.getElementById('info').style.display = 'none';
  document.getElementById('precioSugerido').style.display = 'none';
  document.getElementById('autoList').classList.remove('open');
  resetCategoria();
  document.getElementById('producto').focus();
}

// ── TOAST ─────────────────────────────────────────
function toast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (error ? ' error' : '');
  setTimeout(() => { t.className = ''; }, 3500);
}
</script>
</body>
</html>
