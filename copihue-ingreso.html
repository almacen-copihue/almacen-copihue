<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>v3 · Copihue · Ingreso</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      max-width: 480px;
      margin: auto;
    }
    h3 {
      margin: 0 0 20px 0;
      color: #2c3e50;
      font-size: 22px;
      border-bottom: 3px solid #667eea;
      padding-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .version { font-size: 11px; color: #aaa; font-weight: 400; }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: #667eea;
      margin: 20px 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    label {
      display: block;
      font-weight: 600;
      margin: 12px 0 6px;
      color: #34495e;
      font-size: 14px;
    }
    label .opcional { color: #95a5a6; font-weight: 400; font-size: 12px; font-style: italic; }
    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e6ed;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { outline: none; border-color: #667eea; }

    /* Categoría nuevo producto */
    select#categoria.nuevo-producto { border-color: #e74c3c; background: #fff8f8; }
    .aviso-categoria { font-size: 12px; color: #e74c3c; margin-top: 4px; display: none; }
    .aviso-categoria.visible { display: block; }

    /* Skeleton cargando categorías */
    .select-loading {
      width: 100%;
      padding: 12px;
      border: 2px dashed #c0c9d4;
      border-radius: 10px;
      font-size: 14px;
      color: #95a5a6;
      background: #f8f9fa;
      text-align: center;
      display: none;
    }
    .select-loading.visible { display: block; }

    /* Info producto encontrado */
    .info {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      padding: 14px;
      margin-top: 10px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.7;
      display: none;
    }
    .info .precio-grande { font-size: 18px; color: #27ae60; font-weight: 700; }
    .info .alerta { color: #e74c3c; font-weight: 700; }

    /* Banner precargado */
    .banner-precargado {
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      border-left: 4px solid #43a047;
      padding: 10px 14px;
      margin-top: 8px;
      border-radius: 8px;
      font-size: 13px;
      color: #2e7d32;
      display: none;
    }
    .banner-precargado.visible { display: flex; align-items: center; gap: 8px; }

    /* Precio sugerido */
    .precio-sugerido {
      background: linear-gradient(135deg, #fff3cd 0%, #ffe5a0 100%);
      border-left: 4px solid #ffc107;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .precio-sugerido strong { color: #856404; display: block; margin-bottom: 2px; }
    .precio-sugerido .monto { font-size: 20px; font-weight: 700; color: #27ae60; }

    /* Loading spinner */
    .loading { display: none; text-align: center; color: #667eea; font-size: 13px; margin-top: 8px; }
    .loading.active { display: block; }

    /* Autocomplete dropdown */
    .autocomplete-wrap { position: relative; }
    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: white;
      border: 2px solid #667eea;
      border-top: none;
      border-radius: 0 0 10px 10px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .autocomplete-list.open { display: block; }
    .autocomplete-item {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      border-bottom: 1px solid #f0f0f0;
    }
    .autocomplete-item:hover { background: #f0f4ff; }
    .autocomplete-item .match { font-weight: 700; color: #667eea; }

    /* Categoría autocomplete */
    .cat-wrap { position: relative; }
    .cat-input-box {
      display: flex;
      align-items: center;
      gap: 0;
      border: 2px solid #e0e6ed;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
      transition: border-color 0.2s;
    }
    .cat-input-box:focus-within { border-color: #667eea; }
    .cat-input-box.nuevo-producto { border-color: #e74c3c; background: #fff8f8; }
    .cat-input-box input {
      border: none !important;
      border-radius: 0 !important;
      flex: 1;
      padding: 12px;
      font-size: 15px;
    }
    .cat-input-box input:focus { outline: none; }
    .cat-chevron {
      padding: 0 12px;
      color: #95a5a6;
      cursor: pointer;
      font-size: 12px;
      user-select: none;
    }
    .cat-list {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: white;
      border: 2px solid #667eea;
      border-top: none;
      border-radius: 0 0 10px 10px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .cat-list.open { display: block; }
    .cat-item {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cat-item:hover { background: #f0f4ff; }
    .cat-item.active { background: #eef1ff; font-weight: 700; }

    /* Botón guardar */
    button.btn-guardar {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(102,126,234,0.4);
      transition: all 0.2s;
    }
    button.btn-guardar:hover { transform: translateY(-2px); }
    button.btn-guardar:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2e7d32;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 15px;
      transition: transform 0.3s;
      z-index: 9999;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.error { background: #c62828; }

    @media (max-width: 480px) {
      .card { padding: 16px; }
      h3 { font-size: 19px; }
    }
  </style>
</head>
<body>
<div class="card">
  <h3>
    <span>📦 Ingreso Mercadería</span>
    <span class="version">v3</span>
  </h3>

  <!-- PRODUCTO -->
  <div class="section-title">🏷️ Producto</div>

  <label>Nombre del producto</label>
  <div class="autocomplete-wrap">
    <input id="producto" type="text" placeholder="Escribí para buscar..."
      autocomplete="off" oninput="onProductoInput()" onfocus="onProductoInput()">
    <div class="autocomplete-list" id="autoList"></div>
  </div>
  <div class="loading" id="loadingInfo">Buscando información...</div>
  <div class="banner-precargado" id="bannerPrecargado">
    <span>✅</span><span id="textoPrecargado">Datos del último ingreso cargados — modificá lo que cambió</span>
  </div>
  <div class="info" id="info"></div>

  <label>Cantidad a ingresar</label>
  <input id="cantidad" type="number" min="1" value="1" oninput="calcularSugerido()">

  <label>Categoría</label>
  <!-- Se renderiza dinámicamente en buildCategoriaWidget() -->
  <div class="select-loading visible" id="catLoading">⏳ Cargando categorías...</div>
  <div class="cat-wrap" id="catWrap" style="display:none">
    <div class="cat-input-box" id="catInputBox">
      <input id="categoriaInput" type="text" placeholder="Escribí para filtrar..."
        autocomplete="off" oninput="filtrarCategorias()" onfocus="abrirCatList()">
      <span class="cat-chevron" onclick="toggleCatList()">▼</span>
    </div>
    <div class="cat-list" id="catList"></div>
  </div>
  <input type="hidden" id="categoria" value="">
  <div class="aviso-categoria" id="avisoCategoria">
    ⚠️ Producto nuevo — seleccioná la categoría antes de guardar
  </div>

  <!-- PRECIOS -->
  <div class="section-title">💰 Precios</div>

  <label>Precio de COSTO (unitario)</label>
  <input id="precioCosto" type="number" min="0" step="1" placeholder="Ej: 1500"
    oninput="calcularSugerido()">

  <div class="precio-sugerido" id="precioSugerido">
    <strong>💡 Precio mínimo sugerido (+50%):</strong>
    <span class="monto" id="montoSugerido">$0</span>
  </div>

  <label>Precio de VENTA <span class="opcional">(vacío = mantener actual)</span></label>
  <input id="precioVenta" type="number" min="0" step="1" placeholder="Precio al público">

  <!-- ADICIONAL -->
  <div class="section-title">📋 Información adicional</div>

  <label>Proveedor <span class="opcional">(opcional)</span></label>
  <div class="autocomplete-wrap">
    <input id="proveedor" type="text" placeholder="Nombre del proveedor"
      autocomplete="off" oninput="filtrarProveedores()">
    <div class="autocomplete-list" id="autoListProv"></div>
  </div>

  <label>Fecha de vencimiento <span class="opcional">(opcional)</span></label>
  <input id="fechaVencimiento" type="date">

  <button class="btn-guardar" id="btnGuardar" onclick="guardar()">✅ Guardar Ingreso</button>
</div>

<div id="toast"></div>

<script>
// ── Changelog ──────────────────────────────────────────────────────────────────
// v3 — Categorías dinámicas desde GAS (no más hardcode); widget con búsqueda.
//       Al seleccionar producto existente se precargan TODOS los datos del último
//       ingreso (costo, venta, proveedor, categoría) con banner visual verde.
//       La cantidad se resetea a 1 (lo más común es ingresar nueva remesa).
// v2 — (base recibida)
// ──────────────────────────────────────────────────────────────────────────────

const API_URL = 'https://script.google.com/macros/s/AKfycbzWZzDvdGfW8vd2-FpQolT852cdPMeHbfKugn9DBOlju75bE1D0SUNB5EKEDOsI2vP4lA/exec';

let _productos    = [];   // array de strings (nombres)
let _productosMap = {};   // nombre → objeto completo {categoria, precioCosto, precioVenta, proveedor, ...}
let _proveedores  = [];
let _categorias   = [];   // [{value, emoji, label}] desde GAS
let _catFiltradas = [];   // subset según búsqueda
let _esNuevo      = false;
let _infoTimer    = null;
let _catAbierta   = false;

// ── INIT ───────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const r    = await fetch(API_URL + '?t=' + Date.now(), { redirect: 'follow' });
    const data = await r.json();

    // Productos
    const rawProductos = data.productos || [];
    rawProductos.forEach(p => {
      if (!p) return;
      const nombre = typeof p === 'string' ? p : (p.name || p.nombre || '');
      if (!nombre) return;
      _productos.push(nombre);
      if (typeof p === 'object') _productosMap[nombre] = p;
    });

    // Proveedores únicos
    const provSet = new Set();
    rawProductos.forEach(p => { if (p && p.proveedor) provSet.add(p.proveedor); });
    _proveedores = [...provSet].filter(Boolean).sort();

    // Categorías desde GAS
    // Formato esperado: data.categorias = ['ALMACEN','BEBIDAS',...] o [{value,label,emoji}]
    if (data.categorias && data.categorias.length) {
      _categorias = data.categorias.map(c => {
        if (typeof c === 'string') return { value: c.trim().toUpperCase(), label: c.trim(), emoji: '' };
        return {
          value: (c.value || c.nombre || c).trim().toUpperCase(),
          label: (c.label || c.nombre || c.value || c).trim(),
          emoji: c.emoji || ''
        };
      });
    } else {
      // Fallback: extraer categorías únicas del listado de productos
      const catSet = new Set();
      rawProductos.forEach(p => { if (p && p.categoria) catSet.add(p.categoria.trim().toUpperCase()); });
      _categorias = [...catSet].filter(Boolean).sort().map(c => ({ value: c, label: c, emoji: '' }));
    }

    buildCategoriaWidget();

  } catch(e) {
    console.warn('Error cargando datos:', e);
    // Mostrar widget igualmente (vacío) para no bloquear al usuario
    _categorias = [];
    buildCategoriaWidget();
  }
}
init();

// ── WIDGET CATEGORÍA ────────────────────────────────────────────────────────────
function buildCategoriaWidget() {
  document.getElementById('catLoading').classList.remove('visible');
  document.getElementById('catWrap').style.display = 'block';
  _catFiltradas = [..._categorias];
  renderCatList(_catFiltradas, '');
}

function renderCatList(items, query) {
  const list = document.getElementById('catList');
  const catVal = document.getElementById('categoria').value;
  const qUp = query.trim().toUpperCase();
  list.innerHTML = items.map(c => {
    const display = c.emoji ? c.emoji + ' ' + c.label : c.label;
    let highlighted = display;
    if (qUp) {
      const idx = display.toUpperCase().indexOf(qUp);
      if (idx >= 0) {
        highlighted = display.substring(0,idx) + '<span class="match">' + display.substring(idx, idx+query.length) + '</span>' + display.substring(idx+query.length);
      }
    }
    const isActive = c.value === catVal ? ' active' : '';
    return `<div class="cat-item${isActive}" onclick="seleccionarCategoria('${c.value}','${display.replace(/'/g,"\\'")}')">${highlighted}</div>`;
  }).join('');
}

function filtrarCategorias() {
  const q = document.getElementById('categoriaInput').value;
  const qUp = q.trim().toUpperCase();
  _catFiltradas = qUp ? _categorias.filter(c => c.label.toUpperCase().includes(qUp) || c.value.includes(qUp)) : [..._categorias];
  renderCatList(_catFiltradas, q);
  abrirCatList();
}

function abrirCatList() {
  document.getElementById('catList').classList.add('open');
  _catAbierta = true;
}

function cerrarCatList() {
  document.getElementById('catList').classList.remove('open');
  _catAbierta = false;
}

function toggleCatList() {
  _catAbierta ? cerrarCatList() : abrirCatList();
}

function seleccionarCategoria(value, display) {
  document.getElementById('categoria').value = value;
  document.getElementById('categoriaInput').value = display;
  document.getElementById('catInputBox').classList.remove('nuevo-producto');
  cerrarCatList();
  // Limpiar aviso si lo había
  if (value) {
    document.getElementById('avisoCategoria').classList.remove('visible');
  }
}

// Setear categoría por value (usado al precargar)
function setCategoriaByValue(val) {
  if (!val) return;
  const vUp = val.trim().toUpperCase();
  const cat = _categorias.find(c => c.value === vUp);
  if (cat) {
    const display = cat.emoji ? cat.emoji + ' ' + cat.label : cat.label;
    seleccionarCategoria(cat.value, display);
  } else {
    // Categoría no está en la lista (viene de la planilla pero no en catálogo)
    document.getElementById('categoria').value = vUp;
    document.getElementById('categoriaInput').value = vUp;
    cerrarCatList();
  }
}

// ── AUTOCOMPLETE PRODUCTO ──────────────────────────────────────────────────────
function onProductoInput() {
  const val  = document.getElementById('producto').value.trim();
  const list = document.getElementById('autoList');

  if (val.length < 2) {
    list.classList.remove('open');
    document.getElementById('info').style.display = 'none';
    ocultarBannerPrecargado();
    resetCategoria();
    return;
  }

  const valUp  = val.toUpperCase();
  const matches = _productos.filter(p => p.toUpperCase().includes(valUp)).slice(0, 8);

  if (!matches.length) {
    list.classList.remove('open');
  } else {
    list.innerHTML = matches.map(p => {
      const idx    = p.toUpperCase().indexOf(valUp);
      const before = p.substring(0, idx);
      const match  = p.substring(idx, idx + val.length);
      const after  = p.substring(idx + val.length);
      return `<div class="autocomplete-item" onclick="seleccionarProducto('${p.replace(/'/g,"\\'")}')">\
        ${before}<span class="match">${match}</span>${after}\
      </div>`;
    }).join('');
    list.classList.add('open');
  }

  clearTimeout(_infoTimer);
  _infoTimer = setTimeout(() => buscarInfo(val), 600);
}

function seleccionarProducto(nombre) {
  document.getElementById('producto').value = nombre;
  document.getElementById('autoList').classList.remove('open');
  buscarInfo(nombre);
}

// Cerrar dropdowns al click fuera
document.addEventListener('click', function(e) {
  if (!e.target.closest('.autocomplete-wrap')) {
    document.getElementById('autoList').classList.remove('open');
    document.getElementById('autoListProv').classList.remove('open');
  }
  if (!e.target.closest('.cat-wrap')) {
    cerrarCatList();
  }
});

// ── BUSCAR INFO PRODUCTO ───────────────────────────────────────────────────────
async function buscarInfo(nombre) {
  if (!nombre || nombre.length < 2) return;

  const infoDiv = document.getElementById('info');
  const loading = document.getElementById('loadingInfo');
  loading.classList.add('active');
  infoDiv.style.display = 'none';
  ocultarBannerPrecargado();

  try {
    const r    = await fetch(API_URL + '?action=getInfoProducto&nombre=' + encodeURIComponent(nombre) + '&t=' + Date.now(), { redirect: 'follow' });
    const data = await r.json();
    loading.classList.remove('active');

    if (!data.encontrado) {
      _esNuevo = true;
      document.getElementById('catInputBox').classList.add('nuevo-producto');
      document.getElementById('avisoCategoria').classList.add('visible');
      infoDiv.style.display = 'block';
      infoDiv.innerHTML = '<span class="alerta">⚠️ Producto no encontrado</span><br><small>Se creará como nuevo — seleccioná la categoría antes de guardar</small>';
      return;
    }

    _esNuevo = false;
    document.getElementById('catInputBox').classList.remove('nuevo-producto');
    document.getElementById('avisoCategoria').classList.remove('visible');

    // ── PRECARGA COMPLETA DEL ÚLTIMO INGRESO ──────────────────────────
    let precargo = false;

    // Categoría (siempre se setea)
    if (data.categoria) {
      setCategoriaByValue(data.categoria);
      precargo = true;
    }

    // Costo (siempre se pisa, es el dato más crítico del ingreso)
    if (data.precioCosto) {
      document.getElementById('precioCosto').value = data.precioCosto;
      calcularSugerido();
      precargo = true;
    }

    // Precio de venta anterior como referencia
    if (data.precioVenta) {
      document.getElementById('precioVenta').value = data.precioVenta;
      precargo = true;
    }

    // Proveedor
    if (data.proveedor) {
      document.getElementById('proveedor').value = data.proveedor;
      precargo = true;
    }

    // Fecha vencimiento: no se precarga (cada remesa puede ser diferente)

    // Cantidad: siempre resetear a 1 — el operador la ajusta según lo que llegó
    document.getElementById('cantidad').value = 1;

    if (precargo) mostrarBannerPrecargado();

    // Panel info (stock actual)
    infoDiv.style.display = 'block';
    infoDiv.innerHTML = `
      <strong>📊 Datos actuales en planilla:</strong><br>
      Stock actual: <strong>${data.stockActual ?? '—'}</strong> unidades<br>
      Precio venta: <span class="precio-grande">$${Number(data.precioVenta||0).toLocaleString('es-AR')}</span>
      ${data.precioCosto ? '<br>Último costo: <strong>$' + Number(data.precioCosto).toLocaleString('es-AR') + '</strong>' : ''}
      ${data.proveedor   ? '<br>Proveedor: <strong>' + data.proveedor + '</strong>' : ''}
    `;

  } catch(e) {
    loading.classList.remove('active');
    console.warn('Error buscando info:', e);
  }
}

function resetCategoria() {
  _esNuevo = false;
  document.getElementById('catInputBox').classList.remove('nuevo-producto');
  document.getElementById('avisoCategoria').classList.remove('visible');
}

function mostrarBannerPrecargado() {
  document.getElementById('bannerPrecargado').classList.add('visible');
}

function ocultarBannerPrecargado() {
  document.getElementById('bannerPrecargado').classList.remove('visible');
}

// ── PRECIO SUGERIDO ────────────────────────────────────────────────────────────
function calcularSugerido() {
  const costo = parseFloat(document.getElementById('precioCosto').value) || 0;
  const div   = document.getElementById('precioSugerido');
  if (costo > 0) {
    document.getElementById('montoSugerido').textContent = '$' + Math.ceil(costo * 1.5).toLocaleString('es-AR');
    div.style.display = 'block';
  } else {
    div.style.display = 'none';
  }
}

// ── AUTOCOMPLETE PROVEEDOR ─────────────────────────────────────────────────────
function filtrarProveedores() {
  const val  = document.getElementById('proveedor').value.trim().toUpperCase();
  const list = document.getElementById('autoListProv');
  if (val.length < 1) { list.classList.remove('open'); return; }

  const matches = _proveedores.filter(p => p.toUpperCase().includes(val)).slice(0, 6);
  if (!matches.length) { list.classList.remove('open'); return; }

  list.innerHTML = matches.map(p =>
    `<div class="autocomplete-item" onclick="document.getElementById('proveedor').value='${p}';document.getElementById('autoListProv').classList.remove('open');">${p}</div>`
  ).join('');
  list.classList.add('open');
}

// ── GUARDAR ────────────────────────────────────────────────────────────────────
async function guardar() {
  const nombre          = document.getElementById('producto').value.trim();
  const cantidad        = Number(document.getElementById('cantidad').value);
  const categoria       = document.getElementById('categoria').value;
  const precioCosto     = parseFloat(document.getElementById('precioCosto').value) || null;
  const precioVenta     = parseFloat(document.getElementById('precioVenta').value) || null;
  const proveedor       = document.getElementById('proveedor').value.trim() || null;
  const fechaVencimiento = document.getElementById('fechaVencimiento').value || null;

  if (!nombre)              { toast('❌ Ingresá el nombre del producto', true); return; }
  if (!cantidad || cantidad <= 0) { toast('❌ La cantidad debe ser mayor a 0', true); return; }
  if (!categoria)           {
    toast('❌ Seleccioná una categoría', true);
    abrirCatList();
    return;
  }

  if (_esNuevo && (!categoria || categoria === _categorias[0]?.value)) {
    if (!confirm('📦 ¿Confirmar categoría "' + categoria + '" para el producto nuevo?')) return;
  }
  if (!precioCosto) {
    if (!confirm('⚠️ No ingresaste precio de costo. ¿Continuar igual?')) return;
  }

  const btn = document.getElementById('btnGuardar');
  btn.disabled    = true;
  btn.textContent = '⏳ Guardando...';

  try {
    const datos = { producto: nombre, cantidad, categoria, precioCosto, precioVenta, proveedor, fechaVencimiento };
    const url   = API_URL + '?action=ingresar&data=' + encodeURIComponent(JSON.stringify(datos));
    const r     = await fetch(url, { redirect: 'follow', signal: AbortSignal.timeout(15000) });
    const res   = await r.json();

    btn.disabled    = false;
    btn.textContent = '✅ Guardar Ingreso';

    if (res.success) {
      toast('✅ ' + res.mensaje);
      limpiar();
    } else {
      toast('❌ ' + (res.mensaje || 'Error al guardar'), true);
    }
  } catch(e) {
    btn.disabled    = false;
    btn.textContent = '✅ Guardar Ingreso';
    toast('❌ Error de conexión — intentá de nuevo', true);
    console.error(e);
  }
}

function limpiar() {
  document.getElementById('producto').value       = '';
  document.getElementById('cantidad').value       = '1';
  document.getElementById('categoria').value      = '';
  document.getElementById('categoriaInput').value = '';
  document.getElementById('precioCosto').value    = '';
  document.getElementById('precioVenta').value    = '';
  document.getElementById('proveedor').value      = '';
  document.getElementById('fechaVencimiento').value = '';
  document.getElementById('info').style.display  = 'none';
  document.getElementById('precioSugerido').style.display = 'none';
  document.getElementById('autoList').classList.remove('open');
  ocultarBannerPrecargado();
  resetCategoria();
  document.getElementById('producto').focus();
}

// ── TOAST ──────────────────────────────────────────────────────────────────────
function toast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show' + (error ? ' error' : '');
  setTimeout(() => { t.className = ''; }, 3500);
}
</script>
