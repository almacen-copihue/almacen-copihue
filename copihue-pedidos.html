<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pedidos · Copihue</title>
<style>
/*
  copihue-pedidos.html v1
  Sistema táctil de pedidos a proveedores vía WhatsApp
  Almacén Copihue — Bariloche
*/
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap');

:root {
  --rojo:    #c0392b;
  --rojo2:   #e74c3c;
  --crema:   #fdf6ec;
  --negro:   #1a1a1a;
  --verde:   #27ae60;
  --naranja: #e67e22;
  --azul:    #2980b9;
  --amarillo:#f39c12;
  --bg:      #0f0f13;
  --card:    #1c1c24;
  --card2:   #25252f;
  --border:  rgba(255,255,255,0.08);
  --text:    #f0f0f0;
  --muted:   #666;
  --fnt-display: 'Barlow Condensed', sans-serif;
  --fnt-body:    'Nunito', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: var(--fnt-body); color: var(--text); }

/* ── LAYOUT ─────────────────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── HEADER ─────────────────────────────────────────────────── */
#header {
  background: linear-gradient(135deg, var(--rojo), #8e1a12);
  padding: 0 14px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
  box-shadow: 0 3px 12px rgba(0,0,0,0.5);
}
#header h1 {
  font-family: var(--fnt-display);
  font-size: 1.5rem;
  font-weight: 900;
  letter-spacing: 0.5px;
  color: white;
  display: flex;
  align-items: center;
  gap: 8px;
}
#header h1 span { font-size: 0.72rem; font-weight: 700; opacity: 0.75; font-family: var(--fnt-body); letter-spacing: 0; }

#btnCarrito {
  position: relative;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 12px;
  padding: 7px 14px;
  color: white;
  font-size: 0.85rem;
  font-weight: 800;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--fnt-body);
  transition: background 0.15s;
  user-select: none;
}
#btnCarrito:active { background: rgba(255,255,255,0.25); }
#badgeCarrito {
  display: none;
  position: absolute;
  top: -7px; right: -7px;
  background: var(--amarillo);
  color: #1a1a1a;
  font-size: 0.65rem;
  font-weight: 900;
  border-radius: 50%;
  width: 20px; height: 20px;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

/* ── TABS PROVEEDORES ────────────────────────────────────────── */
#tabsWrap {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
  white-space: nowrap;
  scrollbar-width: none;
  padding: 8px 10px;
  display: flex;
  gap: 7px;
}
#tabsWrap::-webkit-scrollbar { display: none; }
.tab-prov {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 800;
  font-family: var(--fnt-body);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  user-select: none;
}
.tab-prov.active {
  background: var(--rojo);
  border-color: var(--rojo);
  color: white;
}
.tab-prov .badge-alerta {
  background: var(--amarillo);
  color: #1a1a1a;
  font-size: 0.6rem;
  font-weight: 900;
  border-radius: 10px;
  padding: 1px 5px;
  min-width: 18px;
  text-align: center;
}
.tab-prov.critico .badge-alerta { background: var(--rojo2); color: white; }

/* ── HEADER PROVEEDOR ────────────────────────────────────────── */
#provHeader {
  padding: 10px 14px 8px;
  background: var(--card2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: none;
}
#provNombre { font-family: var(--fnt-display); font-size: 1.2rem; font-weight: 900; color: var(--text); }
#provTel { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

/* ── GRILLA PRODUCTOS ────────────────────────────────────────── */
#productosWrap {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 9px;
  align-content: start;
  scrollbar-width: thin;
  scrollbar-color: #333 transparent;
}
@media (min-width: 480px) { #productosWrap { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 700px) { #productosWrap { grid-template-columns: repeat(4, 1fr); } }

.card-prod {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 11px 10px 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
  position: relative;
  user-select: none;
  -webkit-user-select: none;
}
.card-prod:active { transform: scale(0.96); }
.card-prod.seleccionado {
  border-color: var(--verde);
  background: rgba(39,174,96,0.12);
}
.card-prod.critico { border-color: rgba(231,76,60,0.45); }

.chip-urgencia {
  position: absolute;
  top: 7px; right: 7px;
  font-size: 0.58rem;
  font-weight: 900;
  padding: 2px 6px;
  border-radius: 8px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.chip-urgencia.CRITICO { background: var(--rojo2); color: white; }
.chip-urgencia.ALTO    { background: var(--naranja); color: white; }
.chip-urgencia.NORMAL  { background: rgba(255,255,255,0.1); color: #888; }

.prod-nombre {
  font-size: 0.8rem;
  font-weight: 800;
  line-height: 1.25;
  color: var(--text);
  margin-top: 2px;
  padding-right: 30px;
}
.prod-stock {
  font-size: 0.7rem;
  color: var(--muted);
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.prod-stock b { color: #bbb; }

/* Selector cantidad */
.qty-control {
  display: none;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
}
.card-prod.seleccionado .qty-control { display: flex; }

.qty-btn {
  width: 30px; height: 30px;
  border-radius: 8px;
  border: 1.5px solid rgba(39,174,96,0.5);
  background: rgba(39,174,96,0.15);
  color: var(--verde);
  font-size: 1.1rem;
  font-weight: 900;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  user-select: none;
}
.qty-btn:active { background: rgba(39,174,96,0.3); }
.qty-num {
  font-size: 1rem;
  font-weight: 900;
  color: white;
  min-width: 30px;
  text-align: center;
}

/* check badge */
.check-badge {
  display: none;
  position: absolute;
  top: 7px; left: 8px;
  background: var(--verde);
  border-radius: 50%;
  width: 18px; height: 18px;
  align-items: center; justify-content: center;
  font-size: 0.65rem;
  color: white;
}
.card-prod.seleccionado .check-badge { display: flex; }
.card-prod.seleccionado .prod-nombre { padding-left: 24px; }

/* ── ESTADO VACÍO / CARGANDO ─────────────────────────────────── */
#stateMsg {
  grid-column: 1/-1;
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}
#stateMsg .icon { font-size: 2.5rem; margin-bottom: 10px; }
#stateMsg p { font-size: 0.85rem; line-height: 1.5; }

/* ── FAB ENVIAR ──────────────────────────────────────────────── */
#fabEnviar {
  position: fixed;
  bottom: 16px; right: 16px;
  background: linear-gradient(135deg, #25d366, #128c7e);
  border: none;
  border-radius: 18px;
  padding: 13px 20px;
  color: white;
  font-family: var(--fnt-body);
  font-size: 0.9rem;
  font-weight: 900;
  cursor: pointer;
  display: none;
  align-items: center;
  gap: 8px;
  box-shadow: 0 6px 24px rgba(37,211,102,0.4);
  z-index: 100;
  transition: transform 0.15s, box-shadow 0.15s;
}
#fabEnviar:active { transform: scale(0.96); box-shadow: 0 3px 12px rgba(37,211,102,0.3); }
#fabEnviar.visible { display: flex; }

/* ── PANEL CARRITO / RESUMEN ─────────────────────────────────── */
#panelCarrito {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
#panelCarrito.open { display: flex; }
#panelInner {
  background: var(--card);
  border-radius: 22px 22px 0 0;
  width: 100%;
  max-width: 520px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#panelHead {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
#panelHead h2 { font-family: var(--fnt-display); font-size: 1.3rem; font-weight: 900; }
#btnCerrarPanel {
  background: rgba(255,255,255,0.08);
  border: none; border-radius: 50%;
  width: 32px; height: 32px;
  color: white; font-size: 1rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
#listaResumen {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.item-resumen {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--card2);
  border-radius: 12px;
  padding: 9px 12px;
}
.item-resumen .ir-nombre { flex: 1; font-size: 0.82rem; font-weight: 700; }
.item-resumen .ir-qty {
  background: var(--verde);
  color: white;
  font-size: 0.75rem;
  font-weight: 900;
  border-radius: 8px;
  padding: 3px 9px;
}
.item-resumen .ir-del {
  background: rgba(231,76,60,0.2);
  border: none; border-radius: 8px;
  color: var(--rojo2); font-size: 0.85rem;
  width: 28px; height: 28px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
#panelObs {
  padding: 8px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
#panelObs textarea {
  width: 100%;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--fnt-body);
  font-size: 0.8rem;
  padding: 8px 10px;
  resize: none;
  height: 52px;
  outline: none;
}
#panelObs textarea::placeholder { color: var(--muted); }
#panelActions {
  padding: 10px 14px 14px;
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
#btnConfirmar {
  flex: 1;
  padding: 13px;
  background: linear-gradient(135deg, #25d366, #128c7e);
  border: none; border-radius: 14px;
  color: white; font-family: var(--fnt-body);
  font-size: 0.9rem; font-weight: 900;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
}
#btnLimpiar {
  padding: 13px 16px;
  background: rgba(231,76,60,0.15);
  border: 1px solid rgba(231,76,60,0.3);
  border-radius: 14px;
  color: var(--rojo2); font-family: var(--fnt-body);
  font-size: 0.82rem; font-weight: 800;
  cursor: pointer;
}

/* ── TOAST ───────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #222;
  color: white;
  padding: 10px 18px;
  border-radius: 20px;
  font-size: 0.82rem;
  font-weight: 700;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 300;
  white-space: nowrap;
  max-width: 90vw;
  text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <h1>
      🏪 Copihue
      <span>PEDIDOS WA</span>
    </h1>
    <button id="btnCarrito" onclick="abrirCarrito()">
      🛒 <span id="txtCarrito">Pedido</span>
      <span id="badgeCarrito"></span>
    </button>
  </div>

  <!-- TABS PROVEEDORES -->
  <div id="tabsWrap">
    <div id="stateTabsMsg" style="color:#555;font-size:0.8rem;padding:5px 4px;">Cargando proveedores…</div>
  </div>

  <!-- HEADER PROVEEDOR ACTIVO -->
  <div id="provHeader">
    <div id="provNombre">—</div>
    <div id="provTel">—</div>
  </div>

  <!-- GRILLA PRODUCTOS -->
  <div id="productosWrap">
    <div id="stateMsg">
      <div class="icon">📦</div>
      <p>Seleccioná un proveedor<br>para ver los productos a reponer</p>
    </div>
  </div>

</div><!-- /app -->

<!-- FAB ENVIAR -->
<button id="fabEnviar" onclick="abrirCarrito()">
  🛒 Ver pedido (<span id="fabCount">0</span>)
</button>

<!-- PANEL CARRITO -->
<div id="panelCarrito" onclick="if(event.target===this)cerrarCarrito()">
  <div id="panelInner">
    <div id="panelHead">
      <h2>🛒 Mi Pedido</h2>
      <button id="btnCerrarPanel" onclick="cerrarCarrito()">✕</button>
    </div>
    <div id="listaResumen"></div>
    <div id="panelObs">
      <textarea id="txtObs" placeholder="Observación general (opcional)…"></textarea>
    </div>
    <div id="panelActions">
      <button id="btnConfirmar" onclick="confirmarPedido()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
          <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm0 22C6.486 22 2 17.514 2 12S6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/>
        </svg>
        Enviar por WhatsApp
      </button>
      <button id="btnLimpiar" onclick="limpiarPedido()">🗑️</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════════
// copihue-pedidos.html v1 — Sistema táctil pedidos WhatsApp
// ══════════════════════════════════════════════════════════════════

const API_URL = 'https://script.google.com/macros/s/AKfycbxhKFk2WAi-KRY5xGBsI6_6Pvp3jDjt8mSRXvy7I1WehNmBpJamqK9G9Q1ZJSCSgAdfDA/exec';

// ── Estado global ────────────────────────────────────────────────
let _proveedores   = [];   // cargados desde GAS
let _provActual    = null; // proveedor seleccionado
let _carrito       = {};   // { ID_PRODUCTO: { item, qty } }

// ── Boot ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', cargarProveedores);

async function cargarProveedores() {
  try {
    const r = await fetch(API_URL + '?action=getProductosParaPedir&t=' + Date.now(), { cache: 'no-store' });
    const d = await r.json();

    if (!d.ok || !d.proveedores || !d.proveedores.length) {
      document.getElementById('stateTabsMsg').innerHTML =
        '<span style="color:#e74c3c">⚠️ Sin productos a reponer</span>';
      document.getElementById('stateMsg').innerHTML =
        '<div class="icon">🎉</div><p>¡Todo el stock está OK!</p>';
      return;
    }

    _proveedores = d.proveedores;
    _renderTabs();
    seleccionarProveedor(_proveedores[0].proveedor);

  } catch(e) {
    document.getElementById('stateTabsMsg').innerHTML =
      '<span style="color:#e74c3c">📡 Sin conexión con servidor</span>';
    console.error(e);
  }
}

// ── Tabs ─────────────────────────────────────────────────────────
function _renderTabs() {
  const wrap = document.getElementById('tabsWrap');
  wrap.innerHTML = '';
  for (const prov of _proveedores) {
    const criticos = prov.productos.filter(p => p.urgencia === 'CRITICO').length;
    const tab = document.createElement('button');
    tab.className = 'tab-prov' + (criticos ? ' critico' : '');
    tab.dataset.prov = prov.proveedor;
    tab.onclick = () => seleccionarProveedor(prov.proveedor);
    tab.innerHTML =
      `<span>${_nombreCorto(prov.proveedor)}</span>` +
      `<span class="badge-alerta">${prov.productos.length}</span>`;
    wrap.appendChild(tab);
  }
}

function _nombreCorto(nombre) {
  return nombre.length > 14 ? nombre.substring(0, 13) + '…' : nombre;
}

// ── Seleccionar proveedor ─────────────────────────────────────────
function seleccionarProveedor(nombre) {
  _provActual = _proveedores.find(p => p.proveedor === nombre);
  if (!_provActual) return;

  // Tabs
  document.querySelectorAll('.tab-prov').forEach(t => {
    t.classList.toggle('active', t.dataset.prov === nombre);
  });

  // Header
  const ph = document.getElementById('provHeader');
  ph.style.display = 'block';
  document.getElementById('provNombre').textContent = _provActual.proveedor;
  document.getElementById('provTel').textContent =
    _provActual.telefono ? '📱 ' + _provActual.telefono : 'Sin teléfono cargado';

  _renderProductos();
}

// ── Productos ────────────────────────────────────────────────────
function _renderProductos() {
  const wrap = document.getElementById('productosWrap');
  if (!_provActual || !_provActual.productos.length) {
    wrap.innerHTML = '<div id="stateMsg"><div class="icon">✅</div><p>Sin productos a reponer</p></div>';
    return;
  }

  const prods = [..._provActual.productos].sort((a, b) => {
    const ord = { CRITICO: 0, ALTO: 1, NORMAL: 2 };
    return ord[a.urgencia] - ord[b.urgencia];
  });

  wrap.innerHTML = '';
  for (const p of prods) {
    wrap.appendChild(_crearCardProd(p));
  }
}

function _crearCardProd(p) {
  const enCarrito = _carrito[p.id];
  const qty = enCarrito ? enCarrito.qty : p.faltante || 1;

  const card = document.createElement('div');
  card.className = 'card-prod' +
    (p.urgencia === 'CRITICO' ? ' critico' : '') +
    (enCarrito ? ' seleccionado' : '');
  card.dataset.id = p.id;

  card.innerHTML = `
    <div class="check-badge">✓</div>
    <div class="chip-urgencia ${p.urgencia}">${p.urgencia}</div>
    <div class="prod-nombre">${p.nombre}</div>
    <div class="prod-stock">
      Stock: <b>${p.stockActual}</b>
      &nbsp;|&nbsp;
      Mín: <b>${p.stockMinimo}</b>
    </div>
    <div class="qty-control">
      <button class="qty-btn" onclick="cambiarQty(event,'${p.id}',-1)">−</button>
      <span class="qty-num" id="qty_${p.id}">${enCarrito ? enCarrito.qty : qty}</span>
      <button class="qty-btn" onclick="cambiarQty(event,'${p.id}',+1)">+</button>
    </div>`;

  card.addEventListener('click', (e) => {
    if (e.target.classList.contains('qty-btn')) return;
    toggleProducto(p, card);
  });

  return card;
}

// ── Carrito lógica ───────────────────────────────────────────────
function toggleProducto(p, card) {
  if (_carrito[p.id]) {
    delete _carrito[p.id];
    card.classList.remove('seleccionado');
  } else {
    const qty = p.faltante || 1;
    _carrito[p.id] = { item: p, qty };
    card.classList.add('seleccionado');
    const qEl = document.getElementById('qty_' + p.id);
    if (qEl) qEl.textContent = qty;
  }
  _actualizarFAB();
}

function cambiarQty(e, id, delta) {
  e.stopPropagation();
  if (!_carrito[id]) return;
  _carrito[id].qty = Math.max(1, (_carrito[id].qty || 1) + delta);
  const qEl = document.getElementById('qty_' + id);
  if (qEl) qEl.textContent = _carrito[id].qty;
  _actualizarFAB();
}

function _actualizarFAB() {
  const n = Object.keys(_carrito).length;
  const fab = document.getElementById('fabEnviar');
  document.getElementById('fabCount').textContent = n;
  const badge = document.getElementById('badgeCarrito');
  badge.textContent = n;
  badge.style.display = n ? 'flex' : 'none';
  fab.classList.toggle('visible', n > 0);
}

// ── Panel carrito ────────────────────────────────────────────────
function abrirCarrito() {
  _renderResumen();
  document.getElementById('panelCarrito').classList.add('open');
}
function cerrarCarrito() {
  document.getElementById('panelCarrito').classList.remove('open');
}

function _renderResumen() {
  const lista = document.getElementById('listaResumen');
  const items = Object.values(_carrito);
  if (!items.length) {
    lista.innerHTML = '<p style="color:#555;font-size:0.82rem;text-align:center;padding:20px;">El pedido está vacío</p>';
    return;
  }
  lista.innerHTML = '';
  for (const { item, qty } of items) {
    const div = document.createElement('div');
    div.className = 'item-resumen';
    div.innerHTML = `
      <span class="ir-nombre">${item.nombre}</span>
      <span class="ir-qty">${qty} ${item.unidad || 'u.'}</span>
      <button class="ir-del" onclick="quitarItem('${item.id}')">✕</button>`;
    lista.appendChild(div);
  }
}

function quitarItem(id) {
  const card = document.querySelector(`.card-prod[data-id="${id}"]`);
  if (card) card.classList.remove('seleccionado');
  delete _carrito[id];
  _actualizarFAB();
  _renderResumen();
}

function limpiarPedido() {
  _carrito = {};
  document.querySelectorAll('.card-prod.seleccionado').forEach(c => c.classList.remove('seleccionado'));
  _actualizarFAB();
  cerrarCarrito();
  showToast('🗑️ Pedido limpiado');
}

// ── Confirmar y enviar ───────────────────────────────────────────
async function confirmarPedido() {
  const items = Object.values(_carrito);
  if (!items.length) { showToast('⚠️ Agregá productos primero'); return; }
  if (!_provActual)  { showToast('⚠️ Seleccioná un proveedor'); return; }

  const observacion = document.getElementById('txtObs').value.trim();

  const datos = {
    proveedor: _provActual.proveedor,
    items: items.map(({ item, qty }) => ({
      nombre:   item.nombre,
      cantidad: qty,
      unidad:   item.unidad || 'unidad'
    })),
    proyecto:    'ALMACEN',
    observacion: observacion
  };

  const btn = document.getElementById('btnConfirmar');
  btn.textContent = '⏳ Generando…';
  btn.disabled = true;

  try {
    const r = await fetch(
      API_URL + '?action=crearPedidoWA&data=' + encodeURIComponent(JSON.stringify(datos)),
      { cache: 'no-store' }
    );
    const d = await r.json();

    if (d.ok && d.linkWA) {
      // Marcar como enviado y abrir WA
      try {
        await fetch(
          API_URL + '?action=marcarPedidoEnviado&data=' +
          encodeURIComponent(JSON.stringify({ idPedido: d.idPedido })),
          { cache: 'no-store' }
        );
      } catch(e2) {}

      window.open(d.linkWA, '_blank');
      cerrarCarrito();
      limpiarPedido();
      showToast('✅ Pedido enviado por WhatsApp');
    } else {
      showToast('❌ Error: ' + (d.error || 'Respuesta inválida'));
    }
  } catch(e) {
    showToast('📡 Sin conexión. Intentá de nuevo.');
    console.error(e);
  } finally {
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm0 22C6.486 22 2 17.514 2 12S6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg> Enviar por WhatsApp`;
    btn.disabled = false;
  }
}

// ── Toast ────────────────────────────────────────────────────────
let _toastTimer;
function showToast(msg, ms = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), ms);
}
</script>
