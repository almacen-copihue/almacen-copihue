<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SendWA Copihue v44</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f0ee;color:#111;min-height:100vh}

/* ── LAYOUT ── */
.wrap{max-width:900px;margin:0 auto;padding:16px}
h1{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#aaa;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* ── ESTADO ── */
.estado{background:#fff;border:0.5px solid #e5e5e5;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#666;display:flex;align-items:center;gap:8px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.cargando{background:#f59e0b;animation:pulso 1s infinite}
.dot.ok{background:#22c55e}
.dot.error{background:#ef4444}
@keyframes pulso{0%,100%{opacity:1}50%{opacity:.3}}

/* ── FILTROS ── */
.filtros{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .12s;user-select:none;opacity:.55}
.chip.on{opacity:1;transform:scale(1.06)}
/* Colores siempre visibles */
.chip[data-t="ofertas"]{background:#111;color:#fff;border-color:#111}
.chip[data-t="promo"]{background:#6A0DAD;color:#E8C5FF;border-color:#6A0DAD}
.chip[data-t="combo"]{background:#7B3F2A;color:#F4C9B5;border-color:#7B3F2A}
.chip[data-t="relampago"]{background:#C8A800;color:#000;border-color:#C8A800}
.chip[data-t="destacada"]{background:#E07000;color:#fff;border-color:#E07000}
.chip[data-t="especial"]{background:#008B9A;color:#fff;border-color:#008B9A}
.chip[data-t="ultimas"]{background:#CC1020;color:#fff;border-color:#CC1020}
.chip[data-t="cervecero"]{background:#0d3b66;color:#90c8ff;border-color:#0d3b66}
.chip[data-t="sinoferta"]{background:#888;color:#fff;border-color:#888}

/* ── GRILLA PRODUCTOS ── */
.grilla{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.prod{background:#fff;border:2.5px solid #e5e5e5;border-radius:12px;padding:0;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.prod:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.prod-bloqueado{opacity:.5;cursor:default}
.prod-bloqueado:hover{transform:none;box-shadow:none}
.prod[data-tipo="fuera"]{border-color:#555}
@media(hover:none){.prod:hover{transform:none;box-shadow:none}}
.prod.sel{box-shadow:0 0 0 3px currentColor}
.prod.sel::after{content:'✓';position:absolute;top:8px;right:8px;font-size:16px;font-weight:900;color:#22c55e;background:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.2)}
/* Colores de borde por tipo */
.prod[data-tipo="promo"]{border-color:#6A0DAD}
.prod[data-tipo="combo"]{border-color:#7B3F2A}
.prod[data-tipo="relampago"]{border-color:#C8A800}
.prod[data-tipo="destacada"]{border-color:#E07000}
.prod[data-tipo="especial"]{border-color:#008B9A}
.prod[data-tipo="ultimas"]{border-color:#CC1020}
.prod[data-tipo="cervecero"]{border-color:#0d3b66}
.prod[data-tipo="sinoferta"]{border-color:#aaa}
/* Fondo sutil al seleccionar */
.prod[data-tipo="promo"].sel{background:#f5eeff}
.prod[data-tipo="combo"].sel{background:#fff5f0}
.prod[data-tipo="relampago"].sel{background:#fffbe6}
.prod[data-tipo="destacada"].sel{background:#fff4e6}
.prod[data-tipo="especial"].sel{background:#e6f7f9}
.prod[data-tipo="ultimas"].sel{background:#fff0f0}
.prod[data-tipo="sinoferta"].sel{background:#f5f5f5}
/* Info dentro del card */
.prod-info{padding:10px 12px 12px}
.prod-nombre{font-size:13px;font-weight:800;line-height:1.25;margin-bottom:4px;color:#111}
.prod-precio{font-size:20px;font-weight:900;color:#111;margin-bottom:1px}
.prod-precio-orig{font-size:12px;color:#bbb;text-decoration:line-through;margin-bottom:2px}
.prod-ahorro{font-size:11px;color:#22c55e;font-weight:700;margin-top:2px}
.prod-urgencia{font-size:10px;color:#e07000;font-weight:700;margin-top:3px;letter-spacing:.3px}
/* Tira de color arriba según tipo */
.prod-stripe{height:4px;width:100%}
.prod[data-tipo="promo"] .prod-stripe{background:#6A0DAD}
.prod[data-tipo="combo"] .prod-stripe{background:#7B3F2A}
.prod[data-tipo="relampago"] .prod-stripe{background:#C8A800}
.prod[data-tipo="destacada"] .prod-stripe{background:#E07000}
.prod[data-tipo="especial"] .prod-stripe{background:#008B9A}
.prod[data-tipo="ultimas"] .prod-stripe{background:#CC1020}
.prod[data-tipo="cervecero"] .prod-stripe{background:#0d3b66}
.prod[data-tipo="sinoferta"] .prod-stripe{background:#ccc}
.prod-nombre{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:6px;padding-right:14px}
.prod-precio{font-size:15px;font-weight:700;color:#111}
.prod-precio-orig{font-size:11px;color:#aaa;text-decoration:line-through}
.prod-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
.badge-promo{background:#6A0DAD;color:#E8C5FF}
.badge-combo{background:#7B3F2A;color:#F4C9B5}
.badge-relampago{background:#C8A800;color:#000;font-weight:900}
.badge-destacada{background:#E07000;color:#fff}
.badge-especial{background:#008B9A;color:#fff}
.badge-ultimas{background:#CC1020;color:#fff}
.badge-cervecero{background:#0d3b66;color:#90c8ff}

/* ── BARRA SELECCIÓN ── */
.barra{background:#111;color:#fff;border-radius:12px;padding:10px 16px;margin-bottom:14px;align-items:center;gap:12px;display:none;font-size:13px;font-weight:600}
.barra.vis{display:flex}
.barra-txt{flex:1;font-size:13px}
.barra-btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:#fff;color:#111}
.barra-btn:hover{background:#e5e5e5}

/* ── SALIDAS ── */
.salidas-titulo{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin-bottom:12px}
.salidas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:24px}

/* ── CADA SALIDA ── */
.salida{background:#fff;border:0.5px solid #ddd;border-radius:12px;overflow:hidden}
.salida-head{padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid #eee;background:#fafafa}
.salida-nombre{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#888}
.s-btns{display:flex;gap:5px}
.s-btn{padding:4px 9px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;border:0.5px solid #ddd;background:#fff;color:#555}
.s-btn:hover{background:#f0f0f0}
.s-btn.negro{background:#111;color:#fff;border-color:#111}

/* ── FLYERS ── */
.flyer-wrap{padding:10px;display:flex;justify-content:center;background:#ebebeb}
.flyer{width:220px;height:220px;border-radius:10px;position:relative;overflow:hidden;flex-shrink:0;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}

.f-fuego{background:#0d0000}
.f-fuego .fg{position:absolute;inset:0;background:radial-gradient(ellipse at 65% 80%,#c03000 0%,#700000 50%,#0d0000 100%)}
.f-fuego .fbadge{position:absolute;top:11px;left:11px;background:#ff1744;color:#fff;font-size:8px;font-weight:800;padding:3px 8px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;z-index:2}
.f-fuego .fmoji{position:absolute;top:9px;right:11px;font-size:30px;z-index:2}
.f-fuego .fnombre{position:absolute;left:11px;right:42px;top:46px;color:#fff;font-size:13px;font-weight:900;line-height:1.2;z-index:2}
.f-fuego .forig{position:absolute;left:11px;bottom:50px;color:#ff8a65;font-size:10px;text-decoration:line-through;opacity:.8;z-index:2}
.f-fuego .fprecio{position:absolute;left:11px;bottom:26px;color:#ffd600;font-size:26px;font-weight:900;z-index:2}
.f-fuego .fahorro{position:absolute;left:11px;bottom:9px;color:rgba(255,214,0,.65);font-size:9px;z-index:2}
.f-fuego .fmarca{position:absolute;bottom:9px;right:11px;color:rgba(255,255,255,.12);font-size:7px;letter-spacing:2px;text-transform:uppercase;z-index:2}

.f-neon{background:#000;border:2px solid #00e676}
.f-neon .fbadge{position:absolute;top:11px;left:11px;color:#00e676;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:1px solid #00e676;padding:2px 7px;border-radius:2px}
.f-neon .fmoji{position:absolute;top:9px;right:11px;font-size:28px}
.f-neon .fnombre{position:absolute;left:11px;right:42px;top:46px;color:#fff;font-size:13px;font-weight:900;line-height:1.2}
.f-neon .forig{position:absolute;left:11px;bottom:50px;color:#444;font-size:10px;text-decoration:line-through}
.f-neon .fprecio{position:absolute;left:11px;bottom:26px;color:#00e676;font-size:26px;font-weight:900}
.f-neon .fahorro{position:absolute;left:11px;bottom:9px;color:#444;font-size:9px}
.f-neon .fmarca{position:absolute;bottom:9px;right:11px;color:#111;font-size:7px;letter-spacing:2px;text-transform:uppercase}

.f-urgente{background:#ffd600}
.f-urgente .fbadge{position:absolute;top:0;left:0;right:0;background:#000;color:#ffd600;font-size:9px;font-weight:800;padding:5px 11px;letter-spacing:2px;text-transform:uppercase;text-align:center}
.f-urgente .fmoji{position:absolute;top:28px;right:11px;font-size:34px}
.f-urgente .fnombre{position:absolute;left:11px;right:52px;top:36px;color:#000;font-size:13px;font-weight:900;line-height:1.2}
.f-urgente .forig{position:absolute;left:11px;bottom:50px;color:rgba(0,0,0,.4);font-size:10px;text-decoration:line-through}
.f-urgente .fprecio{position:absolute;left:11px;bottom:26px;color:#000;font-size:26px;font-weight:900}
.f-urgente .fahorro{position:absolute;left:0;right:0;bottom:0;background:#000;color:#ffd600;font-size:9px;font-weight:700;padding:4px 11px;text-align:center}
.f-urgente .fmarca{display:none}

.f-dark{background:#0a0a0a}
.f-dark .facento{position:absolute;top:0;left:0;width:3px;height:100%;background:#aa00ff}
.f-dark .fbadge{position:absolute;top:11px;left:15px;color:#aa00ff;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.f-dark .fmoji{position:absolute;top:9px;right:11px;font-size:28px}
.f-dark .fnombre{position:absolute;left:15px;right:42px;top:30px;color:#fff;font-size:13px;font-weight:900;line-height:1.2}
.f-dark .forig{position:absolute;left:15px;bottom:50px;color:#333;font-size:10px;text-decoration:line-through}
.f-dark .fprecio{position:absolute;left:15px;bottom:26px;color:#fff;font-size:26px;font-weight:900}
.f-dark .fahorro{position:absolute;left:15px;bottom:9px;color:#444;font-size:9px}
.f-dark .fmarca{position:absolute;bottom:9px;right:11px;color:#1a1a1a;font-size:7px;letter-spacing:2px;text-transform:uppercase}

/* ── TEXTO WA ── */
.wa-txt{background:#0b141a;margin:0 10px 10px;border-radius:8px;padding:9px 11px;font-size:11px;color:#e9ede9;line-height:1.75;white-space:pre-wrap;word-break:break-word;max-height:120px;overflow-y:auto}

.empty{padding:50px 20px;text-align:center;color:#bbb;font-size:13px;line-height:1.6}

/* ── TABS SALIDAS ── */
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #ddd;background:#fff;color:#555;transition:all .12s}
.tab.on{background:#111;color:#fff;border-color:#111}

/* ── GRILLA MOSAICO ── */
.mosaic-opts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.mopt{padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #ddd;background:#fff;color:#555}
.mopt.on{background:#111;color:#fff;border-color:#111}
.mosaic-wrap{background:#111;border-radius:12px;padding:8px;display:inline-block}
.mosaic-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px}
.mosaic-scroll::-webkit-scrollbar{display:none}
.mosaic-grid{display:grid;gap:4px}
.mosaic-cell{border-radius:6px;overflow:hidden;position:relative}

/* ── BLOQUE TEXTO SALIDA ── */
.texto-bloque{background:#fff;border:0.5px solid #ddd;border-radius:12px;overflow:hidden;margin-bottom:12px}

@media(max-width:480px){.salidas-grid{grid-template-columns:1fr}}

/* ── FAB flotante ── */
.fab-bar{
  position:fixed;bottom:12px;left:8px;right:8px;
  display:flex;gap:4px;align-items:center;
  background:#111;border-radius:40px;padding:6px 10px;
  box-shadow:0 4px 20px rgba(0,0,0,.35);z-index:999;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;justify-content:space-between
}
.fab-bar::-webkit-scrollbar{display:none}
.fab{display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:5px 8px;border-radius:28px;cursor:pointer;border:none;
  font-size:20px;background:transparent;color:#fff;transition:background .12s;line-height:1;flex-shrink:0}
.fab span{font-size:8px;font-weight:600;letter-spacing:.3px;color:#888;text-transform:uppercase}
.fab:hover{background:#222}
.fab.fab-generar{background:#22c55e;padding:6px 14px;flex-shrink:0}
.fab.fab-generar span{color:rgba(255,255,255,.8)}
.fab-sep{width:1px;height:28px;background:#2a2a2a;flex-shrink:0}
/* espacio abajo para que el FAB no tape contenido */
.wrap{padding-bottom:100px}

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<body>
<div class="wrap">

<div id="header-copihue" onclick="toggleModoOculto()" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;cursor:pointer;background:#fff;padding:10px 12px;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);position:sticky;top:0;z-index:50">
  <div style="display:flex;align-items:center;gap:10px">
    <div style="width:38px;height:38px;border-radius:50%;background:#22c55e;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0">🌿</div>
    <div>
      <div style="font-size:14px;font-weight:800;color:#111;letter-spacing:-.2px">Almacén Copihue</div>
      <div style="font-size:9.5px;color:#999;letter-spacing:.3px">Productos de calidad con la confianza de siempre</div>
    </div>
  </div>
  <span style="background:#111;color:#fff;font-size:10px;padding:3px 8px;border-radius:10px;font-weight:700;letter-spacing:1px;flex-shrink:0">v44</span>
</div>

<!-- ESTADO CONEXIÓN — se oculta con el resto -->
<div class="estado" id="estado">
  <div class="dot cargando" id="dot"></div>
  <span id="estado-txt">Conectando con la planilla...</span>
</div>

<!-- FILTROS — invisibles, su lógica vive en CATEGORIAS_ORDEN (carrusel) -->
<div class="filtros" id="filtros" style="display:none"></div>

<!-- GRILLA -->
<div class="carril-nav" id="carril-nav">
  <button class="carril-flecha" onclick="carrilMover(-1)" id="flecha-izq">‹</button>
  <div style="text-align:center">
    <div class="carril-titulo" id="carril-titulo">Ofertas</div>
    <div class="carril-dots" id="carril-dots" style="justify-content:center;margin-top:4px"></div>
  </div>
  <button class="carril-flecha" onclick="carrilMover(1)" id="flecha-der">›</button>

  <div class="carril" id="carril"></div>

<!-- BARRA SELECCIÓN -->

  <span class="barra-txt" id="barra-txt"></span>
</div>

<!-- SALIDAS -->
<div id="zona-salidas"></div>

</div>

<!-- FAB inferior — se oculta entero con modoOculto -->
<div class="fab-bar" id="fab-bar">
  <button class="fab" onclick="buscarConHistorial()" title="Buscar">🔍<span>Buscar</span></button>
  <div class="fab-sep"></div>
  <button class="fab" onclick="agregarTodo()" title="Agregar todo">✅<span>Todo</span></button>
  <button class="fab" onclick="limpiarTodo()" title="Limpiar">🗑<span>Limpiar</span></button>
  <div class="fab-sep"></div>
  <button class="fab" onclick="toggleOrden()" title="Ordenar">⇅<span id="lbl-orden">Orden</span></button>
  <div class="fab-sep"></div>
  <button class="fab fab-generar" onclick="generarSalidas()" title="Generar">⚡<span>Generar</span></button>
</div>

<!-- Buscador overlay -->
<div id="buscador-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:flex-start;justify-content:center;padding-top:60px">
  <div style="background:#fff;border-radius:14px;padding:16px;width:90%;max-width:400px">
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input id="buscar-input" type="text" placeholder="Buscar producto..." oninput="filtrarBusqueda()"
        style="flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:15px;font-family:inherit">
      <button onclick="cerrarBuscar()" style="padding:8px 14px;border-radius:8px;border:none;background:#111;color:#fff;font-size:13px;cursor:pointer">✕</button>
    </div>
    <div id="buscar-resultados" style="max-height:50vh;overflow-y:auto;display:flex;flex-direction:column;gap:6px"></div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzWZzDvdGfW8vd2-FpQolT852cdPMeHbfKugn9DBOlju75bE1D0SUNB5EKEDOsI2vP4lA/exec';
const API_TIMEOUT_MS = 25000;

let todosLosProductos = [];

// Pools de ofertas activas — se llenan desde getOfertas
const poolIds = {
    relampago:  new Set(),
    destacado:  new Set(),
    especial:   new Set(),
    ultimas:    new Set(),
    recientes:  new Set(),
};
let filtroActivo = 'ofertas';
let seleccionados = new Set();

async function _apiFetch(action, data = null) {
    const url = data
        ? API_URL + '?action=' + action + '&data=' + encodeURIComponent(JSON.stringify(data)) + '&t=' + Date.now()
        : API_URL + '?action=' + action + '&t=' + Date.now();
    console.log('[sendwa] fetch:', action, url.slice(0,80)+'...');
    const resp = await fetch(url, { redirect: 'follow', signal: AbortSignal.timeout(API_TIMEOUT_MS) });
    const text = await resp.text();
    console.log('[sendwa] resp:', action, text.slice(0,120));
    return JSON.parse(text);
}

function fmt(n) { const num = typeof n === 'string' ? parseFloat(n) : n; return '$' + (isNaN(num) ? 0 : Math.round(num)).toLocaleString('es-AR'); }

function simplificarNombre(nombre) {
    return nombre.toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9 ]/g, "")
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .trim();
}

function getEmoji(nombre) {
    const n = (nombre || '').toLowerCase();
    if (n.includes('cerveza') || n.includes('birra')) return '🍺';
    if (n.includes('gaseosa') || n.includes('coca') || n.includes('pepsi') || n.includes('sprite') || n.includes('7up') || n.includes('fanta')) return '🥤';
    if (n.includes('yerba')) return '🧉';
    if (n.includes('pan') || n.includes('lactal') || n.includes('medialuna') || n.includes('facturas')) return '🍞';
    if (n.includes('aceite')) return '🫒';
    if (n.includes('queso')) return '🧀';
    if (n.includes('jamón') || n.includes('jamon') || n.includes('salchicha') || n.includes('salame') || n.includes('mortadela')) return '🥩';
    if (n.includes('fideo') || n.includes('pasta') || n.includes('spaghet')) return '🍝';
    if (n.includes('leche')) return '🥛';
    if (n.includes('agua')) return '💧';
    if (n.includes('vino')) return '🍷';
    if (n.includes('pollo')) return '🍗';
    if (n.includes('arroz')) return '🍚';
    if (n.includes('azucar') || n.includes('azúcar')) return '🍬';
    if (n.includes('cafe') || n.includes('café')) return '☕';
    if (n.includes('manteca') || n.includes('mantequilla')) return '🧈';
    if (n.includes('huevo')) return '🥚';
    if (n.includes('tomate') || n.includes('verdura') || n.includes('lechuga')) return '🥦';
    if (n.includes('jabón') || n.includes('jabon') || n.includes('detergente') || n.includes('lavandina')) return '🧴';
    if (n.includes('papel') || n.includes('servilleta')) return '🧻';
    return '🛒';
}

function tipoOferta(p) {
    if (!p || p.stock <= 0) return null;
    return p.offerType || null;
}

function precioFinal(p) {
    return p.discountPrice || p.price;
}

function badgeLabel(tipo, p) {
    if (tipo === 'promo')     return '🏷 PROMO';
    if (tipo === 'combo')     return '🎁 COMBO';
    if (tipo === 'relampago') return '⚡ RELÁMPAGO';
    if (tipo === 'destacada' || tipo === 'destacado') return '⭐ ' + (p.destacada||15) + '% OFF';
    if (tipo === 'especial')  return '💙 10% ESP.';
    if (tipo === 'ultimas')   return '⏳ ÚLTIMAS';
    if (tipo === 'cervecero') return '🍺 CERVECERO';
    return 'OFERTA';
}

function badgeCls(tipo) {
    return {
        promo:'badge-promo', combo:'badge-combo', relampago:'badge-relampago',
        destacada:'badge-destacada', destacado:'badge-destacada',
        especial:'badge-especial', ultimas:'badge-ultimas', cervecero:'badge-cervecero'
    }[tipo] || '';
}

async function cargar() {
    setEstado('cargando', 'Cargando productos y pools...');
    try {
        console.log('[sendwa] iniciando carga...');
        const [dataOfertas, dataProds] = await Promise.all([
            _apiFetch('getOfertas'),
            _apiFetch('getProductos'),
        ]);
        console.log('[sendwa] getOfertas:', JSON.stringify(dataOfertas).slice(0,100));
        console.log('[sendwa] getProductos count:', Array.isArray(dataProds) ? dataProds.length : JSON.stringify(dataProds).slice(0,80));

        // Llenar pools
        if (dataOfertas && dataOfertas.success) {
            poolIds.relampago.clear(); poolIds.destacado.clear();
            poolIds.especial.clear();  poolIds.ultimas.clear();
            (dataOfertas.relampagoActivo   || []).forEach(p => poolIds.relampago.add(Number(p.id)));
            (dataOfertas.destacadasActivas || []).forEach(p => poolIds.destacado.add(Number(p.id)));
            (dataOfertas.especialesActivas || []).forEach(p => poolIds.especial.add(Number(p.id)));
            const ults = dataOfertas.ultimasSeleccionadasSiempre || dataOfertas.ultimasSeleccionadas || [];
            ults.forEach(p => poolIds.ultimas.add(Number(p.id)));
        } else {
            console.warn('[sendwa] getOfertas sin success:', dataOfertas);
        }

        const rows = Array.isArray(dataProds) ? dataProds : (dataProds.productos || dataProds.items || []);
        console.log('[sendwa] productos a procesar:', rows.length);

        todosLosProductos = rows
            .filter(r => r && r.name && parseFloat(r.price||0) > 0)
            .map(r => {
                const id    = String(r.id || '');
                const price = parseFloat(r.price || 0);
                const stock = parseFloat(r.stock ?? 1);
                let offerType = null, discountPrice = null;

                if (poolIds.relampago.has(Number(id))) {
                    offerType = 'relampago';
                    const val = parseInt(r.relampago) || 0;
                    const pctMap = {11:10,12:15,13:20,14:25,15:30};
                    const nxmMap = {1:0.5,2:0.667,3:0.75,4:0.8,5:0.833,6:0.857,10:0.75};
                    if (pctMap[val]) discountPrice = Math.round(price*(1-pctMap[val]/100));
                    else if (nxmMap[val]) discountPrice = Math.round(price*nxmMap[val]);
                    else discountPrice = price;
                } else if (poolIds.destacado.has(Number(id))) {
                    offerType = 'destacada';
                    discountPrice = Math.round(price*(1-(parseFloat(r.destacada)||15)/100));
                } else if (poolIds.especial.has(Number(id))) {
                    offerType = 'especial';
                    discountPrice = Math.round(price*0.9);
                } else if (poolIds.ultimas.has(Number(id))) {
                    offerType = 'ultimas';
                    discountPrice = price;
                } else {
                    const cat = String(r.categoriaOferta || r.catOferta || '').toUpperCase().trim();
                    if (cat === 'PROMO ACTIVA' || cat.startsWith('PROMO')) {
                        offerType = 'promo';
                        const n = parseFloat(r.normal || 0);
                        if (n > 0 && n < price) discountPrice = n;
                    } else if (cat === 'COMBO ACTIVO' || cat.startsWith('COMBO')) {
                        offerType = 'combo';
                        const n = parseFloat(r.normal || 0);
                        if (n > 0 && n < price) discountPrice = n;
                    }
                }

                return {
                    id, name: String(r.name||'').trim(),
                    price, stock, offerType,
                    discountPrice,
                    tipo: offerType,
                    precioFinalVal: discountPrice || price,
                    relampago: r.relampago,
                    destacada: parseFloat(r.destacada)||0,
                    especial:  parseInt(r.especial)||0,
                    catOferta: String(r.categoriaOferta||r.catOferta||'').trim().toUpperCase(),
                    normal:    parseFloat(r.normal||0),
                    image: 'imagenes-productos/' + simplificarNombre(String(r.name||'').trim()) + '.jpg',
                };
            });

        const conOferta = todosLosProductos.filter(p => p.offerType && p.stock > 0).length;
        const sinStock  = todosLosProductos.filter(p => p.stock <= 0).length;
        const sinOferta = todosLosProductos.filter(p => !p.offerType && p.stock > 0).length;
        console.log('[sendwa] con oferta:', conOferta, '| sin oferta:', sinOferta, '| sin stock:', sinStock);
        setEstado('ok', conOferta + ' con oferta · ' + sinOferta + ' sin oferta · ' + sinStock + ' sin stock');
        document.getElementById('filtros').style.display = 'flex';
        renderGrilla();

    } catch(e) {
        console.error('[sendwa] ERROR en cargar():', e);
        setEstado('error', 'Error: ' + e.message + ' — Revisá la consola');
    }
}


function setEstado(tipo, txt) {

// ── ORDEN DE CATEGORÍAS (carriles) ──
// Cada categoría = una "página" de scroll horizontal
const CATEGORIAS_ORDEN = [
    {key:'ofertas',   label:'🏷 Ofertas',     test: p => !!p.offerType},
    {key:'promo',     label:'Promo',          test: p => p.offerType === 'promo'},
    {key:'combo',     label:'Combo',          test: p => p.offerType === 'combo'},
    {key:'relampago', label:'Relámpago',      test: p => p.offerType === 'relampago'},
    {key:'destacada', label:'Destacada',      test: p => p.offerType === 'destacada' || p.offerType === 'destacado'},
    {key:'especial',  label:'Especial',       test: p => p.offerType === 'especial'},
    {key:'ultimas',   label:'Últimas',        test: p => p.offerType === 'ultimas'},
    {key:'sinoferta', label:'Sin oferta',     test: p => !p.offerType},
];

let carrilIndex = 0; // qué categoría se está mostrando
let ordenActual  = 'rotacion'; // nombre, precio, azar, costo, stock, rotacion
const ORDENES = ['rotacion','nombre','precio_asc','precio_desc','azar','stock'];
const ORDEN_LABELS = {rotacion:'Rotación', nombre:'Nombre', precio_asc:'Precio ↑', precio_desc:'Precio ↓', azar:'Azar', stock:'Stock'};

// Heurística simple de "rotación" — productos de consumo diario primero
const ALTA_ROTACION_KEYWORDS = ['leche','aceite','azucar','azúcar','harina','arroz','fideos','fideo','yerba','cafe','café','pan','manteca','huevo','agua','gaseosa','coca','pepsi','cerveza','vino','sal','mayonesa','tomate','papa','cebolla','zanahoria','pollo','carne'];
function scoreRotacion(p) {
    const n = p.name.toLowerCase();
    return ALTA_ROTACION_KEYWORDS.some(k => n.includes(k)) ? 1 : 0;
}

function ordenarProductos(lista) {
    const arr = lista.slice();
    if (ordenActual === 'nombre') arr.sort((a,b) => a.name.localeCompare(b.name));
    else if (ordenActual === 'precio_asc') arr.sort((a,b) => precioFinal(a) - precioFinal(b));
    else if (ordenActual === 'precio_desc') arr.sort((a,b) => precioFinal(b) - precioFinal(a));
    else if (ordenActual === 'stock') arr.sort((a,b) => b.stock - a.stock);
    else if (ordenActual === 'azar') arr.sort(() => Math.random() - 0.5);
    else if (ordenActual === 'rotacion') arr.sort((a,b) => scoreRotacion(b) - scoreRotacion(a));
    return arr;
}

function toggleOrden() {
    const i = ORDENES.indexOf(ordenActual);
    ordenActual = ORDENES[(i+1) % ORDENES.length];
    const lbl = document.getElementById('lbl-orden');
    if (lbl) lbl.textContent = ORDEN_LABELS[ordenActual];
    renderCarril();
}

function categoriasConProductos() {
    return CATEGORIAS_ORDEN.filter(cat => todosLosProductos.some(p => p.stock > 0 && cat.test(p)));
}

function renderCarril() {
    const cats = categoriasConProductos();
    if (!cats.length) {
        document.getElementById('carril').innerHTML = '<div class="carril-pagina"><div class="empty">No hay productos.</div></div>';
        document.getElementById('carril-dots').innerHTML = '';
        return;
    }
    if (carrilIndex >= cats.length) carrilIndex = cats.length - 1;
    if (carrilIndex < 0) carrilIndex = 0;

    const cat = cats[carrilIndex];
    document.getElementById('carril-titulo').textContent = cat.label;
    document.getElementById('flecha-izq').disabled = (carrilIndex === 0);
    document.getElementById('flecha-der').disabled = (carrilIndex === cats.length - 1);

    // Dots
    document.getElementById('carril-dots').innerHTML = cats.map((c2,i) =>
        '<div class="carril-dot' + (i===carrilIndex?' on':'') + '" onclick="carrilIrA(' + i + ')"></div>'
    ).join('');

    // Render solo la página activa (mejor performance que renderizar todas)
    const lista = ordenarProductos(todosLosProductos.filter(p => p.stock > 0 && cat.test(p)));
    document.getElementById('carril').innerHTML = '<div class="carril-pagina">' + lista.map(renderCardHTML).join('') + '</div>';
}

function carrilMover(dir) {
    const cats = categoriasConProductos();
    carrilIndex = Math.max(0, Math.min(cats.length-1, carrilIndex + dir));
    renderCarril();
}
function carrilIrA(i) { carrilIndex = i; renderCarril(); }

// Swipe táctil sobre el carril
let _touchStartX = 0;
function initSwipe() {
    const wrap = document.getElementById('carril-wrap');
    if (!wrap || wrap._swipeInit) return;
    wrap._swipeInit = true;
    wrap.addEventListener('touchstart', e => { _touchStartX = e.touches[0].clientX; }, {passive:true});
    wrap.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - _touchStartX;
        if (Math.abs(dx) > 50) carrilMover(dx < 0 ? 1 : -1);
    }, {passive:true});
}

// Render de un card — misma lógica que antes, ahora como función reusable
function renderCardHTML(p) {
    const tipo = tipoOferta(p);
    const pf = precioFinal(p);
    const conDesc = pf < p.price;
    const ah = conDesc ? p.price - pf : 0;
    const key = String(p.id);
    const isSel = seleccionados.has(key);
    const tipoAttr = tipo || 'sinoferta';
    const selCls = isSel ? ' sel' : '';
    const bloqCls = p.stock <= 0 ? ' prod-bloqueado' : '';
    const clickFn = p.stock <= 0 ? '' : 'toggleSel(' + key + ')';

    let fotoHTML;
    if (p.image) {
        fotoHTML = '<div style="width:100%;height:160px;overflow:hidden;background:#f0f0ee">'
                 + '<img src="' + p.image + '" onerror="imgError(this)" '
                 + 'style="width:100%;height:100%;object-fit:cover;display:block"></div>';
    } else {
        fotoHTML = '<div style="width:100%;height:80px;background:#f5f5f5;display:flex;'
                 + 'align-items:center;justify-content:center;font-size:32px">'
                 + getEmoji(p.name) + '</div>';
    }

    const origHTML  = conDesc ? '<div class="prod-precio-orig">' + fmt(p.price) + '</div>' : '';
    const bdgHTML   = tipo ? '<span class="prod-badge ' + badgeCls(tipo) + '" style="margin-top:4px;display:inline-block">' + badgeLabel(tipo, p) + '</span>' : '';
    const ahoHTML   = ah > 0 ? '<div class="prod-ahorro">Ahorrás ' + fmt(ah) + ' (' + Math.round(ah/p.price*100) + '%)</div>' : '';
    const urgMap    = {relampago:'⚡ Solo hoy', ultimas:'⏳ Últimas unidades', promo:'🔥 Oferta limitada', combo:'🎁 Combo especial', destacada:'⭐ Precio especial', especial:'💙 10% de descuento'};
    const urgHTML   = tipo && urgMap[tipo] ? '<div class="prod-urgencia">' + urgMap[tipo] + '</div>' : '';
    const stockHTML = p.stock > 0 && p.stock <= 5 ? '<div style="font-size:9px;color:#cc1020;font-weight:700;margin-top:2px">⚠️ Quedan ' + Math.round(p.stock) + '</div>' : '';

    return '<div class="prod' + selCls + bloqCls + '" data-pid="' + key + '" data-tipo="' + tipoAttr + '" onclick="' + clickFn + '">' +
        '<div class="prod-stripe"></div>' + fotoHTML +
        '<div class="prod-info">' +
            '<div class="prod-nombre">' + p.name + '</div>' +
            origHTML +
            '<div class="prod-precio">' + fmt(pf) + '</div>' +
            ahoHTML + bdgHTML + urgHTML + stockHTML +
        '</div></div>';
}

function tipoDominante(prods) {

function renderPanelImagen() {
    const total = prodsActuales.length;
    const opts  = MOSAIC_OPTS.filter(o => o.cols*o.rows <= total);
    const celdas = mosaicConfig.cols * mosaicConfig.rows;
    const sobran = Math.max(0, total - celdas);

    const aviso  = llena
        ? '<div style="font-size:11px;color:#22c55e;margin-bottom:8px">✅ Grilla completa — ' + total + ' productos</div>'
        : sobran > 0 ? '<div style="font-size:11px;color:#f59e0b;margin-bottom:8px">⚠️ ' + sobran + ' producto' + (sobran>1?'s':'') + ' no entran</div>' : '';

    }).join('');

    const gridBtns = opts.map(function(o){
        const c2=o.cols*o.rows, sob=total-c2, ok=c2===total;

function buildMosaico(titulo) {
    const cols=mosaicConfig.cols, rows=mosaicConfig.rows;
    const total=cols*rows;
    const celdas=prodsActuales.slice(0,total);
    const cellSize=total>12?160:Math.min(160,Math.floor(Math.min(window.innerWidth-40,500)/cols));
    const gridW=cols*cellSize+(cols-1)*4;
    const needsScroll=gridW>window.innerWidth-32||total>12;

    const header='<div style="background:#1a4a1a;border-radius:12px 12px 0 0;padding:10px 14px 8px;text-align:center">' +
        '<div style="color:#aed581;font-size:10px;font-weight:600;letter-spacing:.5px;margin-bottom:2px">🛒 ALMACÉN COPIHUE</div>' +
        '<div style="color:#fff;font-size:13px;font-weight:900;letter-spacing:1px;text-transform:uppercase">' + titulo + '</div>' +
        '</div>';

    const cells=celdas.map(function(p){
        return '<div style="border-radius:6px;overflow:hidden;flex-shrink:0">' + buildFlyerInline(p,mosaicTpl,cellSize,prodsActuales) + '</div>';
    }).join('');

    const gridStyle=needsScroll
        ? 'display:flex;flex-direction:row;gap:4px;width:'+gridW+'px'
        : 'display:grid;gap:4px;grid-template-columns:repeat('+cols+','+cellSize+'px)';

    const wrap=needsScroll
        ? '<div style="width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none"><div style="'+gridStyle+';padding:4px">' + cells + '</div></div>'
        : '<div style="'+gridStyle+';padding:4px">' + cells + '</div>';

    const footer='<div style="background:#1a4a1a;border-radius:0 0 12px 12px;padding:6px 14px;text-align:center">' +
        '<span style="color:#aed581;font-size:10px;font-weight:600">📲 Hacemos pedidos  •  💬 Consultas por WhatsApp</span>' +
        '</div>';

    return '<div id="mosaic-export" style="background:#2d5a27;border-radius:12px;overflow:hidden;width:100%;display:block">' +
        header + wrap + footer + '</div>';
}

function imgError(img) { img.parentElement.style.display='none'; }

function renderPanelTexto() {
    return PLANTILLAS.map(function(pl){
        const textoId='wa-'+pl.id;
        return '<div class="texto-bloque">' +
            '<div class="salida-head"><span class="salida-nombre">'+pl.nombre+'</span>' +
            '<div class="s-btns">' +
            '<button class="s-btn negro" onclick="copiar(\''+textoId+'\',this)">Copiar</button>' +
            '<button class="s-btn" onclick="abrirWA(\''+textoId+'\')">📲 WA</button>' +
            '</div></div>' +
            '<div class="wa-txt" id="'+textoId+'">'+buildTexto(prodsActuales,pl.id)+'</div>' +
            '</div>';
    }).join('');
}

async function compartirMosaic() {
    const el=document.getElementById('mosaic-export');
    if(!el){alert('No hay mosaico generado.');return;}
    const btn=document.querySelector('[onclick="compartirMosaic()"]');
    const orig=btn?btn.innerHTML:'';
    if(btn)btn.innerHTML='⏳ Generando...';
    try {
        const canvas=await html2canvas(el,{backgroundColor:null,scale:2,useCORS:true,allowTaint:true,logging:false});
        canvas.toBlob(async function(blob){
            const file=new File([blob],'oferta-copihue.png',{type:'image/png'});
            if(navigator.canShare&&navigator.canShare({files:[file]})){
                try{await navigator.share({files:[file],title:'Oferta Almacén Copihue'});if(btn)btn.innerHTML=orig;return;}
                catch(e){if(e.name!=='AbortError')console.warn(e);}
            }
            const url=URL.createObjectURL(blob);
            const a=document.createElement('a');a.href=url;a.download='oferta-copihue.png';a.click();
            setTimeout(()=>URL.revokeObjectURL(url),3000);
            if(btn)btn.innerHTML=orig;
        },'image/png');
    }catch(e){alert('Error: '+e.message);if(btn)btn.innerHTML=orig;}
}

function copiar(id,btn){
    const txt=document.getElementById(id).textContent;
    navigator.clipboard.writeText(txt).then(function(){
        btn.textContent='✅';setTimeout(function(){btn.textContent='Copiar';},2000);
    });
}
function abrirWA(id){
    window.open('https://wa.me/?text='+encodeURIComponent(document.getElementById(id).textContent),'_blank');
}

function irInicio(){window.scrollTo({top:0,behavior:'smooth'});}
function imgError(img){img.parentElement.style.display='none';}

window.addEventListener('popstate',function(e){
    const o=document.getElementById('buscador-overlay');
    if(o&&o.style.display!=='none')cerrarBuscar();
});
function buscarConHistorial(){history.pushState({buscador:true},'');buscar();}

function buscar(){
    document.getElementById('buscador-overlay').style.display='flex';
    setTimeout(()=>document.getElementById('buscar-input').focus(),100);
    filtrarBusqueda();
}
function cerrarBuscar(){document.getElementById('buscador-overlay').style.display='none';}
function filtrarBusqueda(){
    const q=document.getElementById('buscar-input').value.toLowerCase();
    const res=document.getElementById('buscar-resultados');
    const lista=todosLosProductos.filter(p=>p.stock>0&&(!q||p.name.toLowerCase().includes(q)));
    if(!lista.length){res.innerHTML='<div style="color:#bbb;text-align:center;padding:20px">Sin resultados</div>';return;}
    res.innerHTML=lista.slice(0,50).map(function(p){
        const tipo=tipoOferta(p),pf=precioFinal(p),isSel=seleccionados.has(String(p.id));
        const bdg=tipo?'<span style="background:#222;color:#aaa;font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;text-transform:uppercase;margin-left:4px">'+badgeLabel(tipo,p)+'</span>':'';
        return '<div onclick="selDesdeBuscar(\''+p.id+'\')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1.5px solid '+(isSel?'#22c55e':'#eee')+';background:'+(isSel?'#e8fdf0':'#fafafa')+';cursor:pointer;margin-bottom:6px">' +
            '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+getEmoji(p.name)+' '+p.name+'</div>' +
            '<div style="font-size:12px;color:#888;margin-top:2px">'+fmt(pf)+bdg+'</div></div>' +
            '<div style="font-size:22px;flex-shrink:0">'+(isSel?'✅':'⬜')+'</div></div>';
    }).join('');
}
function selDesdeBuscar(id){
    const key=String(id);
    const div=document.querySelector('[data-pid="'+key+'"]');
    if(seleccionados.has(key)){seleccionados.delete(key);if(div)div.classList.remove('sel');}
    else{seleccionados.add(key);if(div)div.classList.add('sel');}
    actualizarBarra();filtrarBusqueda();
}

function agregarTodo(){productosFiltrados().forEach(p=>seleccionados.add(String(p.id)));renderGrilla();actualizarBarra();}
function limpiarTodo(){seleccionados.clear();renderGrilla();actualizarBarra();document.getElementById('zona-salidas').innerHTML='';}
function recargar(){seleccionados.clear();todosLosProductos=[];document.getElementById('zona-salidas').innerHTML='';document.getElementById('grilla').innerHTML='';document.getElementById('filtros').style.display='none';cargar();window.scrollTo({top:0,behavior:'smooth'});}

function asistenciaIA() {
    if (!todosLosProductos.length) {
        alert('Esperá que carguen los productos primero.');
        return;
    }
    // Palabras clave de alta rotación en almacén
    const altaRotacion = [
        'leche','aceite','azucar','azúcar','harina','arroz','fideos','fideo',
        'yerba','cafe','café','pan','manteca','huevo','huevos','agua',
        'gaseosa','coca','pepsi','cerveza','vino','sal','mayonesa',
        'tomate','papa','cebolla','zanahoria','pollo','carne',
    ];
    const candidatos = productosFiltrados().filter(p => {
        const n = p.name.toLowerCase();
        return altaRotacion.some(k => n.includes(k));
    });
    if (!candidatos.length) {
        alert('No encontré productos de alta rotación en el filtro activo. Probá con "Ofertas" o "Sin oferta".');
        return;
    }
    // Seleccionar sin romper el estado existente — igual que agregarTodo pero filtrado
    candidatos.forEach(p => seleccionados.add(String(p.id)));
    renderGrilla();
    actualizarBarra();
    // Aviso
    const nombres = candidatos.slice(0,5).map(p => p.name).join(', ');
    alert('🤖 IA seleccionó ' + candidatos.length + ' productos de alta rotación:\n' + nombres + (candidatos.length > 5 ? '...' : ''));
}

// ── Ocultar/Mostrar productos (header click o botón) ──
let productosOcultos = false;
function toggleModoOculto() {
    document.body.classList.toggle('modo-oculto');
}

cargar();
