<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Config Ofertas — Almacén Copihue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --p:#2e7d32; --pd:#1b5e20; --pl:#4caf50;
  --sec:#ff6f00; --sec-lt:#fff3e0;
  --bg:#f4faf4; --bg2:#eaf3ea; --sur:#ffffff;
  --bdr:#d0e8d0; --bdr2:#e8f3e8;
  --txt:#172517; --txt-m:#4a6a4a; --txt-s:#8aaa8a;
  --mono:'DM Mono',monospace; --sans:'DM Sans',sans-serif; --disp:'Syne',sans-serif;
  --r:12px; --rs:8px;
  --sh:0 2px 10px rgba(46,125,50,.09); --sh-lg:0 8px 32px rgba(46,125,50,.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);min-height:100vh;
  background-image:radial-gradient(ellipse at 5% 5%,rgba(46,125,50,.07) 0,transparent 55%),
  radial-gradient(ellipse at 95% 95%,rgba(255,111,0,.05) 0,transparent 50%);}

/* HEADER */
header{background:linear-gradient(135deg,var(--pd),var(--p));color:#fff;padding:0 20px;height:60px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 16px rgba(27,94,32,.35);}
.h-left{display:flex;align-items:center;gap:12px;}
.h-icon{width:34px;height:34px;background:rgba(255,255,255,.15);border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.h-title{font-family:var(--disp);font-size:1.05rem;font-weight:800;letter-spacing:-.02em;}
.h-sub{font-size:.68rem;opacity:.65;font-weight:400;margin-top:1px;}
.h-right{display:flex;align-items:center;gap:8px;}
.btn{border:none;border-radius:var(--rs);cursor:pointer;font-weight:600;
  display:flex;align-items:center;gap:5px;transition:all .18s;}
.btn-save{background:var(--sec);color:#fff;padding:7px 16px;font-family:var(--disp);font-size:.8rem;letter-spacing:.02em;}
.btn-save:hover:not(:disabled){background:#e65100;transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,111,0,.4);}
.btn-save:disabled{background:var(--txt-s);cursor:not-allowed;transform:none;}
.btn-ghost{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:7px 11px;font-size:.82rem;}
.btn-ghost:hover{background:rgba(255,255,255,.25);}
.upip{width:7px;height:7px;border-radius:50%;background:var(--sec);display:none;animation:blink 1.2s infinite;}
.upip.on{display:block;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

/* LAYOUT */
.wrap{max-width:1060px;margin:0 auto;padding:20px 16px 70px;}

/* STATUS */
.status{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);
  padding:10px 16px;margin-bottom:18px;display:flex;align-items:center;gap:10px;
  font-size:.8rem;color:var(--txt-m);box-shadow:var(--sh);}
.s-dot{width:8px;height:8px;border-radius:50%;background:var(--txt-s);flex-shrink:0;transition:background .3s;}
.s-dot.ok{background:var(--pl);box-shadow:0 0 6px rgba(76,175,80,.5);}
.s-dot.err{background:#d32f2f;}
.s-dot.load{background:var(--sec);animation:blink .9s infinite;}
.s-txt{flex:1;} .s-time{font-family:var(--mono);font-size:.72rem;color:var(--txt-s);}

/* GAS BOX */
.gas-box{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);
  padding:14px 16px;margin-bottom:20px;box-shadow:var(--sh);}
.gas-box label{font-size:.7rem;font-weight:700;color:var(--txt-s);letter-spacing:.08em;
  text-transform:uppercase;display:block;margin-bottom:5px;}
.gas-row{display:flex;gap:7px;}
.gas-input{flex:1;font-family:var(--mono);font-size:.75rem;border:1.5px solid var(--bdr);
  border-radius:var(--rs);padding:7px 11px;color:var(--txt);background:var(--bg);outline:none;transition:border-color .18s;}
.gas-input:focus{border-color:var(--p);background:#fff;}
.btn-connect{background:var(--p);color:#fff;border:none;border-radius:var(--rs);padding:7px 14px;
  font-size:.78rem;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-connect:hover{background:var(--pd);}

/* SECTION LABEL */
.sec-lbl{font-family:var(--disp);font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--txt-s);margin:24px 0 10px;display:flex;align-items:center;gap:8px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--bdr);}

/* LEGEND */
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.leg{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--txt-m);}
.ld{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;
  font-size:.58rem;font-weight:700;font-family:var(--mono);}
.ld-1{background:var(--pl);color:#fff;}
.ld-0{background:#ffebee;color:#c62828;border:1.5px solid #e57373;}
.ld-a{background:#e3f2fd;color:#1565c0;border:1.5px solid #90caf9;}

/* OFFERS GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;}

/* CARD */
.card{background:var(--sur);border:1.5px solid var(--bdr);border-radius:var(--r);
  overflow:hidden;box-shadow:var(--sh);transition:box-shadow .2s,transform .2s;}
.card:hover{box-shadow:var(--sh-lg);transform:translateY(-1px);}
.card-head{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bdr2);}
.oc-badge{padding:3px 9px;border-radius:20px;font-size:.68rem;font-weight:700;
  font-family:var(--disp);letter-spacing:.05em;text-transform:uppercase;color:#fff;}
.oc-name{font-family:var(--disp);font-size:.9rem;font-weight:700;flex:1;line-height:1.2;}
.pill{display:flex;align-items:center;gap:6px;}
.pill-lbl{font-size:.68rem;color:var(--txt-s);font-weight:600;min-width:50px;text-align:right;}
.sw{position:relative;width:38px;height:22px;flex-shrink:0;}
.sw input{opacity:0;width:0;height:0;}
.sw-track{position:absolute;inset:0;background:#ccc;border-radius:22px;cursor:pointer;transition:background .25s;}
.sw-track::after{content:'';position:absolute;left:3px;top:3px;width:16px;height:16px;
  border-radius:50%;background:#fff;transition:transform .25s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.sw input:checked+.sw-track{background:var(--pl);}
.sw input:checked+.sw-track::after{transform:translateX(16px);}
.card-body{padding:14px 16px;}

/* SCHEDULE TABLE */
.sch-head{display:grid;grid-template-columns:62px repeat(7,1fr);gap:3px;margin-bottom:5px;}
.dh{text-align:center;font-size:.62rem;font-weight:700;font-family:var(--mono);
  color:var(--txt-s);text-transform:uppercase;}
.dh.today{color:var(--p);}
.dh.today::after{content:'▾';display:block;font-size:.45rem;text-align:center;}
.sch-row{display:grid;grid-template-columns:62px repeat(7,1fr);gap:3px;margin-bottom:5px;align-items:center;}
.rl{font-size:.66rem;font-weight:600;color:var(--txt-m);line-height:1.2;}

/* 3-STATE DAY SELECTOR */
.ds{position:relative;width:100%;aspect-ratio:1;max-width:32px;margin:0 auto;}
.ds select{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;z-index:2;}
.ds-face{display:flex;align-items:center;justify-content:center;width:100%;height:100%;
  border-radius:6px;border:1.5px solid var(--bdr);font-size:.58rem;font-weight:700;
  font-family:var(--mono);background:var(--bg2);color:var(--txt-s);pointer-events:none;
  transition:all .15s;line-height:1;}
.ds[data-val="1"] .ds-face{background:var(--pl);border-color:var(--p);color:#fff;box-shadow:0 2px 5px rgba(46,125,50,.3);}
.ds[data-val="0"] .ds-face{background:#ffebee;border-color:#e57373;color:#c62828;}
.ds[data-val="A"] .ds-face{background:#e3f2fd;border-color:#90caf9;color:#1565c0;}

/* TIME INPUT */
.ti{width:100%;font-family:var(--mono);font-size:.65rem;text-align:center;
  border:1.5px solid var(--bdr);border-radius:6px;padding:3px 1px;
  background:var(--bg);color:var(--txt);outline:none;transition:border-color .18s;-webkit-appearance:none;}
.ti:focus{border-color:var(--p);background:#fff;}
.ti:disabled{opacity:.3;cursor:not-allowed;}
.ti.tc{border-color:rgba(76,175,80,.35);}

/* MAX ROW */
.max-row{display:flex;align-items:center;gap:8px;margin-top:10px;
  padding-top:9px;border-top:1px dashed var(--bdr);}
.max-lbl{font-size:.7rem;color:var(--txt-m);font-weight:600;flex:1;}
.max-in{width:56px;font-family:var(--mono);font-size:.8rem;text-align:center;
  border:1.5px solid var(--bdr);border-radius:6px;padding:4px 5px;
  background:var(--bg);color:var(--txt);outline:none;transition:border-color .18s;}
.max-in:focus{border-color:var(--p);}

/* SIMPLE CARD */
.simple-card{background:var(--sur);border:1.5px solid var(--bdr);border-radius:var(--r);
  padding:16px 18px;box-shadow:var(--sh);display:flex;align-items:flex-start;gap:14px;margin-bottom:12px;flex-wrap:wrap;}
.sc-ico{font-size:1.5rem;flex-shrink:0;margin-top:2px;}
.sc-info{flex:1;min-width:200px;}
.sc-title{font-family:var(--disp);font-size:.92rem;font-weight:700;margin-bottom:3px;}
.sc-desc{font-size:.75rem;color:var(--txt-m);line-height:1.45;}
.sc-ctrl{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;}

/* Cervecero mode buttons */
.cerv-btns{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.cerv-btn{border:1.5px solid var(--bdr);background:var(--bg2);color:var(--txt-m);
  border-radius:var(--rs);padding:5px 10px;font-size:.7rem;font-weight:700;cursor:pointer;
  font-family:var(--disp);transition:all .15s;letter-spacing:.03em;}
.cerv-btn:hover{border-color:var(--p);color:var(--p);}
.cerv-btn.active-a{background:#e3f2fd;color:#1565c0;border-color:#90caf9;}
.cerv-btn.active-1{background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7;}
.cerv-btn.active-0{background:#ffebee;color:#c62828;border-color:#ef9a9a;}
.cerv-times{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
.cerv-tl{font-size:.7rem;color:var(--txt-m);font-weight:600;}
.cerv-ti{width:72px;font-family:var(--mono);font-size:.8rem;text-align:center;
  border:1.5px solid var(--bdr);border-radius:6px;padding:4px 6px;
  background:var(--bg);color:var(--txt);outline:none;transition:border-color .18s;}
.cerv-ti:focus{border-color:#1a237e;}
.cerv-status{font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:20px;margin-bottom:4px;}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;padding:11px 18px;border-radius:var(--r);
  font-size:.83rem;font-weight:600;box-shadow:0 6px 24px rgba(0,0,0,.22);z-index:999;
  transform:translateY(60px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;gap:7px;max-width:320px;color:#fff;}
.toast.on{transform:translateY(0);opacity:1;}
.toast.ok{background:rgba(27,94,32,.92);}
.toast.err{background:rgba(183,28,28,.92);}
.toast.warn{background:rgba(230,81,0,.92);}

/* LOADING */
.overlay{display:none;position:fixed;inset:0;background:rgba(244,250,244,.88);z-index:500;
  flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.overlay.on{display:flex;}
.spin{width:34px;height:34px;border:3px solid var(--bdr);border-top-color:var(--p);
  border-radius:50%;animation:rot .8s linear infinite;}
@keyframes rot{to{transform:rotate(360deg)}}
.spin-lbl{font-family:var(--disp);font-size:.82rem;color:var(--txt-m);font-weight:600;}

@media(max-width:640px){
  .grid{grid-template-columns:1fr;}
  .sch-head,.sch-row{grid-template-columns:50px repeat(7,1fr);gap:2px;}
  .ti{font-size:.58rem;padding:2px 0;}
  .ds-face{font-size:.52rem;}
  .dh{font-size:.56rem;}
}
</style>
</head>
<body>

<div class="overlay" id="ov"><div class="spin"></div><div class="spin-lbl" id="ov-txt">Cargando...</div></div>
<div class="toast" id="toast"></div>

<header>
  <div class="h-left">
    <div class="h-icon">🕐</div>
    <div>
      <div class="h-title">Config Ofertas</div>
      <div class="h-sub">Almacén Copihue</div>
    </div>
  </div>
  <div class="h-right">
    <span class="upip" id="upip" title="Hay cambios sin guardar"></span>
    <button class="btn btn-ghost" id="btnR">↺ Recargar</button>
    <button class="btn btn-save" id="btnS" disabled>💾 Guardar</button>
  </div>
</header>

<div class="wrap">

  <div class="status">
    <div class="s-dot" id="sdot"></div>
    <div class="s-txt" id="stxt">Sin conectar — ingresá la URL del GAS</div>
    <div class="s-time" id="stime"></div>
  </div>

  <div class="gas-box">
    <label>URL Google Apps Script (GAS)</label>
    <div class="gas-row">
      <input class="gas-input" id="gasUrl" type="text"
        placeholder="https://script.google.com/macros/s/…/exec"
        autocomplete="off" spellcheck="false">
      <button class="btn-connect" id="btnC">Conectar</button>
    </div>
  </div>

  <div class="legend">
    <span class="leg"><span class="ld ld-1">1</span> Forzado ON — activo todo el día</span>
    <span class="leg"><span class="ld ld-0">0</span> Forzado OFF — apagado todo el día</span>
    <span class="leg"><span class="ld ld-a">A</span> Auto — respeta horario inicio/cierre</span>
  </div>

  <div class="sec-lbl">Ofertas con horario</div>
  <div class="grid" id="offersGrid"></div>

  <div class="sec-lbl">Interruptores globales</div>
  <div id="globalesWrap"></div>

</div>

<script>
const DIAS   = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const DIA_JS = [1,2,3,4,5,6,0];
const TODAY  = DIA_JS.indexOf(new Date().getDay());
const GAS_KEY = 'cop_gas_url';

const OFERTAS = [
  { id:'relampago',  lbl:'Relámpago ⚡',       c:'#e53935', bg:'#fff5f5',
    kDias:'Dias ofertas RELAMPAGO',   kIni:'hora inicio relampago',
    kCie:'hora cierre relampago',     kMax:'maximo relampago',  maxLbl:'Máx. simultáneo' },
  { id:'destacadas', lbl:'Destacadas 🔥',       c:'#ef6c00', bg:'#fff8f2',
    kDias:'Dias ofertas DESTACADAS',  kIni:'hora inicio destacadas',
    kCie:'hora cierre destacadas',    kMax:'maximo destacadas', maxLbl:'Máx. visible' },
  { id:'especiales', lbl:'Especiales ⭐',       c:'#1565c0', bg:'#f0f5ff',
    kDias:'Dias ofertas ESPECIALES',  kIni:'hora inicio especiales',
    kCie:'hora cierre especiales',    kMax:'maximo especiales', maxLbl:'Máx. visible' },
  { id:'ultimas',    lbl:'Últimas Unidades 🎯', c:'#f57f17', bg:'#fffaf0',
    kDias:'Dias ofertas ULTIMAS UNIDADES', kIni:'hora inicio ultimas unidades',
    kCie:'hora cierre ultimas unidades',   kMax:'maximo ultimas', maxLbl:'Máx. visible' },
];

let GAS_URL = '';
let cfg     = {};
let dirty   = false;

const $   = id => document.getElementById(id);
const nrm = s  => String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

function fk(key) {
  const t = nrm(key);
  return Object.keys(cfg).find(k => {
    const n = nrm(k);
    return n===t || n.replace(/^.*\|/,'')===t || n.includes(t);
  }) || null;
}

function ph(v) {
  if (v===null||v===undefined||v==='') return '';
  const s = String(v).trim();
  if (s.includes('T')&&s.includes('Z')) {
    const d=new Date(s); if(!isNaN(d)) return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  }
  if (/^0\.\d+$/.test(s)){const m=Math.round(parseFloat(s)*1440);return Math.floor(m/60).toString().padStart(2,'0')+':'+(m%60).toString().padStart(2,'0');}
  if (/^\d{1,2}:\d{2}$/.test(s)) return s.length===4?'0'+s:s;
  if (/^\d{1,2}$/.test(s)) return s.padStart(2,'0')+':00';
  return s;
}

function decodeDia(v){ if(v===1||v==='1'||v===true)return '1'; if(v===0||v==='0'||v===false)return '0'; return 'A'; }
function encodeDia(v){ if(v==='1')return 1; if(v==='0')return 0; return 'A'; }

function toast(msg,type='ok',ms=3200){
  const el=$('toast'); el.className='toast '+type;
  el.innerHTML=({ok:'✅',err:'❌',warn:'⚠️'}[type]||'')+' '+msg;
  el.classList.add('on'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('on'),ms);
}
function setStatus(state,txt){
  $('sdot').className='s-dot '+state; $('stxt').textContent=txt;
  $('stime').textContent=state==='ok'?new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}):'';
}
function setLoading(on,txt=''){if(txt)$('ov-txt').textContent=txt;$('ov').classList.toggle('on',on);}
function markDirty(){dirty=true;$('upip').classList.add('on');$('btnS').disabled=false;}

function buildCards(){
  const grid=$('offersGrid'); grid.innerHTML='';
  OFERTAS.forEach(of=>{
    const kD=fk(of.kDias),kI=fk(of.kIni),kC=fk(of.kCie),kM=fk(of.kMax);
    const dias=kD?(cfg[kD]||Array(7).fill('A')):Array(7).fill('A');
    const ini =kI?(cfg[kI]||Array(7).fill('')):Array(7).fill('');
    const cie =kC?(cfg[kC]||Array(7).fill('')):Array(7).fill('');
    const maxV=kM?((cfg[kM]||[])[0]??''):'';
    const anyOn=dias.some(v=>v===1||v==='1'||v===true);

    const card=document.createElement('div');
    card.className='card';
    card.style.borderTop=`3px solid ${of.c}`;
    card.innerHTML=`
      <div class="card-head" style="background:${of.bg}">
        <span class="oc-badge" style="background:${of.c}">${of.id.toUpperCase()}</span>
        <span class="oc-name">${of.lbl}</span>
        <div class="pill">
          <span class="pill-lbl" id="gl-lbl-${of.id}">${anyOn?'ACTIVO':'—'}</span>
          <label class="sw"><input type="checkbox" id="gl-${of.id}" ${anyOn?'checked':''}><div class="sw-track"></div></label>
        </div>
      </div>
      <div class="card-body">
        <div class="sch-head">
          <div></div>
          ${DIAS.map((d,i)=>`<div class="dh${i===TODAY?' today':''}">${d}</div>`).join('')}
        </div>
        <div class="sch-row">
          <div class="rl">Estado</div>
          ${dias.map((v,i)=>{
            const val=decodeDia(v);
            const lbs={'1':'ON','0':'OFF','A':'AUTO'};
            return `<div class="ds" data-offer="${of.id}" data-day="${i}" data-val="${val}">
              <select data-role="ds" data-offer="${of.id}" data-day="${i}">
                <option value="1"${val==='1'?' selected':''}>ON</option>
                <option value="0"${val==='0'?' selected':''}>OFF</option>
                <option value="A"${val==='A'?' selected':''}>AUTO</option>
              </select>
              <div class="ds-face">${lbs[val]}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="sch-row">
          <div class="rl">Inicio</div>
          ${ini.map((v,i)=>{
            const dis=decodeDia(dias[i])==='0';
            return `<input class="ti${i===TODAY?' tc':''}" type="time"
              data-offer="${of.id}" data-day="${i}" data-role="ini"
              value="${ph(v)}"${dis?' disabled':''}>`;
          }).join('')}
        </div>
        <div class="sch-row">
          <div class="rl">Cierre</div>
          ${cie.map((v,i)=>{
            const dis=decodeDia(dias[i])==='0';
            return `<input class="ti${i===TODAY?' tc':''}" type="time"
              data-offer="${of.id}" data-day="${i}" data-role="cie"
              value="${ph(v)}"${dis?' disabled':''}>`;
          }).join('')}
        </div>
        <div class="max-row">
          <span class="max-lbl">📊 ${of.maxLbl}</span>
          <input class="max-in" type="number" min="1" max="99"
            data-offer="${of.id}" data-role="max" value="${maxV}" placeholder="—">
        </div>
      </div>`;
    grid.appendChild(card);
  });

  // EVENTS
  document.querySelectorAll('[data-role="ds"]').forEach(sel=>{
    sel.addEventListener('change',function(){
      const wrap=this.closest('.ds');
      const val=this.value;
      const lbs={'1':'ON','0':'OFF','A':'AUTO'};
      wrap.dataset.val=val; wrap.querySelector('.ds-face').textContent=lbs[val];
      const of=OFERTAS.find(o=>o.id===this.dataset.offer);
      const day=parseInt(this.dataset.day);
      const key=fk(of.kDias)||of.kDias;
      if(!cfg[key])cfg[key]=Array(7).fill('A');
      cfg[key][day]=encodeDia(val);
      // disable time inputs when OFF
      document.querySelectorAll(
        `[data-offer="${of.id}"][data-day="${day}"][data-role="ini"],
         [data-offer="${of.id}"][data-day="${day}"][data-role="cie"]`)
        .forEach(el=>el.disabled=val==='0');
      syncGl(of.id); markDirty();
    });
  });

  document.querySelectorAll('[data-role="ini"],[data-role="cie"]').forEach(el=>{
    el.addEventListener('change',function(){
      const of=OFERTAS.find(o=>o.id===this.dataset.offer);
      const day=parseInt(this.dataset.day);
      const kn=this.dataset.role==='ini'?of.kIni:of.kCie;
      const key=fk(kn)||kn;
      if(!cfg[key])cfg[key]=Array(7).fill('');
      cfg[key][day]=this.value; markDirty();
    });
  });

  document.querySelectorAll('[data-role="max"]').forEach(el=>{
    el.addEventListener('change',function(){
      const of=OFERTAS.find(o=>o.id===this.dataset.offer);
      const key=fk(of.kMax)||of.kMax;
      if(!cfg[key])cfg[key]=[''];
      cfg[key][0]=this.value?parseInt(this.value):''; markDirty();
    });
  });

  OFERTAS.forEach(of=>{
    $('gl-'+of.id).addEventListener('change',function(){
      const val=this.checked?'1':'0';
      const key=fk(of.kDias)||of.kDias;
      if(!cfg[key])cfg[key]=Array(7).fill('A');
      cfg[key]=cfg[key].map(()=>encodeDia(val));
      document.querySelectorAll(`[data-role="ds"][data-offer="${of.id}"]`).forEach(sel=>{
        sel.value=val;
        const wrap=sel.closest('.ds');
        wrap.dataset.val=val;
        wrap.querySelector('.ds-face').textContent={'1':'ON','0':'OFF','A':'AUTO'}[val];
        const day=sel.dataset.day;
        document.querySelectorAll(
          `[data-offer="${of.id}"][data-day="${day}"][data-role="ini"],
           [data-offer="${of.id}"][data-day="${day}"][data-role="cie"]`)
          .forEach(ti=>ti.disabled=val==='0');
      });
      syncGl(of.id); markDirty();
    });
  });
}

function syncGl(offerId){
  const of=OFERTAS.find(o=>o.id===offerId);
  const key=fk(of.kDias);
  if(!key)return;
  const anyOn=(cfg[key]||[]).some(v=>v===1||v==='1'||v===true);
  $('gl-'+offerId).checked=anyOn;
  $('gl-lbl-'+offerId).textContent=anyOn?'ACTIVO':'—';
}

function buildGlobales(){
  const wrap=$('globalesWrap'); wrap.innerHTML='';

  // ── PROMOS ──────────────────────────────────────────────────────
  const pk=fk('oferta promos')||fk('promos activas')||'OFERTA PROMOS ACTIVAS';
  const pv=cfg[pk]?cfg[pk][0]:null;
  const pon=pv!==0&&pv!=='0'&&pv!==false&&pv!==null;

  const pc=document.createElement('div');
  pc.className='simple-card';
  pc.style.borderLeft='4px solid #2e7d32';
  pc.innerHTML=`
    <div class="sc-ico">🛍️</div>
    <div class="sc-info">
      <div class="sc-title">Ofertas Promos</div>
      <div class="sc-desc">Activa o desactiva todas las promos del catálogo de una vez, sin tocar los productos individuales.</div>
    </div>
    <div class="sc-ctrl">
      <div class="pill">
        <span class="pill-lbl" id="promos-lbl">${pon?'ACTIVO':'INACTIVO'}</span>
        <label class="sw"><input type="checkbox" id="promos-tog"${pon?' checked':''}><div class="sw-track"></div></label>
      </div>
    </div>`;
  wrap.appendChild(pc);
  $('promos-tog').addEventListener('change',function(){
    $('promos-lbl').textContent=this.checked?'ACTIVO':'INACTIVO';
    cfg[pk]=[this.checked?1:0]; markDirty();
  });

  // ── JUEVES CERVECERO ─────────────────────────────────────────────
  // modoActivo: 'A' = algoritmo automático (jueves dentro del horario)
  //              '1' = forzado ON ahora mismo
  //              '0' = apagado completamente
  const ck  = fk('jueves cervecero')||fk('cervecero')||null;
  const cik = fk('hora inicio cervecero')||fk('horainicio cervecero')||null;
  const cck = fk('hora cierre cervecero')||fk('horacierre cervecero')||null;
  const modo= ck?(String(cfg[ck]?.[0]||'A').toUpperCase()):'A';
  const cIni= cik?ph(cfg[cik]?.[0]):'18:00';
  const cCie= cck?ph(cfg[cck]?.[0]):'22:00';

  const mLbls={'A':'AUTO (algoritmo)','1':'FORZADO ON','0':'APAGADO'};
  const mCols={'A':'#1565c0','1':'#2e7d32','0':'#c62828'};

  const cc=document.createElement('div');
  cc.className='simple-card';
  cc.style.borderLeft='4px solid #1a237e';
  cc.innerHTML=`
    <div class="sc-ico">🍺</div>
    <div class="sc-info">
      <div class="sc-title">Jueves Cervecero</div>
      <div class="sc-desc">
        <strong>AUTO</strong>: se activa solo los jueves dentro del horario definido.<br>
        <strong>FORZAR ON</strong>: activo ahora mismo aunque no sea jueves ni el horario.<br>
        <strong>APAGAR</strong>: completamente desactivado, no aparece en el catálogo.
      </div>
      <div class="cerv-times">
        <span class="cerv-tl">Horario:</span>
        <input class="cerv-ti" type="time" id="cerv-ini" value="${cIni}" placeholder="18:00">
        <span style="font-size:.75rem;color:var(--txt-s)">→</span>
        <input class="cerv-ti" type="time" id="cerv-cie" value="${cCie}" placeholder="22:00">
      </div>
    </div>
    <div class="sc-ctrl">
      <span class="cerv-status" id="cerv-status"
        style="background:${modo==='A'?'#e3f2fd':modo==='1'?'#e8f5e9':'#ffebee'};
               color:${mCols[modo]||'#888'}">${mLbls[modo]||'AUTO'}</span>
      <div class="cerv-btns">
        <button class="cerv-btn${modo==='A'?' active-a':''}" id="cerv-auto">AUTO</button>
        <button class="cerv-btn${modo==='1'?' active-1':''}" id="cerv-on">FORZAR ON</button>
        <button class="cerv-btn${modo==='0'?' active-0':''}" id="cerv-off">APAGAR</button>
      </div>
    </div>`;
  wrap.appendChild(cc);

  function setCervMode(m){
    const bgs={'A':'#e3f2fd','1':'#e8f5e9','0':'#ffebee'};
    const status=$('cerv-status');
    status.textContent=mLbls[m];
    status.style.background=bgs[m];
    status.style.color=mCols[m];
    [['cerv-auto','A','active-a'],['cerv-on','1','active-1'],['cerv-off','0','active-0']].forEach(([id,v,cls])=>{
      const btn=$(id);
      btn.className='cerv-btn'+(m===v?' '+cls:'');
    });
    if(ck){if(!cfg[ck])cfg[ck]=['A'];cfg[ck][0]=m;}
    markDirty();
  }

  $('cerv-auto').addEventListener('click',()=>setCervMode('A'));
  $('cerv-on'  ).addEventListener('click',()=>setCervMode('1'));
  $('cerv-off' ).addEventListener('click',()=>setCervMode('0'));
  $('cerv-ini').addEventListener('change',function(){
    if(cik){if(!cfg[cik])cfg[cik]=[''];cfg[cik][0]=this.value;}markDirty();});
  $('cerv-cie').addEventListener('change',function(){
    if(cck){if(!cfg[cck])cfg[cck]=[''];cfg[cck][0]=this.value;}markDirty();});
}

async function loadConfig(){
  if(!GAS_URL){toast('Ingresá la URL del GAS primero','warn');return;}
  setLoading(true,'Cargando desde planilla...');
  setStatus('load','Conectando...');
  try{
    const r=await fetch(GAS_URL+'?action=getConfig&t='+Date.now(),{redirect:'follow'});
    const data=await r.json();
    if(!data.success||!data.config)throw new Error('El GAS no devolvió config válida');
    cfg=JSON.parse(JSON.stringify(data.config));
    buildCards(); buildGlobales();
    dirty=false; $('upip').classList.remove('on'); $('btnS').disabled=true;
    setStatus('ok','Conectado — datos actualizados'); toast('Configuración cargada ✓');
  }catch(e){
    setStatus('err','Error: '+e.message);
    toast('No se pudo conectar: '+e.message,'err',6000);
  }finally{setLoading(false);}
}

async function saveConfig(){
  if(!GAS_URL){toast('Sin URL configurada','warn');return;}
  setLoading(true,'Guardando en planilla...');
  try{
    const payload={};
    OFERTAS.forEach(of=>{
      ['kDias','kIni','kCie','kMax'].forEach(k=>{
        const key=fk(of[k]);
        if(key&&cfg[key]!==undefined)payload[key]=cfg[key];
      });
    });
    const pk=fk('oferta promos')||fk('promos activas');
    if(pk)payload[pk]=cfg[pk];
    const ck=fk('jueves cervecero')||fk('cervecero');
    const cik=fk('hora inicio cervecero')||fk('horainicio cervecero');
    const cck=fk('hora cierre cervecero')||fk('horacierre cervecero');
    if(ck) payload[ck] =cfg[ck];
    if(cik)payload[cik]=cfg[cik];
    if(cck)payload[cck]=cfg[cck];

    const res=await fetch(GAS_URL,{method:'POST',redirect:'follow',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'setConfig',config:payload})});
    const data=await res.json();
    if(data.success===false)throw new Error(data.error||'Error desconocido del GAS');
    dirty=false; $('upip').classList.remove('on'); $('btnS').disabled=true;
    setStatus('ok','Guardado correctamente'); toast('Cambios guardados en la planilla ✓');
  }catch(e){
    toast('Error al guardar: '+e.message,'err',6000);
    setStatus('err','Error al guardar');
  }finally{setLoading(false);}
}

function init(){
  const saved=localStorage.getItem(GAS_KEY)||'';
  if(saved){$('gasUrl').value=saved;GAS_URL=saved;}
  $('btnC').addEventListener('click',()=>{
    const url=$('gasUrl').value.trim();
    if(!url){toast('Ingresá la URL primero','warn');return;}
    GAS_URL=url;localStorage.setItem(GAS_KEY,url);loadConfig();
  });
  $('gasUrl').addEventListener('keydown',e=>{if(e.key==='Enter')$('btnC').click();});
  $('btnR').addEventListener('click',loadConfig);
  $('btnS').addEventListener('click',saveConfig);
  window.addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue='';}});

  if(GAS_URL){loadConfig();}
  else{
    // preview vacio
    OFERTAS.forEach(o=>{
      cfg[o.kDias]=Array(7).fill('A');
      cfg[o.kIni]=Array(7).fill('');
      cfg[o.kCie]=Array(7).fill('');
      cfg[o.kMax]=[''];
    });
    cfg['OFERTA PROMOS ACTIVAS']=[1];
    cfg['jueves cervecero']=['A'];
    cfg['hora inicio cervecero']=['18:00'];
    cfg['hora cierre cervecero']=['22:00'];
    buildCards(); buildGlobales();
    setStatus('','Sin conectar — ingresá la URL del GAS');
  }
}
init();
</script>
