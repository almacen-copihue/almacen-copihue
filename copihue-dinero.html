<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Copihue · Dinero</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --verde:#2e7d32;--vd:#1b5e20;--vdp:#0a3d0f;--vl:#e8f5e9;
  --naranja:#f57c00;--nl:#fff3e0;
  --rojo:#c62828;--rl:#ffebee;
  --azul:#1565c0;--al:#e3f2fd;
  --morado:#6a1b9a;
  --gris:#546e7a;--bg:#f1f8f1;--borde:#c8e6c9;--texto:#1a2e1c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--texto);min-height:100dvh;padding-bottom:32px;font-size:16px}
@media(min-width:768px){body{font-size:18px}.mv{font-size:1.6rem!important}.mc{padding:16px!important}.sec{padding:16px!important}.bar-n{font-size:.9rem!important}.bar-v{font-size:.9rem!important}.egr-obs{font-size:.95rem!important}.tab{font-size:.85rem!important}.met-v{font-size:1.15rem!important}}
.hdr{background:linear-gradient(135deg,var(--vdp),var(--vd),var(--verde));padding:11px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(10,61,15,.4);position:sticky;top:0;z-index:100}
.hdr-icon{font-size:1.5rem}
.hdr-t{color:#fff;font-size:.95rem;font-weight:900}
.hdr-s{color:rgba(255,255,255,.7);font-size:.62rem;letter-spacing:2px;text-transform:uppercase}
.btn-back{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:20px;padding:5px 13px;font-size:.76rem;font-weight:700;cursor:pointer;font-family:inherit}
.wrap{padding:12px}
.tabs{display:flex;gap:5px;margin-bottom:14px;background:#fff;border-radius:14px;padding:5px;border:1px solid var(--borde)}
.tab{flex:1;padding:8px 4px;border:none;border-radius:10px;font-size:.73rem;font-weight:700;cursor:pointer;font-family:inherit;color:var(--gris);background:transparent;transition:all .15s;text-align:center}
.tab.activo{background:var(--vd);color:#fff;box-shadow:0 2px 6px rgba(27,94,32,.3)}
.periodo-nav{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:12px;padding:8px 12px;margin-bottom:8px;border:1px solid var(--borde)}
.periodo-nombre{font-size:.92rem;font-weight:900;color:var(--vd)}
.btn-nav{width:34px;height:34px;border:none;border-radius:50%;background:var(--verde);color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900}
.btn-hoy{width:100%;padding:8px;margin-bottom:12px;border:none;border-radius:12px;background:var(--naranja);color:#fff;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.mc{background:#fff;border-radius:14px;padding:13px;border:1px solid var(--borde)}
.mc.full{grid-column:1/-1}
.mc.vg{background:linear-gradient(135deg,#1b5e20,#2e7d32);border:none;color:#fff}
.mc.rg{background:linear-gradient(135deg,#b71c1c,#c62828);border:none;color:#fff}
.mc.ag{background:linear-gradient(135deg,#0d47a1,#1565c0);border:none;color:#fff}
.mc.ng{background:linear-gradient(135deg,#e65100,#f57c00);border:none;color:#fff}
.ml{font-size:.62rem;opacity:.8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.mv{font-size:1.35rem;font-weight:900;line-height:1}
.ms{font-size:.64rem;opacity:.75;margin-top:3px}
.mdelta{font-size:.65rem;font-weight:700;margin-top:4px;padding:2px 7px;border-radius:10px;display:inline-block;background:rgba(255,255,255,.2)}
.sec{background:#fff;border-radius:14px;border:1px solid var(--borde);padding:13px;margin-bottom:10px}
.sec-t{font-size:.68rem;font-weight:900;color:var(--gris);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.sec-t span{font-size:.72rem;font-weight:900;color:var(--verde)}
.bar-wrap{margin-bottom:8px}
.bar-hdr{display:flex;justify-content:space-between;margin-bottom:2px}
.bar-n{font-size:.78rem;font-weight:700}
.bar-v{font-size:.78rem;font-weight:900}
.bar-bg{height:6px;background:#f0f0f0;border-radius:3px}
.bar-f{height:6px;border-radius:3px}
.bv{background:linear-gradient(90deg,var(--vd),#66bb6a)}
.br{background:linear-gradient(90deg,var(--rojo),#ef5350)}
.ba{background:linear-gradient(90deg,var(--azul),#42a5f5)}
.bn{background:linear-gradient(90deg,var(--naranja),#ffb74d)}
.bm{background:linear-gradient(90deg,var(--morado),#ba68c8)}
.met-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.met-card{background:var(--vl);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--borde)}
.met-icon{font-size:1.3rem;margin-bottom:3px}
.met-v{font-size:1rem;font-weight:900;color:var(--vd)}
.met-l{font-size:.6rem;color:var(--gris);text-transform:uppercase;letter-spacing:.6px}
.met-p{font-size:.62rem;color:var(--naranja);font-weight:700}
.comp-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;margin:8px 0}
.ci{background:var(--verde)}
.ce{background:var(--rojo)}
.dia-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.dia-lbl{font-size:.7rem;font-weight:700;color:var(--gris);min-width:40px}
.dia-bg{flex:1;background:#f0f0f0;border-radius:4px;height:8px;overflow:hidden}
.dia-f{height:8px;border-radius:4px}
.dia-v{font-size:.7rem;font-weight:900;min-width:70px;text-align:right}
.pos{color:var(--verde)}
.neg{color:var(--rojo)}
.egr-item{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f5f5f5;gap:8px}
.egr-item:last-child{border-bottom:none}
.egr-obs{font-size:.8rem;font-weight:700}
.egr-meta{font-size:.63rem;color:#aaa;margin-top:2px}
.egr-mnt{font-weight:900;font-size:.9rem;color:var(--rojo);white-space:nowrap}
.badge{font-size:.58rem;font-weight:700;padding:2px 6px;border-radius:8px;white-space:nowrap;background:var(--rl);color:var(--rojo)}
.spin{width:30px;height:30px;border:3px solid var(--vl);border-top-color:var(--verde);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.ldg{text-align:center;padding:50px 20px;color:var(--gris)}
.empty{text-align:center;padding:24px;color:#bbb;font-size:.82rem}
.alert-r{background:var(--rl);color:var(--rojo);border:1px solid #ffcdd2;border-radius:12px;padding:10px 14px;margin-bottom:10px;font-size:.78rem;font-weight:700;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-icon">💰</div>
  <div><div class="hdr-t">Copihue · Dinero</div><div class="hdr-s">Panel financiero · <span id="versionTag">v1</span></div></div>
  <button class="btn-back" onclick="history.back()">← Volver</button>
</div>
<div class="wrap">
  <div class="tabs">
    <button class="tab activo" id="tab-resumen" onclick="setTab('resumen')">📊 Resumen</button>
    <button class="tab" id="tab-ingresos" onclick="setTab('ingresos')">📈 Ingresos</button>
    <button class="tab" id="tab-egresos" onclick="setTab('egresos')">📉 Egresos</button>
    <button class="tab" id="tab-flujo" onclick="setTab('flujo')">🔄 Flujo</button>
  </div>
  <div class="periodo-nav">
    <button class="btn-nav" onclick="cambiarMes(-1)">‹</button>
    <div style="text-align:center">
      <div class="periodo-nombre" id="pnombre">Cargando...</div>
      <div style="font-size:.6rem;color:var(--gris)">‹ › para cambiar mes</div>
    </div>
    <button class="btn-nav" onclick="cambiarMes(1)">›</button>
  </div>
  <button class="btn-hoy" onclick="irAHoy()">📅 Ir al mes actual</button>
  <div id="contenido"><div class="ldg"><div class="spin"></div>Cargando datos financieros...</div></div>
</div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbzWZzDvdGfW8vd2-FpQolT852cdPMeHbfKugn9DBOlju75bE1D0SUNB5EKEDOsI2vP4lA/exec';
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const fmt=n=>'$'+Math.round(n||0).toLocaleString('es-AR');
const fmtK=n=>n>=1000000?'$'+(n/1000000).toFixed(1)+'M':n>=1000?'$'+Math.round(n/1000)+'K':fmt(n);
const CATS_EMOJI={'SALUD':'💊','TRANSPORTE':'🚗','SUSCRIPCIONES':'📺','CELEBRACIONES':'🎉','MERCADO':'🛒','FAMILIA':'👨‍👩‍👧','NEGOCIO':'🏪','COMPRA GRANDE':'📦','PRESTAMO/AYUDA':'🤝','RETIRO DUEÑO':'💰'};
const CATS_CLS={'SALUD':'ba','TRANSPORTE':'bn','SUSCRIPCIONES':'bv','CELEBRACIONES':'br','MERCADO':'bm','FAMILIA':'bn','NEGOCIO':'bv','COMPRA GRANDE':'bm','PRESTAMO/AYUDA':'ba','RETIRO DUEÑO':'ba'};
let tabActiva='resumen',mesSel=new Date().getMonth(),anioSel=new Date().getFullYear();
let _caja=null,_egr=null,_cargando=false;

async function apiFetch(action,datos={}){
  const url=API_URL+'?action='+action+'&data='+encodeURIComponent(JSON.stringify(datos))+'&t='+Date.now();
  const r=await fetch(url,{redirect:'follow',signal:AbortSignal.timeout(20000)});
  return r.json();
}
async function cargarDatos(){
  if(_cargando)return;
  _cargando=true; _caja=null; _egr=null;
  document.getElementById('contenido').innerHTML='<div class="ldg"><div class="spin"></div>Cargando datos...</div>';
  try{
    const[rc,re]=await Promise.all([apiFetch('getCajaDiaria',{limite:1000}),apiFetch('getCajaEgresos',{limite:2000})]);
    _caja=rc.ok?rc.registros:[];
    _egr=re.ok?re.registros:[];
  }catch(e){
    document.getElementById('contenido').innerHTML=`<div style="text-align:center;padding:40px 20px"><div style="font-size:2rem">❌</div><div style="color:var(--rojo);font-weight:700;margin:8px 0">No se pudo cargar</div><div style="color:var(--gris);font-size:.78rem;margin-bottom:14px">${e.message}</div><button onclick="cargarDatos()" style="background:var(--verde);color:#fff;border:none;border-radius:12px;padding:10px 20px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit">🔄 Reintentar</button></div>`;
    _cargando=false; return;
  }
  _cargando=false; renderTab();
}
function parseFecha(s){
  if(!s)return null;
  if(s instanceof Date)return s;
  // yyyy-MM-dd — el formato que devuelve el GAS
  const m1=String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m1)return new Date(parseInt(m1[1]),parseInt(m1[2])-1,parseInt(m1[3]));
  // DD/MM/YYYY
  const m2=String(s).match(/^(\d{2})\/(\d{2})\/(\d{4})/);
  if(m2)return new Date(parseInt(m2[3]),parseInt(m2[2])-1,parseInt(m2[1]));
  return new Date(s);
}
function esMes(f,m,a){const d=parseFecha(f);return d&&d.getMonth()===m&&d.getFullYear()===a;}
function getCajaMes(m=mesSel,a=anioSel){return(_caja||[]).filter(r=>esMes(r.fecha,m,a));}
function getEgrMes(m=mesSel,a=anioSel){return(_egr||[]).filter(r=>esMes(r.fecha,m,a));}
function getMesAnt(){let m=mesSel-1,a=anioSel;if(m<0){m=11;a--;}return{m,a};}
function deltaTxt(actual,anterior,inv=false){
  if(!anterior)return'';
  const p=((actual-anterior)/anterior*100).toFixed(1);
  const ok=inv?parseFloat(p)<0:parseFloat(p)>0;
  return`<span class="mdelta">${parseFloat(p)>0?'▲':'▼'} ${Math.abs(p)}% vs mes ant.</span>`;
}
function agruparCats(egrs){
  const r={};egrs.forEach(e=>{const c=(e.categoria||'SIN CAT').trim().toUpperCase();r[c]=(r[c]||0)+(e.monto||0);});return r;
}
function renderTab(){
  document.getElementById('pnombre').textContent=MESES[mesSel]+' '+anioSel;
  if(!_caja){document.getElementById('contenido').innerHTML='<div class="ldg"><div class="spin"></div>Cargando...</div>';return;}
  if(tabActiva==='resumen')renderResumen();
  else if(tabActiva==='ingresos')renderIngresos();
  else if(tabActiva==='egresos')renderEgresos();
  else renderFlujo();
}

function renderResumen(){
  const caja=getCajaMes(),egrs=getEgrMes();
  const{m,a}=getMesAnt();
  const cajaA=getCajaMes(m,a),egrsA=getEgrMes(m,a);
  const ti=caja.reduce((s,r)=>s+r.total,0);
  const te=egrs.reduce((s,r)=>s+r.monto,0);
  const neto=ti-te;
  const tix=caja.reduce((s,r)=>s+r.tickets,0);
  const tiA=cajaA.reduce((s,r)=>s+r.total,0);
  const teA=egrsA.reduce((s,r)=>s+r.monto,0);
  const ef=caja.reduce((s,r)=>s+r.efectivo,0);
  const po=caja.reduce((s,r)=>s+r.posnet,0);
  const tr=caja.reduce((s,r)=>s+r.transferencia,0);
  const fi=caja.reduce((s,r)=>s+r.fiado,0);
  const cats=agruparCats(egrs);
  const topCat=Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];
  const pctIng=ti+te>0?Math.round(ti/(ti+te)*100):50;
  let h='';
  h+=`<div class="metrics-grid"><div class="mc ${neto>=0?'vg':'rg'} full"><div class="ml">${neto>=0?'✅':'⚠️'} Resultado del mes</div><div class="mv">${fmtK(Math.abs(neto))}</div><div class="ms">${neto>=0?'Superávit — ingresó más de lo que salió':'Déficit — salió más de lo que ingresó'}</div></div>
  <div class="mc vg"><div class="ml">📈 Ingresos</div><div class="mv">${fmtK(ti)}</div>${deltaTxt(ti,tiA)}<div class="ms">${tix} tickets</div></div>
  <div class="mc rg"><div class="ml">📉 Egresos</div><div class="mv">${fmtK(te)}</div>${deltaTxt(te,teA,true)}<div class="ms">${egrs.length} mov.</div></div></div>`;
  h+=`<div class="sec"><div class="sec-t">📊 Ingresos vs Egresos</div>
  <div style="display:flex;justify-content:space-between;font-size:.72rem;font-weight:700;margin-bottom:5px"><span class="pos">Ingresos ${pctIng}%</span><span class="neg">Egresos ${100-pctIng}%</span></div>
  <div class="comp-bar"><div class="ci" style="width:${pctIng}%"></div><div class="ce" style="width:${100-pctIng}%"></div></div>
  <div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--gris);margin-top:4px"><span>${fmt(ti)}</span><span>${fmt(te)}</span></div></div>`;
  h+=`<div class="sec"><div class="sec-t">💳 Métodos de cobro</div><div class="met-grid">
  <div class="met-card"><div class="met-icon">💵</div><div class="met-v">${fmtK(ef)}</div><div class="met-l">Efectivo</div><div class="met-p">${ti?Math.round(ef/ti*100):0}%</div></div>
  <div class="met-card"><div class="met-icon">💳</div><div class="met-v">${fmtK(po)}</div><div class="met-l">Posnet</div><div class="met-p">${ti?Math.round(po/ti*100):0}%</div></div>
  <div class="met-card"><div class="met-icon">📲</div><div class="met-v">${fmtK(tr)}</div><div class="met-l">Transferencia</div><div class="met-p">${ti?Math.round(tr/ti*100):0}%</div></div>
  <div class="met-card"><div class="met-icon">📋</div><div class="met-v">${fmtK(fi)}</div><div class="met-l">Fiado</div><div class="met-p">${ti?Math.round(fi/ti*100):0}%</div></div></div></div>`;
  if(topCat){const pct=te?Math.round(topCat[1]/te*100):0;h+=`<div class="alert-r" onclick="abrirDetalleCat('${topCat[0]}')" style="cursor:pointer"><span style="font-size:1.3rem">${CATS_EMOJI[topCat[0]]||'💸'}</span><div><div>Mayor egreso: <strong>${topCat[0]}</strong> ›</div><div style="font-size:.7rem;opacity:.8">${fmt(topCat[1])} · ${pct}% del total</div></div></div>`;}
  document.getElementById('contenido').innerHTML=h;
}

function renderIngresos(){
  const caja=getCajaMes();
  const{m,a}=getMesAnt();const cajaA=getCajaMes(m,a);
  const ti=caja.reduce((s,r)=>s+r.total,0);
  const tix=caja.reduce((s,r)=>s+r.tickets,0);
  const tiA=cajaA.reduce((s,r)=>s+r.total,0);
  const ef=caja.reduce((s,r)=>s+r.efectivo,0);
  const po=caja.reduce((s,r)=>s+r.posnet,0);
  const tr=caja.reduce((s,r)=>s+r.transferencia,0);
  const fi=caja.reduce((s,r)=>s+r.fiado,0);
  const dias=caja.length;
  let h='';
  h+=`<div class="metrics-grid"><div class="mc vg full"><div class="ml">📈 Ingresos del mes</div><div class="mv">${fmtK(ti)}</div>${deltaTxt(ti,tiA)}<div class="ms">${dias} días · ${tix} tickets · prom/tkt ${fmt(tix?ti/tix:0)}</div></div>
  <div class="mc"><div class="ml" style="color:var(--gris)">📅 Prom. diario</div><div style="font-size:1.2rem;font-weight:900;color:var(--vd)">${dias?fmtK(ti/dias):'$0'}</div></div>
  <div class="mc"><div class="ml" style="color:var(--gris)">🎫 Prom. ticket</div><div style="font-size:1.2rem;font-weight:900;color:var(--vd)">${fmt(tix?ti/tix:0)}</div></div></div>`;
  const maxM2=Math.max(ef,po,tr,fi,1);
  h+=`<div class="sec"><div class="sec-t">💳 Desglose métodos</div>`;
  [{n:'💵 Efectivo',v:ef,c:'bv'},{n:'💳 Posnet',v:po,c:'ba'},{n:'📲 Transfer',v:tr,c:'bn'},{n:'📋 Fiado',v:fi,c:'bm'}].forEach(x=>{
    const p=Math.round(x.v/maxM2*100),pt=ti?Math.round(x.v/ti*100):0;
    h+=`<div class="bar-wrap"><div class="bar-hdr"><div class="bar-n">${x.n}</div><div class="bar-v pos">${fmt(x.v)} <span style="font-size:.6rem;color:var(--gris)">${pt}%</span></div></div><div class="bar-bg"><div class="bar-f ${x.c}" style="width:${p}%"></div></div></div>`;
  });
  h+=`</div>`;
  const topDias=[...caja].sort((a,b)=>b.total-a.total).slice(0,10);
  const maxD=topDias[0]?.total||1;
  h+=`<div class="sec"><div class="sec-t">🏆 Top 10 días</div>`;
  topDias.forEach(d=>{
    const f=parseFecha(d.fecha);const l=f?String(f.getDate()).padStart(2,'0')+'/'+String(f.getMonth()+1).padStart(2,'0'):d.fecha;
    const p=Math.round(d.total/maxD*100);
    h+=`<div class="dia-row"><div class="dia-lbl">${l}</div><div class="dia-bg"><div class="dia-f bv" style="width:${p}%"></div></div><div class="dia-v pos">${fmt(d.total)}</div></div>`;
  });
  h+=`</div>`;
  const m3=[2,1,0].map(d=>{let m2=mesSel-d,a2=anioSel;if(m2<0){m2+=12;a2--;}const tot=(_caja||[]).filter(r=>{const f=parseFecha(r.fecha);return f&&f.getMonth()===m2&&f.getFullYear()===a2;}).reduce((s,r)=>s+r.total,0);return{l:MESES[m2].slice(0,3),total:tot};});
  const maxM3=Math.max(...m3.map(x=>x.total),1);
  h+=`<div class="sec"><div class="sec-t">📈 Últimos 3 meses</div>`;
  m3.forEach(x=>{const p=Math.round(x.total/maxM3*100);h+=`<div class="dia-row"><div class="dia-lbl">${x.l}</div><div class="dia-bg"><div class="dia-f bv" style="width:${p}%"></div></div><div class="dia-v pos">${fmtK(x.total)}</div></div>`;});
  h+=`</div>`;
  document.getElementById('contenido').innerHTML=h;
}

function renderEgresos(){
  const egrs=getEgrMes();
  const{m,a}=getMesAnt();const egrsA=getEgrMes(m,a);
  const te=egrs.reduce((s,r)=>s+r.monto,0);
  const teA=egrsA.reduce((s,r)=>s+r.monto,0);
  const cats=Object.entries(agruparCats(egrs)).sort((a,b)=>b[1]-a[1]);
  const maxC=cats[0]?.[1]||1;
  let h='';
  h+=`<div class="mc rg full" style="border-radius:14px;padding:13px;margin-bottom:10px"><div class="ml">📉 Total egresos del mes</div><div class="mv">${fmtK(te)}</div>${deltaTxt(te,teA,true)}<div class="ms">${egrs.length} movimientos · prom ${fmt(egrs.length?te/egrs.length:0)} c/u</div></div>`;
  h+=`<div class="sec"><div class="sec-t">🏷️ Por categoría</div>`;
  if(!cats.length){h+='<div class="empty">Sin egresos este mes</div>';}
  else cats.forEach(([cat,monto])=>{
    const p=Math.round(monto/maxC*100),pt=te?Math.round(monto/te*100):0;
    const c=CATS_CLS[cat]||'br';
    h+=`<div class="bar-wrap" onclick="abrirDetalleCat('${cat}')" style="cursor:pointer;padding:6px 8px;border-radius:10px;transition:background .12s;margin-bottom:6px" onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background=''"><div class="bar-hdr"><div class="bar-n">${CATS_EMOJI[cat]||'💸'} ${cat}</div><div class="bar-v neg">${fmt(monto)} <span style="font-size:.6rem;color:var(--gris)">${pt}% ›</span></div></div><div class="bar-bg"><div class="bar-f ${c}" style="width:${p}%"></div></div></div>`;
  });
  h+=`</div>`;
  const sorted=[...egrs].sort((a,b)=>b.monto-a.monto);
  h+=`<div class="sec"><div class="sec-t">📋 Movimientos <span>${egrs.length}</span></div>`;
  if(!sorted.length){h+='<div class="empty">Sin egresos registrados este mes</div>';}
  else sorted.forEach(e=>{
    const cat=(e.categoria||'').trim().toUpperCase();
    h+=`<div class="egr-item"><div style="flex:1;min-width:0"><div class="egr-obs">${e.obs||e.motivo||'—'}</div><div class="egr-meta"><span class="badge">${CATS_EMOJI[cat]||''} ${cat}</span> · ${e.motivo||''} · ${e.fecha||''}</div></div><div class="egr-mnt">−${fmt(e.monto)}</div></div>`;
  });
  h+=`</div>`;
  document.getElementById('contenido').innerHTML=h;
}

function renderFlujo(){
  const caja=getCajaMes(),egrs=getEgrMes();
  const egrsXF={};egrs.forEach(e=>{const f=e.fecha||'';egrsXF[f]=(egrsXF[f]||0)+e.monto;});
  const fechas=[...new Set([...caja.map(r=>r.fecha),...Object.keys(egrsXF)])].sort().reverse();
  const maxV=Math.max(...fechas.map(f=>{const i=(caja.find(r=>r.fecha===f)||{}).total||0;return Math.max(i,egrsXF[f]||0);}),1);
  const ti=caja.reduce((s,r)=>s+r.total,0);
  const te=egrs.reduce((s,r)=>s+r.monto,0);
  const neto=ti-te;
  let h='';
  h+=`<div class="metrics-grid"><div class="mc vg"><div class="ml">📈 Ingresos</div><div class="mv">${fmtK(ti)}</div></div>
  <div class="mc rg"><div class="ml">📉 Egresos</div><div class="mv">${fmtK(te)}</div></div>
  <div class="mc ${neto>=0?'vg':'rg'} full"><div class="ml">${neto>=0?'✅':'⚠️'} Neto del mes</div><div class="mv">${neto>=0?'+':''}${fmtK(neto)}</div><div class="ms">${neto>=0?'El negocio generó más de lo que gastó':'Los egresos superaron los ingresos'}</div></div></div>`;
  h+=`<div class="sec"><div class="sec-t">📅 Flujo día a día</div>`;
  if(!fechas.length){h+='<div class="empty">Sin datos este mes</div>';}
  else fechas.forEach(f=>{
    const d=parseFecha(f);const l=d?String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'):f;
    const ing=(caja.find(r=>r.fecha===f)||{}).total||0;
    const egr=egrsXF[f]||0;
    const n=ing-egr;
    const pi=Math.round(ing/maxV*100),pe=Math.round(egr/maxV*100);
    h+=`<div style="margin-bottom:9px;padding:8px;background:${n>=0?'#f9fdf9':'#fff9f9'};border-radius:10px;border:1px solid ${n>=0?'var(--borde)':'#ffcdd2'}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
      <span style="font-size:.75rem;font-weight:900">${l}</span>
      <span style="font-size:.75rem;font-weight:900;color:${n>=0?'var(--verde)':'var(--rojo)'}">${n>=0?'+':''}${fmt(n)}</span>
    </div>
    ${ing>0?`<div class="dia-row" style="margin-bottom:2px"><div style="font-size:.62rem;min-width:20px">📈</div><div class="dia-bg"><div class="dia-f bv" style="width:${pi}%"></div></div><div class="dia-v pos" style="font-size:.7rem">${fmt(ing)}</div></div>`:''}
    ${egr>0?`<div class="dia-row"><div style="font-size:.62rem;min-width:20px">📉</div><div class="dia-bg"><div class="dia-f br" style="width:${pe}%"></div></div><div class="dia-v neg" style="font-size:.7rem">${fmt(egr)}</div></div>`:''}
    </div>`;
  });
  h+=`</div>`;
  document.getElementById('contenido').innerHTML=h;
}

function setTab(tab){
  tabActiva=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('activo'));
  document.getElementById('tab-'+tab).classList.add('activo');
  renderTab();
}
function cambiarMes(d){mesSel+=d;if(mesSel<0){mesSel=11;anioSel--;}if(mesSel>11){mesSel=0;anioSel++;}renderTab();}
function irAHoy(){mesSel=new Date().getMonth();anioSel=new Date().getFullYear();renderTab();}
// ─── VERSIÓN ─────────────────────────────────────────────────────────────────
(function(){
  const KEY='copihue_dinero_visits';
  const v=(parseInt(localStorage.getItem(KEY)||'0')+1);
  localStorage.setItem(KEY,v);
  document.getElementById('versionTag').textContent='v'+v;
})();

// ─── MODAL DETALLE CATEGORÍA ─────────────────────────────────────────────────
function abrirDetalleCat(cat){
  const egrs=getEgrMes();
  const items=egrs.filter(e=>(e.categoria||'').trim().toUpperCase()===cat).sort((a,b)=>b.monto-a.monto);
  const total=items.reduce((s,e)=>s+e.monto,0);
  let h=`<div id="modal-cat" onclick="cerrarDetalleCat(event)" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:flex-end;justify-content:center">
  <div onclick="event.stopPropagation()" style="background:#fff;border-radius:20px 20px 0 0;padding:16px;width:100%;max-width:600px;max-height:80vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div>
        <div style="font-size:1rem;font-weight:900;color:var(--texto)">${CATS_EMOJI[cat]||'💸'} ${cat}</div>
        <div style="font-size:.72rem;color:var(--gris)">${items.length} movimientos · Total ${fmt(total)}</div>
      </div>
      <button onclick="cerrarDetalleCat()" style="background:var(--rl);border:none;border-radius:50%;width:32px;height:32px;font-size:1.1rem;cursor:pointer;color:var(--rojo)">✕</button>
    </div>`;
  if(!items.length){h+='<div class="empty">Sin movimientos en esta categoría</div>';}
  else items.forEach(e=>{
    h+=`<div class="egr-item">
      <div style="flex:1;min-width:0">
        <div class="egr-obs">${e.obs||e.motivo||'—'}</div>
        <div class="egr-meta">${e.motivo||''} · ${e.fecha||''}</div>
      </div>
      <div class="egr-mnt">−${fmt(e.monto)}</div>
    </div>`;
  });
  h+=`</div></div>`;
  const div=document.createElement('div');div.id='modal-cat-wrap';div.innerHTML=h;
  document.body.appendChild(div);
}
function cerrarDetalleCat(e){
  if(e&&e.target.id!=='modal-cat')return;
  const el=document.getElementById('modal-cat-wrap');if(el)el.remove();
}

// ─── SWIPE PARA CAMBIAR MES ───────────────────────────────────────────────────
(function(){
  let x0=null,y0=null;
  const el=document.body;
  el.addEventListener('touchstart',e=>{
    x0=e.touches[0].clientX;
    y0=e.touches[0].clientY;
  },{passive:true});
  el.addEventListener('touchend',e=>{
    if(x0===null)return;
    const dx=e.changedTouches[0].clientX-x0;
    const dy=e.changedTouches[0].clientY-y0;
    // Solo swipe horizontal (dx mayor que dy)
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
      cambiarMes(dx<0?1:-1);
    }
    x0=null;y0=null;
  },{passive:true});
})();

cargarDatos();
</script>
