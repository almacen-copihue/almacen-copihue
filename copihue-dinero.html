<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copihue Dinero</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0f0c;--surface:#161713;--surface2:#1e1f1b;--border:#2a2b27;--green:#b8f263;--red:#f26363;--amber:#f2c063;--blue:#63b8f2;--purple:#c063f2;--text:#e8e9e4;--muted:#7a7b76;--dim:#4a4b46;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;min-height:100vh;}
.header{border-bottom:1px solid var(--border);padding:20px 28px 16px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;}
.header h1{font-family:'DM Serif Display',serif;font-size:38px;line-height:1;color:var(--green);letter-spacing:-1px;}
.header h1 span{font-style:italic;color:var(--text);}
.header-sub{color:var(--muted);font-size:10px;margin-top:4px;letter-spacing:2px;text-transform:uppercase;}
.header-right{text-align:right;color:var(--muted);font-size:11px;line-height:2;}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 28px;gap:2px;overflow-x:auto;}
.tab{padding:11px 18px;cursor:pointer;color:var(--muted);font-size:11px;letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'IBM Plex Mono',monospace;}
.tab:hover{color:var(--text);}.tab.active{color:var(--green);border-bottom-color:var(--green);}
.panel{display:none;padding:24px 28px;}.panel.active{display:block;}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{color:var(--muted);font-size:12px;letter-spacing:1px;}
.error-box{background:rgba(242,99,99,.08);border:1px solid rgba(242,99,99,.3);border-radius:6px;padding:20px;color:var(--red);font-size:12px;line-height:1.8;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-bottom:24px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px 18px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.green::before{background:var(--green);}.kpi.red::before{background:var(--red);}
.kpi.amber::before{background:var(--amber);}.kpi.blue::before{background:var(--blue);}.kpi.purple::before{background:var(--purple);}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:7px;}
.kpi-value{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1;letter-spacing:-.5px;}
.kpi-value.green{color:var(--green);}.kpi-value.red{color:var(--red);}.kpi-value.amber{color:var(--amber);}.kpi-value.blue{color:var(--blue);}.kpi-value.purple{color:var(--purple);}
.kpi-sub{margin-top:5px;font-size:11px;color:var(--muted);}
.section-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px;}
@media(max-width:800px){.grid-2{grid-template-columns:1fr;}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:18px;margin-bottom:18px;}
.card:last-child{margin-bottom:0;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.bar-label{width:130px;font-size:11px;color:var(--muted);text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:16px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.25,1,.5,1);}
.bar-val{width:110px;font-size:11px;text-align:right;flex-shrink:0;}
.table-wrap{max-height:420px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;}
.table-wrap::-webkit-scrollbar{width:4px;}.table-wrap::-webkit-scrollbar-thumb{background:var(--border);}
.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table th{text-align:left;padding:8px 12px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border);font-weight:600;position:sticky;top:0;background:var(--surface);}
.data-table td{padding:8px 12px;border-bottom:1px solid var(--border);}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:var(--surface2);}
.data-table td.num{text-align:right;font-family:'IBM Plex Mono',monospace;color:var(--green);}
.data-table td.neg{text-align:right;font-family:'IBM Plex Mono',monospace;color:var(--red);}
.data-table td.dim{color:var(--muted);font-size:11px;}
.badge{display:inline-block;padding:2px 7px;border-radius:2px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.donut-wrap{display:flex;align-items:center;gap:20px;margin-top:10px;}
.donut-legend{flex:1;}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12px;}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.legend-name{color:var(--text);flex:1;}.legend-pct{color:var(--muted);font-size:11px;}
.refresh-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 14px;border-radius:3px;cursor:pointer;letter-spacing:1px;transition:all .15s;}
.refresh-btn:hover{color:var(--text);border-color:var(--dim);}.refresh-btn.spin{color:var(--green);border-color:var(--green);}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.stat-row:last-child{border-bottom:none;}.stat-row-label{color:var(--muted);font-size:12px;}
.ticker{background:var(--surface2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:7px 28px;overflow:hidden;white-space:nowrap;font-size:11px;color:var(--muted);letter-spacing:1px;}
.ticker-inner{display:inline-block;animation:ticker 50s linear infinite;}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tick-item{margin-right:48px;}
.period-bar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.period-btn{padding:5px 12px;border:1px solid var(--border);border-radius:3px;background:var(--surface);color:var(--muted);font-size:11px;font-family:'IBM Plex Mono',monospace;cursor:pointer;transition:all .15s;}
.period-btn:hover{color:var(--text);}.period-btn.active{background:var(--green);color:var(--bg);border-color:var(--green);}
.pos{color:var(--green);}.neg-c{color:var(--red);}.amb{color:var(--amber);}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>Copihue <span>Dinero</span></h1>
    <div class="header-sub">Almacén Copihue &middot; Bariloche &middot; Panel en Vivo</div>
  </div>
  <div class="header-right">
    <div id="ts">Conectando&hellip;</div>
    <button class="refresh-btn" id="rbtn" onclick="load()">&#8635; Actualizar</button>
  </div>
</div>
<div class="ticker"><div class="ticker-inner" id="ticker">Cargando&hellip;</div></div>
<div class="tabs">
  <button class="tab active" onclick="go('resumen',this)">Resumen</button>
  <button class="tab" onclick="go('ventas',this)">Ventas</button>
  <button class="tab" onclick="go('productos',this)">Productos</button>
  <button class="tab" onclick="go('egresos',this)">Egresos</button>
  <button class="tab" onclick="go('consumos',this)">Consumos</button>
  <button class="tab" onclick="go('diario',this)">Diario</button>
</div>
<div id="panel-resumen" class="panel active"><div class="loading-wrap" id="ld-resumen"><div class="spinner"></div><div class="loading-text">Cargando datos&hellip;</div></div><div id="ct-resumen" style="display:none"></div></div>
<div id="panel-ventas" class="panel"><div class="loading-wrap" id="ld-ventas" style="display:none"><div class="spinner"></div><div class="loading-text">Procesando ventas&hellip;</div></div><div id="ct-ventas"></div></div>
<div id="panel-productos" class="panel"><div class="loading-wrap" id="ld-productos" style="display:none"><div class="spinner"></div><div class="loading-text">Calculando ranking&hellip;</div></div><div id="ct-productos"></div></div>
<div id="panel-egresos" class="panel"><div class="loading-wrap" id="ld-egresos" style="display:none"><div class="spinner"></div><div class="loading-text">Cargando egresos&hellip;</div></div><div id="ct-egresos"></div></div>
<div id="panel-consumos" class="panel"><div class="loading-wrap" id="ld-consumos" style="display:none"><div class="spinner"></div><div class="loading-text">Cargando consumos&hellip;</div></div><div id="ct-consumos"></div></div>
<div id="panel-diario" class="panel"><div class="loading-wrap" id="ld-diario" style="display:none"><div class="spinner"></div><div class="loading-text">Cargando caja&hellip;</div></div><div id="ct-diario"></div></div>
<script>
const API='https://script.google.com/macros/s/AKfycbxhKFk2WAi-KRY5xGBsI6_6Pvp3jDjt8mSRXvy7I1WehNmBpJamqK9G9Q1ZJSCSgAdfDA/exec';
const MN={'01':'Ene','02':'Feb','03':'Mar','04':'Abr','05':'May','06':'Jun','07':'Jul','08':'Ago','09':'Sep','10':'Oct','11':'Nov','12':'Dic'};
let D={rep:null,caja:null,eg:null,sal:null};

async function api(action,p={}){
  const q=new URLSearchParams({action,...p});
  const r=await fetch(API+'?'+q);
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

async function load(){
  const b=document.getElementById('rbtn');
  b.classList.add('spin');b.textContent='Actualizando…';
  sl('resumen');
  try{
    const[rep,caja,eg,sal]=await Promise.all([
      api('getReportes'),api('getCajaDiaria',{limite:500}),
      api('getCajaEgresos',{limite:500}),api('getSalidasInternas',{limite:500})
    ]);
    D={rep,caja,eg,sal};
    document.getElementById('ts').textContent='Actualizado: '+new Date().toLocaleTimeString('es-AR');
    renderAll();
  }catch(e){
    sc('resumen','<div class="error-box">⚠️ '+e.message+'<br><br>Verificá que el script esté publicado como Web App con acceso "Cualquier persona".</div>');
  }
  b.classList.remove('spin');b.textContent='↻ Actualizar';
}

const f=n=>'$'+Math.round(n).toLocaleString('es-AR');
const fk=n=>n>=1e6?'$'+(n/1e6).toFixed(1)+'M':n>=1e3?'$'+(n/1e3).toFixed(0)+'K':f(n);
function sl(t){const l=document.getElementById('ld-'+t),c=document.getElementById('ct-'+t);if(l)l.style.display='flex';if(c)c.style.display='none';}
function sc(t,h){const l=document.getElementById('ld-'+t),c=document.getElementById('ct-'+t);if(l)l.style.display='none';if(c){c.innerHTML=h;c.style.display='block';}}
function go(n,b){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  if(b)b.classList.add('active');
  document.getElementById('panel-'+n).classList.add('active');
}
function renderAll(){rResumen();rVentas('todos');rProductos();rEgresos();rConsumos();rDiario('todos');rTicker();}

function rTicker(){
  const c=D.caja?.registros||[],eg=D.eg?.registros||[];
  const tot=c.reduce((s,r)=>s+r.total,0),ef=c.reduce((s,r)=>s+r.efectivo,0);
  const tr=c.reduce((s,r)=>s+r.transferencia,0),pos=c.reduce((s,r)=>s+r.posnet,0);
  const fi=c.reduce((s,r)=>s+r.fiado,0),tk=c.reduce((s,r)=>s+r.tickets,0);
  const egT=eg.reduce((s,r)=>s+r.monto,0);
  const items=[
    ['VENTAS',fk(tot),'var(--green)'],['DÍAS',c.length,'var(--text)'],
    ['PROM/DÍA',c.length?fk(tot/c.length):'-','var(--green)'],
    ['TICKETS',tk,'var(--text)'],['TICKET PROM',tk?f(tot/tk):'-','var(--blue)'],
    ['EFECTIVO',fk(ef),'var(--green)'],['TRANSFER.',fk(tr),'var(--blue)'],
    ['POSNET',fk(pos),'var(--amber)'],['FIADO',fk(fi),'var(--purple)'],
    ['EGRESOS',fk(egT),'var(--red)']
  ];
  const h=[...items,...items].map(([l,v,c])=>'<span class="tick-item">'+l+' <span style="color:'+c+'">'+v+'</span></span>').join('');
  document.getElementById('ticker').innerHTML=h;
}

function donut(data,total,cl,cs){
  const R=46,cx=60,cy=60,sw=18,circ=2*Math.PI*R;let off=0;
  const segs=data.map(d=>{const dash=(total>0?d.v/total:0)*circ,doff=circ-off;off+=dash;
    return'<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="none" stroke="'+d.c+'" stroke-width="'+sw+'" stroke-dasharray="'+dash.toFixed(2)+' '+(circ-dash).toFixed(2)+'" stroke-dashoffset="'+doff.toFixed(2)+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
  }).join('');
  return'<svg width="120" height="120" viewBox="0 0 120 120" style="flex-shrink:0">'+segs+'<text x="'+cx+'" y="56" text-anchor="middle" fill="var(--text)" font-size="12" font-family="Syne,sans-serif" font-weight="800">'+cl+'</text><text x="'+cx+'" y="70" text-anchor="middle" fill="var(--muted)" font-size="9" font-family="IBM Plex Mono,monospace">'+cs+'</text></svg>';
}

function bars(arr,maxV,clr){
  return arr.map((p,i)=>'<div class="bar-row"><div class="bar-label" title="'+p.l+'">'+( i<9?'0'+(i+1):''+( i+1))+'. '+p.l.slice(0,22)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+((maxV>0?p.v/maxV:0)*100).toFixed(1)+'%;background:'+clr+'"></div></div><div class="bar-val" style="color:'+clr+'">'+p.d+'</div></div>').join('');
}

function rResumen(){
  const c=D.caja?.registros||[],eg=D.eg?.registros||[],sal=D.sal?.registros||[];
  if(!c.length){sc('resumen','<div class="error-box">Sin datos en la hoja "Caja".</div>');return;}
  const tot=c.reduce((s,r)=>s+r.total,0),ef=c.reduce((s,r)=>s+r.efectivo,0);
  const tr=c.reduce((s,r)=>s+r.transferencia,0),pos=c.reduce((s,r)=>s+r.posnet,0);
  const fi=c.reduce((s,r)=>s+r.fiado,0),tk=c.reduce((s,r)=>s+r.tickets,0);
  const egT=eg.reduce((s,r)=>s+r.monto,0),salT=sal.reduce((s,r)=>s+(r.precio||0)*r.cantidad,0);
  const best=c.reduce((a,b)=>b.total>a.total?b:a,c[0]);
  const worst=c.reduce((a,b)=>b.total<a.total?b:a,c[0]);
  const dd=[{l:'Efectivo',v:ef,c:'var(--green)'},{l:'Transfer.',v:tr,c:'var(--blue)'},{l:'Posnet',v:pos,c:'var(--amber)'},{l:'Fiado',v:fi,c:'var(--purple)'}].filter(d=>d.v>0);
  const pm={};c.forEach(r=>{const m=r.fecha.slice(0,7);pm[m]=(pm[m]||0)+r.total;});
  const mes=Object.entries(pm).sort((a,b)=>a[0].localeCompare(b[0])),mesMax=mes.length?Math.max(...mes.map(m=>m[1])):1;
  const mesBars=mes.map(([k,v])=>{const[y,m]=k.split('-');return'<div class="bar-row"><div class="bar-label">'+(MN[m]||m)+' '+y+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(v/mesMax*100).toFixed(1)+'%;background:var(--green)"></div></div><div class="bar-val pos">'+fk(v)+'</div></div>';}).join('');
  sc('resumen','<div class="kpi-grid"><div class="kpi green"><div class="kpi-label">Ventas Totales</div><div class="kpi-value green">'+fk(tot)+'</div><div class="kpi-sub">'+c.length+' días registrados</div></div><div class="kpi green"><div class="kpi-label">Promedio Diario</div><div class="kpi-value green">'+fk(tot/c.length)+'</div><div class="kpi-sub">'+tk+' tickets totales</div></div><div class="kpi blue"><div class="kpi-label">Ticket Promedio</div><div class="kpi-value blue">'+( tk?f(tot/tk):'-')+'</div><div class="kpi-sub">'+( c.length?(tk/c.length).toFixed(1):'-')+' tickets/día</div></div><div class="kpi red"><div class="kpi-label">Egresos de Caja</div><div class="kpi-value red">'+fk(egT)+'</div><div class="kpi-sub">'+eg.length+' movimientos</div></div><div class="kpi amber"><div class="kpi-label">Consumo Interno</div><div class="kpi-value amber">'+fk(salT)+'</div><div class="kpi-sub">'+sal.length+' registros</div></div><div class="kpi purple"><div class="kpi-label">Fiado Total</div><div class="kpi-value purple">'+fk(fi)+'</div><div class="kpi-sub">'+( tot?((fi/tot)*100).toFixed(1):'0')+'% de ventas</div></div></div><div class="grid-2"><div class="card"><div class="section-title">Métodos de Pago</div><div class="donut-wrap">'+donut(dd,tot,fk(tot),'TOTAL')+'<div class="donut-legend">'+dd.map(d=>'<div class="legend-item"><div class="legend-dot" style="background:'+d.c+'"></div><div class="legend-name">'+d.l+'</div><div class="legend-pct">'+( tot?((d.v/tot)*100).toFixed(1):'0')+'% &middot; '+fk(d.v)+'</div></div>').join('')+'</div></div></div><div class="card"><div class="section-title">Ventas por Mes</div>'+mesBars+'</div></div><div class="card"><div class="section-title">Datos Clave</div><div class="grid-2" style="margin-bottom:0"><div><div class="stat-row"><span class="stat-row-label">Mejor día</span><span class="pos">'+f(best.total)+' &mdash; '+best.fecha+'</span></div><div class="stat-row"><span class="stat-row-label">Peor día</span><span class="neg-c">'+f(worst.total)+' &mdash; '+worst.fecha+'</span></div><div class="stat-row"><span class="stat-row-label">Días &gt; $200K</span><span>'+c.filter(r=>r.total>=200000).length+' días</span></div><div class="stat-row"><span class="stat-row-label">Días &lt; $100K</span><span class="neg-c">'+c.filter(r=>r.total<100000).length+' días</span></div></div><div><div class="stat-row"><span class="stat-row-label">Egresos / Ventas</span><span class="neg-c">'+( tot?((egT/tot)*100).toFixed(1):'0')+'%</span></div><div class="stat-row"><span class="stat-row-label">Egresos / Efectivo</span><span class="neg-c">'+( ef?((egT/ef)*100).toFixed(1):'0')+'%</span></div><div class="stat-row"><span class="stat-row-label">% Efectivo</span><span>'+( tot?((ef/tot)*100).toFixed(1):'0')+'%</span></div><div class="stat-row"><span class="stat-row-label">% Digital</span><span class="pos">'+( tot?(((tr+pos)/tot)*100).toFixed(1):'0')+'%</span></div></div></div></div>');
}

function rVentas(filt){
  const c=D.caja?.registros||[];
  if(!c.length){sc('ventas','<div class="error-box">Sin datos de caja.</div>');return;}
  const meses=[...new Set(c.map(r=>r.fecha.slice(0,7)))].sort();
  const pills='<div class="period-bar"><button class="period-btn '+(filt==='todos'?'active':'')+'" onclick="rVentas('todos')">Todos</button>'+meses.map(m=>{const[y,mm]=m.split('-');return'<button class="period-btn '+(filt===m?'active':'')+'" onclick="rVentas('\''+ m +'\'')">'+( MN[mm]||mm)+' '+y+'</button>';}).join('')+'</div>';
  const rows=filt==='todos'?c:c.filter(r=>r.fecha.startsWith(filt));
  const tot=rows.reduce((s,r)=>s+r.total,0),ef=rows.reduce((s,r)=>s+r.efectivo,0);
  const tr=rows.reduce((s,r)=>s+r.transferencia,0),pos=rows.reduce((s,r)=>s+r.posnet,0);
  const fi=rows.reduce((s,r)=>s+r.fiado,0),tk=rows.reduce((s,r)=>s+r.tickets,0);
  const metMax=Math.max(ef,tr,pos,fi)||1;
  const metBars=[{l:'Efectivo',v:ef,c:'var(--green)'},{l:'Transferencia',v:tr,c:'var(--blue)'},{l:'Posnet',v:pos,c:'var(--amber)'},{l:'Fiado',v:fi,c:'var(--purple)'}].filter(d=>d.v>0).map(d=>'<div class="bar-row"><div class="bar-label">'+d.l+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(d.v/metMax*100).toFixed(1)+'%;background:'+d.c+'"></div></div><div class="bar-val pos">'+f(d.v)+'</div></div>').join('');
  const dt={},dc={};rows.forEach(r=>{const d=new Date(r.fecha+'T12:00:00').getDay();dt[d]=(dt[d]||0)+r.total;dc[d]=(dc[d]||0)+1;});
  const dm={0:'Dom',1:'Lun',2:'Mar',3:'Mié',4:'Jue',5:'Vie',6:'Sáb'};
  const ds=Object.keys(dt).map(d=>({d:+d,avg:dt[d]/dc[d]})).sort((a,b)=>b.avg-a.avg);
  const dsMax=ds.length?ds[0].avg:1;
  const dsBars=ds.map(({d,avg})=>'<div class="bar-row"><div class="bar-label">'+(dm[d])+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(avg/dsMax*100).toFixed(1)+'%;background:var(--blue)"></div></div><div class="bar-val" style="color:var(--blue)">'+fk(avg)+'</div></div>').join('');
  const ul=rows.slice(-50),bMax=Math.max(...ul.map(r=>r.total),1),bW=Math.max(6,Math.floor(700/ul.length)-2);
  const sH=100,sW=ul.length*(bW+2);
  const bSVG=ul.map((r,i)=>'<rect x="'+(i*(bW+2))+'" y="'+(sH-r.total/bMax*sH).toFixed(1)+'" width="'+bW+'" height="'+(r.total/bMax*sH).toFixed(1)+'" fill="var(--green)" opacity="'+(0.4+r.total/bMax*0.6).toFixed(2)+'" rx="1"><title>'+r.fecha+': '+f(r.total)+'</title></rect>').join('');
  const avgY=(sH-(rows.reduce((s,r)=>s+r.total,0)/(rows.length||1)/bMax)*sH).toFixed(1);
  sc('ventas',pills+'<div class="kpi-grid"><div class="kpi green"><div class="kpi-label">Total Período</div><div class="kpi-value green">'+fk(tot)+'</div><div class="kpi-sub">'+rows.length+' días</div></div><div class="kpi blue"><div class="kpi-label">Promedio Diario</div><div class="kpi-value blue">'+( rows.length?fk(tot/rows.length):'-')+'</div><div class="kpi-sub">'+tk+' tickets</div></div><div class="kpi amber"><div class="kpi-label">Ticket Promedio</div><div class="kpi-value amber">'+( tk?f(tot/tk):'-')+'</div><div class="kpi-sub">'+( rows.length?(tk/rows.length).toFixed(1):'-')+' tick/día</div></div><div class="kpi purple"><div class="kpi-label">Días &gt; $200K</div><div class="kpi-value purple">'+rows.filter(r=>r.total>=200000).length+'</div><div class="kpi-sub">de '+rows.length+' días</div></div></div><div class="grid-2"><div class="card"><div class="section-title">Métodos de Pago</div>'+metBars+'</div><div class="card"><div class="section-title">Promedio por Día de Semana</div>'+dsBars+'</div></div><div class="card"><div class="section-title">Evolución &mdash; Últimos '+ul.length+' Días</div><div style="overflow-x:auto;padding-bottom:8px"><svg width="'+sW+'" height="'+(sH+20)+'" viewBox="0 0 '+sW+' '+(sH+20)+'" style="overflow:visible">'+bSVG+'<line x1="0" y1="'+avgY+'" x2="'+sW+'" y2="'+avgY+'" stroke="var(--amber)" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/></svg></div><div style="margin-top:6px;font-size:10px;color:var(--muted)">Hover sobre las barras para ver el detalle del día</div></div>');
}

function rProductos(){
  const rep=D.rep;
  if(!rep||rep.error){sc('productos','<div class="error-box">Sin datos de productos.'+( rep?.error?' '+rep.error:'')+'</div>');return;}
  const items=rep.items||[],topGan=rep.topGanancia||[];
  const mi={};items.forEach(it=>{if(!mi[it.nombre])mi[it.nombre]={l:it.nombre,qty:0,v:0};mi[it.nombre].qty+=it.qty;mi[it.nombre].v+=it.subtotal;});
  const ti=Object.values(mi).sort((a,b)=>b.v-a.v).slice(0,20);
  const tq=Object.values(mi).sort((a,b)=>b.qty-a.qty).slice(0,20).map(p=>({l:p.l,v:p.qty,d:p.qty%1===0?p.qty:p.qty.toFixed(2)}));
  const tg=topGan.slice(0,20).map(p=>({l:p.nombre,v:p.ganancia,d:fk(p.ganancia)+(p.esReal?'':'~'),_r:p.esReal}));
  const ingMax=ti.length?ti[0].v:1,ganMax=tg.length?tg[0].v:1,qtyMax=tq.length?tq[0].v:1;
  const bI=ti.map((p,i)=>'<div class="bar-row"><div class="bar-label" title="'+p.l+'">'+( i<9?'0'+(i+1):''+(i+1))+'. '+p.l.slice(0,22)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(p.v/ingMax*100).toFixed(1)+'%;background:var(--green)"></div></div><div class="bar-val pos">'+fk(p.v)+'</div></div>').join('');
  const bG=tg.map((p,i)=>'<div class="bar-row"><div class="bar-label" title="'+p.l+'">'+( i<9?'0'+(i+1):''+(i+1))+'. '+p.l.slice(0,22)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(p.v/ganMax*100).toFixed(1)+'%;background:'+(p._r?'var(--amber)':'var(--dim)')+'"></div></div><div class="bar-val amb">'+p.d+'</div></div>').join('');
  const bQ=tq.map((p,i)=>'<div class="bar-row"><div class="bar-label" title="'+p.l+'">'+( i<9?'0'+(i+1):''+(i+1))+'. '+p.l.slice(0,22)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(p.v/qtyMax*100).toFixed(1)+'%;background:var(--blue)"></div></div><div class="bar-val" style="color:var(--blue)">'+p.d+'</div></div>').join('');
  sc('productos','<div class="kpi-grid"><div class="kpi green"><div class="kpi-label">Productos Distintos</div><div class="kpi-value green">'+Object.keys(mi).length+'</div><div class="kpi-sub">vendidos en el período</div></div><div class="kpi amber"><div class="kpi-label">N°1 Ingresos</div><div class="kpi-value amber" style="font-size:13px">'+( ti[0]?.l.slice(0,22)||'--')+'</div><div class="kpi-sub">'+( ti[0]?fk(ti[0].v):'')+'</div></div><div class="kpi blue"><div class="kpi-label">Líneas de Venta</div><div class="kpi-value blue">'+items.length.toLocaleString('es-AR')+'</div><div class="kpi-sub">items procesados</div></div><div class="kpi purple"><div class="kpi-label">Con Costo Real</div><div class="kpi-value purple">'+tg.filter(p=>p._r).length+'</div><div class="kpi-sub">ganancia exacta</div></div></div><div class="grid-2"><div class="card"><div class="section-title">Top 20 &mdash; Por Ingresos</div>'+bI+'</div><div class="card"><div class="section-title">Top 20 &mdash; Por Ganancia <span style="color:var(--dim);font-size:10px">(~ = aprox)</span></div>'+bG+'</div></div><div class="card"><div class="section-title">Top 20 &mdash; Por Cantidad Vendida</div>'+bQ+'</div>');
}

function rEgresos(){
  const eg=D.eg?.registros||[];
  if(!eg.length){sc('egresos','<div class="error-box">Sin egresos en CAJA_MOVIMIENTOS.</div>');return;}
  const tot=eg.reduce((s,r)=>s+r.monto,0);
  const pc={};eg.forEach(r=>{const c=r.categoria||'OTRO';pc[c]=(pc[c]||0)+r.monto;});
  const cats=Object.entries(pc).sort((a,b)=>b[1]-a[1]),cMax=cats.length?cats[0][1]:1;
  const cBars=cats.map(([k,v])=>'<div class="bar-row"><div class="bar-label">'+k.slice(0,18)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(v/cMax*100).toFixed(1)+'%;background:var(--red)"></div></div><div class="bar-val neg-c">'+f(v)+'</div></div>').join('');
  const pm={};eg.forEach(r=>{const m=(r.fecha||'unknown').slice(0,7);pm[m]=(pm[m]||0)+r.monto;});
  const mes=Object.entries(pm).sort((a,b)=>a[0].localeCompare(b[0])),mMax=mes.length?Math.max(...mes.map(m=>m[1])):1;
  const mBars=mes.map(([k,v])=>{const[y,m]=k.split('-');return'<div class="bar-row"><div class="bar-label">'+(MN[m]||m)+' '+(y||'')+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(v/mMax*100).toFixed(1)+'%;background:var(--red)"></div></div><div class="bar-val neg-c">'+f(v)+'</div></div>';}).join('');
  const sorted=[...eg].sort((a,b)=>(b.fecha||'2000').localeCompare(a.fecha||'2000'));
  const tRows=sorted.map(r=>'<tr><td class="dim">'+(r.fecha||'')+'</td><td><span class="badge" style="background:rgba(242,99,99,.12);color:var(--red)">'+(r.categoria||'EGRESO').slice(0,14)+'</span></td><td>'+(r.motivo||'')+'</td><td class="dim">'+(r.obs||'')+'</td><td class="neg">'+f(r.monto)+'</td></tr>').join('');
  sc('egresos','<div class="kpi-grid"><div class="kpi red"><div class="kpi-label">Total Egresos</div><div class="kpi-value red">'+fk(tot)+'</div><div class="kpi-sub">'+eg.length+' movimientos</div></div><div class="kpi red"><div class="kpi-label">Promedio x Egreso</div><div class="kpi-value red">'+( eg.length?f(tot/eg.length):'-')+'</div><div class="kpi-sub">por retiro</div></div><div class="kpi amber"><div class="kpi-label">Mayor Egreso</div><div class="kpi-value amber">'+f(Math.max(...eg.map(r=>r.monto)))+'</div><div class="kpi-sub">'+(sorted[0]?.motivo||'').slice(0,22)+'</div></div><div class="kpi blue"><div class="kpi-label">Categorías</div><div class="kpi-value blue">'+cats.length+'</div><div class="kpi-sub">tipos distintos</div></div></div><div class="grid-2"><div class="card"><div class="section-title">Por Categoría</div>'+cBars+'</div><div class="card"><div class="section-title">Por Mes</div>'+mBars+'</div></div><div class="card"><div class="section-title">Todos los Movimientos</div><div class="table-wrap"><table class="data-table"><thead><tr><th>Fecha</th><th>Categoría</th><th>Motivo</th><th>Obs.</th><th style="text-align:right">Monto</th></tr></thead><tbody>'+tRows+'</tbody></table></div></div>');
}

function rConsumos(){
  const sal=D.sal?.registros||[];
  if(!sal.length){sc('consumos','<div class="error-box">Sin registros en hoja SALIDAS.</div>');return;}
  const tot=sal.reduce((s,r)=>s+(r.precio||0)*r.cantidad,0);
  const pm={};sal.forEach(r=>{const m=r.motivo||'SIN MOTIVO';pm[m]=(pm[m]||0)+(r.precio||0)*r.cantidad;});
  const mots=Object.entries(pm).sort((a,b)=>b[1]-a[1]),mMax=mots.length?mots[0][1]:1;
  const mBars=mots.map(([k,v])=>'<div class="bar-row"><div class="bar-label">'+ k.slice(0,18)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(v/mMax*100).toFixed(1)+'%;background:var(--purple)"></div></div><div class="bar-val" style="color:var(--purple)">'+fk(v)+'</div></div>').join('');
  const pp={};sal.forEach(r=>{const p=r.producto||'?';if(!pp[p])pp[p]={l:p,cant:0,v:0};pp[p].cant+=r.cantidad;pp[p].v+=(r.precio||0)*r.cantidad;});
  const tp=Object.values(pp).sort((a,b)=>b.v-a.v).slice(0,15),pMax=tp.length?tp[0].v:1;
  const pBars=tp.map((p,i)=>'<div class="bar-row"><div class="bar-label" title="'+p.l+'">'+( i<9?'0'+(i+1):''+(i+1))+'. '+p.l.slice(0,22)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(p.v/pMax*100).toFixed(1)+'%;background:var(--amber)"></div></div><div class="bar-val amb">'+fk(p.v)+'</div></div>').join('');
  const tRows=[...sal].sort((a,b)=>(b.fecha||'2000').localeCompare(a.fecha||'2000')).slice(0,200).map(r=>'<tr><td class="dim">'+(r.fecha||'')+'</td><td>'+( r.producto||'')+'</td><td><span class="badge" style="background:rgba(192,99,242,.12);color:var(--purple)">'+(r.motivo||'-')+'</span></td><td class="dim">'+(r.obs||r.vendedor||'-')+'</td><td class="num" style="color:var(--amber)">'+(r.cantidad%1===0?r.cantidad:r.cantidad.toFixed(2))+'</td><td class="num">'+(r.precio?f((r.precio||0)*r.cantidad):'-')+'</td></tr>').join('');
  sc('consumos','<div class="kpi-grid"><div class="kpi purple"><div class="kpi-label">Total Valor Salidas</div><div class="kpi-value purple">'+fk(tot)+'</div><div class="kpi-sub">'+sal.length+' registros</div></div><div class="kpi amber"><div class="kpi-label">Productos Afectados</div><div class="kpi-value amber">'+Object.keys(pp).length+'</div><div class="kpi-sub">productos distintos</div></div><div class="kpi red"><div class="kpi-label">Mayor Salida</div><div class="kpi-value red" style="font-size:13px">'+( tp[0]?.l.slice(0,20)||'--')+'</div><div class="kpi-sub">'+( tp[0]?fk(tp[0].v):'')+'</div></div><div class="kpi blue"><div class="kpi-label">Motivos</div><div class="kpi-value blue">'+mots.length+'</div><div class="kpi-sub">categorías</div></div></div><div class="grid-2"><div class="card"><div class="section-title">Por Motivo</div>'+mBars+'</div><div class="card"><div class="section-title">Top 15 Productos</div>'+pBars+'</div></div><div class="card"><div class="section-title">Log de Salidas (últimas 200)</div><div class="table-wrap"><table class="data-table"><thead><tr><th>Fecha</th><th>Producto</th><th>Motivo</th><th>Obs / Vendedor</th><th style="text-align:right">Cant.</th><th style="text-align:right">Valor</th></tr></thead><tbody>'+tRows+'</tbody></table></div></div>');
}

function rDiario(filt){
  const c=D.caja?.registros||[];
  if(!c.length){sc('diario','<div class="error-box">Sin datos de caja.</div>');return;}
  const meses=[...new Set(c.map(r=>r.fecha.slice(0,7)))].sort();
  const pills='<div class="period-bar"><button class="period-btn '+(filt==='todos'?'active':'')+'" onclick="rDiario('todos')">Todos</button>'+meses.map(m=>{const[y,mm]=m.split('-');return'<button class="period-btn '+(filt===m?'active':'')+'" onclick="rDiario('\''+ m +'\'')">'+( MN[mm]||mm)+' '+y+'</button>';}).join('')+'</div>';
  const rows=(filt==='todos'?[...c]:[...c].filter(r=>r.fecha.startsWith(filt))).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const tot=rows.reduce((s,r)=>s+r.total,0),mT=Math.max(...rows.map(r=>r.total),1);
  const tRows=rows.map(r=>{const bar='<div style="width:'+(r.total/mT*100).toFixed(0)+'%;height:3px;background:var(--green);border-radius:1px;margin-top:3px;opacity:.6"></div>';return'<tr><td>'+ r.fecha+bar+'</td><td class="num">'+(r.efectivo?f(r.efectivo):'-')+'</td><td class="num" style="color:var(--amber)">'+(r.posnet?f(r.posnet):'-')+'</td><td class="num" style="color:var(--blue)">'+(r.transferencia?f(r.transferencia):'-')+'</td><td class="num" style="color:var(--purple)">'+(r.fiado?f(r.fiado):'-')+'</td><td class="num" style="font-weight:700">'+f(r.total)+'</td><td class="num" style="color:var(--muted)">'+ r.tickets+'</td></tr>';}).join('');
  sc('diario',pills+'<div class="kpi-grid"><div class="kpi green"><div class="kpi-label">Total</div><div class="kpi-value green">'+fk(tot)+'</div><div class="kpi-sub">'+rows.length+' días</div></div><div class="kpi blue"><div class="kpi-label">Promedio/Día</div><div class="kpi-value blue">'+( rows.length?fk(tot/rows.length):'-')+'</div><div class="kpi-sub">en el período</div></div></div><div class="card" style="padding:0"><div class="table-wrap" style="border:none;max-height:600px"><table class="data-table"><thead><tr><th>Fecha</th><th style="text-align:right">Efectivo</th><th style="text-align:right">Posnet</th><th style="text-align:right">Transfer.</th><th style="text-align:right">Fiado</th><th style="text-align:right">Total</th><th style="text-align:right">Tickets</th></tr></thead><tbody>'+tRows+'</tbody></table></div></div>');
}

load();
</script>
</body>
