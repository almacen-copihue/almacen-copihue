<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SendWA Copihue v15</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f0ee;color:#111;min-height:100vh}

/* ── LAYOUT ── */
.wrap{max-width:900px;margin:0 auto;padding:16px}
h1{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#888;margin-bottom:16px}

/* ── ESTADO ── */
.estado{background:#fff;border:0.5px solid #ddd;border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:13px;color:#555;display:flex;align-items:center;gap:10px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.cargando{background:#f59e0b;animation:pulso 1s infinite}
.dot.ok{background:#22c55e}
.dot.error{background:#ef4444}
@keyframes pulso{0%,100%{opacity:1}50%{opacity:.3}}

/* ── FILTROS ── */
.filtros{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #ddd;background:#fff;color:#555;transition:all .12s;user-select:none}
.chip.on{border-color:transparent}
.chip[data-t="todos"].on{background:#111;color:#fff}
.chip[data-t="promo"].on{background:#4A0080;color:#E0A0FF}
.chip[data-t="combo"].on{background:#7A0040;color:#FFB0D0}
.chip[data-t="relampago"].on{background:#7A2E00;color:#FFB47A}
.chip[data-t="destacada"].on{background:#5A4500;color:#FFE57A}
.chip[data-t="especial"].on{background:#003080;color:#90BFFF}
.chip[data-t="ultimas"].on{background:#6A0010;color:#FF8090}
.chip[data-t="cervecero"].on{background:#0d3b66;color:#90c8ff}

/* ── GRILLA PRODUCTOS ── */
.grilla{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.prod{background:#fff;border:1.5px solid #e5e5e5;border-radius:10px;padding:10px;cursor:pointer;transition:all .12s;position:relative}
.prod:hover{border-color:#999}
@media(hover:none){.prod:hover{border-color:#e5e5e5}}
.prod.sel{border-color:#22c55e;background:#e8fdf0;box-shadow:0 0 0 2px #22c55e}
.prod.sel::after{content:'✓';position:absolute;top:6px;right:8px;font-size:15px;font-weight:900;color:#22c55e}
.prod-nombre{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:6px;padding-right:14px}
.prod-precio{font-size:15px;font-weight:700;color:#111}
.prod-precio-orig{font-size:11px;color:#aaa;text-decoration:line-through}
.prod-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
.badge-promo{background:#4A0080;color:#E0A0FF}
.badge-combo{background:#7A0040;color:#FFB0D0}
.badge-relampago{background:#7A2E00;color:#FFB47A}
.badge-destacada{background:#5A4500;color:#FFE57A}
.badge-especial{background:#003080;color:#90BFFF}
.badge-ultimas{background:#6A0010;color:#FF8090}
.badge-cervecero{background:#0d3b66;color:#90c8ff}

/* ── BARRA SELECCIÓN ── */
.barra{background:#111;color:#fff;border-radius:10px;padding:12px 16px;margin-bottom:16px;align-items:center;gap:12px;display:none}
.barra.vis{display:flex}
.barra-txt{flex:1;font-size:13px}
.barra-btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:#fff;color:#111}
.barra-btn:hover{background:#e5e5e5}

/* ── SALIDAS ── */
.salidas-titulo{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin-bottom:12px}
.salidas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:24px}

/* ── CADA SALIDA ── */
.salida{background:#fff;border:0.5px solid #ddd;border-radius:12px;overflow:hidden}
.salida-head{padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid #eee;background:#fafafa}
.salida-nombre{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#888}
.s-btns{display:flex;gap:5px}
.s-btn{padding:4px 9px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;border:0.5px solid #ddd;background:#fff;color:#555}
.s-btn:hover{background:#f0f0f0}
.s-btn.negro{background:#111;color:#fff;border-color:#111}

/* ── FLYERS ── */
.flyer-wrap{padding:10px;display:flex;justify-content:center;background:#ebebeb}
.flyer{width:220px;height:220px;border-radius:10px;position:relative;overflow:hidden;flex-shrink:0;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}

.f-fuego{background:#0d0000}
.f-fuego .fg{position:absolute;inset:0;background:radial-gradient(ellipse at 65% 80%,#c03000 0%,#700000 50%,#0d0000 100%)}
.f-fuego .fbadge{position:absolute;top:11px;left:11px;background:#ff1744;color:#fff;font-size:8px;font-weight:800;padding:3px 8px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;z-index:2}
.f-fuego .fmoji{position:absolute;top:9px;right:11px;font-size:30px;z-index:2}
.f-fuego .fnombre{position:absolute;left:11px;right:42px;top:46px;color:#fff;font-size:13px;font-weight:900;line-height:1.2;z-index:2}
.f-fuego .forig{position:absolute;left:11px;bottom:50px;color:#ff8a65;font-size:10px;text-decoration:line-through;opacity:.8;z-index:2}
.f-fuego .fprecio{position:absolute;left:11px;bottom:26px;color:#ffd600;font-size:26px;font-weight:900;z-index:2}
.f-fuego .fahorro{position:absolute;left:11px;bottom:9px;color:rgba(255,214,0,.65);font-size:9px;z-index:2}
.f-fuego .fmarca{position:absolute;bottom:9px;right:11px;color:rgba(255,255,255,.12);font-size:7px;letter-spacing:2px;text-transform:uppercase;z-index:2}

.f-neon{background:#000;border:2px solid #00e676}
.f-neon .fbadge{position:absolute;top:11px;left:11px;color:#00e676;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:1px solid #00e676;padding:2px 7px;border-radius:2px}
.f-neon .fmoji{position:absolute;top:9px;right:11px;font-size:28px}
.f-neon .fnombre{position:absolute;left:11px;right:42px;top:46px;color:#fff;font-size:13px;font-weight:900;line-height:1.2}
.f-neon .forig{position:absolute;left:11px;bottom:50px;color:#444;font-size:10px;text-decoration:line-through}
.f-neon .fprecio{position:absolute;left:11px;bottom:26px;color:#00e676;font-size:26px;font-weight:900}
.f-neon .fahorro{position:absolute;left:11px;bottom:9px;color:#444;font-size:9px}
.f-neon .fmarca{position:absolute;bottom:9px;right:11px;color:#111;font-size:7px;letter-spacing:2px;text-transform:uppercase}

.f-urgente{background:#ffd600}
.f-urgente .fbadge{position:absolute;top:0;left:0;right:0;background:#000;color:#ffd600;font-size:9px;font-weight:800;padding:5px 11px;letter-spacing:2px;text-transform:uppercase;text-align:center}
.f-urgente .fmoji{position:absolute;top:28px;right:11px;font-size:34px}
.f-urgente .fnombre{position:absolute;left:11px;right:52px;top:36px;color:#000;font-size:13px;font-weight:900;line-height:1.2}
.f-urgente .forig{position:absolute;left:11px;bottom:50px;color:rgba(0,0,0,.4);font-size:10px;text-decoration:line-through}
.f-urgente .fprecio{position:absolute;left:11px;bottom:26px;color:#000;font-size:26px;font-weight:900}
.f-urgente .fahorro{position:absolute;left:0;right:0;bottom:0;background:#000;color:#ffd600;font-size:9px;font-weight:700;padding:4px 11px;text-align:center}
.f-urgente .fmarca{display:none}

.f-dark{background:#0a0a0a}
.f-dark .facento{position:absolute;top:0;left:0;width:3px;height:100%;background:#aa00ff}
.f-dark .fbadge{position:absolute;top:11px;left:15px;color:#aa00ff;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.f-dark .fmoji{position:absolute;top:9px;right:11px;font-size:28px}
.f-dark .fnombre{position:absolute;left:15px;right:42px;top:30px;color:#fff;font-size:13px;font-weight:900;line-height:1.2}
.f-dark .forig{position:absolute;left:15px;bottom:50px;color:#333;font-size:10px;text-decoration:line-through}
.f-dark .fprecio{position:absolute;left:15px;bottom:26px;color:#fff;font-size:26px;font-weight:900}
.f-dark .fahorro{position:absolute;left:15px;bottom:9px;color:#444;font-size:9px}
.f-dark .fmarca{position:absolute;bottom:9px;right:11px;color:#1a1a1a;font-size:7px;letter-spacing:2px;text-transform:uppercase}

/* ── TEXTO WA ── */
.wa-txt{background:#0b141a;margin:0 10px 10px;border-radius:8px;padding:9px 11px;font-size:11px;color:#e9ede9;line-height:1.75;white-space:pre-wrap;word-break:break-word;max-height:120px;overflow-y:auto}

.empty{padding:50px 20px;text-align:center;color:#bbb;font-size:13px;line-height:1.6}

/* ── TABS SALIDAS ── */
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #ddd;background:#fff;color:#555;transition:all .12s}
.tab.on{background:#111;color:#fff;border-color:#111}

/* ── GRILLA MOSAICO ── */
.mosaic-opts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.mopt{padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #ddd;background:#fff;color:#555}
.mopt.on{background:#111;color:#fff;border-color:#111}
.mosaic-wrap{background:#111;border-radius:12px;padding:8px;display:inline-block}
.mosaic-grid{display:grid;gap:4px}
.mosaic-cell{border-radius:6px;overflow:hidden;position:relative}

/* ── BLOQUE TEXTO SALIDA ── */
.texto-bloque{background:#fff;border:0.5px solid #ddd;border-radius:12px;overflow:hidden;margin-bottom:12px}

@media(max-width:480px){.salidas-grid{grid-template-columns:1fr}}

/* ── FAB flotante ── */
.fab-bar{
  position:fixed;bottom:12px;left:8px;right:8px;
  display:flex;gap:4px;align-items:center;
  background:#111;border-radius:40px;padding:6px 10px;
  box-shadow:0 4px 20px rgba(0,0,0,.35);z-index:999;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;justify-content:space-between
}
.fab-bar::-webkit-scrollbar{display:none}
.fab{display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:5px 8px;border-radius:28px;cursor:pointer;border:none;
  font-size:20px;background:transparent;color:#fff;transition:background .12s;line-height:1;flex-shrink:0}
.fab span{font-size:8px;font-weight:600;letter-spacing:.3px;color:#888;text-transform:uppercase}
.fab:hover{background:#222}
.fab.fab-generar{background:#22c55e;padding:6px 14px;flex-shrink:0}
.fab.fab-generar span{color:rgba(255,255,255,.8)}
.fab-sep{width:1px;height:28px;background:#2a2a2a;flex-shrink:0}
/* espacio abajo para que el FAB no tape contenido */
.wrap{padding-bottom:100px}
</style>
</head>
<body>
<div class="wrap">

<h1>SendWA · Almacén Copihue <span style="background:#111;color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:1px;vertical-align:middle">v15</span></h1>

<!-- ESTADO CONEXIÓN -->
<div class="estado" id="estado">
  <div class="dot cargando" id="dot"></div>
  <span id="estado-txt">Conectando con la planilla...</span>
</div>

<!-- FILTROS -->
<div class="filtros" id="filtros" style="display:none">
  <div class="chip on" data-t="ofertas" onclick="filtrar(this)">🏷 Ofertas</div>
  <div class="chip" data-t="promo" onclick="filtrar(this)">PROMO</div>
  <div class="chip" data-t="combo" onclick="filtrar(this)">COMBO</div>
  <div class="chip" data-t="relampago" onclick="filtrar(this)">Relámpago</div>
  <div class="chip" data-t="destacada" onclick="filtrar(this)">Destacada</div>
  <div class="chip" data-t="especial" onclick="filtrar(this)">Especial</div>
  <div class="chip" data-t="ultimas" onclick="filtrar(this)">Últimas</div>
  <div class="chip" data-t="cervecero" onclick="filtrar(this)">🍺 Cervecero</div>
  <div class="chip" data-t="sinoferta" onclick="filtrar(this)">Sin oferta</div>
</div>

<!-- GRILLA -->
<div class="grilla" id="grilla"></div>

<!-- BARRA SELECCIÓN -->
<div class="barra" id="barra">
  <span class="barra-txt" id="barra-txt"></span>
</div>

<!-- SALIDAS -->
<div id="zona-salidas"></div>

</div>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzWZzDvdGfW8vd2-FpQolT852cdPMeHbfKugn9DBOlju75bE1D0SUNB5EKEDOsI2vP4lA/exec';
const API_TIMEOUT_MS = 25000;

let todosLosProductos = [];
let filtroActivo = 'ofertas';
let seleccionados = new Set();

async function _apiFetch(action, data = null) {
    const url = data
        ? API_URL + '?action=' + action + '&data=' + encodeURIComponent(JSON.stringify(data)) + '&t=' + Date.now()
        : API_URL + '?action=' + action + '&t=' + Date.now();
    const resp = await fetch(url, { redirect: 'follow', signal: AbortSignal.timeout(API_TIMEOUT_MS) });
    const text = await resp.text();
    return JSON.parse(text);
}

function fmt(n) { const num = typeof n === 'string' ? parseFloat(n) : n; return '$' + (isNaN(num) ? 0 : Math.round(num)).toLocaleString('es-AR'); }

function simplificarNombre(nombre) {
    return nombre.toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9 ]/g, "")
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .trim();
}

function getEmoji(nombre) {
    const n = (nombre || '').toLowerCase();
    if (n.includes('cerveza') || n.includes('birra')) return '🍺';
    if (n.includes('gaseosa') || n.includes('coca') || n.includes('pepsi') || n.includes('sprite') || n.includes('7up') || n.includes('fanta')) return '🥤';
    if (n.includes('yerba')) return '🧉';
    if (n.includes('pan') || n.includes('lactal') || n.includes('medialuna') || n.includes('facturas')) return '🍞';
    if (n.includes('aceite')) return '🫒';
    if (n.includes('queso')) return '🧀';
    if (n.includes('jamón') || n.includes('jamon') || n.includes('salchicha') || n.includes('salame') || n.includes('mortadela')) return '🥩';
    if (n.includes('fideo') || n.includes('pasta') || n.includes('spaghet')) return '🍝';
    if (n.includes('leche')) return '🥛';
    if (n.includes('agua')) return '💧';
    if (n.includes('vino')) return '🍷';
    if (n.includes('pollo')) return '🍗';
    if (n.includes('arroz')) return '🍚';
    if (n.includes('azucar') || n.includes('azúcar')) return '🍬';
    if (n.includes('cafe') || n.includes('café')) return '☕';
    if (n.includes('manteca') || n.includes('mantequilla')) return '🧈';
    if (n.includes('huevo')) return '🥚';
    if (n.includes('tomate') || n.includes('verdura') || n.includes('lechuga')) return '🥦';
    if (n.includes('jabón') || n.includes('jabon') || n.includes('detergente') || n.includes('lavandina')) return '🧴';
    if (n.includes('papel') || n.includes('servilleta')) return '🧻';
    return '🛒';
}

function tipoOferta(p) {
    if (!p || p.stock <= 0) return null;
    const cat = String(p.catOferta || '').toUpperCase();
    if (cat === 'PROMO ACTIVA') return 'promo';
    if (cat === 'COMBO ACTIVO') return 'combo';
    if (p.relampago) return 'relampago';
    if (p.destacada > 0) return 'destacada';
    if (p.especial > 0) return 'especial';
    return null;
}

function precioFinal(p) {
    const tipo = tipoOferta(p);
    if (!tipo) return p.price;
    if (tipo === 'promo' || tipo === 'combo') return p.normal > 0 && p.normal < p.price ? p.normal : p.price;
    if (tipo === 'destacada') return Math.round(p.price * (1 - p.destacada / 100));
    if (tipo === 'especial') return Math.round(p.price * 0.9);
    return p.price;
}

function badgeLabel(tipo, p) {
    if (tipo === 'promo') return '🏷 PROMO';
    if (tipo === 'combo') return '🎁 COMBO';
    if (tipo === 'relampago') return '⚡ RELÁMPAGO';
    if (tipo === 'destacada') return `⭐ ${p.destacada}% OFF`;
    if (tipo === 'especial') return '💙 10% ESP.';
    if (tipo === 'ultimas') return '⏳ ÚLTIMAS';
    if (tipo === 'cervecero') return '🍺 CERVECERO';
    return 'OFERTA';
}

function badgeCls(tipo) {
    return { promo:'badge-promo', combo:'badge-combo', relampago:'badge-relampago',
             destacada:'badge-destacada', especial:'badge-especial',
             ultimas:'badge-ultimas', cervecero:'badge-cervecero' }[tipo] || '';
}

async function cargar() {
    setEstado('cargando', 'Cargando productos desde la planilla...');
    try {
        const data = await _apiFetch('getProductos');
        const arr = Array.isArray(data) ? data : (data.productos || data.items || []);
        todosLosProductos = arr
            .filter(p => p.name && p.price > 0 && p.stock > 0)
            .map(p => ({
                id: p.id,
                name: String(p.name).trim(),
                price: parseInt(p.price) || 0,
                stock: parseInt(p.stock) || 0,
                relampago: p.relampago ? (isNaN(parseInt(p.relampago)) ? String(p.relampago).trim() : parseInt(p.relampago)) : 0,
                destacada: parseInt(p.destacada) || 0,
                especial: parseInt(p.especial) || 0,
                normal: parseInt(p.normal) || 0,
                catOferta: String(p.categoriaOferta || p.catOferta || '').trim().toUpperCase(),
                image: `imagenes-productos/${simplificarNombre(String(p.name||'').trim())}.jpg`,
            }));
        // Solo los que tienen oferta
        const conOferta = todosLosProductos.filter(p => tipoOferta(p));
        setEstado('ok', `${conOferta.length} productos con oferta activa · ${todosLosProductos.length} en total`);
        document.getElementById('filtros').style.display = 'flex';
        renderGrilla();
    } catch(e) {
        console.error('API falló:', e);
        todosLosProductos = [
            { id: '1', name: 'Coca Cola 2L',      price: 1800, stock: 10, relampago: 1, catOferta: 'PROMO ACTIVA', normal: 1500, destacada: 0, especial: 0, image: 'imagenes-productos/coca-cola-2l.jpg' },
            { id: '2', name: 'Cerveza Andes 1L',  price: 1200, stock: 5,  relampago: 0, catOferta: 'COMBO ACTIVO', normal: 1000, destacada: 0, especial: 0, image: 'imagenes-productos/cerveza-andes-1l.jpg' },
            { id: '3', name: 'Yerba Playadito 1kg',price: 2500, stock: 8,  relampago: 0, catOferta: 'PROMO ACTIVA', normal: 2200, destacada: 0, especial: 0, image: 'imagenes-productos/yerba-playadito-1kg.jpg' }
        ];
        setEstado('ok', '⚠️ Sin conexión — ' + todosLosProductos.length + ' productos de prueba');
        document.getElementById('filtros').style.display = 'flex';
        renderGrilla();
    }
}

function setEstado(tipo, txt) {
    const dot = document.getElementById('dot');
    dot.className = 'dot ' + tipo;
    document.getElementById('estado-txt').textContent = txt;
}

function productosFiltrados() {
    return todosLosProductos.filter(p => {
        if (p.stock <= 0) return false;
        const tipo = tipoOferta(p);
        if (filtroActivo === 'sinoferta') return !tipo;
        if (filtroActivo === 'ofertas') return !!tipo;
        if (!tipo) return false;
        return tipo === filtroActivo;
    });
}

function renderGrilla() {
    const lista = productosFiltrados();
    const grilla = document.getElementById('grilla');
    if (lista.length === 0) {
        grilla.innerHTML = '<div class="empty">No hay productos con ese tipo de oferta activos hoy.</div>';
        return;
    }
    grilla.innerHTML = lista.map(p => {
        const tipo = tipoOferta(p);
        const pf = precioFinal(p);
        const conDesc = pf < p.price;
        const ah = conDesc ? p.price - pf : 0;
        const key = String(p.id);
        const isSel = seleccionados.has(key);
        return `<div class="prod${isSel ? ' sel' : ''}" data-pid="${key}" onclick="toggleSel('${key}')">
          ${p.image ? `<div style="width:100%;height:130px;margin-bottom:8px;border-radius:7px;overflow:hidden;background:#f5f5f5">
            <img src="${p.image}" alt="${p.name}" onerror="this.parentElement.style.display='none'"
              style="width:100%;height:100%;object-fit:cover;display:block">
          </div>` : ''}
          <div class="prod-nombre">${getEmoji(p.name)} ${p.name}</div>
          ${conDesc ? `<div class="prod-precio-orig">${fmt(p.price)}</div>` : ''}
          <div class="prod-precio">${fmt(pf)}</div>
          ${tipo ? `<span class="prod-badge ${badgeCls(tipo)}">${badgeLabel(tipo, p)}</span>` : ''}
          ${ah > 0 ? `<div style="font-size:10px;color:#22c55e;margin-top:3px">Ahorrás ${fmt(ah)}</div>` : ''}
        </div>`;
    }).join('');
}

function filtrar(el) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
    el.classList.add('on');
    filtroActivo = el.dataset.t;
    renderGrilla();
}

function toggleSel(id) {
    const key = String(id);
    const productoDiv = document.querySelector('[data-pid="' + key + '"]');
    if (seleccionados.has(key)) {
        seleccionados.delete(key);
        if (productoDiv) productoDiv.classList.remove('sel');
    } else {
        seleccionados.add(key);
        if (productoDiv) productoDiv.classList.add('sel');
    }
    actualizarBarra();
}

function limpiar() {
    seleccionados.clear();
    renderGrilla();
    actualizarBarra();
    document.getElementById('zona-salidas').innerHTML = '';
}

function actualizarBarra() {
    const barra = document.getElementById('barra');
    const n = seleccionados.size;
    if (n === 0) {
        barra.style.display = 'none';
    } else {
        barra.style.display = 'flex';
        document.getElementById('barra-txt').textContent = n + ' producto' + (n > 1 ? 's' : '') + ' seleccionado' + (n > 1 ? 's' : '');
    }
}

// ── FLYERS ──
const PLANTILLAS = [
    { id: 'fuego',   nombre: '🔥 Fuego' },
    { id: 'neon',    nombre: '💚 Neon' },
    { id: 'urgente', nombre: '⚡ Urgente' },
    { id: 'dark',    nombre: '💜 Dark' },
];

function buildFlyer(p, tpl) {
    const tipo = tipoOferta(p);
    const pf = precioFinal(p);
    const conDesc = pf < p.price;
    const ah = conDesc ? p.price - pf : 0;
    const pct = ah > 0 ? Math.round(ah / p.price * 100) : 0;
    const badge = badgeLabel(tipo, p);
    const emoji = getEmoji(p.name);
    const extra = tpl === 'dark' ? '<div class="facento"></div>' : tpl === 'fuego' ? '<div class="fg"></div>' : '';
    const imgBg = p.image
        ? `<img src="${p.image}" onerror="this.style.display='none'"
             style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.22;z-index:1;border-radius:10px">`
        : '';

    return `<div class="flyer f-${tpl}" style="position:relative">
      ${extra}
      ${imgBg}
      <div class="fbadge" style="position:relative;z-index:3">${badge}</div>
      <div class="fmoji" style="position:relative;z-index:3">${emoji}</div>
      <div class="fnombre" style="position:relative;z-index:3">${p.name}</div>
      ${conDesc ? `<div class="forig" style="position:relative;z-index:3">${fmt(p.price)}</div>` : ''}
      <div class="fprecio" style="position:relative;z-index:3">${fmt(pf)}</div>
      <div class="fahorro" style="position:relative;z-index:3">${ah > 0 ? 'Ahorrás ' + fmt(ah) + ' · ' + pct + '% OFF' : ''}</div>
      <div class="fmarca" style="position:relative;z-index:3">Almacén Copihue</div>
    </div>`;
}

function buildTexto(prods, tpl) {
    const lineas = prods.map(p => {
        const tipo = tipoOferta(p);
        const pf = precioFinal(p);
        const conDesc = pf < p.price;
        const ah = conDesc ? p.price - pf : 0;
        const pct = ah > 0 ? Math.round(ah / p.price * 100) : 0;
        const emoji = getEmoji(p.name);
        const badge = badgeLabel(tipo, p);
        if (tpl === 'fuego')
            return `${emoji} *${p.name}*\n${conDesc ? `~~${fmt(p.price)}~~ → ` : ''}*${fmt(pf)}*${ah > 0 ? `\n✅ Ahorrás ${fmt(ah)} (${pct}%)` : ''}\n_${badge}_`;
        if (tpl === 'neon')
            return `💚 *${p.name}*\nPrecio: *${fmt(pf)}*${conDesc ? `  ~~${fmt(p.price)}~~` : ''}${ah > 0 ? `\n💰 ${pct}% OFF` : ''}`;
        if (tpl === 'urgente')
            return `⚡ *${p.name}* — *${fmt(pf)}*${conDesc ? `\n~~Antes: ${fmt(p.price)}~~` : ''}${ah > 0 ? ` · ${pct}% OFF` : ''}`;
        if (tpl === 'dark')
            return `${emoji} ${p.name}\n💵 *${fmt(pf)}*${conDesc ? `  _(antes ${fmt(p.price)})_` : ''}${ah > 0 ? `\n🏷 ${pct}% descuento` : ''}`;
    }).join('\n\n');

    const headers = {
        fuego:   '🔥 *OFERTA COPIHUE* 🔥\n\n',
        neon:    '💚 *OFERTAS EN VIVO*\n\n',
        urgente: '⚡ *TIEMPO LIMITADO — COPIHUE*\n\n',
        dark:    '✨ *OFERTAS DEL DÍA*\n\n',
    };
    const footer = '\n\n📍 Almacén Copihue · Stock limitado · Precio válido hoy';
    return (headers[tpl] || '') + lineas + footer;
}

// ── MOSAICOS ──
const MOSAIC_OPTS = [
    {label:'1×1',cols:1,rows:1},{label:'2×1',cols:2,rows:1},{label:'2×2',cols:2,rows:2},
    {label:'2×3',cols:2,rows:3},{label:'2×4',cols:2,rows:4},{label:'2×5',cols:2,rows:5},
    {label:'2×6',cols:2,rows:6},{label:'3×1',cols:3,rows:1},{label:'3×2',cols:3,rows:2},
    {label:'3×3',cols:3,rows:3},{label:'4×1',cols:4,rows:1},{label:'4×2',cols:4,rows:2},
    {label:'4×3',cols:4,rows:3},{label:'4×4',cols:4,rows:4},
];
// Filtra solo grillas que se llenan exacto con los productos disponibles
function mosaicOptsValidas(total) {
    // 1x1 siempre disponible (usa el primero)
    return MOSAIC_OPTS.filter(o => {
        const celdas = o.cols * o.rows;
        return celdas === 1 || celdas === total || (total > celdas && total % celdas === 0) || celdas === total;
    // simplificado: mostrar las que llenan exacto O las que el total es múltiplo
    });
}
function mosaicOptsExactas(total) {
    return MOSAIC_OPTS.filter(o => {
        const celdas = o.cols * o.rows;
        if (celdas === 1) return true; // siempre 1x1
        return celdas <= total; // cualquier que quepa, indicamos si sobran
    });
}
let mosaicTpl = 'fuego';
let mosaicConfig = {cols:2,rows:2,label:'2×2'};
let tabActiva = 'imagen';
let prodsActuales = [];

function generarSalidas() {
    prodsActuales = [...seleccionados].map(id => todosLosProductos.find(p => String(p.id) === String(id))).filter(Boolean);
    if (prodsActuales.length === 0) return;
    renderZona();
    setTimeout(() => document.getElementById('zona-salidas').scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
}

function renderZona() {
    const zona = document.getElementById('zona-salidas');
    zona.innerHTML = `
    <div class="salidas-titulo">Elegí la salida que mejor calza</div>

    <div class="tabs">
      <div class="tab ${tabActiva==='imagen'?'on':''}" onclick="setTab('imagen')">🖼 Imágenes</div>
      <div class="tab ${tabActiva==='texto'?'on':''}" onclick="setTab('texto')">💬 Textos WA</div>
    </div>

    <div id="panel-imagen" style="display:${tabActiva==='imagen'?'block':'none'}">
      ${renderPanelImagen()}
    </div>
    <div id="panel-texto" style="display:${tabActiva==='texto'?'block':'none'}">
      ${renderPanelTexto()}
    </div>`;
}

function setTab(t) { tabActiva = t; renderZona(); }

function renderPanelImagen() {
    const total = prodsActuales.length;
    const opts = mosaicOptsExactas(total);
    const celdas = mosaicConfig.cols * mosaicConfig.rows;
    const usados = Math.min(celdas, total);
    const sobran = total - usados < 0 ? 0 : (celdas === 1 ? total - 1 : total - usados);
    const aviso = sobran > 0
        ? `<div style="font-size:11px;color:#f59e0b;margin-bottom:8px">⚠️ ${sobran} producto${sobran>1?'s':''} no entran en esta grilla</div>`
        : (total === celdas ? `<div style="font-size:11px;color:#22c55e;margin-bottom:8px">✅ Grilla completa — ${total} productos</div>` : '');

    return `
    <div style="margin-bottom:10px">
      <div style="font-size:11px;color:#888;margin-bottom:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase">Plantilla</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
        ${PLANTILLAS.map(pl=>`<div class="mopt${mosaicTpl===pl.id?' on':''}" onclick="setMosaicTpl('${pl.id}')">${pl.nombre}</div>`).join('')}
      </div>
      <div style="font-size:11px;color:#888;margin-bottom:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase">Grilla — ${total} productos seleccionados</div>
      <div class="mosaic-opts">
        ${opts.map(o=>{
            const c2 = o.cols*o.rows;
            const sob = total - Math.min(c2,total);
            const llena = c2 === total;
            const hint = llena ? ' ✓' : (sob>0&&c2>1 ? ` (-${sob})` : '');
            const color = llena ? 'background:#22c55e;color:#fff;border-color:#22c55e' : '';
            return `<div class="mopt${mosaicConfig.label===o.label?' on':''}" style="${mosaicConfig.label!==o.label?color:''}" onclick="setMosaicConfig(${o.cols},${o.rows},'${o.label}')">${o.label}${hint}</div>`;
        }).join('')}
      </div>
      ${aviso}
    </div>
    ${buildMosaic()}
    <div style="margin-top:10px;display:flex;gap:8px">
      <button class="s-btn negro" style="padding:8px 16px;font-size:12px" onclick="compartirMosaic()">📲 Compartir imagen</button>
    </div>`;
}

function setMosaicTpl(t) { mosaicTpl = t; document.getElementById('panel-imagen').innerHTML = renderPanelImagen(); }
function setMosaicConfig(cols, rows, label) { mosaicConfig={cols,rows,label}; document.getElementById('panel-imagen').innerHTML = renderPanelImagen(); }

function buildMosaic() {
    const {cols, rows} = mosaicConfig;
    const total = cols * rows;
    // Solo los que caben, sin repetir
    const celdas = prodsActuales.slice(0, total);
    const cellSize = Math.min(140, Math.floor(320 / cols));

    const cells = celdas.map(p => {
        const f = buildFlyerInline(p, mosaicTpl, cellSize);
        return `<div class="mosaic-cell" style="width:${cellSize}px;height:${cellSize}px">${f}</div>`;
    }).join('');

    return `<div class="mosaic-wrap">
      <div class="mosaic-grid" style="grid-template-columns:repeat(${cols},${cellSize}px)">${cells}</div>
    </div>`;
}

function buildFlyerInline(p, tpl, size) {
    const tipo = tipoOferta(p);
    const pf = precioFinal(p);
    const conDesc = pf < p.price;
    const ah = conDesc ? p.price - pf : 0;
    const pct = ah > 0 ? Math.round(ah / p.price * 100) : 0;
    const badge = badgeLabel(tipo, p);
    const emoji = getEmoji(p.name);
    const fs = size < 100 ? 0.65 : size < 120 ? 0.75 : 0.9;
    const imgBg = p.image
        ? `<img src="${p.image}" onerror="this.style.display='none'"
             style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.22;z-index:1">`
        : '';
    const extra = tpl==='dark' ? '<div class="facento" style="position:absolute;top:0;left:0;width:3px;height:100%;background:#aa00ff;z-index:2"></div>' : tpl==='fuego' ? '<div class="fg" style="position:absolute;inset:0;background:radial-gradient(ellipse at 65% 80%,#c03000 0%,#700000 50%,#0d0000 100%);z-index:1"></div>' : '';

    const styles = {
        fuego: `background:#0d0000`,
        neon:  `background:#000;border:2px solid #00e676`,
        urgente:`background:#ffd600`,
        dark:  `background:#0a0a0a`,
    };
    const colors = {
        fuego:  {badge:'#ff1744',badgeTxt:'#fff',nombre:'#fff',orig:'#ff8a65',precio:'#ffd600',ahorro:'rgba(255,214,0,.7)',marca:'rgba(255,255,255,.12)'},
        neon:   {badge:'transparent',badgeTxt:'#00e676',nombre:'#fff',orig:'#555',precio:'#00e676',ahorro:'#555',marca:'#111'},
        urgente:{badge:'#000',badgeTxt:'#ffd600',nombre:'#000',orig:'rgba(0,0,0,.4)',precio:'#000',ahorro:'#000',marca:'transparent'},
        dark:   {badge:'transparent',badgeTxt:'#aa00ff',nombre:'#fff',orig:'#444',precio:'#fff',ahorro:'#444',marca:'#1a1a1a'},
    };
    const col = colors[tpl] || colors.fuego;
    const bSz = Math.round(8*fs), nSz = Math.round(11*fs), pSz = Math.round(20*fs), aSz = Math.round(8*fs);
    const pad = Math.round(10*fs);

    return `<div style="width:${size}px;height:${size}px;border-radius:8px;overflow:hidden;position:relative;font-family:Helvetica Neue,Helvetica,Arial,sans-serif;${styles[tpl]||styles.fuego}">
      ${extra}${imgBg}
      <div style="position:absolute;top:${pad}px;left:${pad}px;background:${col.badge};color:${col.badgeTxt};font-size:${bSz}px;font-weight:800;padding:2px 6px;border-radius:12px;letter-spacing:.5px;text-transform:uppercase;z-index:3;${tpl==='neon'?'border:1px solid #00e676':tpl==='dark'?'':''}">
        ${badge}
      </div>
      ${p.image
        ? `<div style="position:absolute;top:${pad}px;right:${pad}px;width:${Math.round(36*fs)}px;height:${Math.round(36*fs)}px;border-radius:6px;overflow:hidden;z-index:3;box-shadow:0 2px 6px rgba(0,0,0,.4)">
            <img src="${p.image}" onerror="this.parentElement.innerHTML='<span style=\'font-size:${Math.round(20*fs)}px\'>${emoji}</span>'"
              style="width:100%;height:100%;object-fit:cover;display:block">
           </div>`
        : `<div style="position:absolute;top:${pad}px;right:${pad}px;font-size:${Math.round(20*fs)}px;z-index:3">${emoji}</div>`
      }
      ${conDesc ? `<div style="position:absolute;left:${pad}px;bottom:${Math.round(44*fs)}px;color:${col.orig};font-size:${Math.round(9*fs)}px;text-decoration:line-through;z-index:3">${fmt(p.price)}</div>` : ''}
      <div style="position:absolute;left:${pad}px;bottom:${Math.round(22*fs)}px;color:${col.precio};font-size:${pSz}px;font-weight:900;z-index:3">${fmt(pf)}</div>
      <div style="position:absolute;left:${pad}px;right:${pad}px;bottom:${Math.round(44*fs)+20}px;color:${col.nombre};font-size:${nSz}px;font-weight:900;line-height:1.2;z-index:3">${p.name}</div>
      <div style="position:absolute;left:${pad}px;bottom:${Math.round(6*fs)}px;color:${col.ahorro};font-size:${aSz}px;z-index:3">${ah>0?'−'+fmt(ah)+' · '+pct+'% OFF':''}</div>
      <div style="position:absolute;bottom:${Math.round(6*fs)}px;right:${pad}px;color:${col.marca};font-size:${Math.round(6*fs)}px;letter-spacing:2px;text-transform:uppercase;z-index:3">Copihue</div>
    </div>`;
}

function compartirMosaic() {
    alert('Para compartir: capturá pantalla del mosaico y envialo por WA. Próxima versión: exportar PNG directo.');
}

function renderPanelTexto() {
    return PLANTILLAS.map(pl => {
        const textoId = 'wa-' + pl.id;
        return `<div class="texto-bloque">
          <div class="salida-head">
            <span class="salida-nombre">${pl.nombre}</span>
            <div class="s-btns">
              <button class="s-btn negro" onclick="copiar('${textoId}',this)">Copiar</button>
              <button class="s-btn" onclick="abrirWA('${textoId}')">📲 WA</button>
            </div>
          </div>
          <div class="wa-txt" id="${textoId}">${buildTexto(prodsActuales, pl.id)}</div>
        </div>`;
    }).join('');
}

function copiar(id, btn) {
    const txt = document.getElementById(id).textContent;
    navigator.clipboard.writeText(txt).then(() => {
        btn.textContent = '✅';
        setTimeout(() => btn.textContent = 'Copiar', 2000);
    });
}

function abrirWA(id) {
    const txt = document.getElementById(id).textContent;
    window.open('https://wa.me/?text=' + encodeURIComponent(txt), '_blank');
}

cargar();
</script>

<div class="fab-bar" id="fab-bar">
  <button class="fab" onclick="irInicio()" title="Inicio">🏠<span>Inicio</span></button>
  <div class="fab-sep"></div>
  <button class="fab" onclick="buscarConHistorial()" title="Buscar">🔍<span>Buscar</span></button>
  <div class="fab-sep"></div>
  <button class="fab" onclick="agregarTodo()" title="Agregar todo">✅<span>Todo</span></button>
  <button class="fab" onclick="limpiarTodo()" title="Limpiar">🗑<span>Limpiar</span></button>
  <div class="fab-sep"></div>
  <button class="fab" onclick="recargar()" title="Recargar datos">🔄<span>Recargar</span></button>
  <div class="fab-sep"></div>
  <button class="fab fab-generar" onclick="generarSalidas()" title="Generar">⚡<span>Generar</span></button>
</div>

<div id="buscador-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:flex-start;justify-content:center;padding-top:60px">
  <div style="background:#fff;border-radius:14px;padding:16px;width:90%;max-width:400px">
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input id="buscar-input" type="text" placeholder="Buscar producto..." oninput="filtrarBusqueda()"
        style="flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:15px;font-family:inherit">
      <button onclick="cerrarBuscar()" style="padding:8px 14px;border-radius:8px;border:none;background:#111;color:#fff;font-size:13px;cursor:pointer">✕</button>
    </div>
    <div id="buscar-resultados" style="max-height:50vh;overflow-y:auto;display:flex;flex-direction:column;gap:6px"></div>
  </div>
</div>

<script>
function irInicio(){window.scrollTo({top:0,behavior:'smooth'});}

// Interceptar botón atrás del navegador
window.addEventListener('popstate', function(e) {
    const overlay = document.getElementById('buscador-overlay');
    if (overlay && overlay.style.display !== 'none') {
        cerrarBuscar();
    }
});
function buscarConHistorial() {
    history.pushState({buscador: true}, '');
    buscar();
}

function buscar(){
  document.getElementById('buscador-overlay').style.display='flex';
  setTimeout(()=>document.getElementById('buscar-input').focus(),100);
  filtrarBusqueda();
}
function cerrarBuscar(){
  document.getElementById('buscador-overlay').style.display='none';
}
function filtrarBusqueda(){
  const q=document.getElementById('buscar-input').value.toLowerCase();
  const res=document.getElementById('buscar-resultados');
  // Busca en TODOS los productos con stock, sin importar si tienen oferta
  const lista=todosLosProductos.filter(p=>p.stock>0&&(!q||p.name.toLowerCase().includes(q)));
  if(!lista.length){res.innerHTML='<div style="color:#bbb;text-align:center;padding:20px;font-size:13px">Sin resultados</div>';return;}
  res.innerHTML=lista.slice(0,50).map(p=>{
    const tipo=tipoOferta(p);
    const pf=precioFinal(p);
    const isSel=seleccionados.has(String(p.id));
    const badgeTxt=tipo?`<span style="background:#222;color:#aaa;font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;text-transform:uppercase;margin-left:4px">${badgeLabel(tipo,p)}</span>`:'';
    return `<div onclick="selDesdeBuscar('${p.id}')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1.5px solid ${isSel?'#22c55e':'#eee'};background:${isSel?'#e8fdf0':'#fafafa'};cursor:pointer;transition:all .1s">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${getEmoji(p.name)} ${p.name}</div>
        <div style="font-size:12px;color:#888;margin-top:2px">${fmt(pf)}${badgeTxt}</div>
      </div>
      <div style="font-size:22px;flex-shrink:0">${isSel?'✅':'⬜'}</div>
    </div>`;
  }).join('');
}
function selDesdeBuscar(id){
  const key=String(id);
  const div=document.querySelector('[data-pid="'+key+'"]');
  if(seleccionados.has(key)){
    seleccionados.delete(key);
    if(div) div.classList.remove('sel');
  } else {
    seleccionados.add(key);
    if(div) div.classList.add('sel');
  }
  actualizarBarra();
  filtrarBusqueda();
}

function agregarTodo(){
  productosFiltrados().forEach(p=>seleccionados.add(String(p.id)));
  renderGrilla();
  actualizarBarra();
}
function limpiarTodo(){
  seleccionados.clear();
  renderGrilla();
  actualizarBarra();
  document.getElementById('zona-salidas').innerHTML='';
}
function recargar(){
  seleccionados.clear();
  todosLosProductos=[];
  document.getElementById('zona-salidas').innerHTML='';
  document.getElementById('grilla').innerHTML='';
  document.getElementById('filtros').style.display='none';
  cargar();
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
