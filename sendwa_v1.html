<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<title>SendWA Copihue v37</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f0ee;color:#111;min-height:100vh}

/* ── LAYOUT ── */
.wrap{max-width:900px;margin:0 auto;padding:16px}
h1{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#aaa;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* ── ESTADO ── */
.estado{background:#fff;border:0.5px solid #e5e5e5;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#666;display:flex;align-items:center;gap:8px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.cargando{background:#f59e0b;animation:pulso 1s infinite}
.dot.ok{background:#22c55e}
.dot.error{background:#ef4444}
@keyframes pulso{0%,100%{opacity:1}50%{opacity:.3}}

/* ── FILTROS ── */
.filtros{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .12s;user-select:none;opacity:.55}
.chip.on{opacity:1;transform:scale(1.06)}
/* Colores siempre visibles */
.chip[data-t="ofertas"]{background:#111;color:#fff;border-color:#111}
.chip[data-t="promo"]{background:#6A0DAD;color:#E8C5FF;border-color:#6A0DAD}
.chip[data-t="combo"]{background:#7B3F2A;color:#F4C9B5;border-color:#7B3F2A}
.chip[data-t="relampago"]{background:#C8A800;color:#000;border-color:#C8A800}
.chip[data-t="destacada"]{background:#E07000;color:#fff;border-color:#E07000}
.chip[data-t="especial"]{background:#008B9A;color:#fff;border-color:#008B9A}
.chip[data-t="ultimas"]{background:#CC1020;color:#fff;border-color:#CC1020}
.chip[data-t="cervecero"]{background:#0d3b66;color:#90c8ff;border-color:#0d3b66}
.chip[data-t="sinoferta"]{background:#888;color:#fff;border-color:#888}

/* ── GRILLA PRODUCTOS ── */
.grilla{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.prod{background:#fff;border:2.5px solid #e5e5e5;border-radius:12px;padding:0;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.prod:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.prod-bloqueado{opacity:.5;cursor:default}
.prod-bloqueado:hover{transform:none;box-shadow:none}
.prod[data-tipo="fuera"]{border-color:#555}
@media(hover:none){.prod:hover{transform:none;box-shadow:none}}
.prod.sel{box-shadow:0 0 0 3px currentColor}
.prod.sel::after{content:'✓';position:absolute;top:8px;right:8px;font-size:16px;font-weight:900;color:#22c55e;background:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.2)}
/* Colores de borde por tipo */
.prod[data-tipo="promo"]{border-color:#6A0DAD}
.prod[data-tipo="combo"]{border-color:#7B3F2A}
.prod[data-tipo="relampago"]{border-color:#C8A800}
.prod[data-tipo="destacada"]{border-color:#E07000}
.prod[data-tipo="especial"]{border-color:#008B9A}
.prod[data-tipo="ultimas"]{border-color:#CC1020}
.prod[data-tipo="cervecero"]{border-color:#0d3b66}
.prod[data-tipo="sinoferta"]{border-color:#aaa}
/* Fondo sutil al seleccionar */
.prod[data-tipo="promo"].sel{background:#f5eeff}
.prod[data-tipo="combo"].sel{background:#fff5f0}
.prod[data-tipo="relampago"].sel{background:#fffbe6}
.prod[data-tipo="destacada"].sel{background:#fff4e6}
.prod[data-tipo="especial"].sel{background:#e6f7f9}
.prod[data-tipo="ultimas"].sel{background:#fff0f0}
.prod[data-tipo="sinoferta"].sel{background:#f5f5f5}
/* Info dentro del card */
.prod-info{padding:10px 12px 12px}
.prod-nombre{font-size:13px;font-weight:800;line-height:1.25;margin-bottom:4px;color:#111}
.prod-precio{font-size:20px;font-weight:900;color:#111;margin-bottom:1px}
.prod-precio-orig{font-size:12px;color:#bbb;text-decoration:line-through;margin-bottom:2px}
.prod-ahorro{font-size:11px;color:#22c55e;font-weight:700;margin-top:2px}
.prod-urgencia{font-size:10px;color:#e07000;font-weight:700;margin-top:3px;letter-spacing:.3px}
/* Tira de color arriba según tipo */
.prod-stripe{height:4px;width:100%}
.prod[data-tipo="promo"] .prod-stripe{background:#6A0DAD}
.prod[data-tipo="combo"] .prod-stripe{background:#7B3F2A}
.prod[data-tipo="relampago"] .prod-stripe{background:#C8A800}
.prod[data-tipo="destacada"] .prod-stripe{background:#E07000}
.prod[data-tipo="especial"] .prod-stripe{background:#008B9A}
.prod[data-tipo="ultimas"] .prod-stripe{background:#CC1020}
.prod[data-tipo="cervecero"] .prod-stripe{background:#0d3b66}
.prod[data-tipo="sinoferta"] .prod-stripe{background:#ccc}
.prod-nombre{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:6px;padding-right:14px}
.prod-precio{font-size:15px;font-weight:700;color:#111}
.prod-precio-orig{font-size:11px;color:#aaa;text-decoration:line-through}
.prod-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
.badge-promo{background:#6A0DAD;color:#E8C5FF}
.badge-combo{background:#7B3F2A;color:#F4C9B5}
.badge-relampago{background:#C8A800;color:#000;font-weight:900}
.badge-destacada{background:#E07000;color:#fff}
.badge-especial{background:#008B9A;color:#fff}
.badge-ultimas{background:#CC1020;color:#fff}
.badge-cervecero{background:#0d3b66;color:#90c8ff}

/* ── BARRA SELECCIÓN ── */
.barra{background:#111;color:#fff;border-radius:12px;padding:10px 16px;margin-bottom:14px;align-items:center;gap:12px;display:none;font-size:13px;font-weight:600}
.barra.vis{display:flex}
.barra-txt{flex:1;font-size:13px}
.barra-btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:#fff;color:#111}
.barra-btn:hover{background:#e5e5e5}

/* ── SALIDAS ── */
.salidas-titulo{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin-bottom:12px}
.salidas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:24px}

/* ── CADA SALIDA ── */
.salida{background:#fff;border:0.5px solid #ddd;border-radius:12px;overflow:hidden}
.salida-head{padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid #eee;background:#fafafa}
.salida-nombre{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#888}
.s-btns{display:flex;gap:5px}
.s-btn{padding:4px 9px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;border:0.5px solid #ddd;background:#fff;color:#555}
.s-btn:hover{background:#f0f0f0}
.s-btn.negro{background:#111;color:#fff;border-color:#111}

/* ── FLYERS ── */
.flyer-wrap{padding:10px;display:flex;justify-content:center;background:#ebebeb}
.flyer{width:220px;height:220px;border-radius:10px;position:relative;overflow:hidden;flex-shrink:0;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}

.f-fuego{background:#0d0000}
.f-fuego .fg{position:absolute;inset:0;background:radial-gradient(ellipse at 65% 80%,#c03000 0%,#700000 50%,#0d0000 100%)}
.f-fuego .fbadge{position:absolute;top:11px;left:11px;background:#ff1744;color:#fff;font-size:8px;font-weight:800;padding:3px 8px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;z-index:2}
.f-fuego .fmoji{position:absolute;top:9px;right:11px;font-size:30px;z-index:2}
.f-fuego .fnombre{position:absolute;left:11px;right:42px;top:46px;color:#fff;font-size:13px;font-weight:900;line-height:1.2;z-index:2}
.f-fuego .forig{position:absolute;left:11px;bottom:50px;color:#ff8a65;font-size:10px;text-decoration:line-through;opacity:.8;z-index:2}
.f-fuego .fprecio{position:absolute;left:11px;bottom:26px;color:#ffd600;font-size:26px;font-weight:900;z-index:2}
.f-fuego .fahorro{position:absolute;left:11px;bottom:9px;color:rgba(255,214,0,.65);font-size:9px;z-index:2}
.f-fuego .fmarca{position:absolute;bottom:9px;right:11px;color:rgba(255,255,255,.12);font-size:7px;letter-spacing:2px;text-transform:uppercase;z-index:2}

.f-neon{background:#000;border:2px solid #00e676}
.f-neon .fbadge{position:absolute;top:11px;left:11px;color:#00e676;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:1px solid #00e676;padding:2px 7px;border-radius:2px}
.f-neon .fmoji{position:absolute;top:9px;right:11px;font-size:28px}
.f-neon .fnombre{position:absolute;left:11px;right:42px;top:46px;color:#fff;font-size:13px;font-weight:900;line-height:1.2}
.f-neon .forig{position:absolute;left:11px;bottom:50px;color:#444;font-size:10px;text-decoration:line-through}
.f-neon .fprecio{position:absolute;left:11px;bottom:26px;color:#00e676;font-size:26px;font-weight:900}
.f-neon .fahorro{position:absolute;left:11px;bottom:9px;color:#444;font-size:9px}
.f-neon .fmarca{position:absolute;bottom:9px;right:11px;color:#111;font-size:7px;letter-spacing:2px;text-transform:uppercase}

.f-urgente{background:#ffd600}
.f-urgente .fbadge{position:absolute;top:0;left:0;right:0;background:#000;color:#ffd600;font-size:9px;font-weight:800;padding:5px 11px;letter-spacing:2px;text-transform:uppercase;text-align:center}
.f-urgente .fmoji{position:absolute;top:28px;right:11px;font-size:34px}
.f-urgente .fnombre{position:absolute;left:11px;right:52px;top:36px;color:#000;font-size:13px;font-weight:900;line-height:1.2}
.f-urgente .forig{position:absolute;left:11px;bottom:50px;color:rgba(0,0,0,.4);font-size:10px;text-decoration:line-through}
.f-urgente .fprecio{position:absolute;left:11px;bottom:26px;color:#000;font-size:26px;font-weight:900}
.f-urgente .fahorro{position:absolute;left:0;right:0;bottom:0;background:#000;color:#ffd600;font-size:9px;font-weight:700;padding:4px 11px;text-align:center}
.f-urgente .fmarca{display:none}

.f-dark{background:#0a0a0a}
.f-dark .facento{position:absolute;top:0;left:0;width:3px;height:100%;background:#aa00ff}
.f-dark .fbadge{position:absolute;top:11px;left:15px;color:#aa00ff;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.f-dark .fmoji{position:absolute;top:9px;right:11px;font-size:28px}
.f-dark .fnombre{position:absolute;left:15px;right:42px;top:30px;color:#fff;font-size:13px;font-weight:900;line-height:1.2}
.f-dark .forig{position:absolute;left:15px;bottom:50px;color:#333;font-size:10px;text-decoration:line-through}
.f-dark .fprecio{position:absolute;left:15px;bottom:26px;color:#fff;font-size:26px;font-weight:900}
.f-dark .fahorro{position:absolute;left:15px;bottom:9px;color:#444;font-size:9px}
.f-dark .fmarca{position:absolute;bottom:9px;right:11px;color:#1a1a1a;font-size:7px;letter-spacing:2px;text-transform:uppercase}

/* ── TEXTO WA ── */
.wa-txt{background:#0b141a;margin:0 10px 10px;border-radius:8px;padding:9px 11px;font-size:11px;color:#e9ede9;line-height:1.75;white-space:pre-wrap;word-break:break-word;max-height:120px;overflow-y:auto}

.empty{padding:50px 20px;text-align:center;color:#bbb;font-size:13px;line-height:1.6}

/* ── TABS SALIDAS ── */
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #ddd;background:#fff;color:#555;transition:all .12s}
.tab.on{background:#111;color:#fff;border-color:#111}

/* ── GRILLA MOSAICO ── */
.mosaic-opts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.mopt{padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #ddd;background:#fff;color:#555}
.mopt.on{background:#111;color:#fff;border-color:#111}
.mosaic-wrap{background:#111;border-radius:12px;padding:8px;display:inline-block}
.mosaic-grid{display:grid;gap:4px}
.mosaic-cell{border-radius:6px;overflow:hidden;position:relative}

/* ── BLOQUE TEXTO SALIDA ── */
.texto-bloque{background:#fff;border:0.5px solid #ddd;border-radius:12px;overflow:hidden;margin-bottom:12px}

@media(max-width:480px){.salidas-grid{grid-template-columns:1fr}}

/* ── FAB flotante ── */
.fab-bar{
  position:fixed;bottom:12px;left:8px;right:8px;
  display:flex;gap:4px;align-items:center;
  background:#111;border-radius:40px;padding:6px 10px;
  box-shadow:0 4px 20px rgba(0,0,0,.35);z-index:999;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;justify-content:space-between
}
.fab-bar::-webkit-scrollbar{display:none}
.fab{display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:5px 8px;border-radius:28px;cursor:pointer;border:none;
  font-size:20px;background:transparent;color:#fff;transition:background .12s;line-height:1;flex-shrink:0}
.fab span{font-size:8px;font-weight:600;letter-spacing:.3px;color:#888;text-transform:uppercase}
.fab:hover{background:#222}
.fab.fab-generar{background:#22c55e;padding:6px 14px;flex-shrink:0}
.fab.fab-generar span{color:rgba(255,255,255,.8)}
.fab-sep{width:1px;height:28px;background:#2a2a2a;flex-shrink:0}
/* espacio abajo para que el FAB no tape contenido */
.wrap{padding-bottom:100px}
</style>

<div class="wrap">

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
  <div style="display:flex;align-items:center;gap:10px">
    <div style="width:36px;height:36px;border-radius:50%;background:#22c55e;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🌿</div>
    <div>

    </div>
  </div>
  <span style="background:#111;color:#fff;font-size:10px;padding:3px 8px;border-radius:10px;font-weight:700;letter-spacing:1px">v37</span>
</div>

<!-- ESTADO CONEXIÓN -->
<div class="estado" id="estado">
  <div class="dot cargando" id="dot"></div>
  <span id="estado-txt">Conectando con la planilla...</span>

<!-- FILTROS -->
<div class="filtros" id="filtros" style="display:none">
  <div class="chip on" data-t="ofertas" onclick="filtrar(this)">🏷 Ofertas</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzWZzDvdGfW8vd2-FpQolT852cdPMeHbfKugn9DBOlju75bE1D0SUNB5EKEDOsI2vP4lA/exec';
const API_TIMEOUT_MS = 25000;

let todosLosProductos = [];

// Pools de ofertas activas — se llenan desde getOfertas
const poolIds = {
    relampago:  new Set(),
    destacado:  new Set(),
    especial:   new Set(),
    ultimas:    new Set(),
    recientes:  new Set(),
};
let filtroActivo = 'ofertas';
let seleccionados = new Set();

// ── LOG HELPERS ──────────────────────────────────────────────
function _ts() {
    const d = new Date();
    return '[' + d.getHours().toString().padStart(2,'0') + ':' +
                 d.getMinutes().toString().padStart(2,'0') + ':' +
                 d.getSeconds().toString().padStart(2,'0') + '.' +
                 d.getMilliseconds().toString().padStart(3,'0') + ']';
}
function logInfo(msg)  { console.log( '%c' + _ts() + ' ℹ️  ' + msg, 'color:#3b82f6;font-weight:600'); }
function logOk(msg)    { console.log( '%c' + _ts() + ' ✅ ' + msg, 'color:#22c55e;font-weight:600'); }
function logWarn(msg)  { console.warn('%c' + _ts() + ' ⚠️  ' + msg, 'color:#f59e0b;font-weight:600'); }
function logError(msg) { console.error('%c' + _ts() + ' ❌ ' + msg, 'color:#ef4444;font-weight:700'); }
function logStep(msg)  { console.groupCollapsed('%c' + _ts() + ' 🔄 ' + msg, 'color:#a855f7;font-weight:700'); }
function logEnd()      { console.groupEnd(); }

// ── ESTADO VISUAL CON DETALLE ─────────────────────────────────
let _estadoTimer = null;
function setEstadoCargando(paso, detalle) {
    const dot = document.getElementById('dot');
    dot.className = 'dot cargando';
    document.getElementById('estado-txt').textContent = paso + (detalle ? '  —  ' + detalle : '');
}

// Contador regresivo si tarda más de X segundos
function _iniciarWatchdog(label, msMax) {
    if (_estadoTimer) clearInterval(_estadoTimer);
    const t0 = Date.now();
    _estadoTimer = setInterval(() => {
        const elapsed = Math.round((Date.now() - t0) / 1000);
        const left    = Math.max(0, Math.round((msMax - (Date.now() - t0)) / 1000));
        setEstadoCargando(label, elapsed + 's transcurridos… timeout en ' + left + 's');
    }, 1000);
}
function _clearWatchdog() {
    if (_estadoTimer) { clearInterval(_estadoTimer); _estadoTimer = null; }
}

// ── API FETCH CON LOGS ────────────────────────────────────────
async function _apiFetch(action, data = null) {
    const url = data
        ? API_URL + '?action=' + action + '&data=' + encodeURIComponent(JSON.stringify(data)) + '&t=' + Date.now()
        : API_URL + '?action=' + action + '&t=' + Date.now();

    logInfo('→ fetch(' + action + ')  URL: ' + url.substring(0, 90) + '…');
    const t0 = Date.now();

    let resp;
    try {
        resp = await fetch(url, { redirect: 'follow', signal: AbortSignal.timeout(API_TIMEOUT_MS) });
    } catch(err) {
        const ms = Date.now() - t0;
        if (err.name === 'TimeoutError' || err.name === 'AbortError') {
            logError('TIMEOUT en ' + action + ' (' + ms + 'ms — límite ' + API_TIMEOUT_MS + 'ms)');
            throw new Error('Timeout después de ' + Math.round(ms/1000) + 's en ' + action);
        }
        logError('Red/fetch fallido en ' + action + ': ' + err.message);
        throw err;
    }

    logInfo('← HTTP ' + resp.status + ' en ' + action + ' (' + (Date.now()-t0) + 'ms)  Content-Type: ' + (resp.headers.get('content-type')||'?'));

    const text = await resp.text();
    logInfo('   Respuesta raw (' + text.length + ' bytes): ' + text.substring(0, 120) + (text.length > 120 ? '…' : ''));

    let parsed;
    try {
        parsed = JSON.parse(text);
    } catch(e) {
        logError('JSON inválido en ' + action + ': ' + e.message);
        logError('Texto completo recibido: ' + text.substring(0, 500));
        throw new Error('Respuesta no es JSON en ' + action + ': ' + e.message);
    }

    logOk('   Parsed OK — keys: ' + Object.keys(parsed).join(', '));
    return parsed;
}

function fmt(n) { const num = typeof n === 'string' ? parseFloat(n) : n; return '$' + (isNaN(num) ? 0 : Math.round(num)).toLocaleString('es-AR'); }

function simplificarNombre(nombre) {
    return nombre.toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9 ]/g, "")
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .trim();
}

function getEmoji(nombre) {
    const n = (nombre || '').toLowerCase();
    if (n.includes('cerveza') || n.includes('birra')) return '🍺';
    if (n.includes('gaseosa') || n.includes('coca') || n.includes('pepsi') || n.includes('sprite') || n.includes('7up') || n.includes('fanta')) return '🥤';
    if (n.includes('yerba')) return '🧉';
    if (n.includes('pan') || n.includes('lactal') || n.includes('medialuna') || n.includes('facturas')) return '🍞';
    if (n.includes('aceite')) return '🫒';
    if (n.includes('queso')) return '🧀';
    if (n.includes('jamón') || n.includes('jamon') || n.includes('salchicha') || n.includes('salame') || n.includes('mortadela')) return '🥩';
    if (n.includes('fideo') || n.includes('pasta') || n.includes('spaghet')) return '🍝';
    if (n.includes('leche')) return '🥛';
    if (n.includes('agua')) return '💧';
    if (n.includes('vino')) return '🍷';
    if (n.includes('pollo')) return '🍗';
    if (n.includes('arroz')) return '🍚';
    if (n.includes('azucar') || n.includes('azúcar')) return '🍬';
    if (n.includes('cafe') || n.includes('café')) return '☕';
    if (n.includes('manteca') || n.includes('mantequilla')) return '🧈';
    if (n.includes('huevo')) return '🥚';
    if (n.includes('tomate') || n.includes('verdura') || n.includes('lechuga')) return '🥦';
    if (n.includes('jabón') || n.includes('jabon') || n.includes('detergente') || n.includes('lavandina')) return '🧴';
    if (n.includes('papel') || n.includes('servilleta')) return '🧻';
    return '🛒';
}

function tipoOferta(p) {
    if (!p || p.stock <= 0) return null;
    return p.offerType || null;
}

function precioFinal(p) {
    return p.discountPrice || p.price;
}

function badgeLabel(tipo, p) {
    if (tipo === 'promo')     return '🏷 PROMO';
    if (tipo === 'combo')     return '🎁 COMBO';
    if (tipo === 'relampago') return '⚡ RELÁMPAGO';
    if (tipo === 'destacada' || tipo === 'destacado') return '⭐ ' + (p.destacada||15) + '% OFF';
    if (tipo === 'especial')  return '💙 10% ESP.';
    if (tipo === 'ultimas')   return '⏳ ÚLTIMAS';
    if (tipo === 'cervecero') return '🍺 CERVECERO';
    return 'OFERTA';
}

function badgeCls(tipo) {
    return {
        promo:'badge-promo', combo:'badge-combo', relampago:'badge-relampago',
        destacada:'badge-destacada', destacado:'badge-destacada',
        especial:'badge-especial', ultimas:'badge-ultimas', cervecero:'badge-cervecero'
    }[tipo] || '';
}

async function cargar() {
    console.group('%c🚀 SendWA — inicio de carga', 'color:#a855f7;font-size:13px;font-weight:700');
    logInfo('API_URL: ' + API_URL);
    logInfo('Timeout configurado: ' + API_TIMEOUT_MS + 'ms');

    // ── PASO 1: pools ────────────────────────────────────────
    setEstadoCargando('1/2 · Cargando pools de ofertas…');
    _iniciarWatchdog('1/2 · Cargando pools de ofertas…', API_TIMEOUT_MS);
    logStep('PASO 1 — getOfertas');
    const t1 = Date.now();
    let dataOfertas;
    try {
        dataOfertas = await _apiFetch('getOfertas');
        _clearWatchdog();
        logEnd();
        logOk('PASO 1 completado en ' + (Date.now()-t1) + 'ms  success=' + dataOfertas?.success);

        if (dataOfertas && dataOfertas.success) {
            poolIds.relampago.clear();
            poolIds.destacado.clear();
            poolIds.especial.clear();
            poolIds.ultimas.clear();
            (dataOfertas.relampagoActivo   || []).forEach(p => poolIds.relampago.add(Number(p.id)));
            (dataOfertas.destacadasActivas || []).forEach(p => poolIds.destacado.add(Number(p.id)));
            (dataOfertas.especialesActivas || []).forEach(p => poolIds.especial.add(Number(p.id)));
            const ults = dataOfertas.ultimasSeleccionadasSiempre || dataOfertas.ultimasSeleccionadas || [];
            ults.forEach(p => poolIds.ultimas.add(Number(p.id)));
            if (dataOfertas.poolRecienLlegados && Array.isArray(dataOfertas.poolRecienLlegados)) {
                poolIds.recientes = new Set(dataOfertas.poolRecienLlegados.map(p => Number(p.id)));
            }
            window._horariosOferta = dataOfertas.horariosOferta || {};
            logInfo('Pools — relampago:' + poolIds.relampago.size +
                    ' destacado:' + poolIds.destacado.size +
                    ' especial:' + poolIds.especial.size +
                    ' ultimas:' + poolIds.ultimas.size);
        } else {
            logWarn('getOfertas devolvió success=false — pools quedarán vacíos');
            logWarn('Respuesta completa: ' + JSON.stringify(dataOfertas).substring(0,300));
        }
    } catch(e) {
        _clearWatchdog();
        logEnd();
        logError('PASO 1 FALLÓ: ' + e.message);
        setEstado('error', '⚠️ Paso 1 fallido: ' + e.message);
        console.groupEnd();
        return;
    }

    // ── PASO 2: productos ─────────────────────────────────────
    setEstadoCargando('2/2 · Cargando catálogo de productos…');
    _iniciarWatchdog('2/2 · Cargando catálogo de productos…', API_TIMEOUT_MS);
    logStep('PASO 2 — getProductos');
    const t2 = Date.now();
    let dataProds;
    try {
        dataProds = await _apiFetch('getProductos');
        _clearWatchdog();
        logEnd();
        logOk('PASO 2 completado en ' + (Date.now()-t2) + 'ms');
        const rows = Array.isArray(dataProds) ? dataProds : (dataProds.productos || dataProds.items || []);
        logInfo('Filas recibidas: ' + rows.length + '  (Array directo: ' + Array.isArray(dataProds) + ')');

        // 3. Cruzar producto + pool
        todosLosProductos = rows
            .filter(r => r && r.name && parseFloat(r.price||0) > 0)
            .map(r => {
                const id    = String(r.id || '');
                const price = parseFloat(r.price || 0);
                const stock = parseFloat(r.stock ?? 1);
                let offerType    = null;
                let discountPrice = null;

                if (poolIds.relampago.has(Number(id))) {
                    offerType = 'relampago';
                    const val = parseInt(r.relampago) || 0;
                    const pctMap = {11:10,12:15,13:20,14:25,15:30};
                    const nxmMap = {1:0.5,2:0.667,3:0.75,4:0.8,5:0.833,6:0.857,10:0.75};
                    if (pctMap[val] !== undefined) discountPrice = Math.round(price*(1-pctMap[val]/100));
                    else if (nxmMap[val] !== undefined) discountPrice = Math.round(price*nxmMap[val]);
                    else discountPrice = price;
                } else if (poolIds.destacado.has(Number(id))) {
                    offerType = 'destacada';
                    const pct = parseFloat(r.destacada) || 15;
                    discountPrice = Math.round(price*(1-pct/100));
                } else if (poolIds.especial.has(Number(id))) {
                    offerType = 'especial';
                    discountPrice = Math.round(price*0.9);
                } else if (poolIds.ultimas.has(Number(id))) {
                    offerType = 'ultimas';
                    discountPrice = price;
                } else {
                    // PROMO y COMBO — directo de categoriaOferta, sin pool
                    const rawCat = String(r.categoriaOferta || r.catOferta || '').toUpperCase().trim();
                    if (rawCat === 'PROMO ACTIVA' || rawCat.startsWith('PROMO')) {
                        offerType = 'promo';
                        const normal = parseFloat(r.normal || r['$promos/combos'] || 0);
                        if (normal > 0 && normal < price) discountPrice = normal;
                    } else if (rawCat === 'COMBO ACTIVO' || rawCat.startsWith('COMBO')) {
                        offerType = 'combo';
                        const normal = parseFloat(r.normal || r['$promos/combos'] || 0);
                        if (normal > 0 && normal < price) discountPrice = normal;
                    }
                }

                return {
                    id,
                    name:         String(r.name || '').trim(),
                    price,
                    stock,
                    offerType,
                    discountPrice,
                    tipo:         offerType, // alias para compatibilidad
                    precioFinalVal: discountPrice || price,
                    relampago:    r.relampago,
                    destacada:    parseFloat(r.destacada) || 0,
                    especial:     parseInt(r.especial) || 0,
                    catOferta:    String(r.categoriaOferta || r.catOferta || '').trim().toUpperCase(),
                    normal:       parseFloat(r.normal || 0),
                    image:        'imagenes-productos/' + simplificarNombre(String(r.name||'').trim()) + '.jpg',
                };
            });

        const conOferta = todosLosProductos.filter(p => p.offerType && p.stock > 0).length;
        const sinStock  = todosLosProductos.filter(p => p.stock <= 0).length;
        const sinOferta = todosLosProductos.filter(p => !p.offerType && p.stock > 0).length;
        logOk('✅ Carga completa — conOferta:' + conOferta + ' sinOferta:' + sinOferta + ' sinStock:' + sinStock);
        setEstado('ok', conOferta + ' con oferta · ' + sinOferta + ' sin oferta · ' + sinStock + ' sin stock');
        document.getElementById('filtros').style.display = 'flex';
        renderGrilla();

    } catch(e) {
        _clearWatchdog();
        logEnd();
        logError('PASO 2 FALLÓ: ' + e.message);
        setEstado('error', '⚠️ Paso 2 fallido: ' + e.message);
        console.groupEnd();
        return;
    }

    console.groupEnd(); // fin grupo carga
}
