<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Copihue — Punto de Venta</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        :root {
            --verde: #991b1b;
            --verde-oscuro: #7f1d1d;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f4f0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #7f1d1d, #991b1b);
            color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-titulo {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .btn-vendedor {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.8rem;
            color: white;
            cursor: pointer;
        }

        .indicador-carga {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #ff5252;
            display: inline-block;
            margin-left: 8px;
        }
        .indicador-carga.ok { background: #69f0ae; }

        .buscador {
            background: white;
            padding: 12px 16px;
            border-bottom: 1px solid #ddd;
        }

        .buscador input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid var(--verde);
            border-radius: 30px;
            outline: none;
        }

        .resultados {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .resultado-item {
            background: white;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            border: 2px solid transparent;
        }
        .resultado-item.en-carrito { border-color: #a5d6a7; }
        .resultado-item.sin-stock { opacity: 0.6; }

        .resultado-img {
            width: 46px; height: 46px;
            border-radius: 8px;
            object-fit: cover;
            background: #e8f5e9;
            flex-shrink: 0;
            cursor: pointer;
        }

        .resultado-info {
            flex: 1;
            min-width: 0;
        }

        .resultado-nombre {
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .resultado-stock {
            font-size: 0.7rem;
            color: #757575;
        }

        .resultado-precio {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--verde-oscuro);
            flex-shrink: 0;
        }

        .badge-carrito {
            background: #e53935;
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: 900;
            margin-left: 5px;
        }

        .panel-venta {
            background: white;
            border-top: 2px solid #e0e0e0;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .total-monto {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--verde-oscuro);
        }

        .btn-confirmar {
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
        }
        .btn-confirmar:disabled { background: #ccc; }

        .modal-cantidad {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 4500;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-cantidad .modal-sheet {
            background: #1e1e2e;
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .teclado-input {
            background: #0a0a14;
            color: white;
            font-size: 2rem;
            font-weight: 900;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            margin: 16px 0;
        }

        .teclado-fila {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }

        .tecla {
            flex: 1;
            height: 52px;
            border: none;
            border-radius: 12px;
            background: #2a2a3a;
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
        }
        .tecla:active { background: #3a3a4a; }
        .tecla-ok { background: #2e7d32; flex: 2; }
        .tecla-borrar { background: #b71c1c; }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            z-index: 5000;
            display: none;
        }
        .toast.visible { display: block; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-titulo">
        🏪 Copihue
        <span class="indicador-carga" id="indicadorCarga"></span>
    </div>
    <button class="btn-vendedor" id="btnVendedor" onclick="abrirSelectorVendedor()">👤 Víctor</button>
</div>

<div class="buscador">
    <input type="text" id="buscador" placeholder="🔍 Buscar producto..." autocomplete="off">
</div>

<div class="resultados" id="resultados"></div>

<div class="panel-venta">
    <span class="total-monto" id="totalMonto">$0</span>
    <button class="btn-confirmar" id="btnConfirmar" onclick="abrirConfirmacion()" disabled>✅ Cobrar</button>
</div>

<!-- MODAL CANTIDAD CON TECLADO -->
<div class="modal-cantidad" id="modalCantidad" onclick="if(event.target===this) cerrarModalCantidad()">
    <div class="modal-sheet">
        <div style="display:flex;justify-content:space-between;color:white;margin-bottom:16px;">
            <span id="cantidadProductoNombre" style="font-weight:700;"></span>
            <button onclick="cerrarModalCantidad()" style="background:none;border:none;color:#666;font-size:1.2rem;">✕</button>
        </div>
        
        <div class="teclado-input" id="cantidadDisplay">1</div>
        
        <!-- TECLADO SIMPLE -->
        <div class="teclado-fila">
            <button class="tecla" onclick="teclaNumero('1')">1</button>
            <button class="tecla" onclick="teclaNumero('2')">2</button>
            <button class="tecla" onclick="teclaNumero('3')">3</button>
            <button class="tecla tecla-borrar" onclick="teclaBorrar()">⌫</button>
        </div>
        <div class="teclado-fila">
            <button class="tecla" onclick="teclaNumero('4')">4</button>
            <button class="tecla" onclick="teclaNumero('5')">5</button>
            <button class="tecla" onclick="teclaNumero('6')">6</button>
            <button class="tecla" onclick="teclaIncrementar(1)">+1</button>
        </div>
        <div class="teclado-fila">
            <button class="tecla" onclick="teclaNumero('7')">7</button>
            <button class="tecla" onclick="teclaNumero('8')">8</button>
            <button class="tecla" onclick="teclaNumero('9')">9</button>
            <button class="tecla" onclick="teclaIncrementar(5)">+5</button>
        </div>
        <div class="teclado-fila">
            <button class="tecla" onclick="teclaNumero('0')">0</button>
            <button class="tecla" onclick="teclaNumero('00')">00</button>
            <button class="tecla tecla-ok" onclick="confirmarCantidad()">✓</button>
            <button class="tecla" onclick="teclaIncrementar(10)">+10</button>
        </div>
        
        <div style="color:#f9a825;text-align:center;margin-top:12px;font-size:1.2rem;font-weight:900;" id="cantidadTotal">$0</div>
    </div>
</div>

<!-- MODAL VENDEDOR -->
<div class="modal-cantidad" id="modalVendedor" onclick="if(event.target===this) cerrarModalVendedor()">
    <div class="modal-sheet">
        <div style="padding:16px;">
            <h3 style="color:white;margin-bottom:16px;">👤 Seleccioná vendedor</h3>
            <button class="vendedor-btn" onclick="seleccionarVendedor('Víctor')" style="display:block;width:100%;padding:14px;margin-bottom:8px;border:2px solid #e0e0e0;border-radius:12px;">Víctor</button>
            <button class="vendedor-btn" onclick="seleccionarVendedor('Sebastián')" style="display:block;width:100%;padding:14px;margin-bottom:8px;border:2px solid #e0e0e0;border-radius:12px;">Sebastián</button>
            <button class="vendedor-btn" onclick="seleccionarVendedor('Martín')" style="display:block;width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:12px;">Martín</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// Variables
let productos = [];
let ventaActual = [];
let productoSeleccionado = null;
let cantidadTemp = "1";
let cantidadNumerica = 1;
let vendedorActual = localStorage.getItem('vendedor') || 'Víctor';

// Cargar productos
async function cargarProductos() {
    const ind = document.getElementById('indicadorCarga');
    try {
        const r = await fetch('https://script.google.com/macros/s/AKfycbxhKFk2WAi-KRY5xGBsI6_6Pvp3jDjt8mSRXvy7I1WehNmBpJamqK9G9Q1ZJSCSgAdfDA/exec?cache=' + Date.now());
        const data = await r.json();
        productos = (data.productos || data).map(p => ({
            id: p.id,
            name: String(p.name).trim(),
            price: parseInt(p.price) || 0,
            stock: parseInt(p.stock) || 0
        })).filter(p => p.name && p.price > 0);
        ind.classList.add('ok');
        document.getElementById('btnVendedor').textContent = '👤 ' + vendedorActual;
        mostrarResultadosCompletos();
    } catch(e) {
        mostrarToast('❌ Error al cargar');
    }
}

// Mostrar resultados
function mostrarResultadosCompletos() {
    const idsEnCarrito = new Set(ventaActual.map(i => i.id));
    renderResultados(productos.filter(p => p.stock > 0).slice(0, 50));
}

function renderResultados(results) {
    const idsEnCarrito = new Set(ventaActual.map(i => i.id));
    
    document.getElementById('resultados').innerHTML = results.map(p => `
        <div class="resultado-item ${p.stock === 0 ? 'sin-stock' : ''} ${idsEnCarrito.has(p.id) ? 'en-carrito' : ''}" data-prod-id="${p.id}">
            <img class="resultado-img" src="imagenes-productos/${simplificarNombre(p.name)}.jpg" onerror="this.style.display='none'">
            <div class="resultado-info">
                <div class="resultado-nombre" onclick="abrirSelectorCantidad(${p.id})">${p.name}</div>
                <div class="resultado-stock">Stock: ${p.stock}</div>
            </div>
            <div class="resultado-precio">$${p.price.toLocaleString('es-AR')}</div>
            ${idsEnCarrito.has(p.id) ? `<span class="badge-carrito">${ventaActual.find(i=>i.id===p.id).qty}</span>` : ''}
        </div>
    `).join('');
    
    actualizarTotal();
}

// Swipe
let touchStartX = 0, touchStartY = 0, touchStartEl = null;
const SWIPE_THRESHOLD = 30;

document.addEventListener('touchstart', (e) => {
    const target = e.target.closest('.resultado-item');
    if (!target || e.target.closest('.resultado-nombre') || e.target.closest('.resultado-img')) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartEl = target;
}, { passive: true });

document.addEventListener('touchend', (e) => {
    if (!touchStartEl) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    
    if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dx) > Math.abs(dy)) {
        const id = parseInt(touchStartEl.dataset.prodId);
        const producto = productos.find(p => p.id === id);
        
        if (dx > 0) { // swipe derecha → agregar
            if (producto && producto.stock > 0) agregarProducto(id);
        } else { // swipe izquierda → quitar
            ventaActual = ventaActual.filter(i => i.id !== id);
            renderResultadosCompletos();
            guardarCarrito();
        }
    }
    touchStartEl = null;
}, { passive: true });

// Funciones carrito
function agregarProducto(id) {
    const producto = productos.find(p => p.id === id);
    if (!producto || producto.stock === 0) return;

    const existente = ventaActual.find(i => i.id === id);
    if (existente) {
        if (existente.qty >= producto.stock) return;
        existente.qty++;
    } else {
        ventaActual.push({ id, name: producto.name, price: producto.price, qty: 1 });
    }
    
    renderResultadosCompletos();
    guardarCarrito();
    mostrarToast('✅ Agregado');
}

function actualizarTotal() {
    const total = ventaActual.reduce((s, i) => s + i.price * i.qty, 0);
    document.getElementById('totalMonto').textContent = '$' + total.toLocaleString('es-AR');
    document.getElementById('btnConfirmar').disabled = ventaActual.length === 0;
}

function guardarCarrito() {
    localStorage.setItem('carrito', JSON.stringify(ventaActual));
}

// Modal cantidad
function abrirSelectorCantidad(id) {
    const producto = productos.find(p => p.id === id);
    if (!producto || producto.stock === 0) return;
    
    productoSeleccionado = producto;
    const existente = ventaActual.find(i => i.id === id);
    cantidadNumerica = existente ? existente.qty : 1;
    cantidadTemp = cantidadNumerica.toString();
    
    document.getElementById('cantidadProductoNombre').textContent = producto.name;
    document.getElementById('cantidadDisplay').textContent = cantidadTemp;
    document.getElementById('cantidadTotal').textContent = '$' + (producto.price * cantidadNumerica).toLocaleString('es-AR');
    document.getElementById('modalCantidad').style.display = 'flex';
}

function teclaNumero(digito) {
    if (!productoSeleccionado) return;
    if (digito === '00') {
        cantidadTemp += '00';
    } else {
        cantidadTemp = cantidadTemp === '1' ? digito : cantidadTemp + digito;
    }
    cantidadNumerica = parseInt(cantidadTemp) || 1;
    actualizarDisplayCantidad();
}

function teclaBorrar() {
    if (!productoSeleccionado) return;
    cantidadTemp = cantidadTemp.slice(0, -1) || '1';
    cantidadNumerica = parseInt(cantidadTemp) || 1;
    actualizarDisplayCantidad();
}

function teclaIncrementar(valor) {
    if (!productoSeleccionado) return;
    cantidadNumerica += valor;
    if (cantidadNumerica > productoSeleccionado.stock) {
        cantidadNumerica = productoSeleccionado.stock;
    }
    cantidadTemp = cantidadNumerica.toString();
    actualizarDisplayCantidad();
}

function actualizarDisplayCantidad() {
    document.getElementById('cantidadDisplay').textContent = cantidadTemp;
    const total = productoSeleccionado.price * cantidadNumerica;
    document.getElementById('cantidadTotal').textContent = '$' + total.toLocaleString('es-AR');
}

function confirmarCantidad() {
    if (!productoSeleccionado) return;
    
    const existente = ventaActual.find(i => i.id === productoSeleccionado.id);
    if (existente) {
        if (cantidadNumerica <= 0) {
            ventaActual = ventaActual.filter(i => i.id !== productoSeleccionado.id);
        } else {
            existente.qty = cantidadNumerica;
        }
    } else if (cantidadNumerica > 0) {
        ventaActual.push({
            id: productoSeleccionado.id,
            name: productoSeleccionado.name,
            price: productoSeleccionado.price,
            qty: cantidadNumerica
        });
    }
    
    renderResultadosCompletos();
    guardarCarrito();
    cerrarModalCantidad();
    mostrarToast('✅ ' + cantidadNumerica + ' unidades');
}

function cerrarModalCantidad() {
    document.getElementById('modalCantidad').style.display = 'none';
    productoSeleccionado = null;
}

// Vendedor
function abrirSelectorVendedor() {
    document.getElementById('modalVendedor').style.display = 'flex';
}

function seleccionarVendedor(nombre) {
    vendedorActual = nombre;
    localStorage.setItem('vendedor', nombre);
    document.getElementById('btnVendedor').textContent = '👤 ' + nombre;
    cerrarModalVendedor();
}

function cerrarModalVendedor() {
    document.getElementById('modalVendedor').style.display = 'none';
}

// Buscador
document.getElementById('buscador').addEventListener('input', function(e) {
    const term = e.target.value.toLowerCase();
    if (term.length < 2) {
        mostrarResultadosCompletos();
        return;
    }
    const filtrados = productos.filter(p => p.name.toLowerCase().includes(term) && p.stock > 0);
    renderResultados(filtrados);
});

// Confirmar venta
function abrirConfirmacion() {
    if (ventaActual.length === 0) return;
    
    const hoyKey = 'ventas_' + new Date().toISOString().slice(0,10);
    const ventasHoy = JSON.parse(localStorage.getItem(hoyKey) || '[]');
    ventasHoy.push({
        hora: new Date().toLocaleTimeString(),
        items: ventaActual,
        total: ventaActual.reduce((s,i) => s + i.price * i.qty, 0),
        vendedor: vendedorActual
    });
    localStorage.setItem(hoyKey, JSON.stringify(ventasHoy));
    
    mostrarToast('✅ Venta confirmada');
    ventaActual = [];
    renderResultadosCompletos();
    guardarCarrito();
}

function simplificarNombre(nombre) {
    return nombre.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').substring(0, 30);
}

function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('visible');
    setTimeout(() => t.classList.remove('visible'), 1500);
}

// Iniciar
cargarProductos();

// Recuperar carrito
const carritoGuardado = localStorage.getItem('carrito');
if (carritoGuardado) {
    try {
        ventaActual = JSON.parse(carritoGuardado);
    } catch(e) {}
}
</script>
</body>
</html>
