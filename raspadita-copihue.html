<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raspadita Copihue 🌺</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap');

  :root {
    --rojo: #c0392b;
    --rojo-oscuro: #922b21;
    --dorado: #d4a017;
    --dorado-claro: #f0c040;
    --crema: #fdf6e3;
    --verde: #1a6b3c;
    --gris-plata: #b0bec5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--verde);
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(255,255,255,0.05) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(0,0,0,0.2) 0%, transparent 60%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Lato', sans-serif;
    padding: 24px 16px;
  }

  /* ─── HEADER ─── */
  .header {
    text-align: center;
    margin-bottom: 28px;
  }
  .header .store-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 7vw, 3.2rem);
    font-weight: 900;
    color: var(--dorado-claro);
    text-shadow: 2px 3px 0 var(--rojo-oscuro), 0 0 30px rgba(212,160,23,0.4);
    letter-spacing: 2px;
    line-height: 1;
  }
  .header .tagline {
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.7);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .header .copihue-emoji {
    font-size: 2.2rem;
    display: block;
    margin-bottom: 4px;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
  }

  /* ─── TICKET CONTAINER ─── */
  .ticket {
    background: var(--crema);
    border-radius: 18px;
    width: min(400px, 100%);
    padding: 0;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.4),
      0 0 0 3px var(--dorado),
      0 0 0 6px var(--rojo);
    overflow: hidden;
    position: relative;
  }

  /* zigzag top */
  .ticket::before {
    content: '';
    display: block;
    height: 12px;
    background:
      radial-gradient(circle at 50% 0%, var(--crema) 8px, transparent 8px) top center / 20px 12px repeat-x,
      var(--rojo);
  }

  .ticket-inner {
    padding: 20px 24px 28px;
  }

  .ticket-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--rojo);
    text-align: center;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .ticket-subtitle {
    font-size: 0.78rem;
    color: #888;
    text-align: center;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* ─── GRID DE CELDAS ─── */
  .scratch-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .cell {
    position: relative;
    aspect-ratio: 1;
    border-radius: 10px;
    overflow: hidden;
    cursor: crosshair;
    border: 2px solid #d0c8b0;
    background: #f5f0e0;
    user-select: none;
  }

  /* Premio debajo */
  .cell-prize {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
    line-height: 1;
    gap: 4px;
    background: #fff;
  }
  .cell-prize .prize-label {
    font-family: 'Lato', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--rojo);
    letter-spacing: 1px;
  }

  /* Capa de raspar (canvas) */
  .scratch-layer {
    position: absolute;
    inset: 0;
    touch-action: none;
    border-radius: 8px;
  }

  /* ─── RESULTADO ─── */
  .result-banner {
    background: var(--rojo);
    border-radius: 10px;
    padding: 14px 16px;
    text-align: center;
    color: white;
    margin-bottom: 16px;
    min-height: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.4s;
  }
  .result-banner.ganador {
    background: linear-gradient(135deg, var(--dorado), var(--rojo));
    animation: pulse-winner 1s ease-in-out infinite;
  }
  @keyframes pulse-winner {
    0%, 100% { box-shadow: 0 0 0 0 rgba(212,160,23,0.6); }
    50% { box-shadow: 0 0 0 10px rgba(212,160,23,0); }
  }
  .result-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
  }
  .result-sub {
    font-size: 0.78rem;
    opacity: 0.85;
    margin-top: 2px;
  }

  /* ─── BOTONES ─── */
  .btn-group {
    display: flex;
    gap: 10px;
  }
  .btn {
    flex: 1;
    padding: 12px 0;
    border: none;
    border-radius: 8px;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--rojo);
    color: white;
    box-shadow: 0 4px 12px rgba(192,57,43,0.4);
  }
  .btn-primary:hover { background: var(--rojo-oscuro); }

  .btn-secondary {
    background: var(--dorado);
    color: white;
    box-shadow: 0 4px 12px rgba(212,160,23,0.4);
  }
  .btn-secondary:hover { background: #b8860b; }

  /* zigzag bottom */
  .ticket-footer {
    height: 12px;
    background:
      radial-gradient(circle at 50% 100%, var(--crema) 8px, transparent 8px) bottom center / 20px 12px repeat-x,
      var(--rojo);
  }

  /* ─── INSTRUCCIONES ─── */
  .instructions {
    margin-top: 18px;
    color: rgba(255,255,255,0.55);
    font-size: 0.75rem;
    text-align: center;
    letter-spacing: 1px;
  }

  /* ─── CONFETTI ─── */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    pointer-events: none;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="header">
  <span class="copihue-emoji">🌺</span>
  <div class="store-name">Copihue</div>
  <div class="tagline">Almacén de barrio · Bariloche</div>
</div>

<div class="ticket">
  <div class="ticket-inner">
    <div class="ticket-title">🎰 Raspadita</div>
    <div class="ticket-subtitle">Raspá y ganá</div>

    <div class="scratch-grid" id="grid"></div>

    <div class="result-banner" id="resultBanner">
      <div class="result-text" id="resultText">Raspá las 9 casillas</div>
      <div class="result-sub" id="resultSub">¡Tres iguales = premio!</div>
    </div>

    <div class="btn-group">
      <button class="btn btn-secondary" id="btnReveal">Ver todo</button>
      <button class="btn btn-primary" id="btnNew">Nueva raspadita</button>
    </div>
  </div>
  <div class="ticket-footer"></div>
</div>

<div class="instructions">Deslizá el dedo o el mouse para raspar · Hecho con ❤️ para el almacén</div>

<script>
// ── Premios posibles ──────────────────────────────────────────────────────────
const PRIZES = [
  { emoji: '🧃', label: '10% off' },
  { emoji: '☕', label: 'Café gratis' },
  { emoji: '🌺', label: 'Sorpresa' },
  { emoji: '🍫', label: 'Choco' },
  { emoji: '🥐', label: 'Medialunas' },
  { emoji: '💰', label: '$500 off' },
];

// La probabilidad de ganar (se puede ajustar)
const WIN_CHANCE = 0.35; // 35%

// ── Estado ────────────────────────────────────────────────────────────────────
let cells = [];        // {canvas, ctx, prize, scratched%}
let allRevealed = false;
let gameOver = false;

// ── Generar tablero ───────────────────────────────────────────────────────────
function generateBoard() {
  // Decidir si esta tarjeta gana
  const isWinner = Math.random() < WIN_CHANCE;

  // Elegir premios para las 9 casillas
  let prizes = [];
  if (isWinner) {
    // Elegir premio ganador y repetirlo 3 veces, el resto aleatorio
    const winner = PRIZES[Math.floor(Math.random() * PRIZES.length)];
    // Posiciones de los 3 iguales (aleatorio)
    const positions = shuffleArray([0,1,2,3,4,5,6,7,8]);
    const winPos = new Set(positions.slice(0, 3));
    for (let i = 0; i < 9; i++) {
      if (winPos.has(i)) prizes.push(winner);
      else {
        let p;
        do { p = PRIZES[Math.floor(Math.random() * PRIZES.length)]; }
        while (p.emoji === winner.emoji);
        prizes.push(p);
      }
    }
  } else {
    // Garantizar que no haya tres iguales
    prizes = generateLosingBoard();
  }
  return prizes;
}

function generateLosingBoard() {
  let tries = 0;
  while (tries++ < 200) {
    const board = Array.from({length:9}, () => PRIZES[Math.floor(Math.random() * PRIZES.length)]);
    if (!hasThreeInARow(board)) return board;
  }
  // fallback seguro: todos distintos en rotación
  return Array.from({length:9}, (_, i) => PRIZES[i % PRIZES.length]);
}

function hasThreeInARow(board) {
  const lines = [
    [0,1,2],[3,4,5],[6,7,8], // filas
    [0,3,6],[1,4,7],[2,5,8], // cols
    [0,4,8],[2,4,6]          // diagonales
  ];
  return lines.some(([a,b,c]) => board[a].emoji === board[b].emoji && board[b].emoji === board[c].emoji);
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// ── Construir DOM ─────────────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cells = [];
  allRevealed = false;
  gameOver = false;

  const prizes = generateBoard();

  prizes.forEach((prize, idx) => {
    const cell = document.createElement('div');
    cell.className = 'cell';

    // Premio oculto
    const prizeDiv = document.createElement('div');
    prizeDiv.className = 'cell-prize';
    prizeDiv.innerHTML = `<span>${prize.emoji}</span><span class="prize-label">${prize.label}</span>`;
    cell.appendChild(prizeDiv);

    // Canvas de raspar
    const canvas = document.createElement('canvas');
    canvas.className = 'scratch-layer';
    cell.appendChild(canvas);
    grid.appendChild(cell);

    const obj = { canvas, prize, revealed: false, scratchedPixels: 0 };
    cells.push(obj);

    // Inicializar canvas con textura de "raspadita"
    requestAnimationFrame(() => initCanvas(canvas, idx));

    // Eventos
    let drawing = false;
    const startScratch = (e) => {
      if (gameOver) return;
      drawing = true;
      scratch(canvas, e, idx);
    };
    const doScratch = (e) => {
      if (!drawing || gameOver) return;
      scratch(canvas, e, idx);
    };
    const stopScratch = () => { drawing = false; };

    canvas.addEventListener('mousedown', startScratch);
    canvas.addEventListener('mousemove', doScratch);
    canvas.addEventListener('mouseup', stopScratch);
    canvas.addEventListener('mouseleave', stopScratch);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startScratch(e); }, {passive:false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); doScratch(e); }, {passive:false});
    canvas.addEventListener('touchend', stopScratch);
  });

  // Reset resultado
  const banner = document.getElementById('resultBanner');
  banner.className = 'result-banner';
  document.getElementById('resultText').textContent = 'Raspá las 9 casillas';
  document.getElementById('resultSub').textContent = '¡Tres iguales = premio!';
}

// ── Canvas de raspadita ───────────────────────────────────────────────────────
function initCanvas(canvas, idx) {
  const rect = canvas.parentElement.getBoundingClientRect();
  const size = Math.round(rect.width);
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  cells[idx].ctx = ctx;
  cells[idx].totalPixels = size * size;

  // Fondo plateado con textura
  const grad = ctx.createLinearGradient(0,0,size,size);
  grad.addColorStop(0, '#c8d0d8');
  grad.addColorStop(0.4, '#e8edf0');
  grad.addColorStop(1, '#9aa8b0');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,size,size);

  // Patrón de puntos
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  for (let y = 4; y < size; y += 8) {
    for (let x = 4; x < size; x += 8) {
      ctx.beginPath();
      ctx.arc(x, y, 1.5, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Texto "RASPÁ"
  ctx.fillStyle = 'rgba(80,100,110,0.5)';
  ctx.font = `bold ${size*0.18}px Lato, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('RASPÁ', size/2, size/2);
}

function getPos(canvas, e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top) * scaleY,
  };
}

function scratch(canvas, e, idx) {
  const {ctx} = cells[idx];
  if (!ctx) return;
  const {x, y} = getPos(canvas, e);
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  ctx.arc(x, y, canvas.width * 0.18, 0, Math.PI*2);
  ctx.fill();

  checkRevealPercent(canvas, idx);
}

function checkRevealPercent(canvas, idx) {
  if (cells[idx].revealed) return;
  const ctx = cells[idx].ctx;
  const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
  let transparent = 0;
  for (let i = 3; i < data.length; i += 4) {
    if (data[i] < 128) transparent++;
  }
  const pct = transparent / cells[idx].totalPixels;
  if (pct > 0.55) {
    cells[idx].revealed = true;
    // Limpiar canvas completamente
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    checkWin();
  }
}

// ── Lógica de victoria ────────────────────────────────────────────────────────
function checkWin() {
  const allDone = cells.every(c => c.revealed);
  if (!allDone) return;
  gameOver = true;

  const prizes = cells.map(c => c.prize.emoji);
  const lines = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  const winLine = lines.find(([a,b,c]) => prizes[a]===prizes[b] && prizes[b]===prizes[c]);

  const banner = document.getElementById('resultBanner');
  const text = document.getElementById('resultText');
  const sub = document.getElementById('resultSub');

  if (winLine) {
    const p = cells[winLine[0]].prize;
    banner.className = 'result-banner ganador';
    text.textContent = `🎉 ¡Ganaste! ${p.emoji}`;
    sub.textContent = `Premio: ${p.label} · Mostrá al cajero`;
    launchConfetti();
  } else {
    banner.className = 'result-banner';
    text.textContent = '😔 Sin suerte esta vez';
    sub.textContent = 'Pedí otra raspadita en caja';
  }
}

// ── Revelar todo ──────────────────────────────────────────────────────────────
document.getElementById('btnReveal').addEventListener('click', () => {
  cells.forEach((c, idx) => {
    if (!c.revealed) {
      c.revealed = true;
      c.ctx && c.ctx.clearRect(0, 0, c.canvas.width, c.canvas.height);
    }
  });
  if (!gameOver) checkWin();
});

// ── Nueva raspadita ───────────────────────────────────────────────────────────
document.getElementById('btnNew').addEventListener('click', () => {
  // Limpiar confetti
  document.querySelectorAll('.confetti-piece').forEach(el => el.remove());
  buildGrid();
});

// ── Confetti ──────────────────────────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#c0392b','#d4a017','#1a6b3c','#f0c040','#fff','#e74c3c'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.cssText = `
      left: ${Math.random()*100}vw;
      top: -20px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${6 + Math.random()*8}px;
      height: ${6 + Math.random()*8}px;
      border-radius: ${Math.random()>0.5?'50%':'2px'};
      animation-duration: ${1.5 + Math.random()*2}s;
      animation-delay: ${Math.random()*0.8}s;
      z-index: 9999;
    `;
    document.body.appendChild(piece);
    piece.addEventListener('animationend', () => piece.remove());
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', buildGrid);
// Re-init canvas si el layout cambia
window.addEventListener('resize', buildGrid);
</script>
</body>
</html>
