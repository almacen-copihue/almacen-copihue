<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SendWA Copihue v1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f8f8f6;color:#111;padding:16px;max-width:780px;margin:0 auto}

.bloque{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:16px;margin-bottom:14px}
.bloque-titulo{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin-bottom:12px}

.campos{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.campo label{display:block;font-size:11px;color:#888;margin-bottom:4px}
.campo input,.campo select,.campo textarea{width:100%;padding:8px 10px;border:0.5px solid #ddd;border-radius:8px;font-size:13px;background:#fafafa;font-family:inherit}
.campo textarea{resize:vertical;min-height:56px}
.campo-full{grid-column:1/-1}

.tipo-row{display:flex;gap:6px;flex-wrap:wrap}
.tipo-btn{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #ddd;background:#fafafa;color:#555;transition:all .15s}
.tipo-btn.sel-promo{background:#4A0080;border-color:#4A0080;color:#E0A0FF}
.tipo-btn.sel-combo{background:#7A0040;border-color:#7A0040;color:#FFB0D0}
.tipo-btn.sel-relampago{background:#7A2E00;border-color:#7A2E00;color:#FFB47A}
.tipo-btn.sel-destacada{background:#5A4500;border-color:#5A4500;color:#FFE57A}
.tipo-btn.sel-especial{background:#003080;border-color:#003080;color:#90BFFF}
.tipo-btn.sel-ultimas{background:#6A0010;border-color:#6A0010;color:#FF8090}

.btn-generar{width:100%;padding:13px;background:#111;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.5px}
.btn-generar:hover{background:#333}
.btn-generar:active{transform:scale(.98)}

.salidas-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:520px){.salidas-grid{grid-template-columns:1fr}.campos{grid-template-columns:1fr}}

.salida{border-radius:12px;overflow:hidden;border:0.5px solid #e0e0e0;background:#fff}
.salida-header{padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid #eee;background:#fafafa}
.salida-nombre{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#888}
.salida-btns{display:flex;gap:6px}
.s-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:0.5px solid #ddd;background:#fff;color:#555}
.s-btn:hover{background:#f0f0f0}
.s-btn.copiar{background:#111;color:#fff;border-color:#111}

.flyer-wrap{padding:12px;display:flex;justify-content:center;background:#f0f0ee}
.flyer{width:240px;height:240px;border-radius:10px;position:relative;overflow:hidden;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;flex-shrink:0}

/* FUEGO */
.f-fuego{background:#0d0000}
.f-fuego .f-fondo{position:absolute;inset:0;background:radial-gradient(ellipse at 60% 80%,#c73200 0%,#7a0000 45%,#0d0000 100%)}
.f-fuego .f-badge{position:absolute;top:12px;left:12px;background:#ff1744;color:#fff;font-size:8px;font-weight:800;padding:3px 8px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;z-index:2}
.f-fuego .f-emoji{position:absolute;top:10px;right:12px;font-size:32px;z-index:2}
.f-fuego .f-nombre{position:absolute;left:12px;right:44px;top:50px;color:#fff;font-size:14px;font-weight:900;line-height:1.2;z-index:2}
.f-fuego .f-orig{position:absolute;left:12px;bottom:54px;color:#ff8a65;font-size:11px;text-decoration:line-through;opacity:.8;z-index:2}
.f-fuego .f-precio{position:absolute;left:12px;bottom:28px;color:#ffd600;font-size:28px;font-weight:900;z-index:2}
.f-fuego .f-ahorro{position:absolute;left:12px;bottom:10px;color:rgba(255,214,0,.7);font-size:9px;z-index:2}
.f-fuego .f-marca{position:absolute;bottom:10px;right:12px;color:rgba(255,255,255,.15);font-size:7px;letter-spacing:2px;text-transform:uppercase;z-index:2}

/* NEON */
.f-neon{background:#000;border:2px solid #00e676}
.f-neon .f-badge{position:absolute;top:12px;left:12px;color:#00e676;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:1px solid #00e676;padding:2px 7px;border-radius:2px}
.f-neon .f-emoji{position:absolute;top:10px;right:12px;font-size:30px}
.f-neon .f-nombre{position:absolute;left:12px;right:44px;top:48px;color:#fff;font-size:14px;font-weight:900;line-height:1.2}
.f-neon .f-orig{position:absolute;left:12px;bottom:52px;color:#444;font-size:11px;text-decoration:line-through}
.f-neon .f-precio{position:absolute;left:12px;bottom:26px;color:#00e676;font-size:28px;font-weight:900}
.f-neon .f-ahorro{position:absolute;left:12px;bottom:10px;color:#555;font-size:9px}
.f-neon .f-marca{position:absolute;bottom:10px;right:12px;color:#111;font-size:7px;letter-spacing:2px;text-transform:uppercase}

/* URGENTE */
.f-urgente{background:#ffd600}
.f-urgente .f-badge{position:absolute;top:0;left:0;right:0;background:#000;color:#ffd600;font-size:9px;font-weight:800;padding:6px 12px;letter-spacing:2px;text-transform:uppercase;text-align:center}
.f-urgente .f-emoji{position:absolute;top:30px;right:12px;font-size:36px}
.f-urgente .f-nombre{position:absolute;left:12px;right:56px;top:38px;color:#000;font-size:14px;font-weight:900;line-height:1.2}
.f-urgente .f-orig{position:absolute;left:12px;bottom:54px;color:rgba(0,0,0,.4);font-size:11px;text-decoration:line-through}
.f-urgente .f-precio{position:absolute;left:12px;bottom:28px;color:#000;font-size:30px;font-weight:900}
.f-urgente .f-ahorro{position:absolute;left:0;right:0;bottom:0;background:#000;color:#ffd600;font-size:9px;font-weight:700;padding:5px 12px;text-align:center}
.f-urgente .f-marca{display:none}

/* DARK PRO */
.f-dark{background:#0a0a0a}
.f-dark .f-acento{position:absolute;top:0;left:0;width:3px;height:100%;background:#aa00ff}
.f-dark .f-badge{position:absolute;top:12px;left:16px;color:#aa00ff;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.f-dark .f-emoji{position:absolute;top:10px;right:12px;font-size:30px}
.f-dark .f-nombre{position:absolute;left:16px;right:44px;top:32px;color:#fff;font-size:14px;font-weight:900;line-height:1.2}
.f-dark .f-orig{position:absolute;left:16px;bottom:52px;color:#333;font-size:11px;text-decoration:line-through}
.f-dark .f-precio{position:absolute;left:16px;bottom:26px;color:#fff;font-size:28px;font-weight:900}
.f-dark .f-ahorro{position:absolute;left:16px;bottom:10px;color:#555;font-size:9px}
.f-dark .f-marca{position:absolute;bottom:10px;right:12px;color:#1a1a1a;font-size:7px;letter-spacing:2px;text-transform:uppercase}

.texto-wa{background:#0b141a;margin:0 12px 12px;border-radius:8px;padding:10px 12px;font-size:11px;color:#e9ede9;line-height:1.75;white-space:pre-wrap;word-break:break-word;max-height:130px;overflow-y:auto}

.empty{padding:40px 20px;text-align:center;color:#bbb;font-size:13px}
.ahorro-calc{margin-top:6px;font-size:12px;color:#888;min-height:18px}
</style>
</head>
<body>

<div class="bloque">
  <div class="bloque-titulo">1 — Datos del producto</div>
  <div class="campos">
    <div class="campo campo-full">
      <label>Nombre del producto</label>
      <input type="text" id="inp-nombre" placeholder="Ej: Cerveza Quilmes 1L" oninput="calcAhorro()">
    </div>
    <div class="campo">
      <label>Precio normal ($)</label>
      <input type="number" id="inp-normal" placeholder="2200" oninput="calcAhorro()">
    </div>
    <div class="campo">
      <label>Precio oferta ($)</label>
      <input type="number" id="inp-oferta" placeholder="1870" oninput="calcAhorro()">
    </div>
    <div class="campo campo-full">
      <label>Tipo de oferta</label>
      <div class="tipo-row" id="tipo-row">
        <div class="tipo-btn sel-promo" data-tipo="promo" onclick="selTipo(this)">PROMO</div>
        <div class="tipo-btn" data-tipo="combo" onclick="selTipo(this)">COMBO</div>
        <div class="tipo-btn" data-tipo="relampago" onclick="selTipo(this)">RELAMPAGO</div>
        <div class="tipo-btn" data-tipo="destacada" onclick="selTipo(this)">DESTACADA</div>
        <div class="tipo-btn" data-tipo="especial" onclick="selTipo(this)">ESPECIAL</div>
        <div class="tipo-btn" data-tipo="ultimas" onclick="selTipo(this)">ULTIMAS</div>
      </div>
    </div>
    <div class="campo campo-full">
      <label>Detalle extra (opcional)</label>
      <textarea id="inp-extra" placeholder="Ej: 2x1 · Solo hoy · Stock limitado"></textarea>
    </div>
  </div>
  <div class="ahorro-calc" id="ahorro-calc"></div>
</div>

<div class="bloque" style="padding:12px">
  <button class="btn-generar" onclick="generar()">⚡ GENERAR LAS 4 SALIDAS</button>
</div>

<div class="bloque" id="bloque-salidas">
  <div class="bloque-titulo">2 — Elegí la que mejor calza</div>
  <div class="empty" id="empty-msg">Completá los datos arriba y presioná Generar.</div>
  <div class="salidas-grid" id="salidas-grid" style="display:none"></div>
</div>

<script>
let tipoSel = 'promo';

function selTipo(el){
  document.querySelectorAll('.tipo-btn').forEach(b=>b.className='tipo-btn');
  el.classList.add('sel-'+el.dataset.tipo);
  tipoSel = el.dataset.tipo;
}

function fmt(n){
  return '$'+Math.round(n).toLocaleString('es-AR');
}

function calcAhorro(){
  const n = parseFloat(document.getElementById('inp-normal').value)||0;
  const o = parseFloat(document.getElementById('inp-oferta').value)||0;
  const el = document.getElementById('ahorro-calc');
  if(n>0 && o>0 && o<n){
    const ah=n-o, pct=Math.round(ah/n*100);
    el.textContent='Ahorro: '+fmt(ah)+' · '+pct+'% OFF';
    el.style.color='#2e7d32';
  } else { el.textContent=''; }
}

function getBadge(tipo){
  return {promo:'🏷 PROMO ACTIVA',combo:'🎁 COMBO ACTIVO',relampago:'⚡ RELÁMPAGO',destacada:'⭐ DESTACADA',especial:'💙 10% ESPECIAL',ultimas:'⏳ ÚLTIMAS UNIDADES'}[tipo]||'OFERTA';
}

function getEmoji(nombre){
  const n=(nombre||'').toLowerCase();
  if(n.includes('cerveza')||n.includes('birra')) return '🍺';
  if(n.includes('gaseosa')||n.includes('coca')||n.includes('pepsi')||n.includes('sprite')) return '🥤';
  if(n.includes('yerba')) return '🧉';
  if(n.includes('pan')) return '🍞';
  if(n.includes('aceite')) return '🫒';
  if(n.includes('queso')) return '🧀';
  if(n.includes('jamón')||n.includes('jamon')||n.includes('salchicha')) return '🥩';
  if(n.includes('fideo')||n.includes('pasta')) return '🍝';
  if(n.includes('leche')) return '🥛';
  if(n.includes('agua')) return '💧';
  if(n.includes('vino')) return '🍷';
  if(n.includes('pollo')) return '🍗';
  return '🛒';
}

function buildFlyer(p, tpl){
  const con = p.pn>0 && p.po>0 && p.po<p.pn;
  const precio = con ? p.po : (p.po||p.pn);
  const ah = con ? p.pn-p.po : 0;
  const pct = ah>0 ? Math.round(ah/p.pn*100) : 0;
  const badge = getBadge(p.tipo);
  const emoji = getEmoji(p.nombre);
  const extras = tpl==='dark' ? '<div class="f-acento"></div>' : (tpl==='fuego' ? '<div class="f-fondo"></div>' : '');

  return `<div class="flyer f-${tpl}">
    ${extras}
    <div class="f-badge">${badge}</div>
    <div class="f-emoji">${emoji}</div>
    <div class="f-nombre">${p.nombre||'Producto'}</div>
    ${con?`<div class="f-orig">${fmt(p.pn)}</div>`:''}
    <div class="f-precio">${fmt(precio)}</div>
    <div class="f-ahorro">${ah>0?'Ahorrás '+fmt(ah)+' · '+pct+'% OFF':(p.extra||'')}</div>
    <div class="f-marca">Almacén Copihue</div>
  </div>`;
}

function buildTexto(p, tpl){
  const con = p.pn>0 && p.po>0 && p.po<p.pn;
  const precio = con ? p.po : (p.po||p.pn);
  const ah = con ? p.pn-p.po : 0;
  const pct = ah>0 ? Math.round(ah/p.pn*100) : 0;
  const emoji = getEmoji(p.nombre);
  const badge = getBadge(p.tipo);
  const nombre = p.nombre||'Producto';

  const t = {
    fuego: `🔥 *${badge}*\n\n${emoji} *${nombre}*\n${con?`~~${fmt(p.pn)}~~ → `:''  }*${fmt(precio)}*\n${ah>0?`✅ Ahorrás ${fmt(ah)} (${pct}% menos)\n`:''}${p.extra?`\n_${p.extra}_\n`:''}\n📍 Almacén Copihue · Stock limitado`,
    neon:  `💚 *OFERTA EN VIVO*\n\n${emoji} *${nombre}*\nPrecio: *${fmt(precio)}*${con?`\nAntes: ~~${fmt(p.pn)}~~`:''}\n${ah>0?`💰 Ahorrás ${fmt(ah)}\n`:''}\n${badge}\n📍 Copihue · Solo hoy`,
    urgente:`⚡ *URGENTE — TIEMPO LIMITADO*\n\n${emoji} *${nombre}* — *${fmt(precio)}*\n${con?`❌ Normal: ~~${fmt(p.pn)}~~\n`:''}${ah>0?`✅ ${pct}% de descuento\n`:''}\n⏰ ${p.extra||'Aprovechá hoy'}\n📍 Almacén Copihue`,
    dark:  `✨ *${badge}*\n\n${emoji} ${nombre}\n\n💵 *${fmt(precio)}*${con?`\n_(antes ${fmt(p.pn)})_`:''}\n${ah>0?`🏷 Ahorrás ${fmt(ah)} · ${pct}% OFF`:''}${p.extra?`\n${p.extra}`:''}\n\n— Almacén Copihue`,
  };
  return t[tpl]||t.fuego;
}

const PLANTILLAS=[
  {id:'fuego',  nombre:'🔥 Fuego'},
  {id:'neon',   nombre:'💚 Neon'},
  {id:'urgente',nombre:'⚡ Urgente'},
  {id:'dark',   nombre:'💜 Dark Pro'},
];

function copiarTexto(id){
  const el=document.getElementById('wa-'+id);
  navigator.clipboard.writeText(el.textContent).then(()=>{
    const btn=document.querySelector(`[data-copy="${id}"]`);
    btn.textContent='✅ Copiado';
    setTimeout(()=>btn.textContent='Copiar texto',2000);
  });
}

function abrirWA(id){
  const el=document.getElementById('wa-'+id);
  window.open('https://wa.me/?text='+encodeURIComponent(el.textContent),'_blank');
}

function generar(){
  const nombre=document.getElementById('inp-nombre').value.trim();
  const pn=parseFloat(document.getElementById('inp-normal').value)||0;
  const po=parseFloat(document.getElementById('inp-oferta').value)||0;
  const extra=document.getElementById('inp-extra').value.trim();
  const p={nombre,pn,po,tipo:tipoSel,extra};

  document.getElementById('empty-msg').style.display='none';
  const grid=document.getElementById('salidas-grid');
  grid.style.display='grid';

  grid.innerHTML=PLANTILLAS.map(pl=>`
    <div class="salida">
      <div class="salida-header">
        <span class="salida-nombre">${pl.nombre}</span>
        <div class="salida-btns">
          <button class="s-btn copiar" data-copy="${pl.id}" onclick="copiarTexto('${pl.id}')">Copiar texto</button>
          <button class="s-btn" onclick="abrirWA('${pl.id}')">📲 WA</button>
        </div>
      </div>
      <div class="flyer-wrap">${buildFlyer(p,pl.id)}</div>
      <div class="texto-wa" id="wa-${pl.id}">${buildTexto(p,pl.id)}</div>
    </div>`).join('');
}
</script>
</body>
</html>
