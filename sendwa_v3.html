<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SendWA Ofertas — Almacén Copihue v3.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --verde:#1B6B2F;--verde2:#27a045;--verde3:#E8F5E9;
  --rojo:#E53935;--naranja:#FF6D00;--amarillo:#FFD600;
  --azul:#1565C0;--purp:#6A1B9A;--cyan:#00838F;
  --bg:#f0f2ef;--card:#fff;--borde:#dde5da;
  --txt:#1a2718;--txt2:#5a7055;--txt3:#96a891;
  --sel-bg:#E8F5E9;--sel-borde:#27a045;
  --sh:0 2px 12px rgba(0,0,0,.08);
  --r:14px;
}
.dark{
  --bg:#111814;--card:#1c2419;--borde:#2a3828;
  --txt:#e8f5e3;--txt2:#7fa87a;--txt3:#4a6645;
  --sel-bg:#1a3020;--sel-borde:#4CAF50;
  --sh:0 2px 12px rgba(0,0,0,.4);
}
body{font-family:'Space Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;padding-bottom:100px;transition:background .2s,color .2s}

/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s}
#loader.hidden{opacity:0;pointer-events:none}
.loader-logo{font-family:'Bebas Neue',cursive;font-size:48px;color:var(--verde);letter-spacing:2px}
.loader-sub{font-size:13px;color:var(--txt2);font-weight:500}
.loader-bar{width:180px;height:3px;background:var(--borde);border-radius:4px;overflow:hidden}
.loader-fill{height:100%;background:linear-gradient(90deg,var(--verde),var(--verde2));border-radius:4px;animation:fill 1.8s ease forwards}
@keyframes fill{from{width:0}to{width:100%}}

/* ── HEADER ── */
.hdr{background:var(--verde);padding:10px 14px 10px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:60;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr-logo{font-family:'Bebas Neue',cursive;font-size:22px;color:#fff;letter-spacing:1px;line-height:1}
.hdr-logo span{color:var(--amarillo)}
.hdr-logo small{display:block;font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:400;opacity:.7;letter-spacing:.5px}
.hdr-pills{flex:1;display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
.hpill{background:rgba(255,255,255,.18);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;cursor:default}
.hpill.alert{background:rgba(255,214,0,.3);color:var(--amarillo)}
.hdr-acts{display:flex;gap:6px;align-items:center}
.hdr-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.hdr-btn:hover{background:rgba(255,255,255,.28)}

/* ── SEARCH / TABS ── */
.sticky-top{position:sticky;top:54px;z-index:55;background:var(--card);border-bottom:1px solid var(--borde)}
.search-row{padding:8px 12px;display:flex;gap:8px;align-items:center}
.search-inp{flex:1;padding:8px 14px 8px 36px;border-radius:30px;border:1.5px solid var(--borde);background:var(--bg);color:var(--txt);font-size:13px;font-family:inherit;outline:none;transition:border .15s}
.search-inp:focus{border-color:var(--verde2)}
.search-wrap{position:relative;flex:1}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.5;pointer-events:none}
.tabs{display:flex;gap:0;overflow-x:auto;padding:0 12px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;font-size:11px;font-weight:700;color:var(--txt2);cursor:pointer;white-space:nowrap;border-bottom:2.5px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;transition:color .15s,border-color .15s;letter-spacing:.3px}
.tab.on{color:var(--verde2);border-bottom-color:var(--verde2)}
.tab .cnt{background:var(--borde);color:var(--txt2);font-size:9px;padding:1px 5px;border-radius:10px;margin-left:4px}
.tab.on .cnt{background:var(--verde2);color:#fff}

/* ── ESTADO BAR ── */
.estado-bar{background:var(--verde3);border-bottom:1px solid var(--borde);padding:6px 14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--verde)}
.dark .estado-bar{background:#162014;color:#7fc077}
.e-tag{display:flex;align-items:center;gap:4px;font-weight:600}
.e-dot{width:7px;height:7px;border-radius:50%}

/* ── SECCION HEADERS ── */
.sec-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px 6px}
.sec-hdr-txt{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:.5px}
.sec-hdr-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;color:#fff}
.sec-hdr-line{flex:1;height:2px;border-radius:2px;opacity:.3}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:6px 10px 10px}
@media(min-width:480px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:700px){.grid{grid-template-columns:repeat(4,1fr)}}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--r);border:2px solid var(--borde);cursor:pointer;position:relative;overflow:hidden;transition:border-color .12s,transform .1s,box-shadow .12s;box-shadow:var(--sh)}
.card:active{transform:scale(.97)}
.card.sel{border-color:var(--sel-borde);background:var(--sel-bg);box-shadow:0 0 0 3px rgba(39,160,69,.2)}
.card-img{width:100%;aspect-ratio:1;background:#eef2ec;display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-body{padding:6px 8px 8px}
.card-name{font-size:11px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--txt);min-height:30px}
.card-price-row{display:flex;align-items:center;gap:4px;margin-top:4px;flex-wrap:wrap}
.card-price-new{font-size:14px;font-weight:700;color:var(--txt)}
.card-price-old{font-size:10px;text-decoration:line-through;color:var(--txt3);font-weight:400}
.card-save{font-size:9px;font-weight:700;background:var(--rojo);color:#fff;padding:1px 5px;border-radius:6px}

/* BADGES */
.badge-wrap{position:absolute;top:5px;left:5px;display:flex;flex-direction:column;gap:3px;z-index:4}
.bdg{font-size:8px;font-weight:800;padding:2px 6px;border-radius:6px;color:#fff;letter-spacing:.3px;font-family:'Barlow Condensed',sans-serif;line-height:1.3;text-transform:uppercase}
.bdg-r{background:linear-gradient(135deg,#FF6D00,#E53935)}  /* relámpago */
.bdg-d{background:linear-gradient(135deg,#6A1B9A,#4527A0)}  /* destacada */
.bdg-e{background:linear-gradient(135deg,#1565C0,#0277BD)}  /* especial */
.bdg-p{background:linear-gradient(135deg,#C62828,#B71C1C)}  /* promo */
.bdg-c{background:linear-gradient(135deg,#00695C,#004D40)}  /* combo */
.bdg-u{background:linear-gradient(135deg,#FF8F00,#E65100);animation:pulse-u 1.5s ease infinite} /* últimas */
.bdg-n{background:linear-gradient(135deg,#2E7D32,#1B5E20)}  /* nuevo */
@keyframes pulse-u{0%,100%{opacity:1}50%{opacity:.6}}
.bdg-pct{font-size:9px;font-weight:800;background:var(--amarillo);color:#1a1a00;padding:2px 6px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}

/* CHECK / ORDER NUM */
.chk-ico{position:absolute;top:5px;right:5px;width:22px;height:22px;background:var(--sel-borde);color:#fff;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:11px;font-weight:700;z-index:5}
.card.sel .chk-ico{display:flex}
.ord-bubble{position:absolute;bottom:5px;right:5px;width:18px;height:18px;background:var(--verde);color:#fff;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:9px;font-weight:800;z-index:5}
.card.sel .ord-bubble{display:flex}

/* URGENCIA STRIP */
.urgencia-strip{position:absolute;bottom:0;left:0;right:0;background:rgba(230,81,0,.9);color:#fff;font-size:8px;font-weight:700;text-align:center;padding:2px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;z-index:3}
.urgencia-strip.critica{background:rgba(183,28,28,.95);animation:pulse-u 1s ease infinite}

/* ── BOTTOM BAR ── */
.bot-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--borde);padding:10px 14px;display:flex;gap:10px;align-items:center;z-index:70;box-shadow:0 -4px 20px rgba(0,0,0,.1)}
.bot-sel-info{font-size:12px;font-weight:700;color:var(--txt);flex:1}
.bot-sel-info small{display:block;font-size:10px;font-weight:400;color:var(--txt2)}
.bot-btn{padding:10px 16px;border-radius:12px;border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:opacity .15s;white-space:nowrap}
.bot-btn:hover{opacity:.88}
.bot-btn.green{background:var(--verde)}
.bot-btn.orange{background:#FF6D00}
.bot-btn.red{background:var(--rojo)}
.bot-btn.wa{background:#25D366}

/* ── DRAWER ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:80;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.drawer{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;z-index:90;transform:translateY(100%);transition:transform .25s cubic-bezier(.22,.68,0,1.2);max-height:90vh;display:flex;flex-direction:column}
.drawer.open{transform:translateY(0)}
.drw-pill{width:40px;height:4px;background:var(--borde);border-radius:4px;margin:10px auto 4px}
.drw-hdr{padding:10px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--borde)}
.drw-hdr h3{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:.5px}
.drw-close{background:var(--bg);border:none;color:var(--txt);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.drw-body{padding:14px 16px 24px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:12px}

/* ── ACCIONES PANEL ── */
.section-lbl{font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.act-btn{padding:12px 10px;border-radius:12px;border:1.5px solid var(--borde);background:var(--bg);cursor:pointer;font-family:inherit;text-align:center;transition:border-color .15s,background .15s;display:flex;flex-direction:column;align-items:center;gap:4px}
.act-btn:hover{border-color:var(--verde2);background:var(--verde3)}
.act-btn-ico{font-size:22px;line-height:1}
.act-btn-lbl{font-size:11px;font-weight:700;color:var(--txt)}
.act-btn-sub{font-size:9px;color:var(--txt2)}
.act-btn.wa-btn{border-color:#25D366;background:#f0fff4}
.act-btn.wa-btn:hover{background:#d4f8e0}

/* ── FORMATO TEXT ── */
.fmt-tabs{display:flex;gap:0;border:1.5px solid var(--borde);border-radius:10px;overflow:hidden}
.fmt-tab{flex:1;padding:7px 4px;font-size:10px;font-weight:700;background:var(--bg);color:var(--txt2);border:none;cursor:pointer;font-family:inherit;text-align:center;transition:background .12s;letter-spacing:.3px}
.fmt-tab.on{background:var(--verde2);color:#fff}
.preview-box{background:var(--bg);border-radius:10px;padding:10px;max-height:140px;overflow-y:auto;font-size:11px;line-height:1.7;white-space:pre-wrap;color:var(--txt);border:1px solid var(--borde);font-family:'Courier New',monospace}
.copy-row{display:flex;gap:8px;margin-top:6px}
.copy-btn{flex:1;padding:10px;border-radius:10px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}
.copy-btn:hover{opacity:.85}
.copy-btn.g{background:var(--verde);color:#fff}
.copy-btn.wa{background:#25D366;color:#fff}

/* ── CANVAS SECTION ── */
.canvas-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.canvas-card{border-radius:12px;border:1.5px solid var(--borde);overflow:hidden;cursor:pointer;transition:border-color .15s;background:var(--bg)}
.canvas-card:hover{border-color:var(--verde2)}
.canvas-card canvas{width:100%;display:block}
.canvas-label{font-size:10px;font-weight:700;color:var(--txt2);text-align:center;padding:5px;letter-spacing:.3px;text-transform:uppercase}
.canvas-dl-btn{display:block;width:100%;padding:7px;background:var(--verde2);color:#fff;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.3px;transition:opacity .15s}
.canvas-dl-btn:hover{opacity:.88}

/* CANTIDADES */
.qty-list{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto}
.qty-row{display:flex;align-items:center;gap:8px}
.qty-name{flex:1;font-size:11px;font-weight:600;line-height:1.3;color:var(--txt)}
.qty-price{font-size:10px;color:var(--txt2);white-space:nowrap}
.qty-ctrl{display:flex;align-items:center;gap:4px}
.qty-btn-sm{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--borde);background:var(--bg);color:var(--txt);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.qty-inp{width:36px;text-align:center;border:1.5px solid var(--borde);border-radius:8px;padding:3px;font-size:12px;font-weight:700;background:var(--bg);color:var(--txt);font-family:inherit}

/* ── TOAST ── */
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a2718;color:#fff;padding:8px 18px;border-radius:24px;font-size:12px;font-weight:600;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* EMPTY */
.empty{padding:40px 20px;text-align:center;color:var(--txt2);grid-column:1/-1}
.empty-ico{font-size:48px;margin-bottom:8px}
.empty-txt{font-size:13px;font-weight:500}
.empty-sub{font-size:11px;margin-top:4px;opacity:.7}

/* NO HAY HOY */
.no-hoy{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px dashed var(--borde);border-radius:12px;padding:12px;margin:10px 12px;font-size:12px;color:var(--txt2)}
.no-hoy-ico{font-size:20px}

/* SELECCIÓN FLOTANTE  */
.sel-fab{position:fixed;bottom:86px;right:14px;background:var(--verde);color:#fff;border:none;border-radius:50%;width:52px;height:52px;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;z-index:65;transition:transform .1s}
.sel-fab:active{transform:scale(.93)}
.sel-fab .fab-cnt{position:absolute;top:-4px;right:-4px;background:var(--rojo);color:#fff;font-size:9px;font-weight:800;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;display:none}
.sel-fab .fab-cnt.show{display:flex}
.clr-fab{position:fixed;bottom:86px;left:14px;background:#607D8B;color:#fff;border:none;border-radius:50%;width:42px;height:42px;font-size:18px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;z-index:65;transition:transform .1s;display:none}
.clr-fab.show{display:flex}
.clr-fab:active{transform:scale(.93)}

/* HOUR CHIPS */
.hour-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.12);padding:3px 8px;border-radius:12px;font-size:10px;color:rgba(255,255,255,.85)}
.hour-chip.inactive{background:rgba(255,100,0,.2);color:#FFB74D}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-logo">COPIHUE <span>🏔</span></div>
  <div class="loader-sub">Cargando ofertas del día...</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<header class="hdr">
  <div class="hdr-logo">SEND<span>WA</span><small>ALMACÉN COPIHUE</small></div>
  <div class="hdr-pills">
    <span class="hpill" id="hpill-sel">0 sel.</span>
    <span class="hpill" id="hpill-tot">— prod.</span>
  </div>
  <div class="hdr-acts">
    <button class="hdr-btn" onclick="toggleDark()" title="Modo oscuro">🌙</button>
    <button class="hdr-btn" onclick="recargar()" title="Recargar">↻</button>
  </div>
</header>

<div class="sticky-top">
  <div class="search-row">
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input class="search-inp" id="srch" type="text" placeholder="Buscar oferta..." oninput="render()">
    </div>
    <button class="hdr-btn" style="background:var(--verde);color:#fff;width:38px;height:38px;border-radius:10px" onclick="openDrawer('acciones')" title="Acciones">✈️</button>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<div class="estado-bar" id="estado-bar"></div>

<div id="main-content"></div>

<!-- Selección FABs -->
<button class="sel-fab" id="sel-fab" onclick="openDrawer('acciones')">
  ✈️<div class="fab-cnt" id="fab-cnt"></div>
</button>
<button class="clr-fab" id="clr-fab" onclick="clearSel()">✕</button>

<!-- Bottom bar -->
<div class="bot-bar" id="bot-bar">
  <div class="bot-sel-info">
    <span id="bot-sel-n">0 productos</span>
    <small id="bot-sel-sub">Tocá una oferta para seleccionar</small>
  </div>
  <button class="bot-btn orange" onclick="selAll()">⚡ Todo</button>
  <button class="bot-btn wa" onclick="openDrawer('acciones')">✈️ Enviar</button>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<!-- Drawer -->
<div class="drawer" id="drawer">
  <div class="drw-pill"></div>
  <div class="drw-hdr">
    <h3 id="drw-title">ACCIONES</h3>
    <button class="drw-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drw-body" id="drw-body"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const API = 'https://script.google.com/macros/s/AKfycbzWZzDvdGfW8vd2-FpQolT852cdPMeHbfKugn9DBOlju75bE1D0SUNB5EKEDOsI2vP4lA/exec';
const TIENDA = 'Almacén Copihue 🏔️';
const WA_FOOTER = '📲 Pedidos al WhatsApp ¡Te esperamos en Copihue!';

// ═══════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════
let pools = {};           // {relampago:[], destacadas:[], especiales:[], promos:[], combos:[], ultimas:[], nuevos:[]}
let horarios = {};        // horariosOferta del GAS
let selIds = new Set();
let selOrder = [];
let cantidades = {};
let currentTab = 'todo';
let darkMode = false;
let allFlat = [];         // todos los productos con stock > 0 y activos hoy

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
async function init() {
  try {
    // Fetch paralelo: getOfertas + getProductos (para promos/combos)
    const [rOfertas, rProd] = await Promise.all([
      fetch(API + '?action=getOfertas').then(r=>r.json()).catch(()=>null),
      fetch(API).then(r=>r.json()).catch(()=>null)
    ]);

    if (rOfertas && rOfertas.success) {
      horarios = rOfertas.horariosOferta || {};
      pools.relampago  = (rOfertas.relampagoActivo  || []).filter(p => p.stock > 0);
      pools.destacadas = (rOfertas.destacadasActivas || []).filter(p => p.stock > 0);
      pools.especiales = (rOfertas.especialesActivas || []).filter(p => p.stock > 0);
      pools.ultimas    = (rOfertas.ultimasSeleccionadas || []).filter(p => (p.stock||0) > 0);
      pools.nuevos     = (rOfertas.poolRecienLlegados  || []).filter(p => p.stock > 0);
    }

    if (rProd && rProd.productos) {
      const todos = rProd.productos.filter(p => p.stock > 0);
      pools.promos = todos.filter(p => {
        const cat = (p.categoriaOferta || '').toUpperCase();
        return cat.includes('PROMO ACTIVA');
      });
      pools.combos = todos.filter(p => {
        const cat = (p.categoriaOferta || '').toUpperCase();
        return cat.includes('COMBO ACTIVO');
      });
    }

    if (!rOfertas && !rProd) throw new Error('Sin conexión');

    buildFlat();
    buildTabs();
    buildEstadoBar();
    render();
  } catch(e) {
    // Demo data si falla
    pools = { relampago: DEMO_RELAMPAGO, destacadas: DEMO_DEST, especiales: DEMO_ESP, promos: [], combos: [], ultimas: DEMO_ULT, nuevos: [] };
    buildFlat(); buildTabs(); buildEstadoBar(); render();
  }
  document.getElementById('loader').classList.add('hidden');
}

// ═══════════════════════════════════════════════════
// NORMALIZAR PRODUCTO (todos los pools usan distintos campos)
// ═══════════════════════════════════════════════════
function norm(p, tipo) {
  // precio final = price || precio
  const pf = parseInt(p.price || p.precio || p.precioFinal || 0) || 0;
  // precio original (para PROMOS/COMBOS viene de col B = pf, y col L = normal)
  // para el resto, normal = precio antes del descuento
  let pOrig = parseInt(p.normal || p.precioAntes || p.antes || 0) || 0;

  // Según spec: para PROMOS/COMBOS, col B = precio normal, col L = precio promo
  // En getProductos: price = col B (precio venta), normal = col L (precio promo combo)
  // Entonces el precio final es normal (col L) y el original es price (col B)
  let precioFinal = pf;
  let precioOriginal = 0;
  if ((tipo === 'promos' || tipo === 'combos') && pOrig > 0) {
    precioFinal  = pOrig;  // col L = precio promo/combo
    precioOriginal = pf;   // col B = precio venta original
  } else if (tipo !== 'promos' && tipo !== 'combos') {
    precioOriginal = pOrig;
  }

  const ahorro = precioOriginal > precioFinal ? precioOriginal - precioFinal : 0;
  const pct = (precioOriginal > 0 && ahorro > 0) ? Math.round(ahorro/precioOriginal*100) : 0;

  const relampago = parseInt(p.relampago) || 0;
  const destacada = parseInt(p.destacada) || 0;
  const especial  = !!(p.especial && parseInt(p.especial) > 0);

  return {
    uid:     `${tipo}_${p.id ?? p.nombre ?? Math.random()}`,
    id:      p.id,
    name:    p.name || p.nombre || '?',
    cat:     (p.category || p.categoria || 'ALMACEN').toUpperCase(),
    stock:   parseInt(p.stock) || 0,
    tipo,
    precioFinal,
    precioOriginal,
    ahorro,
    pct,
    relampago,
    destacada,
    especial,
    venc:    p.vencimiento || '',
    dpv:     p.diasParaVencer ?? null,
    estadoVenc: p.estadoVencimiento || 'ok',
    rotacion:p.rotacion || 0,
    img:     p.image || p.foto || '',
    // promo específica relámpago
    promoLabel: buildPromoLabel(relampago, pct, tipo),
  };
}

function buildPromoLabel(cod, pctDest, tipo) {
  if (tipo === 'relampago') {
    const MAP = {1:'2×1',2:'3×2',3:'4×3',4:'5×4',5:'6×5',6:'7×6',7:'8×7',8:'9×8',9:'10×9',10:'2ª al 50%',11:'10%OFF',12:'15%OFF',13:'20%OFF',14:'25%OFF',15:'30%OFF'};
    return MAP[cod] || (cod ? `${cod}` : '⚡');
  }
  if (tipo === 'destacadas' && pctDest > 0) return `${pctDest}% OFF`;
  if (tipo === 'especiales') return '10% OFF';
  if (tipo === 'promos')  return '🔖 PROMO';
  if (tipo === 'combos')  return '🎁 COMBO';
  if (tipo === 'ultimas') return '⏰ ÚLTIMAS';
  if (tipo === 'nuevos')  return '✨ NUEVO';
  return '';
}

function buildFlat() {
  const seen = new Set();
  allFlat = [];
  for (const [tipo, arr] of Object.entries(pools)) {
    for (const p of arr) {
      const n = norm(p, tipo);
      if (!seen.has(n.uid)) {
        seen.add(n.uid);
        allFlat.push(n);
      }
    }
  }
  updateHpills();
}

function updateHpills() {
  document.getElementById('hpill-tot').textContent = `${allFlat.length} ofert.`;
  document.getElementById('hpill-sel').textContent = `${selIds.size} sel.`;
}

const TABS_DEF = [
  {k:'todo',     ico:'🏪', lbl:'Todas'},
  {k:'relampago',ico:'⚡', lbl:'Relámpago'},
  {k:'destacadas',ico:'⭐',lbl:'Destacadas'},
  {k:'especiales',ico:'💙',lbl:'Especiales'},
  {k:'promos',   ico:'🔖', lbl:'Promos'},
  {k:'combos',   ico:'🎁', lbl:'Combos'},
  {k:'ultimas',  ico:'⏰', lbl:'Últimas'},
  {k:'nuevos',   ico:'✨', lbl:'Nuevos'},
];
function buildTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = TABS_DEF.map(t => {
    const cnt = t.k === 'todo' ? allFlat.length : (pools[t.k]||[]).length;
    if (t.k !== 'todo' && cnt === 0) return '';
    return `<button class="tab${t.k===currentTab?' on':''}" onclick="setTab('${t.k}')" data-tab="${t.k}">

function setTab(t) {

  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('on', el.dataset.tab === t));
  render();
}

// ESTADO BAR (horarios del GAS)
// ═══════════════════════════════════════════════════
function buildEstadoBar() {
  const el = document.getElementById('estado-bar');
  const items = [];
  const defs = [
    {k:'relampago', lbl:'Relámpago', ico:'⚡'},
    {k:'destacadas',lbl:'Destacadas',ico:'⭐'},
    {k:'especiales',lbl:'Especiales',ico:'💙'},
  ];
  for (const d of defs) {
    const h = horarios[d.k];
    if (!h) continue;
    const color = h.activo ? '#27a045' : '#E53935';
    const txt   = h.activo ? 'ACTIVO' : 'INACTIVO';
    items.push(`<span class="e-tag"><span class="e-dot" style="background:${color}"></span>${d.ico} ${d.lbl} — <b>${txt}</b></span>`);
  }
  el.innerHTML = items.length ? items.join(' &nbsp;|&nbsp; ') : '<span>Datos del día cargados ✓</span>';
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function getFiltered() {
  const q = document.getElementById('srch').value.trim().toLowerCase();
  let list = currentTab === 'todo' ? [...allFlat] : allFlat.filter(p => p.tipo === currentTab);
  if (q) list = list.filter(p => p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q));
  return list;
}

function render() {
  const list = getFiltered();
  const el = document.getElementById('main-content');

  if (!list.length) {
    el.innerHTML = `<div class="grid"><div class="empty"><div class="empty-ico">😕</div><div class="empty-txt">Sin productos para esta selección</div><div class="empty-sub">Probá otra categoría o búsqueda</div></div></div>`;
    updateBotBar();
    return;
  }

  // Si mostrando todo, agrupa por tipo
  if (currentTab === 'todo') {
    let html = '';
    for (const t of TABS_DEF.slice(1)) {
      const gr = list.filter(p => p.tipo === t.k);
      if (!gr.length) continue;
      html += buildSeccionHdr(t.k, t.ico, t.lbl, gr.length);
      html += `<div class="grid">${gr.map(p => buildCard(p)).join('')}</div>`;
    }
    el.innerHTML = html;
  } else {
    el.innerHTML = `<div class="grid">${list.map(p => buildCard(p)).join('')}</div>`;
  }

  // eventos click
  el.querySelectorAll('.card').forEach(c => {
    c.addEventListener('click', () => toggleSel(c.dataset.uid));
  });

  updateBotBar();
}

function buildSeccionHdr(tipo, ico, lbl, cnt) {
  const colors = {
    relampago:'#FF6D00',destacadas:'#6A1B9A',especiales:'#1565C0',
    promos:'#C62828',combos:'#00695C',ultimas:'#E65100',nuevos:'#2E7D32'
  };
  const c = colors[tipo] || '#555';
  return `<div class="sec-hdr">
    <span style="font-size:18px">${ico}</span>
    <span class="sec-hdr-txt" style="color:${c}">${lbl.toUpperCase()}</span>
    <span class="sec-hdr-badge" style="background:${c}">${cnt}</span>
    <span class="sec-hdr-line" style="background:${c}"></span>
  </div>`;
}

function buildCard(p) {
  const isSel = selIds.has(p.uid);
  const ord = selOrder.indexOf(p.uid) + 1;
  const imgHtml = p.img
    ? `<img src="${p.img}" onerror="this.parentNode.innerHTML='📦'" alt="${p.name}" loading="lazy">`
    : getEmoji(p);

  // Badges
  let badges = '';
  const TIPO_BADGE = {
    relampago:`<span class="bdg bdg-r">⚡ ${p.promoLabel}</span>`,
    destacadas:`<span class="bdg bdg-d">⭐ ${p.promoLabel}</span>`,
    especiales:`<span class="bdg bdg-e">💙 ${p.promoLabel}</span>`,
    promos:`<span class="bdg bdg-p">🔖 PROMO</span>`,
    combos:`<span class="bdg bdg-c">🎁 COMBO</span>`,
    ultimas:`<span class="bdg bdg-u">⏰ ÚLTIMAS</span>`,
    nuevos:`<span class="bdg bdg-n">✨ NUEVO</span>`,
  };
  badges += TIPO_BADGE[p.tipo] || '';
  if (p.pct > 0) badges += `<span class="bdg-pct">-${p.pct}%</span>`;

  // Precio
  let precioHtml = '';
  if (p.precioOriginal > 0 && p.precioFinal < p.precioOriginal) {
    precioHtml = `<span class="card-price-old">${fmt(p.precioOriginal)}</span>
                  <span class="card-price-new" style="color:#E53935">${fmt(p.precioFinal)}</span>
                  ${p.ahorro>0?`<span class="card-save">-${fmt(p.ahorro)}</span>`:''}`;
  } else {
    precioHtml = `<span class="card-price-new">${fmt(p.precioFinal)}</span>`;
  }

  // Urgencia strip
  let urgStr = '';
  if (p.tipo === 'ultimas') {
    urgStr = `<div class="urgencia-strip critica">⚠️ SOLO ${p.stock} UNI.</div>`;
  } else if (p.stock <= 3) {
    urgStr = `<div class="urgencia-strip">⚠️ ${p.stock} restantes</div>`;
  } else if (p.dpv !== null && p.dpv !== undefined) {
    if (p.dpv <= 3) urgStr = `<div class="urgencia-strip critica">⏰ VENCE EN ${p.dpv} DÍAS</div>`;
    else if (p.dpv <= 7) urgStr = `<div class="urgencia-strip">⏰ Vence en ${p.dpv} días</div>`;
  }

  return `<div class="card${isSel?' sel':''}" data-uid="${p.uid}">
    <div class="badge-wrap">${badges}</div>
    <div class="chk-ico">✓</div>
    <div class="ord-bubble">${ord||''}</div>
    <div class="card-img">${imgHtml}</div>
    <div class="card-body">
      <div class="card-name">${p.name}</div>
      <div class="card-price-row">${precioHtml}</div>
    </div>
    ${urgStr}
  </div>`;
}

function getEmoji(p) {
  const CAT_EMO = {BEBIDA:'🧃',LACTEO:'🥛',CARNE:'🥩',PAN:'🥖',LIMPIEZA:'🧹',VERDURA:'🥦',FRUTA:'🍎',BEBIDAS:'🧃',CONGELADO:'🧊',SNACK:'🍿'};
  const e = CAT_EMO[p.cat] || '📦';
  return `<span style="font-size:36px">${e}</span>`;
}

// ═══════════════════════════════════════════════════
// SELECCIÓN
// ═══════════════════════════════════════════════════
function toggleSel(uid) {
  if (selIds.has(uid)) {
    selIds.delete(uid);
    selOrder = selOrder.filter(x => x !== uid);
  } else {
    selIds.add(uid);
    selOrder.push(uid);
  }
  updateHpills(); updateBotBar(); render();
}
function selAll() {
  getFiltered().forEach(p => { if (!selIds.has(p.uid)) { selIds.add(p.uid); selOrder.push(p.uid); } });
  updateHpills(); updateBotBar(); render();
  toast(`✓ ${selIds.size} seleccionados`);
}
function clearSel() {
  selIds.clear(); selOrder=[]; cantidades={};
  updateHpills(); updateBotBar(); render();
  toast('🧹 Selección limpia');
}
function getSelected() { return selOrder.map(uid => allFlat.find(p => p.uid === uid)).filter(Boolean); }

function updateBotBar() {
  const n = selIds.size;
  document.getElementById('bot-sel-n').textContent = `${n} producto${n!==1?'s':''} seleccionado${n!==1?'s':''}`;
  const s = getSelected();
  const tot = s.reduce((a,p) => a + p.precioFinal*(cantidades[p.uid]||1), 0);
  document.getElementById('bot-sel-sub').textContent = n ? `Total: ${fmt(tot)}` : 'Tocá una oferta para seleccionar';
  document.getElementById('fab-cnt').textContent = n;
  document.getElementById('fab-cnt').classList.toggle('show', n>0);
  document.getElementById('clr-fab').classList.toggle('show', n>0);
}

function buildQtyList(sel) {
  if (!sel.length) return '<div style="font-size:12px;color:var(--txt2)">Sin productos seleccionados</div>';
  return `<div class="qty-list">${sel.map(p => `
    <div class="qty-row">
      <div class="qty-name">${p.name}</div>
      <div class="qty-price">${fmt(p.precioFinal)}</div>
      <div class="qty-ctrl">
        <button class="qty-btn-sm" onclick="adjQty('${p.uid}',-1)">−</button>
        <input class="qty-inp" id="qty-${p.uid}" type="number" min="1" value="${cantidades[p.uid]||1}" onchange="setQty('${p.uid}',this.value)">
        <button class="qty-btn-sm" onclick="adjQty('${p.uid}',1)">+</button>
      </div>
    </div>`).join('')}</div>`;
}
function adjQty(uid, d) {
  const cur = cantidades[uid]||1;
  setQty(uid, cur+d);
  const inp = document.getElementById(`qty-${uid}`);
  if (inp) inp.value = cantidades[uid];
  updateBotBar();
}
function setQty(uid, v) {
  cantidades[uid] = Math.max(1, parseInt(v)||1);
  updateBotBar();
}

// ═══════════════════════════════════════════════════
// TEXTO
// ═══════════════════════════════════════════════════
function buildTexto(estilo, sel) {
  if (!sel.length) return '(Seleccioná productos primero)';
  const d = new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'long'});

  if (estilo === 'simple') {
    let t = `*${TIENDA}*\n*🔥 OFERTAS DEL DÍA — ${d.toUpperCase()}*\n\n`;
    sel.forEach(p => {
      const q = cantidades[p.uid]||1;
      t += `▪️ ${p.name}${q>1?` ×${q}`:''} → *${fmt(p.precioFinal)}*`;
      if (p.ahorro>0) t += ` ~~${fmt(p.precioOriginal)}~~`;
      t += '\n';
    });
    t += `\n${WA_FOOTER}`;
    return t;
  }

  if (estilo === 'completo') {
    let t = `*🏔️ ALMACÉN COPIHUE*\n*⚡ OFERTAS EN VIVO — ${d.toUpperCase()}*\n_Precios válidos hoy mientras dure el stock_\n\n`;
    sel.forEach((p,i) => {
      const q = cantidades[p.uid]||1;
      t += `*${i+1}. ${p.name}*\n`;
      if (q>1) t += `   📦 Cantidad: ${q}\n`;
      t += `   💵 *${fmt(p.precioFinal)}*`;
      if (p.ahorro>0) t += ` ~~${fmt(p.precioOriginal)}~~ (-${fmt(p.ahorro)})`;
      t += '\n';
      if (p.promoLabel) t += `   ${badgeEmoji(p.tipo)} ${p.promoLabel}\n`;
      if (p.stock<=3) t += `   ⚠️ ¡Solo ${p.stock} disponibles!\n`;
      t += '\n';
    });
    const tot = sel.reduce((a,p) => a+(p.precioFinal*(cantidades[p.uid]||1)), 0);
    if (sel.length>1) t += `*💰 TOTAL: ${fmt(tot)}*\n\n`;
    t += WA_FOOTER;
    return t;
  }

  if (estilo === 'ig') {
    let t = `🛒 ¡OFERTA DEL DÍA!\n🏔️ ALMACÉN COPIHUE\n\n`;
    sel.forEach(p => { t += `✅ ${p.name} → ${fmt(p.precioFinal)}${p.ahorro>0?` (-${p.pct}%)`:''}  \n`; });
    t += `\n📍 Copihue, Patagonia Argentina\n📲 Pedidos por WhatsApp\n\n`;
    t += `#almacen #oferta #copihue #patagonia #productos #precios #compras #almacencerca #promos #ahorro`;
    return t;
  }

  return '';
}

function badgeEmoji(tipo) {
  return {relampago:'⚡',destacadas:'⭐',especiales:'💙',promos:'🔖',combos:'🎁',ultimas:'⏰',nuevos:'✨'}[tipo]||'•';
}

function copiar() {
  const sel = getSelected();
  const m = drawerMode.replace('texto-','');
  const txt = buildTexto(m, sel);
  navigator.clipboard.writeText(txt).then(() => toast('📋 ¡Copiado al portapapeles!')).catch(()=>{
    const ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); toast('📋 Copiado');
  });
}

function abrirWA() {
  const sel = getSelected();
  const txt = buildTexto('simple', sel);
  if (!sel.length) { toast('⚠️ Seleccioná al menos un producto'); return; }
  window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`,'_blank');
}

function drawCanvas(estilo, sel) {
  const container = document.getElementById('canvas-container');
  if (!container) return;
  container.innerHTML = '';

  if (!sel.length) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--txt2);font-size:12px">⚠️ Seleccioná productos primero</div>';
    return;
  }

  const ESTILOS = {
    fuego:  { fn: drawFuego,  lbl: '🔥 FUEGO' },
    fresco: { fn: drawFresco, lbl: '🌿 FRESCO' },
    night:  { fn: drawNight,  lbl: '🌙 NIGHT' },
    story:  { fn: drawStory,  lbl: '📱 STORY' },
    promo:  { fn: drawPromo,  lbl: '💥 PROMO' },
    simple: { fn: drawSimple, lbl: '🃏 SIMPLE' },
  };

  const e = ESTILOS[estilo] || ESTILOS['fuego'];

  // Crear canvas
  const wrap = document.createElement('div');
  wrap.className = 'canvas-card';
  const cv = document.createElement('canvas');
  cv.id = 'main-cv';
  wrap.appendChild(cv);
  const lbl = document.createElement('div');
  lbl.className = 'canvas-label';
  lbl.textContent = e.lbl;
  wrap.appendChild(lbl);
  const dlBtn = document.createElement('button');
  dlBtn.className = 'canvas-dl-btn';
  dlBtn.textContent = '⬇️ Descargar imagen';
  dlBtn.onclick = () => {
    const a = document.createElement('a');
    a.href = cv.toDataURL('image/png');
    a.download = `copihue-oferta-${estilo}-${Date.now()}.png`;
    a.click();
    toast('⬇️ Imagen descargada');
  };
  wrap.appendChild(dlBtn);

  // Botón compartir nativo
  if (navigator.share && navigator.canShare) {
    const shareBtn = document.createElement('button');
    shareBtn.className = 'canvas-dl-btn';
    shareBtn.style.background = '#25D366';
    shareBtn.style.marginTop = '2px';
    shareBtn.textContent = '📤 Compartir directo';
    shareBtn.onclick = async () => {
      cv.toBlob(async (blob) => {
        try {
          const file = new File([blob], `copihue-oferta.png`, {type:'image/png'});
          if (navigator.canShare({files:[file]})) {
            await navigator.share({files:[file], title:'Almacén Copihue', text:'¡Mirá estas ofertas!'});
          }
        } catch(e) {}
      });
    };
    wrap.appendChild(shareBtn);
  }

  container.appendChild(wrap);
  e.fn(cv, sel);
  cv.style.width = '100%';
}

// Helpers canvas comunes
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let curY = y;
  for (let w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, curY);
      line = w;
      curY += lineH;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, curY);
  return curY;
}

    ctx.textAlign='center';

    ctx.textAlign='left';

    const q = cantidades[p.uid]||1;
    ctx.fillText(`${nm}${q>1?' ×'+q:''}`, PAD+240, y+52);

    // Precio
    ctx.textAlign='right';
    if (p.precioOriginal>p.precioFinal && p.precioOriginal>0) {

      ctx.fillText(s, cx+CARD_W-20, cy+125);
      ctx.beginPath(); ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=2;
      ctx.moveTo(cx+CARD_W-20-tw, cy+119); ctx.lineTo(cx+CARD_W-20, cy+119); ctx.stroke();
    }
    ctx.fillStyle='#FFD600'; ctx.font=`bold 68px 'Barlow Condensed',Impact,sans-serif`;
    ctx.fillText(fmt(p.precioFinal), cx+CARD_W-20, cy+180);

    if (p.pct>0) {
      roundRect(ctx, cx+CARD_W-130, cy+18, 110, 36, 18); ctx.fillStyle='#E53935'; ctx.fill();
      ctx.fillStyle='#fff'; ctx.font=`bold 22px 'Barlow Condensed',sans-serif`;
      ctx.fillText(`-${p.pct}%`, cx+CARD_W-25, cy+43);
    }
  });

  // Footer
  const fy = H-160;
  ctx.fillStyle='rgba(255,255,255,.08)';
  roundRect(ctx,40,fy,W-80,110,20); ctx.fill();
  ctx.fillStyle='#A5D6A7'; ctx.font=`600 32px 'Space Grotesk',sans-serif`; ctx.textAlign='center';
  ctx.fillText('📲 PEDIDOS POR WHATSAPP', W/2, fy+48);
  ctx.fillStyle='rgba(255,255,255,.5)'; ctx.font='24px sans-serif';
  ctx.fillText('¡Stock limitado · Precios válidos hoy!', W/2, fy+84);
}

// ── ESTILO 5: PROMO (badge giant) ────────────────
function drawPromo(cv, sel) {
  const W = 1080;
  const maxP = Math.min(sel.length, 4);
  const CARD_H = 220, HDR_H = 160, FOOT_H = 80, PAD = 30, GAP = 12;
  const H = HDR_H + maxP*(CARD_H+GAP) + FOOT_H;
  cv.width=W; cv.height=H;
  const ctx = cv.getContext('2d');

  ctx.fillStyle='#FFFDE7'; ctx.fillRect(0,0,W,H);

  // Header
  const hg = ctx.createLinearGradient(0,0,W,0);
  hg.addColorStop(0,'#FF6D00'); hg.addColorStop(1,'#E53935');
  ctx.fillStyle=hg; ctx.fillRect(0,0,W,HDR_H);
  ctx.fillStyle='#fff'; ctx.font=`bold 88px 'Bebas Neue','Barlow Condensed',cursive`; ctx.textAlign='center';
  ctx.fillText('💥 PROMOCIONES', W/2, 110);
  ctx.fillStyle='rgba(255,255,255,.8)'; ctx.font=`bold 30px 'Barlow Condensed',sans-serif`;
  ctx.fillText('ALMACÉN COPIHUE  🏔️', W/2, 148);

  sel.slice(0,4).forEach((p,i) => {
    const cx=PAD, cy=HDR_H+i*(CARD_H+GAP);
    // Card
    roundRect(ctx,cx,cy,W-PAD*2,CARD_H,20); ctx.fillStyle='#fff'; ctx.fill();
    ctx.strokeStyle='#FFB74D'; ctx.lineWidth=3; ctx.stroke();

    // GRAN BADGE tipo
    const BCOLORS = {relampago:'#FF6D00',destacadas:'#6A1B9A',especiales:'#1565C0',promos:'#C62828',combos:'#00695C',ultimas:'#E65100',nuevos:'#2E7D32'};
    const bc = BCOLORS[p.tipo]||'#FF6D00';
    roundRect(ctx,cx+20,cy+20,220,80,16); ctx.fillStyle=bc; ctx.fill();
    ctx.fillStyle='#fff'; ctx.font=`bold 52px 'Bebas Neue','Barlow Condensed',cursive`; ctx.textAlign='center';
    ctx.fillText((p.promoLabel||p.tipo).slice(0,10), cx+20+110, cy+74);

    // Nombre prod
    ctx.fillStyle='#1a2718'; ctx.font=`600 ${p.name.length>32?'30px':'36px'} 'Space Grotesk',sans-serif`;
    ctx.textAlign='left';
    const q = cantidades[p.uid]||1;
    const nm = p.name.length>40?p.name.slice(0,37)+'…':p.name;
    ctx.fillText(`${nm}${q>1?' ×'+q:''}`, cx+260, cy+72);

    // Precio nuevo (grande)
    ctx.textAlign='right';
    ctx.fillStyle=bc; ctx.font=`bold 80px 'Bebas Neue','Barlow Condensed',cursive`;
    ctx.fillText(fmt(p.precioFinal), W-PAD-20, cy+CARD_H-20);

    // Precio original
    if (p.precioOriginal>p.precioFinal && p.precioOriginal>0) {
      ctx.fillStyle='#aaa'; ctx.font=`28px sans-serif`;
      const s = fmt(p.precioOriginal);
      const tw = ctx.measureText(s).width;
      ctx.fillText(s, W-PAD-20, cy+CARD_H-80);
      ctx.beginPath(); ctx.strokeStyle='#aaa'; ctx.lineWidth=2;
      ctx.moveTo(W-PAD-20-tw, cy+CARD_H-86); ctx.lineTo(W-PAD-20, cy+CARD_H-86); ctx.stroke();
    }

    // Chip ahorro
    if (p.pct>0) {
      roundRect(ctx, W-PAD-20-150, cy+CARD_H-130, 150, 40, 12); ctx.fillStyle='#E53935'; ctx.fill();
      ctx.fillStyle='#fff'; ctx.font=`bold 28px 'Barlow Condensed',sans-serif`;
      ctx.fillText(`-${p.pct}%`, W-PAD-25, cy+CARD_H-102);
    }
  });

  // Footer
  const fy = HDR_H + maxP*(CARD_H+GAP);
  const fg = ctx.createLinearGradient(0,0,W,0); fg.addColorStop(0,'#FF6D00'); fg.addColorStop(1,'#E53935');
  ctx.fillStyle=fg; ctx.fillRect(0,fy,W,FOOT_H);
  ctx.fillStyle='#fff'; ctx.font=`bold 32px 'Barlow Condensed',sans-serif`; ctx.textAlign='center';
  ctx.fillText('📲 Pedidos al WhatsApp  ·  Almacén Copihue', W/2, fy+48);
}

// ── ESTILO 6: SIMPLE / ELEGANTE ──────────────────
function drawSimple(cv, sel) {
  const W = 1080, rows = Math.min(sel.length, 10);
  const ROW_H = 90, HDR_H = 150, FOOT_H = 70;
  const H = HDR_H + rows*ROW_H + FOOT_H;
  cv.width=W; cv.height=H;
  const ctx = cv.getContext('2d');

  ctx.fillStyle='#FAFAFA'; ctx.fillRect(0,0,W,H);

  // Header
  ctx.fillStyle='#1B3A14'; ctx.fillRect(0,0,W,HDR_H);
  ctx.fillStyle='#FFD600'; ctx.font=`bold 80px 'Bebas Neue','Barlow Condensed',cursive`; ctx.textAlign='center';
  ctx.fillText('ALMACÉN COPIHUE  🏔️', W/2, 100);
  ctx.fillStyle='rgba(255,255,255,.7)'; ctx.font=`500 28px 'Space Grotesk',sans-serif`;
  ctx.fillText('PRECIOS DE HOY', W/2, 138);

  sel.slice(0,10).forEach((p,i) => {
    const y = HDR_H + i*ROW_H;
    ctx.fillStyle = i%2===0?'#fff':'#F5F7F4';
    ctx.fillRect(0,y,W,ROW_H);

    const BCOLORS = {relampago:'#FF6D00',destacadas:'#6A1B9A',especiales:'#1565C0',promos:'#C62828',combos:'#00695C',ultimas:'#E65100',nuevos:'#2E7D32'};
    const bc = BCOLORS[p.tipo]||'#1B3A14';

    // Barra izq
    ctx.fillStyle=bc; ctx.fillRect(0,y,5,ROW_H);

    // Nombre
    ctx.fillStyle='#1a2718'; ctx.font=`600 ${p.name.length>42?'24px':'28px'} 'Space Grotesk',sans-serif`;
    ctx.textAlign='left';
    const q = cantidades[p.uid]||1;
    const nm = p.name.length>50?p.name.slice(0,47)+'…':p.name;
    ctx.fillText(`${nm}${q>1?' ×'+q:''}`, 30, y+ROW_H/2+9);

    // Precio
    ctx.textAlign='right';
    if (p.precioOriginal>p.precioFinal && p.precioOriginal>0) {
      ctx.fillStyle='#bbb'; ctx.font='20px sans-serif';
      ctx.fillText(fmt(p.precioOriginal), W-30, y+26);
    }
    ctx.fillStyle=bc; ctx.font=`bold 38px 'Barlow Condensed',Impact,sans-serif`;
    ctx.fillText(fmt(p.precioFinal), W-30, y+70);

    // Mini badge
    if (p.pct>0) {
      roundRect(ctx, W-30-90, y+30, 82, 22, 6); ctx.fillStyle='#E53935'; ctx.fill();
      ctx.fillStyle='#fff'; ctx.font=`bold 14px 'Barlow Condensed',sans-serif`;
      ctx.fillText(`-${p.pct}%`, W-34, y+46);
    }

    ctx.fillStyle='#e8e8e8'; ctx.fillRect(0,y+ROW_H-1,W,1);
  });

  // Footer
  const fy = HDR_H+rows*ROW_H;
  ctx.fillStyle='#1B3A14'; ctx.fillRect(0,fy,W,FOOT_H);
  ctx.fillStyle='#A5D6A7'; ctx.font=`500 26px 'Space Grotesk',sans-serif`; ctx.textAlign='center';
  ctx.fillText('📲 Pedidos por WhatsApp  ·  Almacén Copihue', W/2, fy+42);
}

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
function fmt(n) { return '$' + Number(n||0).toLocaleString('es-AR'); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, dur=2200) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}
function toggleDark() {
  darkMode = !darkMode;
  document.body.classList.toggle('dark', darkMode);
}
function recargar() {
  clearSel();
  document.getElementById('loader').classList.remove('hidden');
  pools = {}; allFlat = [];
  init();
}
