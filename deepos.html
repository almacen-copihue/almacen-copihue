<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Copihue POS · v152</title>
    <meta name="theme-color" content="#2e7d32">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest-venta.json">
    <link rel="icon" href="iconos-pwa/android/android-launchericon-48-48.png">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root {
            --verde: #2e7d32;
            --verde-claro: #4caf50;
            --verde-oscuro: #1b5e20;
            --naranja: #ff6f00;
            --rojo: #d32f2f;
            --gris-claro: #f5f5f5;
            --gris-border: #e0e0e0;
            --texto: #212121;
            --texto-sec: #757575;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f8f9fa;
            color: var(--texto);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }
        /* HEADER */
        .header {
            background: linear-gradient(135deg, var(--verde-oscuro), var(--verde));
            color: white;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 10;
        }
        .header-fila1 {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-titulo {
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .version-badge {
            font-size: 0.7rem;
            background: rgba(255,255,255,0.2);
            padding: 2px 6px;
            border-radius: 10px;
        }
        .header-acciones {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .header-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .header-btn.activo {
            background: rgba(255,255,255,0.3);
            border-color: white;
        }
        .header-fila2 {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .mini-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            cursor: pointer;
            white-space: nowrap;
        }
        .mini-btn.activo {
            background: var(--naranja);
            border-color: white;
        }
        /* BÚSQUEDA */
        .buscador-wrap {
            background: white;
            padding: 8px 12px;
            border-bottom: 1px solid var(--gris-border);
            flex-shrink: 0;
            position: relative;
        }
        .buscador-input {
            width: 100%;
            padding: 12px 40px 12px 16px;
            border: 2px solid var(--verde);
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            background: #f9fffe;
        }
        .buscador-input:focus {
            border-color: var(--verde-oscuro);
            box-shadow: 0 0 0 3px rgba(46,125,50,0.1);
        }
        .buscador-clear {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--rojo);
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 0.8rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 2;
        }
        /* LISTA PRINCIPAL (ESTILO CUADERNO) */
        .productos-lista {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0 100px 0;
            background: white;
        }
        .producto-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid #f0f0f0;
            background: white;
            transition: background 0.1s;
            cursor: pointer;
            position: relative;
            touch-action: pan-y pinch-zoom;
        }
        .producto-item:active {
            background: #f5f5f5;
        }
        .producto-item.en-carrito {
            background: #f1f8e9;
            border-left: 3px solid var(--verde);
        }
        .producto-item.sin-stock {
            opacity: 0.6;
            background: #fafafa;
        }
        .producto-img {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
            background: #e8f5e9;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .producto-img-placeholder {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .producto-info {
            flex: 1;
            min-width: 0;
        }
        .producto-nombre {
            font-weight: 600;
            font-size: 0.9rem;
            line-height: 1.3;
            color: var(--texto);
            white-space: normal;
            word-break: break-word;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .badge-oferta {
            background: var(--naranja);
            color: white;
            font-size: 0.6rem;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 10px;
            white-space: nowrap;
        }
        .badge-ultimas {
            background: var(--rojo);
            color: white;
            font-size: 0.6rem;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 10px;
            white-space: nowrap;
        }
        .badge-cervecero {
            background: #1565c0;
            color: #f9a825;
            font-size: 0.6rem;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 10px;
            white-space: nowrap;
        }
        .producto-detalle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
            font-size: 0.8rem;
        }
        .producto-precio {
            font-weight: 700;
            color: var(--verde-oscuro);
        }
        .producto-precio-tachado {
            font-size: 0.7rem;
            color: var(--texto-sec);
            text-decoration: line-through;
            margin-left: 4px;
        }
        .producto-stock {
            color: var(--texto-sec);
            font-size: 0.75rem;
        }
        .producto-stock.bajo {
            color: var(--naranja);
            font-weight: 600;
        }
        .producto-stock.critico {
            color: var(--rojo);
            font-weight: 600;
        }
        .producto-cantidad {
            background: var(--verde);
            color: white;
            border-radius: 16px;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: 8px;
            white-space: nowrap;
        }
        .producto-cantidad.peso {
            background: var(--naranja);
        }
        .btn-mas {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--verde);
            color: white;
            border: none;
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            margin-left: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            pointer-events: auto;
        }
        .btn-mas:active {
            transform: scale(0.92);
            background: var(--verde-oscuro);
        }
        .btn-mas.sin-stock {
            background: #bdbdbd;
            pointer-events: none;
        }
        /* VISTA OFERTAS */
        .ofertas-header {
            background: linear-gradient(135deg, #e65100, #ff6f00);
            color: white;
            padding: 12px 16px;
            font-weight: 800;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 0 0 12px 12px;
            margin-bottom: 8px;
        }
        .ofertas-grupo {
            background: white;
            border-radius: 12px;
            margin: 8px 12px;
            padding: 8px 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--gris-border);
        }
        .ofertas-grupo-titulo {
            padding: 8px 12px;
            font-weight: 800;
            font-size: 0.85rem;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ofertas-grupo-titulo.relampago { color: #f9a825; }
        .ofertas-grupo-titulo.destacadas { color: #ff6f00; }
        .ofertas-grupo-titulo.especiales { color: #00bcd4; }
        .ofertas-grupo-titulo.ultimas { color: var(--rojo); }
        .ofertas-grupo-titulo.cervecero { color: #1565c0; }
        /* PANEL INFERIOR (CARRITO) */
        .panel-venta {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 2px solid var(--verde);
            box-shadow: 0 -4px 16px rgba(0,0,0,0.1);
            z-index: 20;
            max-height: 40vh;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
        }
        .panel-venta.minimizado {
            transform: translateY(calc(100% - 48px));
        }
        .panel-header {
            padding: 10px 16px;
            background: #fafafa;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .panel-titulo {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--verde-oscuro);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-total {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--verde-oscuro);
        }
        .items-venta {
            overflow-y: auto;
            flex: 1;
            padding: 4px 0;
        }
        .item-venta {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            border-bottom: 1px solid #f0f0f0;
            gap: 8px;
        }
        .item-venta-nombre {
            flex: 1;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-venta-oferta {
            font-size: 0.65rem;
            color: var(--naranja);
            font-weight: 600;
        }
        .item-venta-controles {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-cant {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid var(--gris-border);
            background: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-cant:active {
            background: #f0f0f0;
        }
        .item-cant {
            font-weight: 700;
            min-width: 24px;
            text-align: center;
        }
        .item-subtotal {
            font-weight: 700;
            color: var(--verde-oscuro);
            min-width: 70px;
            text-align: right;
        }
        .panel-footer {
            padding: 10px 16px;
            background: #fafafa;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        .btn-cobrar {
            flex: 2;
            background: linear-gradient(135deg, var(--verde-oscuro), var(--verde));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
        }
        .btn-vaciar {
            flex: 1;
            background: white;
            color: var(--rojo);
            border: 2px solid #ffcdd2;
            border-radius: 12px;
            padding: 14px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
        }
        /* MODALES */
        .modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-bg.open { display: flex; }
        .modal-sheet {
            background: white;
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.2s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(60px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-handle {
            width: 40px; height: 4px;
            background: #ddd; border-radius: 4px;
            margin: 12px auto 0;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .modal-titulo {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--verde-oscuro);
        }
        .modal-cerrar {
            background: #e53935;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        }
        /* MODAL COBRO */
        .confirm-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.9rem;
        }
        .confirm-total-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 20px;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--verde-oscuro);
            border-top: 2px solid #e0e0e0;
        }
        .confirm-acciones {
            padding: 16px 20px;
            display: flex;
            gap: 10px;
        }
        .btn-secundario {
            flex: 1;
            padding: 14px;
            background: white;
            color: #555;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-primario {
            flex: 2;
            padding: 14px;
            background: linear-gradient(135deg, var(--verde-oscuro), var(--verde));
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
        }
        .btn-peligro {
            background: #ffebee;
            color: var(--rojo);
            border: 2px solid #ffcdd2;
        }
        .badge-pendiente {
            background: #ff9800;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-block;
        }
        /* MODAL PESO */
        .peso-display {
            text-align: center;
            padding: 20px 0 10px;
        }
        .peso-gramos {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--verde-oscuro);
        }
        .peso-precio {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--naranja);
            margin-top: 8px;
        }
        .peso-teclado {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 16px 20px;
        }
        .peso-tecla {
            background: #f5f5f5;
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
        }
        .peso-tecla:active { background: #e0e0e0; }
        .peso-tecla.borrar { background: #ffebee; color: var(--rojo); }
        .peso-tecla.ok {
            background: var(--verde);
            color: white;
            grid-column: span 3;
        }
        /* TOAST */
        .toast {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(40,40,40,0.9);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .toast.visible { opacity: 1; }
        .toast.verde { background: var(--verde-oscuro); }
        .toast.rojo { background: var(--rojo); }
        .toast.naranja { background: var(--naranja); }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-fila1">
        <div class="header-titulo">
            🏪 Copihue <span class="version-badge">v152</span>
        </div>
        <div class="header-acciones">
            <button class="header-btn" id="btnVistaNormal" onclick="cambiarVista('normal')">📋 Productos</button>
            <button class="header-btn" id="btnVistaOfertas" onclick="cambiarVista('ofertas')">⚡ Ofertas</button>
        </div>
    </div>
    <div class="header-fila2">
        <button class="mini-btn" onclick="abrirIngreso()">📦 Ingreso</button>
        <button class="mini-btn" onclick="abrirNuevoProducto()">➕ Nuevo</button>
        <button class="mini-btn" onclick="abrirAjuste()">✏️ Ajuste</button>
        <button class="mini-btn" onclick="abrirResumen()">📊 Hoy</button>
        <a href="copihue-herramientas.html" class="mini-btn">🛠️ Herramientas</a>
        <a href="copihue-reportes.html" class="mini-btn">📈 Reportes</a>
        <a href="copihue-editor-de-fotos.html" class="mini-btn">📷 Fotos</a>
        <a href="copihue-horario.html" class="mini-btn">🕐 Horario</a>
    </div>
</div>

<!-- BÚSQUEDA (visible solo en vista normal) -->
<div class="buscador-wrap" id="buscadorWrap">
    <input type="text" class="buscador-input" id="buscadorInput" placeholder="🔍 Buscar producto..." autocomplete="off">
    <button class="buscador-clear" id="buscadorClear">✕</button>
</div>

<!-- CONTENEDOR PRINCIPAL (vista normal) -->
<div class="productos-lista" id="vistaNormal"></div>

<!-- CONTENEDOR VISTA OFERTAS (oculto por defecto) -->
<div class="productos-lista" id="vistaOfertas" style="display: none;"></div>

<!-- PANEL INFERIOR CARRITO -->
<div class="panel-venta" id="panelVenta">
    <div class="panel-header" onclick="togglePanel()">
        <div class="panel-titulo">
            <span>🛒 Venta actual</span>
            <span class="panel-total" id="panelTotal">$0</span>
        </div>
        <span id="panelToggleIcon">⊟</span>
    </div>
    <div class="items-venta" id="itemsVenta">
        <div style="text-align:center; padding:20px; color:#999;">Sin productos</div>
    </div>
    <div class="panel-footer">
        <button class="btn-cobrar" onclick="abrirConfirmacion()">💵 COBRAR</button>
        <button class="btn-vaciar" onclick="limpiarVenta()">🗑 Vaciar</button>
    </div>
</div>

<!-- MODAL CONFIRMAR COBRO -->
<div class="modal-bg" id="modalConfirmar">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <span class="modal-titulo">💵 Confirmar venta</span>
            <button class="modal-cerrar" onclick="cerrarModal('modalConfirmar')">✕</button>
        </div>
        <div id="confirmItems" style="max-height: 50vh; overflow-y: auto;"></div>
        <div class="confirm-total-row" id="confirmTotal">TOTAL: $0</div>
        <div class="confirm-acciones">
            <button class="btn-secundario" onclick="cerrarModal('modalConfirmar')">Cancelar</button>
            <button class="btn-primario" onclick="confirmarVenta()">✅ Confirmar cobro</button>
        </div>
        <div style="padding: 0 20px 20px;">
            <button class="btn-secundario btn-peligro" style="width:100%;" onclick="marcarPendienteBackend()">
                ⛔ Cancelar venta (requiere backend: revertir stock)
            </button>
        </div>
    </div>
</div>

<!-- MODAL PESO -->
<div class="modal-bg" id="modalPeso">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <span class="modal-titulo">⚖️ Venta por peso</span>
            <button class="modal-cerrar" onclick="cerrarModal('modalPeso')">✕</button>
        </div>
        <div style="padding: 0 20px; text-align:center; font-weight:700;" id="pesoNombre"></div>
        <div class="peso-display">
            <div class="peso-gramos" id="pesoGramos">0</div>
            <div class="peso-precio" id="pesoPrecio">$0</div>
        </div>
        <div class="peso-teclado">
            <button class="peso-tecla" onclick="pesoTecla('1')">1</button>
            <button class="peso-tecla" onclick="pesoTecla('2')">2</button>
            <button class="peso-tecla" onclick="pesoTecla('3')">3</button>
            <button class="peso-tecla" onclick="pesoTecla('4')">4</button>
            <button class="peso-tecla" onclick="pesoTecla('5')">5</button>
            <button class="peso-tecla" onclick="pesoTecla('6')">6</button>
            <button class="peso-tecla" onclick="pesoTecla('7')">7</button>
            <button class="peso-tecla" onclick="pesoTecla('8')">8</button>
            <button class="peso-tecla" onclick="pesoTecla('9')">9</button>
            <button class="peso-tecla" onclick="pesoTecla('500')">½kg</button>
            <button class="peso-tecla" onclick="pesoTecla('0')">0</button>
            <button class="peso-tecla borrar" onclick="pesoBorrar()">⌫</button>
            <button class="peso-tecla ok" id="pesoOkBtn" onclick="confirmarPeso()">✅ Agregar</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ========== CONFIGURACIÓN ==========
const API_URL = 'https://script.google.com/macros/s/AKfycbxhKFk2WAi-KRY5xGBsI6_6Pvp3jDjt8mSRXvy7I1WehNmBpJamqK9G9Q1ZJSCSgAdfDA/exec';
const CARRITO_KEY = 'copihue_carrito_nuevo';
const MOBILE = true;

// ========== OFERTAS RELÁMPAGO (desde index.html) ==========
const OFERTAS_RELAMPAGO_SISTEMA = {
    '1': { nombre:'2x1', tipo:'nxm', cantidad:2, pagas:1, eslogan:'🎁 Llevás 2, pagás 1' },
    '2': { nombre:'3x2', tipo:'nxm', cantidad:3, pagas:2, eslogan:'🎁 Llevás 3, pagás 2' },
    '3': { nombre:'4x3', tipo:'nxm', cantidad:4, pagas:3, eslogan:'🎁 Llevás 4, pagás 3' },
    '4': { nombre:'5x4', tipo:'nxm', cantidad:5, pagas:4, eslogan:'🎁 Llevás 5, pagás 4' },
    '5': { nombre:'6x5', tipo:'nxm', cantidad:6, pagas:5, eslogan:'🎁 Llevás 6, pagás 5' },
    '6': { nombre:'7x6', tipo:'nxm', cantidad:7, pagas:6, eslogan:'🎁 Llevás 7, pagás 6' },
    '10': { nombre:'2da50', tipo:'nxm', cantidad:2, pagas:1.5, eslogan:'🎁 2DA UNIDAD 50% OFF' },
    '11': { nombre:'10off', tipo:'pct', descuento:10, eslogan:'🔥 10% OFF' },
    '12': { nombre:'15off', tipo:'pct', descuento:15, eslogan:'🔥 15% OFF' },
    '13': { nombre:'20off', tipo:'pct', descuento:20, eslogan:'🔥 20% OFF' },
    '14': { nombre:'25off', tipo:'pct', descuento:25, eslogan:'🔥 25% OFF' }
};

// ========== VARIABLES GLOBALES ==========
let productos = [];
let ventaActual = [];
let poolRelampago = [], poolDestacadas = [], poolEspeciales = [], poolUltimas = [], poolCervecero = [];
let vistaActual = 'normal';
let timeoutBusqueda = null;
let pesoProductoActual = null, pesoValor = '';

// ========== CARGA DE PRODUCTOS ==========
async function cargarProductos() {
    try {
        const r = await fetch(API_URL + '?cache=' + Date.now());
        const data = await r.json();
        const arr = data.productos || data;
        productos = arr.filter(p => p.name && p.price > 0).map(p => ({
            id: p.id,
            name: String(p.name).trim(),
            price: parseInt(p.price) || 0,
            stock: parseInt(p.stock) || 0,
            category: String(p.category || 'ALMACEN').trim().toUpperCase(),
            relampago: parseInt(p.relampago) || 0,
            destacada: parseInt(p.destacada) || 0,
            especial: parseInt(p.especial) || 0,
            normal: parseInt(p.normal) || 0,
            vencimiento: p.vencimiento || '',
            image: `imagenes-productos/${simplificarNombre(String(p.name).trim())}.jpg`
        }));
        console.log(`✅ ${productos.length} productos`);
        cargarPoolsOfertas();
        renderizarVistaActual();
    } catch(e) {
        mostrarToast('❌ Error al cargar', 'rojo');
    }
}

function simplificarNombre(n) {
    return n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9 ]/g, "").replace(/\s+/g, '-').replace(/-+/g, '-').trim();
}

// ========== POOLS DE OFERTAS (lógica index.html) ==========
async function cargarPoolsOfertas() {
    try {
        const r = await fetch(API_URL + '?action=getOfertas&t=' + Date.now());
        const data = await r.json();
        if (data.success) {
            poolRelampago = (data.relampagoActivo || []).map(p => p.id);
            poolDestacadas = (data.destacadasActivas || []).map(p => p.id);
            poolEspeciales = (data.especialesActivas || []).map(p => p.id);
            poolUltimas = (data.ultimasUnidades || []).map(p => ({ id: p.id, dias: p.diasParaVencer }));
        }
    } catch(e) { console.warn('⚠️ Pools no disponibles'); }
    try {
        const r2 = await fetch(API_URL + '?action=getJuevesCervecero&t=' + Date.now());
        const d2 = await r2.json();
        if (d2.success) {
            poolCervecero = d2.productos.map(p => p.id);
        }
    } catch(e) {}
}

function calcularOfertaProducto(p, qty = 1) {
    if (poolCervecero.includes(p.id)) {
        return { precio: Math.round(p.price * 0.85), etiqueta: '🍺 -15%', tipo: 'cervecero' };
    }
    if (poolRelampago.includes(p.id) && p.relampago > 0) {
        const cfg = OFERTAS_RELAMPAGO_SISTEMA[p.relampago];
        if (cfg) {
            if (cfg.tipo === 'pct') {
                return { precio: Math.round(p.price * (1 - cfg.descuento/100)), etiqueta: `⚡ -${cfg.descuento}%`, tipo: 'relampago' };
            } else {
                return { precio: p.price, etiqueta: `⚡ ${cfg.nombre}`, tipo: 'relampago', esNxM: true };
            }
        }
    }
    if (poolDestacadas.includes(p.id) && p.destacada > 0) {
        return { precio: Math.round(p.price * (1 - p.destacada/100)), etiqueta: `🔥 -${p.destacada}%`, tipo: 'destacadas' };
    }
    if (poolEspeciales.includes(p.id) && p.especial > 0) {
        return { precio: Math.round(p.price * 0.9), etiqueta: `⭐ -10%`, tipo: 'especiales' };
    }
    if (poolUltimas.some(u => u.id === p.id)) {
        const urgente = poolUltimas.find(u => u.id === p.id)?.dias <= 3;
        if (urgente) {
            return { precio: Math.round(p.price * 0.75), etiqueta: `🏷️ -25%`, tipo: 'ultimas' };
        }
        return { precio: p.price, etiqueta: `🏷️ Últimas`, tipo: 'ultimas' };
    }
    if (p.normal && p.normal > p.price) {
        return { precio: p.price, etiqueta: `↓ -${Math.round((p.normal-p.price)/p.normal*100)}%`, tipo: 'normal' };
    }
    return { precio: p.price, etiqueta: null, tipo: null };
}

// ========== RENDER VISTAS ==========
function renderizarVistaNormal(busqueda = '') {
    const container = document.getElementById('vistaNormal');
    let filtrados = productos.filter(p => p.stock > 0);
    
    if (busqueda) {
        const term = busqueda.toLowerCase();
        filtrados = filtrados.filter(p => p.name.toLowerCase().includes(term));
    }
    
    // Orden: en carrito primero, luego alfabético
    const idsCarrito = ventaActual.map(i => i.id);
    filtrados.sort((a, b) => {
        const aEnCarrito = idsCarrito.includes(a.id) ? -1 : 1;
        const bEnCarrito = idsCarrito.includes(b.id) ? -1 : 1;
        if (aEnCarrito !== bEnCarrito) return aEnCarrito - bEnCarrito;
        return a.name.localeCompare(b.name);
    });

    container.innerHTML = filtrados.map(p => {
        const enCarrito = ventaActual.find(i => i.id === p.id);
        const cant = enCarrito ? enCarrito.qty : 0;
        const oferta = calcularOfertaProducto(p);
        const badgeClass = oferta.tipo === 'ultimas' ? 'badge-ultimas' : 
                          oferta.tipo === 'cervecero' ? 'badge-cervecero' : 'badge-oferta';
        
        let stockClass = '';
        if (p.stock <= 2) stockClass = 'critico';
        else if (p.stock <= 5) stockClass = 'bajo';
        
        return `
        <div class="producto-item ${cant > 0 ? 'en-carrito' : ''}" data-id="${p.id}" onclick="agregarProducto(${p.id})">
            <img class="producto-img" src="${p.image}" onerror="this.src='';this.classList.add('producto-img-placeholder');this.innerHTML='🛒'">
            <div class="producto-info">
                <div class="producto-nombre">
                    ${p.name}
                    ${oferta.etiqueta ? `<span class="${badgeClass}">${oferta.etiqueta}</span>` : ''}
                </div>
                <div class="producto-detalle">
                    <span class="producto-precio">$${oferta.precio.toLocaleString('es-AR')}</span>
                    ${oferta.precio !== p.price ? `<span class="producto-precio-tachado">$${p.price.toLocaleString('es-AR')}</span>` : ''}
                    <span class="producto-stock ${stockClass}">📦 ${p.stock}</span>
                    ${cant > 0 ? `<span class="producto-cantidad">${cant} en carrito</span>` : ''}
                </div>
            </div>
            <button class="btn-mas" onclick="event.stopPropagation(); agregarProducto(${p.id})">+</button>
        </div>`;
    }).join('');
}

function renderizarVistaOfertas() {
    const container = document.getElementById('vistaOfertas');
    const productosOferta = productos.filter(p => {
        if (poolCervecero.includes(p.id)) return true;
        if (poolRelampago.includes(p.id) && p.relampago > 0) return true;
        if (poolDestacadas.includes(p.id) && p.destacada > 0) return true;
        if (poolEspeciales.includes(p.id) && p.especial > 0) return true;
        if (poolUltimas.some(u => u.id === p.id)) return true;
        return false;
    });

    const grupos = [
        { titulo: '⚡ OFERTAS RELÁMPAGO', clase: 'relampago', filtro: p => poolRelampago.includes(p.id) && p.relampago > 0 },
        { titulo: '🔥 DESTACADAS', clase: 'destacadas', filtro: p => poolDestacadas.includes(p.id) && p.destacada > 0 },
        { titulo: '⭐ ESPECIALES', clase: 'especiales', filtro: p => poolEspeciales.includes(p.id) && p.especial > 0 },
        { titulo: '🏷️ ÚLTIMAS UNIDADES', clase: 'ultimas', filtro: p => poolUltimas.some(u => u.id === p.id) },
        { titulo: '🍺 JUEVES CERVECERO', clase: 'cervecero', filtro: p => poolCervecero.includes(p.id) }
    ];

    let html = '<div class="ofertas-header">⚡ OFERTAS ACTIVAS</div>';
    
    grupos.forEach(grupo => {
        const items = productosOferta.filter(grupo.filtro);
        if (items.length === 0) return;
        
        html += `<div class="ofertas-grupo">`;
        html += `<div class="ofertas-grupo-titulo ${grupo.clase}">${grupo.titulo}</div>`;
        
        items.forEach(p => {
            const oferta = calcularOfertaProducto(p);
            html += `
            <div class="producto-item" onclick="agregarProducto(${p.id})">
                <img class="producto-img" src="${p.image}" onerror="this.src='';this.classList.add('producto-img-placeholder');">
                <div class="producto-info">
                    <div class="producto-nombre">${p.name}</div>
                    <div class="producto-detalle">
                        <span class="producto-precio">$${oferta.precio.toLocaleString('es-AR')}</span>
                        <span class="producto-stock">📦 ${p.stock}</span>
                    </div>
                </div>
                <button class="btn-mas" onclick="event.stopPropagation(); agregarProducto(${p.id})">+</button>
            </div>`;
        });
        html += '</div>';
    });
    
    container.innerHTML = html || '<div style="text-align:center;padding:40px;color:#999;">No hay ofertas activas</div>';
}

function renderizarVistaActual() {
    if (vistaActual === 'normal') {
        const busqueda = document.getElementById('buscadorInput').value.trim();
        renderizarVistaNormal(busqueda);
    } else {
        renderizarVistaOfertas();
    }
}

// ========== CAMBIAR VISTA ==========
function cambiarVista(vista) {
    vistaActual = vista;
    document.getElementById('btnVistaNormal').classList.toggle('activo', vista === 'normal');
    document.getElementById('btnVistaOfertas').classList.toggle('activo', vista === 'ofertas');
    document.getElementById('buscadorWrap').style.display = vista === 'normal' ? 'block' : 'none';
    document.getElementById('vistaNormal').style.display = vista === 'normal' ? 'block' : 'none';
    document.getElementById('vistaOfertas').style.display = vista === 'ofertas' ? 'block' : 'none';
    renderizarVistaActual();
}

// ========== AGREGAR PRODUCTO ==========
function esPorPeso(p) {
    const nom = p.name.toUpperCase();
    return /\bKG\b/.test(nom) && !/\d\s*KG/.test(nom);
}

function agregarProducto(id) {
    const p = productos.find(x => x.id === id);
    if (!p || p.stock === 0) return;
    
    if (esPorPeso(p)) {
        pesoProductoActual = p;
        pesoValor = '';
        document.getElementById('pesoNombre').textContent = p.name;
        document.getElementById('pesoGramos').textContent = '0';
        document.getElementById('pesoPrecio').textContent = '$0';
        document.getElementById('pesoOkBtn').disabled = true;
        abrirModal('modalPeso');
        return;
    }
    
    const oferta = calcularOfertaProducto(p);
    const existente = ventaActual.find(i => i.id === id);
    
    if (existente) {
        if (existente.qty >= p.stock) {
            mostrarToast('⚠️ Stock máximo', 'rojo');
            return;
        }
        existente.qty++;
        existente.precioUnitario = oferta.precio;
    } else {
        ventaActual.push({
            id: p.id,
            name: p.name,
            precioUnitario: oferta.precio,
            precioOriginal: p.price,
            qty: 1,
            stockDisponible: p.stock,
            ofertaTipo: oferta.tipo,
            ofertaEtiqueta: oferta.etiqueta
        });
    }
    
    renderizarVistaActual();
    renderizarCarrito();
    guardarCarrito();
    
    // Auto-limpiar búsqueda
    if (vistaActual === 'normal') {
        document.getElementById('buscadorInput').value = '';
        document.getElementById('buscadorClear').style.display = 'none';
        renderizarVistaNormal('');
    }
}

// ========== PESO ==========
function pesoTecla(v) {
    if (v === '500') {
        pesoValor = String((parseInt(pesoValor)||0) + 500);
    } else {
        if (pesoValor.length >= 5) return;
        pesoValor += v;
        pesoValor = String(parseInt(pesoValor) || 0);
    }
    actualizarPeso();
}

function pesoBorrar() {
    pesoValor = pesoValor.slice(0, -1);
    actualizarPeso();
}

function actualizarPeso() {
    const g = parseInt(pesoValor) || 0;
    const precio = Math.round((pesoProductoActual.price / 1000) * g);
    document.getElementById('pesoGramos').textContent = g;
    document.getElementById('pesoPrecio').textContent = '$' + precio.toLocaleString('es-AR');
    document.getElementById('pesoOkBtn').disabled = g <= 0;
}

function confirmarPeso() {
    const g = parseInt(pesoValor) || 0;
    if (g <= 0 || !pesoProductoActual) return;
    
    const precio = Math.round((pesoProductoActual.price / 1000) * g);
    ventaActual.push({
        id: `peso_${Date.now()}`,
        idOriginal: pesoProductoActual.id,
        name: `${pesoProductoActual.name} (${g}g)`,
        precioUnitario: precio,
        qty: 1,
        gramos: g,
        esPeso: true,
        stockDisponible: 999
    });
    
    cerrarModal('modalPeso');
    renderizarVistaActual();
    renderizarCarrito();
    guardarCarrito();
    mostrarToast(`✅ ${g}g — $${precio.toLocaleString('es-AR')}`, 'verde');
}

// ========== CARRITO ==========
function renderizarCarrito() {
    const container = document.getElementById('itemsVenta');
    const total = ventaActual.reduce((s, i) => s + i.precioUnitario * i.qty, 0);
    
    if (ventaActual.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">Sin productos</div>';
    } else {
        container.innerHTML = ventaActual.map(item => `
        <div class="item-venta">
            <div class="item-venta-nombre">
                ${item.name}
                ${item.ofertaEtiqueta ? `<span class="item-venta-oferta">${item.ofertaEtiqueta}</span>` : ''}
            </div>
            <div class="item-venta-controles">
                <button class="btn-cant" onclick="cambiarCantidad('${item.id}', -1)">−</button>
                <span class="item-cant">${item.qty}${item.esPeso ? 'g' : ''}</span>
                <button class="btn-cant" onclick="cambiarCantidad('${item.id}', 1)">+</button>
            </div>
            <div class="item-subtotal">$${(item.precioUnitario * item.qty).toLocaleString('es-AR')}</div>
        </div>`).join('');
    }
    
    document.getElementById('panelTotal').textContent = '$' + total.toLocaleString('es-AR');
}

function cambiarCantidad(id, delta) {
    const idx = ventaActual.findIndex(i => String(i.id) === String(id));
    if (idx === -1) return;
    
    const item = ventaActual[idx];
    const nueva = item.qty + delta;
    
    if (nueva <= 0) {
        ventaActual.splice(idx, 1);
    } else {
        const p = productos.find(x => x.id === (item.idOriginal || item.id));
        if (p && !item.esPeso && nueva > p.stock) {
            mostrarToast('⚠️ Stock máximo', 'rojo');
            return;
        }
        item.qty = nueva;
    }
    
    renderizarVistaActual();
    renderizarCarrito();
    guardarCarrito();
}

function limpiarVenta() {
    if (ventaActual.length === 0) return;
    ventaActual = [];
    renderizarVistaActual();
    renderizarCarrito();
    guardarCarrito();
}

function guardarCarrito() {
    localStorage.setItem(CARRITO_KEY, JSON.stringify(ventaActual));
}

function recuperarCarrito() {
    const guardado = localStorage.getItem(CARRITO_KEY);
    if (guardado) {
        try {
            ventaActual = JSON.parse(guardado);
            renderizarCarrito();
        } catch(e) {}
    }
}

// ========== COBRO ==========
function abrirConfirmacion() {
    if (ventaActual.length === 0) return;
    
    const items = ventaActual.map(item => `
        <div class="confirm-item">
            <span>${item.qty}× ${item.name}</span>
            <span>$${(item.precioUnitario * item.qty).toLocaleString('es-AR')}</span>
        </div>
    `).join('');
    
    const total = ventaActual.reduce((s, i) => s + i.precioUnitario * i.qty, 0);
    
    document.getElementById('confirmItems').innerHTML = items;
    document.getElementById('confirmTotal').innerHTML = `TOTAL: $${total.toLocaleString('es-AR')}`;
    abrirModal('modalConfirmar');
}

async function confirmarVenta() {
    try {
        const ventaData = ventaActual.map(i => ({
            id: i.idOriginal || i.id,
            name: i.name,
            qty: i.qty,
            esPeso: i.esPeso || false,
            gramos: i.gramos || 0,
            precioVenta: i.precioUnitario
        }));
        
        const url = API_URL + '?action=vender&data=' + encodeURIComponent(JSON.stringify({ items: ventaData }));
        await fetch(url, { redirect: 'follow' });
        
        ventaActual.forEach(item => {
            const p = productos.find(x => x.id === (item.idOriginal || item.id));
            if (p) p.stock = Math.max(0, p.stock - item.qty);
        });
        
        ventaActual = [];
        guardarCarrito();
        renderizarVistaActual();
        renderizarCarrito();
        cerrarModal('modalConfirmar');
        mostrarToast('✅ Venta confirmada', 'verde');
    } catch(e) {
        mostrarToast('✅ Venta local (sin conexión)', 'verde');
        ventaActual = [];
        guardarCarrito();
        renderizarVistaActual();
        renderizarCarrito();
        cerrarModal('modalConfirmar');
    }
}

function marcarPendienteBackend() {
    mostrarToast('⛔ Requiere endpoint: revertir stock', 'naranja');
}

// ========== BÚSQUEDA CON AUTO-LIMPIEZA ==========
document.getElementById('buscadorInput').addEventListener('input', function(e) {
    const val = e.target.value;
    document.getElementById('buscadorClear').style.display = val ? 'flex' : 'none';
    
    clearTimeout(timeoutBusqueda);
    if (vistaActual === 'normal') {
        renderizarVistaNormal(val);
    }
    
    timeoutBusqueda = setTimeout(() => {
        if (document.getElementById('buscadorInput').value) {
            document.getElementById('buscadorInput').value = '';
            document.getElementById('buscadorClear').style.display = 'none';
            if (vistaActual === 'normal') renderizarVistaNormal('');
        }
    }, 2000);
});

document.getElementById('buscadorClear').addEventListener('click', function() {
    document.getElementById('buscadorInput').value = '';
    this.style.display = 'none';
    if (vistaActual === 'normal') renderizarVistaNormal('');
});

// ========== SWIPE IZQUIERDA (quitar 1) ==========
let touchStartX = 0, touchStartY = 0, touchStartId = null;
document.addEventListener('touchstart', e => {
    const item = e.target.closest('.producto-item[data-id]');
    if (!item) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartId = item.dataset.id;
}, { passive: true });

document.addEventListener('touchend', e => {
    if (!touchStartId) return;
    const deltaX = e.changedTouches[0].clientX - touchStartX;
    const deltaY = e.changedTouches[0].clientY - touchStartY;
    
    if (Math.abs(deltaX) > 50 && Math.abs(deltaX) > Math.abs(deltaY) * 2 && deltaX < 0) {
        // Swipe izquierda
        const itemEnCarrito = ventaActual.find(i => String(i.id) === String(touchStartId) || String(i.idOriginal) === String(touchStartId));
        if (itemEnCarrito) {
            cambiarCantidad(itemEnCarrito.id, -1);
        }
    }
    touchStartId = null;
});

// ========== PANEL TOGGLE ==========
let panelMinimizado = false;
function togglePanel() {
    panelMinimizado = !panelMinimizado;
    document.getElementById('panelVenta').classList.toggle('minimizado', panelMinimizado);
    document.getElementById('panelToggleIcon').textContent = panelMinimizado ? '⊞' : '⊟';
}

// ========== MODALES ==========
function abrirModal(id) {
    document.getElementById(id).classList.add('open');
}
function cerrarModal(id) {
    document.getElementById(id).classList.remove('open');
}

// ========== TOAST ==========
let toastTimeout;
function mostrarToast(msg, tipo = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast visible ' + tipo;
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => t.classList.remove('visible'), 1500);
}

// ========== FUNCIONES EXTERNAS (placeholder) ==========
function abrirIngreso() { mostrarToast('📦 Ingreso (desde seba21)', 'naranja'); }
function abrirNuevoProducto() { mostrarToast('➕ Nuevo producto (desde seba21)', 'naranja'); }
function abrirAjuste() { mostrarToast('✏️ Ajuste rápido (desde seba21)', 'naranja'); }
function abrirResumen() { mostrarToast('📊 Resumen del día (desde seba21)', 'naranja'); }

// ========== INIT ==========
cargarProductos();
recuperarCarrito();
setInterval(() => { if (productos.length) cargarPoolsOfertas(); }, 300000);
</script>
