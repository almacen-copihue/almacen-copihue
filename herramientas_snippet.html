     onclick="if(event.target===this)cerrarHerramientas()">
  <div style="background:#161625;border-radius:22px;width:100%;max-width:min(440px,calc(100vw - 24px));
              max-height:calc(100dvh - 24px);display:flex;flex-direction:column;
              box-shadow:0 20px 60px rgba(0,0,0,0.7);">

    <!-- Header fijo -->
    <div style="background:linear-gradient(135deg,#c0392b 0%,#7b1010 100%);
                padding:15px 18px;display:flex;align-items:center;justify-content:space-between;
                border-radius:22px 22px 0 0;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:1.5rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4));">🧰</span>
        <div>
          <div style="color:white;font-weight:900;font-size:1rem;letter-spacing:0.2px;">Herramientas Copihue</div>
          <div style="color:rgba(255,255,255,0.6);font-size:0.68rem;margin-top:1px;" id="hSubtitle">Cargando...</div>

      </div>
      <button onclick="cerrarHerramientas()" style="background:rgba(0,0,0,0.25);border:none;
              border-radius:50%;width:34px;height:34px;color:white;cursor:pointer;font-size:1rem;
              display:flex;align-items:center;justify-content:center;flex-shrink:0;">✕</button>
    </div>

    <!-- Grid scrolleable — 2 columnas -->
    <div id="hGrid" style="padding:14px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px;
                            overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;">
      <div style="grid-column:1/-1;text-align:center;color:#555;padding:32px;font-size:0.85rem;">
        <div style="font-size:2rem;margin-bottom:8px;">⏳</div>Cargando herramientas...
      </div>
    </div>

    <!-- Footer fijo -->

                display:flex;gap:8px;flex-shrink:0;">

              style="flex:1;padding:10px;background:rgba(255,193,7,0.12);border:1px solid rgba(255,193,7,0.35);
                     border-radius:12px;color:#fbc02d;font-size:0.78rem;font-weight:700;cursor:pointer;">

      </button>

              style="flex:1;padding:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);

        🔄 Recargar

  </div>

<!-- ══════════════════════════════════════════════════════════════════
     BLOQUE 2 DE 2 — JavaScript  (va dentro de <script> existente)
     Reemplazar desde:  // ══ HERRAMIENTAS HUB ══
     Hasta (inclusive): // ══ FIN HERRAMIENTAS HUB ══
     ══════════════════════════════════════════════════════════════════ -->

<script>
// ══ HERRAMIENTAS HUB ══════════════════════════════════════════════════════
// Lista de fallback — se usa si GAS no responde.
// Para administrar dinámicamente: crear hoja HERRAMIENTAS en la planilla
// con columnas A=NOMBRE B=URL C=ICONO D=DESCRIPCION E=ACTIVO F=ORDEN

// TTL 5 minutos — refresca automáticamente cuando cambia la planilla
let _hTimestamp = 0;
const _H_TTL = 5 * 60 * 1000;

function cerrarHerramientas() {
  document.getElementById('modalHerramientas').style.display = 'none';
}

async function abrirHerramientas() {
  document.getElementById('modalHerramientas').style.display = 'flex';
  const stale = (Date.now() - _hTimestamp) > _H_TTL;
  if (stale) await _recargarHerramientas();
}

async function _recargarHerramientas() {
  const grid = document.getElementById('hGrid');
  const sub  = document.getElementById('hSubtitle');
  grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#555;padding:24px;font-size:0.82rem;"><div style="font-size:1.8rem;margin-bottom:6px;">⏳</div>Cargando desde planilla...</div>';
  sub.textContent = 'Conectando...';

  try {
    const r = await fetch(API_URL + '?action=getHerramientas&t=' + Date.now(), { cache: 'no-store' });
    const d = await r.json();
    if (d.ok && Array.isArray(d.herramientas) && d.herramientas.length > 0) {
      _hTimestamp = Date.now();
      _renderHerramientas(d.herramientas);
    } else {
      _hError('Sin herramientas en planilla', 'Verificar hoja HERRAMIENTAS en Sheets');
    }
  } catch(e) {
    _hError('Sin conexión con el servidor', 'Revisá conexión y tocá Recargar');
  }
}

function _hError(titulo, subtitulo) {
  document.getElementById('hGrid').innerHTML =
    `<div style="grid-column:1/-1;text-align:center;padding:28px;">
      <div style="font-size:2rem;margin-bottom:8px;">⚠️</div>
      <div style="color:#e57373;font-size:0.82rem;font-weight:700;">${titulo}</div>
      <div style="color:#666;font-size:0.72rem;margin-top:4px;">${subtitulo}</div>
    </div>`;
  document.getElementById('hSubtitle').textContent = 'Error al cargar';
}

function _renderHerramientas(lista) {
  const grid = document.getElementById('hGrid');
  const sub  = document.getElementById('hSubtitle');
  const activas   = lista.filter(h => h.activo !== false);
  const inactivas = lista.filter(h => h.activo === false);

  // Grammar: 1 inactiva / 2 inactivas
  const labelInactivas = inactivas.length === 1 ? '1 inactiva' : inactivas.length + ' inactivas';
  sub.textContent = activas.length + ' herramientas' +
    (inactivas.length ? ' · ' + labelInactivas : '');

  let html = '';

  // ── Activas ──
  for (const h of activas) {
    const icono = h.icono && h.icono.trim() ? h.icono.trim() : '🔧';
    const href  = h.url && h.url.trim() ? h.url.trim() : '#';
    const dest  = href === '#' ? '' : 'target="_blank" rel="noopener"';
    html += `
      <a href="${href}" ${dest} style="text-decoration:none;">
        <div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);
                    border-radius:16px;padding:14px 12px;cursor:pointer;
                    display:flex;align-items:center;gap:12px;
                    transition:background 0.12s,border-color 0.12s;"
             ontouchstart="this.style.background='rgba(255,255,255,0.12)';this.style.borderColor='rgba(255,255,255,0.2)'"
             ontouchend="this.style.background='rgba(255,255,255,0.05)';this.style.borderColor='rgba(255,255,255,0.09)'">
          <div style="font-size:1.8rem;line-height:1;flex-shrink:0;">${icono}</div>
          <div style="min-width:0;">
            <div style="color:#f0f0f0;font-size:0.75rem;font-weight:800;line-height:1.3;
                        white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${h.nombre}</div>
            ${h.descripcion ? `<div style="color:#666;font-size:0.62rem;margin-top:2px;line-height:1.3;
                                           white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${h.descripcion}</div>` : ''}
          </div>
        </div>
      </a>`;
  }

  // ── Inactivas ── (misma grilla, visualmente atenuadas, sin link)
  if (inactivas.length) {
    html += `<div style="grid-column:1/-1;border-top:1px solid rgba(255,255,255,0.07);
                         margin-top:4px;padding-top:12px;">
               <div style="color:#444;font-size:0.6rem;text-transform:uppercase;letter-spacing:1px;
                            margin-bottom:8px;text-align:center;">Inactivas</div>
               <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">`;
    for (const h of inactivas) {
      const icono = h.icono && h.icono.trim() ? h.icono.trim() : '🔧';
      html += `
        <div style="background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.07);
                    border-radius:14px;padding:12px;opacity:0.35;
                    display:flex;align-items:center;gap:10px;">
          <div style="font-size:1.5rem;flex-shrink:0;">${icono}</div>
          <div style="min-width:0;">
            <div style="color:#666;font-size:0.72rem;font-weight:700;
                        white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${h.nombre}</div>
            ${h.descripcion ? `<div style="color:#444;font-size:0.6rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${h.descripcion}</div>` : ''}
          </div>
        </div>`;
    }
    html += '</div></div>';
  }

  if (!activas.length && !inactivas.length) {
    html = '<div style="grid-column:1/-1;text-align:center;color:#555;padding:30px;font-size:0.82rem;">Sin herramientas cargadas.</div>';
  }

  grid.innerHTML = html;
}
// ══ FIN HERRAMIENTAS HUB ══════════════════════════════════════════════════

</script>
